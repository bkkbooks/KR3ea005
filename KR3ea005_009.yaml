body:
  text: 卷之九著至教論自此以後七篇詳文義與前頗不相類疑是另一手筆也而此篇尤極淺薄每以拗澀字句貌為古朴茲特摘其稍成文理者略為一篇聊存名目而已不足多讀也黃帝坐明堂召雷公而問之曰子知醫之道乎明堂布政之宮也雷公對曰誦而頗能解解而未能別別而未能明明而未能彰足以治群僚不足至侯王言所知解但得法守數而已猶未能深盡精微之妙用也願得受樹天之度四時陰陽合之別星辰與日月光以彰經術後世益明按言欲帝指示天道以解後人之迷惑也帝曰善無失之此皆陰陽表裡上下雌雄相輸應也而道上知天文下知地理中知人事可以長久以教衆庶亦不疑殆雷公曰請受道諷誦用解帝曰子不聞陰陽傳乎傳謂古之書傳曰不知曰夫三陽天為業按人身三陽與天同氣故云天為業也上下無常合而病至偏害陰陽按陽氣善動故無常陽與陽合則偏勝而為害雷公曰三陽莫當請聞其解按三陽相合則勢不可當其解何如帝曰三陽獨至者是三陽並至並至如風雨上為巔疾下為漏病按三陽者手三陽足三陽也人之經脈手足各有三陰三陽三陽獨至則純陽無陰是獨至即並至也最為暴厲故上升則為頂巔之疾下行則為二便泄利之病也三陽者至陽也按合併則至盛積並則為驚病起疾風至如礔礪九竅皆塞陽氣滂溢干嗌喉塞火熱極也並於陰則上下無常薄為腸澼陰謂臟也然陽薄於臟為病亦上下無常定之診若在下為病便數赤白雷公曰陽言不別陰言不理請起受解以為至道示從容論從容者謂平心靜氣以診病人之脈帝言之以示雷公也黃帝燕坐召雷公而問之曰汝受術誦書者若能覽觀雜學及於比類通合道理為余言子所長雷公曰肝虛腎虛脾虛皆令人體重煩冤當投毒藥刺灸砭石湯液或已或不已願聞其解帝曰公何年之長而問之少余真問以自謬也按自謬謂不意其不知而問之也夫脾虛浮似肺腎小浮似脾肝急沉散似腎此皆工之所時亂也然從容得之浮而緩曰脾浮而短曰肺小浮而滑曰心急緊而散曰肝搏沉而滑曰腎不能比類則疑亂彌甚按時猶常也亂謂昏亂脈象變幻有真有似以似為真則誤矣故必比其形類定其真似而後病始無誤也然此非躁心浮氣者之所能又必從容診視乃得也雷公曰於此有人頭痛筋攣骨重怯然少氣噦噫腹滿時驚不嗜臥此何臟之發也脈浮而弦切之石堅不知其解復問所以三臟者以知其比類也按證似有三臟之殊而脈象不合故以為問帝曰夫從容之謂也按言此亦當從容診視也夫年長則求之於腑年少則求之於經年壯則求之於臟年之長者甚於味年之少者勞於使年之壯者過於內過於內則耗傷精氣勞於使則經中風邪恣於味則傷於腑故求之異也今子所言皆失八風菀熟五臟消爍傳邪相受夫浮而弦者是腎不足也按腎脈宜弦而沉不足則虛而浮矣沉而石者是腎氣內著也石之言堅也著謂腎氣內薄著而不行也怯然少氣者是水道不行形氣消索也腎氣不足故水道不行肺臟被沖故形氣消散索盡也按腎為作強不足故怯然悄索注言肺臟被沖似未之思也咳嗽煩冤者是腎氣之逆也按腎不足則離丹田而上衝一人之氣病在一臟也若言三臟俱行不在法也按一臟謂腎也言以上諸證雖有四項其實則在腎經一臟若疑是三臟是為不合於法也雷公曰於此有人四肢解墮喘咳血泄而愚診之以為傷肺切脈浮大而緊愚不敢治粗工下砭石病愈多出血血止身輕此何物也帝曰子所能治知亦衆多與此病失矣按言其能治他病而此則誤也今夫脈浮大虛者是脾氣之外絶去胃外歸陽明也按陽明內應胃而外主經浮大者氣虛脾胃相連而主氣氣虛故浮大乃脾弱不能為胃運行外歸陽明之經脈之所以浮大而虛也夫二火不勝三水是以脈亂而無常也二火謂二陽臟三水謂三陰臟二陽臟者心肺也以在膈上故三陰臟者肝脾腎也以在膈下故然三陰之氣上勝二陽陽不勝陰故脈亂而無常也四肢解墮此脾精之不行也土主四肢故解墮脾精不化故使之然喘咳者是水氣並陽明也腎氣逆入於胃故水氣並於陽明血泄者脈急血無所行也血不入經故為血泄以脈奔急而血泄故曰血無所行也若夫以為傷肺者由失以狂也不引比類是知不明也言所識不明不能比類以為傷肺猶失狂言耳夫傷肺者脾氣不守胃氣不清經氣不為使真臟壞決經脈旁絶五臟漏泄不衄則嘔此二者不相類也肺氣傷則脾外救故云脾氣不守肺臟損則氣不行不行則胃滿故云胃氣不清肺者主行榮衛陰陽故肺傷則經脈不能為之行使也真臟謂肺臟也若肺臟損壞皮膜決破經脈旁絶而不流行五臟之氣上溢而漏泄者不衄血則嘔血也何者肺主鼻胃應口也然口鼻者氣之門戶也今肺臟已損胃氣不清不上衄則血下流於胃中故不衄出則嘔出也然傷肺傷脾衄血泄血標出且異本歸亦殊故此二者不相類也譬如天之無形地之無理白與黑相去遠矣言傷肺傷脾形證懸別譬如天地之相遠黑白之異象也疏五過論五過四失皆指醫者而言也醫之為教拯濟危難接續真元是非上智之士不能勝其任豈僅求免於過失而已也然荒陋者多則五過不可以不疏而四失不可以不徵疏分疏也徵猶懲也黃帝曰嗚呼遠哉閔閔乎若視深淵若迎浮雲視深淵尚可測迎浮雲莫知其際按此與六微旨論同皆嘆道妙之無窮極也聖人之術為萬民式論裁志意必有法則循經守數為萬民副故事有五過四德汝知之乎按楊上善云副助也雷公避席再拜曰臣年幼小蒙愚以惑不聞五過與四德比類形名虛引其經心無所對經未師受心匪生知故卑辭也帝曰凡未診病者必問嘗貴後賤病從內生名曰脫營神屈故也貴之尊榮賤之屈辱心懷眷慕志結憂惶故雖不中邪而病從內生血脈虛減故曰脫營嘗富後貧名曰失精五氣留連病有所並富而從欲貧奪豐財內結憂煎外悲過物然則心從想慕神隨往計營衛之道閉以遲留血氣不行積併為病醫工診之不在臟腑不變軀形診之而疑不知病名言病之初也病由想戀所為故未居臟腑事因情念所起故不變軀形醫不悉之故診而疑也身體日減氣虛無精言病之次也氣血相逼形肉消爍故身體日減陰陽應象大論曰氣歸精精食氣今氣虛不化精無所滋故也病深無氣灑灑然時驚言病之深也病氣深穀氣盡陽氣內薄故惡寒而驚灑灑寒貌病深者以其外耗於衛內奪於榮按此承上而言蓋推原所以病深之故也氣虛無精是內奪也灑灑時驚是外耗也內奪外耗病所由深為此故爾良工所失不知病情此亦治之一過也失謂失問其所始也凡欲診病者必問飲食居處按飲食有多寡好惡之別居處有晝夜動靜之分暴樂暴苦後樂後苦按王本始樂後苦太素作始樂始苦夫始猶暴也不苦後樂後苦為確後以對暴今正之皆傷精氣精氣竭絶形體毀沮暴怒傷陰暴喜傷陽按傷陰者怒傷肝血也傷陽者喜散心氣也注以逆緩解似猶未確厥氣上行滿脈去形厥氣逆也逆氣上行滿於經絡則神氣潰散去離形骸矣按暴怒四句妙義精絶然已見陰陽應象大論中愚醫治之不知補瀉精華日脫邪氣乃並此治之二過也按邪盛者宜先瀉邪正虛者宜先補正宜瀉反補宜補反瀉則正愈虛而邪愈盛善為脈者必以比類奇恆從容知之為工而不知道此診之不足貴此治之三過也奇恆謂奇異於恆常之候也從容謂分別臟氣虛實脈見高下幾相似也按道即比類從容之道診有三常必問貴賤封君敗傷及欲侯王貴則形樂志樂賤則形苦志苦苦樂殊貫故宜先問也封君敗傷降君之位為公卿也及欲侯王謂情慕尊貴而妄為不已也故貴脫勢雖不中邪精神內傷身必敗亡始富後貧雖不傷邪皮焦筋屈痿躄為攣按富貴精神爽貧賤志氣卑有病無病於是乎分矣醫不能嚴不能動神外為柔弱亂至失常病不能移此治之四過也嚴謂戒所以禁非也動所以令從命也外為柔弱言委隨而順從也然戒不足以禁非動不足以從令委隨任物亂失天常病且不移何醫之有凡診者必知終始切脈問名當合男女終始謂氣色也脈要精微論曰知外者終而始之明知五氣色象終而復始也切謂以指按脈也問名謂問病證之名也男子陽氣多而左脈大為順女子陰氣多而右脈大為順故宜以候常先合之也離絶菀結憂恐喜怒五臟空虛血氣離守工不能知何術之語唯言死日亦為粗工此治之五過也離謂離間親愛絶謂絶念所懷菀謂菀積思慮結謂結固余怨夫間親愛者魂遊絶所懷者意喪積所慮者神勞結餘怨者志苦憂愁者閉塞而不行恐懼者蕩憚而失守盛忿者迷惑而不治喜樂者憚散而不藏由是八者故五臟空虛血氣離守工不思曉又何言哉按夫所貴乎醫者以其能審脈辨證去死回生也若補救之術全無而唯預期其死日後即有驗亦不足貴也凡此五者皆受術不通人事不明也故曰聖人之治病也必知天地陰陽四時經紀五臟六腑雌雄表裡刺灸砭石毒藥所主從客人事以明經道貴賤貧富各異品理問年少長勇怯之理審於分部知病本始八正九候診必副矣聖人之備識也如此工宜勉之徵四失論四失之義大略已見五過中此不過敷衍成文以盡一篇之名目而已黃帝在明堂雷公侍坐黃帝曰子所通書受事衆多矣試言得失之意雷公對曰循經受業皆言十全其時有過失者請聞其事解也按言居恆自以為是而及其施用則不能無失故公更問其解也帝曰子年少智未及邪將言以雜合耶按言以雜合謂惑於衆說而不能擇也夫經脈十二絡脈三百六十五此皆人之所明知工之所循用也所以不能十全者精神不專志意不理外內相失故時疑殆外謂色內謂脈也然精神不專於循用志意不從於條理所謂粗略揆度失常故色脈相失而時自疑殆也診不知陰陽逆從之理此治之一失也脈要精微論曰冬至四十五日陽氣微上陰氣微下夏至四十五日陰氣微上陽氣微下陰陽有時與脈為期又曰微妙在脈不可不察察之有紀從陰陽始由此故診不知陰陽逆從之理為一失矣受師不卒妄作雜術謬言為道更名自功妄用砭石後遺身咎此治之二失也不終師術惟妄是為易古變常自功循己遺身之咎不亦宜乎故為失二也不適貧富貴賤之居坐之薄厚形之寒溫不適飲食之宜不別人之勇怯不知比類足以自亂不足以自明此治之三失也貧賤者勞富貴者佚佚則邪不能傷勞則易傷以邪其於勞也則富者處貴者之半其於邪也則貧者居賤者之半例率如此然世祿之家或此殊矣夫勇者難惑怯者易傷二者不同蓋以其神氣有壯弱也觀其貧賤富貴之義則坐之薄厚形之寒溫飲食之宜理可知矣不知比類用必乖誤適足以汨亂心緒豈通明之可望乎故為失三也診病不問其始憂患飲食之失節起居之過度或傷於毒不先言此卒持寸口何病能中妄言作名為粗所窮此治之四失也憂謂憂懼也患謂患難也飲食失節言甚飽也起居過度言潰耗也或傷於毒謂病不可拘於臟腑相乘之法而為療也按不識致病之因而但持寸口名為診脈而實不知病之名此四失也比比然矣是故治不能循理棄術於市妄治時愈愚心自得按不學無術徒衒賣於市𠪨之間偶或一中便爾矜誇以此終身過不勝數嗚呼窈窈冥冥孰知其道按至道高玄舉世矇昧是可嘆也陰陽類論經中論陰陽之類多矣而此篇所言乃取手足三陰三陽之脈形見於寸口者為之比類而較論之以補從前之所未備雖言證不詳然亦有可採之句焉孟春始至黃帝燕坐臨觀八極正八風之氣而問雷公曰陰陽之類經脈之道五中所主何臟最貴孟春始至謂立春之日也燕安也觀八極謂視八方遠際之色正八風謂候八方之風朝會於太一者也五中謂五臟按楊上善云夫天為陽地為陰人為和陰無其陽衰殺無已陽無其陰生長不止生長不止則傷於陰陰傷則陰災起衰殺不已則傷於陽陽傷則陽禍生矣故須聖人在天地間和陰陽氣令萬物生也和氣之道謂先修身為德則陰陽氣和陰陽氣和則八節風調八虛風止於是疵癘不起嘉祥日集此亦不知所以然而然也故黃帝問身之經脈貴賤依之調攝修德於身以正八風之氣雷公對曰春甲乙青中主肝治七十二日是脈之主時臣以其臟最貴東方甲乙春氣主之金匱真言論曰東方青色入通於肝故曰青中主肝也然五行之氣各王七十二日五積而乘之則終一歲之數三百六十日故云治七十二日也夫四時之氣以春為始五臟之應肝臟合之公故以其臟為最貴也帝曰卻念上下經陰陽從容子所言貴最其下也雷公致齊七日旦復侍坐悟非故齊以洗心願益故坐而復請帝曰三陽為經二陽為維一陽為遊部經謂經綸所以濟成務維謂維持所以系天真遊謂遊行部謂身形部分也故主氣者濟成務化谷者系天真主色者散布精微遊行諸部也按新校正云楊上善云三陽足太陽脈也從目內眥上頭分為四道下項並正別脈上下六道以行於背與身為經二陽足陽明脈也從鼻而起下咽分為四道並正別脈六道上下行腹網維於身一陽足少陽脈也起目外眥絡頭分為四道下缺盆並正別脈六道上下主經營百節流氣三部故曰遊部三陽為表二陰為里少陰與太陽為表裡故云按太陽膀胱少陰腎也一陰至絶作朔晦卻具合以正其理一陰厥陰也厥猶盡也靈樞經曰亥為左足之厥陰戌為右足之厥陰兩陰俱盡故曰厥陰夫陰盡為晦陰生為朔厥陰者以陰盡為義也徵其氣王則朔適言其氣盡則晦既見其朔又當其晦故曰一陰至絶作朔晦也然徵彼俱盡之陰合此發生之木以正應五行之理而無替循環故云卻具合以正其理也按新校正云注言陰生為朔疑是陽生為朔是也宜改從之又按此節文義殊難解釋注雖曲為之辭亦似未確其中必有脫誤闕疑可也雷公曰受業未能明帝曰所謂三陽者太陽為經陽氣盛大故曰太陽按大者為經小者為脈太陽主表為諸脈之大經也三陽脈至手太陰弦浮而不沉決以度察以心合之陰陽之論太陰為寸口也寸口者手太陰也脈氣之所行故脈皆至於寸口也太陽之脈洪大以長今弦浮不沉則當約以四時高下之度而決斷之察以五臟異同之候而參合之以應陰陽之論知其臧否耳按諸脈至手太陰俱有得失而太陽獨無疑此處必有脫簡也所謂二陽者陽明也靈樞經曰辰為左足之陽明巳為右足之陽明兩陽合明故曰二陽者陽明也至手太陰弦而沉急不鼓炅至以病皆死鼓謂鼓動炅熱也陽明之脈浮大而短今弦而沉急不鼓者是陰氣勝陽木來乘土也而反熱病至者是陽氣之衰敗猶燈之焰欲滅反明故皆死也一陽者少陽也陽氣未大故曰少陽至手太陰上連人迎弦急懸不絶此少陽之病也人迎謂結喉兩旁一寸五分脈動應手者也弦為少陽之脈今急懸不絶是經氣不足故曰少陽之病也懸者謂如懸物之動搖也專陰則死專獨也言其獨有陰氣而無陽氣則死三陰者六經之所主也三陰太陰也言所以諸脈皆至手太陰者何以是六經之主故也六經謂三陰三陽之經脈所以至手太陰者何以肺朝百脈之氣皆交會於氣口也故下文曰交於太陰此正發明肺朝百脈之義也經脈別論曰肺朝百脈伏鼓不浮上空志心按楊上善云肺脈浮澀此為平也今見伏鼓是腎脈也足少陰脈貫脊屬腎上入肺中從肺出絡心肺氣下入腎志上入心神也王氏謂志心為小心義未通楊說較注似勝但以伏鼓為腎脈謂肺氣下入腎志上入心神亦屬牽強愚謂肺脈宜浮而反見沉伏且於伏中鼓動是氣閉而火動也空猶控也志心猶言心志也心之志為神肺位本在心上今肺脈既見伏鼓不浮是氣反抑於心之下氣閉火動上控心而心神亦為之動也此伏鼓的是手太陰本經自至之脈非若餘五脈之至手太陰者比楊氏蓋惑於此也二陰至肺其氣歸膀胱外連脾胃二陰謂足少陰腎之脈少陰之脈別行者入跟中以上至股內後廉貫脊屬腎絡膀胱其直行者從腎上貫肝膈入肺中故上至於肺其氣歸於膀胱外連於脾胃按腎與膀胱為表裡其氣本相通腎又為胃關脾胃之氣實原於命門故腎脈之見於寸口者其氣內歸於膀胱外連於脾胃蓋以經脈相通之氣言也一陰獨至經絶氣浮不鼓鉤而滑若一陰獨至肺經氣內絶則氣浮不鼓於手若經不內絶則鉤而滑按一陰厥陰肝木也獨至者不兼他脈也肝脈來見於肺木性畏金故其氣欲絶而不能鼓動然木中有火火能凌金故又有浮滑之象也此六脈者乍陰乍陽交屬相併繆通五臟合於陰陽按六經之脈各有陰陽其互見於寸口也或陰中見陽或陽中見陰或一脈而兼數病或一病而見數脈交屬繆通而總於寸口決之以知五臟之陰陽合與不合從一可知也先至為主後至為客脈氣乍陰見陽乍陽見陰何以別之當以先至為主後至為客也至謂至寸口也雷公曰臣悉盡意受傳經脈頌得從容之道以合從容不知陰陽不知雌雄按帝所言從容之道脈有陰陽之分證有雌雄之別雖盡心講頌欲知之而不能必如何而可也帝曰三陽為父父所以督濟群小言高尊也二陽為衛衛所以卻御諸邪言扶生也一陽為紀紀所以綱紀形氣言其平也三陰為母母所以育養諸子言滋生也二陰為雌雌者陰之目也一陰為獨使一陰之臟外合三焦三焦主謁導諸氣名為使者故云獨使也二陽一陰陽明主病不勝一陰耎而動九竅皆沉一陰厥陰肝木氣也二陽陽明胃土氣也木土相薄故陽明主病也木伐其土土不勝木故云不勝一陰脈耎而動者耎為胃氣動謂木形木土相持則胃氣不轉故九竅沉滯而不通利也按自此以下言陰陽各經參錯為病即前所謂交屬繆通也三陽一陰太陽脈勝一陰不能止內亂五臟外為驚駭三陽足太陽之氣故曰太陽勝也木生火今盛陽燔木木復受之陽氣洪盛內為狂熱故內亂五臟也肝主驚駭故外形驚駭之狀也二陰二陽病在肺少陰脈沉勝肺傷脾外傷四肢二陰謂手少陰心之脈二陽亦胃脈也心胃合病邪上下並故外傷脾內勝肺也所以然者胃為脾府心火勝金故爾脾主四肢故脾傷則外傷於四肢矣少陰脈謂手掌後五分當小指神門之脈也按新校正云詳此二陽乃手陽明大腸肺之腑也少陰心火勝金之腑故云病在肺王氏以二陽為胃義未甚通況又以見胃病腎之說此乃是心病肺也二陰二陽皆交至病在腎罵詈妄行巔疾為狂二陰為腎水之臟也二陽為胃土之府也土氣刑水故交至而病在腎也以腎水不勝故胃盛而巔為狂按巔當作癲癲屬二陰狂屬二陽二陰一陽病出於腎陰氣客遊於心脘下空竅堤閉塞不通四肢別離一陽謂手少陽三焦心主火之腑也水上干火故病出於腎陰氣客遊於心也何者腎之脈從腎上貫肝膈入肺中其支別者從肺中出絡心注胸中故如是也然空竅陰客上游胃不能制胃不能制是土氣衰故脘下空竅皆不通也言堤者謂如堤堰不容泄漏胃脈循足心脈絡手故四肢如別離而不用也按病出於腎謂病由腎出也與前病在肺腎者不同腎為陰臟故其氣亦陰三焦為火腑內貫三停外通九竅故腎水為病陰氣充斥上自心腕下及諸竅而令閉塞如堤也四肢本屬胃土水盛則反侮土故亦令別離也注言土衰近是而新校正非之誤矣一陰一陽代絶此陰氣至心上下無常出入不知咽喉乾燥病在土脾一陰厥陰肝脈一陽少陽膽脈並木之氣也代絶者動而中止也以其代絶故為病也木氣生火故病生而陰氣至心也夫肝膽之氣上至頭首下至腰足中主腹脅故病發上下無常處也若受納不知其味竅瀉不知其度而咽喉乾燥者喉嚨之後屬咽為膽之使故病則咽喉乾燥雖病在脾土之中蓋由肝膽之所為爾二陽三陰至陰皆在陰不過陽陽氣不能止陰陰陽並絶浮為血瘕沉為膿胕二陽陽明三陰手太陰至陰脾也按此節中有脫誤闕疑可也陰陽皆壯下至陰陽若陰陽皆壯而相薄不已者漸下至於陰陽之內為大病矣陰陽者男子為陽道女子為陰器以其能盛受故而也上合昭昭下合冥冥診決死生之期遂合歲首雷公曰請問短期按短期死期也死因於病不能終命而短也新校正云全元起本自雷公以下別為一篇名四時病類黃帝曰冬三月之病合於陽者至春正月脈有死徵皆歸出春病合於陽謂前陰合陽而為病者也雖正月脈有死徵陽已發生至王不死故出春三月而至夏初也冬三月之病在理已盡草與柳葉皆殺里謂二陰腎之氣也然腎病而正月脈有死徵者以枯草盡青柳葉生出而皆死也理里也已以也古用同春陰陽皆絶期在孟春立春之後而脈陰陽皆懸絶者期死不出正月春三月之病曰陽殺陽病不謂傷寒溫熱之病謂非時病熱脈洪盛數也然春三月中陽氣尚少未當全盛而反病熱脈應夏氣者經云脈不再見夏脈當洪數無陽外應故必死於夏至也以死於夏至陽氣殺物之時故云陽殺也陰陽皆絶期在草乾若不陽病但陰陽之脈皆懸絶者死在於霜降草乾之時也夏三月之病至陰不過十日謂熱病也脾熱病則五臟危土成數十故不過十日也陰陽交期在溓水詳熱論曰溫病而汗出輒復熱而脈躁疾不為汗衰狂言不能食者死名曰陰陽交六月病暑陰陽復交二氣相搏故乃死於立秋之候也按新校正云溓水者七月建申水生於申陰陽逆也楊上善云溓廉檢反水靜也七月水生時也秋三月之病三陽俱起不治自已秋陽氣衰陰氣漸出陽不勝陰故自已也陰陽交合者立不能坐坐不能起以氣不由其正用故爾三陽獨至期在石水有陽無陰故云獨至也著至教論曰三陽獨至者是三陽並至由此則但有陽而無陰也石水者謂冬月水冰如石之時故云石水也火墓於戌冬陽氣微故石水而死也二陰獨至期在盛水亦所謂並至而無陽也盛水謂雨雪皆解為水之時則正謂正月中氣也按全元起本二陰作三陰方盛衰論方比也盛衰者陰陽之氣也謂問陰陽二氣之盛衰而比論之也然前以論盛衰引端而後半兼言診法焉雷公請問氣之多少何者為逆何者為從黃帝答曰陽從左陰從右陽氣之多少皆從左陰氣之多少皆從右從者為順反者為逆陰陽應象大論曰左右者陰陽之道路也老從上少從下老者谷衰故從上為順少者欲甚故從下為順是以春夏歸陽為生歸秋冬為死歸秋冬謂反歸陰也歸陰則順殺伐之氣故也反之則歸秋冬為生反之謂秋冬秋冬則歸陰為生也是以氣多少逆皆為厥陽氣之多少反從右陰氣之多少反從左是為不順故曰氣多少逆也如是從左從右之不順者皆為厥厥謂氣逆故曰皆為厥也問曰有餘者厥耶言少之不順者為逆有餘者則成厥逆之病乎按言厥為氣逆雖兼氣之多少意必有餘者多也答曰一上不下寒厥到膝少者秋冬死老者秋冬生四肢者諸陽之本當溫而反寒上故曰寒厥也少者以陽氣用事故秋冬死老者以陰氣用事故秋冬生按一上注云一經之氣厥逆而上非也一上者謂陽氣一於上行故自膝以下皆寒也楊上善云陽氣一上於頭不下於足足脛虛故寒厥到膝是也氣上不下頭痛巔疾按言氣血上行則不惟足寒至膝而且頂巔之上亦必生病求陽不得求陰不審五部隔無徵若居曠野若伏空室綿綿乎屬不滿日謂之陽乃脈似陰盛謂之陰又脈似陽盛故曰求陽不得求陰不審也五部謂五臟之部隔謂隔遠無徵謂無可信驗也然求陽不得其熱求陰不審是寒五臟部分又隔遠而無可信驗故曰求陽不得求陰不審五部隔無徵也夫如是者乃從氣久逆所作非由陰陽寒熱之氣所為也若居曠野言心神散越若伏空室謂志意沉潛散越以氣逆而痛甚未止沉潛以痛定而復恐再來也綿綿謂動息微也身雖綿綿乎且存然其心所屬望將不得終其盡日也故曰綿綿乎屬不滿日也是以少氣之厥令人妄夢其極至迷三陽絶三陰微是謂少氣按前言多氣之厥此言少氣之厥少氣亦厥非盡有餘者厥也少氣之人陰陽並虛夢多誕妄若虛之極則不但妄夢而且至於昏迷不省人事矣絶謂懸絶微謂微細太素作至陽絶陰混矣是以肺氣虛則使人夢見白物見人斬血藉藉白是金之色斬者金之用也按藉藉被傷借地也注作死狀誤矣借音謝得其時則夢見兵戰得時謂秋三月也金為兵革故夢見兵戰也按此言五臟虛夢蓋因上言少氣則妄夢而因言五臟氣虛亦多夢非謂氣厥者其夢如是也腎氣虛則使人夢見舟船溺人舟船溺人皆水之用腎象水故夢形之得其時則夢伏水中若有畏恐冬三月也肝氣虛則夢見菌香生草菌香生草木之類也肝合草木故夢見之按全元起本云菌香是桂誤矣菌香木之根也離騷云雜申椒與菌桂菌與桂蓋二物也菌音窘得其時則夢伏樹下不敢起春三月也心氣虛則夢救火陽物心合火故夢之陽物亦火之類得其時則夢燔灼夏三月也脾氣虛則夢飲食不足按脾主水穀虛則不知饜足也得其時則夢築垣蓋屋得其時謂辰戌丑未之月各王十八日築垣蓋屋土之用也此皆五臟氣虛陽氣有餘陰氣不足腑者陽氣臟者陰氣按夢者陰象也五臟虛則陰氣不足故象形於夢凡此與少氣妄夢者同一理也診有十度度人脈度臟度肉度筋度俞度度各有二故二五為十度也按十度度數也度人音鐸度量也陰陽氣盡人病自具至陰虛天氣絶至陽盛地氣不足按陰陽者人身之真氣氣盡則病自然之理也然所謂氣盡者非必竭盡而無有也偏虛偏盛皆能為害即如天地之氣陽根於陰陰為陽之根是為至陰陰虛則不能維陽而氣上浮是天氣絶也陰實本於陽陽為陰之本是為至陽陽盛則天氣亢而火爍水故地氣因之不足也陰陽並交至人之所行陰陽並交者陽氣先至陰氣後至按並交謂陰陽相濟而無偏勝之害故惟至人能之也然以相濟言則見其並交而即其氣機之運動則不無先後之次焉何則天地之道地隨天轉月隨日行婦隨夫倡血隨氣生其先其後乃不易之至理非僅如注言陽速陰遲而已也是以形弱氣虛死中外俱不足也形氣有餘脈氣不足死臟衰故脈不足也脈氣有餘形氣不足生臟盛故脈氣有餘是以診有大方坐起有常坐起有常則息力調適故診之方法必先用之出入有行以轉神明必清必淨上觀下觀司八正邪別五中部按脈動靜按外以運動其神機內以清淨其視聽而後八節所感之邪五臟部分之病皆可以按尺寸而知之矣循尺滑澀寒溫之意視其大小合之病能逆從以得復知病名診可十全不失人情按循撫循也尺尺膚也滑者血實澀者血虛寒則氣衰溫則氣盛謂以手撫循尺之皮膚視大小便之通塞而更為之參驗夫病情診之道其全矣乎然此猶醫者分內之事而不知最難調停最難測識者其惟人情乎有病人之情有旁人之情有同道人之情人情種種不一必使之貼然相安而後病乃可得而治也則甚矣不失人情之難也前輩張景嶽作類經中有不失人情論曲折周至洋灑數千言感慨無限噫欲治病而使醫者若此其亦可謂不情矣故診之或視息視意故不失條理按息為病候之一端意則人情之多變皆醫中之條理必謹視而無失也解精微論涕者鼻之液淚者目之液居五液之二雖皆悲哀之所致然外感風寒鼻亦能涕篇中尚未言及惟目中風則淚出篇末已並及之要其辨論悲泣水火之義至精至微故曰解精微也黃帝在明堂雷公請曰哭泣而淚不出者若出而少涕其故何也言何臟之所為而致是乎按哭者有聲有淚然亦有叫號而無淚者泣者有淚無聲徐氏曰哭之細也出而少涕謂淚出而涕不出也帝曰在經有也靈樞經有悲哀涕泣之義復問不知水所從生涕所從出也復問謂重問也欲知水涕所生之由也帝曰夫心者五臟之專精也專任也言五臟精氣任心之所使以為神明之府目者其竅也神內守明外鑑故目其竅也按目本肝之竅然目之神心之神也故目亦其竅華色者其榮也華色其神明之外飾是以人有德也則氣和於目有亡憂知於色氣和則神安神安則外鑑明矣氣不和則神不守神不守則外榮減矣按有亡憂注言有亡也憂知於色似未妥亡古作無謂有憂無憂觀色而知也亡平聲是以悲哀則泣下泣下水所由生水宗者積水也積水者至陰也至陰者腎之精也宗精之水所以不出者是精持之也輔之裹之故水不行也夫水之精為志火之精為神水火相感神志俱悲是以目之水生也目為上液之道水火相感神志俱悲水液上行方生於目故諺言曰心悲名曰志悲志與心精共湊於目也水火相感故曰心悲名曰志悲神志俱升故志與心神共奔湊於目是以俱悲則神氣傳於心精上不傳於志而志獨悲故泣出也泣涕者腦也腦者陰也五臟別論以腦為地氣所生皆藏於陰而象於地故言腦者陰陽上鑠也鑠則消也髓者骨之充也充滿也言髓填於骨充而滿也故腦滲為涕鼻竅通腦故腦滲為涕流於鼻中矣按易萃上九曰齎咨涕洟涕與洟音略同而義大別孔疏云自目出曰涕自鼻出曰洟今以涕為鼻出者傳寫之誤或古以涕洟通用耶志者骨之主也是以水流而涕從之者其行類也類謂同類夫涕之與泣者譬如人之兄弟急則俱死生則俱生同源故死生俱其志以早悲是以涕泣俱出而橫行也夫人涕泣俱出而相從者所屬之類也所屬謂於腦也按水源於腎人水之精為髓髓實藏於腦人悲則火動水浮泫然而泣潛然淚下腦亦滲而為涕矣此皆以類相從同為所屬故也雷公曰哭泣而淚不出者若出而少涕不從之何也怪其所屬同而行出異也按此問意重前因帝但答水所從生涕所從出之意故此復再問也帝曰夫泣不出者哭不悲也不泣者神不慈也神不慈則志不悲陰陽相持泣安能獨來泣不出者謂淚也不泣者泣謂哭也水之精為志火之精為神水為陰火為陽故曰陰陽相持安能獨來也夫志悲者惋惋則沖陰沖陰則志去目志去則神不守精精神去目涕泣出也惋謂內鑠也沖猶升也神志相感泣由是生故內鑠則陽氣升於陰也陰腦也去目謂陰陽不守目也志去於目故神亦浮游夫志去目則光無內照神失守則精不外明故曰精神去目涕泣出也且子獨不誦夫經言乎厥則目無所見夫人厥則陽氣並於上陰氣並於下陽並於上則火獨光也陰並於下則足寒足寒則脹也夫一水不勝五火故目眥盲眥視也一水目也五火謂五臟之厥陽也按此言陽氣並上則目無所見蓋因論涕泣而並及之也是以氣衝風泣下而不止夫風之中目也陽氣內守於精是火氣燔目故見風則泣下也風迫陽伏不發故內燔也按此言風入目則火閉而淚出亦與涕泣同類故並及之也有以比之夫火疾風生乃能雨此之類也按新校正云甲乙經無火字太素云天之疾風乃能雨無生字
