body:
  text: 卷之二脈要精微論脈居氣血之先切為四診之一凡欲治病惟脈為要矣然其道至精至微苟非手快心靈鮮不毫釐千里所載脈法雖不甚詳然大略已盡於此矣黃帝問曰診法何如岐伯對曰診法常以平旦陰氣未動陽氣未散飲食未進經脈未盛絡脈調勻氣血未亂故乃可診有過之脈切脈動靜而視精明察五色觀五臟有餘不足六腑強弱形之盛衰以此參伍決死生之分過謂異於常候也切謂以指切近於脈也按動注謂動而降卑降卑之義殊不可解平旦之時陽初用事人氣清明氣血未亂故可以審脈之得失平旦六句正言氣血之所以未亂也精明注作穴名誤矣蓋人一身之精神皆上注於目視精明者謂視目精之明暗而知人之精氣也觀下文夫精明者一段可見矣參伍謂較其多寡之數易曰參伍以變是也夫脈者血之府也府聚也言血之多少皆聚見於經脈之中也故刺志論曰脈實血實脈虛血虛此其常也反此者病由是故也長則氣治短則氣病數則煩心大則病進夫長為氣和故治短為不足故病數急為熱故煩心大為邪盛故病進也上盛則氣高下盛則氣脹代則氣衰細則氣少澀則心痛上謂寸口下謂尺中盛謂盛滿代脈者動而中止不能自還細脈者動如莠蓬澀脈者往來時不利而蹇澀也渾渾革至如湧泉病進而色弊綿綿其去如弦絶死渾渾言脈氣濁亂也革至者謂脈來弦而大實而長也如湧泉者言脈汩汩但出而不返也綿綿言微微似有而不甚應手也如弦絶者言脈卒斷如弦之絶去也若病日進面色弊惡如此之脈皆必死也按王注明確可遵新校正更引甲乙脈經非也夫精明五色者氣之華也按精明以目言五色以面言言目之光采精明面之五色各正乃元氣充足故精華髮見於外也赤欲如白裹朱不欲如赭白欲如鵝羽不欲如鹽青欲如蒼璧之澤不欲如藍黃欲如羅裹雄黃不欲黃土黑欲如重漆色不欲如地蒼按色貴潤澤而有神也此言五色夫精明者所以視萬物別白黑審短長以長為短以白為黑如是則精衰矣按精衰則目不精明此蓋解精明五臟者中之守也按腑為陽屬表臟為陰屬裡惟屬裡故曰中守者注云五神安守之所是矣中盛臟滿氣勝傷恐者聲如從室中言是中氣之濕也按聲如從室中言者謂氣閉而聲不外達也言而微終日乃復言者此奪氣也衣被不斂言語善惡不避親疏者此神明之亂也倉廩不藏者是門戶不要也要謂禁要水泉不止者是膀胱不藏也按惡謂詬詈元氣削奪則言語斷續神明昏亂則凡事錯妄此易明也若倉廩不藏世以責之脾胃而不知胃有病則不受脾有病則不運今非不能受不能運乃藏之不固其責在腎何則腎開竅於二陰腎虛則不能禁固即如水泉不止雖是膀胱不能收藏然其所以不能收藏者則皆腎虛氣不能攝之故也水熱穴論曰腎者胃之關也即門戶之義得守者生失守者死按神以臟藏臟以神守故生死因之而判焉夫五臟者身之強也臟安則神守神守則身強頭者精明之府頭傾視深精神將奪矣背者胸中之府背曲肩隨府將壞矣腰者腎之府轉搖不能腎將憊矣膝者筋之府屈伸不能行則僂附筋將憊矣骨者髓之府不能久立行則振掉骨將憊矣按此皆身之不強也傾側垂也視深眼胞內陷也隨謂與背俱曲也附別本作俯太素作跗俱非蓋身既傴僂不能獨行必倚附於物而行也振掉戰動也僂音樓不能仰伸也得強則生失強則死按常強則疾病不起一弱則疾病隨之有不可知者矣帝曰脈其四時動奈何知病之所在奈何知病之所變奈何知病乍在內奈何知病乍在外奈何請問此五者可得聞乎岐伯曰請言其與天運轉大也按天之轉運無窮五者之變化亦若是也萬物之外六合之內天地之變陰陽之應彼春之暖為夏之暑彼秋之忿為冬之怒四變之動脈與之上下六合謂四方上下也按春氣融和為暖夏氣酷烈為暑全元起以暖為緩非也注以忿為急解言秋氣徑急也良是秋氣徑急有似於忿冬氣肅殺則似於怒矣氣因時變脈則與之相應如是也以春應中規春脈耎弱而滑如規之象中外皆然故以春應中規夏應中矩夏脈洪大兼之滑數如矩之象可正平之故以夏應中矩也秋應中衡秋脈浮毛輕澀而散如稱衡之象高下必平故以秋應中衡冬應中權冬脈如石兼沉而滑如稱權之象下遠於衡故以冬應中權也按四時迭換脈象應之若規矩衡權之有不同也四字不得太泥是故冬至四十五日陽氣微上陰氣微下夏至四十五日陰氣微上陽氣微下陰陽有時與脈為期期而相失知脈所分分之有期故知死時察陰陽升降之准則知經脈遞遷之象審氣候遞遷之失則知氣血分合之期分期不差故知人死之時節微妙在脈不可不察察之有紀從陰陽始始之有經從五行生生之有度四時為宜按宜太素作數非是蓋脈與四時合宜則為無病之生脈也補瀉勿失與天地如一按言治法也是故陰盛則夢涉大水恐懼陽盛則夢大火燔灼陰陽俱盛則夢相殺毀傷上盛則夢飛下盛則夢墮甚飽則夢與甚飢則夢取肝氣盛則夢怒肺氣盛則夢哭短蟲多則夢聚衆長蟲多則夢相擊毀傷按新校正云詳是知陰盛則夢涉至夢哭乃靈樞之文誤置於此仍少心脾腎氣盛則夢今具甲乙經中短蟲多二句亦不當出此應他經脫簡文也是故持脈有道虛靜為寶前明脈應此舉持脈所由也然持脈之道必虛其心靜其志乃保定盈虛而不失按王本作保頗覺辭費甲乙作寶於義較通從之寶猶貴也春日浮如魚之遊在波雖出猶未全浮按亦有和緩之象夏日在膚泛泛乎萬物有餘泛泛平貌陽氣大盛脈氣亦象萬物之有餘易取而洪大也秋日下膚蟄蟲將去隨陽氣之漸降故曰下膚何以明陽氣之漸降蟄蟲將欲藏去故也冬日在骨蟄蟲周密君子居室在骨言脈深沉也蟄蟲周密言陽氣伏藏君子居室此人事也按新校正云詳此前對帝問脈其四時動之事心脈搏堅而長當病舌卷不能言搏謂搏擊於手也諸脈搏堅而長者皆為勞心而臟脈氣虛極也心手少陰脈從心系上挾咽喉故令舌卷短而不能言也按心脈堅長搏擊指下火盛氣浮舌為心苗故卷而不能言也注謂勞心而臟氣虛極恐堅長之脈不可概以虛斷也其耎而散者當消環自已諸脈耎散皆為氣實血虛也消謂消散環謂環周言其經氣如環之周當其火王自消散也按消環義殊不可解甲乙經作消渴王注作消散環周俱不明確缺疑可也耎音軟謹按心肺肝胃脾腎五臟一腑凡六經其脈並以搏堅而長耎而散分配病證王氏俱作虛解竊嘗疑之夫六經之脈為象不同主病自異奈何一概以堅長耎散立說經豈無意乎用是思之所謂搏堅而長者以邪實而言也其耎而散者以正虛而言也一經之內有實有虛脈病自各相應王注惟不明乎虛實之分宜其言之矇混不確也雖然六經之義亦有可議者即如心脈堅長搏擊指下是為火盛氣浮其證甚多豈止舌卷不能言凡此之類蓋亦約略言之或止舉其病之尤者言之未可據以為實也善讀內經者亦惟會其大意而已肺脈搏堅而長當病唾血按肺脈浮澀而短此其常也今反搏擊堅長是為火邪犯肺病必唾血唾血者痰涎之中見血也其耎而散者當病灌汗至令不復散發也按汗出於玄府玄府者肺之合今肺脈耎散是肺虛而邪從其合也故當灌汗灌汗者汗出浸淫有如澆灌如是不可更為發散令肺益虛也按新校正云詳下文諸臟各言色而心肺二臟不言者疑缺文也肝脈搏堅而長色不青當病墜若搏因血在脅下令人喘逆諸脈見本經之氣而色不應者皆非病從內生是外病來勝也肝厥陰脈布脅肋循喉嚨之後其支別者復從肝貫膈上注肺今血在脅下血氣上熏於肺故令人喘逆也按注解是矣惟解墜搏處尚缺明確今刪而補之青者肝色也肝內病則色必外見今脈病而色不見是病從外來墜與搏者外來之病也肝主兩脅而藏血墜若搏因而血逆於脅下矣血離經則敗而氣穢故上熏肺而喘逆也其耎而散色澤者當病溢飲溢飲者渴暴多飲而易入肌皮腸胃之外也面色浮澤是為中濕血虛中濕水液不消故言當病溢飲也水飲既滿故滲溢易而入肌皮腸胃之外也按注解易字義確甲乙經作溢非也胃脈搏堅而長其色赤當病折髀按胃脈宜緩今見堅長而搏擊是胃氣有餘其色赤是胃中有火宜見敦阜熱渴四肢熱痛等證而云當病折髀真不可解王注既不明確欲更求其義亦終不能闕疑可也髀股骨也其耎而散者當病食痹按痹注以為痛誤矣胃主受納胃脈耎散則虛而水穀為之壅閉矣故云食痹脾脈搏堅而長其色黃當病少氣按脾脈本宜平緩反見堅長而搏擊是失其和平之性而脾自病脾病則色外見故色黃脾胃者元氣之母也脾病則氣不運故少氣其耎而散色不澤者當病足胻腫若水狀也按澤潤澤水之氣也脾者土也制水者也脾脈耎散是虛不制水水反得而侮土矣然水若上行則潤澤之氣必見於顏面今乃不見是水病下行故云當病足胻腫若水狀也治此之法實土利水為要矣腎脈搏堅而長其色黃而赤者當病折腰色氣黃赤是心脾干腎腎受客傷故腰如折也腰為腎府故病發於中其耎而散者當病少血至令不復也按腎脈宜沉實今反耎散是精血內虧真元何由得復帝曰診得心脈而急此為何病病形何如岐伯曰病名心疝少腹當有形也帝曰何以言之岐伯曰心為牡臟小腸為之使故曰少腹當有形也諸脈徑急者皆為寒心為牡臟其氣應陽今脈反寒故為疝也按少腹注為小腸誤矣少腹臍下下半腹是也寒氣聚於中故有形心為陽中之太陽故為牡臟小腸其腑也故云為之使然心為牡臟二句伯對帝問似是發語之辭其所以當有形意全未說出故曰二字承接不上此處必有闕文王氏亦竟略過真缺憾也余特會其大意而補綴之曰心與小腸為表裡並屬火今寒邪犯心心為火臟寒無所容邪氣以從其合也寒欲犯心不得停留轉入小腸小腸部分外當少腹故少腹有形然病本原於心故曰心疝也帝曰診得胃脈病形何如岐伯曰胃脈實則脹虛則泄脈實者氣有餘故脹滿脈虛者氣不足故泄利按新校正云詳此對前帝問知病之所在帝曰病成而變何謂岐伯曰風成為寒熱按風邪中人必為寒熱疸成為消中疸謂濕熱也積熱於內故變為消中也按新校正云詳王注以善食而瘦為消中按本經多食而數溲為消中善食而瘦乃是食㑊之證當云善食而溲數厥成為巔疾厥謂氣逆也氣逆上而不已則變為上巔之疾也久風為飧泄肝氣內合而乘脾故為是病焉按風者木之化久風不去則木盛凌脾故為飧泄夕食為飧飧泄者夜泄利也脈風成為癘風論曰風寒客於脈而不去名曰癘風又曰癘者有榮氣熱附其氣不清故使其鼻柱壞而色敗皮膚瘍潰然此則癩也按癘原讀作癩病之變化不可勝數按新校正云詳此前對帝問知病之所變奈何帝曰諸癰腫筋攣骨痛此皆安生岐伯曰此寒氣之腫八風之變也八風八方之風也帝曰治之奈何岐伯曰此四時之病以其勝治之愈也勝謂勝克如金勝木木勝土之類帝曰有故病五臟發動因傷脈色各何以知其久暴至之病乎岐伯對曰悉乎哉問也徵其脈小色不奪者新病也氣乏而神猶強也徵其脈不奪其色奪者此久病也神持而邪凌其氣也徵其脈與五色俱奪者此久病也神與氣俱衰也徵其脈與五色俱不奪者此新病也神與氣俱強也尺內兩旁則季脅也尺內謂尺澤之內也兩旁各謂尺之外側也季脅近腎尺主之故尺內兩旁則季脅也尺外以候腎尺裡以候腹中按尺外注謂尺之外側尺裡注謂尺之內側是與上言兩旁無異誤矣蓋兩旁以橫開言外里以上下直接處言此兼左右兩手也附上左外以候肝內以候膈右外以候胃內以候脾按此舉兩關而言也關雖居中然亦有內外焉內者關之上半部外者關之下半部關上聯寸故云附上附上附寸也上附上右外以候肺內以候胸中左外以候心內以候膻中按此舉兩寸而言也寸位本上上聯魚際故云上附上然前言關脈以上半部為內下半部為外而寸脈則反是者蓋合三部而論關居中間為內尺寸居兩頭為外也靈蘭祕典論曰膻中者臣使之官喜樂出焉注云位在兩乳間是也此注云是嗌誤矣前以候前後以候後按王注分上前為左寸口下前為胸之前膺及氣海上後為右寸口下後為胸之後背及氣管其言怪誕不經余謂此與下二段皆總上三節寸關尺而言此言前後者以三部言寸為前尺為後診寸以候心肺之疾診尺以候兩腎之疾也以一部言上半部為前下半部為後如診右外候肺內候胸中左外候心內候膻中之類是也此以脈之部分診臟腑之疾病就內而言蓋脈有三部部各有前後故云前後也下節言脈之上下而分配胸喉腰足者是以脈診一身之疾病就外而言故云竟上竟下也上竟上者胸喉中事也下竟下者少腹腰股膝脛足中事也上竟上至魚際也下竟下謂盡尺之脈動處也按此節總論一身而止言上下要之胸喉以下少腹以上中部所主之事在不言中矣注但順文平釋全未發明粗大者陰不足陽有餘為熱中也粗大謂脈洪大也脈洪為熱故云熱中按粗大者浮大有力之脈是為實火不但熱浮於外而已故謂之熱中來疾去徐上實下虛為厥巔疾來徐去疾上虛下實謂惡風也故中惡風者陽氣受也按疾急數也徐緩弱也脈之至曰來回曰去來主上去主下實者邪氣實也虛者正氣虛也邪實於上故病逆於頂巔氣虛於上故風邪易入而為惡風之病然風之得以中人者非真風之惡也陽虛不能捍邪故也有脈俱沉細數者少陰厥也尺中有脈沉細數者是腎少陰氣逆也尺脈不當見數有數故言厥也俱沉細數者言左右尺中也按沉細而緩腎之平脈也數則為火今沉細兼數是陰虛水虧而火上逆名曰少陰厥厥逆而上也所謂陰虛火動是矣沉細數散者寒熱也按沉細為陰數散為陽陰陽相雜故其為病或寒或熱也浮而散者為眴僕脈浮為虛散為不足氣虛而血不足故為頭眩而仆倒也按眴音瞬諸浮不躁者皆在陽則為熱其有躁者在手言大法也陽為水氣故為熱諸細而沉者皆在陰則為骨痛其有靜者在足陰主骨故骨痛按浮為陽為熱沉細為陰為骨痛此易明也其有躁者在手靜者在足二句注作手陽脈足陰脈解未確其中必有脫誤闕疑可也數動一代者病在陽之脈也泄及便膿血代止也按凡血必隨氣而行代則氣斷續而血內壅血內壅則小大二便皆見膿血矣諸過者切之澀者陽氣有餘也滑者陰氣有餘也陽有餘則血少故脈澀陰有餘則血多故脈滑也陽氣有餘為身熱無汗陰氣有餘為多汗身寒陰陽有餘則無汗而寒按身熱無汗者火盛而氣閉外感傷寒陽分病也多汗身寒者氣虛自汗治宜溫補者也陽盛無汗陰盛身寒治宜溫散仲景之用附子細辛湯是也證治之妙可即是而推矣推而外之內而不外有心腹積也按浮按不見沉著於內心腹之間必有蓄積推而內之外而不內身有熱也按重按不見脈浮於外邪熱在表也推而上之下而不上腰足清也推而下之上而不下頭項痛也按上謂寸下謂尺也寸主頭項尺主腰足是故上推之而病脈見於下是下部虛寒下推之而病脈見於上為火升頭項知脈之升降浮沉則知病之所在而可以施治矣王本推而上之上而不下推而下之下而不上誤矣按甲乙經推而上之作下而不上推而下之作上而不下是也今改從之按之至骨脈氣少者腰脊痛而身有痹也陰氣大過故爾按重按之而脈微欲絶者是為陽虛無氣命門火衰在腰脊則陰寒而痛在身中必有不知痛癢處也平人氣象論平人無病之人也脈有常道反常則病有病無病氣象自是不同也黃帝問曰平人何如岐伯對曰人一呼脈再動一吸脈亦再動呼吸定息脈五動閏以太息命曰平人平人者不病也常以不病調病人醫不病故為病人平息以調之為法經脈一周於身凡長十六丈二尺呼吸脈各再動定息脈又一動則五動也計二百七十定息氣可環周然盡五十營以一萬三千五百定息則氣都行八百一十丈如是則應天常度脈氣無不及太過氣象平調故曰平人也按人身之脈與天合度是故推演其數為千為萬為尺為丈理自不誣然欲以之治病則未免迂闊不若就文詮釋之為真切也再動者脈二至一呼一吸脈各再動是脈四至也呼吸定息脈五動者謂呼吸之間氣稍一停脈又一至是共五動也閏以太息者天地之氣積余而成閏故閏者氣之餘也太息者息之半謂脈既五動而復有餘氣氤氳於指下所謂脈有神者也如是則謂無病不如是則病而醫可以施治矣人一呼脈一動一吸脈一動曰少氣呼吸脈各一動准候減平人之半按脈者氣血之精華氣弱血虛則脈來不及曰少氣而少血在不言中矣人一呼脈三動一吸脈三動而躁尺熱曰病溫尺不熱脈滑曰病風脈澀曰痹呼吸脈各三動准過平人之半尺者陰分位也寸者陽分位也然陰陽俱熱是則為溫陽獨躁盛則風中陽也滑為陽盛故病為風澀為無血故為𤸷痹也躁謂煩躁按呼吸脈各三動是六至之數脈也躁則數之極矣尺謂尺澤膚也注作尺寸誤矣言脈既有六至之數躁而尺內皮膚又且焦熱為溫熱之病無疑若尺膚不熱其脈但數而滑是火因風熾為病起於風若尺膚不熱脈亦不滑惟數而澀者是火盛燥血其病為痹而不仁也滑澀俱根數躁言脈澀又根尺不熱言經文明說脈是脈尺是尺但讀語氣自見啓玄何不之察耶人一呼脈四動以上曰死脈絶不至曰死乍疏乍數曰死呼吸脈各四動准候過平人之倍計二百七十息氣行三十二丈四尺況其以上耶脈法曰脈四至曰脫精五至曰死然四至以上亦近五至也故死矣然脈絶不至天真之氣已無乍疏乍數胃谷之精亦敗皆死之候平人之常氣稟於胃胃者平人之常氣也常平之氣胃氣致之靈樞經曰胃為水穀之海也人無胃氣曰逆逆者死按人非飲食則不生故也春胃微弦曰平按弦者肝脈肝屬木旺於春微弦者弦而緩肝之平脈是曰春胃也所以然者胃脈緩也後同弦多胃少曰肝病按弦多則急而不緩故病見也但弦無胃曰死按純乎徑急絶無和緩之氣是真臟見也焉得不死胃而有毛曰秋病毛秋脈金氣也按春脈見毛木受金刑雖有胃氣至金王時亦必病矣毛甚曰今病按若金邪王極其病即發木不能勝故也臟真散於肝肝藏筋膜之氣也按臟真解注不明確夫五臟既以胃氣為本是胃者五臟之真氣也故曰臟真無病之人胃本和平其氣隨五臟而轉是故入於肝則遂其散發之機於是肝得和平之氣以養其筋膜而無徑急之患若以五臟之脈為臟真是但弦但鉤等為已當死又何能藏筋藏血且亦是真臟而非臟真也況於散通濡高下五字之義竟無著落夏胃微鉤曰平鉤多胃少曰心病但鉤無胃曰死胃而有石曰冬病按夏火畏水故至水王之時則病也石甚曰今病按若水邪極盛其病即發臟真通於心心藏血脈之氣也按其在於心也心為五臟主無所不通心得和平之氣包藏血脈而無壅閉之患也長夏胃微軟弱曰平弱多胃少曰脾病按脾胃尤貴和平故太強病太弱亦病微軟弱者雖弱而無太過之患若過弱則健運失職而脾病但代無胃曰死按春弦夏洪秋毛冬石四時迭換是相代也而土則分王於四季故弦洪毛石脈各帶緩為有胃氣若反是則名但代無胃之脈為必死也軟弱有石曰冬病按凡人之病多見於其所不勝故肝心二臟皆病於毛石而脾肺腎反病於其所勝者何也五臟之氣無常也盛則足以抗所不勝衰則見侮於所勝如脾者土也土之所不勝者木所勝者水乃木不盛而水盛故脈來見石也石者冬脈水之氣也水本畏土今脾弱土虛而水無所畏至於冬則水愈王而脾病若水邪王極土不能制且不必至冬而即病矣是故下文曰石甚則今病也或曰同一五臟也肝心見制於所不勝獨不見侮於所勝脾肺腎見侮於所勝獨不見制於所不勝乎曰見制於所不勝者常也見侮於所勝者變也天地之理有常必有變岐伯欲並著其理而偶以肝心當其常脾肺腎盡其變耳讀者幸毋拘文牽義可也知土之見侮於水則知金水之見侮於木火可類推矣石甚曰今病按王本作弱甚於義不合甲乙經作石甚是也從之臟真濡於脾脾藏肌肉之氣也按脾乃濕土內運水穀外養肌肉和緩之氣本根於脾如上無所制下無所侮脾自濡潤而一身之氣皆其所養矣秋胃微毛曰平毛多胃少曰肺病但毛無胃曰死毛而有弦曰春病弦甚曰今病臟真高於肺以行榮衛陰陽也肺處上焦故臟真高也以其自肺宣布故云以行榮衛陰陽也冬胃微石曰平石多胃少曰腎病但石無胃曰死石而有鉤曰夏病鉤甚曰今病臟真下於腎腎藏骨髓之氣也腎主下焦故云臟真下也按腎為五臟之根位處於下腎苟無病則和緩之氣兩腎相通腎主骨骨藏髓其本根固則精自生而形自盛也胃之大絡名曰虛里貫膈絡肺出於左乳下其動應衣脈宗氣也宗尊也主也謂十二經脈之尊主也按胃之大絡所以謂十二經脈之宗者胃為水穀之海人借之以有生氣血因之以長養故也欲知寸口太過與不及寸口之脈中手短者曰頭痛寸口脈中手長者曰足脛痛短為陽氣不及故病於頭長為陰氣太過故病於足按中手謂按之而應手也寸口脈中手促上擊者曰肩背痛按促上擊者洪大急數之脈也陽盛火熾之候人身以背為陽陽火太過故肩背痛也寸口脈沉而堅者曰病在中寸口脈浮而盛者曰病在外沉堅為陰故病在中浮盛為陽故病在外也寸口脈沉而橫曰脅下有積腹中有橫積痛亦陰氣內結也按脈道本直其有不直而橫者乃有積塊伏匿於其內脈雖但言橫而有力可知也仲景云積者臟病也終不移聚者腑病也發作有時展轉痛移為可治諸積大法脈來細而附骨者積也寸口積在胸中微出寸口積在喉中關上積在臍旁上關上積在心下微下關積在少腹尺中積在氣衝脈出左積在左脈出右積在右脈兩出積在中央各以其部處之寸口脈沉而喘曰寒熱喘為陽吸沉為陰爭爭吸相搏故寒熱也按呼吸頻促謂之喘脈亦何以喘名也喘者脈來急數如氣之喘促也寒熱者或寒先而熱後或寒往而熱來也沉為寒數為熱也脈盛滑堅者曰病在外脈小實而堅者病在內盛滑為陽小實為陰陰病在內陽病在外也脈小弱以澀謂之久病脈滑浮而疾者謂之新病小為氣虛澀為無血血氣虛弱故云久遠之病也滑浮為陽足脈疾為氣全陽足氣全故云新淺之病也脈急者曰疝瘕少腹痛按疝為寒凝瘕為氣積寒氣凝積少腹必痛也何者寒則脈急也脈滑曰風脈澀曰痹滑為陽陽受病則為風澀為陰陰受病則為痹緩而滑曰熱中盛而緊曰脹緩謂縱緩之狀非動之遲緩也陽盛於中故脈滑緩寒氣痞滿故脈盛緊也脈從陰陽病易已脈逆陰陽病難已脈得四時之順曰病無他脈反四時及不間臟曰難已按從逆以脈病相應相反言反四時注謂春得秋夏得冬秋得夏冬得四季脈皆謂反四時是也不間臟句惜未有解如木病而火不病病止於肝猶易也若肝病而心亦病是母子俱病其病最難是為不間臟也張景嶽謂是傳其所勝夫傳所勝是鬼賊相刑為已當死豈止難已而已間去聲臂多青脈曰脫血按肝木也其色青主筋而藏血臂之於身猶木之枝也肝血內空其色外見青脈青筋也尺脈緩澀謂之解㑊尺謂陰部腹腎主之緩謂熱中澀為無血熱而無血故解㑊並不可名之然寒不寒熱不熱弱不弱壯不壯亦不可名之謂之解㑊也按解㑊二字他書並無惟素問五見王注殊為可疑乃歷代高賢卒未有辨其非者注言尺為陰部腹腎主之澀為無血皆是也至以緩為熱中則非矣按緩之解有二一為和緩所謂脈有胃氣是也一為緩弱元氣虧損脈來不及者是也由是觀之澀為血少緩為氣虛無疑矣脈之三部雖各有所重然常以尺為根本故尺緩而澀是知氣虛血少根本已虧解當作懈謂懈弛無力也㑊字從人從亦言氣血俱虛形骸徒具亦人而已注以解㑊為不可名狀之病世豈有腎脈緩澀而其病即奇怪若此者恐無是理也安臥脈盛謂之脫血盛謂數急而大鼓也按脈盛者其邪必盛邪盛則臥必不安今反安臥是知非陽邪盛強易明也蓋人日動而行夜靜而臥臥而安其氣靜矣脈為血之府脈急而數其血動矣故安臥脈盛必脫血也要之脫血之後其臥亦必不安血脫陰虛故也尺澀脈滑謂之多汗謂尺膚澀而尺脈滑也膚澀者謂榮血內涸脈滑謂陽氣內余血涸而陽氣尚餘多汗而脈乃如是也尺寒脈細謂之後泄尺主下焦診應腸腹故膚寒脈細泄利乃然按胃主禁固二便腎虛而寒則泄利所謂腎泄是也今人但見泄利便用參朮反補其陽泄利轉甚殊可嘆也脈尺粗常熱者謂之熱中按脈尺粗大尺膚燥熱為陰虛陽盛故令發熱於內也肝見庚辛死庚辛為金伐肝木也心見壬癸死壬癸為水滅心火也脾見甲乙死甲乙為木克脾土也肺見丙丁死丙丁為火鑠肺金也腎見戊己死戊己為土刑腎水也是謂真臟見皆死按此死於其所不勝也亦謂之真臟不獨但代無胃之謂真臟也頸脈動喘疾咳曰水按所以然者水入於肺則喘而咳喘而咳則氣上逆故頸脈動也目里微腫如臥蠶起之狀曰水評熱病論曰水者陰也目下亦陰也腹者至陰之所居也故水在腹中必使目下腫也溺黃赤安臥者黃疸腎勞胞熱故溺黃赤也正理論曰謂之勞疸以女勞得之也已食如飢者胃疸是則胃熱也熱則消穀故食已如飢也目黃者曰黃疸陽怫於上熱積胸中陽氣上燔故目黃也面腫曰風按頭為諸陽之首而面尤為陽中之陽陰邪不能入惟陽邪得而客之故而腫曰風風者陽邪也足脛腫曰水按地之濕氣自下受之足為下部主陰而水又為陰邪故水入下部則足脛腫也按王本目黃者曰黃疸原在此下因文義倒置故移在面腫曰風之上婦人手少陰脈動甚者妊子也按全元起本作足手陰而此雲手少陰於義皆通蓋手少陰心也足少陰腎也腎主精心主血精血交合乃能有子故少陰動甚為妊子之脈動謂滑數也人以水穀為本故人絶水穀則死脈無胃氣亦死所謂無胃氣者但得真臟脈不得胃氣也所謂脈不得胃氣者肝不弦腎不石也按胃藏水穀所以為十二經脈之長見其所繫至重也脈無胃氣是為真臟見宜云肝但弦腎但石而此反云不弦不石且止說肝腎而不及心肺脾何也凡脈和緩名為有胃氣故弦石而緩乃得謂之弦石若但弦石而無和緩之氣則是真臟而並不得謂之弦石矣故云不弦不石言弦石而鉤毛代在其中蓋省文也太陽脈至洪大以長氣盛故能爾按呂廣曰太陽王五月六月其氣大盛故也少陽脈至乍數乍疏乍短乍長以氣有暢未暢者也按呂廣云少陽王正月二月其氣尚微故其脈來進退無常陽明脈至浮大而短穀氣盛滿故也按呂廣云陽明脈王三月四月其氣始萌未盛故爾按新校正云詳無三陰脈應古闕文也難經云太陰之至緊大而長少陰之至緊細而微厥陰之至沉短以敦夫平心脈來纍纍如連珠如循琅玕曰心平按連珠言其至之相續無間且如玉之潤澤也琅玕玉之光潤者注言珠類誤矣夏以胃氣為本按萬物生於土人養於胃故四季各有土而人無胃氣則死也病心脈來喘喘連屬其中微曲曰心病死心脈來前曲後居如操帶鉤曰心死居不動也操執持也鉤謂革帶之鉤按凡病死之脈體狀頗不相符觀者得其大意而已平肺脈來厭厭聶聶如落榆莢曰肺平浮薄而虛者也秋以胃氣為本病肺脈來不上不下如循雞羽曰肺病謂中央堅而兩旁虛死肺脈來如物之浮如風吹毛曰肺死按肺脈固屬輕虛然過於浮薄則死如物之浮如風吹毛輕浮無根之象也平肝脈來軟弱招招如揭長竿末梢曰肝平如竿末梢言長軟也春以胃氣為本病肝脈來盈實而滑如循長竿曰肝病長而不軟故若循竿死肝脈來急益徑如新張弓弦曰肝死徑謂徑強急之甚也平脾脈來和柔相離如雞踐地曰脾平按脾脈尤貴平緩脈緩而平是謂和柔而不近於弱若雞之緩行而不急走也長夏以胃氣為本按長夏夏季十八日也土分王於四季而夏季獨尊之為長者以夏火生土而土尤王故也土王於長夏而胃本屬土人不再食則飢飢至七日則死是故長夏雖當土王之時亦以胃氣為本也病脾脈來實而盈數如雞舉足曰脾病按脾宜安靜故動則為病如雞舉足狀其動之急死脾脈來鋭堅如鳥之喙如鳥之距如屋之漏如水之流曰脾死喙距言鋭堅也水流屋漏言其至也水流謂平至不鼓屋漏謂時動覆住按羽屬之足皆曰距雞距動稍急故病鳥距動尤速故死也平腎脈來喘喘纍纍如鉤按之而堅曰腎平按越人云其來上大下兌濡滑如雀之喙曰平呂廣曰上大者足太陽下兌者足少陰陰陽得所為胃氣強故謂之平雀喙者本大而未兌也按此但言腎之平脈如是非解經文也喘纍如鉤等義原不可解闕疑可也冬以胃氣為本病腎脈來如引葛按之益堅曰腎病按引葛義亦不可解死腎脈來發如奪索辟辟如彈石曰腎死辟辟如彈石言促且堅也按腎宜沉斂奪索者解散之意冬脈雖宜如石然彈石則搏擊應手而無和緩之氣矣玉機真臟論此言五臟脈法證治之大要也篇中精義凡八段首段言五臟脈病而論脾為孤臟其義甚微第二段言五臟受傳之次所謂死於其所不勝也三段言衆病皆始於風以次傳入變化無窮四段言真臟死期有遠近之不同五段言真臟脈之形象六段言真臟所以獨見之故為篇中之要義七段言診視之法末段言五實五虛死中求活之妙逐節不同如此而名篇之意單揭真臟蓋真臟之脈以別死生醫家要務玉機云者即金匱名篇之意皆珍重之辭也黃帝問曰春脈如弦何如而弦岐伯對曰春脈者肝也東方木也萬物之所以始生也故其氣來軟弱輕虛而滑端直以長故曰弦反此者病按越人云萬物始生未有枝葉故其脈來濡弱而長蓋惟長則為弦惟濡弱則弦而緩弦緩故無病反此則病矣後俱仿此帝曰何如而反岐伯曰其氣來實而強此謂太過病在外其氣來不實而微此謂不及病在中氣余則病在於外氣少則病在於中也按呂廣云實強者陽氣盛也少陽當微弱今更實強謂之太過陽處表故令病在外厥陰之氣養於筋其脈弦今更虛微故曰不及陰處中故令病在內也帝曰春脈太過與不及其病皆何如岐伯曰太過則令人善忘忽忽眩冒而巔疾其不及則令人胸痛引背下則兩脅胠滿帝曰善忽忽不爽也眩謂目眩視如轉也胠謂腋下脅也忘當為怒字之誤也按舊本作忘注云是怒今從之蓋肝主怒故肝盛則善怒肝屬木而主風故眩冒肝脈上出額與督脈會於巔故巔疾肝脈布脅故脅胠滿肝虛亦滿凡滿不可即以為實也胠音區夏脈如鉤何如而鉤岐伯曰夏脈者心也南方火也萬物之所以盛長也故其氣來盛去衰故曰鉤反此者病按越人云夏脈鉤者南方火也萬物之所盛垂枝布葉皆下曲如鉤故其脈來疾去遲夫鉤之為象乃夏之平脈經以盛衰為解則似有病之脈越人以疾遲注之理不誣矣然越人止言盛經則言盛長蓋盛則自無不長也帝曰何如而反岐伯曰其氣來盛去亦盛此謂太過病在外來盛去亦盛是陽之盛也心氣有餘是為太過其氣來不盛去反盛此謂不及病在中按新校正云詳越人肝心肺腎四臟脈俱以實強為太過虛微為不及與素問不同帝曰夏脈太過與不及其病皆何如岐伯曰太過則令人身熱而膚痛為浸淫其不及則令人煩心上見咳唾下為氣泄帝曰善按心為牡臟而主火故太過則火盛而為病矣身熱膚痛者火外灼也浸淫者汗也火逼肺而為汗也心虛則火動而煩火動則上炎於肺而咳下入大腸轉魄門而為屁矣然此本言心而何以病必及於肺蓋火病則無所制而亂動以刑金也秋脈如浮何如而浮岐伯曰秋脈者肺也西方金也萬物之所以收成也故其氣來輕虛以浮來急去散故曰浮反此者病按越人云秋脈毛者西方金也萬物之所終草木華葉皆秋而落其枝獨在若毫毛也故其脈來輕虛以浮故曰毛蓋物之輕者莫如毛而秋脈輕浮故以名也然秋脈之所以輕浮者以秋當溽暑之後去濁而清唯清故輕唯輕故浮秋脈或言毛此又言浮同一理也帝曰何如而反岐伯曰其氣來毛而中央堅兩旁虛此謂太過病在外其氣來毛而微此謂不及病在中帝曰秋脈太過與不及其病皆何如岐伯曰太過則令人逆氣而背痛慍慍然其不及則令人喘呼吸少氣而咳上氣見血下聞病音帝曰善按旁虛中堅內實之象故為太過肺氣內實必挾邪有火故上逆而背痛背為陽氣盛則並於陽慍慍者氣凝滯而不散也肺虛則氣浮散而急促故為喘為咳肺虛亦喘咳世盡以實治者非也見血者氣浮血動也病音注亦作喘息誤矣蓋氣下泄而多屁故云下聞也冬脈如營何如而營岐伯曰冬脈者腎也北方水也萬物之所以合藏也故其氣來沉以濡故曰營反此者病按王本作沉以搏甲乙經搏當作濡濡古軟字乃冬之平調脈若沉而搏擊於手則冬脈之太過也今改從之又別篇腎脈並言石而此言營蓋兵之駐處曰營又經營營謀皆取固密之義亦石之意也帝曰何如而反岐伯曰其氣來如彈石者此謂太過病在外其去如數者此謂不及病在中按腎脈宜石而彈石則擊指矣腎脈沉細而緩乃為平脈如數則陰虛矣帝曰冬脈太過與不及其病皆何如岐伯曰太過則令人解㑊脊脈痛而少氣不欲言其不及則令人心懸如病飢䏚中清脊中痛少腹滿小便變帝曰善按解㑊解已辨於前但太過之脈病宜有餘而此見證並屬不足此何以故丹溪云陰常不足蓋人自有生以後火日動水日虧其所謂太過者不過脈象之搏擊正屬水虧火動非真腎氣有餘故脈似太過而證皆不足也如病飢者水不制火也䏚中清者腎虛故寒也少腹滿者腎氣溢而不藏也小便變者溺色黃赤水涸則濁世盡以為熱而治之以寒涼者非也帝曰四時之序逆從之變異也然脾脈獨何主岐伯曰脾脈者土也孤臟以灌四旁者也納水穀化津液溉灌於心肝肺腎也以不正主四時故謂之孤臟按四臟偏守一隅脾則居中四應不主四時乃為四時之所宗帝曰然則脾善惡可得見之乎岐伯曰善者不可得見惡者可見按土王四季隨時而轉其無病也平平而已一有所苦則形於脈而證見焉帝曰惡者何如可見岐伯曰其來如水之流者此謂太過病在外如鳥之喙者此謂不及病在中按脾脈太過比之水流當是浮洪脈也鳥喙謂脾死脈而止云不及觀者得其大意而已帝曰夫子言脾為孤臟中央土以灌四旁其太過與不及其病皆何如岐伯曰太過則令人四肢不舉按脾屬土而主四肢濕勝則凝重而不可舉脾雖濕土常惡濕也其不及則令人九竅不通名曰重強脾為孤臟以灌四旁今病則五臟不和故九竅不通也八十一難曰五臟不和則九竅不通重謂臟氣重迭強謂氣不和順五臟受氣於其所生傳之於其所勝氣舍於其所生死於其所不勝此言氣之逆行也故死所謂逆者次如下說肝受氣於心傳之於脾氣舍於腎至肺而死心受氣於脾傳之於肺氣舍於肝至腎而死脾受氣於肺傳之於腎氣舍於心至肝而死肺受氣於腎傳之於肝氣舍於脾至心而死腎受氣於肝傳之於心氣舍於肺至脾而死此皆逆死也一日一夜五分之此所以占死者之早暮也朝主甲乙晝主丙丁四季土主戊己晡主庚辛夜主壬癸由此則死生之早暮可知也按此五行生剋之定例也王本云死生之早暮甲乙經云占死者之早暮詳經文正言逆行死期當以甲乙為是從之是故風者百病之長也按生氣通天論風者百病之始言百病皆起於風此云百病之長言諸邪以風為最也其文雖殊其義則同今風寒客於人使人毫毛畢直皮膚閉而為熱當是之時可汗而發也按陰陽應象大論曰善治者治皮毛此之謂也或痹不仁腫痛當是之時可湯尉及火灸刺而去之熱中血氣則𤸷痹不仁寒氣傷形故為腫痛弗治病入舍於肺名曰肺痹發咳上氣按宣明五氣論曰邪入於陽則狂邪入於陰則痹肺在變動為咳咳則氣上故上氣也弗治肺即傳而行之肝病名曰肝痹一名曰厥脅痛出食肺金伐木氣下入肝故曰勿治行之肝也肝氣通膽膽善為怒怒者氣逆故一名厥也肝脈布脅故脅痛按出食注解不明蓋邪入於肝則肝木盛而凌胃故吐也當是之時可按若刺耳弗治肝傳之脾病名曰脾風發疸腹中熱煩心出黃肝應風木勝脾土土受風氣故曰脾風蓋為風氣通肝而為名也脾之為病善發黃疸故發疸也脾支別脈上膈注心故腹中熱而煩心出黃色於便瀉之中也按出黃注單指便瀉偏矣蓋黃為脾色脾病則色見於外凡身面發黃皆是也當此之時可按可藥可浴弗治脾傳之腎病名曰疝瘕少腹冤熱而痛出白一名曰蠱按邪氣入腎聚而成形故為疝瘕腎之腑膀胱也膀胱當少腹熱結膀胱氣不得出若冤抑者然故曰少腹冤熱而痛惟熱在膀胱故又溺出白液也一名曰蠱注言冤熱內結消鑠脂肉如蟲之食日內損削故名曰蠱是也當此之時可按可藥弗治腎傳之心病筋脈相引而急病名曰瘛腎不足則水不生水不生則筋燥急故相引也陰氣內弱陽氣外燔筋脈受熱而自跳掣故名曰瘛按瘛音熾筋抽掣也當此之時可灸可藥勿治滿十日法當死至心而氣極則如是矣若復傳行當如下說腎因傳之心心即復反傳而行之肺發寒熱法當三歲死反傳於肺金肺已再傷故寒熱也三歲者肺至腎一歲腎至肝一歲肝至心一歲火又乘肺故云三歲死此病之次也然其卒發者不必治於傳按以勝相傳則有次第之可數若夫猝然而起或暴感外邪或真元脫竭病雖有因實非傳來如傷寒之直中中風之眩僕雜病厥逆之類但當考其致病之由不必泥於相傳之次論治也或其傳化有不以次不以次入者憂恐悲喜怒令不得以其次故令人有大病矣憂恐悲喜怒發無常分觸遇則發故令病氣亦不次而生按此正解病之卒發者五志之傷蓄久忽發初非循序而來也故病不以次然猝發之病頗多而經但以五志為言者蓋以人之為病苟非本於七情內傷雖危不死也因而喜大虛則腎氣乘矣按喜者心之志過喜則心氣虛心虛則火弱而水邪乘心矣怒則肝氣乘矣按怒者肝之志盛怒則肝氣強急必有乘脾之患矣悲則肺氣乘矣按悲者肝之志悲則金氣急切必有伐木之患矣恐則脾氣乘矣按恐者腎之志恐極則腎弱腎弱則水虛而土來制水矣憂則心氣乘矣按肺之志又為憂過憂則肺傷肺傷則金弱而火將乘之矣此五者蓋言卒發為病也然細觀五者又是不同精氣並而獨盛因而乘其所勝者肝與肺也過勞其氣以致虛極因而見乘於其所不勝者心與腎與肺也注俱矇混不確學者所當詳審而分別之也此其道也故病有五五五二十五變及其傳化傳乘之名也五臟相併而各五之五而乘之則二十五變也然其變化以勝相傳傳而不次變化多端按以上臨下以強凌弱曰乘邪之傳也正謂乘其所勝而侮之以其勢足相乘而後傳之也大骨枯槁大肉陷下胸中氣滿喘息不便其氣動形期六月死真臟脈見乃豫之期日此肺之臟也大骨枯槁大肉陷下胸中氣滿喘息不便內痛引肩項期一月死真臟見乃豫之期日此心之臟也大骨枯槁大肉陷下胸中氣滿喘息不便內痛引肩項身熱脫肉破䐃真臟見十月之內死䐃者肉之標脾主肉故肉如脫盡䐃如破敗此脾之臟也大骨枯槁大肉陷下肩髓內消動作益衰真臟未見期一歲死見其真臟乃豫之期日肩髓內消謂缺盆深也衰於動作謂交接漸微此腎之臟也按王本來見全元起及甲乙經俱作未見於義較確今從之大骨枯槁大肉陷下胸中氣滿腹內痛心中不便肩項身熱破䐃脫肉目匡陷真臟見目不見人立死其見人者至其所不勝之時則死肝主目故目匡陷及不見人立死也不勝之時謂於庚辛之月此肝之臟也急虛身中卒至五臟絶閉脈道不通氣不往來譬於墮溺不可為期按人之所恃以生者惟此一息之氣耳氣治則安氣乖則病倘或元氣虧竭病起倉猝眩僕厥絶不省人事此蓋由於五臟之氣敗絶無餘故九竅閉塞而脈亦為之壅閉也脈既不通氣自不行而死矣此等最為猝暴猶如墮溺之死出於意外也其脈絶不來若人一呼五六至其形肉雖不脫真臟雖不見猶死也按脈絶不來者無脈者也一呼五六至者數極者也無脈則真氣絶數極則本根脫二者之象亦猶卒至之類無不立死固無俟於形肉真臟等候為驗也注謂即是急虛卒至之脈誤矣王本一息按新校正云人一息脈五六至何得為死息當為呼是也今從之真肝脈至中外急如循刀刃責責然如按琴瑟弦色青白不澤毛折乃死真心脈至堅而搏如循薏苡子纍纍然色赤黑不澤毛折乃死真肺脈至大而虛如以羽毛中人膚色白赤不澤毛折乃死真腎脈至搏而絶如指彈石辟辟然色黑黃不澤毛折乃死真脾脈至弱而乍數乍疏色黃青不澤毛折乃死諸真臟脈見者皆死不治也按楊上善云無餘物和雜故名真也五臟之氣皆胃氣和之不得獨用如至剛不得獨用獨用則折和柔用之即固也如弦是肝脈微弦為平和所謂微弦者謂二分胃氣一分弦氣也若三分並是弦而無胃氣為真臟見也余准此楊說是矣但以分數為喻未免支離所謂胃氣者和緩也弦而和緩便是有胃氣若純是弦急是名真臟也帝曰見真臟曰死何也岐伯曰五臟者皆稟氣於胃胃者五臟之本也胃為水穀之海故五臟稟焉臟氣者不能自致於手太陰必因於胃氣乃至於手太陰也按手太陰者手太淵寸關尺也人非水穀不生活故五臟必資胃氣以為養水穀之氣行而後五臟之得失變見於寸口矣甲乙經曰人以胃氣為本脈亦以胃氣為本是也故五臟各以其時自為而至於手太陰也按五臟分主四時苟得胃氣則合於時而順脈見苟失胃氣則逆於時而死脈出也故邪氣勝者精氣衰也故病甚者胃氣不能與之俱至於手太陰故真臟之氣獨見獨見者病勝臟也故曰死帝曰善按邪氣勝故病甚病甚則水穀不入於胃而脈自無和緩之氣於是賊邪之形獨見而為但代矣帝曰凡治病察其形氣色澤脈之盛衰病之新故乃治之無後其時必欲先時而取之形氣相得謂之可治氣盛形盛氣虛形虛是相得也色澤以浮謂之易已氣色浮潤氣血相營故易已脈弱以滑是有胃氣命曰易治取之以時候可取之時而取之則萬舉萬全按此弱滑二字是好字面弱者無強急之形滑者無枯澀之意也脈實以堅謂之益甚按實堅者強硬而無柔和之氣也純陽無陰其病必日進矣脈逆四時謂不可治所謂逆四時者春夏而脈沉澀秋冬而脈浮大命曰逆四時也按此言脈與時反也病熱脈靜泄而脈大脫血而脈實病在中脈實堅病在外脈不實堅者皆難治按此言脈與證相反也但病在中二句與平人氣象論不同彼云病在中脈虛謂內有實積而脈反虛此則言原本已虛而脈反強盛也彼云病在外脈澀堅謂邪盛脈不宜沉澀此則言邪在表脈不當無力也其言雖殊總是虛實相反之意新校正反以為誤則真誤矣黃帝曰余聞虛實以決死生願聞其情岐伯曰五實死五虛死帝曰願聞五實五虛岐伯曰脈盛皮熱腹脹前後不通悶瞀此謂五實實謂邪氣盛實然脈盛心也皮熱肺也腹脹脾也前後不通腎也悶瞀肝也脈細皮寒氣少泄利前後飲食不入此謂五虛虛謂真氣不足也然脈細心也皮寒肺也氣少肝也泄利前後腎也飲食不入脾也帝曰其時有生者何也岐伯曰漿粥入胃泄注止則虛者活身汗得後利則實者活此其候也按虛者所寶在元氣實者所惡在賊邪故也三部九候論三部謂上中下九候謂上中下各三候也經旨如是後世則以寸關尺為三部而分浮中沉取之就脈辨證較有實際名雖與經殊而實則與經同也九候之中又分七診七診之外又有決法為醫家要領蓋惟能決死而後為能救生也黃帝問曰願聞天地之至數合於人形血氣通決死生為之奈何岐伯曰天地之至數始於一終於九焉按九為奇數之終一者天二者地三者人因而三之三三者九以應九野故人有三部部有三候以決死生以處百病以調虛實而除邪疾按九野注見前帝曰何謂三部岐伯曰有下部有中部有上部部各有三候三候者有天有地有人也必指而導之乃以為真言必當咨受於師也上部天兩額之動脈在額兩旁動應於手足少陽脈氣所行也上部地兩頰之動脈在鼻孔下兩旁近於巨髎之分動應於手足陽明脈氣之所行上部人耳前之動脈在耳前陷者中動應於手手少陽脈氣之所行也中部天手太陰也謂肺脈也在掌後寸口中是謂經渠動應於手中部地手陽明也謂大腸脈也在手大指次指岐骨間合谷之分動應於手也中部人手少陰也謂心脈也在掌後鋭骨之端神門之分動應於手也下部天足厥陰也謂肝脈也在毛際外羊矢下一寸半陷中五里之分臥而取之動應於手也女子取太衝在足大趾本節後二寸陷中是下部地足少陰也謂腎脈也在足內踝後跟骨上陷中太溪之分動應手下部人足太陰也謂脾脈也在魚腹上趨筋間直五里下箕門之分寬鞏足單衣沉取乃得之而動應於手也候胃氣者當取足跗之上衝陽之分動應手也按本經所指蓋合經脈穴道二者並言不徒專取寸關尺也宜分別觀之故下部之天以候肝地以候腎人以候脾胃之氣脾臟與胃以膜相連故以候脾兼候胃也帝曰中部之候奈何岐伯曰亦有天亦有地亦有人天以候肺地以候胸中之氣經云腸胃同候故以候胸中也人以候心帝曰上部何以候之岐伯曰亦有天亦有地亦有人天以候頭角之氣地以候口齒之氣人以候耳目之氣按後三段不過復解前文無深義也三部者各有天各有地各有人三而成天三而成地三而成人三而三之合則為九九分為九野九野為九臟故神臟五形臟四合為九臟神臟五者肝藏魂心藏神脾藏意肺藏魄腎藏志以其皆神氣居之故也形臟四者一頭角二耳目三口齒四胸中也按此一節是上文三部九候之總結也為猶應也九野為九臟猶言九臟應九野也謹按上部三候形臟居其三中部三候神臟居其二形臟居其一下部三候則盡神臟也然其中有可疑者前言中部地手陽明也注云大腸脈也乃岐伯復解則又云地以候胸中之氣注云手陽明脈當其處按手陽明脈自肩髃前廉上出柱骨之會下入缺盆絡肺下膈屬大腸雖有下膈二字不可直言胸中一疑也若言大腸所盤折之地乃是當臍又非胸中二疑也後既總言形臟四則胸中二字必非差誤前言手陽明三字三部中止言臟脈並不及腑而手陽明為腑脈或是錯誤亦未可知三疑也前後不合存之以俟後之識者帝曰以候奈何岐伯曰必先度其形之肥瘦以調其氣之虛實實則瀉之虛則補之帝曰決死生奈何岐伯曰形盛脈細少氣不足以息者危形氣相反故生氣至危危者言其近死猶有生者也形瘦脈大胸中多氣者死凡如是類皆形氣不相得也按形盛謂肌肉未消脈細謂小弱無力惟脈細故少氣惟少氣故不足以息也此等脈證多見於初病之人蓋由天稟素弱故脈來無力苟能峻補猶可以生故但云危也若夫肌肉既脫而脈反浮大為真原枯竭胸中多氣為元氣脫根此等脈證久病之人見之死不旋踵矣然則新起之病獨無之乎曰有之脈大氣浮甚且喘促者則為陰竭陽浮之證切忌補氣急用斂陰如或不應更加桂附庶使氣納丹田俗醫不知此理誤用利氣速其死矣新病之與久病其死皆同惟形瘦與不瘦為異耳形氣相得者生參伍不調者病參謂參校伍謂類伍按謂脈來至數不等也三部九候皆相失者死按相失謂大小遲疾懸殊也三部之脈半得半失猶可以治若皆相失則死也上下左右之脈相應如參舂者病甚上下左右相失不可數者死按上下謂寸尺左右謂兩手蓋言兩手三部也每部三候三六一十八注以為十八診是也參舂謂頻動擊手加杵米也脈法曰人一呼脈再至一吸脈亦再至曰平今所謂一呼一吸脈四至也三至曰離經四至曰脫精五至曰死六至曰命盡是一呼一吸脈十二至矣若兩手三部之脈至幹不可數是亦脈來十至以外之類欲不死得乎中部之候雖獨調與衆臟相失者死中部之候相減者死按中部謂兩關也言尺寸之脈既失其常即使關脈無病猶之三部九候相失之類也故亦曰死若兩關獨病脈日減少即使尺寸無病是亦三部九候相失之類也上下一意特互言之以暢其說非有二也目內陷者死按內陷謂眼珠深窅五臟之精皆上會於目內陷則真精枯竭故死注單指太陽偏矣帝曰何以知病之所在岐伯曰察九候獨小者病獨大者病獨疾者病獨遲者病獨熱者病獨寒者病獨陷下者病脈見七診謂參伍不調隨其獨異以言其病爾九候之相應也上下若一不得相失上下若一言遲速大小等也一候後則病二候後則病甚三候後則病危所謂後者應不俱也俱猶同也一也按此就一部而言也不俱謂脈來之數後不應前也真臟脈見者勝死按真臟脈見死無疑矣然其死也又必於勝已之日足太陽氣絶者其足不可屈伸死必戴眼足太陽脈起於目內眥上額交巔上從巔入絡腦還出別下項循肩髆內挾脊抵腰中其支者復從肩髆別下貫胂過髀樞下合膕中貫腨循踵至足外側太陽氣絶死如是矣按新校正云按診要經終論載三陽三陰脈終之證此獨紀足太陽氣絶一證余應闕文也帝曰冬陰夏陽奈何言死時也岐伯曰九候之脈皆沉細懸絶者為陰主冬故以夜半死盛躁喘數者為陽主夏故以日中死位無常居物極則反也乾坤之義陰極則龍戰於野陽極則亢龍有悔是以陰陽極脈死於夜半日中也是故寒熱病者以平旦死平曉木王木氣為風故木王之時寒熱病死熱中及熱病者以日中死陽之極也病風者以日夕死卯酉沖也病水者以夜半死水王故也其脈乍疏乍數乍遲乍疾者日乘四季死辰戌丑未土寄王之脾氣內絶故日乘四季而死形肉已脫九候雖調猶死亦謂形氣不相得也按人之所以為人者內而精神外而形肉而已形肉消脫則精神亦且渙散而無依當此之時九候豈有尚調之理經特甚言之耳七診雖見九候皆從者不死所言不死者風氣之病及經月之病似七診之病而非也故言不死按皆從者脈至前後相合也脈見七診前後不移為病而已必不至死然其所以不死者惟風病脈多疾大久病脈必遲小非真如七診之脈與死為鄰也經久也謂病至逾月之久也注作月經誤矣若有七診之病其脈候亦敗者死矣必發噦噫按既犯七診而九候錯亂無有不死必發噦噫者病劇氣亂故也噦胃疾吃忒也噫心疾氣厄於下欲上出而取氣也其脈疾者不病氣強盛故其脈遲者病氣不足故脈不往來者死按氣血凝澀故也皮膚著者死按著謂著骨血肉乾實故也著直略切帝曰其可治者奈何岐伯曰經病者治其經絡病者治其絡求有過者按王本孫絡病者治其孫絡血甲乙經無孫血二字今從之身有痛者治其經絡按王本血病身有痛甲乙無血病二字今從之其病者在奇邪奇邪之脈則繆刺之繆刺者刺絡脈左取右右取左也留瘦不移節而刺之病氣淹留形容減瘦證不移易則消息節級養而刺之瞳子高者太陽不足戴眼者太陽已絶此決生死之要不可不察也此復明前太陽氣欲絶及已絶之候也五臟生成篇新校正云按此篇云五臟生成篇而不云論者蓋此篇直記五臟生成之事而無問答論議之辭故不云論後不言論者皆仿此心之合脈也火氣動躁脈類齊同心臟應火故合脈也其榮色也按新校正云王注以赤色為面榮美未通大抵發見於面之色皆心之榮也豈專指赤色哉其主腎也按主者僕之所畏心火畏腎水故以腎為主也肺之合皮也金氣堅定皮象亦然肺臟應金故合皮也其榮毛也毛附皮革故外榮其主心也按肺金畏心火肝之合筋也木性曲直筋體亦然肝臟應木故合筋也其榮爪也爪者筋之餘故外榮也其主肺也按肝木畏肺金脾之合肉也土性柔厚肉體亦然脾臟應土故合肉也其榮唇也口為脾之官故榮於唇唇謂四際白色之處非赤色也其主肝也按脾土畏肝木腎之合骨也水性流濕精氣亦然骨通精髓故合骨也按腎為作強之官骨為人身之干又腎主精而藏於骨故合骨也其榮發也腦為髓海腎氣主之故外榮發也其主脾也按腎水畏脾土是故多食鹹則脈凝泣而變色心合脈其榮色咸益腎勝於心心不勝故脈凝泣而顏色變易也多食苦則皮槁而毛拔肺合皮其榮毛苦益心勝於肺肺不勝故皮枯槁而毛拔去也多食辛則筋急而爪枯肝合筋其榮爪辛益肺勝於肝肝不勝故筋急而爪乾枯也多食酸則肉胝䐢而唇揭脾合肉其榮唇酸益肝勝於脾脾不勝故肉胝䐢而唇皮揭舉也按胝音支䐢音皺多食甘則骨痛而發落腎合骨其榮發甘益脾勝於腎腎不勝故骨痛而發墮落此五味之所傷也故心欲苦肺欲辛肝欲酸脾欲甘腎欲咸按至真要大論曰五味入口各歸所喜惟其喜之是以欲之也此五味之所合也五臟之氣故色見青如草茲者死按茲滋也言如草初生之滋潤也黃如枳實者死色青黃也黑如炲者死炲謂炲煤也按炲音苔赤如衃血者死衃血謂敗惡凝聚之血赤黑也按衃芳杯切白如枯骨者死白而枯槁如干骨也此五色之見死也青如翠羽者生赤如雞冠者生黃如蟹腹者生白如豕膏者生黑如鳥羽者生此五色之見生也按同一色也前何以死後何以生得神則生失神則死也生於心如以縞裹朱生於肺如以縞裹紅生於肝如以縞裹紺生於脾如以縞裹栝蔞實生於腎如以縞裹紫縞白色紺薄青色此五臟所生之外榮也按此特形容人之生色而已未可泥於字句之間也色味當五臟白當肺辛赤當心苦青當肝酸黃當脾甘黑當腎咸各當其應而為色味也故白當皮赤當脈青當筋黃當肉黑當骨按當猶屬也諸脈者皆屬於目按心為君主之官庶司百職皆所統帥故其應於脈也周流一身循環上下亦若目之為體合五臟六腑之精以為用故云皆屬於目也諸髓者皆屬於腦腦為髓海故諸筋者皆屬於節按節者骨之接合處也筋雖絡骨而骨無節則不能系聯而屈伸不便也諸血者皆屬於心按心生血故諸氣者皆屬於肺按肺生氣故此四肢八溪之朝夕也按四肢猶言四體蓋兼臟腑經絡而言非單指手足也肉之小會為溪八溪者猶言出入之道路言人之五臟為氣血筋骨脈絡出入之道路循環上下若朝明夕晦之無間斷也故人臥血歸於肝肝藏血心行之人動則血運於諸經人靜則血歸於肝臟何也肝主血海故也肝受血而能視言其用也足受血而能步按血盛乃能隨氣而動掌受血而能握指受血而能攝按人之運動雖屬於氣而能使之運動而有力者全賴於血故握攝氣也而能握能攝則血也臥出而風吹之血凝於膚者為痹謂𤸷痹也按𤸷音頑凝於脈者為泣泣謂血行不利按泣讀作澀凝於足者為厥謂足逆冷也此三者血行而不得反其空故為痹厥也空者血流之道大經隧也按三者並根臥出風吹言人有大谷十二分大經所會謂之大谷十二分者十二經脈之部分小溪三百五十四名少十二俞小絡所會謂之小溪然以三百六十五小絡言之者除十二俞外則當三百五十三經言三百五十四傳寫誤以三為四也按俞別本元起太素並作關此皆衛氣之所留止邪氣之所客也按衛為水穀之悍氣衛氣者晝日行於陽夜行於陰邪氣中人必依衛氣為出入是大谷小溪為衛氣留止之所即為邪氣出入之所也客解已見前針石緣而去之按緣因也因邪客於何所而用針石以攻去其病也注以為夤緣隨脈而行似未確診病之始五決為紀五決謂以五臟之脈決生死之綱紀也欲知其始先建其母建立也母謂應時之王氣也先立應時之王氣而後乃求邪正之氣也所謂五決者五脈也五臟脈也是以頭痛巔疾下虛上實過在足少陰巨陽按頭痛巔疾是為上實然其實也似乎外感風邪而豈知由於下虛之所致故歸原於腎與膀胱蓋惟下虛故上實也通評虛實論曰邪氣盛則實精氣奪則虛是以善治者不治標而治本也徇蒙招尤目冥耳聾下實上虛過在足少陽厥陰按徇蒙招尤四字義王注與新校正解俱未確余謂當別是一病或字有脫誤不得以其下有目冥句而即以目病為解闕疑可也目冥耳聾上虛病也雖似乎虛而非虛也下實故也肝膽二經相火寄焉沖逆而上故令冥聾或曰經但言下實而子何以知其為火也曰冥聾之病若非是火則為精血虧損之候是上下俱虛矣今經言下實者蓋謂冥聾之病不盡是虛宜於肝膽求之不可一於補腎也然則何以治之抑而瀉之是矣腹滿䐜脹支膈胠脅下厥上冒過在足太陰陽明按滿飽悶也䐜脹則內外急迫矣腹中如是漸令胠脅之間支撐膈塞其氣逆上令人昏冒者皆脾胃之病虛補實瀉令中氣條達則善矣胠腋上脅兩肋也咳嗽上氣病在胸中過在手陽明太陰按王本厥在胸中甲乙經厥作病今改從之蓋既云上氣不必更言厥矣咳者有聲無痰嗽者有聲有痰咳嗽則氣必上肺病必咳嗽者肺主諸氣故也然止治其太陰是矣而並治其陽明何也疏其腑而臟自通也心煩頭痛病在膈中過在手巨陽少陰按心主火心病必煩火上炎則頭痛膈中者心所主治故云病在膈中也治此之法瀉心不已更利小腸是矣按診病之法但取五臟五腑之脈而不及手少陽三焦厥陰心包絡者何也五臟之脈專配五行其為病也確有指名若夫三焦統括一身包絡輔佐心君而總職在乎相火遊行無定寄附各經伯之缺而不言或者其為是歟凡相五色面黃目青面黃目赤面黃目白面黃目黑者皆不死也凡色見黃皆為有胃氣故不死也面青目赤面赤目白面青目黑面黑目白面赤目青皆死也無黃色而皆死者以無胃氣也五臟以胃氣為本故無胃氣皆曰死也宣明五氣篇五氣五臟之病氣也宣明者宣發其義而使之彰明也凡一十三則為醫宗之要旨證治之津筏臨病所當體認者也五味所入酸入肝肝合木而味酸也辛入肺肺合金而味辛也苦入心心合火而味苦也鹹入腎腎合水而味鹹也甘入脾脾合土而味甘也按新校正云太素又云淡入胃是謂五入五氣所病心為噫象火炎上煙隨焰出心不受穢故噫出之按噫者有氣無聲心為火臟火鬱於內欲上出而不能於是閉口內吸提下郁之氣而出於口也噫於介切肺為咳象金堅徑扣之有聲邪擊於肺故為咳也肝為語象木枝條而形支別語宣委曲故出於肝按語者所以暢中之郁也肝喜暢而惡郁故為語以宣暢其氣之郁脾為吞象土包容物歸於內翕如皆受故為吞也腎為缺為嚏按缺呵缺也神氣昏惰之所致蓋腎藏精精虛則神氣昏惰而缺焉嚏噴嚏也肺氣外達之所致腎乃寒水氣易冰凝腎為肺子上達於母則發而為嚏不獨外感風寒為嚏也胃為氣逆為噦為恐按氣逆者肺之病也胃亦何以氣逆蓋胃為水穀之海過飽則上行而為噯腐更或停滯不能下行甚且逆出而為嘔吐雖與肺之喘促不同其為氣上衝逆則一也噦吃忒也胃喜熱而惡寒寒入於胃則氣滯而為噦是胃寒則噦也其或胃火大熾口必喜冷或多食梨柿或過用苦寒以致火為寒抑氣亂而噦是熱極過寒則噦也腎虛則恐恐非胃病也然胃本多氣多血其火最盛火盛則爍水水虛腎弱腎不敵胃故為恐胃病亦恐不可不知也大腸小腸為泄下焦溢為水大腸為傳道之腑小腸為受盛之腑受盛之氣既虛傳道之司不禁故為泄利也下焦為分注之所氣窒不瀉則溢而為水膀胱不利為癃不約為遺溺按靈樞經曰足三焦者太陽之別也並太陽之正入絡膀胱約下焦實則閉癃虛則遺溺是也膽為怒按怒者肝之志膽其合也然膽為中正之官決斷出焉膽病則偏倚而不能決斷氣從其合而為怒矣是為五病五精所並精氣並於心則喜並於肺則悲並於肝則憂並於脾則畏並於腎則恐是謂五並虛而相併者也按五臟各有精有精則有氣注謂火之精氣偏矣經總言虛而相併是並者兼併吞併之意五臟之氣弱則見並於所不勝金弱畏火精氣並於心而心盛矣心主喜心盛則氣偏勝於是不當喜而喜喜即是病病之有餘者治此之法以恐勝之而已若餘四臟文雖一例而義實不同如心之志為喜腎之志為恐精氣並而入之則志偏勝是也肺之志為憂而此云悲然悲從憂生憂則必悲義猶可通若夫肝之志本為怒而此反云憂脾之志本為思而此又云畏夫憂者肺志勝肝者也畏者恐之類腎志也見勝於脾者也五並之中不同若此豈得無說乎曰下文不言乎虛而相併蓋謂人不虛則已一虛則不惟見並於所不勝即所勝者亦為其所並而己之志盡為其所奪是故肝並夫肺而為憂脾並其腎而直畏總為一虛之所致悉而論之精氣並而自得其志者心肺腎也精氣盛於所不勝以並其所勝者脾也精氣盛於所勝而反並其所不勝者肝也相併之故皆本於虛虛而相併本則獨多此語伯蓋自為注解若如注所言是止言並而非相併矣五臟所惡心惡熱按心雖火臟然熱極即以自焚肺惡寒按肺合皮毛寒氣易入故曰形寒飲寒則傷肺也肝惡風按肝雖屬木而主風然風太盛則木折脾惡濕按脾本濕土而性則喜燥蓋濕極則其氣滯而不能運化矣腎惡燥燥則精竭涸按腎者水也以濕為事水虛則無以制火而病燥必有精血乾槁之患矣是為五惡五臟化液心為汗泄於皮腠也肺為涕潤於鼻竅也肝為淚注於眼目也脾為涎溢於唇口也腎為唾生於牙齒也是為五液五味所禁辛走氣氣病無多食辛病謂力少不自勝也按辛入肺而肺主氣氣既病矣乃辛性宣散少食以開鬱滯可也多食不幾耗散真氣乎咸走血血病無多食鹹苦走骨骨病無多食苦按咸本入腎而性陰走血血生於心五臟生成篇曰多食鹹則脈凝泣而色變脈又與心合咸不宜多食且有心火畏水之義焉苦本入心乃其性亦陰其氣堅而兼走骨骨屬陰而質堅也然骨者腎所主也五臟生成篇曰多食苦則皮槁而毛拔皮毛屬肺言苦入心而補火火盛則刑金也今言骨病無多食苦是苦益心而火熾強水不勝火之義也心腎為水火之源鹹苦為味中之濁為害更異可多食乎二者所禁與衆不同宜分別之甘走肉肉病無多食甘酸走筋筋病無多食酸按肉屬脾甘其味也筋屬肝酸其味也甘酸為脾肝之正味食之得宜自足以補肉而養筋若肉與筋既受病矣而又恣其所喜則補肉者適以消肉而養筋者反以害筋矣可多食乎是謂五禁無令多食按本則獨多此一語蓋以藥食失宜病必轉甚所以諄諄致戒前言之而末又重言之也五病所發陰病發於骨陽病發於血陰病發於肉骨肉陰靜故陽氣從之血脈陽動故陰氣乘之陽病發於冬陰病發於夏夏陽氣盛故陰病發於夏冬陰氣盛故陽病發於冬各隨其少也按陽病何以發於冬冬陰氣斂陽不能安陽邪惡郁故也陰病何以發於夏夏陽氣泄陰乃外達陰邪必隨陽而出故也是謂五發五邪所亂邪入於陽則狂邪入於陰則痹邪居於陽脈之中則四肢熱盛故為狂邪入於陰脈之內則六經凝澀而不通故為痹按注脈字太鑿只云陰分陽分是矣搏陽則為巔疾邪內搏於陽則脈流薄疾故為上巔之疾搏陰則為喑邪內搏於陰則脈不流故令喑不能言按難經云重陽者狂重陰者癲巢元方以邪入於陰則為癲脈經云陰附陽則狂陽附陰則癲孫思邈云邪入於陽則狂邪入於陰則為血痹邪入於陽傳則為癲痙邪入於陰傳則為痛喑全元起云邪已入陰復傳於陽邪氣盛臟腑受邪使其氣不朝榮氣不復周身邪與正氣相擊發動為癲疾邪已入陽今復傳於陰臟腑受邪故不能言是勝正也諸家之論不同今具載之陽入之陰則靜陰出之陽則怒按千金方云陽入之陰病靜陰出之陽病怒靜與怒皆病也要之靜多凶怒多吉所以然者凡病喜陽而惡陰也是謂五亂五邪所見春得秋脈夏得冬脈長夏得春脈秋得夏脈冬得長夏脈是謂五邪死不治按此相剋之定例所謂制於其所不勝鬼賊相刑未有不死者也五臟所藏心藏神按靈樞經曰兩精相搏謂之神神也者主宰一身而司變化者也肺藏魄按靈樞經曰並精而出入者謂之魄肝藏魂按靈樞經曰隨神而往來者謂之魂脾藏意記而不忘者也按靈樞經曰心有所憶謂之意腎藏志專意而不移者也按靈樞經曰意之所存謂之志腎受五臟六腑之精而藏之本生成之根為胃之關是以志能則命通又楊上善云腎有二枚左為腎藏志右為命門藏精是謂五臟所藏五臟所主心主脈壅遏榮氣應息而動也肺主皮包裹筋肉間拒諸邪也肝主筋束絡機關隨神而運也脾主肉復藏筋骨通行衛氣也腎主骨張筋化髓干以立身也是謂五主五勞所傷久視傷血按目得血而能視視久則目力竭而血傷久臥傷氣按氣隨動而運臥久則氣懈怠而不行久坐傷肉按包藏臟腑擁護筋骨而豐滿於一身者肉也肉也者外靜而內動氣血流焉脾胃應焉若久坐則氣血凝滯而肉疾矣久立傷骨按骨者身之干也挺直不僕惟骨是賴若立之太久不無痿弱之患矣久行傷筋按維繫肢節而能屈伸俯仰者筋也以動為用以靜為養可以行而不可以久若久行則不無阻弛之患矣是謂五勞所傷五者之用缺一不可用之太過則勞傷矣經脈別論篇曰四時陰陽生病起於過用此之謂也五脈應象肝脈弦耎虛而滑端直以長也心脈鉤如鉤之偃來盛去衰也脾脈代耎而弱也肺脈毛輕浮而虛如毛羽也腎脈石沉堅而搏如石之投也是謂五臟之脈臟氣法時論人之五臟本應四時故行不合時則病治不合時則乖是故貴乎法時也黃帝問曰合人形以法四時五行而治何如而從何如而逆得失之意願聞其事岐伯對曰五行者金木水火土也更貴更賤以知死生以決成敗而定五臟之氣間甚之時死生之期也按主時者貴非時者賤順時則間而生逆時則甚而死帝曰願卒聞之岐伯曰肝主春足厥陰少陽主治厥陰肝脈少陽膽脈肝與膽合故治同其日甲乙東方木干也肝苦急急食甘以緩之甘性和緩按全元起云肝苦急是其氣有餘蓋肝為將軍多氣善怒相火寄焉其證其脈病則必急是其常也治肝之法先瀉後補是矣心主夏手少陰太陽主治少陰心脈太陽小腸脈心與小腸合故治同其日丙丁丙丁為火南方干也心苦緩急食酸以收之酸性收斂按全起元云心苦緩是心氣虛蓋心生血而為一身之主宰善動多慮其血易虧病則緩弱是其常也然緩則必散故欲補心必用酸收脾主長夏足太陰陽明主治太陰脾脈陽明胃脈脾與胃合故治同其日戊己戊己為土中央干也脾苦濕急食苦以燥之苦性堅燥按脾者土也土虛則不能制水而濕勝濕勝則濡瀉濡瀉則脾愈虛故脾病常苦於濕也治濕之法燥之以苦蓋苦先入心而補火火能生土於是土得火而燥脾得苦而濕去矣肺主秋手太陰陽明主治太陰肺脈陽明大腸脈其日庚辛庚辛為金西方干也肺苦氣上逆急食苦以泄之苦性宣泄按元起云是亦為其氣有餘蓋肺主諸氣無病則順而下行病則氣上逆矣然上逆之故多本於火利用苦寒以泄其熱則轉逆為順矣腎主冬足少陰太陽主治少陰腎脈太陽膀胱脈其日壬癸壬癸為水北方干也腎苦燥急食辛以潤之開腠理致津液通氣也辛性津潤按日用而日竭者水也故腎苦燥燥則津液枯腠理閉上下之氣不通矣然欲開而通之非辛不可辛走肺肺為腎之母降下之令操焉母得益自能養其子於是腠理開津液致氣自通而燥自潤矣病在肝愈於夏子制其鬼也余同夏不愈甚於秋子休鬼復王也秋不死持於冬鬼休而母養故氣執持於父母之鄉也起於春自得其位故復起禁當風風氣通於肝故禁勿犯按此言四時生克之例也肝病者愈在丙丁丙丁不愈加於庚辛庚辛不死持於壬癸起於甲乙按此言日期生克之例也肝病者平旦慧按木王之時故下晡甚按金王之時故夜半靜按水王之時故此言時刻生克之例也五行相生相剋自是不易之定例而此篇所載一臟之內文義似同然實有四時日期時刻三折之異否則前言愈於夏矣繼又言愈在丙丁如此之類不幾重襲無味乎王注與元起注本並皆矇混無別真缺憾也今釐正之後四臟同肝欲散急食辛以散之用辛補之酸瀉之按此言一臟補瀉之例也肝何以欲散也蓋肝者木也木性生髮喜暢而惡郁故肝鬱則病經曰木鬱則達之是也欲散肝鬱莫如用辛辛既能發散肝鬱是散之即所以補之也然味之入肝者酸也以酸治肝正宜云補而此反云瀉者何也凡病在某臟欲用某藥以治之而苟不得其氣之相習者以引之則必拒而不得入故欲治肝病必用味之酸者以為引而後肝病可治也是酸之為味雖以收斂為功而亦有宣瀉之用焉病在心愈在長夏長夏不愈甚於冬冬不死持於春起於夏禁溫食熱衣熱則心躁故禁止之心病者愈在戊己戊己不愈加於壬癸壬癸不死持於甲乙起於丙丁心病者日中慧按火王故也夜半甚按水王故也平旦靜按木王故也心欲耍急食鹹以耎之用鹹補之甘瀉之按心為牡臟主血與火以陽為事陽盛則亢故病則欲耎善於耎者莫過於咸咸者水也以水治火則火自息而心自寧故耎之即所以補之然耎之為言柔也心火易亢而欲其柔軟也若欲折其上逆之勢而使之下泄則又宜用甘甘性緩而善於泄熱也病在脾愈在秋秋不愈甚於春春不死持於夏起於長夏禁溫食飽食濕地濡衣溫濕及飽並傷脾氣故禁之脾病者愈在庚辛庚辛不愈加於甲乙甲乙不死持於丙丁起於戊己脾病者日昳慧日出甚下晡靜土王則爽慧木克則增甚金扶則靜退亦休王之義也按昳音經日昃也脾欲緩急食甘以緩之用苦瀉之甘補之按脾與胃相連故胃喜緩脾亦欲緩然味之緩者莫如甘以甘緩脾歸其所喜脾得補矣若純用甘而補太甚則又宜瀉之以苦夫苦者甘之反也甘多則熱自不得不瀉之以苦寒也按脾本喜甘而惡苦其瀉其補脾臟之正義也若餘四臟所欲皆非本臟所喜蓋舉其既病而言也細閲文義自明病在肺愈在冬冬不愈甚於夏夏不死持於長夏起於秋禁寒飲食寒衣肺惡寒氣故禁之靈樞經曰形寒寒飲則傷肺飲尚傷肺其食甚焉肺不獨惡寒亦畏熱也肺病者愈在壬癸壬癸不愈加於丙丁丙丁不死持於戊己起於庚辛肺病者下晡慧日中甚夜半靜金王則慧水王則靜火王則甚肺欲收急食酸以收之用酸補之辛瀉之酸收斂故補辛發散故瀉按辛之為味專主發散故其為瀉是其本性非若肝腎之瀉必借酸鹹為引而後能瀉也病在腎愈在春春不愈甚於長夏長夏不死持於秋起於冬禁犯淬㗜熱食溫炙衣腎性惡燥故禁之腎病者愈在甲乙甲乙不愈甚於戊己戊己不死持於庚辛起於壬癸腎病者夜半慧四季甚下晡靜水王則慧土王則甚金王則靜腎欲堅急食苦以堅之用苦補之咸瀉之按腎何以欲堅也腎者水也水一而已一水不能勝五火故水虧則腎氣痿弱是以腎病欲堅也以苦堅腎是腎又以苦為補也咸瀉之義與肝同夫邪氣之客於身也以勝相加邪者不正之目風寒暑濕飢飽勞逸皆是也非唯鬼毒疫癘也至其所生而愈按其所生我之所生也至其所不勝而甚按我所不勝克我者也至於所生而持按所生生我者也自得其位而起居所王處謂自得其位也按此總結以前五臟間甚生死之期也必先定五臟之脈乃可言間甚之時死生之期也按間少愈甚病劇間生而甚死也間音閒肝病者兩脅下痛引少腹令人善怒肝厥陰脈自足而上壞陰器抵少腹又上貫膈布脅肋故兩脅下痛引少腹也其氣實則善怒靈樞經曰肝氣實則怒虛則目䀮䀮無所見耳無所聞善恐如人將捕之肝厥陰脈自脅肋循喉嚨入頏顙連目系膽少陽脈其支者從耳後入耳中出走耳前至目鋭眥後故病如是也恐謂恐懼魂不安也按䀮音荒取其經厥陰與少陽經經脈也非其絡病故取其經也氣逆則頭痛耳聾不聰頰腫肝厥陰脈自目系上出額與督脈會於巔故頭痛膽少陽脈支別者從耳中出走耳前又支別者加頰車又厥陰之脈支別者從目系下頰裡故耳聾不聰頰腫也是以上文兼取少陽也取血者脈中血滿獨異於常乃氣逆之診隨其左右有則刺之按自此以下五段言五臟之證虛實不同宜按經而施治也肝實則怒氣盛故也虛則恐氣餒故也如人將捕之善恐之狀也肝為臟膽為腑取經必兼臟腑者治臟不愈兼治其腑自愈注以為取厥陰以治肝氣取少陽以調氣逆即連下文謬誤甚矣下復言氣逆者謂肝寄相火其氣易逆氣逆則又有三者之病見於上部也一無所聞謂之聾不聰者聞而不明也取血者針砭也若前取經則兼藥石針刺而言也心病者胸中痛脅支滿脅下痛膺背肩甲間痛兩臂內痛心少陰脈支別者循胸出脅又手心主厥陰之脈起於胸中其支別者亦循胸出脅下腋三寸上抵腋下下循臑內行太陰少陰之間入肘中下循臂行兩筋之間又心少陰之脈直行者復從心系卻上肺上出腋下下循臑內後廉行太陰心主之後下肘內循臂內後廉抵掌後鋭骨之端又小腸太陽之脈自臂臑上繞肩甲交肩上故病如是虛則胸腹大脅下與腰相引而痛手心主厥陰之脈從胸中出屬心包下膈歷絡三焦其支別者循胸出脅心少陰之脈自心系下膈絡小腸故病如是取其經少陰太陽舌下血者少陰之脈從心系上挾咽喉故取舌本下及經脈血也其變病刺郤中血者按變病謂與初起之病不同也注作嘔變誤矣手少陰之郤在掌後脈中去腕半寸當小指之後脾病者身重善飢肉痿足不收行善瘛腳下痛脾象土而主肉故身重肉痿也痿謂萎無力也脾太陰之脈起於足大趾之端循指內側上內踝前廉上腨內腎少陰之脈起於足小趾之下斜趨足心上腨內出膕內廉故病則足不收行善瘈腳下痛也按王本善肌甲乙經作善飢是也從之虛則腹滿腸鳴飧泄食不化脾太陰脈從股內前廉入腹屬脾絡胃故病如是靈樞經曰中氣不足則腹為之滿腸為之鳴取其經太陰陽明少陰血者少陰腎脈也以前病行善瘈腳下痛故取之而出血按注以善瘈腳痛為腎病故取經兼及少陰是也但足不收行亦是腎病注乃遺漏何也又經言脾病如痰氣壅滯則身重火盛於府則善飢其為實病無疑也至於肉痿足不收行及痛等證有似於虛而不知火善消爍故肉痿濕痰下注則不能行而且痛火燥筋急則善瘈病有似虛本實者不可不知也然此本言脾經之病何以及腎蓋土實則乘其所勝而侮水故脾經之病且並傳及於腎也肺病者喘咳逆氣肩背痛汗出尻陰股膝髀腨胻足皆痛肺藏氣而主喘息在變動為咳故病則喘咳逆氣也肺養皮毛邪盛則心液外泄故汗出也腎少陰之脈從足下上循腨內出膕內廉上股內後廉貫脊屬腎絡膀胱今肺病則腎脈受邪故尻陰股膝髀腨胻足皆痛故下取少陰也按肩背痛注不明確蓋惟喘咳故氣逆惟氣逆於上故肩背痛也虛則少氣不能報息耳聾嗌乾氣虛少故不足以報入息也肺太陰之絡會於耳中故聾也腎少陰之脈從腎上貫肝膈入肺中循喉嚨挾舌本今肺虛則腎氣不足以上潤於嗌故嗌乾也取其經太陰足太陽之外厥陰內血者正謂腨內側內踝後之直上則少陰也按此肺病也亦何以並及於腎蓋肺者母也腎者子也母病必及其子相因之勢也腎病者腹大脛腫喘咳身重寢汗出憎風腎少陰脈起於足而上循腨復從橫骨中挾臍循腹裡上行而入肺故腹大脛腫而喘咳也腎病則骨不能用故身重也腎邪攻肺心氣內微心液為汗故寢汗出也脛既腫矣汗復津泄陰凝玄府陽爍上焦內熱外寒故憎風也虛則胸中痛大腹小腹痛清厥意不樂腎少陰脈從肺出絡心注胸中然腎氣既虛心無所制心氣熏肺故痛聚胸中也足太陽脈從項下行而至足腎虛則太陽之氣不能盛行於足故足冷而氣逆也清謂氣清冷厥謂氣逆也以清冷氣逆故大腹小腹痛志不足則神躁擾故不樂也取其經少陰太陽血者肝色青宜食甘粳米牛肉棗葵皆甘肝性喜急故食甘物而取其寬緩也心色赤宜食酸小豆犬肉李韭皆酸心性喜緩故食酸物而取其收斂也肺色白宜食苦麥羊肉杏薤皆苦肺善氣逆故食苦物而取其宣泄也脾色黃宜食鹹大豆豕肉栗藿皆咸究斯宜食乃調利機關之義也腎為胃關脾與胃合故假咸柔軟以利其關關利而胃氣乃行胃行而脾氣方化故應脾宜味與衆不同也腎色黑宜食辛黃黍雞肉桃蔥皆辛腎性喜燥故食辛物而取其津潤也此五者有辛酸甘苦咸各有所利或散或收或緩或急或堅或耎四時五臟病隨五味所宜也用五味而調五臟配肝以甘心以酸脾以咸肺以苦腎以辛各隨其宜欲緩欲收欲耎欲泄欲散欲堅而為用非以相生相養而為義也按此前王本有辛散酸收甘緩苦堅咸耎十字而此一段王本又刻在篇末詳察字義前十字已具於此段內因去之移此段補之庶幾上下文義不致參錯云毒藥攻邪辟邪安正唯毒乃能以其能然故通謂之毒藥也按邪者不正之氣所以害人正氣者也欲扶正不得不攻邪是非毒藥不可然所謂毒藥者非必如狼毒人言也凡氣味俱重質性駛利足以闢除邪氣者皆是也新校正單指下藥偏矣五穀為養按凡藥性皆偏所以扶正氣之不逮也若五穀之性味和平充胃補脾化生氣血人之性命實資之為養也五果為助按助者輔正之稱所以補五穀之不足也五畜為益按精血不充非草木之類所能益是必血氣之屬以補之經曰精不足者補之以味是也五菜為充按充者盈其量而實之也菜質粗糲易食易消用以充塞虛腸而已氣味合而服之以補精益氣氣為陽化味為陰施氣味和合則補益精氣矣陰陽別論陰陽之變無窮故其稱名亦異此篇以真臟為陰以胃脘為陽與諸篇之言陰陽大別故以別論名篇焉但其中所定死期不可執泥蓋人非軒岐其言恐難鑿鑿是以並皆節略云黃帝問曰人有四經十二從何謂岐伯對曰四經應四時十二從應十二月十二月應十二脈按四經即肝心肺腎獨缺脾者以土分王於四季脾不主時故言四經而脾自在其中非五臟之外別有四經也從附從也脈之正曰經附曰從經專指臟從則兼腑而言亦猶合之為四時分之則為十二月也從去聲脈有陰陽知陽者知陰知陰者知陽深知則備識其變易凡陽有五五五二十五陽五陽謂五臟之陽氣也五臟應時各形一脈一脈之內包總五臟之陽五五相乘故二十五陽也所謂陰者真臟也見則為敗敗必死也五臟為陰故曰陰者真臟也按五臟誠為陰矣然陰何以即謂之真臟真字之解注不明言止將真臟脈象引口枲殊缺發揮竊謂真者本色之謂五臟為陰六腑為陽凡陽必得陰而生陰必得陽而化經曰陰平陽祕精神乃治今脈如肝之至中外急如循刀刃等是止有陰急而無陽和為五臟之真本色獨見臟氣已敗焉得不死真字之解然乎否耶所謂陽者胃脘之陽也胃脘之陽人迎之氣也人迎在結喉兩旁動脈應手其脈之動常左小而右大左小常以候臟右大常以候腑一云胃胞之陽非也別於陽者知病處也別於陰者知死生之期陽者衛外而為固然外邪所中別於陽則知病處陰者藏神而內守若考真正成敗別於陰則知死生之期三陽在頭三陰在手所謂一也頭謂人迎手謂氣口兩者相應俱往俱來小大齊等名曰平人故言所謂一也按所謂一言皆可以知病之生死也謹熟陰陽無與衆謀按潛心理會之謂謹洞徹無疑之謂熟陰陽之變不能眩吾心則諸病迎刃而解矣若以陰為陽以陽為陰是曰衆人衆人庸庸有敗無功無與衆謀聖賢之心英雄之言哉所謂陰陽者去者為陰至者為陽靜者為陰動者為陽遲者為陰數者為陽按此言脈體之有陰陽也與前所言略異當分別觀之曰二陽之病發心脾有不得隱曲女子不月二陽謂陽明胃及大腸之脈也隱曲隱蔽委曲之事也按注又謂男子則脾受之而味不化故少精女子則心受之而血不流故不月分心脾為男女各受立說竊嘗疑之惟王安道論之最確其言曰二陽陽明也發心脾猶言延及於心脾也脾胃為合胃病而及脾理固宜矣大腸與心本非合也今大腸而及心何哉蓋胃為受納之腑大腸為傳化之腑食入於胃濁氣歸心飲入於胃輸精於脾者以胃之能納大腸之能化耳腸胃既病則不能受不能化心脾何所資乎心脾既無所資則無所運化而生精血矣故腸胃有病心脾受之則男為少精女為不月矣心脾當總言男女不當分說至隱曲不月方可分說耳若如王氏之言則男之精獨資於脾而不資於心女之血獨資於心而不資於脾有是理乎經本曰男女皆有心脾之病但在男子則隱曲不利女子則月事不來爾安道此論精確不易余初閲原注正欲改定讀溯洄集見之無以易也因仍之其傳為風消其傳為息賁者死不治言其深久者也胃病深久傳入於脾故為風熱以消削大腸病甚傳入於肺為喘息而上賁然腸胃脾肺兼及於心三臟二腑互相剋薄故死不治按自此以下六段陰陽經發病王注俱兼手足經脈言而馬玄臺以為單指足經蓋泥於傳足不傳手之說誤矣當以注言為正曰三陽為病發寒熱下為癰腫及為痿厥腨㾓三陽謂太陽小腸及膀胱之脈也小腸之脈起於手循臂繞肩髆上頭膀胱之脈從頭別下背貫臀入膕中循腨故在上為病則發寒熱在下為病則為癰腫腨㾓及為痿厥㾓痠疼也痿無力也厥足冷即氣逆也按腨音善足肚也㾓音淵痠疼也其傳為索澤其傳為頽疝按索消索也澤潤澤也熱久則肌膚枯燥而無潤澤之氣膀胱主表故也頽疝睪丸重墜俗名小腸氣是也疝者寒氣不行之病小腸主火病久則經虛而寒壅於其中故傳為頽疝也曰一陽發病少氣善咳善泄一陽謂少陽膽及三焦之脈也膽氣乘胃故善泄三焦內病故少氣陽上熏肺故善咳何故心火內應也其傳為心掣其傳為隔按膽者木也膽病不已木鬱火閉心氣厄塞若以手掣之者然隔閉塞不通也三焦主氣灌注一身循環上下病久不愈則上下之氣閉塞不通矣二陽一陰發病主驚駭背痛善噫善缺名曰風厥一陰謂厥陰心主及肝之脈也按二陽胃與大腸一陰肝與心主其云發病蓋合四經而皆病故見證有此四端注單解肝與心主而不及二陽且解善缺作腎氣乘之偏矣夫肝病則驚心病則背痛而噫胃病則噫而缺又肝木也大腸金也金氣凌木則驚且駭矣驚駭則風動木金火土四氣逆亂是為風厥也二陰一陽發病善脹心滿善氣二陰謂少陰心腎之脈也按二陰心與腎一陽膽與三焦三焦主氣氣治則上下周流氣病則壅閉不通今四經之病脹滿善氣似專屬於三焦而不知三焦者決瀆之官水道出焉上通氣於心下泄氣於腎而中則取決於膽故四者皆病則為脹為滿上壅下滯氣聚不行而有似於三焦一經之病也注言膽腎同逆三焦不行同逆二字既無著落單說三焦亦偏三陽三陰發病為偏枯痿易四肢不舉按三陰注不明指何經而且以偏枯屬三陰不足痿易屬三陽有餘偏枯固不足矣痿弱而至變易無常是又豈有餘者真可怪也夫三陰者太陰脾與肺也脾統血脾病則血少而偏枯肺主氣肺病則氣虛而痿弱易者變易不定或手已而足或足已而手故云四肢不舉也然四肢者諸陽之本也太陽小腸膀胱為陽經之一小腸主受化物膀胱主藏津液二者同病則一身乏灌溉之資而筋絡乾槁此皆足以致偏枯痿廢之病者也余謂此節之注視二陽發病之注其誤更甚夫以安道之賢但知解分配之非而又不能糾三陽有餘之謬此中缺陷可勝補哉鼓一陽曰鉤鼓一陰曰毛鼓陽勝急曰弦鼓陽至而絶曰石陰陽相過曰溜按此蓋言陰陽為病之邪脈也然鉤為心脈毛為肺脈弦為肝脈石為腎脈而溜則義無可考今取鼓一陽等語觀之既非狀其脈之形似又非指其病之因由實無意義故注與諸家雖曲為之解終未見其明確也余謂素問中如此之類不必強解存之可也陰爭於內陽擾於外魄汗未藏四逆而起起則熏肺使人喘鳴按此言陰陽紛擾以致氣逆而為喘急之病者肺病之一端也陰主內陽主外內外爭擾則氣亂而汗大泄汗愈泄則氣愈亂四逆非四肢厥逆言諸經之氣奔迸逼肺致令喘急叫呼也注謂金鼓不已以致肺病是頂上文誤矣魄汗解已見前未藏謂汗出不止也喘鳴者氣急則喘喘急則有呼吸之聲也是故剛與剛陽氣破散陰氣乃消亡剛謂陽也盛極不久存而陽氣自散陽已破敗陰不獨存故陽氣破散陰氣亦消亡按注解精矣但前節言陰陽爭擾則病肺而此節則言兩陽相併為純陽而無陰也然剛即陽也不言陽與陽而言剛與剛者兩陽相併暴悍之氣陽之亢也是一說也若其人已病陽強之症而醫復補其陽或輕投參朮或誤用姜附是亦謂之剛與剛保無破散消亡之患乎死陰之屬不過三日而死生陽之屬不過四日而已按原本作四日而死詳上下文義誤矣全元起注本作四日而已今從之所謂生陽死陰者肝之心謂之生陽母來親子故曰生陽非惟以木生火亦自陽氣主生爾心之肺謂之死陰陰主刑殺火復乘金金得火亡故云死肺之腎謂之重陰亦母子也以俱為陰氣故曰重陰腎之脾謂之闢陰死不治按闢陰解注不明快闢猶僻也腎少陰也脾太陰也腎病並脾偏僻於陰矣與肺之腎謂之重陰同意夫人生於陽而死於陰故其為病也得陽則輕得陰則重木火之病何以生陽也心之肺肺之腎腎之脾何以死皆陰之屬也知陽之所以生則知陰之所以死矣結陽者腫四肢以四肢為諸陽之本故結陰者便血一升陰主血故再結二升三結三升按結者聚而不散之謂陽主氣陰主血熱結陽分則氣壅於四肢而浮腫熱結陰分則血動下行而見於二便且視其結之深淺而血異焉陰陽結斜多陰少陽曰石水少腹腫按同一結也此何以言結斜斜字之解注不明言夫斜猶偏也偏於陽則熱偏於陰則寒既陰陽並結矣而其氣之所結或偏於陰是多陰而少陽為陰寒凝結名曰石水石水者水氣凝結如石少腹股足腫硬之類是也二陽結謂之消胃及大腸俱熱結也腸胃藏熱則喜消水穀三陽結謂之隔小腸膀胱俱熱結也小腸結熱則血脈燥膀胱熱則津液涸故隔塞而不便瀉三陰結謂之水脾肺之脈俱寒結也脾肺寒結則氣化為水一陰一陽結謂之喉痹三焦心主脈並絡喉氣熱內結故為喉痹陰搏陽別謂之有子按子者男女之通稱陰謂尺脈陽謂寸脈也陰脈滑數搏擊獨異是為女子陽脈滑動與衆相別是為男子陰陽宜分配男女若如注所言則混淪而無辨矣據云尺脈搏擊與寸口殊別陽氣挺然則為有子既知尺為陰矣尺脈搏擊何雲陽氣挺然若陽氣挺然則當是男子而女子竟無診法啓玄為先醫宗匠其誤乃至於此陰陽虛腸闢死按陰陽虛者氣血兩虧之人也如病他證猶可平補若犯下利膿血之證則陰更乏竭陽必耗散無餘未有不死者也闢音澼陽加於陰謂之汗按謂寸關浮大加倍於尺脈是邪氣外達其人必發汗所以然者凡邪得陰則內伏得陽則外出也注云陽上搏陰固之等語殊不可解陰虛陽搏謂之崩陰脈不足陽脈盛搏則內崩而血流下按陰虛則水涸不能制火陽愈躁動內擾其陰而血為之不寧其人必有崩漏之患矣五臟別論五臟各有專司如五行五色五味等論之常也然有常必有變軒岐為之旁搜而曲盡其義亦如陰陽之理有正有變並以別論名篇焉黃帝問曰余聞方士或以腦髓為臟或以腸胃為臟或以為腑敢問更相反皆自謂是不知其道願聞其說岐伯對曰腦髓骨脈膽女子胞此六者地氣之所生也皆藏於陰而象於地故藏而不瀉名曰奇恆之府腦髓骨脈雖名為府不正與神臟為表裡膽與肝合而不同六腑之傳瀉胞雖出納納則受納精氣出則化出形容然出納之用有殊於六腑故言藏而不瀉名曰奇恆之府也夫胃大腸小腸三焦膀胱此五者天氣之所生也其氣象天故瀉而不藏此受五臟濁氣名曰傳化之府此不能久留輸瀉者也言水穀入已糟粕變化而泄出不能久久留住於中但當化已輸瀉令去而已傳瀉諸化故曰傳化之府也按惟所受皆五臟之濁氣故不得不輸瀉而不能久留也魄門亦為五臟使水穀不得久藏謂肛之門也內通於肺故曰魄門受已化物故為五臟行使然水穀亦不得久藏於中按肛何以通於肺肛為大腸之盡竅而大腸與肺合故也六腑受五臟之濁氣轉輸而下必由肛出故瀉而不藏不特六腑即魄門亦然也所謂五臟者藏精氣而不瀉也故滿而不能實六腑者傳化物而不藏故實而不能滿也按精氣至貴而難實化物至穢而不可久留其藏其瀉真造化自然之妙用乎化物水穀所化之物也所以然者水穀入口則胃實而腸虛食下則腸實而胃虛故曰實而不滿滿而不實也按食入於胃而未至於腸故胃實而腸虛食離於胃而轉入於腸故腸實而胃虛此以食之所在為實食之所不在為虛單指腸胃而言也然就上文觀之語氣雖似一意承轉而下確求其義則逐節又各不同首言腦髓骨脈膽胞六者在臟腑之外名曰奇恆蓋臟腑為正而此為奇也膽為肝腑宜與胃大小腸等同言而附於此者以腸胃等五腑俱上入而下出皆瀉而不藏而膽則實藏而不瀉故並列於此也次言五腑主瀉者以受五臟之濁氣故不能久留不言水穀而水穀自在其中然瀉而不藏不特五腑更有魄門魄門出糟粕故單言水穀也第三段雖是申論藏瀉之義乃其所言則僅以滿實為解四段則以水穀之上下為虛實專指腸胃而言而三焦膀胱之義又缺也余謂素問一書如歲運經穴針灸諸篇辭義明顯學者可以字句求之若夫陰陽變化之理證治逆從之妙臟腑職司之微或離或合或正或奇是必神而明之乃可耳如以前四節細閲之方知文義甚活讀者幸毋拘執也帝曰氣口何以獨為五臟主按氣口寸關尺之總名所以診脈而知臟腑之病者謂臟腑有病何以必診於脈而知也岐伯曰胃者水穀之海六腑之大源也人有四海水穀之海則其一也受水穀已榮養四旁以其當運化之源故為六腑之大源也五味入口藏於胃以養五臟氣氣口亦太陰也按胃之所以為六腑之大源者以五臟之氣皆借之以養也胃為足太陰之腑氣口乃手太陰之經飲食入胃而能運化為氣者脾也氣充於五臟而使之著見於氣口者則是肺故云亦太陰也是以五臟六腑之氣味皆出於胃變見於氣口按全元起本出作入謬矣蓋人得飲食之味以為養而後臟腑之氣充是五臟六腑之氣味皆從胃出也若作入解是仍言五味矣然養臟腑之氣者胃也而驗臟腑之氣者氣口也有變必見故曰變見見去聲故五氣入鼻藏於心肺心肺有病而鼻為之不利也按亦外候之一端也拘於鬼神者不可與言至德按醫道精微是為至德既惑於邪言必不信惡於針石者不可與言至巧惡於針石則巧不能施病不許治者病必不治治之無功矣心不許人治之是其必死強為治者功亦不成按不許治非不令人治也如病本深而責效速不知醫而妄自用及縱欲恣食不遵教戒皆不許治之類也如是之人強與之治亦必無功至哉先聖為戒深矣經脈別論陰陽五臟既有別論而此篇亦以別論命名蓋以篇中所載皆於正經正脈之外旁搜其義如喘汗各有所發之經食飲入胃五臟資之以為養等義有正有奇經脈之理始備能經能權治療之法乃全也黃帝問曰人之居處動靜勇怯脈亦為之變乎岐伯對曰凡人之驚恐恚勞動靜皆為變也變謂變易常候按恚心怒也是以夜行則喘出於腎腎主於夜氣合幽冥故夜行則喘息內從腎出也淫氣病肺按淫者溢也謂病之餘氣也勞腎腎虛病必及肺子令母虛也有所墮恐喘出於肝恐生於肝墮損筋血因而奔喘故出於肝也淫氣害脾按諸經凡虛則皆見侮於所不勝惟肝虛則氣有所激而反能乘其所勝古人謂肝不宜補良有以也有所驚恐喘出於肺驚則心無倚神無所歸氣亂胸中故喘出於肺也淫氣傷心按心主神明驚恐則氣上奔肺神明亂而心反為之傷矣度水跌僕喘出於腎與骨跌謂足跌僕謂身倒也按水濕則病腎跌僕則傷骨故均令為之喘也當是之時勇者氣行則已怯者則著而為病也評熱論曰邪之所湊其氣必虛固如是也故飲食飽甚汗出於胃飽甚胃滿故也驚而奪精汗出於心按變出意外心不及持故精氣奪而汗出也持重遠行汗出於腎按腎主骨骨徑乃能持重若所持既重而行又遠則骨憊腎虛氣外泄而為汗矣疾走恐懼汗出於肝按肝主筋腎主恐懼走疾則筋傷恐懼則氣餒肝外泄而為汗矣恐者慮患之將來懼則畏縮而不前也搖體勞苦汗出於脾按勞倦傷脾故也故春秋冬夏四時陰陽生病起於過用此為常也五臟受氣蓋有常分用而過耗是以病生按過用謂不量力而勉強也食氣入胃散精於肝淫氣於筋按此言食之養人其氣流行於臟腑變化精微而成脈也食既入胃脾為之運糟粕下行而其精華則先散布於肝經以肝為春木主生髮之令故也肝主筋肝得食氣以為養則厭飫之餘自當淫溢而及於筋矣病氣為淫食之精氣亦以淫言者皆指其餘而稱也食氣入胃濁氣歸心淫精於脈按食之所化有清有濁清化氣氣無形而行五臟必借肝以散布故肝言散精也濁化血血有質心得食氣以為養而血始生焉故云濁氣歸心也然心之合脈也心惟得食之濁氣以生血而後血乃灌注於一身而成脈是脈之精華又實心所淫溢而成也此脈字指周身脈絡下漸說到寸關尺上脈氣流經經氣歸於肺肺朝百脈輸精於皮毛按經經絡也言血之精華既化而為脈而脈已有氣流行於十二經絡之中總上歸於肺肺為華蓋貫通諸臟為百脈之大要會故云朝百脈也然肺之合皮毛也既周身之血脈皆上朝於肺於是肺聚血脈之精華外輸於所合血氣盛者皮毛潤澤虛者自枯槁也毛脈合精行氣於府府謂氣之所聚處也是謂氣海在兩乳間名曰膻中也按氣海穴名在臍下一寸五分據此膻中亦名氣海所謂上氣海也府精神明留於四臟氣歸於權衡權衡以平氣口成寸以決死生按言食入於胃變化氣血外輸於皮毛內運於諸臟而總變見於氣口也臟本五而此言四者蓋指心肝脾腎言以肺為諸臟之蓋經氣歸肺肺朝百脈而行氣於心肝脾腎故云留於四臟也飲入於胃遊溢精氣上輸於脾水飲流下至於中焦水化精微上為雲霧雲霧散變乃注於脾靈樞經曰上焦如霧中焦如漚此之謂也按此又言飲之養人其氣亦流行於臟腑變化精氣而見於脈也胃主受納脾主運化故飲入於胃而其精氣必先及脾也然前食入於胃何以獨不言脾蓋前言食之養人其功效至於如此雖不言脾而運化之力自在其中矣此則言水飲循經而行無所不到始於脾而遍於五臟遊溢者涵泳遍滿之義也脾氣散精上歸於肺通調水道下輸膀胱水土合化上滋肺金金氣通腎故調水道轉注下焦膀胱稟氣乃為溲矣靈樞經曰下焦如瀆此之謂也水精四布五經並行合於四時五臟陰陽動靜以為常也按水之入胃也濁汁雖下達於膀胱矣而其精華灌注洋溢化為津液於是一身無干槁之患無病之人常如是也王本陰陽揆度新校正云一本作陰陽動靜較確今從之陽並於上四脈爭張氣歸於腎宜治其經絡瀉陽補陰心脾肝肺四脈爭張陽並於上者是腎氣不足故氣歸於腎也陰氣足則陽氣不復並於上矣按注解精妙凡六脈浮數洪大重按無力其證面紅目赤火氣上升躁擾不寧至夜尤甚者盡屬腎虛水虧不能制火孤陽上浮有似三陽實熱而不知為腎氣不足之所致腎足則水王水王則火自降而歸於源矣俗醫輒用苦寒其火愈盛曷不取此書而讀之也血氣形志篇人身臟腑氣血表裡配合自有一定之常數篇中但為平敘而無所論斷焉至於經穴針刺之法亦略舉其大概而已不足録也夫人之常數太陽常多血少氣少陽常少血多氣陽明常多氣多血少陰常少血多氣厥陰常多血少氣太陰常多氣少血此天之常數血氣多少此天之常數故用針之道常瀉其多也按新校正云按甲乙經十二經水篇云陽明多血多氣太陽多血多氣少陽少血多氣太陰多血少氣少陰少血多氣厥陰多血少氣太陽太陰血氣多少與素問不同又陰陽二十五人形性血氣不同篇與素問同蓋皇甫疑而兩存之也足太陽與少陰為表裡少陽與厥陰為表裡陽明與太陰為表裡是為足陰陽也手太陽與少陰為表裡少陽與心主為表裡陽明與太陰為表裡是為手之陰陽也按足太陽膀胱少陰腎也少陽膽厥陰肝也陽明胃太陰脾也手太陽小腸少陰心也少陽三焦厥陰心主也陽明大腸太陰肺也臟陰而腑陽臟為里而腑為表也今知手足陰陽所苦凡治病必先去其血乃去其所苦伺之所欲然後瀉有餘補不足按惡血留於經絡病為所苦故欲去所苦必先刺去其血也伺潛察也血去之後潛察其好惡則知其病屬有餘或不足而後可以補瀉矣刺陽明出血氣刺太陽出血惡氣刺少陽出氣惡血刺太陰出氣惡血刺少陰出氣惡血刺厥陰出血惡氣也明前三陽三陰氣血多少之刺約也按篇首注云用針之道常瀉其多是以多者宜出而少者常惡其出也按新校正云此刺陽明一節宜續前瀉有餘補不足之下不當在治五形志之後今詳文義最為恰當故挈置於此形樂志苦病生於脈治之以灸刺形謂身形志謂心志形樂謂不甚勞役志苦謂結慮深思按脈周身脈絡也脈絡者血氣之所榮今身雖逸而心獨苦氣祕血滯周身之脈絡為之壅遏而病生矣祕者疏之滯者導之疏祕導滯無如灸刺形樂志樂病生於肉治之以針石筋骨不勞心神悅懌則肉理相比氣道滿填衛氣怫結故病生於肉也夫衛氣滿以針瀉之結聚膿血石而破之石謂石針則砭石也形苦志樂病生於筋治之以尉引形苦謂修業就役也尉謂藥尉引謂導引按過勞則筋傷筋傷遇熱則弛緩遇寒則拘急尉而引之斯柔和而無緩急之患矣形苦志苦病生於咽嗌治之以百藥按內苦其心神外勞其形體則火焰而水虧矣水不勝火火無所制而上浮於咽嗌與恣食炙煿以致實熱結聚者不同也治此之法或滋陰以降火或引火以歸源少佐辛涼以開其結滯按甲乙經咽嗌作困竭百藥作甘藥形數驚恐經絡不通病生於不仁治之以按摩醪藥是謂五形志也按摩者所以開通閉塞導引陰陽醪藥者所以養正祛邪調中理氣醪藥酒藥也不仁𤸷重也按驚則氣亂恐則氣下故令經絡閉拒而不通氣既不通則血凝滯而不知痛癢不仁者氣血頑木之故也寶命全形論命者人所寶形者命所倚欲寶其命必全其形全形之道針其一矣故篇中所載多用針之法至於木得金而伐五句雖是生克之常然其中別有至理但與上下文義不甚相合此篇當是綴集成文者也黃帝問曰天覆地載萬物悉備莫貴於人人以天地之氣生四時之法成君王衆庶盡欲全形形之疾病莫知其情留淫日深著於骨髓心私慮之余欲針除其疾病為之奈何按病各有情情不易知故常留連淫泆而深入於內也岐伯對曰夫鹽之味鹹者其氣令器津泄凡虛中而受物者皆謂之器其於體外則為陰囊其於身中所同則為膀胱矣咸之為氣天陰則潤在土則浮在人則囊濕而皮膚剝起弦絶者其音嘶敗木敷者其葉發病深者其聲噦按弦肝脈也絶者急而欲絶也弦急之極木反侮金肺不得令肺主音聲故令嘶嘎而敗壞嘶嗄者喑啞不清也敷布也發暢茂也木氣敷布於外則枝葉茂然惟葉太茂而木力竭矣噦吃忒也雖有寒熱誤治之不同總為胃氣乖忤上逆於肺之所致暴病得之猶為易治若久病犯此九死一生所以者何萬物養於土人命養於胃胃不安而氣乖逆以致吃忒不已即或不死病亦深矣按帝問本欲用針除疾而伯乃以病之難治三者為對意謂若此之類針亦無用而且先以鹹味引興以見病在內者形於外也猶器內盛鹽外必潮濕王注混解無別楊上善又以鹹味弦絶木敷三者引入聲噦皆不善解經旨者也嘶音西破聲也嗄音沙去聲噦音一決切人有此三者是謂壞府毒藥無治短針無取此皆絶皮傷肉血氣爭黑按壞府注謂損壞其府而取病且引抱朴子開胸納餅為證荒誕極矣壞府者謂臟腑敗壞病之難治者也毒藥解已見前爭黑謂血氣紛爭而黑色見於外今之病危色黯者是也帝曰余念其痛為之奈何岐伯曰夫人生於地懸命於天天地合氣命之曰人天有陰陽人有十二節節謂節氣外所以應十二月內所以王十二經脈也天有寒暑人有虛實寒暑有盛衰之紀虛實表多少之殊能經天地陰陽之化者不失四時知十二節之理者聖智不能欺也能有八動之變五勝更立能達虛實之數者獨出獨入呿吟至微秋毫在目按易曰與天地合其德與四時合其序與鬼神合其吉凶殆謂是歟聖智豈欺人此特甚言之耳八動注謂八節之風變動五勝謂五行之氣相勝立謂當其王時變謂氣至而變易分疏是也吟吟詠也呿楊上善云謂露齒出氣非也呿音區張口貌呿吟至微猶言開口皆是至理也帝曰人生有形不離陰陽天地合氣不可勝量虛實呿吟敢問其方岐伯曰木得金而伐火得水而滅土得木而達金得火而缺水得土而絶萬物盡然不可勝竭按五行相勝此其常也乃土獨與衆異者土厚而頑苟無物焉以通之則且為石田而何以生長夫萬物是故乘其弱而克之者木也疏其理而通之者亦木也土得木而達其義精哉但此五句與上下文義不合宜分別之故針有懸布天下者五黔首共餘食莫知之也按懸布猶言昭著黔首黎民也餘食多食也言但知飲食而不知其理也一曰治神專精其心不妄動也按此注作用針者言是也楊上善作治五臟之神誤矣二曰知養身按平人氣象論曰醫不病故為病人平息以調之為法然則欲治人之病者可不自養其身乎楊上善又作內外養形解新校正復從而和之反優楊劣王皆不體認經旨而相率傅會也三曰知毒藥為真按病可速取者針為便病宜緩治者藥為安但知之不真則宜正宜從未免與病相左耳血氣形志篇曰形樂志樂病生於肉治之以針石形苦志苦病生於咽嗌治之以百藥然則針與藥二者凡病所必需而醫家所當互用也新校正本楊氏之說亦以此節為病人自知噫病人苟自知真藥安用醫為哉毒藥駃劑也四曰制砭石小大古者以砭石為針故不舉九針但言砭石耳當制其大小隨病所宜而用之五曰知臟腑血氣之診按用針者固須知藥然尤當知脈也不知脈則孰為臟腑孰為血氣或虛或實而補瀉之法奚施果知脈且知藥矣用針之道其全矣乎帝曰願聞其道岐伯曰凡刺之真必先治神按再言治神楊說之誤可見矣五臟已定九候已備後乃存針先定五臟之脈備循九候之診而有太過不及者後乃存意於用針之法衆脈不見衆凶弗聞外內相得無以形先按心有所存弗見弗聞略形跡而專尚神明也此正所謂治神者用針者當如是也可玩往來乃施於人玩謂玩弄言精熟也人有虛實五虛勿近五實勿遠至其當發閒不容瞚按虛者病深而效緩實者病淺而功速應機決策毫釐莫爽瞚音舜目開闔搖動也手動若務針耀而勻按手持針而心不亂營針明淨而中病得所此持針之要道也靜意視義觀適之變是謂冥冥莫知其形伏如橫弩起如發機按內治其神外應多變幾無形跡之可求而一發則無不中也湯液醪醴論本篇雖以湯液醪醴名篇而其要義在後半截蓋脹證一項最為吃緊去宛陳莝者除實積也開鬼門者表外邪也潔淨府者利小便而水下泄也三者治脹之法略備矣黃帝問曰為五穀湯液及醪醴奈何按張景嶽曰湯液醪醴皆酒之屬韻義云醅酒濁酒曰醪詩話云酒之甘濁而不泲者曰醴然則湯液者其即清酒之類歟醪音勞醴音禮泲音濟岐伯對曰必以稻米炊之稻薪稻米者完稻薪者堅帝曰何以然岐伯曰此得天地之和高下之宜故能至完伐取得時故能至堅也按完全備也堅蒼徑也稻得四時中和之氣其性平其味淡日以養人以其力全而功備也稻薪採於秋末冬初故其色蒼而質徑也帝曰上古聖人之作湯液醪醴為而不用何也岐伯曰自古聖人作湯液醪醴者以為備耳夫上古作湯液故為而弗服也按聖人不治已病治未病故但為備用而不服也中古之世道德稍衰邪氣時至服之萬全雖道德稍衰邪氣時至以心猶近道故服用萬全也帝曰今之世不必已何也言不必如中古之世何也岐伯曰當今之世必齊毒藥攻其中鑱石針艾治其外也按世愈隆則法愈備齊劑同帝曰形弊血盡而功不立者何岐伯曰神不使也按張景嶽曰凡治病之道攻邪在乎針藥行藥在乎神氣故治施於外而神應於中使之升則升使之降則降是其神之可使也若以藥劑治其內而臟氣不應針艾治其外而經氣不應是其神氣已去而無可使雖竭力治之終成虛廢爾帝曰何謂神不使岐伯曰針石道也精神進志意治故病可愈按治病之法必需針石是針器也而道存焉王本精神不進志意不治故病不可愈今詳上下文語氣似有錯誤按新校正云全元起本作精神進志意治故病可愈文義較貫今改從之今精壞神去榮衛不可復收何者嗜欲無窮而憂患不止精氣弛壞榮泣衛除故神去之而病不愈也按張景嶽曰腎藏精精為陰心藏神神為陽精壞神去則陰陽俱敗表裡俱傷榮衛不可復收拾矣此其故以今人嗜欲憂患不節失其所養故致精氣弛壞榮泣衛除而無能為力也榮營同泣澀同帝曰夫病之始生也極微極精必先入結於皮膚今良工皆稱曰病成名曰逆則針石不能治良藥不能及也今良工皆得其法守其數親戚兄弟遠近音聲日聞於耳五色日見於目而病不愈者亦何暇不早乎按張景嶽曰極微者言輕淺未深極精者言專一未亂斯時也治之尚易及其病成則良工稱為逆矣然良工之治既云得法而至數勿失親戚之聞見極熟而聲色無差宜乎無不速愈者而願使其直至於精壞神去而病不能愈亦何暇治之不早乎暇猶言慢事也岐伯曰病為本工為標標本不得邪氣不服此之謂也按本猶先也標猶後也言先有病而後有醫治之也病必得醫而後愈醫能勝任謂之良倘真良者或不任而所任者未必良則邪仍暴橫病何由愈是謂標本不相得惜乎後世多蹈此弊也五臟別論曰拘於鬼神者不可與言至德惡於針石者不可與言至巧病不許治者病必不治治之無功矣正此謂也帝曰其有不從毫毛生而五臟陽已竭也津液充郭其魄獨居孤精於內氣耗於外形不可與衣相保此四極急而動中是氣拒於內而形施於外治之奈何按張景嶽曰不從毫毛生病生於內也五臟陽已竭有陰無陽也津液水也郭形體胸腹也脹論曰夫胸腹臟腑之郭也凡陰陽之要陰無陽不行水無氣不化故靈蘭祕典論曰氣化則能出矣今陽氣既竭不能通調水道故津液妄行充於郭也魄者陰之屬形雖充而氣則去故其魄獨居也精中無氣則精孤於內陰內無陽則氣耗於外三焦閉塞水道不通皮膚脹滿身體羸敗故形不可與衣相保也四肢者諸陽之本陽氣不行故四極多陰而脹急也脹由陰滯以胃中陽氣不能制水而肺腎俱病喘咳繼之故動中也此以陰氣格拒於內故水脹形施於外而為是病郭音廓岐伯曰平治於權衡按張景嶽曰平治之法當如權衡者欲得其平也且如水脹一證其本在腎其標在肺如五臟陽已竭魄獨居者其主在肺肺主氣氣須何法以化之津液充郭孤精於內其主在腎腎主水水須何法以平之然肺金生於脾腎水制於土故治腫脹者必求脾肺腎三臟隨盛衰而治得其平是為權衡之道也去宛陳莝微動四極溫衣繆刺其處以復其形開鬼門潔淨府精以時服五陽已布疏滌五臟故精自生形自盛骨肉相保巨氣乃平帝曰善按張景嶽曰宛積也陳久也莝斬草也謂去其水氣之陳積欲如斬草而漸除之也四極四肢也微動之欲其流通而氣易行也溫衣欲助其肌表之陽而陰凝易散也然後繆刺之以左取右以右取左而去其大絡之留滯也鬼門汗空也肺主皮毛其藏魄陰之屬也故曰鬼門淨府膀胱也上無入孔而下有出竅滓穢所不能入故曰淨府邪在表者散之在裡者化之故曰開鬼門潔淨府也水氣去則真精服服行也陰邪除則五陽布五陽五臟之胃氣也由是精生形盛骨肉相保而巨氣可平矣宛郁同莝音銼異法方宜論五方之地各有所宜治病之法因之而異乃方土大略之論也若夫賦性特異則北反熱而南反寒間氣為病則夏惡寒而冬惡熱有不可以執一論者是又貴乎變而通之也黃帝問曰醫之治病也一病而治各不同皆愈何也不同謂針石灸爇毒藥導引按蹺也岐伯對曰地勢使然也按同一地也而五方之勢不同其為病也治之自不得不異故東方之域天地之所始生也按應時之春魚鹽之地海濱傍水其民食魚而嗜咸皆安其處美其食按性以習而遷魚者使人熱中鹽者勝血魚發瘡則熱中之信鹽發渴則勝血之徵故其民皆黑色疏理其病皆為癰瘍按血受熱也其治宜砭石砭石謂以石為針也山海經曰高氏之山有石如玉可以為針則砭石也故砭石者亦從東方來按謂砭石始自東方也西方者金玉之域沙石之處天地之所收引也按應時之秋其民陵居而多風水土剛強按西民穴居至今猶然以陵為居故曰陵居詩言陶穴是矣注謂居室如陵新校正言民居高陵皆未之知也其多風而剛強者以西方之氣清徑故也其民不衣而褐薦其民華食而脂肥不衣絲綿故曰不衣褐謂毛布也薦謂細草也華謂鮮美酥酪骨肉之類也以食鮮美故人體脂肥故邪不能傷其形體其病生於內內謂喜怒悲思恐及飲食男女之過甚也按邪外邪也六淫之邪必自外入今脂肥則腠密褐薦則體溫而邪無自而入然惟過於飽暖則肥甘積於腸胃情欲耗其真元病不在外而在於內矣其治宜毒藥按臟腑之病非輕淡之藥所能治故宜毒藥毒藥者氣重味厚者也故毒藥者亦從西方來按西人宜之而其法傳於天下北方者天地所閉藏之域也其地高陵居按謂土阜之處風寒冰冽按應時之冬其民樂野處而乳食臟寒生滿病按野處則無重垣復壁風寒易入而且食酥酪之屬則又性寒氣膩凝滯於中臟欲不寒其可得乎臟既寒矣氣閉不行以致中滿胸腹腸臟之間膨脹如鼓所以然者地氣寒而臟又寒也惟滿病多生於寒也不獨北方即南方之人凡性喜寒涼恣食瓜梨或因暑飲水凝寒傷冷為滿病者當不少矣昧者不察以為南方多火一於清利而不知溫中皆非治滿之道也其治宜灸爇故灸爇者亦從北方來按去寒莫如灸爇灸艾灼爇火針火罐之類也北人用之而其法傳於後世南方者天地所長養陽之所盛處也按應時之夏其地下水土弱霧露之所聚也按霧露者濕氣之所升南方卑濕故多霧露其民嗜酸而食胕按張景嶽曰胕腐也如豉鮓曲醬之屬胕音父故其民皆緻理而赤色其病攣痹按張景嶽曰嗜酸者收食胕者濕故其病緻理而攣痹攣痹者濕熱盛而病在筋骨也南方屬火故其色赤緻密也緻音致其治宜微針故九針者亦從南方來按攣痹屬經絡故宜用針其法始自南方而傳之後世也中央者其地平以濕天地所以生萬物也衆按土王於中平其體而濕其性也中為四方之會土為萬物之母故衆物生焉其民食雜而不勞按無物不有故食雜居中四應故不勞故其病多痿厥寒熱按張景嶽曰土氣通脾而主四肢故濕滯則為痿寒熱則為厥中央者四方之氣交相集故病則或寒或熱也其治宜導引按蹺故導引按蹺者亦從中央出也按張景嶽曰導引謂搖動筋骨支節以行氣血也蹺即陽蹺陰蹺之謂蓋謂推拿溪谷蹺穴以除疾病也病在支節故用此法凡後世所用導引按摩之法亦自中州出也蹺音喬故聖人雜合以治各得其所宜故治所以異而病皆愈者得病之情知治之大體也按五方之地不同五方之病自異因其病而施其治故治雖異而病皆愈是惟聖人為能各盡其宜也調經論病有有餘不足調者抑其有餘而補其不足也然有餘不足各有其經故欲治病必用調經蓋就既病而言也若先事預防莫過於守經隧焉黃帝問曰余聞刺法言有餘瀉之不足補之何謂有餘何謂不足岐伯對曰有餘有五不足亦有五帝欲何問帝曰願盡聞之岐伯曰神有餘有不足氣有餘有不足血有餘有不足形有餘有不足志有餘有不足凡此十者其氣不等也神屬心氣屬肺血屬肝形屬脾志屬腎以各有所宗故不等也帝曰人有精氣津液四肢九竅五臟十六部三百六十五節乃生百病百病之生皆有虛實今夫子乃言有餘有五不足亦有五何以生之乎按十六部注謂手足九竅五臟合為十六部也三百六十五節注謂非骨節是神氣出入之處按本篇後言夫十二經脈者皆絡三百六十五節節有病必被經脈其為骨節居然無疑且果非骨節何以言絡也岐伯曰皆生於五臟也夫心藏神肺藏氣肝藏血脾藏肉腎藏志而此成形五臟之道皆出於經隧以行血氣血氣不和百病乃變化而生是故守經隧焉隧潛道也經脈伏行而不見故謂之經隧焉血氣者人之神邪侵之則血氣不正血氣不正故變化而百病乃生矣按經隧者血脈運行之道路也正氣所由出邪氣所由入故欲防其入而慎氣實則喘喝胸憑仰息也帝曰補瀉奈何岐伯曰氣有餘則瀉其經隧無傷其經無出其血無泄其氣不足則補其經隧無出其氣按楊上善云經隧者手太陰之別從手太陰走手陽明乃是手太陰向手陽明之道欲導臟腑陰陽故補瀉皆從正經別走之絡瀉其陰經別走之路不得傷其正經也帝曰善血有餘不足奈何岐伯曰血有餘則怒不足則恐肝之藏也針經曰肝藏血肝氣虛則恐實則怒按甲乙經太素全元起本恐並作悲帝曰補瀉奈何岐伯曰血有餘則瀉其盛經出其血不足則視其虛經內針其脈中久留之血按王本久留而視甲乙經與太素並作久留之血從之脈大疾出其針無令血泄按脈大則氣虛氣既虛矣若針之太久則氣散而不能攝血故當疾出其針庶血不致於過動也注作兩截解誤矣帝曰刺留血奈何岐伯曰視其血絡刺出其血無令惡血得入於經以成其疾按血不流動則留滯而成惡血矣惡血在絡若不刺出必入於經而為病也按心肺脾腎俱有微證刺法而此肝臟獨以刺留血為解或者以肝主藏血故也帝曰善形有餘不足奈何岐伯曰形有餘則腹脹涇溲不利不足則四肢不用脾之藏也針經曰脾氣虛則四肢不用五臟不安實則腹脹涇溲不利涇大便也溲小便也按楊上善云涇作經婦人月經也亦通帝曰補瀉奈何岐伯曰形有餘則瀉其陽經不足則補其陽絡並胃之經絡帝曰善志有餘不足奈何岐伯曰志有餘則腹脹飧泄不足則厥腎之藏也針經曰腎藏精精舍志腎氣虛則厥實則脹脹謂脹起厥謂逆行上衝也足少陰脈下行今氣不足故隨衝脈逆行而上衝也帝曰補瀉奈何岐伯曰志有餘則瀉然筋血者按新校正云按甲乙經及太素云瀉然筋血者出其血楊上善云然筋當是然谷下筋再詳諸處引然谷者多雲然谷之前血者疑少谷之二字前字誤作筋字也不足則補其復溜然謂然谷足少陰滎也在內踝之前大骨之下陷者中血絡盛則瀉之刺三分留三呼灸三壯復溜足少陰經也在內踝上二寸陷者中刺三分留三呼灸五壯帝曰善余已聞虛實之形不知其何以生岐伯曰氣血以並陰陽相傾氣亂於衛血逆於經血氣離居一實一虛衛生脈外故氣亂於衛血行經內故血逆於經血氣不和故一虛一實血並於陰氣並於陽故為驚狂氣並於陽則陽氣外盛故為驚狂血並於陽氣並於陰乃為炅中氣並於陰則陽氣內盛故為熱中炅熱也按炅音景血並於上氣並於下心煩惋善怒血並於下氣並於上亂而善忘按氣血運行上下循環乃為無病並則偏於一而病起矣血者生於心而藏於肝血並於上則血偏盛而氣自並於下下衝其上心與肝動故令煩惋善怒也氣者蓄于丹田則神自清而精自攝今並於上則氣盡升而血自並於下上離乎下精神渙散故令亂而喜忘也帝曰血並於陰氣並於陽如是血氣離居何者為實何者為虛岐伯曰血氣者喜溫而惡寒寒則泣不能流溫則消而去之泣謂如雪在水中凝住而不行按寒則凝溫則行澀不能流者凝也消而去之者行也是故氣之所併為血虛血之所併為氣虛按氣並於上則血虛而並於下血並於上則氣虛而並於下帝曰人之所有者血與氣耳今夫子乃言血併為虛氣併為虛是無實乎岐伯曰有者為實無者為虛故氣並則無血血並則無氣今血與氣相失故為虛焉氣並於血則血失其氣血並於氣則氣失其血故曰血與氣相失按並則血與氣相失而虛實分焉是故惟並則有惟有則實惟有有有實故有無有虛也相失者虛實懸殊也絡之與孫脈俱輸於經血與氣並則為實焉血之與氣並走於上則為大厥厥則暴死氣復反則生不反則死按是則血與氣共並於上者之為害也帝曰實者何道從來虛者何道從去虛實之要願聞其故岐伯曰夫陰與陽皆有俞會陽注於陰陰滿之外陰陽勻平以充其形九候若一命曰平人夫邪之生也或生於陰或生於陽其生於陽者得之風雨寒暑其生於陰者得之飲食喜怒按陰主內陽主外風雨寒暑者外感之邪也故云生於陽飲食喜怒者內傷也故云生於陰帝曰風雨之傷人奈何岐伯曰風雨之傷人也先客於皮膚傳入於孫脈孫脈滿則傳入於絡脈絡脈滿則輸於大經脈血氣與邪並客於分腠之間其脈堅大故曰實實者外堅充滿不可按之按之則痛按是謂外感之實邪所當攻發者也帝曰寒濕之傷人奈何岐伯曰寒濕之中人也皮膚收按王本皮膚不收不收者緩散也下文云肌肉堅緊寒濕中人理宜堅緊其云不收誤也按甲乙經及太素俱無不字是也今刪之肌肉堅緊榮血泣衛氣去故曰虛虛者聶闢氣不足按之則氣足以溫之故快然而不痛按聶闢怯弱也寒束肌腠榮澀衛去氣血虛寒按之則血動氣行轉寒為溫故快然而不痛也帝曰善陰之生實奈何岐伯曰喜怒不節則陰氣上逆上逆則下虛下虛則陽氣走之故曰實矣帝曰陰之生虛奈何岐伯曰喜則氣下悲則氣消消則脈虛空因寒飲食寒氣熏滿則血泣氣去故曰虛矣按陰陽之病並有虛實此但言陰而不言陽者以陽之虛實顯形於外惟陰之生病或實或虛變而難測也生猶變也喜怒悲者五志之三也三者過極則氣上浮而入於陽分之中有似於實矣抑或氣消散而降於下則氣虛寒而不能化食血澀氣去因之愈虛矣此病之由陰而變為他證之大凡與陽分之變不同也帝曰經言陽虛則外寒陰虛則內熱陽盛則外熱陰盛則內寒余已聞之矣不知其所由然也岐伯曰陽受氣於上焦以溫皮膚分肉之間今寒氣在外則上焦不通上焦不通則寒氣獨留於外故寒栗按陽盛則氣足以衛外虛則邪襲肌膚之間而寒矣帝曰陰虛生內熱奈何岐伯曰有所勞倦形氣衰少穀氣不盛上焦不行下脘不通按甲乙經作下焦不通胃氣熱熱氣熏胸中故內熱甚用其力致勞倦也貪役不食故穀氣不盛也按勞倦則氣弱而不能化食故二焦不通以致胃熱蓄積熱盛於內此勞倦飲食內傷其陰分陰虛內熱之輕證也若夫證之重者請更得而申論之夫所謂陰者水也水者天一之所生乃真陰也水為陰陰中之陽精也陰中之陰血也精與血皆水之所化人言陰但言血而不言精者從其純陰而言故與陽對稱必曰氣血也人自稟賦以來氣血本應均平其或父母之氣偏陽偏陰抑或情識初開早肆雕琢更有中年之人稟素不弱止因過用乏竭精血漸少以致火日盛水日虧真陰耗散而陰為之虛矣然陰水者所以配陽而制火者也水愈虧則火愈熾火寡所畏而熱於內是火之熱於內也非真火氣有餘也陰虛水涸不能制火故火獨盛如勞瘵之證是也昧者不解其故每以苦寒治火間有少知讀書者則又以桂附引火歸源噫豈知此證正治固非所宜即從治之法亦不可用蓋內熱原本於陰虛下已無水故令火升若用桂附以降火火既獨盛無水相濟隨降隨升其火益熾矣與至真要大論所言從治反治陰證似陽之可以引火歸源者不同惟宜純陰補水之劑滋陰以降火使真陰漸充浮焰自息王太僕曰壯水之主以制陽光誠千古不易之治法也奈何今之治勞瘵者不知其為下無水而火上升竟錯認為內真寒而外假熱妄投薑桂更用參附不壯水而反益火使輕者轉重重者立斃抱薪救火殊可嘆也帝曰陽盛生外熱奈何岐伯曰上焦不通利則皮膚緻密腠理閉塞不通按王本玄府不通甲乙經無玄府二字今去之衛氣不得泄越故外熱外傷寒毒內薄諸陽寒外盛則皮膚收皮膚收則腠理密故衛氣稸聚無所流行矣寒氣外薄陽氣內爭積火內燔故生外熱也帝曰陰盛生內寒奈何岐伯曰厥氣上逆寒氣積於胸中而不瀉不瀉則溫氣去寒獨留則血凝泣凝則脈不通按甲乙經作腠理不通其脈盛大以澀故中寒溫氣謂陽氣也陰逆內滿則陽氣去於皮外也帝曰夫子言虛實者有十生於五臟五臟五脈耳夫十二經脈皆生百病按王本生其病甲乙經作生百病從之今夫子獨言五臟夫十二經脈者皆絡三百六十五節節有病必被經脈經脈之病皆有虛實何以合之岐伯曰五臟者六腑與為表裡經絡支節各生虛實其病所居隨而調之病在脈調之血脈者血之府脈實血實脈虛血虛由此脈病而調之血也按甲乙經作病在血調之脈疑與下文意重不若王本為妥病在血調之絡按注云血病則絡脈易殊缺明快蓋血榮一身不獨絡也調之絡者謂血之流行由絡走經故病在血分必調其經絡也病在氣調之衛衛主氣故氣病而調之衛也病在肉調之分肉按擁護一身者肉也然而前後左右各有部分故曰分肉肉之所分經絡系焉觀其病在何部則知其內屬何經然後或用藥或用針也病在筋調之筋病在骨調之骨淬針藥尉按此調筋骨法也淬火針藥尉謂製藥以尉患處也注分筋骨誤矣病不知所痛兩蹺為上陰蹺之脈出於照海陽蹺之脈出於申脈身形有痛九候莫病則繆刺之莫病謂無病也繆刺者刺絡脈左痛刺右右痛刺左按脈無病而身有痛其病在外但繆刺之而其痛自止也標本病傳論先病為本後病為標標本固所當明而逆從尤不可不辨逆者宜先從者可後倘先其所可後而後其所宜先則失之遠矣黃帝問曰病有標本刺有逆從奈何岐伯對曰凡刺之方必別陰陽前後相應逆從得施標本相移故曰有其在標而求之於標有其在本而求之於本有其在本而求之於標有其在標而求之於本故治有取標而得者有取本而得者有逆取而得者有從取而得者得病之情知治大體則逆從皆可施必中焉故知逆與從正行無問知標本者萬舉萬當道不疑惑識既深明則無問於人正行皆當不知標本是謂妄行識猶褊淺道未高深舉且見違故行多妄夫陰陽逆從標本之為道也小而大言一而知百病之害著之至也觀其所舉則小尋其所利則大以斯明著故言一而知百病之害少而多淺而博可以言一而知百也按博多不外乎淺少是故貴乎知要也治反為逆治得為從先病而後逆者治其本先逆而後病者治其本先寒而後生病者治其本先病而後生寒者治其本先熱而後生病者治其本先熱而後生中滿者治其標先病而後泄者治其本先泄而後生他病者治其本必且調之乃治其他病先病而後生中滿者治其標先中滿而後煩心者治其本人有客氣有同氣小大不利治其標小大利治其本按病雖有標本之分而治當從緩急之勢勢之急而危者無過中滿小大不利二者而已故不論其屬標屬本而惟以先治為貴也病發而有餘本而標之先治其本後治其標病發而不足標而本之先治其標後治其本按有餘之病易治而無變故可由本以及標不足之病難治而多變故當先標而後本何者以緩急之勢不同也謹察間甚以意調之間者並行甚者獨行間謂多也甚謂少也多謂多形證而輕易少謂少形證而重難也以意調之謂審量標本不足有餘非謂舍法而以意妄為也按並行獨行謂間甚之治法也間病勢緩而證多尚可參用君佐以調治故云並行若病之甚者證危而勢急非簡要之藥不能治故云獨行也注以併為共受邪氣獨為一經受邪誤矣先小大不利而後生病者治其本按此再言小大不利為病最急則治之不可不早也夫病傳者心病先心痛按心為火臟火熾燔則痛也一日而咳心火勝金傳於肺也肺在變動為咳故爾三日脅支痛肺金勝木傳於肝也以其脈循脅肋故如是五日閉塞不通身痛體重肝木勝土傳於脾也按脾主運動為木所傷則不能運動故如是三日不已死冬夜半夏日中以勝相伐唯弱是從五臟四傷豈其能久故死於子午之時也按新校正云按靈樞經云大氣入臟病先發於心一日而之肺三日而之肝五日而之脾三日不已死冬夜半夏日中甲乙經云病先發於心心痛一日之肺而咳三日之肝脅支痛五日之脾閉塞不通身痛體重三日不已死冬夜半夏日中詳素問言其病靈樞言其臟甲乙經並素問靈樞之文而病與臟兼舉之肺病喘咳按肺主息主氣故病則喘咳三日而脅支滿痛肺傳於肝一日身重體痛肝傳於脾五日而脹按脾傳於腎水壅不行故脹注言自傳於腑誤矣十日不已死冬日入夏日出肝病頭目眩脅支滿肝脈內連目脅故如是三日體重身痛按肝傳於脾故體重身痛脾主肌肉故也注言傳肺又誤矣五日而脹自傳於腑三日腰脊少腹痛痙痠謂胃傳於腎以其脈起於足循腨內出膕內廉上股內後廉貫脊屬腎絡膀胱故如是三日不已死冬日入按甲乙經作日中夏早食卯正之時也脾病身痛體重脾主肌肉故爾一日而脹按脾傳胃也二日少腹腰脊痛脛痠胃傳於腎三日背𦛗筋痛小便閉按腎傳膀胱故便閉𦛗脊肉也脊開一寸五分為膀胱經脈邪傳入故痛靈樞經言之𦛗蓋謂此也𦛗音呂十日不已死冬人定夏晏食人定謂申後二十五刻晏食謂寅後二十五刻腎病少腹腰脊痛胻痠臟真下於腎故如是三日背𦛗筋痛小便閉自傳於腑按新校正云靈樞經云之𦛗膀胱是自傳於腑及之𦛗也三日腹脹膀胱傳於小腸按水傳火腑氣壅不行故脹甲乙作上之心心脹三日兩脅支痛腑傳於臟按新校正云按靈樞經云三日之小腸三日上之心今云兩脅支痛是小腸腑傳心臟而發痛也三日不已死冬大晨夏晏晡大晨大明時也晏晡向昏時也胃病脹滿以其脈循腹故按其脈雖循腹然胃為水穀之海胃病則不能化水穀故脹而滿也五日少腹腰脊痛䯒痠胃傳於腎三日背𦛗筋痛小便閉自傳於腑及之𦛗也五日身體重膀胱水腑傳於脾也按新校正云按靈樞經及甲乙經各云五日上之心是膀胱傳心為相勝而身體重今王氏言傳脾者誤也謹按身重本屬脾病傳心亦令身重不可不知也六日不已死冬夜半後夏日昳日昳謂午後八刻未正時也膀胱病小便閉以其為津液之腑故爾五日少腹脹腰脊痛䯒痠自歸於臟一日腹脹腎復傳於小腸一日身體痛小腸傳於脾按新校正云按靈樞經云一日上之心是腑傳於臟也甲乙經作之脾與王注同二日不已死冬雞鳴夏下晡雞鳴謂醜正之分下晡謂日下於晡申後時也諸病以次是相傳如是者皆有死期不可刺按五行以勝相傳言其常也若夫死期有相符者有未必相符者不可拘執間一臟及至三四臟者乃可刺也至三臟者皆是其己不勝之氣也至四臟者皆至己所生之父母也不勝則不能為害於彼所生則父子無克伐之期氣順以行故刺之可矣按王本間一臟止甲乙經無止字是也今刪之移精變氣論篇中專論脈色而末則歸重於一一者神也謂色為外候脈為內候神則攝乎內外之間脈色得之則善失之則凶治病之要惟此而已篇中以移精變氣為名者蓋由帝問古用祝由治病以移易精氣而即以引端之辭為名也景嶽注解明暢故採録之黃帝問曰余聞古之治病惟其移精變氣可祝由而已今世治病毒藥治其內針石治其外或愈或不愈何也移謂移易變謂變改皆使邪不傷正精神復強而內守也按張景嶽曰上古以全德之世邪不能侵故凡有疾病惟用祝由而已以其病不甚而治亦易也按明制醫術十三科曰大方脈曰小方脈曰婦人曰傷寒曰瘡瘍曰針灸曰眼曰口齒曰咽喉曰接骨曰金鏃曰按摩曰祝由今按摩祝由二科失其傳惟民間尚有之祝之救切岐伯對曰往古人居禽獸之間動作以避寒陰居以避暑內無眷慕之纍外無伸宦之形此恬憺之世邪不能深入也故毒藥不能治其內針石不能治其外故可移精祝由而已古者巢居穴處夕隱朝遊禽獸之間斷可知矣然動躁陽盛故身熱足以禦寒涼氣生寒故陰居可以避暑夫志捐思想則內無眷慕之纍心亡願欲故外無伸宦之形靜保天真自無邪勝是以移精變氣無假毒藥祝說病由不勞針石而已按張景嶽曰伸屈伸之情宦名利之纍內無眷慕外無趨求故曰恬憺之世祝咒同由病所從生也故曰祝由當今之世不然憂患緣其內苦形傷其外又失四時之逆從寒暑之宜賊風數至虛邪朝夕內至五臟骨髓外傷孔竅肌膚所以小病必甚大病必死故祝由不能已也帝曰善余欲臨病人觀死生決嫌疑欲知其要如日月光可得聞乎按日月之光有目共見此問治病之要欲求顯而易見也岐伯曰色脈者上帝之所貴先師之所傳也上帝上古之帝先師岐伯祖世之師僦貸季也上古使僦貸季理脈色而通神明合之金木水火土四時八風六合不離其常按張景嶽曰理色脈察內外之精微也通神明色脈辨而神明見也色脈之應無往不合如五行之衰王四時之往來八風之變六合之廣消長相依無不有常度也變化相移以觀其妙以知其要欲知其要則色脈是矣按張景嶽曰五行四時八風之氣迭有盛衰則變化相移色脈隨之而應故可以觀其妙知其要凡人之五臟六腑百骸九竅脈必由乎氣氣必合乎天雖其深微難測而惟於色脈足以察之故曰欲知其要則色脈是矣色以應日脈以應月常求其要則其要也按張景嶽曰色分五行而明晦是其變日有十二干而陰晴是其變故色以應日脈有十二經而虛實是其變月有十二建而盈縮是其變故脈以應月常求色脈之要則明如日月而得其變化之要矣夫色之變化以應四時之脈此上帝之所貴以合於神明也所以遠死而近生生道以長命曰聖王按脈隨時而應於內色應脈而形於外色脈相應死可遠而生自近矣惟古帝知之故能卻老全形動合神明而養生之道獨全也中古之治病至而治之湯液十日以去八風五痹之病十日不已治以草蘇草荄之枝本末為助標本已得邪氣乃服八風八方之風五痹謂皮肉筋骨脈之痹也按張景嶽曰中古之治病必病至而後治之其治也先以湯液湯液者五穀所制而非藥也服之十日而八風五痹之病可以去矣使十日不已則治以草蘇草荄之枝蘇葉也荄根也枝莖也根枝相佐故云本末為助即後世之湯劑也病原為本病變為標得其標本邪無不服此中古之治雖不若上古之見於未然而猶未若後世之誤也荄音該暮世之治病也則不然治不本四時不知日月不審逆從四時之氣各有所在不本其處而即妄攻是反古也四時刺逆從論曰春氣在經脈夏氣在孫絡長夏氣在肌肉秋氣在皮膚冬氣在骨髓當各隨其所在而闢伏其邪爾不知日月者謂日有寒溫明晦月有空滿盈虧也八正神明論曰凡刺之法必候日月星辰四時八正之氣氣定乃刺之是故天溫日明則人血淖液而衛氣浮故血易瀉氣易行天寒日陰則人血凝泣而衛氣沉月始生則血氣始精衛氣始行月廓滿則血氣盛肌肉堅月廓空則肌肉減經絡虛衛氣去形獨居是以因天時而調血氣也是故天寒無刺天溫無疑月生無瀉月滿無補月廓空無治是謂得時而調之此之謂也不審逆從者謂不審量其病可治與不可治也按張景嶽曰按太僕引經注此其說雖是而殊有未盡者如不本四時則有不知運氣之盛衰陰陽之消長故好用溫熱者忘天地之赫曦專用寒涼者昧主客之流衍五音皆有宜忌胡可視為泛常故五常政大論曰必先歲氣無伐無和設不知此而犯之如抱薪救火因雪加霜矣如不知日月王注即以日月為解然本篇所言原在色脈故不知色脈則心無參伍之妙診無表裡之明色脈不合者孰當舍證而從脈緩急相礙者孰當先此而後彼理趣不明其妄孰甚此色脈之參合必不可少故云日月也又若不審逆從則有氣色之逆從如玉版論要曰色見上下左右各在其要上為逆下為從女子右為逆左為從男子左為逆右為從有四時脈息之逆從如平人氣象論曰脈有逆從四時未有臟形春夏而脈瘦秋冬而脈浮大命曰逆四時也玉機真臟論曰所謂逆四時者春得肺脈夏得腎脈秋得心脈冬得脾脈其至皆懸絶沉澀者命曰逆四時也有脈證之逆從如平人氣象論曰風熱而脈靜泄而脫血脈實病在中脈虛病在外脈澀堅者皆難治命曰反四時也又玉機真臟論曰病熱脈靜泄而脈大脫血而脈實病在中脈實堅病在外脈不實堅者皆難治也有治法之逆從如至真要大論曰有逆取而得者有從取而得者逆正順也若順逆也又曰微者逆之甚者從之又曰逆者正治從者反治從少從多觀其事也五常政大論曰強其內守必同其氣可使平也假者反之是皆逆從之道醫所最當潛心者若不明四時脈證之逆從則不識生死之理而病必多失不明論治之逆從則必致妄投而絶人長命是真醫殺之耳此暮世之通弊也宜詳察之病形已成乃欲微針治其外湯液治其內粗工凶凶以為可攻故病未已新病復起按張景嶽曰既不能防於未然又不能察其見在心粗且淺針藥亂施若輩者意其為實而攻之則假實未去而真虛至意其為熱而寒之則故熱未去而新寒起是不足以治人而適足以害人耳帝曰余聞其要於夫子矣夫子言不離色脈此余之所知也岐伯曰治之極於一按張景嶽曰一之為道大矣萬事萬物之原也易曰天一生水堯曰惟精惟一允執厥中老子曰道生一一生二二生三三生萬物又曰天得一以清地得一以寧神得一以靈谷得一以盈萬物得一以生侯王得一以為天下貞孔子曰吾道一以貫之釋氏曰萬法歸一莊子曰通於一而萬事畢邵子曰天向一中分造化至真要等論曰知其要者一言而終不知其要流散無窮此曰治之極於一其道皆同也故人能得一則宇宙在乎手人能知一則萬化歸乎心矣帝曰何謂一岐伯曰一者因得之按天地萬物本於一則一者統辭也合之於病將何如蓋凡病之初起莫不有因隨其因而推求之則一可得矣欲得其一誠如下文是矣帝曰奈何按謂何如可得也岐伯曰閉戶塞牖系之病者數問其情以從其意得神者昌失神者亡帝曰善按此正求因得一之法也一者神而已矣神之得失未易遽窺也必使病者靜居一室之中耳無所聞目無所見然後委婉曲折叩問其衷情因事致宜順適其心意以觀其神明之得失則存亡可以立辨所謂治之極於一也如是而已景嶽通論一字之義甚確而以神與一分解似尚未之思也
