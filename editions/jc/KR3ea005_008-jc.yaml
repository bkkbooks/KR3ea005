body:
  text: 卷之八刺熱篇篇中所言皆真熱也熱蓄於內則證見於外故首言五臟之證證見則色自異故次言五臟之色既驗其色又辨其證則知病之所在而可以刺而去之矣故又次言五十九刺及諸應刺之穴乃以刺熱名篇焉肝熱病者小便先黃腹痛多臥身熱肝之脈環陰器抵少腹而上故小便不通先黃腹痛多臥也寒薄生熱身故熱焉熱爭則狂言及驚脅滿痛手足躁不得安臥經絡雖已受熱而神藏猶未納邪邪正相薄故云爭也肝之脈從少腹上挾胃貫膈布脅肋循喉嚨之後絡舌本故狂言脅滿痛也肝性靜而主驚駭故病則驚手足躁臥不得安庚辛甚甲乙大汗氣逆則庚辛死肝主木庚辛為金金剋木故甚於庚辛也甲乙為木故大汗於甲乙刺足厥陰少陽厥陰肝脈少陽膽脈其逆則頭痛員員脈引沖頭也肝之脈自舌本循喉嚨之後上出額會於巔故頭員員然脈引衝於頭中也員員謂似急也按本篇所言熱病皆實證也與諸篇之兼虛實者不同氣逆非喘逆謂病甚而氣潰亂也心熱病者先不樂數日乃熱按不樂者謂起居不適意也心為火臟其氣本熱心病則火不安其位而熱形焉故心之見熱病其熱未遽見也必先有所苦而後病乃見於數日之後熱爭則心卒痛煩悶善嘔頭痛面赤無汗心手少陰脈起於心中其支別者從心系上挾咽小腸之脈直行者循咽下膈抵胃其支別者從缺盆循頸上頰至目銳眥故卒心痛煩悶善嘔頭痛面赤也心在液為汗今病熱故無汗以出壬癸甚丙丁大汗氣逆則壬癸死按火畏水故甚而死自得其位故大汗刺手少陰太陽少陰心脈太陽小腸脈脾熱病者先頭重頰痛煩心顏青欲嘔身熱胃之脈起於鼻交頞中下循鼻外入上齒中還出挾口環唇下交承漿卻循頤後下廉出大迎循頰車上耳前過客主人循髮際至額顱故先頭重頰痛顏青也脾之脈支別者復從胃上膈注心中其直行者上膈挾咽故煩心欲嘔而身熱也按新校正云甲乙經太素云脾熱病者先頭重顏痛無顏青二字熱爭則腰痛不可用俯仰腹滿泄兩頷痛胃之脈支別者起胃下口循腹裡下至氣街中而合以下髀氣街者腰之前故腰痛也脾之脈入腹屬脾絡胃又胃之脈自交承漿卻循頤後下廉出大迎循頰車故腹滿泄而兩頷痛甲乙甚戊己大汗氣逆則甲乙死按木伐土故甚而死土得氣故大汗刺足太陰陽明太陰脾脈陽明胃脈肺熱病者先淅然厥起毫毛惡風寒舌上黃身熱肺主皮膚外養於毛故熱中之則淅然惡風寒起毫毛也肺之脈起於中焦下絡大腸還循胃口今肺熱入胃胃熱上升故舌上黃而身熱熱爭則喘咳痛走胸膺背不得太息頭痛不堪汗出而寒肺居膈上氣主胸膺在變動為咳又藏氣而主呼吸復為胸中之府故喘咳痛走胸膺背不得太息也肺之絡脈上會耳中今熱氣上熏故頭痛不堪汗出而寒丙丁甚庚辛大汗氣逆則丙丁死按火爍金故甚而死金得氣故大汗刺手太陰陽明出血如大豆立已太陰肺脈陽明大腸脈其絡脈盛者乃刺而出之腎熱病者先腰痛䯒痠苦渴數飲身熱膀胱之脈從肩髆內挾脊抵腰中又腰為腎之府故先腰痛也又腎之脈自循內踝之後上踹內出膕內廉又直行者從腎上貫肝膈入肺中循喉嚨挾舌本故䯒痠苦渴數飲身熱熱爭則項痛而強䯒寒且酸足下熱不欲言膀胱之脈從腦出別下項又腎之脈起於小趾之下斜趨足心出於然骨之下循內踝之後別入跟中以上䯒內又其直行者從腎上貫肝膈入肺中循喉嚨挾舌本故病如是也其逆則項痛員員淡淡然腎之筋循脊內挾膂上至項結於枕骨與膀胱之筋合膀胱之脈又並下於項故項痛員員然也淡淡似欲不定也戊己甚壬癸大汗氣逆則戊己死按土刑水故甚而死水得氣故大汗刺足少陰太陽少陰腎脈太陽膀胱脈按五臟氣逆之證經文止有肝腎而心脾肺注謂經闕文恐未必然也蓋五臟之位肝腎居下氣逆則病自下而上故肝則頭痛腎則項痛也若心肺脾位本在上頭面之證已見故不必更言氣逆病也非闕文其五臟各言氣逆則死者謂至所不勝之日則病甚氣必潰亂而死也諸汗者至其所勝日汗出也氣王日為所勝王則勝邪故各當其王日汗按此總結以上所言汗日也有汗而愈者有汗而未必愈者而要之汗必見於其所勝之日也肝熱病者左頰先赤肝氣合木木氣應春南面正理之則其左頰也心熱病者顏先赤心氣合火火氣炎上指象明候故候於顏顏額也脾熱病者鼻先赤脾氣合土土王於中鼻處面中故占鼻也肺熱病者右頰先赤肺氣合金金氣應秋南面正理之則其右頰也腎熱病者頤先赤腎氣合水水惟潤下指象明候故候於頤也病雖未發見色赤者刺之名曰治未病按病未發而色先見於此治之重可使輕危者得安是所貴乎上工也熱病從部所起者至期而已按部謂如上所言面中部分也期謂五臟所主之日期如肝主甲乙心主丙丁之類也熱起何部按部尋經早為施治或汗而表其邪或寒而清其火至其應王之期自無不愈也其刺之反者三周而已按刺之為道補瀉而已如應補而反瀉應瀉而反補皆反也刺之既反病必牽纏難愈三周言重複也重逆則死先刺已反病氣流傳又反刺之是為重逆一逆刺之尚至三周乃已況其重逆而得生耶諸治熱病以飲之寒水乃刺之必寒衣之居止寒處身寒而止也按是所謂治熱以寒也身寒猶身涼謂熱退也言誠飲寒衣寒居處於寒則身熱退而病止也熱病先胸脅痛手足躁刺足少陽補足太陰足少陽木病而瀉足少陽之木氣補足太陰之土氣者恐木傳於土也按新校正云詳足太陰全元起本及太素作手太陰楊上善云手太陰上屬肺出腋下故胸脅痛又按靈樞經云熱病而胸脅痛手足躁取之筋間以第四針索筋於肝不得索之於金金肺也以此決知作手太陰者為是此作手太陰者是補金以平木也注恐木傳土故補土亦是也今兩存之病甚者為五十九刺五十九刺者謂頭上五行行五者以越諸陽之熱逆也大杼膺俞缺盆背俞此八者以瀉胸中之熱也氣街三里巨虛上下廉此八者以瀉胃中之熱也雲門髃骨委中髓空此八者以瀉四肢之熱也五臟俞旁五此十者以瀉五臟之熱也凡此五十九穴者皆熱之左右也故病甚則爾刺之然頭上五行者當中行謂上星囟會前頂百會後頂次兩旁謂五處承光通天絡卻玉枕又次兩旁謂臨泣目窗正營承靈腦空也上星在顱上直鼻中央入髮際一寸陷者中容豆刺四分按新校正云甲乙經四分作三分水熱穴論注亦作三分當改從之上星刺入三分囟會刺入四分囟會在上星後一寸陷者中刺如上星法前頂在囟會後一寸五分骨間陷者中刺如囟會法百會在前頂後一寸五分頂中央旋毛中陷容指督脈足太陽脈之交會刺如上星法後頂在百會後一寸五分枕骨上刺如囟會法然是五者皆督脈氣所發也上星留六呼灸五壯次兩旁穴五處在上星兩旁一寸五分承光在五處後一寸通天在承光後一寸五分絡卻在通天後一寸五分玉枕在絡卻後七分然是五者並足太陽脈氣所發刺三分五處通天各留七呼絡卻留五呼玉枕留三呼灸三壯按新校正云甲乙經承光不可灸玉枕刺入二分又次兩旁臨泣在頭直目上入髮際五分足太陽少陽陽維三脈之會目窗正營遞相去一寸承靈腦空遞相去一寸五分然是五者並足少陽陽維二脈之會腦空一穴刺四分余並可刺三分臨泣留七呼灸五壯大杼在項第一椎下兩旁相去各一寸半陷者中督脈別絡足太陽手太陽三脈氣之會刺三分留七呼灸五壯膺俞膺中俞也正名中府在胸中行兩旁相去六寸雲門下一寸乳上三肋間動脈應手陷者中仰而取之手足太陰脈之會刺三分留五呼灸五壯缺盆在肩上橫骨陷者中手陽明脈氣所發刺二分留七呼灸三壯背俞當是風門熱府在第二椎下兩旁各一寸半督脈足太陽之會刺五分留七呼灸五壯驗今明堂中誥圖經不言背俞未詳果何處也按新校正云王注水熱穴論以風門熱府為背俞又注氣穴論以大杼為背俞此注云未詳三注不同蓋疑之也氣街在腹齊下橫骨兩端鼠鼷上一寸動應手足陽明脈氣所發刺三分留七呼灸五壯三里在膝下三寸䯒外廉兩筋肉分間足陽明脈之所入也刺一寸留七呼灸三壯巨虛上廉足陽明與太陽合在三里下三寸足陽明脈氣所發刺八分灸三壯巨虛下廉足陽明與少陽合在上廉下三寸足陽明脈氣所發刺三分灸三壯雲門在巨骨下胸中行兩旁按新校正云氣穴論注胸中行兩旁作挾任脈旁橫去任脈文雖異穴之處所則同相去六寸動脈應手中府當其下一寸雲門手太陰脈氣所發舉臂取之刺七分灸五壯驗今明堂中誥圖經不載髃骨穴尋其穴以瀉四肢之熱恐是肩髃穴穴在肩端兩骨間手陽明蹺脈之會刺六分留六呼灸三壯委中在足膝後屈處膕中央約文中動脈足太陽之所入也刺五分留七呼灸三壯髓空者正名腰俞在脊中第二十一椎節下間督脈氣所發刺二分按甲乙經作二寸熱穴論注亦作二寸恐太深當以氣府論注水穴論注及此注作二分為近理也留七呼灸三壯五臟俞旁五者謂魄戶神堂魂門意舍志室五穴也在挾脊兩旁各相去三寸並足太陽脈氣所發也魄戶在第三椎下兩旁正坐取之刺五分灸五壯神堂在第五椎下兩旁刺三分灸五壯魂門在第九椎下兩旁正坐取之刺五分灸三壯意舍在第十一椎下兩旁正坐取之刺五分灸三壯志室在第十四椎下兩旁正坐取之刺五分灸三壯是所謂此經之五十九刺法也若針經五十九刺則殊與此不同雖俱治熱病之要穴然合用之理全向背猶當以病候形症所應經法即隨所證而刺之熱病始手臂痛者刺手陽明太陰而汗出止手臂痛列缺主之列缺者手太陰之絡去腕上一寸半別走陽明者也刺三分留三呼灸五壯欲出汗商陽主之商陽者手陽明脈之井在手大指次指內側去爪甲角如韭葉手陽明脈之所出也刺一分留一呼灸三壯熱病始於頭首者刺項太陽而汗出止天柱主之天柱在俠項後髮際大筋外廉陷者中足太陽脈氣所發刺二分留六呼灸三壯熱病始於足脛者刺足陽明而汗出止按新校正云此條素問本無太素亦無今按甲乙經添入熱病先身重骨痛耳聾好瞑刺足少陰據經無正主穴當補瀉井滎爾按新校正云靈樞經云熱病而身重骨痛耳聾而好瞑取之骨以第四針索骨於腎不得索之土土者脾也病甚為五十九刺如古法熱病先眩冒而熱胸脅滿刺足少陰少陽亦井滎也太陽之脈色榮顴骨熱病也榮飾也謂赤色見於顴骨如榮飾也顴骨謂目下當外眥也太陽合火故見赤色按新校正云楊上善云赤色榮顴者骨熱病也與王氏之注不同榮未交按甲乙經太素並作榮未夭似是但與下文爭見義不切不若交字為妥曰今且得汗待時而已榮一為營字之誤也曰者引古經法之端由也言色雖明盛但陰陽之氣不交錯者故法云今且得汗之而已待時者謂肝病待甲乙心病待丙丁脾病待戊己肺病待庚辛腎病待壬癸是謂待時而已所謂交者次如下文與厥陰脈爭見者死期不過三日外見太陽之赤色內應厥陰之弦脈然太陽受病當傳入陽明今反厥陰之脈來見者是土敗而木賊之也故死木生數三故期不過三日少陽之脈色榮頰筋熱病也按舊本筋作前讀作頰前注云即顴骨是與前太陽無異矣新校正云甲乙經太素前字並作筋楊上善云足少陽部在頰赤色榮之即知筋熱病也今改從之蓋少陽亦屬木也榮未交曰今且得汗待時而已與少陰爭見者死期不過三日少陽受病當傳入於太陰今反少陰脈來見亦土敗而木賊之也故死不過三日亦木之數然按新校正云舊本及甲乙太素並無期不過三日五字此蓋王氏足成此文也熱病氣穴三椎下間主胸中熱四椎下間主膈中熱五椎下間主肝熱六椎下間主脾熱七椎下間主腎熱榮在骶也脊節之謂椎脊窮之謂骶言腎熱之氣外通尾骶也椎間所主神臟之熱又不正當其臟俞而云主療在理未詳按脊節二十一節督脈道也身之有脊猶屋之有柱蓋一身之骨幹也今經所主蓋就上中下部分而言非若穴俞之相配故不與臟俞相當王氏未之思也項上三椎陷者中也此舉數脊椎大法也言三椎下間主胸中熱者何以數之言皆當以陷者中為氣發之所按言項三椎而其餘可以類推矣頰下逆顴為大瘕下牙車為腹滿顴後為脅痛頰上者膈上也此所以候面部之色發明腹中之病診按逆自下而上也頰在顴下逆顴謂由頰上至於顴瘕氣塊也刺瘧篇此以針灸治瘧法也然經止言刺某經而穴俞補瀉之法賴注言之甚詳啟玄真足不朽矣但前半既言足六經瘧而後又出肝脾腎胃及心肺六瘧參錯不齊應綴集成篇者也足太陽之瘧令人腰痛頭重寒從背起足太陽脈從巔入絡腦還出別下項循肩髆內挾脊抵腰中其支別者從髆內左右別下貫胂過髀樞故令腰痛頭重寒從背起按三部九候論注與刺腰痛注貫胂俱作貫臀又厥論注及甲乙經與此注俱作貫胂胂脊肉也臀人身坐處肉也臀與胂相去頗遠未知孰是先寒後熱熇熇暍暍然熇熇甚熱狀暍暍亦熱盛也太陽不足故先寒寒極則生熱故後熱也按熇音郝暍音渴熱止汗出難已熱生是為氣虛熱止則為氣復氣復而汗反出此為邪氣盛而真不勝故難已按新校正云全元起本並甲乙太素巢元方並作先寒後熱渴渴止汗出與此文異刺郄中出血太陽之郄是謂金門金門在足外踝下一名曰關梁陽維所別屬也刺三分灸三壯黃帝中誥圖經云委中主之則古法以委中為郄中也委中在膕中央約文中動脈足太陽之所入也刺五分留七呼灸三壯按新校正云詳刺郄中甲乙經作膕中今王氏兩注之當以膕中為正足少陽之瘧令人身體解㑊寒不甚熱不甚惡見人見人心惕惕然按解㑊解已見前少陽膽也合於肝而主筋病則筋不束骨肢體為之懈惰也少陽之病兼寒熱而其脈則主半表半裡故寒不甚熱不甚也膽虛則驚而惡人故又惕惕然也注以寒熱不甚為解㑊誤矣熱多汗出甚按雖兼寒而熱較多邪乘虛也邪入肝膽則風動故汗出甚也刺足少陽俠谿主之俠谿在足小趾次趾岐骨間本節前陷者中少陽之滎刺三分留三呼灸三壯足陽明之瘧令人先寒灑淅灑淅寒甚久乃熱熱去汗出喜見日月光火氣乃快然陽虛則外先寒陽虛極則復盛故寒甚久乃熱也熱去汗已陰又內強陽不勝陰故喜見日月光火氣乃快然也按再言灑淅狀寒甚也刺足陽明跗上衝陽穴也在足跗上五寸骨間動脈上去陷谷三寸陽明之原刺三分留十呼灸三壯足太陰之瘧令人不樂好太息心氣流於肺則喜今脾臟受病心母救之火氣下入於脾不上行於肺又太陰脈支別者從胃上膈注心中故令人不樂好太息也按太讀作嘆不嗜食多寒熱汗出按脾主運化今既受邪則滯膩而不知味惟不知味是以不嗜也多寒熱甲乙經作多寒少熱與此文異病至則善嘔嘔已乃衰嘔胃病也胃與脾相配邪既入脾則氣及於胃故善嘔嘔則邪散故衰也注惟以經穴為解未見發揮即取之言衰即取之井俞及公孫也公孫在足大趾本節後一寸太陰絡也刺四分留七呼灸三壯足少陰之瘧令人嘔吐甚多寒熱熱多寒少足少陰脈貫肝膈入肺中循喉嚨故嘔甚多寒熱也腎為陰臟陰氣生寒今陰氣不足故熱多寒少按新校正云甲乙經云嘔吐甚多寒少熱欲閉戶牖而處其病難已胃陽明脈病欲獨閉戶牖而處今胃證反見於腎水之中土刑于水故其病難已也大鐘太谿悉主之大鐘在足內踝后街中少陰絡也刺二分留七呼灸三壯太谿在足內踝後跟骨上動脈陷者中少陰俞也刺三分留七呼灸三壯按新校正云甲乙經云其病難已取太谿又大鐘穴甲乙經作跟後沖中刺腰痛篇注作跟后街中水穴注在內踝後此注云內踝后街中諸注不同當以甲乙經為正足厥陰之瘧令人腰痛少腹滿小便不利如癃狀非癃也數噫恐懼氣不足腹中悒悒足厥陰脈循股陰入髦中環陰器抵少腹故病如是癃謂不得小便也悒悒不暢之貌按王本數便意甲乙經作數噫二字是也今改從之刺足厥陰大沖主之在足大趾本節後二寸陷者中厥陰俞也刺三分留十呼灸三壯按刺腰痛篇注云在本節後內間動脈與此注異未知孰是肺瘧者令人心寒寒甚熱熱間善驚如有所見者刺手太陰陽明列缺主之列缺在手腕後一寸半手太陰絡也刺三分留三呼灸五壯陽明穴合谷主之合谷在手大指次指岐骨間手陽明脈所過也刺三分留六呼灸三壯按肺主皮毛不能捍邪令得深入故心寒也寒甚熱謂寒甚於熱肺受邪則皮毛灑淅而惡寒也熱間善驚者邪盛木強乘金之虛而反侮之故熱少退則善驚而如有所見肺為邪傷故然也心瘧者令人煩心甚欲得清水反寒多不甚熱刺手少陰神門主之神門在掌後銳骨之端陷者中手少陰俞也刺三分留七呼灸三壯按心藏火得邪則火益熾故煩甚而欲清水也火內熾則外轉寒故不甚熱而多寒應熱而寒故曰反也肝瘧者令人色蒼蒼然大息其狀若死者刺足厥陰見血中封主之中封在足內踝前一寸半陷者中仰足而取之伸足乃得之足厥陰經也刺出血止常刺者可入四分留七呼灸三壯按前已言足六經之瘧矣茲又出肝脾腎胃四瘧乃其證與前異少膽與膀胱瘧更肺心二瘧居手經之二不知何故豈一經之證多端前言之未盡後更變其文以暢之抑本非同篇古人或因其均為論瘧故合為一篇是以文義參錯歟皆未可知也蒼青色老瘁也肝邪自病故色蒼人郁不樂則嘆息邪氣抑肝故嘆息若死狀也脾瘧者令人寒腹中痛熱則腸中鳴鳴已汗出刺足太陰商丘主之商丘在足內踝下微前陷者中足太陰經也刺三分留七呼灸三壯按脾經內主腸腹故寒則痛熱則鳴也腎瘧者令人洒洒然腰脊痛宛轉大便難目眴眴然手足寒刺足太陽少陰大鐘主之取如前足少陰瘧中法按本篇論瘧諸證前後殊別病本多端其不同宜也乃王氏之注穴俞刺灸亦皆差別其相同者惟此腎瘧一則而已詳求其義差別者是則相同者非蓋後證既與前異則穴俞自應不同何得仍如前法也胃瘧者令人善飢而不能食食而支滿腹大胃熱脾虛故善飢而不能食食則支滿腹大也是以下文兼刺太陰刺足陽明太陰橫脈出血厲兌解谿三里主之厲兌在足大趾次趾之端去爪甲如韭葉陽明井也刺一分留一呼灸一壯解谿在衝陽後三寸半腕上陷者中陽明經也刺五分留五呼灸三壯三里在膝下三寸䯒骨外廉兩筋肉分間陽明合也刺一寸留七呼灸三壯然足陽明取此三穴足太陰刺其橫脈出血也橫脈謂足內踝前斜過大脈則太陰之經脈也按此注云解谿在衝陽後三寸半氣穴論注二寸半甲乙經作一寸半當以甲乙為正瘧脈緩大虛便宜用藥不宜用針緩者中風大為氣實虛者血虛血虛氣實風又攻之故宜藥治以遣其邪不宜針瀉而出血也按注以大為氣實誤矣大而有力乃為實今大而兼虛其為無力可知故宜藥以補正而祛邪不宜用針泄氣更增其虛也凡治瘧先發如食頃乃可以治過之則失時也先其發時真邪異居波隴不起故可治過時則真邪相合攻之則反傷真氣故曰失時刺腰痛篇人之一身屈伸俯仰惟腰是賴故病則多痛自足太陽以至奇經別絡等並令腰痛者或經之所至或絡之所繫或脈之所過世以為盡屬肝腎者誤也足太陽脈令人腰痛引項脊尻背如重狀足太陽脈別下項循肩髆內挾脊抵腰中別下貫臀故令人病如是也按新校正云甲乙經貫臀作貫胂刺瘧論注亦作貫胂三部九候論注作貫臀刺其郄中太陽正經出血春無見血郄中委中也在膝後屈處膕中央約文中動脈足太陽脈之所入也刺五分留七呼灸三壯太陽合腎腎王於冬水衰於春故春無見血也少陽令人腰痛如以針刺其皮中循循然不可以俯仰不可以顧足少陽脈繞髦際橫入髀厭中故令腰痛如以針刺其皮中循循然不可以俯仰膽足少陽之脈起於目銳眥上抵頭角下耳後循頸行手陽明之前至肩上交出手少陽之後其支別者目銳眥下入大迎合手少陽於䪼下加頰車下頸合缺盆故不可以顧按新校正云甲乙經行手陽明之前作行手少陽之前也刺少陽成骨之端出血成骨在膝外廉之骨獨起者夏無見血成骨謂膝外近下䯒骨上端兩起骨相併間陷容指者也䯒骨所成柱膝髀骨故謂之成骨也少陽合肝肝王於春木衰於夏故無見血也陽明令人腰痛不可以顧顧如有見者善悲足陽明脈起於鼻交頞中下循鼻外入上齒中還出挾口環唇下交承漿卻循頤後下廉出大迎其支別者從大迎前下人迎循喉嚨入缺盆又其支別者起胃下口循腹裡至氣街中而合以下髀故令人腰痛不可顧顧如有見者陽虛故悲也刺陽明於䯒前三痏上下和之出血秋無見血內經中誥流注圖經陽明脈穴俞之所主此腰痛者悉刺䯒前三痏則正三里穴也陽明合脾脾王長夏土衰於秋故秋無見血按新校正云甲乙經䯒作骭痏音委足少陰令人腰痛痛引脊內廉足少陰脈上股內後廉貫脊屬腎故令人腰痛痛引脊內廉也按新校正云全元起本脊內廉作脊內痛太素亦同此前少足太陰腰痛證並刺足太陰法應古脫簡也刺少陰於內踝上二痏春無見血出血太多不可復也內經中誥流注圖經少陰脈穴俞所主此腰痛者當刺內踝上則正復溜穴也復溜在內踝後上二寸動脈陷者中刺三分留三呼灸五壯厥陰之脈令人腰痛腰中如張弓弩弦足厥陰脈自陰股環陰器抵少腹其支別者與太陰少陽結於腰髁下挾脊第三第四骨空中其穴即中髎下髎故腰痛則中如張弓弩之弦也如張弦者言強急之甚刺厥陰之脈在腨踵魚腹之外循之累累然乃刺之腨踵者言脈在腨外側下當足跟也腨形勢如臥魚之腹故曰魚腹之外也循其分肉有血絡累累然乃刺之此正當蠡溝穴分足厥陰之絡在內踝上五寸別走少陽者刺二分留三呼灸三壯按經言厥陰之脈注言厥陰之絡新校正疑是經誤非也蓋脈者統辭可以兼絡而言非誤也其病令人言默默然不慧刺之三痏厥陰之脈循喉嚨之後上入頏顙絡於舌本故病則善言風盛則昏冒故不爽慧也三刺其處腰痛乃除按新校正云經云善言默默然不慧善言與默默二病難相兼全元起無善字於義為允今改從之又甲乙經厥陰之脈不絡舌本王氏於素問中五處引注而注厥論與刺熱論及此三篇皆云絡舌本注風論痹論二篇不言絡舌本蓋王氏亦疑而兩言之也解脈令人腰痛痛引肩目䀮䀮然時遺溲解脈散行脈也言不合而別行也此足太陽之經起於目內眥上額交巔上循肩髆挾脊抵腰中入循膂絡腎屬膀胱下入膕中故病斯候也又其支別者從髆內別下貫胂循髀外後廉而下合於膕中兩脈如繩之解股故名解脈也刺解脈在膝筋肉分間郄外廉之橫脈出血血變而止膝後兩旁大筋雙上股之後兩筋之間橫文之處努肉高起則郄中之分也古中誥以膕中為太陽之郄當取郄外廉有血絡橫見迢然紫黑而盛滿者乃刺之當見黑血必候其血色變赤乃止血不變赤極而瀉之必行血色變赤乃止此太陽中經之為腰痛也解脈令人腰痛如引帶常如折腰狀善恐足太陽之別脈自肩而別下循背脊至腰而橫入髀外後廉而下合膕中故若引帶如折腰之狀按新校正云甲乙經如引帶作如裂善恐作善怒也刺解脈在郄中結絡如黍米刺之血射以黑見赤血而已郄中則委中穴足太陽合也即膝後屈處膕中央約文中動脈刺五分留七呼灸三壯此經刺法也今則取其結絡大如黍米者當黑血箭射而出見血變赤然可止也按新校正云全元起云有兩解脈病源各異恐誤未詳同陰之脈令人腰痛痛如小錘居其中怫然腫足少陽之別絡也並足少陽經上行去足外踝上五寸乃別走厥陰並經下絡足跗故曰同陰脈也怫怒也言腫如嗔怒也按新校正云太素小錘作小針刺同陰之脈在外踝上絕骨之端為三痏絕骨之端如前三分陽輔穴也足少陽脈所行刺五分留七呼灸三壯陽維之脈令人腰痛痛上怫然腫陽維起於陽則太陽之所生奇經八脈此其一也刺陽維之脈脈與太陽合腨下間去地一尺所太陽所生與正經並行而上至腨下復與太陽合而上也腨下去地一尺是則承光穴在銳腨腸下肉分間陷者中刺七分灸五壯以其取腨腸下肉分間故云合腨下間按新校正云穴之所在乃承山非承光也山字誤為光衡絡之脈令人腰痛不可以俯仰仰則恐僕得之舉重傷腰衡絡絕惡血歸之衡橫也謂太陽之外絡自腰中橫入髀外後廉而下與中經合於膕中者今舉重傷腰則橫絡絕中經獨盛故腰痛不可以俯仰矣一經作沖絕之脈傳寫魚魯之誤也若是衝脈中誥不應取太陽脈委陽殷門之穴也刺之在郄陽筋之間上郄數寸衡居為二痏出血橫居二穴謂委陽殷門平視橫相當也郄陽謂浮郄穴上側委陽穴也筋之間謂膝後膕中兩筋之間殷門穴也二穴各去臀下橫文六寸故曰上郄數寸也委陽刺七分留五呼灸三壯殷門刺五分留七呼灸三壯故曰衡居為二痏按新校正云詳王氏雲浮郄穴上側委陽穴也按甲乙經委陽在浮郄穴下一寸不得言上側也會陰之脈令人腰痛上漯漯然汗出汗乾令人慾飲飲已欲走足太陽之中經也其脈循腰下會於後陰故曰會陰之脈其經自腰下行至足今陽氣大盛故痛上漯漯然汗出汗液既出則腎燥陰虛故汗乾令人慾飲水以救腎也水入腹已腎氣復生陰氣流行太陽又盛故飲水已又欲走也按漯他合切汗出貌刺直陽之脈上三痏在蹺上郄下五寸橫居視其盛者出血直陽之脈則太陽之脈挾脊下行貫臀下至膕中下循腨過外踝之後條直而行者故曰直陽之脈也蹺為陽蹺所生申脈穴在外踝下也郄下則膕下也言此刺處在膕下五寸上承郄中之穴下當申脈之位是謂承筋穴即腨中央如外陷者中也太陽脈氣所發禁不可刺灸三壯今云刺者謂刺其血絡之盛滿者也兩腨皆有太陽經氣下行當視兩腨中央有血絡盛滿者乃刺出之故曰視其盛者出血按新校正云詳上云會陰之脈令人腰痛此云刺直陽之脈者詳此直陽之脈即會陰之脈也文變而事不殊又承筋穴注云腨中央如外甲乙經及骨空論注無如外字飛陽之脈令人腰痛痛上怫怫然甚則悲以恐是陰維之脈也去內踝上五寸腨分中並少陰經而上也少陰之脈前則陰維脈所行也足少陰之脈從腎上貫肝膈入肺中循喉嚨挾舌本其支別者從肺出絡心注胸中故甚則悲以恐也恐者生於腎悲者生於心按悲為肺志注謂生於心誤矣刺飛陽之脈在內踝上五寸按甲乙經作二寸少陰之前與陰維之會內踝後上五寸復溜穴少陰脈所行刺三分內踝之後築賓穴陰維之郄刺三分灸五壯少陰之前陰維之會以三脈會在此穴位分也刺三分灸五壯今中誥經文正同此法按甲乙經足太陽之絡別走少陰者名曰飛揚在外踝上七寸又云築賓陰維之郄在內踝上踹分中復溜穴在內踝上二寸今此經注都與甲乙經不合者疑經注中五寸字當作二寸則素問與甲乙相應矣昌陽之脈令人腰痛痛引膺目䀮䀮然甚則反折舌卷不能言陰蹺脈也陰蹺者足少陰之別也起於然骨之後上內踝之上直上循陰股入陰而循腹上入胸裡入缺盆上出人迎之前入頄內廉屬目內眥會於太陽陽蹺而上行故腰痛之狀如此刺內筋為二痏在內踝上大筋前太陰後上踝二寸所內筋謂大筋之前分肉也太陰後大筋前即陰蹺之郄交信穴也在內踝上二寸少陰前太陰後筋骨之間陷者之中刺四分留五呼灸三壯散脈令人腰痛而熱熱甚生煩腰下如有橫木居其中甚則遺溲散脈足太陰之別也散行而上故以名焉其脈循股內入腹中與少陰少陽結於腰髁下骨空中故病則腰下如有橫木居其中甚乃遺溲也刺散脈在膝前骨肉分間絡外廉束脈為三痏謂膝前內側也骨肉分謂膝內輔骨之下下廉腨肉之兩間也絡外廉則太陰之絡色青而見者也輔骨之下後有大筋擷束膝䯒之骨令其連屬取此筋骨系束之處脈以去其病是曰地機三刺而已故曰束脈為之三痏也肉裡之脈令人腰痛不可以咳咳則筋束急肉裡之脈少陽所生則陽維之脈氣所發也里里也刺肉裡之脈為二痏在太陽之外少陽絕骨之後分肉主之一經云少陽絕骨之前傳寫誤也絕骨之前足少陽脈所行絕骨之後陽維脈所過故指曰在太陽之外少陽絕骨之後也分肉穴在足外踝直上絕骨之端如後二分筋肉分間陽維脈氣所發刺五分留十呼灸三壯按新校正云分肉之穴甲乙經不見與氣穴注兩出而分寸不同氣穴注二分作三分五分作三分十呼作七呼腰痛挾脊而痛至頭𠘧𠘧然目䀮䀮然欲僵仆刺足太陰郄中出血郄中委中按新校正云太素作頭沉沉然𠘧音殊鳥短羽也腰痛上寒刺足太陽陽明上熱刺足厥陰不可以俯仰刺足少陽中熱而喘刺足少陰刺郄中出血此法玄妙中誥不同莫可窺測當用知其應不爾皆應先去血絡乃調之也腰痛上寒不可顧刺足陽明上寒陰市主之陰市在膝上三寸伏兔下陷者中足陽明脈氣所發刺三分留七呼灸三壯不可顧三里主之三里在膝下三寸䯒外廉兩筋肉分間足陽明脈之所入也刺一寸留七呼灸三壯上熱刺足太陰地機主之地機在膝下五寸足太陰之郄也刺三分灸三壯中熱而喘刺足少陰湧泉大鐘悉主之湧泉在足心陷者中屈足卷指宛宛中足少陰脈之所出刺三分留三呼灸三壯大鐘在足跟後沖中動脈足少陰之絡刺二分留七呼灸三壯按新校正云刺瘧注大鐘在內踝後沖中水穴論注在內踝後此注在跟後沖中動脈三注不同甲乙經亦云跟後沖中當從甲乙經為正大便難刺足少陰湧泉主之少腹滿刺足厥陰太衝主之在足大趾本節後內間二寸陷者中動脈應手足厥陰脈之所注也刺三分留十呼灸三壯如折不可以俯仰不可舉刺足太陽如折束骨主之不可以俯仰京骨崑崙悉主之不可舉申脈僕參悉主之束骨在足小趾外側本節後赤白肉際陷者中足太陽脈之所注也刺三分留三呼灸三壯京骨在足外側大骨下赤白肉際陷者中按而得之足太陽脈之所過也刺三分留七呼灸三壯崑崙在足外踝後跟骨上陷者中細脈動應手足太陽脈之所行也刺五分留十呼灸三壯申脈在外踝下五分容爪甲陽蹺之所生也刺六分留十呼灸三壯僕參在跟骨下陷者中細脈動應手足太陽陽蹺二脈之會刺三分留七呼灸三壯按新校正云甲乙經申脈在外踝下陷者中無五分字刺入六分作三分留十呼作六呼氣穴注作七呼僕參留七呼甲乙經作六呼引脊內廉刺足少陰復溜主之取同飛陽注從腰痛上寒不可顧至此件經語除注併合朱書按新校正云全元起本及甲乙經並太素自腰痛上寒至此並無乃王氏所添也今注云從腰痛上寒至併合朱書十九字疑非王氏語蓋後人之所加也腰痛引少腹控䏚不可以仰按新校正云甲乙經作不可以俯仰刺腰尻交者兩髁胂上以月生死為痏數髮針立已此邪客於足太陰之絡也控通引也䏚謂季脅下之空軟處也腰尻交者謂踝下尻骨兩旁四骨空左右八穴俗呼此骨為八髎骨也此腰痛取腰踝下第四髎即下髎穴也足太陰厥陰少陽三脈左右交結於中故曰腰尻交也兩踝胂謂兩髁下堅起肉也胂上非胂之上巔正當刺胂肉矣直刺胂上即胂上也何者胂之上巔別有中膂內俞白環俞雖並主腰痛考其形證經不相應矣踝骨即腰脊兩旁起骨也挾脊兩旁腰髁之下各有胂隴起而斜趣於髁骨之後內承其髁故曰兩髁胂也下承髁胂肉左右兩胂各有四骨空故曰上髎次髎中髎下髎上髎當髁骨下陷者中餘三髎少斜下按之陷中是也四空悉主腰痛惟下髎所主文與經同即太陰厥陰少陽所結者也刺二寸留十呼灸三壯以月生死為痏數者月初向圓為月生月半向空為月死死月刺少生月刺多繆刺論曰月生一日一痏二日二痏漸多之十五日十五痏十六日十四痏漸少之其痏數多少如此即知也左取右右取左痛在左針取右痛在右針取左所以然者以其脈左右交結於尻骨之中故也按新校正云詳此腰痛引少腹一節與繆刺論重長刺節論針刺之義遠遜刺要刺禁八正神明等篇存之以備篇目而已其云長者通篇專言刺法節者言刺法之節略也刺家不診聽病者言按針家以穴俞為準則以員熟為巧妙神而明之變化無窮固不恃乎區區診脈為也蓋善於診脈而不善於用針為未盡善故經言不診非不必診以所重不專在診也乃後之從事於針者藉口不診之語穴俞刺法大略草草絕不知病屬何經經應何穴效與不效聽之而已似皆不診一語誤之也是故針法之妙誠不在脈而要之真善針者未有不知脈者也在頭頭疾痛為針之王本為藏針之全元起本無藏字今改從之刺至骨病已上無傷肉及皮皮者道也皮者針之道故刺骨無傷骨肉及皮也陰刺入一旁四處治寒熱按新校正云甲乙經云陽刺者正內一旁內四陰刺者左右卒刺之此陰刺疑是陽刺也又按自頭疾起至此三段王注俱作治頭之法誤矣蓋段各一義本不相蒙詳味語氣自見今釐正之深重者刺大臟按凡病以腑為輕以臟為重故病若深重必刺大臟乃愈也注即頂寒熱又誤矣迫臟刺背背俞也迫近也漸近於臟則刺背五臟之俞也刺之迫藏藏會按藏會注未確疑有脫誤存之腹中寒熱去而止與刺之要髮針而淺出血按此三處俱有脫誤不敢過為強解治癰腫者刺癰上視癰小大深淺刺按舊本腐腫腐上全元起本及甲乙經腐作癰今改從之刺大者多血小者深之必端內針為故止按甲乙經云刺大者多而深之必端內針為故正也此云小者深之疑有誤當以甲乙為是內作納病在少腹有積刺皮𩩻以下至少腹而止刺挾脊兩旁四椎間刺兩髂髎季脅肋間導腹中氣熱下已少腹積謂少腹之氣結積也皮𩩻謂齊下五寸橫約文審刺而勿過深之刺禁論曰刺少腹中膀胱溺出令人少腹滿由此故不可深之矣挾脊四椎之間據經無俞恐當云五椎間五椎之下兩旁正當心俞心應少腹故當言五椎間也髂為腰骨髎一為髀字形相近之誤也髎謂居髎腰側穴也季脅肋間當是刺季肋之間京門穴也按新校正云釋音皮𩩻作皮䯏苦末反是䯏誤作𩩻也及遍尋篇韻中無𩩻字只有䯏字䯏骨端也皮䯏者蓋謂臍下橫骨之端也全元起本作皮髓注云臍旁埵起亦未為得病在少腹腹痛不得大小便病名曰疝得之寒刺少腹兩股間刺腰髁骨間刺而多之盡炅病已厥陰之脈環陰器抵少腹衝脈與少陰之絡皆起腎下出於氣街循陰股其後行者自少腹以下骨中央女子入系廷孔其絡循陰器合篡間繞篡後別繞臀至少陰與巨陽中絡者合少陰上股內後廉貫脊屬腎其男子循莖下至篡與女子等故刺少腹及兩股間又刺腰髁骨間也腰髁骨者腰房挾脊平立陷者中按之有骨處也疝為寒生故多刺之少腹盡熱乃止針炅熱也按前言得之寒末又言盡炅病已經言似不相符而注曾無所解試為論之少腹者腎之部膀胱之道路也內本有熱外適感寒寒閉其熱以致二便秘而痛以其因於寒故云得之寒然因寒而熱內著故必盡炅乃已也炅音景篡初患切病在筋筋攣節痛不可以行名曰筋痹刺筋上為故刺分肉間不可中骨也分謂肉分間有筋維絡處也刺筋無傷骨故不可中骨也病起筋炅病已止按此處又有脫誤病在肌膚肌膚盡痛名曰肌痹傷於寒濕刺大分小分多髮針而深之以熱為故大分謂大肉之分小分謂小肉之分無傷筋骨傷筋骨癰發若變針經曰病淺針深內傷良肉皮膚為癰又曰針太深則邪氣反沉病益甚傷筋骨則針太深故癰發若變也諸分盡熱病已止熱可消寒故病已則止按分即部分諸分謂大小分也病在骨骨重不可舉骨髓痠痛寒氣至名曰骨痹深者刺無傷脈肉為故其道大分小分骨熱病已止按有脫誤存之病在諸陽脈且寒且熱諸分且寒且熱名曰狂按癲狂之證並無寒熱此云且寒且熱蓋寒熱紛爭氣潰亂而狂傷寒之發狂是也刺之虛脈視分盡熱病已止按有脫誤病初發歲一發不治月一發不治月四五發名曰癲病刺諸分諸脈其無寒者以針調之病已止按似非脫誤然無甚精義可解病風且寒且熱炅汗出一日數過先刺諸分理絡脈汗出且寒且熱三日一刺百日而已按風為陽邪故令人寒熱風入毫竅則玄府開而汗屢出然入之甚深則汗雖出而寒熱未遽去必屢刺而至百日之久乃盡也病大風骨節重鬚眉墮名曰大風刺肌肉為故汗出百日泄衛氣之怫熱刺骨髓汗出百日泄榮氣之怫熱凡二百日鬚眉生而止針怫熱屏退陰氣內復故多汗出鬚眉生也按此所謂癘風也針能治之惜乎其法不傳也刺要論過之則內傷不及則生外壅二句真刺法之要道乎但篇中所言病期如肺動則秋病溫瘧等言肺傷則有肺經之病其實肺病不止於瘧而且或未必至秋始發也伯特舉一以示意而已黃帝問曰願聞刺要岐伯對曰病有浮沉刺有淺深各至其理無過其道按膚有文理脈有道路淺深合宜乃為得也過之則內傷不及則生外壅壅則邪從之淺深不得反為大賊內動五臟後生大病按過則大深而真氣泄不及則淺而邪不去於是病轉至於深重也故曰病有在毫毛腠理者有在皮膚者有在肌肉者有在脈者有在筋者有在骨者有在髓者毛之長者曰毫皮之文理曰腠理然是二者皆皮之可見者也是故刺毫毛腠理無傷皮皮傷則內動肺肺動則秋病溫瘧泝泝然寒慄針經曰凡刺有五以應五臟一曰半刺半刺者淺內而疾髮針令針傷多如拔髮狀以取皮氣此肺之應也然此其淺以應於肺腠理毫毛猶應更淺當取髮根淺深之半爾肺之合皮王於秋氣故肺動則秋病如是也刺皮無傷肉肉傷則內動脾脾動則七十二日四季之月病腹脹煩不嗜食脾之合肉寄王四季又其脈從股內前廉入腹屬脾絡胃上膈挾咽連舌本散舌下其支別者復從胃別上膈注心中故傷肉則動脾脾動則四季之月腹脹煩而不嗜食也七十二日四季之月者謂三月六月九月十二月各十二日後土寄王十八日也刺肉無傷脈脈傷則內動心心動則夏病心痛心之合脈王於夏氣真心少陰之脈起於心中出屬心系心包心主之脈起於胸中出屬心包平人氣象論曰臟真通於心故脈傷則動心心動則夏病心痛刺脈無傷筋筋傷則內動肝肝動則春病熱而筋弛肝之合筋王於春氣針經曰熱則筋緩故筋傷則動肝肝動則春病如是也刺筋無傷骨骨傷則內動腎腎動則冬病脹腰痛腎之合骨王於冬氣腰為腎府故骨傷則動腎腎動則冬病腰痛也腎之脈直行者從腎上貫肝膈故脹也按腎傷腰痛宜矣其病脹者人身中之氣本原於命門腎傷則命門已不能化氣壅遏不行故脹注言貫肝膈夫貫肝膈何以即脹也刺骨無傷髓髓傷則銷鑠胻酸體解㑊然不去矣髓者骨之充針經曰髓海不足則腦轉耳鳴胻酸眩冒故髓傷則腦髓銷鑠䯒酸體解㑊然不去也髓腦銷鑠骨空之所致也刺齊論本篇大意已見刺要論篇中而此更以刺齊名篇者齊者一也刺有一定之則不可過不可不及蓋專論刺法之準則也黃帝問曰願聞刺淺深之分謂皮肉筋脈骨之分位也岐伯對曰刺骨者無傷筋刺筋者無傷肉刺肉者無傷脈刺脈者無傷皮刺皮者無傷肉刺肉者無傷筋刺筋者無傷骨帝曰余未知其所謂願聞其解岐伯曰刺骨無傷筋者針至筋而去不及骨也刺筋無傷肉者至肉而去不及筋也刺肉無傷脈者至脈而去不及肉也刺脈無傷皮者至皮而去不及脈也按新校正云詳此謂刺淺不至所當刺之處也下文則誡其太深也所謂刺皮無傷肉者病在皮中針入皮中無傷肉也刺肉無傷筋者過肉中筋也刺筋無傷骨者過筋中骨也此謂反也按新校正云全元起本云刺如此者是謂傷此皆過過必損其血氣是謂逆邪必因而入也針解篇針解者解用針之法也凡三段首段正言用針之法而戒其失次言用針之時不可翫忽終言人身與天地相配九針之用各有所宜戒人誤用也黃帝問曰願聞九針之解虛實之道岐伯對曰刺虛則實之者針下熱也氣實乃熱也滿則泄之者針下寒也氣虛乃寒也菀陳則除之者出惡血也菀積也陳久也除去也言絡脈之中血積而久者針刺而除去之也按伯所對凡三義而刺虛二義殊不可解故注亦止解其菀陳之義也邪勝則虛之者出針勿按邪者不正之目非本經氣是則謂邪非言鬼毒精邪之所勝也按按者針畢出針而隨以手指按捺針孔慮其氣逐針而出太盡防虛之道也今若邪勝出針正宜勿按以盡泄其邪是乃所謂虛之之義也徐而疾則實者徐出針而疾按之疾而徐則虛者疾出針而徐按之徐出謂得經氣已久乃出之疾按謂針出穴已速疾按之則真氣不泄經脈氣全故徐而疾乃實也疾出針謂針入穴已至於經脈即疾出之徐按謂針出穴已徐緩按之則邪氣得泄精氣復固故疾而徐乃虛也言實與虛者寒溫氣多少也寒溫謂經脈陰陽之氣也若無若有者疾不可知也言其冥昧不可即而知也夫不可即知故若無慧然神悟故若有也若得若失者離其法也妄為補瀉離亂大經誤補實者轉令若得誤瀉虛者轉令若失故曰若得若失也針經曰無實實無虛虛此其誡也虛實之要九針最妙者為其各有所宜也熱在頭身宜鑱針肉分氣滿宜員針脈氣虛少宜鍉針瀉熱出血發泄固病宜鋒針破癰腫出膿血宜䤵針調陰陽去暴痹宜員利針治經絡中痛痹宜毫針痹深居骨解腰脊節腠之間者宜長針虛風舍於骨解皮膚之間宜大針此之謂各有所宜按鍉音時䤵音批補瀉之時者與氣開闔相合也氣當時刻謂之開已過未至謂之闔時刻者然水下一刻人氣在太陽水下二刻人氣在少陽水下三刻人氣在陽明水下四刻人氣在陰分水下不已氣行不已如是則當刻者謂之開過刻及未至者謂之闔也按新校正云詳自篇首至此文出靈樞經素問解之互相發明也甲乙經云補瀉之時以針為之略同九針之名各不同形者針窮其所當補瀉也各不同形謂長短鋒穎不等窮其補瀉謂各隨其療而用之也按九針之形今具甲乙經如臨深淵者不敢墮也不敢墮慢失補瀉之法也手如握虎者欲其壯也壯謂持針堅定也針經曰持針之道堅者為寶則其義也按王注堅者為實甲乙經作寶是也今改從之神無營於眾物者靜志觀病人無左右視也目絕妄視心專一務則用之必中無惑誤也帝曰余聞九針上應天地四時陰陽願聞其方令可傳於後世以為常也岐伯曰夫一天二地三人四時五音六律七星八風九野身形亦應之針各有所宜故曰九針按新校正云詳此文與靈樞經相出入人皮應天覆蓋於物天之象也人肉應地柔厚安靜地之象也人脈應人盛衰變易人之象也人筋應時按剛柔相維象四時之遞禪人聲應音按聲有清濁如五音之不齊人陰陽合氣應律交會氣通相生無替則律之象人齒面目應星按全元起云人面應七星者所謂面有七孔應之也人出入氣應風按呼吸善變與風相應人九竅三百六十五絡應野按經絡之多如九野之廣故一針皮二針肉三針脈四針筋五針骨六針調陰陽七針益精八針除風九針通九竅除三百六十五節氣此之謂各有所主也一鑱針二員針三鍉針四鋒針五䤵針六員利針七毫針八長針九大針按九針之形不同如此病宜何針各有所主如前注所云是也脈解篇脈解者解脈也凡三十四段初無問答原委惟就一節言之有合處有不合處如所解諸證每以月間為言竊謂人之生病無日不有豈是月分可拘未敢竟刪存古篇目而已太陽所謂腫腰脽痛者正月太陽寅寅太陽也脽謂臀肉也正月三陽生主建寅三陽謂之太陽故曰寅太陽也正月陽氣出在上而陰氣盛陽未得自次也正月雖三陽生而天氣尚寒以其尚寒故曰陰氣盛次謂立王之次也故腫腰脽痛也以其脈抵腰中入貫臀故爾病偏虛為跛者正月陽氣凍解地氣而出也所謂偏虛者冬寒頗有不足者故偏虛為跛也以其脈循股內後廉合膕中下循腨過外踝之後循京骨至小趾外側故也按新校正云詳王氏云其脈循股內殊非按甲乙經太陽流注不到股內股內乃髀外之誤當云髀外後廉所謂強上引背者陽氣大上而爭故強上也強上謂頸項噤強也甚則引背矣所以爾者以其脈從腦出別下項背故也所謂耳鳴者陽氣萬物盛上而躍故耳鳴也以其脈支別者從巔至耳上角故爾所謂甚則狂巔疾者陽盡在上而陰氣從下下虛上實故狂巔疾也以其脈上額交巔上入絡腦其支別者從巔至耳上角故狂巔疾也頂上曰巔按諸病無狂巔之名經雖連說乃二項也狂者癲狂火氣偏盛神明昏亂所謂重陽者狂也巔頂巔也頭為諸陽之聚陽盡在上其病不一總名曰巔也注殊無分別所謂浮為聾者皆在氣也亦以其脈至耳故也所謂入中為喑者陽盛已衰故為喑也陽氣盛入中而薄於胞腎則胞絡腎絡氣不通胞之脈繫於腎腎之脈挾舌本故喑不能言也內奪而厥則為喑俳此腎虛也俳廢也腎之脈與衝脈並出於氣街循陰股內廉斜入膕中循胻骨內廉及內踝之後入足下故腎氣內奪而不順則舌喑足廢故云此腎虛也按太陽膀胱內合於腎腎虛則喑俳喑口不能言俳手足癱瘓也腎脈挾舌本故病則不能言腎主骨腎虛則骨痿而無力故俳也喑俳為腎虛之所致而世盡以風痰治之者誤也新校正云詳王注腎之脈與衝脈並出按甲乙經是腎之絡況王注痿論並奇病論大奇論並云腎之絡則此脈字當為絡也少陰不至者厥也少陰腎脈也若腎氣內脫則少陰脈不至也少陰之脈不至是則太陰之氣逆上而行也少陽所謂心脅痛者言少陽盛也盛者心之所表也按少陽者膽脈也膽脈行於兩脅少陽盛則木強火熾故心脅痛脅主木心主火木盛生火火生於木故心與膽為表裡也注欠明確九月陽氣盡而陰氣盛故心脅痛也火墓於戌故九月陽氣盡而陰氣盛也按少陽膽木理應主春今云九月不知何故所謂不可反側者陰氣藏物也物藏則不動故不可反側也按義未詳所謂甚則躍者躍謂跳躍也九月萬物盡衰草木畢落而墮則氣去陽而之陰氣盛而陽之下長故謂躍按經義所解蓋以天地之氣為言王注亦以脈道經穴為解昧厥旨矣陽明所謂洒洒振寒者陽明者午也五月盛陽之陰也陽盛以明故曰午也五月夏至一陰氣上陽氣降下故云陽盛之陰也陽盛而陰氣加之故洒洒振寒也按陰上陽下是陰加於陽而陽氣抑故洒洒振寒也所謂脛腫而股不收者是五月盛陽之陰也陽者衰於五月而一陰氣上與陽始爭故脛腫而股不收也按五月陽盛之極一陰始生陽轉入陰脛股者陰分也然此姑就經言之其實脛腫之病無月不有殆難拘執也所謂上喘而為水者陰氣下而復上上則邪客於臟腑間故為水也按水屬陰陰自下而上為水邪客肺而喘也所謂胸痛少氣者水氣在臟腑也水者陰氣也陰氣在中故胸痛少氣也少氣者寒也水陰氣寒入於臟者故痛也所謂甚則厥惡人與火聞木音則惕然而驚者陽氣與陰氣相薄水火相惡故惕然而驚也所謂欲獨閉戶牖而處者陰陽相薄也陽盡而陰盛故欲獨閉戶牖而居陽為陰閉故驚陰性惡動而喜靜故欲獨處也所謂病至則欲乘高而歌棄衣而走者陰陽復爭而外並於陽故使之棄衣而走也陽乃不屑為陰制故也所謂客孫脈則頭痛鼻鼽腹腫者陽明並於上上者則其孫絡太陰也故頭痛鼻鼽腹腫也孫絡太陰義未詳太陰所謂病脹者太陰子也十一月萬物氣皆藏於中故曰病脹陰氣大盛太陰始於子故云子也以其脈入腹屬脾絡胃故病脹也所謂上走心為噫者陰盛而上走於陽明陽明絡屬心故曰上走心為噫也按新校正云詳王氏以足陽明流注並無至心者按甲乙經陽明之脈上通於心循咽出於口宜其經言陽明絡屬心為噫王氏安得謂之無所謂食則嘔者物盛滿而上溢故嘔也按食多胃滿脾不及運故嘔此嘔家之一也所謂得後與氣則快然如衰者十二月陰氣下衰而陽氣且出故曰得後與氣則快然如衰也如衰謂病去也後謂大便氣謂氣下泄俗所謂屁也冬至之後陽氣方長而陰氣漸退病勢日衰也少陰所謂腰痛者少陰者腎也十月萬物陽氣皆傷故腰痛也腰者腎之府冬至之前陽氣正衰腎以陽為主陽氣衰故腰痛也所謂嘔咳上氣喘者陰氣在下陽氣在上諸陽氣浮無所依從故嘔咳上氣喘也按陽氣雖上升而其原常根於下倘陰虛於下不能維陽則氣必脫根而上浮陽與陰離飄搖無據而為嘔為咳為喘矣若作陽氣有餘惟以清利為治者失之遠矣所謂邑邑不能久立久坐起則目䀮䀮無所見者萬物陰陽不定未有主也秋氣始至微霜始下而方殺萬物陰陽內奪故目䀮䀮無所見也按內爭故外亂也所謂少氣善怒者陽氣不治陽氣不治則陽氣不得出肝氣當治而未得故善怒善怒者名曰煎厥按生氣通天論以煩勞過甚為煎厥此以多怒為煎厥總而言之火內動而燥擾者皆其義也所謂恐如人將捕之者秋氣萬物未有畢去陰氣少陽氣入陰陽相薄故恐也按恐屬腎陽不勝陰也所謂惡聞食臭者胃無氣故惡聞食臭也按臭者五味之氣也胃虛故無氣而不知五味自以惡聞也所謂面黑如地色者秋氣內奪故變於色也按色黑最惡危病乃有之似不止於秋氣內奪為然也所謂咳則有血者陽脈傷也陽氣未盛於上而脈滿滿則咳故血見於鼻也按咳有血咯之類鼻見血衄血也所解前後乖異且二證多屬陰虛今雲陽傷此中必有錯誤厥陰所謂㿗疝婦人少腹腫者厥陰者辰也三月陽中之陰邪在中故曰㿗疝少腹腫也按四時皆有之今云三月中邪不可解也所謂腰脊痛不可以俯仰者三月一振榮華萬物一俯而不仰也按義不可解所謂㿗癃疝膚脹者陰盛而脈脹不通故曰㿗癃疝也按惟陰盛故氣壅閉而然也所謂甚則嗌乾熱中者陰陽相薄而熱故嗌乾也按嗌乾有虛有實此則實火上升也
