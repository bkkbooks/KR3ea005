body:
  text: 卷之一謹按素問之名王太僕不解其義並不知其著於何代考之漢張仲景撰傷寒論云本之素問自是而降晉皇甫士安云素問論病甚精王叔和撰脈經云出於素問針經隋書經籍志載有素問之目由是言之素問之名始於漢代而迭見於晉隋也至其所以名素問之義全元起云素者本也問者黃帝問岐伯也書陳性情之原五行之本故曰素問又宋新校正引乾鑿度云夫有形者始於無形故有太易有太初有太始有太素太易者未見氣也太初者氣之始也太始者形之始也太素者質之始也氣形質具而痾瘵由是萌生故黃帝問此太素質之始也素問之名義或由此曰不然凡人之病不病於已病而病於未病養之不素則病生治之不素則病成軒岐以仁愛天下之心而相與闡發於千百世之上則又問之有素使後人無夭札之患素之辭義大矣哉上古天真論人生於地氣稟於天惟人受之是謂天真然能克保天真者其惟上古之人乎全元起本此篇在第九卷王氏移置第一今詳文義允宜弁首云昔在黃帝生而神靈弱而能言幼而徇齊長而敦敏成而登天按昔在云者後人追敘之辭猶虞書之紀堯典曰若稽古帝堯也成而登天注謂鼎成而白日昇天事屬虛誕蓋謂自生至長道德既成而登天位也乃問於天師曰余聞上古之人春秋皆度百歲而動作不衰今時之人年半百而動作皆衰者時世異耶人將失之耶按天師岐伯也失謂失養生之道岐伯對曰上古之人其知道者按天地有常道人能體天地之道以為道是謂知道者法於陰陽和於術數食飲有節起居有常不妄作勞按不妄者循理而動不為分外之事故能形與神俱而盡終其天年度百歲乃去去謂去離形骸也按形者神所依神者形所根神形相離行屍而已故惟知道者為能形與神俱俱猶皆也今時之人不然也以酒為漿以妄為常醉以入房以欲竭其精以耗散其真動之死地離於道也樂色曰欲輕用曰耗樂色不節則精竭輕用不止則真散老子曰弱其志強其骨河上公曰有欲者亡身曲禮曰欲不可縱不知持滿不時御神言輕用而縱欲也老子曰持而盈之不如其己言愛精保神如持盈滿之器不慎而動則傾竭天真按滿不知持則溢矣神不時御則馳矣持謂謹守御謂靜攝務快其心逆於生樂起居無節故半百而衰也快於心欲之用則逆養生之樂矣老子曰甚愛必大費夫上古聖人之教也下皆為之按原本聖人之教下也皆謂之字有脫誤文義難通新校正言全元起注本讀作上古聖人之教也下皆為之太素與千金同楊上善解云上古聖人使人行者身先行之為不言之教不言之教勝有言之教故其下效行者眾元起讀法亦通但解者殊屬蛇足若曰聖人之教原非虛言而其民相感而化已見之實行矣故曰下皆為之也虛邪賊風避之有時邪乘虛入故為虛邪竊害中和謂之賊風恬惔虛無真氣從之精神內守病安從來恬惔虛無靜也法道清淨精神內持故其氣從邪不能害是以志閒而少欲心安而不懼形勞而不倦內機息故少欲外紛靜故心安然情欲兩忘是非一貫起居皆適故不倦也氣從以順各從其欲皆得所願志不貪故所欲皆順心易足故所願必從以不異求故無難得也按氣從以順句義是根上文解惟其恬惔少欲故氣順而無病也各從其欲二句是起下文意注無分別故美其食順精粗也任其服隨美惡也樂其俗按安儉陋也高下不相慕按不卑謟也其民故曰樸是所謂心足也老子曰禍莫大於不知足知足之足常足矣是以嗜欲不能勞其目淫邪不能惑其心愚智賢不肖不懼於物故合於道情計兩忘不為謀府冥心一視勝負俱捐所以能年皆度百歲而動作不衰者以其德全不危也莊子曰德全者形全又曰無為而性命不全者未之有也帝曰人年老而無子者材力盡耶將天數然也按材力精力也注謂材幹可以立身非岐伯曰女子七歲腎氣盛齒更髮長少陽之數次於七女子為少陰之氣故以少陽之數偶之明陰陽氣和乃能生成其形體二七而天癸至任脈通太衝脈盛月事以時下故有子癸謂壬癸水也任沖奇經脈也腎氣全盛衝任流通經血漸盈應時而下天真之氣降故云天癸也然沖為血海任主胞胎二者相資故能有子所以謂之月事者平和之氣常以三旬而一見也故愆期者謂之有病三七腎氣平均故真牙生而長極真牙牙之最後生者按長極者謂身長至此後不更加也四七筋骨堅髮長極身體盛壯按七七之半盛極將衰之候也五七陽明脈衰面始焦發始墮陽明之脈氣榮於面故其衰也發墮面焦六七三陽脈衰於上面皆焦發始白三陽之脈盡上於頭故三陽衰則面皆焦發始白所以衰者婦人之生也有餘於氣不足於血以其月經數泄脫之故七七任脈虛太衝脈衰少天癸竭地道不通故形壞而無子也按血陰為地道不通經止也形壞謂發墮齒落面焦而老弱不堪也注非丈夫八歲腎氣實髮長齒更老陰之數極於十少陰之數次於八男子為少陽之氣故以少陰合之二八腎氣盛天癸至精氣溢瀉陰陽和故能有子男女有陰陽之質不同天癸則精血之形亦異陰靜海滿而去血陽動應合而泄精二者通和故能有子三八腎氣平均筋骨勁強故真牙生而長極四八筋骨隆盛肌肉滿壯按八八之半亦盛極時也五八腎氣衰發墮齒槁按腎主骨齒為骨之餘腎蓄精而藏血發者血之餘腎氣既衰則發齒失所養故槁墮六八陽氣衰竭於上面焦髮鬢須白七八肝氣衰筋不能動天癸竭精少腎臟衰形體皆極八八則齒髮去按至此則不但槁墮而已也女子二七而天癸至男子二八而天癸至七陽數也女陰何以發於陽八陰數也男陽何以發於陰夫陽不可無陰陰不可無陽陰必得陽而生陽必需陰而長女始於七男始於八其亦陰陽相觸而後動者乎腎者主水受五臟六腑之精而藏之故五臟盛乃能瀉按五臟各有精隨用而灌注於腎此乃腎為都會關司之所非腎一臟而獨有精也夫腎藏五臟之精是腎為五臟之本矣男女之壯也並始於腎氣之盛實其後也亦由於腎氣之衰微人之盛衰皆本原於腎此故總以腎結之盛乃能瀉人其能終盛乎今五臟皆衰筋骨解惰天癸盡矣故髮鬢白身體重行步不正而無子耳按解與懈同帝曰有其年已老而有子者何也岐伯曰此其天壽過度氣脈常通而腎氣有餘也所稟天真之氣本自有餘此雖有子男不過盡八八女不過盡七七而天地之精氣皆竭矣帝曰夫道者年皆百數能有子乎岐伯曰夫道者能卻老而全形身年雖壽能生子也按得道之人精神完固老而不老筋骨勁強無異年少即前所謂形與神俱者也男不過盡八八二句言即能生子亦不出天癸之數之外是指生子者言注作所生之子壽不過天癸之數誤矣四氣調神論四序推遷氣因時而變人在氣交之中順之則得其所逆之則疾病生通篇之旨蓋教人順時而養其氣也春三月此謂發陳按發發舒也陳陳積也謂發舒其去冬之所陳積也注言氣潛發散陳其姿容是陳與發無辨矣天地俱生萬物以榮按以上四句言天地之氣以下言人當順時以養其氣也夜臥早起廣步於庭被髮緩形以使志生按象春氣之發生無令志氣抑鬱也生而勿殺予而勿奪賞而勿罰按順承天時以養生生之氣此春氣之應養生之道也所謂因時之序也春陽布發生之令故養生者必謹奉天時也逆之則傷肝夏為寒變奉長者少按此言人若不能順時以養其氣則病自生也逆注作反行勝已之令太拘不能順時而養其氣即逆也逆春之氣何以夏為寒變蓋木旺於春而實火之所自生既不能應春而養其生髮之機則木衰無以生火故至於夏宜熱而反寒是為寒變也奉者自下與上從此達彼之辭天地之氣生髮於春長養於夏收斂於秋歸藏於冬缺一不可倒置不可冬之藏秋所奉也秋之收夏所奉也夏之長春所奉也春之生冬所奉也苟不能應春而反逆其生髮之氣至夏自違其融和之令是所奉者少也後仿此夏三月此謂蕃秀蕃茂盛也秀華美也陽自春生至夏洪盛物生以長故蕃秀也天地氣交萬物華實舉夏至也脈要精微論曰夏至四十五日陰氣微上陽氣微下由是則天地氣交也按華實猶言開華結實非秋冬之成實也夜臥早起無厭於日按夏宜宣暢不可多睡以傷神使志無怒使華英成秀使氣得泄若所愛在外按志和則英華暢茂氣泄則膚腠宣通自內達外無郁不開若所愛者然也此夏氣之應養長之道也逆之則傷心秋為痎瘧奉收者少冬至重病按逆夏之氣何以秋為痎瘧也金匱真言論曰夏暑汗不出者秋成風瘧夏宜舒泄而過於收斂則三時之氣抑鬱而不舒是以秋為痎瘧也痎老瘧三日一發瘧是也冬至非指冬至節猶言至冬必病重也心主火而旺於夏逆夏之氣則心病而火衰火衰則不能勝水至所不勝之時病且轉重矣痎音皆秋三月此謂容平萬物夏長華實已成容狀至秋平而定也天氣以急地氣以明急謂風聲切也明謂物色變也早臥早起與雞俱興按秋夜露寒宜早臥秋清氣爽宜早起使志安寧以緩秋刑收斂神氣使秋氣平無外其志使肺氣清按輯斂神志謹避肅殺之令以收氣而保肺三段一意此秋氣之應養收之道也逆之則傷肺冬為飧泄奉藏者少按逆秋之氣何以冬為飧泄也秋宜收斂斂之不密則藏之不固飧泄者藏而不固之病也飧音孫冬三月此謂閉藏地戶閉塞陽氣伏藏水冰地坼無擾乎陽早臥晚起必待日光避寒氣也使志若伏若匿若有私意若已有得按極言藏密之狀也去寒就溫無泄皮膚使氣亟奪此冬氣之應養藏之道也逆之則傷腎春為痿厥奉生者少按逆冬之氣何以春為痿厥也冬令主藏斂四時之氣而藏於密藏之不固則發越無基而痿厥之病見於春也天氣清淨光明者也言天氣以示於人也藏德不止故不下也四時成序七曜周行天不形言是藏德也德隱則應用不屈故不下也老子曰上德不德是以有德言天至尊高德猶見隱也況全生之道而不順天乎天明則日月不明邪害空竅天所以藏德者為其欲隱大明故大明見則小明滅天若自明則日月之明隱矣所論者何言人之真氣亦不可泄露當清淨法道以保天真苟離於道則虛邪入於空竅按空注音孔太鑿孔之為言空也不若空字渾成夫四時陰陽者萬物之根本也所以聖人春夏養陽秋冬養陰以從其根故與萬物浮沉於生長之門按陰陽互根為萬物之本四時所當並養聖人何獨分而為二哉不知春夏者陽氣發生之日秋冬者陰氣用事之時發用過多則易竭聖人養之於易竭之際是所謂從其根也根固則應用不窮矣逆其根則伐其本壞其真矣按言若不能如聖人之養則本伐而真氣敗壞矣是故聖人不治已病治未病不治已亂治未亂此之謂也夫病已成而後藥之亂已成而後治之譬猶渴而穿井鬥而鑄錐不亦晚乎按反復嘆詠以見養之宜早也生氣通天論生氣者何生生之氣陽氣也通天者天氣輕清而上浮惟人陽氣上與天通尊之之辭也篇中凡四特尊陽五喝陽氣者黃帝曰夫自古通天者生之本本於陰陽天地之間六合之內其氣九州九竅五臟十二節皆通乎天氣按言人之氣本與天通其生五其氣三數犯此者則邪氣傷人此壽命之本也三謂天氣地氣運氣也犯謂邪氣觸犯於生氣也按五五臟也言人依五臟以生五氣不固則天地運會之氣相乘為害或病或死壽命所關故曰壽命之本蒼天之氣清淨則志意治順之則陽氣固雖有賊邪弗能害也此因時之序故聖人傳精神服天氣而通神明按蒼天注單指春言非也天之色蒼蒼故曰蒼天言天之氣常清常淨人亦能清能淨則志意安和而治矣果能順天之氣以為氣寒暑溫涼與天合氣不但志意安和而已抑且生生之氣永固無虞矣傳者不盡之義人之有生必有死者以其精神盡而不能傳也得道之人真精不漏元氣渾龎如四時之迭換同日月之運行其為傳也亦何老少之分乎如是則聖人周身之氣與天無間服天氣也變化無方通神明也失之則內閉九竅外壅肌肉衛氣散解此謂自傷氣之削也失謂逆蒼天清淨之理也按凡人之氣周流一身內而九竅外而肌肉清淨則安和煩擾則潰亂安和則內外調達潰亂則壅閉不通衛氣因之亦病矣靈樞經曰衛氣者所以溫分肉而充皮膚肥腠理而司開合者也內閉外壅氣以潰亂而渙散不收矣氣之消削非由於天人自致之耳陽氣者若天與日失其所則折壽而不彰故天運當以日光明此明前陽氣之用也諭人之有陽若天之有日天失其所則日不明人失其所則陽不固日不明則天境冥昧陽不固則人壽夭折按天運句註解頗混蓋重言之以見人不可無陽猶天之不可無日也是故陽因而上衛外者也按此正明陽之所繫也陽氣輕清而上浮象天之居高以臨下無不包攝凡其所有莫能外焉故善養之則氣自周密足以衛固夫一身不善養之則寒暑濕氣諸邪乘之而入矣因於寒欲如運樞起居如驚神氣乃浮按因者乘虛而入之謂此言因於寒之為病也寒邪中人榮血凝澀治寒之法靜則留滯動則散解必如樞之運動而後可辛甘發散之類是也如宜動而反靜則寒邪內伏卒然觸發狀若驚駭驚則氣亂精神浮越於外矣始以陽氣不固而致寒繼以不善治寒而亂氣養陽之道可不慎哉因於暑汗煩則喘喝靜則多言體若燔炭按此言因於暑之為病也暑熱傷氣氣虛故自汗暑者火病也火既盛則躁煩而聲厲火或少息亦啾唧而多言靜而不靜正火之為患也唯暑為火病其身之熱若炭之燔然汗出而散按此則言治暑之法也暑為熱邪雖已自汗仍須汗解熱論篇曰暑當與汗皆出勿止也按暑有陰陽二證潔古曰靜而得之為中暑動而得之為中熱中熱者陽證中暑者陰證東垣曰避暑於深堂廣廈得之者名中暑其證必頭痛惡寒身熱無汗心躁煩此為陰寒所抑而陽氣不得伸越也治宜發汗若行人或農夫於日中勞役得之者名中熱其證頭痛躁熱大渴大汗無氣以動乃天熱外傷肺氣也治宜解熱按此皆中熱之陽者也若夫因暑受寒之證汗之不愈昔人直用姜附理中而愈立齋所謂舍時從證妙法也因於濕首如裹濕熱不攘大筋緛短小筋弛長緛短為拘弛長為痿按此言因於濕之為病也濕邪中人其氣上蒸頭面浮腫如有物裹之者是宜輕揚發散之劑以去其濕庶不致邪氣內侵若不急治則濕化為熱濕熱交併攘者除而去之之謂不攘則著而不去濕熱鬱蒸筋絡受病或急而為拘攣或緩而為痿痹矣夫同一濕熱為病大筋小筋何有拘痿之別蓋筋大則粗而有力故見拘攣筋小則柔而無力故見痿弱也注言反濕其首及將濕熱分配並不合理緛音軟因於氣為腫四維相代陽氣乃竭按氣即陽氣也陽氣既不能衛外不特寒暑濕相因而為患即氣亦能自病是亦謂之因於氣也氣周密則默運而流通氣疏泄則偏壅而浮腫四維者四肢也四肢者諸陽之本也陽氣盛則四肢實而揮霍擾亂陽氣虛則手足浮腫或手已而足或足已而手是相代也凡病此者非陽氣匱乏不至此而實則由於衛外不固之所致也竭字宜活看勿竟作竭絕蓋甚言之以見陽之不可不固也按陽因而上二句是綱以下因於寒四段是目蓋言陽氣不能衛外則諸邪乘虛而入也寒暑濕氣四條各自為一義前後原不相蒙王注將上下文逐段承轉辭義牽強今釐正之陽氣者煩勞則張精絕闢積於夏使人煎厥目盲不可以視耳閉不可以聽潰潰乎若壞都汨汨乎不可止此又誡起居暴卒煩擾陽和也煎厥以煎迫而氣逆也煎厥之狀目盲云云按前言陽氣不能衛外則邪入而生病此言人過勞則氣耗而陽竭也煩勞者勞而不已勞而不已陽氣外浮恢張汙漫神疲而精竭矣所以者何精非氣不攝也精氣既傷漸至火令外則肢體焦灼內則神氣躁擾以火煮物曰煎厥竭也水虧畏火其人以煎熬而厥竭矣煎厥之病其狀何如以言其目則盲而耳則閉視聽俱廢五臟之真氣竭絕潰潰乎若都邑之敗壞汨汨乎若水之流而不返也不亦大可畏哉注以張為脹未確以厥為氣逆亦偏陽氣者大怒則形氣絕而血菀於上使人薄厥大怒則氣逆而陽不下行陽逆則血積於心胸之內矣然陰陽相搏氣血奔並因薄厥生故名薄厥按肝者將軍之官主怒而藏血盛怒則肝傷肝傷則氣浮血湧厄塞滿悶磅礴上下因致厥絕今之盛怒狂叫嘔血欲死者是也謹按自此以下六段又言凡病皆足以傷氣不特前言過勞陽竭而已也有傷於筋縱其若不容怒而過用氣或迫筋筋絡內傷機關縱緩形容痿廢若不維持按注根上解以其同為肝病也於義似通但六段段各一證證各一義不得以其同本於肝而強合之也遠行勞力則筋病入房太甚則宗筋痿是皆謂之有傷於筋也筋傷則縱緩無力不能任重若隘小之器不能容物也汗出偏沮使人偏枯按陽氣盛則汗出通身陽虛則氣不周流而汗出一偏矣氣阻一邊故云偏沮是名偏枯今之半身不遂等證是也汗出見濕乃生痤痱按陽氣所以衛外汗出則氣外泄而陽虛腠理開豁若又見濕濕滯毫腠痤痱生焉痤音才何切小癤也痱音沸濕熱瘡也高粱之變足生大丁受如持虛按膏粱者肥甘物也久食肥甘後必有變其為變也多生丁毒丁者火也大丁熱毒也熱毒傷人無處不到豈必在足注言丁生於足誤矣足生謂足以生丁毒也膏粱之子內縱房勞體必空虛外恣口腹熱毒蓄積如持虛體受此熱毒其何能堪是謂受如持虛今之患癰疽而死者是也勞汗當風寒薄為皶郁乃痤按煩勞氣耗體多出汗汗則玄府開而邪易入自宜靜密謹防如或露體當風或當風熟睡風乘虛入化而為熱外又感寒磅礴膚腠必生皶子皶俗名粉刺是也若不解散鬱積之久不止於皶而且為痤矣皶織加切陽氣者精則養神柔則養筋此又明陽氣之運養也按人知陽氣周密則邪不能入陽氣壯盛則病不能傷此猶氣之粗而顯者也若其內斂於宥密則至精矣精則元氣布護神以氣而藏一氣渾涵神得氣而攝其養為何如若其中運夫經絡則又柔矣柔則真氣貫通筋無弛緩之患和氣條達筋又無攣急之虞其養更何如豈止衛外為固剛強為用而已哉開合不得寒氣從之乃生大僂開謂皮腠發泄闔謂玄府閉封然開合失宜為寒所襲內深經絡結固虛寒則筋絡拘緛形容僂俯矣按僂音樓陷脈為瘻留連肉腠按脈何以陷人之一身上下表里各有脈道陽氣不密則外邪陷入於脈絡故云陷脈邪既陷入留連不解肉腠之間瘡瘻生焉瘻者瘰癧之類也瘻音漏俞氣化薄傳為善畏及為驚駭按俞背穴也陽邪中人多由背入既入於俞氣即汗漫猝走經絡薾然而畏惕然而驚矣所以者何正為邪觸也氣宜兼寒熱言注單作寒解偏矣俞音輸營氣不從逆於肉理乃生癰腫營逆則血鬱血鬱則熱聚為癰腫也魄汗未盡形弱而氣爍穴俞以閉發為風瘧按汗何以言魄魄藏於肺汗出於玄府玄府者皮毛也皮毛者肺之合也故云魄汗未盡者汗出不已病之自汗者也自汗不止形自弱而氣自爍矣形氣大虛風邪易入正虧邪陷不能外達至秋而發病因於風則為風瘧也故下文即云故風者百病之始也清淨則肉腠閉拒雖有大風苛毒弗之能害此因時之序也按善入而人不知者風也諸邪病人惟風為最清淨以下與前第二節辭義大同小異不過反復言之以見人能清淨則邪自不犯無甚深意注乃遠引別篇曲為之解其辭費哉故陽蓄積病死而陽氣當隔隔者當瀉不亟正治粗乃敗之言三陽蓄積怫結不通不急瀉之亦病而死何者蓄積不已亦上下不並矣何以驗之隔塞不便則其證也若不急瀉粗工輕侮必見敗亡也此節言三陽實證乃陽之亢者治宜攻下者也皆由不善調養之所致蓋陽外泄則病虛陽蓄積則病實是故貴得其平也故陽氣者一日而主外晝則陽氣在外靈樞曰目開則氣上行於頭衛氣行陽二十五度也平旦人氣生日中而陽氣隆日西而陽氣已虛氣門乃閉按生者氣長漸盛隆則盛之極也閉非閉絕不通謂去陽經而入陰分猶分門而別戶也注以氣門為玄府誤矣是故暮而收拒無擾筋骨無見霧露反此三時形乃困薄皆所以順陽氣也陽出則出陽藏則藏暮陽氣衰內行陰分故宜收斂以拒虛邪按反此三時注單指收拒三句非宜頂上節言謂平旦與日中氣行於陽可動則動日西氣行於陰當靜則靜如動靜乖違與時相反則氣弱而形壞也陰者藏精而起亟也陽者衛外而為固也按通篇專重陽氣故此節以前單發陽之所繫至重而此節以後則平論陰陽以見陽之不可無陰亦猶陰之不可無陽也陰陽互根之理正天地合德之妙變化所由起萬物所由成順之則得其所逆之則疾病生為篇中一大關鍵而注反略而不解真未達岐黃要旨者也亟注作數解殊無意味按字書亟一切吉逆亦切去吏其音為氣因其音而推其義疑即氣字之訛也蓋陽主外陰主內陽衛外陰藏精合之後篇言氣歸精又言精化為氣則知陽根於陰而陰實為起氣者也臆解存正亟去聲陰不勝其陽則脈流薄疾並乃狂陽不勝其陰則五臟氣爭九竅不通按陰陽本互根不可偏勝此正言偏勝之為害也流流動也薄漂薄也疾急疾也陰不勝陽則陽獨治其證有二焉一為陰虛於下則陽浮於上脈見浮洪數大六七至以上但按之無力注為極虛而急數是也證似純火非火也病由水虧法宜壯水以制火或用桂附從治以引火歸源其證專屬陰虛並合併也即前陽蓄積之謂注為盛實是也三陽合併則陽盛而火旺火旺則神明亂而為狂即重陽者狂之謂證似無水非無水也熱極之故治宜苦寒以泄熱仲景所以用三承氣其證專屬陽盛陽不勝陰則陽虛矣陽氣者所以疏決陰滯內注於五臟而外達九竅者也今陽既虛則氣弱而不能內注於五臟五臟者陰也九竅者五臟之所以通氣者也五臟之陰氣必借陽而後能各出於其竅陽虛不能疏陰則陰氣滯陰氣滯則亂而爭氣亂而爭則不得各從其竅而閉塞矣所以然者陽清而陰濁陽通而陰閉也風客淫氣精乃亡邪傷肝也按客者人來自外之稱風自外來故亦曰客也淫亂也風邪客於經絡而氣為之亂也氣者外以捍邪而內以養精者也氣亂則邪以無所捍而入益深真精必動而消散矣何者風應肝而善動風動肝傷邪之為患將不止於肝也已下三段因而皆因此也注謂風薄熱起熱盛則水乾故精乃無是乃肝腎內傷之證此言風客淫氣以致精亡乃感於外而傷及內者其義大別至下腎氣乃傷高骨乃壞方是水乾精亡之解因而飽食筋脈橫解腸澼為痔甚飽則腸胃橫滿滿則筋脈解而不屬故腸澼而為痔也痹論曰飲食自倍腸胃乃傷按三因而皆根風客節言既感於風而更不謹密其病日加也飽食之傷腸胃而已何及筋脈益人身之內大筋絡骨小筋束皮而氣脈為之貫徹於內外若過傷於飽充塞腸胃氣滿皮急橫逆不通筋絡緊束幾至斷絕是名橫解不特此也飽食不已熱毒蓄積必利膿血利而不已膿血旁流則為痔矣痔者肛旁竇也因而大飲則氣逆飲多則肺布葉舉故氣逆而上奔也按酒性善動味辛氣熱少飲則和血行氣多飲則助怒善忘破血亂氣唯亂氣故氣逆豈止肺布葉舉云乎哉因而強力腎氣乃傷高骨乃壞強力謂強力入房也高骨謂腰高之骨也然強力入房則精耗精耗則腎傷腎傷則髓內枯故高骨壞而不用也按男女媾精萬物化生人生之大倫天地之正道也若行所當行不妄貪縱何至敗壞唯好色之人縱恣行樂精血漸虧力既不能猶或藉資異物勉強從事乃傷乃壞豈非無力而強用其力之故哉況又強力於其邪入之後乎凡陰陽之要陽密乃固兩者不和若春無秋若冬無夏故陽強不能密陰氣乃絕按陰陽雖互根而陽之所繫為尤重故反復詳言以總結之謂人慾養陰先須固陽不可輕自泄露以致敗絕也然陽之所以不密者多由自恃其強彼方縱情恣欲未幾陽精竭而所藏之陰氣亦敗絕而無餘矣注謂陽自強寧有是理因於露風乃生寒熱按以下五段正陽不密之為患也露注作露體是衣被之人邪盡不中耶露霧露也風為陽邪露為陰邪二者中人皆足以致寒熱況前已言無見霧露也是以春傷於風邪氣留連乃為洞泄風氣通肝春肝木旺木勝脾土故洞泄生也按留連者纏綿不解之義凡風邪中人毫腠多為寒熱頭痛脅痛等證若失於表散以致留連不解滯於腸胃之間木性剋土土不能勝故脾虛而洞泄也夏傷於暑秋為痎瘧痎老也亦曰瘦也按凡邪伏臟必遇發生之令而後出秋收令也夏既傷於暑何以至收令而為瘧蓋暑熱邪也熱喜暢而惡郁暑當與汗汗若不出復至收斂之時熱邪蓄積始而為瘧甚則為痎故無汗之瘧必得大汗始愈也秋傷於濕上逆而咳發為痿厥濕地之濕氣也秋濕既勝冬水復王水上乘肺故咳逆病生濕氣內攻於臟腑則咳逆外散於筋脈則痿弱也冬傷於寒春必溫病按冬傷於寒寒不即發伏藏於內至春而病氣因時變必為溫病熱論曰人之傷於寒也則病熱是矣四時之氣更傷五臟寒暑溫涼遞相勝負按上五段言天氣之病人此則其總結語也五臟之氣相生則得其平相剋則傷而為病故木盛傷脾火鬱為痎秋濕自傷冬寒變熱是謂更傷時氣之為病也陰氣者靜則神藏躁則消亡飲食自倍腸胃乃傷按陰藏於五臟宜靜而不宜動故靜則五臟之神各安於其臟若不能靜則必氣浮火動而發躁陰氣散越陽火獨熾而走胃消穀善飢飲食大倍於平日而腸胃受傷矣夫飲食本以養陰乃陰躁且至於多食食多既傷其腸胃陰氣亦因之而愈消故下云陰之所生本在五味陰之五宮傷在五味也按此一節原刻在痹論篇中實與痹義無涉必錯簡也今移置於此文義甚合云陰之所生本在五味陰之五宮傷在五味陰者五神臟也宮者五神之舍也言五神所生本資於五味五味宣化各奏於本宮雖因五味以生亦因五味以損正為好而過節乃見傷也故下云按本篇專重陽氣至陽者衛外為固陰者藏精起氣一段始平論陰陽及至陰陽之要陽密乃固一段則仍歸重於陽矣惟此二段則單論陰然不言陰之所繫輕重而止言五味易以傷陰知五味之傷陰則知所以養陰知所以養陰則知藏精即所以起氣而生氣不窮矣是故味過於酸肝氣以津脾氣乃絕木製土也按酸入肝而益木過酸則肝液盛而木旺木旺則傷土故脾氣絕也味過於咸大骨氣勞短肌心氣抑咸多食之令人肌膚短縮又令人心氣抑滯而不行何者咸走血也大骨氣勞咸歸骨也味過於甘心氣喘滿色黑腎氣不衡甘性滯緩故令人喘滿而腎不平何者土抑水也按色黑者水不勝土而腎色外見也味過於苦脾氣不濡胃氣乃厚按苦本入心而補火火盛則土強脾胃者土也脾不濡則腸臟乾燥胃氣厚則消穀善飢也味過於辛筋脈沮弛精神乃央按味過於酸以下至此五段皆言五味之傷人也辛走肺過於辛則肺金盛而肝受傷肝傷則筋病沮者結而不舒弛者緩而不收也央者殃字之訛肝傷筋病而精神受殃也注云過於辛而令精神長久是酸鹹甘苦四味之過並能傷人而辛獨能益人也有是理乎經中頗多訛字王氏何不之察耶是故謹和五味骨正筋柔氣血以流腠理以密如是則氣骨以精謹道如法長有天命是所謂修養天真之知道者也金匱真言論通篇文義約分三段前段泛泛而已中段言人身之陰陽分配天地末段言人之五臟上應五行配合五方五音五味等項皆一定不易之理為醫宗綱領故以金匱真言命篇誠重之也黃帝問曰天有八風經有五風何謂按經謂人之經絡岐伯對曰八風發邪以為經風觸五臟邪氣發病按八風八方之風四正四維也病之初起多由於風風所自來不外八方風既中人則人之經絡皆風為之由是因經入臟而大小之病起矣東風生於春病在肝俞在頸項春氣發榮於萬物之上故俞在頸項歷忌甲乙曰不治頸也南風生於夏病在心俞在胸脅心少陰脈循胸出脅故也西風生於秋病在肺俞在肩背肺處上焦背為胸府肩背相次故也北風生於冬病在腎俞在腰股腰為腎府股接次之以氣相連故兼言也中央為土病在脾俞在脊以脊應土言居中也故春善病鼽衄按人之虛實不同邪之所中亦異善病云者皆大略之言耳未可據以為實也鼽音求仲夏善病胸脅長夏善病洞泄寒中秋善病風瘧以涼折暑乃為是病冬善病痹厥血象於水寒則水凝以氣薄流故為痹厥故冬不按蹺春不鼽衄春不病頸項仲夏不病胸脅長夏不病洞泄寒中秋不病風瘧冬不病痹厥按謂按摩蹺如蹺捷者之舉動手足是所謂導引也按導引之術本以卻病延年而行之於冬反令四時生病何也蓋冬時陽氣潛藏宜靜不宜動動則氣不密而易病不按蹺即終年不病者岐伯特甚言之以見冬宜安靜以養陽不可煩擾以動氣也否則凡人之病何時不有豈盡按蹺之所致蓋欲導引之家知所戒慎不得妄動以致病也夫精者身之本也故藏於精者春不病溫此正謂冬不按蹺則精氣伏藏陽不妄升故春無溫病按言春而夏秋冬之無病可類推矣夏暑汗不出者秋成風瘧按瘧病之義不外乎此但二句與上下文不合必錯簡綴集之言也宜別作一段讀故曰陰中有陰陽中有陽平旦至日中天之陽陽中之陽也日中至黃昏天之陽陽中之陰也陽氣主晝故平旦至黃昏皆為天之陽而中復有陰陽之殊也合夜至雞鳴天之陰陰中之陰也雞鳴至平旦天之陰陰中之陽也雞鳴陽氣未出故曰天之陰平旦陽氣已升故曰陰中之陽故人亦應之夫言人之陰陽則外為陽內為陰言人身之陰陽則背為陽腹為陰言人身之臟腑中陰陽則臟者為陰腑者為陽臟謂五神臟腑謂六化腑肝心脾肺腎五臟皆為陰膽胃大腸小腸膀胱三焦六腑皆為陽靈樞曰三焦者上合於手心主又曰足三焦者太陽之別名也正理論曰三焦者有名無形上合於手心主下合於右腎主謁道諸氣名為使者也故背為陽陽中之陽心也位處上焦以陽居陽靈樞經曰心為牡臟背為陽陽中之陰肺也位處上焦以陰居陽靈樞經曰肺為牝臟腹為陰陰中之陰腎也位處下焦以陰居陰靈樞經曰腎為牝臟腹為陰陰中之陽肝也位處中焦以陽居陰亦為牡臟腹為陰陰中之至陰脾也位處中焦以太陰居陰故謂之至陰亦謂牝臟此皆陰陽表裡內外雌雄相輸應也故以應天之陰陽也按人之五臟心肺居於上肝腎居於下脾土處乎中皆以所居之位配合陰陽故古以一身為小天地帝曰五臟應四時各有收受乎岐伯曰有東方青色入通於肝開竅於目藏精於肝按五臟各有精肝外應木是以木之精藏於肝余同其病發驚駭象木動搖也按新校正言此句與余方不同疑為衍文然余方各有故病在某一句而此單言發驚駭一項未盡肝之為病乃脫誤非衍文也其味酸其類草木其畜雞易曰𠶒為雞其穀麥本草曰麥為五穀之長按五常政大論云其畜犬其谷麻與此不同其應四時上為歲星木之精氣上為歲星十二年一周天是以春氣在頭也按春陽氣浮在上故也新校正云詳東方言春氣在頭不言故病在頭余方言故病在某不言某氣在某者互文也此說是矣其音角木聲也其數八木生數三成數八洪範曰三曰木是以知病之在筋也按肝主筋也其臭臊凡氣因木變則為臊南方赤色入通於心開竅於耳藏精於心火精之氣其神神舌為心之官當言於舌舌用非竅故云耳也繆刺論手少陰之絡會於耳中義取此也故病在五臟以夏氣在臟也其味苦其類火性炎上而燔灼其畜羊以羊為畜言其未也以土同王故通而言之按五常政大論言其畜馬與此不同其谷黍黍色赤其應四時上為熒惑星七百四十日一周天是以知病之在脈也按血氣之精注而為脈心生血也注誤矣其音徵火聲也其數七火生數二成數七洪範曰二曰火其臭焦凡氣因火變則為焦中央黃色入通於脾開竅於口藏精於脾脾為化谷口主迎糧故開竅於口故病在舌本脾脈上連於舌本故病氣居之其味甘其類土性安靜而化造按化造二字未妥宜云土性安靜而養萬物其畜牛土王四季故畜取丑牛又以牛色黃也其谷稷色黃而味甘其應四時上為鎮星二十八年一周天是以知病之在肉也按土者地之肉也傷在土故病在肉其音宮土聲也其數五土數五洪範曰五曰土其臭香凡氣因土變則為香西方白色入通於肺開竅於鼻藏精於肺肺藏氣鼻通息故開竅於鼻故病在背以肺在胸中背為胸中之府也其味辛其類金性音聲而堅勁其畜馬取乾也易曰乾為馬其谷稻稻堅白其應四時上為太白星三百六十五日一周天是以知病之在皮毛也按皮毛者肺之合肺病以從其合也注云金之堅密類皮毛恐未是其音商其數九金生數四成數九洪範曰四曰金其臭腥凡氣因金變則為腥膻之氣北方黑色入通於腎開竅於二陰藏精於腎陰泄注故開竅於二陰故病在溪溪肉之小會也其味鹹其類水性潤下而滲灌其畜彘其谷豆按注言豆黑色也誤矣今豆色不止於黑蓋以其味厚而益腎也稽叔夜曰豆令人重其應四時上為辰星三百六十五日一周天是以知病之在骨也腎主幽暗骨體內藏以類相同故病居骨其音羽其數六水生數一成數六洪範曰一曰水其臭腐凡氣因水變則為腐臭之氣故善為脈者謹察五臟六腑一逆一從陰陽表裡雌雄之紀藏之心意合心於精非其人勿教非其真勿授是謂得道陰陽應象大論天地之道陰陽而已人則戴天履地抱陰負陽其象與天地相應故以命篇唯陰陽反戾則疾病生焉非獨人也天有薄蝕之變地有川穀之移天地之氣變易非常人或感之亦令氣血潰亂致生異證然則人之逆陰陽而疾病者抑又有內外之殊焉黃帝曰陰陽者天地之道也易曰一陰一陽之謂道萬物之綱紀陽與之正氣以生陰為之主持以立變化之父母按天之下地之上變變化化無一不本於陰陽故為變化之父母注單指異類偏矣且上已言萬物言萬物而異類自在其中也生殺之本始萬物假陽氣溫而生因陰氣寒而死故知生殺本始是陰陽之所運為也神明之府也府宮府也言所以生殺變化者以神明居其中也易曰陰陽不測之謂神治病必求於本按由是言之大矣哉陰陽之道也言綱紀則小大無所不包言父母則生成是所攸賴言本始則盛衰之所共由易曰範圍天地之化而不過曲成萬物而不遺神明不測豈非人之大本乎人既本於陰陽則凡人之逆陰陽而致病與夫醫之治病分別陰陽調其逆從大經大法舉可例言矣蓋人之生戴天履地抱陰負陽日陽而動夜陰而靜春夏宜養其陽秋冬宜養其陰陰者血也陰藏精陽者氣也陽衛外衛之不固則邪入六淫之傷人咎固不在六淫也藏之不密則氣散五火之上浮咎亦不在五火也知人之所以病則知所以治病矣病本於陽治其陽病本於陰治其陰治之常也病似乎陰而實本於陽則宜舍陰而治陽病似乎陽而實本於陰則當緩陽而治陰治之變也病之情狀誠不可勝算而要之必有其本存於其中焉治病而不求其本病其可得而治乎故積陽為天積陰為地按氣不積則不純天地之陰陽以積而純也陰靜陽躁按陰之極則靜陽之極則躁陰陽之變也陽生陰長陽殺陰藏按此二句注既不明即新校正言陰長陽殺之義或以為疑竊謂其義亦易明疑之者非也陰長者坤土之栽培女子之胎息即下成形之義是也陽殺者盛夏之酷烈爍石流金萬物焦灼陽極而亢人之為病邪熱火熾純陽無陰若傷寒之陽邪內傳雜病之風盛火焰又若飲食辛熱之人火鬱痰結二便硬燥並屬亢陽失此不治殺人甚速急宜苦寒之類是也校正乃以方位月分定長殺之義殊牽強矣陽化氣陰成形按形者血肉之所成陰主血故云成形寒極生熱熱極生寒按陰盛之極格陽於外虛火浮動躁擾如狂陰證似陽之類非真熱也寒之極也陽盛於內火閉不通四肢厥冷甚或戰慄陽證似陰之類非真寒也熱之極也所以者何物極則變病似乎異而理則不易此從治之法所由起也寒氣生濁熱氣生清清氣在下則生飧泄濁氣在上則生䐜脹按天以輕清而上浮地以重濁而下降是清濁者陰陽之體質二氣之分名一定之理也至於人之為病則生清生濁各有所因矣濁因維何寒所生也夫寒氣何以生濁也凡人之氣熱則行寒則滯寒盛氣壅自閉塞而濁亂矣清因維何熱所生也夫熱氣何以生清也凡氣之用寒則多靜熱則多動清亦為病者流動不止之故也清氣既為熱化則宜上升而或反抑於下則火性疾速必令暴下而谷不盡化濁氣既為寒化則宜下降而或反壅於上則陰凝不解必至閉固而滿悶不通矣按清字不得作好字眼解清濁既生於寒熱皆人之病也又注言熱氣在下則穀不化夫熱善於消穀何云不化河間云火性疾速故令人暴下是矣此陰陽反作病之逆從也按總結以上八句凡病順則正治逆從治證反乎常謂之逆寒極生熱以下八句皆證之逆者所當從治者也注未確故清陽為天濁陰為地地氣上為云天氣下為雨雨出地氣云出天氣陰凝上結則合以成云陽散下流則注而為雨雨從云以施化故言雨出地云憑氣以交合故言云出天天地之理且然人身清濁亦如是也按天地雖有清濁之分而其氣實相交互地氣四句正言天地之氣以交互而成雲雨也故清陽出上竅濁陰出下竅氣本乎天者親上氣本乎地者親下各從其類也上竅謂耳目口鼻下竅謂二陰清陽發腠理濁陰走五臟腠理為滲泄之門故清陽可以發散五臟為包藏之所故濁陰可走而入清陽實四肢濁陰歸六腑四肢外動故清陽實之六腑內化故濁陰歸之按此段首節言天地之清濁以起興以下言人身之清濁陰陽有一定之理有不易之位若上下倒置清濁混淆則謂之陰陽反作而疾病遂起矣水為陰火為陽按以寒熱動靜分也陽為氣陰為味按陽無形而氣默運陰有象而味養形味歸形形歸氣氣歸精精歸化形食味故味歸形氣生形故形歸氣精食氣故氣歸精化生精故精歸化故下文云按歸者自外返內之稱味以養形形以氣運氣蘊於精精本於化皆從未推本之義精食氣形食味氣化則精生味和則形長故云食之也按氣固蘊於精而精又非氣不攝是氣者所以養精者也猶之五味之養形故均曰食也化生精氣生形按化者自無之有太極之動機也動則真精藏焉有精而後有氣精其體而氣其用也有氣而後有形氣之所至形始全焉生生不窮皆自化始注言精微之液由於血化不惟將化精二字看輕亦且誤解細讀味歸形四句可見矣味傷形氣傷精過其節也按二句與上文精食氣形食味對看上言其常此言其變也精化為氣氣傷於味按精借氣以養是食氣也然既得所養則化生不窮是惟食氣乃能化氣前言味傷形矣又何以言氣傷於味子輿氏言氣者體之充也飲食夫節則腸胃穢濁而氣潰亂氣亂則形壞是形之傷實由於氣之傷也陰味出下竅陽氣出上竅味有質故下流於便瀉之竅氣無形故上出於呼吸之門按即前清陽出上濁陰出下同意此蓋論氣味之後而更相繼言之耳味厚者為陰薄為陰之陽氣厚者為陽薄為陽之陰陽為氣氣厚者為純陽陰為味味厚者為純陰故味薄者為陰中之陽氣薄者為陽中之陰按此單指藥性氣味言與前泛論飲食不同味厚則泄薄則通氣薄則發泄厚則發熱陰氣潤下故味厚則泄利陽氣炎上故氣厚則發熱味薄為陰少故通泄氣薄為陽少故汗出按此則言藥性氣味治病之效醫者所當體驗而慎用也氣味辛甘發散為陽酸苦湧泄為陰按此亦言藥性之用各有不同發散湧泄貴得其宜也但此二句原刻在少火生氣之下實與上下文義不合必錯簡也今挈置於此庶幾同條共貫云湧泄者吐也壯火之氣衰少火之氣壯按衰者盛極也壯者方長也壯火食氣氣食少火壯火散氣少火生氣按氣耗於壯火而養於少火壯火之食耗之也少火之見食於氣養之也養之則生耗之則散自然之理夫陰勝則陽病陽勝則陰病按寒極則火衰熱盛則水涸陽勝則熱陽勝則寒按言所以病者以其偏勝也陽勝偏於熱治尚苦寒陰勝偏於寒藥宜辛熱是之謂正治重寒則熱重熱則寒物極則反亦猶壯火之氣衰少火之氣壯也按重寒之熱非真熱可用桂附以引火歸源重熱之寒非真寒發散其火則寒自去是之謂從治即前寒極生熱熱極生寒二句意寒傷形熱傷氣寒則衛氣不利故傷形熱則榮氣內消故傷氣按注誤矣夫衛者氣也榮者血也經言寒傷形而注言衛不利是傷氣矣經言熱傷氣而注言榮內消是傷血矣明指形氣何得妄以氣血顛倒於理未愜所謂寒傷形者如灑淅惡寒四肢厥冷之類寒入膚腠形不能勝故也所謂熱傷氣者中暑多汗辛熱耗散之類熱性酷烈氣為之爍故也先聖立言一字自有一義細心體悉尚慮毫釐千里其可率爾言之乎氣傷痛形傷腫氣傷則熱結於肉分故痛形傷則寒薄於皮腠故腫按此注根上寒熱解是矣觀此益知上節之注之誤故先痛而後腫者氣傷形也先腫而後痛者形傷氣也先氣證而後病形故曰氣傷形先形證而後病氣故曰形傷氣按經自寒傷形以下至此三段雖以形氣對言似乎一氣貫下然細觀之實有層次不同首節言寒熱之所傷次言形氣既傷則或痛或腫末則交互言之以盡病之變王注首解形氣既未的確後解先後之義尤欠明快凡人之病有單證有兼證痛者未必腫腫者未必痛此單證也既痛而腫者是兼證也然兼證之中實有先後先後所分治法異焉先痛後腫腫因於痛治其氣而形可無傷也先腫後痛痛因於腫治其形而氣亦無傷也本端則標自正矣風勝則動按風本善動傳曰風淫末疾是也熱勝則腫熱勝則陽氣內郁故腫甚則榮氣逆於肉理聚為癰腫之腫按前言寒傷形形傷腫是腫為寒而此又言熱勝則腫是腫有二也然觀下文寒勝則浮或者經以浮腫同形故錯綜言之歟抑前氣傷痛形傷腫二句原無寒熱字面本不根上立解其言傷腫或亦指熱而言歟然則腫與浮其果無辨乎曰堅實而內著者腫也火鬱不散之所致虛大而外湧者浮也寒水壅滯之所生由是言之腫之屬熱非寒也亦易明矣注不之辨何也燥勝則乾燥勝則精液竭涸故皮膚乾燥按燥者火化內外皆有之單說皮膚偏矣寒勝則浮按寒勝者陰盛陽虛玄府閉密氣不得泄故肢體為之虛大而外湧也注言陽氣內攻是與陽氣內郁之解熱腫者無辨誤矣濕勝則濡瀉按脾本濕土喜燥而畏濕濕勝則脾滯而不能運故水穀為之不分惟濡滯故泄瀉也天有四時五行以生長收藏以生寒暑燥濕風人有五臟化五氣以生喜怒悲憂恐按天人一理本相應也五氣五行之氣也喜怒悲憂恐五志也注以五志為五氣誤矣按天元紀大論悲作思脾主思是也本篇下文亦言脾在志為思而此既言悲又言憂悲憂併為肺志反失卻脾志必錯誤也宜云喜怒悲思恐為是故喜怒傷氣寒暑傷形按喜則氣緩怒則氣上緩而不已則氣散上而不已則氣逆病在無形者也寒暑者外感之邪其中於人諸證並作病在有形者也暴怒傷陰暴喜傷陽按陰者血也血藏於肝肝主怒怒則肝氣急逆而血內動甚且有嘔血者陽者氣也卒然而喜則心神為之飛揚而氣渙散矣厥氣上行滿脈去形厥氣逆也逆氣上行滿於經絡則神氣浮越去離形骸矣喜怒不節寒暑過度生乃不固故曰冬傷於寒春必溫病夫傷於四時之氣皆能為病以傷寒最為殺厲之氣中而即病故曰傷寒不即病者寒毒藏於肌膚至春變為溫病至夏變為暑病養生者必慎傷於邪也春傷於風夏生飧泄風中於表則內應於肝肝氣乘脾故為飧泄夏傷於暑秋必痎瘧按暑氣宜散而不散延至收令熱不得發纏綿不解而成痎瘧矣痎老瘧也秋傷於濕冬生咳嗽按形寒飲冷則傷肺秋傷於濕濕以收而不能散伏藏至冬濕水相併寒凝於肺而生咳嗽矣帝曰余聞上古聖人論理人形列別臟腑端絡經脈會通六合各從其經氣穴所發各有處名溪谷屬骨皆有所起分部逆從各有條理四時陰陽盡有經紀外內之應皆有表裡其信然乎按六合指人身經脈言靈樞經曰太陰陽明為一合少陰太陽為一合厥陰少陽為一合手足之脈各三則為六合也屬骨謂骨相連處表裡諸陽經脈為表諸陰經脈為里岐伯對曰東方生風風為教始故生自東方風生木風鼓木榮木生酸按洪範曰曲直作酸謂酸味木氣所發化酸生肝生謂生長也肝生筋肝之精氣生養筋也筋生心按即木生火之義肝主目按五臟之精皆上注於目而為之主者則惟肝其在天為玄玄謂玄冥言天色高遠尚未盛明也在人為道按道者萬化之本猶木旺於春而生長不窮在地為化按善變化者無過於木化生五味按五味之生植物為多故五味皆從木化道生智按道者萬理之總稱無所不包非獨智也其云生智亦象木之發生為言而已玄生神玄冥之內神處其中神在天為風發而周遠無所不通信乎神化而能爾在地為木在體為筋束絡連綴而為力也在臟為肝在色為蒼在音為角角謂木音調而直也在聲為呼謂叫呼在交動為握按斂掌拳指曰握肝主筋筋之為用也人怒則握拳以擊是矣在竅為目在味為酸在志為怒按木發於春勃然莫遏故有怒生之號焉怒傷肝雖志為怒甚則自傷悲勝怒按精氣並於肺則悲悲則金氣盛而木氣消風傷筋風勝則筋絡拘急燥勝風燥為金氣故勝木氣酸傷筋過節也辛勝酸金味勝木味也南方生熱熱生火火生苦洪範曰炎上作苦苦生心心生血按血生於心故心為血臟血生脾按火生土也太素血作脈心主舌心別是非舌以言事故主舌其在天為熱在地為火在體為脈通行榮衛而養血也在臟為心在色為赤象火色在音為徵徵為火音和而美也在聲為笑笑喜聲也在變動為憂按憂者肺之志也心亦何以憂楊上善云肺主秋憂為正也心主夏乃變而生憂也蓋善別苦樂者心也心有所苦憂從中生矣在竅為舌按舌之職有二一司辨五味一司協音聲而實內根於心舌為心之苗是也故火旺於心則舌為之赤火熾之極則舌為之焦若無病之人火降水升則舌自津潤而滑澤苟非有竅焉則內之何能通心液外之何能辨五味別音聲乎乃王氏一則曰舌用非竅再則曰尋其為竅則舌義便乖乃曲為之解亦何不察之甚也夫竅之為言孔也原王氏之意或以諸竅皆有孔而舌似無孔今試取舌而觀之細若針毫津出若泉者非孔乎孔之大者竅也孔之小者亦竅也誰謂舌非通竅哉抑又有說焉金匱真言論曰南方赤色入通於心開竅於耳而此又言在竅為舌是心有二竅也雖然腎亦有二竅焉腎在竅為耳又金匱真言論曰北方黑色入通於腎開竅於二陰五臟之中一竅者三而心腎獨各二竅者何也夫心者火也牡臟也腎者水也牝臟也水火者天地之正氣陰陽之妙用氣血之本源生死之關鍵也所繫至重故二臟獨有牝牡之名為用至博故心腎更有兼通之竅火性炎上其氣上通是以正竅在舌而旁竅在耳水性潤下其氣由上而達下是以上竅在耳而下竅在二陰然分之有水火升降之形合之乃陰陽互根之妙故腎在竅為耳而心亦開竅於耳是耳者心腎之所交通水火之所際會學者不可不察也注謂舌非通竅固非而心腎各有二竅與夫心與腎共竅於耳之義俱不拈出真缺陷也因為臆解於此在味為苦按苦本於焦焦生於火在志為喜喜和樂也喜傷心按喜者得其所樂也樂極則生悲樂亦病人況其他乎恐勝喜按心有所怖則惕然不寧熱傷氣按熱勝則氣浮動而外泄注單指喘急偏矣寒勝熱寒為水氣故勝火熱苦傷氣以火生也按新校正云詳此篇論所傷之旨其例有三東方云風傷筋酸傷筋中央云濕傷肉甘傷肉是自傷者也南方云熱傷氣苦傷氣北方云寒傷血咸傷血是傷已所勝西方云熱傷皮毛是被勝傷已辛傷皮毛亦自傷者也五方所傷不同若此太素俱云自傷殊欠分曉咸勝苦咸水味故勝火苦中央生濕易義曰陽上薄陰陰能固之然後蒸而為雨明濕生於固陰之氣也濕生土楊上善云六月四陽二陰合而為濕蒸腐萬物成土也土生甘洪範曰稼穡作甘甘生脾按生猶益也脾喜甘故甘能益脾脾生肉按脾主運化脾強則能消化飲食而益人肌肉善食之人肉多肥厚是也肉生肺按陰陽書曰土生金也脾主口按水穀入於口化於脾內外實相應也其在天為濕按地之濕氣由天而降在地為土在體為肉按體之有肉猶地之有土在臟為脾在色為黃土色也在音為宮宮為土音大而和也在聲為歌按歌生於喜故人樂則歌愁則嘆注以歌為嘆聲誤矣在變動為噦按楊上善云噦氣忤也丹溪所謂吃忒是矣噦音一決切在竅為口在味為甘在志為思按思則上下四方無所不到脾位中宮故也思傷脾怒勝思怒則不思濕傷肉脾主肉而惡濕故濕勝則肉傷風勝濕風為木氣故勝土濕甘傷肉酸勝甘酸木味故勝土之甘西方生燥天氣急切故生燥燥生金金生辛按洪範曰從革作辛辛生肺肺生皮毛按皮毛捍衛一身得金堅勁之氣皮毛生腎按陰陽書曰金生水也肺主鼻肺藏氣鼻通息其在天為燥按秋風勁強在地為金在體為皮毛包藏膚腠捍其邪也在臟為肺在色為白在音為商按商為金聲輕而勁也在聲為哭按悲哀則哭象肅殺也在變動為咳按肺為邪傷則咳嗽在竅為鼻在味為辛在志為憂按宣明五氣篇言精氣並於肺則悲而此言憂憂者愁慮也情之迫悲者哀苦也情之慘然悲極則憂憂極則悲悲憂同情故皆為肺志憂傷肺按多憂傷人害尤在肺喜勝憂按悲憂之情得喜則解熱傷皮毛按熱久則膚燥而毛槁亦火剋金故寒勝熱按火畏水也辛傷皮毛過而招損苦勝辛苦火味故勝金辛北方生寒陰氣凝冽故生寒也寒生水水生咸按洪範曰潤下作咸咸生腎按腎喜咸故能益人腎生骨髓按腎主骨髓者骨之充髓生肝陰陽書曰水生木腎主耳其在天為寒在地為水在體為骨端直貞干以立身也在臟為腎在色為黑象水色在音為羽羽為水音沉而深也在聲為呻按呻吟痛楚聲也在變動為慄慄謂戰慄甚寒大恐悉有之在竅為耳在味為咸在志為恐恐所以懼惡也恐傷腎恐而不已則內感於腎故傷思勝恐思深慮遠則見事源寒傷血寒則血凝燥勝寒按燥為熱化寒從水生水本勝火燥何以勝寒然寒多則氣不溫而血為病必用辛溫之味以炅燮沉寒於是陰凝之氣化為陽和矣咸傷血食鹹而渴傷血可知甘勝咸甘土味故勝水咸故曰天地者萬物之上下也按以覆載言也陰陽者血氣之男女也按以配偶言也分之則血為陰氣為陽合之則血非陽不行氣無陰則散正如男之不可以無女女之不可以無男也若但以陰陽分配為言殊失意旨左右者陰陽之道路也按楊上善云陰氣右行陽氣左行以分位言也若天元紀論中方可作左右間氣言水火者陰陽之徵兆也按水者陰之徵火者陽之徵兆先而徵後以發見言也陰陽者萬物之能始也按號物有萬皆本陰陽萬物之始也陰陽之能也故云能始以終始言也按天元紀大論與此略同但彼無陰陽者血氣之男女一句又以金木者生成之終始代陰陽者萬物之能始一句故曰陰在內陽之守也陽在外陰之使也陰靜故為陽之鎮守陽動故為陰之役使帝曰法陰陽奈何岐伯曰陽勝則身熱腠理閉喘粗為之俯仰汗不出而熱齒乾以煩冤腹滿死能冬不能夏陽勝故能冬熱甚故不能夏陰勝則身寒汗出身常清數慄而寒寒則厥厥則腹滿死能夏不能冬陰勝故能夏寒甚故不能冬按此統論陰陽偏勝之大凡也至於腹滿則均死者何故蓋陽勝則宜汗既腠理閉而汗不出若至腹滿則火烈於內陽極而亢矣陰勝則宜溫既身寒而手足逆冷若至腹滿則陰寒凝結而氣不化矣安得不死能注讀作耐通猶言遇相濟之時尚猶可為也喘粗者熱盛於內氣不得泄而喘急也俯仰者坐臥不寧之狀煩冤者熱極則煩若有所冤抑而叫呼也清涼也慄戰慄也厥手足逆冷而氣欲絕也注以厥為氣逆誤矣此陰陽更勝之變病之形能也按形能猶言情狀帝曰調此二者奈何按二者指陰陽偏勝言言若遇此類當如何治之問意平常注太鑿矣岐伯曰能知七損八益則二者可調不知用此則早衰之節也按男女交媾必行於天癸既至之後然女子天癸始於二七若即縱情恣欲終將耗竭真精是謂七損男子天癸始於二八若能保守真元自然精神強固是謂八益苟能去損就益則陰陽和調必無偏勝之患矣用猶行也注作房色解誤矣言不知行此道則有夭折之患也年四十而陰氣自半也起居衰矣年五十體重耳目不聰明矣年六十陰痿氣大衰九竅不利下虛上實涕泣俱出矣按甲子六十一周人壽不同強者過之弱者不及然至六十為得其常矣四十以後漸就衰老是此六十年中強壯之日僅居其半且更有未四十而即衰憊者真可畏也故曰知之則強不知則老故同出而名異耳按人不可不知而或不能盡知所以同其體而異其形也是以聖人為無為之事樂恬惔之能從欲快志於虛無之守故壽命無窮與天地終此聖人之治身也聖人不為無益害有益不為害性而順性故壽命長遠與天地終天不足西北故西北方陰也而入右耳目不如左明也地不滿東南故東南方陽也而人左手足不如右強也帝曰何以然岐伯曰東方陽也陽者其精並於上並於上則上明而下虛故使耳目聰明而手足不便也西方陰也陰者其精並於下並於下則下盛而上虛故其耳目不聰明而手足便也故俱感於邪其在上則右甚在下則左甚此天地陰陽所不能全也故邪居之夫陰陽之應天地猶水之在器也器圓則水圓器曲則水曲人之氣血亦如是故隨不足則邪氣留居之按天地陰陽猶不能全人身臟腑豈能周密邪之所湊其氣必虛自然之理也唯善養生者防患未然邪不易入如下之所言是矣惟賢人上配天以養頭下象地以養足中傍人事以養五臟按邪雖乘虛無間可入矣天氣通於肺居高故按天氣輕清而上浮然肺為五臟之蓋主氣而分布於五臟亦如天之居高以臨下故與天氣相通地氣通於嗌按地陰而主味然嗌者飲食之道路也是以陰血不足則嗌為之哽澀而難下注云次下混矣風氣通於肝風生木故雷氣通於心象火之有聲故按天熱鬱則發而為雷心藏火則散而為熱穀氣通於脾谷空虛脾受納故按注是矣然主受納者胃也而脾實主運化此不可以不辨夫脾與胃相連脾不能運化則受納者必滿而溢矣是胃不可以兼運化之職而脾實可以兼受納之名也雨氣通於腎腎主水故按此以上言五臟之所通分屬也以下則總論六臟九竅之形似比類也注俱混論無別六經為川按六經六腑也流而不息之為川六腑之職化糟粕轉味而入出主瀉而不藏如川之流而不息也注但云流注不息不知六經為臟為腑也腸胃為海按人之飲食由胃轉腸凡有所入無不歸焉亦如海之廣大無所不容九竅為水注之氣按七竅主納二陰主出然總為五臟津液流通之門戶則氣字疑為器字之訛也然即以氣解亦通蓋臟腑之氣必由九竅而外達氣不通則水不得出九竅之氣通而後臟腑之水液因之而注矣以天地為之陰陽陽之汗以天地之雨名之夫人汗泄於皮膚者是陽氣之發泄爾然其取類於天地之間則云騰雨降而相似也故云陽之氣以天地之疾風名之陽氣散發疾風飛揚故以應之舊經無名之二字尋前類例故加之暴氣象雷按雷出地奮鬱極而通也無病之人氣宿丹田及其有病或抽掣或眩僕或狂叫喘促卒暴非常正如雷之發於地逆氣象陽按逆氣者下自丹田衝突而上也然有虛實真假之辨焉或外感風寒或真痰實火有餘之證乃真陽也若夫陰虛於下則陽浮於上喘促逼迫象陽氣之有餘豈知實真陰之不足也注云逆氣凌上陽氣亦然是陽氣盡逆也誤矣故邪風之至疾如風雨故善治者治皮毛其次治肌膚其次治筋脈其次治六腑其次治五臟治五臟者半生半死也善治者治皮毛治之於將成未成上工之治未病也病入五臟而後治之危矣是故治之不可不早也故天之邪氣感則害人五臟按天之邪氣四時不正之氣即六淫是也邪氣中人由淺入深必極於五臟而後止非越經絡六腑而徑至於五臟也中風之入臟傷寒之傳經是矣水穀之寒熱感則害於六腑按飲食之味貴於和平然其性實有寒熱之殊偏於寒則凝滯閉澀偏於熱則炎烈焦枯或曰臟腑同在一身而寒熱之害止及於腑而不及臟者豈得無說乎曰人之飲食必先入胃胃與眾腑同居膈下其位陽其地近若五臟則陰而深水穀不能入故害不及焉地之濕氣感則害皮肉筋脈濕氣勝則榮衛之氣不行故感則害於皮肉筋脈按以上言人之為病總不外此三者以下乃治法之精義軒岐之奧旨全書大要略盡於此故善用針者從陰引陽從陽引陰以右治左以左治右以我知彼以表知里以觀過與不及之理見微得過用之不殆深明故也善診者察色按脈先別陰陽按天地之道陰陽而已人之病也或偏於陰或偏於陽或陽實或陰實或陽虛或陰虛或陰盛而陽虛或陽盛而陰虛病之變化不可勝數故其大要在先別陰陽審清濁而知部分按心居上腎居下肝居左肺居右脾居中審其氣之清濁則知其病之部分矣視喘息聽音聲而知所苦按氣逆而急謂之喘一呼一吸謂之息響出於口謂之聲聲有分別謂之音然喘息有緩急之殊音聲有清濁之分內有所苦外自形焉乃喘息亦音聲也何以言視蓋氣喘則身必動輕者呼多吸少而已重則瞪目掀鼻竦脅抬肩故不但聽其呼吸之聲而必詳視其呼吸之狀蓋望聞之要道也觀權衡規矩而知病所主按權衡所以度輕重規矩所以制方圓人道之準則也惟病則言語有乖動作失度容之所兆病之所主也故觀容知心如執玉高卑其容俯仰之類按尺寸觀浮沉滑澀而知病所生以治浮脈者浮於手下也沉脈者按之乃得也滑脈者往來易澀脈者往來難故審察脈之形象而知病所由生以治之也無過以診則不失矣按無過以診謂診脈誠無差謬則治病自無失誤也注言有過無過皆以診知混矣故因其輕而揚之按邪在浮淺謂之輕發揚於外毋令深入因其重而減之按重者病邪深入也勢難頓去先其急者令其漸減毋傷於激因其衰而彰之按衰者邪將盡而正未復也急為培補使正氣旺而逼邪於外形不足者溫之以氣精不足者補之以味按形不足謂肌肉瘦削也味歸形形食味本篇之言也形瘦正宜養之以味而此又言溫之以氣何也夫味能養人過則傷人形之不足未必不因於多食之所致若更益之以味則脾愈困而肌愈削治此之法忌用陰寒急當溫養其氣氣和則血自運而肉自充陽生陰長之義也精不足謂精髓枯竭也氣歸精精食氣亦篇前之言也精虧自宜培補氣分而此乃言補之以味是飲食之粗竟能益人真精耶蓋氣之歸精氣本於精精之食氣精養於氣今精既枯竭則已不能化氣而氣消亡氣消亡其能養精乎於是無形之精氣不得不借有形之飲食以補之五臟別論篇曰五味入口藏於胃以養五臟氣又臟氣法時篇曰五穀為養五果為助五畜為益五菜為充氣味合而服之以補精益氣又經脈別論篇曰飲食入胃遊溢精氣上歸於脾脾氣散精上輸於肺通調水道下輸膀胱水精四布五經並行由是言之味之補精居可見矣其高者因而越之按越上出也高者病在於上吐之為便湧泄之法不獨傷寒為宜也其下者引而竭之按病既在下因勢利導使之盡出而不留中滿者瀉之於內按氣壅胸腹滿悶不行是謂中滿然有虛實之別實者多兼痰火清而利之是矣虛則呼吸喘脹多涎少痰似熱無火調其氣而滿自除潛消默運是謂瀉之於內也張景岳以中滿兼大實堅言誤矣如下文實者方是實堅蓋中滿只在上中二焦其云瀉者不過調而利之非若治腸胃實堅者之以攻下為瀉也其有邪者漬形以為汗其在皮者汗而發之按汗法獨有二條何也邪在皮毛固宜發汗然凡不正之氣流入經絡內有邪也尤宜辛甘之劑使通體浸淫邪得汗而解是邪入稍深尚宜汗解不獨邪在皮毛者之宜汗也陶尚文云傷寒七八日以上表證未盡除者猶當發汗真善達軒岐之奧旨者也其慓悍者按而收之按慓悍者發越太過如虛陽外浮真陰不足之類按者抑而下也抑而下降使之收斂以歸於原也其實者散而瀉之陽實則發散陰實則宣瀉審其陰陽以別柔剛陽病治陰陰病治陽按陰陽者天地之理剛柔者陰陽之性也陰病證必柔陽病證必剛此言病之常所當正治者也若夫陰內竭而致陽外浮陽不能衛外而致陰亦竭者則不可以其似陽而即治其陽似陰而即治其陰病之變者又當從治者也先聖治法精義已盡於此注乃漫引浮辭殊失真旨血實宜決之決謂決破其血按決宜兼內外言血虛應補固矣至若外而癰疽之實熱者須針割以破其毒內而陽盛血熱或蓄瘀作痛急宜攻下以去其實皆決之之謂也氣虛宜𤙲引之按𤙲註解誤矣甲乙經𤙲作掣良是掣者以手牽物也蓋氣實則宿于丹田虛則浮而逆於上俗用利氣氣愈虛矣掣引二字妙甚如斂而降之以保肺或溫養中宮以培母或滋補腎陰以歸源委宛調攝使浮動之氣順而不逆其掣引之義乎若作導引解是按摩者流恐非軒岐之旨也靈蘭秘典論十二臟腑者人身之經脈氣血之道路也辨之不明則疾病無所據而針藥莫能施矣靈蘭古藏書之室秘典者珍重之辭也黃帝問曰願聞十二臟之相使貴賤何如岐伯對曰悉乎哉問也請遂言之心者君主之官也神明出焉任治於物故為君主之官清靜棲靈故曰神明出焉按心以神用清靜無為內主一身外役群動無所為也而實則無一非心之所為故亦曰官焉肺者相傅之官治節出焉位高非君故官為相傅主行榮衛故治節由之按肺之為臟上通呼吸下復諸臟亦猶相傅之職佐一人以出治而為百僚之師表也端揆重任攬其大節而已肝者將軍之宮謀慮出焉勇而能斷故曰將軍潛發未萌故謀慮出焉膽者中正之官決斷出焉按六節臟象論曰凡十一臟取決於膽也是諸臟腑各有一定之司而膽則總攬眾職而決其是非斷其猶豫不偏不倚故官名中正惟其中正故能決斷也膻中者臣使之官喜樂出焉膻中者在胸中兩乳間為氣之海然心為君以敷宣教令膻中主氣以氣布陰陽氣和志通則喜樂由生分布陰陽故官為臣使也按臣使者任心君之臣使也心主喜心之所喜而膻中為之宣布其所喜得其所喜則樂矣凡人之為喜樂皆自此出也膻音誕脾胃者倉廩之官五味出焉包容五穀故為倉廩之官榮養四旁故云五味出焉大腸者傳道之官變化出焉傳道謂傳不潔之物變化謂變化物之形小腸者受盛之官化物出焉承奉胃司受盛糟粕受已復化傳入大腸腎者作強之官伎巧出焉強於作用故曰作強造化形容故云伎巧按注又謂在女則當其伎巧在男則正曰作強是以作強伎巧並對分配男女殊乖經旨豈知男女各有伎巧並能作強此言人之伎巧皆從腎出非對作強而言也三焦者決瀆之官水道出焉引導陰陽開通閉塞故官決瀆按三焦手少陽經人身上中下三停也越人叔和皆謂其無形空有名陳無擇馬仲化相與非之後人幾莫知所適從矣近見孫氏醫旨緒餘及烏程閔氏三焦說皆指人身上中下三停言力辨無擇仲化之謬乃知三焦之為腑也配合心包心包者包絡乎心代心君以行令號為相火三焦者總括乎一身宗營衛三氣所生水道所出兩者相配實五臟之總司一身之網維也昧者不達此理意謂三焦居十二經之一亦當如五臟五腑之有形妄稱脂膜如指背先賢之義啟後人之疑謬亦甚矣豈知人身臟腑有專一者以司於內必有兼統者以衛於外所以五臟之外有心包六腑之中有三焦其為臟腑雖無形而有氣雖無體而有用惟有氣有用而有形有體者始賴之以全此無形之三焦所以得與有形之臟腑合為十二經脈者正以臟腑無三焦則內外之氣區格而不通決瀆失職水道壅閉而臟腑之用不全也三焦一腑為千古疑案可不辨乎趙養葵張景岳又仍陳馬之謬而謬焉嗟乎此所以聚訟至今也膀胱者州都之官津液藏焉氣化則能出矣位當孤腑故謂州官居下內空故藏津液若得氣海之氣施化則溲便注泄氣海之氣不及則閉隱不通故曰氣化則能出矣按註明確矣然氣之所以不化則更有說夫膀胱之為藏也有下竅而無上竅其蓄其泄蓋以氣運而非以形用者也氣者水之母氣積而不化則水不得出矣氣之所以積而不出者有寒熱二端焉熱則火盛水虧而氣壅寒則陰滯水凝而氣閉無道可出於是水溢於周身而為腫為脹矣奈何世之言治者但知利水而不知化氣且但知為熱壅而單用苦寒曰治其病其病轉劇豈非昧於化氣之道哉凡此十二官者不得相失也失則災害至故不得相失按新校正云詳此乃十一官脾胃二臟乃共一官也按十二臟腑俱分任一官而脾臟胃腑獨共為一官者脾與胃相連受水穀而主中宮脾主為胃行其津液二而一者也故止作一官且缺心包絡而多膻中按膻中位治胸堂而為心君之臣使心主喜而膻中出喜樂包絡本與心相依其即心包絡無疑但位當兩乳間故以膻中名非十二官之外另有膻中一官也故主明則下安以此養生則壽歿世不殆以為天下則大昌主不明則十二官危使道閉塞而不通形乃大傷以此養生則殃以為天下者其宗大危戒之戒之按趙養葵作醫貫謂主非心乃命門也命門為一身之太極為十二官之君主反復千餘言殊悚人目自予論之養葵之說謂命門為一身之太極誠是謂為十二官之君主則非為命門作解則可為主不明則十二官危之注則謬也何也天無二日國無二君人身無二主心為君主經固已言之矣而養葵謂命門又為十二官之主是身有二主也噫過矣天地之生萬物也莫不原本於陰陽陰陽則又原本於太極太極者萬理之元始而實則無一理之可名故太極又本於無極太極而無極矣而謂萬物之生皆始於無極而即可畀無極以萬物之主之名乎人身之有命門也陰陽於是乎分水火於是乎宅臟腑於是乎受氣真元於是乎托根氤氤氳氳無所不包無所不攝而究亦無一端之可指猶之乎太極而無極也而乃可名之以主乎命門不可以主名則夫命門之所以為命門者其殆人身之根蒂而為性命之本原豈若心君之躬率庶職以效順無為而有為者哉原養葵之意不過以經列心於十二官之首而末又云主不明則十二官危遂意十二官之外更有所為主因而推本於命門且以命門有小心之號故以命門為十二官之主噫何其見之迂而言之鑿也夫命門之於心猶天之與天子也天子奉天以出治明德作求則庶續咸熙矣苟其違天失德則百爾顛越均致敗亡矣主不明則十二官危官也者以有所職而言也臟腑以各盡其職為官心以率臟腑之各盡其職以為官臟腑之官臣也心之官君也君者主也心者君主之官也養葵不主心而主命門是不主天子而主天也陰陽離合論動靜未分一氣而已既分之後陰陽判焉是故靜而陰動而陽萬物之所以賦形陽必動陰必靜變化之所以妙用動靜各出於自然其陰陽離合之謂乎篇中所言俱就陰陽分位解尚未說到疾病上黃帝問曰余聞天為陽地為陰日為陽月為陰大小月三百六十日成一歲人亦應之今三陰三陽不應陰陽其故何也按不應謂不與天地之陰陽盡相合也岐伯對曰陰陽者數之可十推之可百數之可千推之可萬萬之大不可勝數然其要一也一謂離合也按合而不離則陰陽之氣閉離而不合則陰陽之理乖有離有合千變萬化其至道之宗乎數以見在言推以充廣言天覆地載萬物方生未出地者命曰陰處名曰陰中之陰形未動出亦是為陰則出地者命曰陰中之陽形動出者是則為陽陽予之正陰為之主陽施正氣萬物方生陰為主持群形乃立按注是矣然正兼內外而言主則專乎內也故生因春長因夏收因秋藏因冬失常則天地四塞春夏為陽故生長也秋冬為陰故收藏他若失其常道則四時之氣閉塞陰陽之氣無所運行矣按天地且然而況於人乎故下云陰陽之變其在人者亦數之可數按天地之道失其常可以數而知人乖陰陽之道亦可指數若數目之列於前而指數之也帝曰願聞三陰三陽之離合也岐伯曰聖人南面而立前曰廣明後曰太衝嚮明治物故聖人南面而立然在人身中心臟在南故謂前曰廣明衝脈在北故謂後曰太衝然太衝脈者腎脈與衝脈合而盛大故云太衝按凡經中穴名各有取義然亦有無義可考者不必拘泥也太衝之地名曰少陰少陰之上名曰太陽正明兩脈相合而為表裡也腎臟陰膀胱腑為陽陰氣在下陽氣在上此為一合之經氣也太陽根起於至陰結於命門名曰陰中之陽至陰穴名在足小趾外側命門者臟精光照之所則兩目也太陽之脈起於目而下至於足故根於指端結於目也靈樞經曰命門者目也以太陽居少陰之地故曰陰中之陽中身而上名曰廣明廣明之下名曰太陰心廣明臟下則太陰脾臟也太陰之前名曰陽明胃為陽明脈行脾脈之前脾為太陰脈行於胃脈之後陽明根起於厲兌名曰陰中之陽厲兌穴名在足大趾次趾之端以陽明居太陰之前故曰陰中之陽厥陰之表名曰少陽膽少陽脈行肝脈之分外肝厥陰脈行膽脈之位內少陰根起於竅陰名曰陰中之少陽竅陰穴在足小趾次趾之端以少陽居厥陰之表故曰陰中之少陽按人身之脈循環上下周流一身各有所起之處起於下者行於上起於上者行於下苟非有根焉何能或離或合如是哉然篇中止言足經三陰三陽而不及手之六經不知何故熱論篇所言傷寒亦止足六經後張仲景作傷寒論更無增益豈人身十二經脈偏重在足歟抑足之六經果足以概手而手之六經無離合之用故可略而不言歟後之君子必有能知而言之者按盧廉夫纂丹溪書其言傳足不傳手之說謂傷寒所傳六經太陽膀胱水也陽明胃土也少陽膽木也太陰脾土也少陰腎水也厥陰肝木也水得寒則冰土得寒則坼木得寒則枯足之所主六經性本畏寒故邪得入而傳之也若夫手之六經太陽小腸火也陽明大腸金也少陽三焦火也太陰肺金也少陰心火也厥陰心包絡火也火熱金堅性不畏寒故手之六經邪不能入而傳之也其義本之劉草窗即其義而合觀之則知此篇所載止有足之六經乃外邪出入之門戶故有開合樞之義而以陰陽離合命篇焉比類尋義將無是歟是故三陽之離合也太陽為開陽明為闔少陽為樞離謂離別應用合謂配合於陰離別則正位於三陽配合則表裡而為臟腑矣開合樞者言三陽之氣多少不等動用殊也夫開者所以司動靜之基合者所以執禁固之權樞者所以主動轉之微由斯殊氣之用故三變之也按注頗確但云三陽之氣多少不等多少二字未是宜云三陽之氣所主不同動用殊也於義較通三經者不得相失也搏而勿浮命曰一陽三經之至搏擊於手而無輕重之異則正可謂一陽之氣無復有三陽差降之為用也按開合樞者陰陽之妙用三陰三陽之所以為離合也動失其宜疾病於是乎生矣帝曰願聞三陰岐伯曰外者為陽內者為陰然則中為陰按注言三陽為外運之離合三陰為內運之離合太鑿此蓋承上起下由陽入陰之轉語耳不必說到離合上中者外之內也內為陰故中亦為陰其衝在下名曰太陰衝脈在脾之下故云太陰根起於隱白名曰陰中之陰隱白穴在足大趾端以太陰居陰故曰陰中之陰太陰之後名曰少陰臟位及經脈之次也太陰脾也少陰胃也脾臟之下近後則腎之位少陰根起於湧泉名曰陰中之少陰湧泉穴在足心踡指宛宛中少陰之前名曰厥陰少陰腎也厥陰肝也腎臟之前近上則肝之位厥陰根起於大敦陰之絕陽名曰陰之絕陰大敦穴在足大趾端三毛中厥盡也陰氣至此而盡故曰絕陰按絕陽者陽至此而絕絕陰者陰至此而極惟絕陽故絕陰也是故三陰之離合也太陰為開厥陰為闔少陰為樞三經者不得相失也搏而勿沉名曰一陰沉言殊見也陽浮亦然若經氣應至無浮沉之異則悉可謂一陰之氣非復有三陰差降之殊用也陰陽山彳黑攵山彳黑攵積傳為一周氣里形表而為相成也山彳黑攵山彳黑攵言氣之往來也積謂積脈之動也傳謂陰陽之氣流傳也夫脈氣往來動而不止積其所動血氣循環應水下二刻而一周於身故曰積傳為一周也然榮衛之氣因息遊布周流形表拒捍虛邪中外主司互相成立故言氣里形表而為相成也山彳黑攵山彳黑攵一本作沖沖按易曰沖沖往來是矣六節臟象論六節臟象者謂天以六節成歲而人之臟腑與之相應也然細閱之通篇約分七段首三段俱言節氣第四段言五氣更立各有所勝所勝則微所不勝則甚所謂病因時變為本篇之要旨醫家之綱領也第五段言天生五味以養人而人得之以化精液第六段言五臟之象而並解六腑之妙用與五臟相應總取決於膽末段言脈太盛則為關格啟玄雲物不可以久盛極則衰敗是矣黃帝問曰余聞天以六六之節以成一歲人以九九制會計人亦有三百六十五節以為天地久矣不知其所謂也按六六之節以成一歲其義易明不必更贅九九制會注言九周於九野之數以制人形之會通誤矣按本篇後又言地以九九制會方是九州九野之義然人所謂九九制會者以數而言也夫天地之數起於一終於十數之成也執其成而不能變則數窮矣是故虛其一而九焉則數變又復從而九其九焉則數愈變是六六之節雖為天地一定之數然而氣盈六日朔虛六日一歲之中人則因其盈虛之數通其變而會於原於是五歲再閏焉由是言之一定不易者天地也變化無窮者人也易曰參天兩地而倚數又曰財成天地之化而不過曲成萬物而不遺非人無由矣節謂骨節惟人與天地合德故其骨節亦與天地之數相符也然止應三百六十而余其五者此以盈而變亦猶九九之數以其虛而能變也按此節之下注言九九制會氣之數也是啟玄亦知其為數矣何自相背謬乃爾乎岐伯對曰昭乎哉問也請遂言之夫六六之節九九制會者所以正天之度氣之數也六六之節天之度也九九制會氣之數也所謂氣數者生成之氣也周天之分凡三百六十五度四分度之一以十二節氣均之則歲有三百六十日而終兼以小月日又不足其數矣是以六十四氣而常置閏焉何者以其積差分故也天地之生育本址於陰陽人神之運為始終於九氣九之為用豈不大哉律書曰黃鐘之律管長九寸冬至之日氣應灰飛由此則萬物之生咸因於九氣矣古之九寸即今之七寸二分大小不同以其先秬黍之制而有異也天度者所以制日月之行也氣數者所以紀化生之用也制謂準度紀謂綱紀准日月之行度者所以明日月之行遲速也紀化生之為用者所以彰氣至而斯應也氣應無差則生成之理不替遲速以度而大小之月生焉按天雖至廣不可度矣然而盈虛消息之理弦望晦朔之期行有躔次蝕有分鈔總不離乎數數之所至氣即至焉故曰氣數氣數分明天度雖玄燎若指掌矣天為陽地為陰日為陽月為陰行有分紀周有道理日行一度月行十三度而有奇焉故大小月三百六十五日而成歲積氣余而盈閏矣日行遲故晝夜行天之一度而三百六十五日一周天而猶有度之奇分矣月行速故晝夜行天之十三度余而二十九日一周天也言有奇者謂十三度外復行十九分度之七故云月行十三度而有奇也禮義及漢律曆志云二十八宿及諸星皆從東而循天西行日月及五星皆從西而循天東行今太史說云並循天而東行從東而西轉也諸歷家說月一日至四日月行最疾日夜行十四度余自五日至八日行次疾日夜行十三度余自九日至十九日其行遲日夜行十二度余二十日至二十三日行又小疾日夜行十三度余二十四日至晦日行又大疾日夜行十四度余今太史說月行之率不如此矣月行有十五日前疾有十五日後遲者有十五日前遲有十五日後疾者大率一月四分之而皆有遲疾遲速之度固無常准矣雖爾終以二十七日月行一周天凡行三百六十一度二十九日日行二十九度月行三百八十七度少七度而不及日也至三十日日復遷計率至十三分之八月方及日矣此大盡之月也大率其計率至十三分日之半者亦大盡法也其計率至十三分日之五之六而及日者小盡之月也故云大小月三百六十五日而成歲也正言之者三百六十五日四分日之一乃一歲法以奇不成日故舉大以言之若通以六小為法則歲止三百五十四日歲少十一日余矣取月所少之辰加歲外余之日故從閏後三十二日而盈閏焉尚書曰期三百有六旬有六日以閏月定四時成歲則其義也積余盈閏者蓋以月之大小不盡天度故也立端於始表正於中推余於終而天度畢矣端首也始初也表彰示也正鬥建也中月半也推退位也言立首氣於初節之日示鬥建於月半之辰退餘閏於相望之後是以閏之前則氣不及月閏之後則月不及氣故常月之制建初立中閏月之紀無初無中縱歷有之皆他節氣也按此天官家言是正所謂人以九九制會也帝曰余已聞天度矣願聞氣數何以合之岐伯曰天以六六為節地以九九制會按首節言天以六六之節以成一歲人以九九制會指成歲盈閏言言天雖有六六之節必賴人以九九之數推之而後歲功成也此則並言天地言天有六六之節為一歲地有九州九野而與天相應也王注竟無分別天有十日日六竟而周甲甲六復而終歲三百六十日法也按此言每一歲之常數也若以盈虛言則前言大小月三百六十五日而成歲積氣余而盈閏與此不同矣盈謂氣盈虛謂朔虛也夫自古通天者生之本本於陰陽其氣九州九竅皆通乎天氣按此節無甚深義註解殊覺支離蓋言天以六六之節成於上地以九州九野列於下人則戴天履地而其氣常與之相通也故其生五其氣三按五五臟謂人具五臟以生也三生氣通天論注作天氣地氣運氣謂人在天地之中必本其氣以為氣也三而成天三而成地三而成人非唯人由三氣以生天地之道亦如是矣故易乾坤諸卦皆必三矣三而三之合則為九九分為九野九野為九臟按九九州九野爾雅云邑外謂之郊郊外謂之牧牧外謂之野野外謂之林林外謂之坰王注所引多郊外謂甸然亦止七野而缺其二焉九野為九臟猶言九臟應九野蓋互文也故形臟四神臟五合為九臟以應之也按神臟五一肝二心三脾四肺五腎五臟藏神如宣明五氣篇及九針論所言是也形臟四三部九候論言一頭角二耳目三口齒四胸中是也帝曰余已聞六六九九之會也夫子言積氣盈閏願聞何謂氣岐伯曰五日謂之候三候謂之氣六氣謂之時四時謂之歲而各從其主治焉按此言主治蓋謂一歲則以司天為主一節則以主令為主而後為之施治也五運相襲而皆治之終期之日周而復始時立氣布如環無端候亦同法故曰不知年之所加氣之盛衰虛實之所起不可以為工矣按春木生夏火火生長夏土土生秋金金生冬水水又生春木是相襲也皆治之謂各主時行令也時立氣布謂時當春則木氣旺而生髮之令行時當夏則火氣旺而長養之令行之類是也候亦同法指治病者言人與四時之氣相應亦當隨時施治也故曰以下正言不能候時以施治則不得謂之醫也注與校正俱不明確帝曰五運之始如環無端其太過不及何如岐伯曰五氣更立各有所勝盛虛之交此其常也帝曰何謂所勝岐伯曰春勝長夏長夏勝冬冬勝夏夏勝秋秋勝春所謂得五行時之勝各以氣命其臟長夏者六月也土生於火長在夏中既長而旺故云長夏也以氣命臟者春之木內合肝長夏土內合脾之類故曰以氣命其臟命名也帝曰何以知其勝岐伯曰求其至也皆歸始春始春謂立春之日也春為四時之長故候氣皆歸於立春前之日也未至而至此謂太過則薄所不勝而乘所勝也命曰氣淫至而不至此謂不及則所勝妄行而所生受病所不勝薄之也命曰氣迫凡氣之至皆謂立春前十五日乃候之初也未至而至謂所直之氣未應至而先期至也先期而至是氣有餘故曰太過至而不至謂所直之氣應至不至而後期至後期而至是氣不足故曰不及凡五行之氣我克者為所勝克我者為所不勝生我者為所生假令肝木有餘是肺金不足金不制木故木太過木氣既余則反薄肺金而乘於脾土矣故曰太過則薄所不勝而乘所勝也此皆五臟之氣內相淫併為疾故命曰氣淫也余太過例同又如木氣少不能制土土氣無畏而遂妄行水被土凌故云所勝妄行而所生受病也肝木之氣不平肺金之氣自薄故曰所不勝薄之然木氣不平土金交薄相迫為疾故曰氣迫也余不及例同所謂求其至者氣至之時也按氣因時而變一歲有一歲之氣故佔一歲之氣於始春一時有一時之氣又必隨時而驗其氣氣有至有不至則知太過與不及可因時而治病矣此二句雖是申解皆歸始春句意卻亦是言四時各有應至之氣不獨始春為然也謹候其時氣可與期失時反候五治不分邪僻內生工不能禁也按人之五臟配合五行外應四時病時不同治法亦異故云五治帝曰有不襲乎言五行之氣有不相承襲者乎岐伯曰蒼天之氣不得無常也氣之不襲是謂非常非常則變矣按天氣清淨高遠難名洵非形跡之可求然而春溫夏暑秋涼冬寒歷今古而不易謂之無常不得也有如春應溫而反寒夏應暑而反涼冬應寒而反溫秋應涼而反熱四時之氣不相承襲則已非天之常道災害必由是而起故下文即云變至則病也帝曰非常而變奈何岐伯曰變至則病所勝則微所不勝則甚因而重感於邪則死矣故非其時則微當其時則甚也言蒼天布氣尚不越於五行人在氣中豈不應於天道按注此四語是矣繼云假命木直之年有火氣至後二歲病矣等語恐未確按變至則病是根上文言四時之氣既反其常是天氣變而人受病也然病則病矣其中又有微甚之分焉譬如木直之年所能勝木者金也若人感不正之氣病在於肺肺金也金能平木本不為害雖病亦微所不能勝木而為木所克者土也若人感不正之氣病在脾胃脾胃土也土本畏木木旺土虛其病必甚病既甚矣而或更感外邪邪依於肝肝木愈盛脾胃愈虛虛不任邪故不但病甚而且必死也然此特就生克之常而論若木直之歲而人病於秋冬之時則病微病於春夏之日則病甚者秋非木旺之時故微春當木旺之時故甚也變至則病一句是頭所勝所不勝三句是說病之微甚分於五行之相制非其時二句則又以邪之衰旺本於時而分病之微甚也意各不同注俱渾淪無別且以後二三歲病為微四五歲病為甚殊屬荒唐帝曰善余聞氣合而有形因變以正名按氣不合則形不成是故形生於氣也氣不變則病不生是故病始於變也正名者病名於是正也閔芝慶作正名論論傷寒與類證傷寒之名宜正凡病之名亦不可不正可類推矣天地之運陰陽之化其於萬物孰少孰多可得聞乎岐伯曰悉哉問也天至廣不可度地至大不可量大神靈問請陳其方草生五色五色之變不可勝視草生五味五味之美不可勝極言物生之眾稟化各殊目視口味尚無能盡之況於人心乃能包括耶嗜欲不同各有所通按人性多偏故嗜欲亦異天食人以五氣地食人以五味天以五氣食人者臊氣湊肝焦氣湊心香氣湊脾腥氣湊肺腐氣湊腎也地以五味食人者酸味入肝苦味入心甘味入脾辛味入肺鹹味入腎也陰陽應象論曰陽為氣陰為味五氣入鼻藏於心肺上使五色修明音聲能彰五味入口藏於腸胃味有所藏以養五氣心榮面色肺主音聲故氣藏於心肺上使五色修潔分明音聲彰著氣為水母故味藏於腸胃內養五氣按五氣入鼻無所不到何獨藏於心肺耶蓋心者血臟也氣由鼻入先行本臟而後會於心而生血惟生血故能使五色修明也肺者氣龠也鼻為肺竅氣由鼻入會於肺而後頒布於各臟清濁於是乎分焉惟能分清濁故使音聲彰著也謂之藏於心肺宜矣至於五味入口藏於腸胃而五臟之氣即借之以養者蓋人必具五臟以生而五臟又必須五氣而運然非飲之食之則五臟之氣亦乾槁而閉塞矣是五臟之氣必借五味之氣以養也氣和而生津液相成神乃自生帝曰臟象何如象謂所見於外可閱者也岐伯曰心者生之本神之處也其華在面其充在血脈為陽中之太陽通於夏氣心者君主之官神明出焉萬物系之以興亡故曰心者生之本神之處也火氣炎上故華在面心生血其主脈故充在血脈心王於夏氣合太陽以太陽居夏火之中故曰陽中之太陽通於夏氣也按王本作神之變元起太素並作神之處良是今從之肺者氣之本魄之處也其華在毛其充在皮為陽中之少陰通於秋氣肺藏氣其神魄其合皮毛故云按王本陽中之太陰甲乙太素並作少陰新校正云肺在十二經雖為太陰然在陽分之中當為少陰也良是今從之腎者主蟄封藏之本精之處也其華在發其充在骨為陰中之太陰通於冬氣地戶封閉蟄蟲深藏腎又主水受五臟六腑之精而藏之故云主蟄封藏之本精之處也腦為髓之海腎主骨髓發者腦之所養故華在發充在骨也按王本少陰元起甲乙太素並作太陰新校正云腎在十二經雖為少陰然在陰分之中當為太陰從之肝者罷極之本魂之居也其華在爪其充在筋以生血氣為陰中之少陽通於春氣夫人之運動者皆筋力之所為也肝主筋其神魂故曰罷極之本魂之居也爪者筋之餘肝之養故華在爪充在筋也東方為發生之始故以生血氣也按罷與疲通肝主筋過勞則運用乏竭而困倦矣故云罷極又人之血氣生於心統於脾而藏於肝肝得其養則血氣充足而無病故又云以生血氣也陽中當作陰中新校正云全元起甲乙太素並同脾胃大腸小腸三焦膀胱者倉廩之本營之居也名曰器能化糟粕轉味而入出者也此至陰之類通於土氣皆可受盛轉運不息故為倉廩之本名曰器也營起於中焦中焦為脾胃之位故云營之居也然水穀滋味入於脾胃脾胃糟粕轉化其味出於三焦膀胱故云轉味而入出也土合至陰金匱真言論曰陰中之至陰脾也按入出二字妙唯有入故有出也大小腸脾胃膀胱皆先入而後出者三焦主氣何亦並言蓋三焦之氣亦借飲食之味變化而為升降也凡十一臟取決於膽也上從心臟下至於膽為十一也然膽者中正剛斷無私偏故皆取決於膽也按一臟有一臟之職司故在秘典論有十二官之分然職在專司者自不可兼攝乃功同一致者則又不可不並言所以同一臟腑也而此篇或分言或並舉以見十二臟腑之功用不同其義始全也故人迎一盛病在少陽二盛病在太陽三盛病在陽明四盛以上為格陽一盛者謂人迎之脈大於寸口一倍也余盛同法四倍以上陽盛之極故格拒而食不得入也正理論曰格則吐逆寸口一盛病在厥陰二盛病在少陰三盛病在太陰四盛以上為關陰盛法同陽四倍以上陰盛之極故關閉而溲不得通也正理論曰閉則不得溺人迎與寸口俱盛四倍以上為關格關格之脈贏不能極於天地之精氣則死矣俱盛謂俱大於平常之脈四倍也物不可久盛極則衰敗故不能極於天地之精氣則死矣按新校正云古文贏與盈通用反四時者有餘為精不足為消應太過不足為精應不足有餘為消陰陽不相應病名曰關格廣陳其脈應也夫反四時者諸不足皆為血氣消損諸有餘皆為邪氣勝精也陰陽之氣不相應合不得相營故曰關格也按此一段原刻在脈要精微論中獨論關格無問突答必錯簡也今移於此庶文義相貫謹按靈樞終始篇云人迎一盛病在足少陽一盛而躁病在手少陽人迎二盛病在足太陽二盛而躁病在手太陽人迎三盛病在足陽明三盛而躁病在手陽明人迎四盛且大且數名曰溢陽溢陽為外格脈口一盛病在足厥陰一盛而躁病在手心主脈口二盛病在足少陰二盛而躁病在手少陰脈口三盛病在足太陰三盛而躁病在手太陰脈口四盛且大且數名曰溢陰溢陰為內關內關不通死不治人迎與太陰脈口俱盛四倍以上命曰關格關格者與之短期又脈度篇云邪在腑則陽脈不和陽脈不和則氣留之氣留之則陽氣盛矣陽氣太盛則陰不利陰不利則血留之血留之則陰氣盛矣陰氣太盛則陽氣不能榮也故曰關陽氣太盛則陰氣弗能榮也故曰格陰陽俱盛不得相榮故曰關格關格者不得盡期而死也繼是禁服篇亦言關格合而觀之脈陰陽外盛之極者實真原內竭之象也死不旋踵又何疑焉其辨關格者始於越人三難謂脈有太過有不及有陰陽相乘有復有溢有關有格以體象言也仲景云在尺為關在寸為格關則不得小便格則吐逆叔和因之東垣則分左為人迎右為氣口氣口之脈大四倍於人迎此清氣反行濁道也故曰格人迎之脈大四倍於氣口此濁氣反行清道也故曰關關則不得小便格則吐逆至於丹溪則別立關格一門云寒在上熱在下脈兩寸俱盛四倍以上此病多死吾鄉前輩馬玄臺言關格是脈體非病名張景岳稱其獨超前代是也乃以經中所言人迎專屬之結喉旁之人迎穴而力詆從前之非且咎東垣創以左寸為人迎之謬噫何其言之過而所見之偏且鑿也夫結喉旁之人迎人迎穴也經中所言固多指此且亦原無以左寸名人迎之明文猶可矇混言之至謂兩手寸脈盡屬三陰則謬甚也請即以經之言脈者證之脈要精微論曰尺內兩旁則季脅也尺外以候腎尺裡以候腹中附上左外以候肝內以候膈右外以候胃內以候脾上附上右外以候肺內以候胸中左外以候心內以候膻中前以候前後以候後觀此是不獨三陰俱候於三部即三陽亦皆候於三部也經之凡言人迎若何者蓋以三陽之脈皆上頭而頸旁之人迎為陽明胃經之外候可以候胃經之盛衰不可以候三陽經之疾病且也左寸名人迎亦非創自東垣也靈樞五色篇曰人迎盛堅者傷於寒氣口甚堅者傷於食夫人迎與氣口對稱右寸為氣口右關即脾胃脾胃傷食則甚堅之脈形於右寸左寸為人迎左關則肝膽肝感風寒以致盛堅之脈見於左寸也是此人迎實指左寸本篇固已言之矣但因經無明指左寸為人迎之名故景岳可以率意言之耳況人身之內一名而兩穴者如臨泣竅陰氣海之有上下三里之分手足巨虛之別上下廉也安在結喉旁之名人迎左寸之不當更名人迎乎景岳誠未之思耳且其自言嘗治蒯司馬田宗伯脈來堅盛至極者亦止診之於兩寸初非上診於喉旁惟是以關格為脈體脈盛之極為無陰真陰敗竭孤陽浮露一段妙解深中關格肯綮未可以其一言之失而棄之也
