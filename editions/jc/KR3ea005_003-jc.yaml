body:
  text: 卷之三熱論仲景作傷寒論為萬世湯液之祖而其源實本於此篇此篇本論傷寒而以熱論名篇者寒言其因熱言其成也黃帝問曰今夫熱病者皆傷寒之類也或愈或死其死皆以六七日之間其愈皆以十日以上者何也不知其解願聞其故寒者冬氣也冬時嚴寒萬類深藏君子固密不傷於寒觸冒之者乃名傷寒其傷於四時之氣皆能為病以傷寒為毒者最乘殺厲之氣中而即病名曰傷寒不即病者寒毒藏於肌膚至夏至前變為溫病夏至後變為熱病然其發起皆為傷寒致之故曰熱病者皆傷寒之類也岐伯對曰巨陽者諸陽之屬也巨大也太陽之氣經絡血氣榮衛於身故諸陽氣皆所宗屬其脈達於風府風府穴名在項上入髮際一寸宛宛中是故為諸陽主氣也人之傷於寒也則為病熱熱雖甚不死寒毒薄於皮膚陽氣不得發散而內怫結故傷寒者反為病熱其兩感於寒而病者必不免於死臟腑相應而俱受寒謂之兩感按傷寒之為病也感之平日發於一時傳變不常真假難辨為諸病之最為證治之綱醫家所當精思而熟計者以故軒岐特為之立論仲景更為之闡揚然其義旨精深雖以王氏之解頗稱明確惜尚有未詳盡處茲特更採閔氏之意而分注之庶幾字句精核條貫分明今而後可以讀熱論並可讀傷寒論矣閔氏名芝慶西吳人也著作甚富余恨不盡見此特其一斑爾閔氏曰此承帝問而先舉其大略以對也帝言病熱由於傷寒則凡熱病者皆傷寒之類也然其愈其死必有其期者何故伯言足太陽經稱為巨陽其脈自睛明而始上連於督脈之風府穴由頭項至背至足凡一身手足陽經皆屬於此故穴有一百二十六真為諸陽主氣也人傷於寒始自巨陽之氣不得伸越於表鬱而成熱由此漸傳入里皆為熱病熱雖甚不死有大邪衰而自愈者有可汗可泄者也唯兩感於寒而一日二經病者必死帝曰願聞其狀岐伯曰傷寒一日巨陽受之故頭項痛腰脊強二日陽明受之陽明主肉其脈挾鼻絡於目故身熱目疼而鼻乾不得臥也三日少陽受之少陽主膽其脈循脅絡於耳故胸脅痛而耳聾三陽經絡皆受其病而未入於臟者故可汗而已四日太陰受之太陰脈布胃中絡於嗌故腹滿而嗌乾五日少陰受之少陰脈貫腎絡於肺系舌本故口燥舌乾而渴六日厥陰受之厥陰脈循陰器而絡於肝故煩滿而囊縮三陰三陽五臟六腑皆受病營衛不行五臟不通則死矣其不兩感於寒者七日巨陽病衰頭痛少愈八日陽明病衰身熱少愈九日少陽病衰耳聾微聞十日太陰病衰腹減如故則思飲食十一日少陰病衰渴止不滿舌乾已而嚏十二日厥陰病衰囊縱少腹微下大氣皆去病日已矣按此詳論傷寒傳經非兩感者其死其愈之故也人之一身三陽為表三陰為里其巨陽為三陽最在外陽明為二陽在太陽之內少陽為一陽在陽明之內此三陽者為表也其太陰為三陰在少陽之內少陰為二陰在太陰之內厥陰為一陰在少陰之內此三陰者為里也皆由內數至外故一二三紀其次第如此傷寒自表入里以六經言則始太陽終厥陰以一身言則先入皮膚次入肌肉次入半表半裡次入臟腑隨經之傳而日深者也經之最在外者先受病故一日巨陽受之即太陽膀胱經也啟玄曰太陽脈浮傷寒論曰尺寸俱浮者太陽受病也當一二日發仲景意謂不可拘夫一日也故其六經皆兼兩日而言太陽之脈從巔下項挾脊抵腰經為邪壅而不利故痛且強也表邪不解日漸深入故二日足陽明受之三日足少陽受之故曰主膽自太陽以至陽明少陽三陽經絡皆受其病而未入於臟腑者可汗之而已如可汗不汗病不得已及至四日足太陰脾經受之又至五日足少陰腎經受之又至六日足厥陰肝經受之其病之所苦者一如其脈絡之所到三陰繼三陽而受病五臟六腑皆同三陰而受病如可泄不泄病亦不已則終於營衛不行臟腑不通死矣所謂死皆以六七日之間者如此然日傳一經之證非若兩感於寒必不免於死也其不兩感於寒亦有自愈焉者一日巨陽受之若病不傳別經不加異氣而變為他證則自一日至七日當自愈也傷寒論曰發於陽者七日愈以陽數七故也又自二日至八日亦是七日而當愈余經皆以是數計之如少陰病不傳不變而至十一日衰渴止舌乾已而發為嚏原病式曰心火邪熱干於陽明發於鼻而癢則嚏也傷寒衰而成嚏者由火熱已退虛熱為癢癢發則嚏也又曰微熱則癢由太陽以至厥陰自一日以至十二日不傳變而病衰者大邪之氣皆去病日已矣所謂愈皆在十日以上者如此所謂熱雖甚不死者如此奈何後世有再傳之說也考之內經本篇與仲景傷寒論並無此義乃成氏註釋之誤耳夫三陽為表三陰為里自太陽以至厥陰猶人入戶升堂以入於室耳既至厥陰乃復出而傳之太陽奈有二陰三陰一陽二陽以隔之豈有遽出而傳之太陽之理帝曰治之奈何岐伯曰治之各通其臟脈病日衰已矣其未滿三日者可汗而已其滿三日者可泄而已按此因上文有死於失治者而言治之大體也未滿三日之前見三陽病形如頭痛身熱耳聾之類可汗而已其表病已滿三日之後見三陰病形如腹滿燥渴囊縮之類可泄而已其里病各能通其臟腑之脈病日衰矣所謂熱雖甚不死者又如此按正理傷寒論曰脈大浮數病為在表可發其汗脈細沉數病為在裡可下之如或日數過多尚有表證而脈大浮數猶宜發汗日數雖少已見里證而脈沉細數者便可下之汗下之法須審脈辨證不可拘夫日數也帝曰熱病已愈時有所遺者何也岐伯曰諸遺者熱甚而強食之故有所遺也若此者皆病已衰而熱有所藏因其穀氣相搏兩熱相合故有所遺也帝曰善治遺奈何岐伯曰視其虛實調其逆從可使必已矣帝曰病熱當何禁之岐伯曰病熱少愈食肉則復多食則遺此其禁也按此言病遺治法而禁強食也熱甚之後而強食之則餘邪與穀氣相蒸兩熱相合故病有所遺也視其虛實而補瀉之法合其宜調其逆從而反正之治得其道病必已矣然與其既遺而治之孰若思患而禁之病熱少愈胃氣尚虛食肉難化鬱而助熱熱病當復發如故矣肉固不可多食凡不可多食者而多食之則病熱有所遺焉當禁者也帝曰其病兩感於寒者其脈應與病形何如岐伯曰兩感於寒者病一日則巨陽與少陰俱病則頭痛口乾而煩滿二日則陽明與太陰俱病則腹滿身熱不欲食譫語三日則少陽與厥陰俱病則耳聾囊縮而厥水漿不入不知人六日死帝曰五臟已傷六腑不通營衛不行如是之後三日乃死何也岐伯曰陽明者十二經脈之長也其血氣盛故不知人三日其氣乃盡故死矣按此言兩感於寒者必不免於六日死也以經脈之應與病形言之日傳兩經表裡之證並見至三日則六經傳盡水漿不入口不知人延至六日必死矣當不知人之時五臟六腑已傷而不通營衛已不行宜即死矣必又三日乃死何也蓋陽明為十二經脈之長其氣血俱盛諸經受氣於陽明其氣散入諸經各隨其經而盡故死必於六日當三日之時雖劇不死者正以氣血未盡故也所謂兩感於寒必不免於死者如此凡病傷寒而成溫者先夏至日者為病溫後夏至日者為病暑暑當與汗皆出勿止按此結傷寒有不即病而過時成溫暑者也中而即病者名曰傷寒不即病者寒毒藏於肌膚先夏至發者為病溫後夏至發者為病暑病則熱極重於溫耳此以天時病形而為名者也暑病熱邪自內達表亦有表證須解當令其邪與汗皆出勿反止之溫病當汗在不言中矣評熱病論篇中凡四段一論陰陽交二論風厥三論勞風四論腎風評熱者謂四者之病皆本於熱而評論之也每段各有精義宜熟思之黃帝問曰有病溫者汗出輒復熱而脈躁疾不為汗衰狂言不能食病名為何岐伯對曰病名陰陽交交者死也交謂交合陰陽之氣不分別也帝曰願聞其說岐伯曰人所以汗出者皆生於穀穀生於精言穀氣化為精精氣勝乃為汗今邪氣交爭於骨肉而得汗者是邪卻而精勝也精勝則當能食而不復熱復熱者邪氣也汗者精氣也今汗出而輒復熱者是邪勝也不能食者精無俾也病而留者其壽可立而傾也無俾言無可使為汗也穀不化則精不生精不化流故無可使按甲乙經作熱留亦通蓋邪之為熱得汗則解今汗後復熱是精氣內竭不能托邪出外故熱留著而不去發之不可補之無及未有不死者也且夫熱論曰汗出而脈尚躁盛者死熱論上古熱論也今脈不與汗相應此不勝其病也其死明矣狂言者是失志失志者死今見三死不見一生雖愈必死也按此又引古論而反復詳言汗後復熱之為必死也帝曰有病身熱汗出煩滿煩滿不為汗解此為何病岐伯曰汗出而身熱者風也汗出而煩滿不解者厥也病名曰風厥帝曰願卒聞之岐伯曰巨陽主氣故先受邪少陰與其為表裡也得熱則上從之從之則厥也帝曰治之奈何岐伯曰表裡刺之飲之服湯按汗出汗自出也太陽為表少陰為里表虛而風入之故自汗而身熱風化為熱熱盛則水往濟之少陰者腎水也水不勝火故煩滿而厥自下逆上故也帝問治之之法伯雖不言其所以而所以治之之法已居可知然則治之維何曰涼解之中兼滋其陰是矣帝曰勞風為病何如岐伯曰勞風法在肺下從勞風生故曰勞風按肺下蓋言病自肺下而上也其為病也使人強上冥視按病既在肺氣必喘促強上者勉強仰首俯則喘促故也冥視者氣內奔迸視物不明也強上聲唾出若涕惡風而振寒此為勞風之病帝曰治之奈何岐伯曰以救俯仰巨陽引精者三日中年者五日不精者七日咳出青黃涕其狀如膿大如彈丸從口中若鼻中出不出則傷肺傷肺則死也按岐伯所對自以救起至七日凡二十一字殊無意義此中必有錯誤闕疑可也謹按勞風一條本云法在肺下又云唾出若涕惡風振寒及咳出青黃涕其狀如膿末云傷肺則死等語詳求其義始終則是肺病蓋肺合皮毛人勞則毛竅開豁風邪入而伏於肺結為穢液如涕如膿所以得出則生不出則傷肺而死王注謂是腎勞且將俯仰引精等語強為之解甚屬支離即甲乙千金所解亦欠明確帝曰有病腎風者面胕㾓然壅害於言可刺否㾓然腫起貌壅謂目下壅如臥蠶形也腎之脈從腎上貫肝膈入肺中循喉嚨挾舌本故妨於言語岐伯曰虛不當刺不當刺而刺後五日其氣必至至謂病氣來至也帝曰其至何如岐伯曰至必少氣時熱時熱從胸背上至頭汗出手熱口乾苦渴小便黃目下腫腹中鳴身重難以行月事不來煩而不能食不能正偃正偃則咳病名曰風水帝曰願聞其說岐伯曰邪之所湊其氣必虛陰虛者陽必湊之故少氣時熱而汗出也小便黃者少腹中有熱也不能正偃者胃中不和也正偃則咳甚上迫肺也諸有水氣者微腫先見於目下也按氣盛則足以衛外邪無自而入故唯氣虛然後邪乃得而湊之也氣虛者陽虛也陽虛固足以致邪若夫陰虛則更有說矣陰者水也陽者火也水盛則足以制火而陰陽得其平水涸則火偏勝陰愈虛則陽愈盛烈焰熾張一身盡火豈知止是陰虛之所致則苦寒之不可以妄投也湊謂眾火輳集也不能正偃者胃不和則臥不安也胃既不和則不能養肺而且沖肺矣帝曰何以言岐伯曰水者陰也目下亦陰也腹者至陰之所居故水在腹者必使目下腫也真氣上逆故口苦舌乾臥不得正偃正偃則咳出清水也諸水病者故不得臥臥則驚驚則咳甚也腹中鳴者病本於胃也薄脾則煩不能食食不下者胃脘膈也身重難以行者胃脈在足也月事不來者胞脈閉也胞脈者屬心而絡於胞中今氣上迫肺心氣不得下通故月事不來也按伯所對前後頗不合注謂應古脫簡良是抑或者因帝問而更推廣其義前略後詳故參差言之亦未可知也真氣當作火氣解方與口苦舌乾意合諸水病不得臥臥則驚者水性下行臥則逆而不能安也心氣不得下通則月事不來心主血故也帝曰善太陰陽明論太陰陽明者脾與胃也脾胃者土也土為萬物之母性命托之以為基臟腑資之以為養所繫至重非他臟腑之可比故特為之合論焉黃帝問曰太陰陽明為表裡脾胃脈也生病而異者何也岐伯對曰陰陽異位更虛更實更逆更從或從內或從外所從不同故病異名也按楊上善云春夏陽明為實太陰為虛秋冬太陰為實陽明為虛即更虛更實也春夏太陰為逆陽明為從秋冬陽明為逆太陰為從即更逆更從也最為明確帝曰願聞其異狀也岐伯曰陽者天氣也主外陰者地氣也主內是所謂陰陽異位也故陽道實陰道虛按以言其體則陽以奇而實陰以偶而虛以言其用則陽以動而實陰以靜而虛故犯賊風虛邪者陽受之食飲不節起居不時者陰受之是所謂或從內或從外也陽受之則入六腑陰受之則入五臟入六腑則身熱不時臥上為喘呼入五臟則䐜滿閉塞下為飧泄久為腸澼是所謂所從不同病異名也按風自外來故屬陽飲食起居傷於內故屬陰陽入六腑六腑者陽經也陰入五臟五臟者陰經也陰有陰病陽有陽病飧泄利水穀也腸澼痢也既利水穀何以更痢蓋泄利既久則陰血大傷故痢也故喉主天氣咽主地氣故陽受風氣陰受濕氣按喉司呼吸故主天咽司飲食故主地風為陽邪在上故也濕為陰邪在下故也故陰氣從足上行至頭而下行循臂至指端陽氣從手上行至頭而下行至足按靈樞經曰手之三陰從臟走手手之三陽從手走頭足之三陽從頭走足足之三陰從足走腹與此相合蓋言六陰六陽經行之脈絡為一定不易之常道惟經行之道路不同故患病自爾有異也故曰陽病者上行極而下陰病者下行極而上此言其大凡爾然足少陰脈下行則不同諸陰之氣也按陽上陰下病之常也極則相反病之變也即如陽證似陰陰證似陽之類總是病極之所致易之所以少不變而老變也故傷於風者上先受之傷於濕者下先受之按風濕中人何處不到但原其始則有先受之不相同耳帝曰脾病而四肢不用何也按本篇原以太陰陽明命名乃此節以前但泛論陰陽上下內外之常道岐伯蓋止對帝問生病而異之意而已自此以下始正論脾胃要旨凡三段而所主之病不與焉岐伯曰四肢皆稟氣於胃而不得至經按胃以水穀資養四肢然不能遽至於四肢至經謂至手足之經也太素作經至反蛇足矣必因於脾乃得稟也按四肢固借水穀為資養而水穀非脾不能運化是故脾化水穀而後四肢乃得其養也今脾病不能為胃行其津液四肢不得稟水穀氣氣日以衰脈道不利筋骨肌肉皆無氣以生故不用焉按厥論篇曰脾主為胃行其津液者也津液不行則一身失其所養矣帝曰脾不主時何也岐伯曰脾者土也治中央常以四時長四臟各十八日寄治不得獨主於時也按萬物生於土木火金水所不能外也故雖分王於四季而實為四時之總司是故五運首尊甲己也脾臟者常著胃土之精也土者生萬物而法天地故上下至頭足不得主時也按著著見也胃主受脾主運胃受水穀而脾為之運化使之著見於一身是胃土之精實由脾著也設令脾亦專主一時豈能徹上徹下如是哉著陟慮切帝曰脾與胃以膜相連耳而能為之行其津液何也岐伯曰足太陰者三陰也其脈貫胃屬脾絡嗌故太陰為之行氣於三陰陽明者表也胃是脾之表也五臟六腑之海也亦為之行氣於三陽臟腑各因其經而受氣於陽明故為胃行其津液按脾臟胃腑陰陽相配分而言之各能行氣於陰陽合而言之胃受水穀變化津液非脾不能運其經即脾經也言五臟六腑必借脾之運化而後得受胃氣以為養胃之津液亦必借脾之運化而後得遍及於五臟六腑也注俱略而不言何也四肢不得稟水穀氣日以益衰脈道不利筋骨肌肉無氣以生故不用焉又復明脾主四肢之義也陽明脈解篇前篇太陰陽明已並論矣而此更以陽明之脈特為解說者誠以胃為五臟六腑之海所繫尤重其脈其證不可不更為之辨也黃帝問曰足陽明之脈病惡人與火聞木音則惕然而驚鐘鼓不為動聞木音而驚何也願聞其故岐伯對曰陽明者胃脈也胃者土也故聞木音而驚者土惡木也按土本畏木猝然聞之故惕然而驚也帝曰善其惡火何也岐伯曰陽明主肉其脈血氣盛邪客之則熱熱甚則惡火按陽明木多氣血邪客之則熱益甚故惡火帝曰其惡人何也岐伯曰陽明厥則喘而惋惋則惡人按惋驚歎也厥逆也火與氣上逆故作驚歎之聲也驚歎不已喜靜惡動故不欲見人也又脈解篇云欲獨閉戶牖而處者陰陽相搏也陽盡而陰盛故欲獨閉戶牖而居帝曰或喘而死者或喘而生者何也岐伯曰厥逆連臟則死連經則生按經淺而臟深也帝曰善病甚則棄衣而走登高而歌或至不食數日逾垣上屋所上之處皆非其素所能也病反能者何也岐伯曰四肢者諸陽之本也陽盛則四肢實實則能登高也陽受氣於四肢故四肢為諸陽之本按三陽實熱雖皆多火而惟陽明為尤甚邪入其經大熱發狂強而有力人不能制正由陽盛之極也帝曰其棄衣而走者何也按棄衣謂裸體岐伯曰熱盛於身故棄衣欲走也按此真熱盛而裸體者為傷寒之實熱更有陰竭陽浮身冷如冰而反裸體狂躁者不可不知也帝曰其妄言罵詈不避親疏而歌者何也岐伯曰陽盛則使人妄言罵詈不避親疏而不欲食不欲食故妄走也按此所言諸證皆真火實邪陽明經之實證也傷寒時疫乃有之逆調論人之為病順與逆而已順者或可勿藥逆則所當急治者也逆調論者蓋論調逆之法凡六段然人之逆證實不止於如此也黃帝問曰人身非常溫也非常熱也為之熱而煩滿者何也岐伯對曰陰氣少而陽氣勝故熱而煩滿也按陰虛於內則陽浮於外故熱而煩滿陽之勝也陰少故也帝曰人身非衣寒也中非有寒氣也寒從中生者何岐伯曰是人多痹氣也陽氣少陰氣多故身寒如從水中出按經絡論曰陽虛生外寒刺志論曰氣虛者寒也陽者火也陽虛則無火而水獨治故一身內外皆寒也痹者頑木不仁之謂蓋氣生於火無火則氣凝泣而痹矣氣痹身寒似屬陰多實則由於陽少之故也帝曰人有四肢熱逢風寒如炙於火者何也按王本如炙如火太素作如炙於火義更通從之岐伯曰是人者陰氣虛陽氣盛四肢者陽也兩陽相得而陰氣虛少少水不能滅盛火而陽獨治獨治者不能生長也獨勝而止耳逢風而如炙於火者是人當肉爍也按內陽已盛又逢外熱故云兩陽相得相得者以火濟火也純陽無陰豈能生長火愈盛則水益枯而肢體乾槁其肉必消爍也帝曰人有身寒湯火不能熱厚衣不能溫然不凍慄是為何病岐伯曰是人者素腎氣勝以水為事太陽氣衰腎脂枯不長腎者水也而生於骨腎不生則髓不能滿故寒甚至骨也所以不能凍慄者肝一陽也心二陽也腎孤臟也一水不能勝二火故不能凍慄病曰骨痹是人當攣節也按腎氣素勝則恃其強而縱欲矣故云以水為事然恃而不已則腎髓必且枯竭以至寒徹於骨也肝本屬陰然主木而能生火又與膽為表裡故亦云一陽肝心二臟在五臟之中為木火相資故能以熱勝寒也攣節注云腎不生則髓不滿髓不滿則筋干縮故節攣拘是也帝曰人之肉苛者雖近衣絮猶尚苛也是謂何疾苛謂𤸷重岐伯曰榮氣虛衛氣實也按言肉之𤸷重由於榮血不足故不知痛癢然榮之所以致虛者由於衛氣偏盛陽盛陰虛而血少故也榮氣虛則不仁衛氣虛則不用榮衛俱虛則不仁且不用肉如故也人身與志不相有曰死按此又因論榮虛而並及於衛虛以明不用不仁之所以為病也帝曰人有逆氣不得臥而息有音者有不得臥而息無音者有起居如故而息有音者有得臥行而喘者有不得臥不能行而喘者有不得臥臥而喘者皆何臟使然願聞其故岐伯曰不得臥而息有音者是陽明之逆也足三陽者下行今逆而上行故息有音也陽明者胃脈也胃者六腑之海其氣亦下行陽明逆不得從其道故不得臥也下經曰胃不和則臥不安此之謂也夫起居如故而息有音者此肺之絡脈逆也絡脈不得隨經上下故留經而不行絡脈之病人也微故起居如故而息有音也夫不得臥臥則喘者是水氣之客也夫水者循津液而流也腎者水臟主津液主臥與喘也帝曰善尋經所解之旨不得臥而息無音者有得臥行而喘有不得臥不能行而喘此三義悉闕未對亦脫簡也按絡脈在皮毛之內經脈之外尚屬浮淺非如臟腑之深而重也故邪雖客之而病微息有音如鼻塞氣粗咳嗽吐痰之類不過肺經感冒之輕者氣厥論厥逆也人之運行一身者氣也氣順則治氣逆則病此篇所言皆氣逆行之為病故云氣厥也氣之所以逆而為病者由於寒熱之所致移寒移熱者盛極而逆行也然同一寒熱之為病乃移寒者僅止於五臟而移熱則遍及於六腑何也蓋寒為水化其性陰其氣靜故病止及於五臟熱為火化其性陽其氣動故由臟而並及於腑也黃帝問曰五臟六腑寒熱相移者何岐伯曰腎移寒於脾癰腫少氣按王本移寒於肝詳文義應作移寒於脾按全元起本云腎移寒於脾注云腎傷於寒而傳於脾脾主肉寒生於肉則結為堅堅化為膿故為癰也血傷氣少故曰少氣甲乙亦作移寒於脾王本作移寒於肝或傳寫誤也今改正脾移寒於肝癰腫筋攣脾臟主肉肝臟主筋肉溫則筋舒肉冷則筋急故筋攣也按脾寒則氣滯肝寒則血凝氣血凝滯則結為癰腫注言肉冷辭不達意肝移寒於心狂隔中按木火內盛則病狂狂者熱病寒亦何以致狂也六元正紀大論曰木鬱達之火鬱發之木火之性喜發達而惡抑鬱肝受寒而傳於心木火之氣鬱而不能遂其發達之性於是神明亂而為狂矣是其狂也實由於火氣閉隔於中而然也心移寒於肺肺消肺消者飲一溲二死不治按消者火盛爍水亦熱病也心受寒氣何能消肺蓋心者火也剋金者也肺者金也畏火者也火性得熱則外散得寒則內閉心既受寒火為寒抑外為寒包內實藏火移而之肺火氣內攻金不勝刑故消散而令溲倍於飲也飲少溲多精氣竭矣誰能治之肺移寒於腎為湧水湧水者按腹不堅水氣客於大腸疾行則鳴濯濯如囊裹漿水之病也按氣者水之母肺主諸氣降下之令操焉是故氣利則水行氣閉則水滯然氣之或利或閉者熱則利寒則閉今肺寒而移於腎是氣閉而不下達故水湧溢於大腸而令濯濯有聲也大腸者肺之合氣閉水逆肺病以從其合也脾移熱於肝則為驚衄肝藏血又主驚故熱薄之則驚而鼻中出血肝移熱於心則死按心本火臟更受木燔以火益火陽而亢矣焉得不死王注誤引強解冒昧極矣心移熱於肺傳為膈消按心火刑金金不勝熱故致消渴膈者上膈也火上衝肺病止膈上所以別於中下上消是也肺移熱於腎傳為柔痓按柔痓解注不明確竊意痓者筋脈抽掣木之病也木養於水今腎受肺熱水枯不能養筋故令搐搦不已但比剛痙少緩故曰柔也痓音翅腎移熱於脾傳為虛腸澼死不可治脾土製水腎反移熱以與之是脾土不能制水而受病故久久傳為虛損也腸澼死者腎主下焦象水而冷今乃移熱是精氣內消下焦無主以守持故腸澼除而氣不禁止按腸澼痢疾也痢之為病似止屬脾而不知其為受腎傳熱之所致欲去腎熱必用滋陰世之治痢止於治脾者非也胞移熱於膀胱則癃溺血按膀胱者水道也胞者盛溺之所俗名尿胞是也胞與膀胱相連而近亦言移者沿前文也二者皆熱水為火灼故小便閉而溺血也膀胱移熱於小腸膈腸不便上為口糜糜謂爛也按小腸受化物膀胱藏津液膀胱居小腸之下今受熱而移於小腸則反自下而上矣火性炎上胸膈腸胃俱為之不便而口且糜爛不便不安也小腸移熱於大腸為虙瘕為沉按小腸者心之腑丙火也大腸者肺之腑庚金也小腸屬火而更受他熱移入大腸火氣凌金金不能勝其氣伏匿而成瘕瘕者假也氣所聚也其病如是其脈則沉金畏火刑如盛夏之時庚伏是也注以瘕為血溢以沉為月閉不辨金火之義誤矣虙與伏同大腸移熱於胃善食而瘦人謂之食亦食亦者食移易而過不生肌膚也亦易也按胃主受納大腸主變化飲食二者是其職也二腑既熱陽明火熾內消水穀外鑠肌肉故食雖多而人愈瘦食亦之解誠如注云瘦人王本作瘦入義既難通甲乙經入作又讀連下文上無所謂何得言又理亦不合余謂入者人字之訛讀作瘦人較通今釐正之胃移熱於膽亦曰食亦按膽者肝之腑陽木也木本有火更受胃熱木火相燔故其為病如同二陽故亦曰食亦也膽移熱於腦則辛頞鼻淵鼻淵者濁涕下不止也傳為衄蔑瞑目腦液下滲則為濁涕涕下不止如彼水泉故曰鼻淵也頞鼻額也熱盛則陽絡溢陽絡溢則衄出汗血衊汗血也血出甚陽明太陽脈衰不能榮養於目故目瞑瞑暗也按膽屬木而生火復受多火移入於腦木火上衝故病皆在上辛者辣也火之氣也注作痠痛誤矣傳者以次而及之謂言先鼻淵而後衄衊瞑目也頞音遏鼻梁也故得之氣厥也厥者氣逆也皆由氣逆而得之按此總結上文之旨也注意是矣然逆之為解雖自下而上之稱亦不正而亂之意蓋氣順則治逆則亂移寒移熱實氣逆亂而然也舉痛論病之急而難忍者痛也痛各不同故帝問其目而伯舉以相對然本篇止以舉痛命名而後半則更論九氣其義特精為醫家要旨一篇兩義前後絕不相符者此論是也黃帝問曰余聞善言天者必有驗於人善言古者必有合於今善言人者必有厭於已如此則道不惑而要數極所謂明也按厭為充足言洞悉也今余問於夫子令言而可知視而可見捫而可得令驗於已而發蒙解惑可得而聞乎岐伯再拜稽首對曰何道之問也帝曰願聞人之五臟卒痛何氣使然岐伯對曰經脈流行不止環周不休寒氣入經而稽遲泣而不行客於脈外則血少客於脈中則氣不通故卒然而痛按經脈者氣血運行之道路故言流行不止環周不休無病之人常如是也若寒氣乘間而入於經脈之中則氣血為之凝滯而痛矣此粗舉痛之大概多本於寒也泣音澀帝曰其痛或卒然而止者或痛甚不休者或痛甚不可按者或按之而痛止者或按之無益者或喘動應手者或心與背相引而痛者或脅肋與少腹相引而痛者或腹痛引陰股者或痛宿昔而成積者或卒然痛死不知人少間復生者或痛而嘔者或腹痛而後泄者或痛而閉不通者凡此諸痛各不同形別之奈何岐伯曰寒氣客於脈外則脈寒脈寒則縮踡縮踡則脈絀急絀急則外引小絡故卒然而痛得炅則痛立止按脈周身脈絡也寒自皮毛而入皮毛居脈絡之外故云脈外寒漸入內筋脈縮急而痛者肝之病也肝為風木治宜發散得炅痛止者寒氣散也寒則收引故縮急熱則氣行故痛止也踡音權絀音屈炅居永切因重中於寒則痛久矣按才止復中痛自延綿寒氣客於經脈之中與炅氣相搏則脈滿滿則痛而不可按也寒氣稽留炅氣從上則脈充大而血氣亂故痛甚而不可按也按內素有熱外適感寒寒熱交爭血氣潰亂此痛之實者所宜分解者一段兩義蓋微甚之分也注云脈既滿大血氣復亂按之則邪氣攻內故不可按內攻之解甚確寒氣客於腸胃之間膜原之下血不得散小絡急引故痛按之則血氣散故按之痛止膜謂膈間之膜原謂膈肓之原按血得熱則行得寒則凝按之則氣流動而血運行故痛止然不按則又復痛矣注以血不得散專指膈膜之中小絡脈內血誤矣寒氣客於挾脊之脈則深按之不能及故按之無益也按按摹之力但及浮淺深則不能挾脊者背也人身之中惟背厚而深故雖按無益也注以挾脊為督脈太陽誤矣夫督脈太陽果痛其經頗淺汗之足矣何得言深今言按者但指背肉言也寒氣客於衝脈衝脈起於關元隨腹直上寒氣客則脈不通脈不通則氣因之故喘動應手矣衝脈奇經脈也關元穴名在臍下三寸言起自此穴即隨腹而上非生出於此也其本生出乃起於腎下也按氣因之謂脈不通而氣亦因之不行也蓋氣隨脈而動潛移默運無形無跡今寒客衝脈脈閉氣壅吸吸內動有形可跡故云喘動應手也寒氣客於背俞之脈則脈泣脈泣則血虛血虛則痛其俞注於心故相引而痛按之則熱氣至熱氣至則痛止矣背俞謂心俞亦足太陽脈也夫俞者皆內通於臟故曰其俞注於心相引而痛也按之則溫氣入溫氣入則心氣外發故痛止寒氣客於厥陰之脈厥陰之脈者絡陰器繫於肝寒氣客於脈中則血泣脈急故脅肋與少腹相引而痛矣厥陰者肝之脈入髦中環陰器抵少腹上貫膈布脅肋故曰絡陰器繫於肝脈急引脅與少腹痛也厥氣客於陰股寒氣上及少腹血泣在下相引故腹痛引陰股亦厥陰肝脈之氣也以其脈循陰股入髦中環陰器上抵少腹故云寒氣客於小腸膜原之間絡血之中血泣不得注於大經血氣稽留不得行故宿昔而成積矣言血為寒氣之所凝結而乃成積寒氣客於五臟厥逆上泄陰氣竭陽氣未入故卒然痛死不知人氣復反則生矣言臟氣被寒擁冒而不行氣復得通則已也按五臟本陰更得寒氣陰凝之極四肢逆冷以致嘔吐故云厥逆上泄也然是病也純陰無陽陰氣獨治而反言竭者盛極氣盡而無餘也氣復則生者人生於陽而死於陰也寒氣客於腸胃厥逆上出故痛而嘔也按寒入腸胃抑陽於下寒熱交爭故痛然寒入自外不能久停故又欲上出而嘔也寒氣客於小腸不得成聚故後泄腹痛矣按小腸者受盛之腑主瀉而不藏更受客寒不能停蓄故令大便泄利而腹痛然要之寒亦隨泄而去也熱氣留於小腸腸中痛癉熱焦渴則堅幹不得出故痛而閉不通矣按以前十二則皆言痛本於寒而此一則言熱痛也熱氣蓄於小腸小腸者火之腑火閉於內二便不通故云堅干堅者大便燥結乾者小便癃澀也此痛之實者所當通利者也帝曰所謂言而可知者也視而可見奈何岐伯曰五臟六腑固盡有部謂面上之部分視其五色黃赤為熱白為寒青黑為痛此所謂視而可見者也按有諸內者形諸外自然之理也內熱則色黃赤然亦有陰虛陽浮而火上升於面者內寒則色白然亦有火鬱於內而色反清冷者內痛則色青黑或亦有驚怒傷肝而色青血動客忤而色黑或不盡兼有痛者岐伯所對言其常而已若夫病之變化學者不可執一也帝曰捫而可得奈何岐伯曰視其主病之脈堅而血及陷下者皆可捫而得也按堅謂脈強硬不柔和也血謂失血陷下氣下脫也失血氣脫皆大虛之候而脈反強硬是脈病不相應也病脈甚多此姑舉其一二端耳帝曰善余知百病生於氣也氣之為用虛實逆順緩急皆能為病怒則氣上喜則氣緩悲則氣消恐則氣下寒則氣收炅則氣泄驚則氣亂勞則氣耗思則氣結九氣不同何病之生按太素驚作憂非也岐伯曰怒則氣逆甚則嘔血及飧泄故氣上矣怒則陽氣逆上而肝氣乘脾故甚則嘔血及飧泄也何以明其然怒則面赤甚則色蒼喜則氣和志達榮衛通利故氣緩矣按心遂所欲則氣必通達而不能矜慎勢且流於懈緩矣悲則心系急肺布葉舉而上焦不通榮衛不散熱氣在中故氣消矣按心有哀慼則悲悲雖屬肺而原於心故悲則心系急急則氣斂澀而不外達故令肺葉脹起而上焦不通榮衛不行布者脹也舉者起也肺司上焦而主氣也肺既主氣性實畏火氣不外達則熱內爍金肺氣痿弱而消散矣注言布蓋大葉殊不可曉恐則精卻卻則上焦閉閉則氣還還則下焦脹故氣下行矣按恐者畏懼也卻者退縮也恐則神不勇往而退卻精氣餒弱上閉下脹抑而不伸氣故下而不上也王本氣不行按新校正作氣下行是也從之寒則腠理閉榮衛不行故氣收矣腠謂津液滲泄之所理謂文理逢會之中閉謂密閉氣謂衛氣行謂流行收謂收斂也身寒則衛氣沉故皮膚文理及滲泄之處皆閉密而氣不流行衛氣收斂於中而不發散也按王本氣不行甲乙經作榮衛不行是也從之炅則腠理開榮衛通汗大泄故氣泄人在陽則舒在陰則慘故熱則膚腠開發榮衛大通津液外滲而汗大泄也驚則心無所倚神無所歸慮無所定故氣亂矣按形容盡矣勞則喘息汗出外內皆越故氣耗矣外內皆逾越於常紀故氣耗損也思則心有所存神有所止氣留而不行故氣結矣繫心不散故氣亦停留按王本神有所歸正氣留而不行甲乙經歸正二字作止字是也改從之奇病論奇者非常之稱言不可以經脈診治也凡十則各有精義宜分別觀之黃帝問曰人有重身九月而喑此為何也重身謂身中有身則懷妊者也喑謂不得言語也妊娠九月足少陰脈養胎岐伯對曰胞之絡脈絕也按絕非斷絕猶急也脈系胎胞之絡脈謂至九月墮重以致系胎之脈絡急絕也帝曰何以言之岐伯曰胞絡者繫於腎少陰之脈貫腎系舌本故不能言帝曰治之奈何岐伯曰無治也當十月復十月胎去胞絡復通腎脈上營故復舊而言也帝曰病脅下滿氣逆二三歲不已是為何病岐伯曰病名曰息積此不妨於食不可灸刺積為導引服藥藥不能獨治也氣不在胃故不妨於食也灸之則火熱內爍氣化為風刺之則必瀉其經轉成虛敗故不可灸刺是可積為導引使氣流行及以藥內消瘀稸則可矣若獨憑藥不能獨治之也按呼吸一止曰息所謂氣息是也數歲不已必有致病之由伯雖不言要之非鬱怒傷肝則必陰虛陽浮者也治失其宜以致留滯經絡積久不愈是名積息今有似哮非哮似脹非脹者是也帝曰人有身體髀股䯒皆腫環臍而痛是為何病岐伯曰病名曰伏梁此風根也其氣溢於大腸而著於肓肓之原在臍下故環臍而痛也按心之積名伏梁而此亦名是伏梁有二也風者外來之邪何以有根蓋必自外而入伏於臍之上下左右故令環繞而痛諸痛皆屬於木木與風相應也髀音彼大腿骨股手足腨也䯒音杭足脛骨也不可動之動之為水溺澀之病也以衝脈起於腎下出於氣街其上行者起於胞中上出臍下關元之分故動之則為水而澀溺也動謂齊其毒藥而擊動之使其大下也此問答之義與腹中論同以其為奇病故重出於此按致病有因治法自異苟失其宜為害非細如此一則病起於風故一身浮腫由經入腑大腸為肺之腑其原在臍下故環臍而痛病雖及腑而臍下正當膀胱之分故不可攻利非如諸水腫之可以攻利也然則動之既不可而治之之法伯又不言豈此證真不可治者乎曰一身盡腫而環臍又痛既屬於風當是體虛之人膚理不密風邪乘虛而入於內大腸合肺肺合皮毛脈來必沉可用輕揚荊桔之類以散其外桑杏地骨桂枝之類以通其內肺與大腸之氣通則風邪不能留而根拔矣帝曰人有尺脈數甚筋急而見此為何病岐伯曰此所謂疹筋是人腹必急白色黑色見則病甚以尺裡候腹中故見尺中筋急則必腹中拘急矣色見謂見於面部也夫相五色者白為寒黑為寒故二色見病彌甚也按尺為腎主水肝為木主筋今尺脈數甚是水虛不能養木故令筋急而腹亦為之急白為金色黑為水色見白則金刑木見黑則腎自病故病必甚也帝曰人有病頭痛以數歲不已此安得之名為何病岐伯曰當有所犯大寒內至骨髓髓者以腦為主腦逆故令頭痛齒亦痛病名曰厥逆帝曰善按腦為髓之海而腦實在頭之中大寒入骨髓則寒邪之氣由標及本上逆於腦而頭為之痛矣齒者骨之餘寒入骨故亦痛齒寒亦痛宜用桂附細辛乃世盡以為火而治之以寒涼者誤矣帝曰有病口甘者病名為何何以得之岐伯曰此五氣之溢也名曰脾癉癉熱也脾熱則四臟同稟故五氣上溢也生因脾熱故曰脾癉夫五味入口藏於胃脾為之行其精氣津液在脾故令人口甘也按口為食之門其應屬脾脾主為胃行津液故津液在脾脾多津液則濕熱內盛上溢於口而為甘也此肥美之所發也此人必數食甘美而多肥也肥者令人內熱甘者令人中滿故其氣上溢轉為消渴治之以蘭除陳氣也按熱論篇曰食肉則復蓋肉味肥而厚味厚者氣化為火故內熱復起甘性緩緩則氣滯而守中故中滿內熱中滿蓄積之久火炎水枯消渴之證見矣蘭性平淡用以除陳其力恐微伯意蓋欲食甘美者宜常服蘭以漸除陳積否則必變而為消渴也然此不過飲食致消之一端其病猶易治若夫腎虧水竭虛火扇爍上中下並消者真惡候也發太素作致消渴甲乙作消癉並通帝曰有病口苦者病名為何何以得之岐伯曰病名曰膽癉亦謂熱也膽汁味苦故口苦夫肝者中之將也取決於膽咽為之使靈蘭秘典論曰肝者將軍之官謀慮出焉膽者中正之官決斷出焉肝與膽合氣性相通故諸謀慮取決於膽膽咽相應故咽為之使焉此人者數謀慮不決故膽虛氣上溢而口為之苦治之以膽募俞胸腹曰募背脊曰俞膽募在乳下二肋外期門下五分俞在脊第十椎下兩旁相去各一寸半按膽主決斷然過慮不決則膽虛而其味上溢於咽口為之苦也帝曰有癃者一日數十溲此不足也身熱如炭頸膺如格人迎躁盛喘息氣逆此有餘也是陽氣太盛於外陰氣不足故有餘也太陰脈微細如髮者此不足也其病安在名為何病按癃者數十溲謂小便澀而頻數也頸膺如格胸喉氣不通也人迎躁盛胃脈太強太陰細如髮肺脈微弱欲絕也岐伯曰病在太陰其盛在胃頗關按據病能論補在肺病名曰厥死不治此所謂得五有餘二不足也帝曰何謂五有餘二不足岐伯曰所謂五有餘者五病之氣有餘也二不足者亦病氣之不足也今外得五有餘內得二不足此其身不表不里亦正死明矣外五有餘者一身熱如炭二頸膺如格三人迎躁盛四喘息五氣逆也內二不足者一病癃一日數十溲二太陰脈微細如髮夫如是者謂其病在表則內有二不足謂其病在裡則外有五有餘表裡既不可憑補瀉固難為法故曰此其身不表不里亦正死明矣按凡言厥言厥逆俱是四肢逆冷及不省人事之稱未便必死且帝問病狀毫與逆冷之意無涉予謂此言厥者竭也氣血兩竭故諸證乖反所以死不治也帝曰人生而有病巔疾者病名曰何安所得之岐伯曰病名為胎病此得之在母腹中時其母有所大驚氣上而不下精氣並居故令子發為巔疾也按巔注作頂巔解恐非是疑即癲字之訛也今世生而有癲疾者甚多如五癇是也帝不言其病狀何似但言巔疾岐伯對以得之母腹中時有所大驚其為癲癇明矣若謂是頂巔之上有所疾苦或腫或痛或為瘡瘍則又豈驚之所致而岐伯之對為非且亦非奇病而帝亦不必問也帝曰有病痝然如有水狀切其脈大緊身無痛者形不瘦不能食食少名為何病痝然謂面目浮起而色雜也大緊謂如弓弦也大即為氣緊即為寒寒氣內薄而反無病與眾別異常故問之也岐伯曰病生在腎名為腎風腎風而不能食善驚驚已心氣痿者死帝曰善按言腎風之證食雖少猶可治也若不能食而善驚則木盛凌土更且心氣痿弱則火又不能生土死無疑矣大奇論此篇因脈辨證洵醫家要領然尚未詳備當與平人氣象玉機真臟等篇參看然彼言其常而此近於異故以大奇名篇焉肝滿腎滿肺滿皆實即為腫滿為脈氣滿實也腫謂癰腫也臟氣滿乃如是按陰陽應象大論曰熱勝則腫今三經之脈皆滿而實其為實熱之病無疑也肺之雍喘而兩胠滿肺藏氣而外主息其脈支別者從肺系橫出腋下故喘而兩胠滿也按雍猶壅也唯氣壅遏故喘而滿也王氏不解其所以甲乙經又作癰誤矣肝雍兩胠滿臥則驚不得小便按肝本惡郁壅則鬱之甚矣胠者腋也腋為肝之部分故壅則兩胠滿也人臥則氣斂肝壅矣而復偃臥則氣欲達而不能故驚也肝經環陰器故肝壅則小便不利也王注濫引經脈甚屬膚陋腎雍胠下至少腹滿按腰以下腎主之故腎壅則以下俱滿也原本腳下腳當作胠若作腳則反自下而上不當言下至矣今正之脛有大小髀䯒大跛易偏枯按此亦腰以下之事亦腎病也言腎氣既壅不特胠下有脹滿之患而且兩足有跛易偏枯之病也腎為生氣之源故壅則氣凝而血滯所以病則如是也膝以上為髀膝以下為䯒脛與䯒一也大小者不等也跛者足不齊也易者變易言或左或右無一定也是名偏枯之證亦腎壅之為害也髀音卑䯒音杭跛波上聲心脈滿大癇瘛筋攣肝脈小急癇瘛筋攣按心與肝異臟也一滿大一小急異脈也而病同何也蓋心者火也主生血脈滿大則火盛燥血矣肝藏血而主筋脈小急則氣寒血凝矣是皆足以致癇瘛之病者總由血不能養筋之故心以熱而肝以寒也癇癲癇瘛音熾瘛瘲肝脈騖暴有所驚駭按騖馬亂馳也肝脈亂馳是其氣奔亂必有所驚駭而然也脈不至若喑不治自已按不至者脈體沉伏喑不能言也驚駭之極則脈伏而口不能言驚去自已不必冶也腎脈小急肝脈小急心脈小急不鼓皆為瘕按小為氣血兩虛急則寒矣不鼓者脈來無力不能鼓動也瘕者假也氣血虛寒則凝滯而不行如有所積聚者然也腎肝並沉為石水按腎少陰也肝厥陰也二臟俱陰而其脈並沉則為陰寒不化水氣凝結之病是名石水也今有病脹而按之堅硬者是也並浮為風水按腎本主水而肝則主風若其脈並浮則病起於外感而為虛浮腫脹也並虛為死腎為五臟之主肝為發生之主二者不足是生主俱微故死並小弦欲驚按小為虛弦為邪虛而有邪病恐欲驚欲驚者未即驚也腎脈大急沉肝脈大急沉皆為疝疝者寒氣結聚之所為也按腎急沉則水寒氣滯肝急沉則筋急血凝聚而成形痛不可忍是為疝也心脈搏滑急為心疝肺脈沉搏為肺疝按心肺亦有疝伯不言其病狀何似而止言脈狀故二疝為病世但存其名而不得其真也注言皆為寒薄於臟之故良不誣云三陽急為瘕三陰急為疝太陽受寒血凝為瘕太陰受寒氣聚為疝二陰急為癇厥二陽急為驚二陰少陰也二陽陽明也按急者脈至擊手也癇厥之證多屬風痰少陰急數是痰入心腎也驚病半實半虛陽明急數為胃火衝突也脾脈外鼓沉為腸澼久自已外鼓為鼓動於臂外也按腸澼痢證也痢脈多沉有積故也若兼外鼓則氣既不滯其積易淨雖久自愈也外鼓即浮動之意注作動於臂外太拘肝脈小緩為腸澼易治按肝脈忌見強急及沉數今見小緩是雖弱而有胃氣也故易治腎脈小搏沉為腸澼下血小為陰氣不足搏為陽氣乘之熱在下焦故下血也血溫身熱者死血溫身熱是陰氣喪敗故死心肝澼亦下血二臟同病者可治肝藏血心養血故澼皆下血也若二臟同病是木火相生故可治其脈小沉澀為腸澼其身熱者死熱見七日死心肝脈小而沉澀者澼也腸澼身熱是火氣內絕去心而歸於外也故死火成數七故七日死按通評虛實論云腸澼身熱則死寒則生此云腸澼身熱者死熱見七日死蓋謂下痢膿血之病內積正多而復外感風邪以致身熱欲表其邪則里積未淨直攻其積則外邪隨之而入於內治之最難故曰死今注言火氣內絕去心而歸於外是以此身熱為瀉脫元氣火無根而浮於外也且以七為火之成數謬誤甚矣夫人之病有專證有兼證專證治之易兼證治之難腸澼者思慮勞役之人傷於飲食積而成痢痢成將發中氣既虛風邪易入偶感風寒遂致身熱是內傷而兼外感也諸凡內傷外感之病治之雖難未必盡死惟此內傷外感與他證不同脾胃之病至於下痢膿血其虛已極復感風邪土不勝刑故有死者宜乎經言斷之以死也予閱內經至此一節繙繹再三未得其義及予為人治病再四熟籌因得其解凡遇此證必先升表外邪後治其痢或痢重而身不大熱或痢而寒熱往來有如瘧狀或瘧痢相兼而胸滿嘔吐或痢重微熱而人不識單治其痢邪隨治痢之藥而入愈深以致外竟不熱邪陷於內急重不休膿血不止終至不救者常用柴胡桔梗黃芩芍藥人參當歸廣皮甘草扶正氣而托外邪使木不傷土外邪既去內痢自減病勢雖重十痊五六此予治兼證之苦心蓋竊東垣內傷外感之法而行之有志斯道者不可不知也脈至而搏血衄身熱者死血衄為虛脈不應搏今反脈搏是氣極乃然故死脈至浮合浮合如數一息十至以上是經氣予不足也微見九十日死如浮波之合後至者凌前速疾而動無常候也按一呼一吸為一息一息十至以上則數之極矣浮合者狀其舉按泛泛而無根也是脈之不足誰予之其諸經之氣敗散無根而然歟脈至如火薪然是心精之予奪也草乾而死薪然云火焰瞥瞥不定其形而便絕也脈至如散葉是肝氣予虛也木葉落而死如散葉之隨風不常其狀脈至如省客省客者脈塞而鼓是腎氣予不足也棗華而死脈塞而鼓謂才見不行旋覆去也脈至如丸泥是胃精予不足也榆莢落而死如珠之轉是謂丸泥脈至如橫格是膽氣予不足也禾熟而死脈長而堅如橫木之在指下也脈至如弦縷是胞精予不足也病善言下霜而死不言可治胞之脈繫於腎腎之脈挾舌本人氣不足者則當不能言今反善言是真氣內絕去腎外歸於舌也故死脈至如交漆交漆者左右傍至也微見三十日死左右傍至言如瀝漆之交左右反戾脈至如湧泉浮鼓肌中太陽氣予不足也少氣味韭英而死如水泉之動但出而不入脈至如頹土之狀按之不得是肌氣予不足也五色先見黑白壘發死頹土之狀謂浮之大而虛耎按之則無按壘發當作雷發雷發於春謂脾胃之病遇木王之時必死也脈至如懸雍懸雍者浮揣切之益大是十二俞之予不足也水凝而死如顙中之懸雍也脈至如偃刀偃刀者浮之小急按之堅大急五臟菀熟寒熱獨並於腎也如此其人不得坐立春而死菀積也熟熱也脈至如丸滑不直手不直手者按之不可得也是大腸氣予不足也棗葉生而死脈至如華者令人善恐不欲坐臥行立常聽是小腸氣予不足也季秋而死脈至如華謂似華虛弱不可正取也小腸之脈上入耳中故常聽也按以上脈狀自浮合起一十五則義多難解不敢強釋謹照注錄之闕疑也病能論能猶言情狀蓋言病之情狀也凡七則有精義有闕誤有衍文洵綴集成篇者黃帝問曰人病胃脘癰者診當何如岐伯對曰診此者當候胃脈其脈當沉細沉細者氣逆逆者人迎甚盛甚盛則熱人迎者胃脈也胃為水穀之海其血盛氣壯今反脈沉細是逆常平也人迎謂結喉旁脈動應手者按胃癰乃實熱之證脈當沉細有力有力者實熱也沉細者毒蓄於內也經雖但言沉細其為有力無疑也王注直以沉細為虛誤矣凡診脈者內見沉細有力之脈形於右關外則人迎動脈盛於結喉旁診候若此其為胃癰無疑矣逆而盛則熱聚於胃口而不行故胃脘為癰也血氣壯盛而熱內薄之兩氣相合故結為癰也帝曰善人有臥而有所不安者何也岐伯曰臟有所傷及情有所倚則臥不安故人不能懸其病也按王本精有所之寄則安文義難通甲乙經作情有所倚則臥不安是也今改從之上古天真論曰恬惔虛無真氣從之精神內守病安從來生氣通天論曰蒼天之氣清淨則志意治蓋心無所慕則情無所鍾坦然而臥帖然而安矣彼夫功名之士馳驅於榮祿逐臭之夫權搉夫泉刀以至酒色之徒朝擁匏樽暮尋窬竇心望望兮四馳神搖搖而靡定日維不足夜以繼之臥不即安皆情有所倚之為害也是故欲保命者先須卻病欲卻病者須斷妄想欲斷妄想先用清心心清則妄去妄去則神定神定矣臥云乎哉是知枯禪之斷六根直是祛病良法懸猶遠也帝曰人之不得偃臥者何也按偃仰也岐伯曰肺者臟之蓋也居高布葉四臟下之故云肺氣盛則脈大脈大則不得偃臥肺氣盛滿偃臥則氣促喘奔故也帝曰有病厥者診右脈沉而緊左脈浮而遲不然病主安在按甲乙經不然作不知岐伯曰冬診之右脈固當沉緊此應四時左脈浮而遲此逆四時在左當主病在腎頗關在肺當腰痛也浮為肺脈故言頗關在肺也腰者腎之府故腎受病則腰痛也帝曰何以言之岐伯曰少陰脈貫腎絡肺今得肺脈腎為之病故腎為腰痛之病也左脈浮遲非肺來見以左腎不足而脈不能沉故得肺脈腎為病也帝曰善有病頸癰者或石治之或針灸治之而皆已其真安在言所攻則異所愈則同欲聞真法何在也岐伯曰此同名異等者也夫癰氣之息者宜以針開除去之夫氣盛血聚者宜石而瀉之此所謂同病異治也息瘜也死肉也石砭石用以破大癰出膿按治之有異者以癰原各有所宜故也帝曰有病怒狂者此病安生岐伯曰生於陽也帝曰陽何以使人狂岐伯曰陽氣者因暴折而難決故善怒也病名曰陽厥言陽氣被折郁不散也此人多怒亦曾因暴折而心不疏暢故爾皆陽逆躁極所生故病名陽厥帝曰何以知之岐伯曰陽明者常動巨陽少陽不動不動而動大疾此其候也不應常動而反動甚者動當病也按此就脈之動於頸項者而言也陽明人迎脈動於結喉旁太陽天窗脈動於項兩旁大筋前陷者中少陽天容脈動於曲頰下然陽明常多氣多血其動顯故云常動巨陽常少氣少陽常少血其動隱故云不動今陽厥之證三陽並動是不特動者動而不動者亦動其為疾也詎不大哉帝曰治之奈何岐伯曰奪其食即已夫食入於陰長氣於陽故奪其食即已使之服以生鐵落為飲夫生鐵落者下氣疾也帝曰善按食以養人多食則能害人無病之時尚須節慎若既病矣而仍自縱恣則生痰助火乏胃牽邪養人者反以害人矣故陽厥之證尤當奪食也蓋食之為道精則變化氣血粗則增長虛驕人之有邪必依衛氣而發發者衛為水穀之悍氣故也陽盛善食禁勿令食故云奪也鐵落金屬欲制火先須平木也洛甲乙作落是也從之有病身熱解墮汗出如浴惡風少氣此為何病岐伯曰病名酒風帝曰治之奈何岐伯曰以澤瀉術各十分麋御五分合以三指撮為後飯飲酒中風者也風論曰飲酒中風則為漏風是亦名漏風也夫極飲者陽氣盛而腠理疏玄府開發陽盛則痿弱故身體解墮也腠理疏則風內攻玄府發則氣外泄故汗出如浴也風氣外薄膚腠復開汗多內虛癉熱熏肺故惡風少氣也因酒而病故曰酒風術味苦溫平主治大風止汗麋含味苦寒平主治風濕筋痿澤瀉味甘寒平主治風濕益氣飯後藥先謂之後飯帝曰婦人重身毒之何如岐伯曰有故無殞亦無殞也上無殞言母必全下無殞言子亦不死也按毒之謂婦人懷妊而病積聚可用毒藥治否有故無殞謂既有病雖用重劑母子俱可無害也帝曰願聞其故何謂也岐伯曰大積大聚其可犯也衰其大半而止過者死過禁待盡毒氣內余無病可攻以當毒藥毒攻不已則敗損中和故過則死按人之所以致有積聚者多由正氣內虛不能運化故欲去積聚必顧正氣蓋攻積之藥盡屬駛劑得去大半勢自難留元氣日增積聚漸減矣若攻之不已必傷元氣而積聚益橫且至脹滿而死不可不慎也此一段王本原刻在六元正紀大論中因與上下文義不合故移置於此瘧論瘧者邪正紛爭之病邪乘正虛寒熱交攻止而復作最為暴虐故病名瘧也瘧之為病其證雖多然非外有所感必不發且非內有可乘之機則外邪亦無自而入篇中所言委曲周至比之別篇論病為獨詳凡一十四段首段前半統論瘧之寒熱後言日作之瘧二段言間日三段言瘧發有早晏之不同四段又申解間日五段言瘧發之故初無一定六段言邪留於內必因衛氣而作七段言寒溫癉三瘧之異八段言瘧已發時不可醫治九段又詳論瘧發之故與首段同十段言欲治瘧必於未發之時與八段同十一段言瘧之止作因於衛氣與第六段同十二段論三四日瘧十三段言四時各有瘧不獨夏秋十四段又復解溫癉而略寒瘧而不言此內經論瘧專屬外感至於血痰食瘴等項又為瘧中之兼證醫家所當詳察者也黃帝問曰夫痎瘧皆生於風其蓄作有時者何也痎猶老也亦瘦也岐伯對曰瘧之始發也先起於毫毛伸欠乃作寒慄鼓頷慄謂戰慄鼓謂振動按邪之入也原由毫竅故其發也先令毫毛灑淅正虛不能勝邪則神氣倦怠腰為之伸弛而口為之呵欠惟寒慄故鼓頷也腰脊俱痛寒去則內外皆熱頭痛如破渴欲冷飲帝曰何氣使然願聞其道岐伯曰陰陽上下交爭虛實更作陰陽相移也陽氣者下行極而上陰氣者上行極而下故曰陰陽上下交爭也陽虛則外寒陰虛則內熱陽盛則外熱陰盛則內寒由此寒去熱生則虛實更作陰陽之氣相移也陽並於陰則陰實而陽虛陽明虛則寒慄鼓頷也巨陽虛則腰背頭項痛陽並於陰言陽氣入於陰分也陽明胃脈也胃之脈自交承漿卻分行循頤後下廉出大迎其支別者從大迎前下人迎故氣不足則惡寒戰慄而頤頷振動也巨陽者膀胱脈其脈從頭別下項循肩髆內挾脊抵腰中故氣不足則腰背頭項痛也三陽俱虛則陰氣勝陰氣勝則骨寒而痛寒生於內故中外皆寒按陽主外陰主內邪在陽分則熱邪在陰分則寒矣今三陽併入於陰陰盛之極一身盡寒內之寒也其實由外而入也陽盛則外熱陰虛則內熱外內皆熱則喘而渴故欲冷飲也按陰極於內則復出之陽而陽又盛是以內外皆熱而渴此又由內出外所謂更虛更實瘧之情狀如是也陽愈盛則陰愈虛陽盛則外熱陰虛則內熱凡病皆然不獨瘧也此皆得之夏傷於暑熱氣盛藏於皮膚之內腸胃之外此榮氣之所舍也此令人汗空疏按空猶孔也腠理開因得秋氣汗出遇風及得之以浴水氣舍於皮膚之內與衛氣並居衛氣者晝日行於陽夜行於陰此氣得陽而外出得陰而內薄內外相搏是以日作按前言陰陽更勝則為寒為熱此則推原瘧之所以為病也榮主血衛主氣血屬陰舍於內氣屬陽行於外靈樞經言衛氣者所以溫分肉充皮膚肥腠理司關闔者也邪氣中人必依衛氣而後發者正以衛氣運會夫一身衛氣循經外達邪隨之而發也此氣邪氣也衛氣一日一夜運行於周身邪氣隨之而出入故每日一發帝曰其間日而作者何也岐伯曰其氣之舍深內薄於陰陽氣獨發陰邪內著陰與陽爭不得出是以間日而作也按邪入於陰愈深則去陽愈遠及其返外而與衛氣相應也已多一日矣故間日發也帝曰善其作日晏與其日早者何氣使然岐伯曰邪氣客於風府循膂而下風府穴在項上入髮際一寸大筋內宛宛中膂謂脊兩旁衛氣一日一夜大會於風府其明日日下一節故其作也晏此先客於脊背也每至於風府則腠理開腠理開則邪氣入邪氣入則病作以此日作稍益晏也節脊骨之節然邪氣遠則逢會遲故發暮也按此言瘧發早晏似以骨節之上下為次其實元氣虛陷發必日遲是則日下一節者未必非正氣漸虛之故也其出於風府日下一節二十五日下至骶骨二十六日入於脊內注於伏膂之脈其氣上行九日出於缺盆之中其氣日高故作日益早也項以下至尾骶凡二十四節故日下一節二十五日下至骶骨二十六日入於脊內注於伏膂之脈也伏膂之脈者謂膂筋之間腎脈之伏行者也腎之脈循股內後廉貫脊屬腎其直行者從腎上貫肝膈入肺中以其貫脊又不正應行穴但循膂伏行故謂之伏膂脈以腎脈貫脊屬腎上入肺中肺者缺盆為之道陰氣之行速故其氣上行九日出於缺盆之中按脊骨本二十一節日下一節止應二十二日下至骶骨止應二十三日而王本各多三日者蓋連項骨三節而言也全元起及甲乙太素並作二十一二十二日是止照脊骨本數而言其實初非有異也其間日發者由邪氣內薄於五臟橫連募原也其道遠其氣深其行遲不能與衛氣俱行不得皆出故間日乃作也按衛氣一日一周而邪入既深故不能與衛俱行也募原者膈膜之原邪之所入深而且廣故曰橫連也募全元起作膜太素巢元方並同舉痛論亦作膜原帝曰夫子言衛氣每至於風府腠理乃發發則邪氣入入則病作今衛氣日下一節其氣之發也不當風府其日作者奈何岐伯曰按新校正云按全元起本及甲乙經太素自此邪氣客於頭項至下則病作故八十八字並無此邪氣客於頭項循膂而下者也故虛實不同邪中異所則不得當其風府也故邪中於頭項者氣至頭項而病中於背者氣至背而病中於腰脊者氣至腰脊而病中於手足者氣至手足而病衛氣之所在與邪氣相合則病作故風無常府衛氣之所發必開其腠理邪氣之所合則其府也虛實不同邪中異所衛邪相合病則發焉不必悉當風府而發作也帝曰善夫風之與瘧也相似同類而風獨常在瘧得有時而休者何也岐伯曰風氣留其處故常在瘧氣隨經絡沉以內薄故衛氣應乃作按風與瘧皆能寒熱故云相似然風邪中人每有定所而瘧則有作止之不同蓋其氣與衛合則作與衛相失則止也帝曰瘧先寒而後熱者何也岐伯曰夏傷於大暑其汗大出腠理開發因遇夏氣淒滄之水寒藏於腠理皮膚之中秋傷於風則病成矣夫寒者陰氣也風者陽氣也先傷於寒而後傷於風故先寒而後熱也病以時作名曰寒瘧按夏應熱而反涼天時不正之氣多由陰雨連綿故云淒滄之水寒也陰寒既伏又遇秋風寒因風發病則為瘧矣時作者瘧發有時謂每至其時則作也瘧起於寒故即名寒帝曰先熱而後寒者何也岐伯曰此先傷於風而後傷於寒故先熱而後寒也亦以時作名曰溫瘧按瘧起於寒即名為寒是也瘧起於風亦宜名風而更名溫者何也風為陽邪陽性溫熱也寒溫之別原於邪入之先後要之寒瘧多而溫瘧少辨之宜審也其但熱而不寒者陰氣先絕陽氣獨發則少氣煩冤手足熱而欲嘔名曰癉瘧癉熱也按先絕非謂陰氣敗絕也言火邪熾盛純陽獨勝若無陰然如陽明之瘧宜用白虎之類是也帝曰夫經言有餘者瀉之不足者補之今熱為有餘寒為不足夫瘧之寒湯火不能溫也及其熱冰水不能寒也此皆有餘不足之類當此之時良工不能止必須其自衰乃刺之其故何也願聞其說岐伯曰經言無刺熇熇之熱無刺渾渾之脈無刺漉漉之汗故為其病逆未可治也熇熇盛熱也渾渾言無端緒也漉漉言汗大出也按此一段言瘧當發時不可針刺針既不宜藥可知矣強飲之藥多致嘔逆也熇音郝夫瘧之始發也陽氣並於陰當是之時陽虛而陰盛外無氣故先寒慄也陰氣逆極則復出之陽陽與陰復並於外則陰虛而陽實故先熱而渴夫瘧氣者並於陽則陽勝並於陰則陰勝陰勝則寒陽勝則熱瘧者風寒之氣不常也病極則復至病之發也如火之熱如風雨不可當也陰盛則胃寒故先寒慄陽盛則胃熱故先熱欲飲也復謂復舊也言其氣發至極復還如舊按人之無病也陽衛外陰守中及邪中於身而為病也陰陽之氣隨之而亂矣是故邪入於陰則陽氣亦隨之而並於陰唯並於陰於是陽在內而不在外故外無氣逆極盛極也極則必反陰又與陽出而復並於外即前所謂虛實更作陰陽相移也夫瘧氣者以下六句即是申解上文前後一意瘧者風寒之氣不常不言寒熱者以瘧之寒熱本於風寒也病極即上逆極意言陰極則寒陽極則熱而瘧又復來也註解寒熱並以胃言誤甚矣夫瘧之未發也陰未並陽陽未並陰因而調之真氣得安邪氣乃亡故工不能治其已發為其氣逆也帝曰善攻之奈何早晏何如岐伯曰瘧之且發也陰陽之且移也必從四末始也陽已傷陰從之故先其時堅束其處令邪氣不得入陰氣不得出審候見之在孫絡盛堅而血者皆取之此真往而未得並者也按此段言欲治瘧必於未發之時與前第八段同意陽已傷二句謂陽不能勝邪而令邪入陰分也真往未得並言果能治之於未發之時則真邪自去不至併入於內也帝曰瘧不發其應何如岐伯曰瘧氣者必更盛更虛當氣之所在也病在陽則熱而脈躁在陰則寒而脈靜極則陰陽俱衰衛氣相離故病得休衛氣集則復病也按此一段帝問瘧若不發應驗何如伯以脈之靜躁亦分於陰陽而病之休復則隨衛氣而轉也極則陰陽俱衰者謂病久則氣血並虛而尺寸之脈必衰弱無力也相離者謂衛氣日夜一周而邪或深入於臟腑故有時相離也休暫止也集謂邪氣復與衛合也帝曰時有間二日或至數日發或渴或不渴其故何也岐伯曰其間日者邪氣與衛氣客於六腑而有時相失不能相得故休數日乃作也按相失即前相離意相離愈遠即相間日多也瘧者陰陽更勝也或甚或不甚故或渴或不渴陽勝陰甚則渴陽勝陰不甚則不渴也勝謂強盛於彼之氣也帝曰論言夏傷於暑秋必病瘧今瘧不必應者何也按不必應言瘧發不盡在秋也岐伯曰此應四時者也其病異形者反四時也其以秋病者寒甚以冬病者寒不甚以春病者惡風以夏病者多汗按應四時謂受病原有四時之異故瘧發不盡在於秋而四時皆有瘧也異形謂證與常異而與四時之令不合如秋氣雖涼而病則寒甚冬時嚴肅而病反不寒春宜宣暢而病反惡風夏汗雖易病則難得而今直多汗是謂病異而與時反也要而論之瘧之形固與時反然其發也總不出於秋冬春夏之外是其反四時者即其應四時者也瘧不盡發於秋宜矣特以夏暑秋瘧其病為多故古論言之如是耳帝曰夫病溫瘧與寒瘧而皆安舍舍於何臟岐伯曰溫瘧者得之冬中於風寒氣藏於骨髓之中至春則陽氣大發邪氣不能自出因遇大暑腦髓爍肌肉消腠理發泄或有所用力邪氣與汗皆出此病藏於腎其氣先從內出之於外也如是者陰虛而陽盛陽盛則熱矣衰則氣復反入入則陽虛陽虛則寒矣故先熱而後寒名曰溫瘧按衰者盛極而變也與前病極逆極同意注作病衰退解是瘧已愈不當更言陽虛則寒矣帝曰癉瘧何如岐伯曰癉瘧者肺素有熱氣盛於身厥逆上衝中氣實而不外泄因有所用力腠理開風寒舍於皮膚之內分肉之間而發發則陽氣盛陽氣盛而不衰則病矣其氣不及於陰故但熱而不寒氣內藏於心而外舍於分肉之間令人消爍脫肉故命曰癉瘧帝曰善按內本實熱外感風寒乃三陽之邪熱瘧之有餘者其氣病氣也病盡在陽故云不及於陰也按寒溫癉三瘧岐伯雖解於前然尚有詳略不同故帝復再問此對止有溫癉而無寒瘧想系前已對故後更不再言耳風論風者六淫之一諸邪之首也故經言風者百病之長又言風者百病之始妙矣哉善行數變其盡風之形容乎篇中所論淺深不同要之風之為病其義盡於此矣黃帝問曰風之傷人也或為寒熱或為熱中或為寒中或為癘風或為偏枯其病各異其名不同或內至五臟六腑不知其解願聞其說岐伯對曰風氣藏於皮膚之間內不得通外不得泄風者善行而數變腠理開則灑然寒閉則熱而悶灑然寒貌悶不爽貌按此言風邪中人病之外感者也邪以汗解內通則外達惟內不得通故外不得泄也善行者無處不到數變者證不一端風之為邪其厲矣哉腠理開則風氣外通而惡寒閉斂則邪氣內鬱而熱悶是必表而發之乃安也其寒也則衰食飲其熱也則消肌肉故使人怢慄而不能食名曰寒熱寒風入胃故食飲衰熱氣內藏故消肌肉寒熱相合故怢慄而不能食名曰寒熱也怢慄卒振寒貌按怢音突忽忘也慄戰慄謂寒熱相激而不自知也怢慄全元起本作失味甲乙經作解㑊並非風氣與陽明入胃循脈而上至目內眥其人肥則風氣不得外泄則為熱中而目黃人瘦則外泄而寒則為寒中而泣出人肥則腠理密緻故不得外泄則為熱中而目黃人瘦則腠理開疏風得外泄則寒中而泣出也按眥音恣風氣與太陽俱入行諸脈俞散於分肉之間與衛氣相干其道不利故使肌肉憤䐜而有瘍衛氣有所凝而不行故其肉有不仁也分肉之間衛氣行處風與衛氣相搏俱行於分肉之間故氣道澀而不利也氣道不利風氣內攻衛氣相持故肉憤䐜而瘡出也瘍瘡也若衛氣被風吹之不得流轉所在偏並凝而不行則肉有不仁之處也不仁謂𤸷而不知寒熱痛癢癘者有榮氣熱胕其氣不清故使其鼻柱壞而色敗皮膚瘍潰風寒客於脈而不去名曰癘風此則風入於經脈之中也榮行脈中故風入脈中內攻於血與榮氣合合熱而血胕壞也其氣不清言潰亂也然血脈潰亂榮復挾風陽脈盡上於頭鼻為呼吸之所故鼻柱壞而色惡皮膚破而潰爛也脈要精微論曰脈風成為癘按風病惟此為厲故名癘風令人有此病者多是父母相傳蓋精血穢濁膠固不散一氣相承終久必斃若如經言風入脈俞衛氣凝澀便為癘風則似癘亦從外而入氣凝血熱鼻壞膚潰幾與父子相傳者無辨矣要而論之得於外感者可治得於父母者難治學者不可不知也癘音利以春甲乙傷於風者為肝風以夏丙丁傷於風者為心風以季夏戊己傷於邪者為脾風以秋庚辛中於邪者為肺風以冬壬癸中於邪者為腎風按五臟應四時一定之例也若夫邪之所入必於其虛春何必肝而心何必夏神而明之存乎其人而已傷與中不必泥風中五臟六腑之俞亦為臟腑之風按臟腑之系附於背故其穴在背俞者背穴也臟腑之氣不固則風邪由俞而入於是風之入於臟腑者或由臟而發於陰或由腑而發於陽審脈辨證可因類而施治也俞音輸各入其門戶所中則為偏風隨俞左右而偏中之則為偏風按偏風偏枯證也人身之有穴俞也猶室之有門戶風邪中人必由穴俞故云入其門戶也若所入偏於一則病在一偏矣今之癱瘓者是也風氣循風府而上則為腦風按風府穴在項髮際一寸大筋內宛宛中腦風者風入於腦觸風則頭暈微痛時流清涕與鼻淵相似也風入系頭則為目風眼寒按系頭眼寒殊不可解古本恐有誤也飲酒中風則為漏風按酒性辛溫開鬱行氣更感風邪則汗液外泄而令真氣疏漏也入房汗出中風則為內風內耗其精外開腠理因內風襲故曰內風新沐中風則為首風按人身之竅惟發最疏熱水沐之則腠開而風易入故凡病感風其頭必痛似不獨新沐為然也久風入中則為腸風飧泄按中者脾胃也脾胃者土也風久則木勝木勝則入而傷土是故風居腸臟而令水穀不分也飧音孫外在腠理則為泄風風居腠理則玄府開通風薄汗泄故云泄風故風者百病之長也至其變化乃為他病也無常方然致有風氣也長先也先百病而有也按風有聲而無形有氣而無質乘間襲虛人被中而猝不覺諸邪病人故當以風為長也及其既入經絡則千變萬化隨虛而入無一定之所幾無風之可泥矣然病本於風雖無風之形必有風之氣善診者察色按脈自能辨之於微也元起本及甲乙經致字作故攻解反覺支離帝曰五臟風之形狀不同者何願聞其診及其病能岐伯曰肺風之狀多汗惡風色皏然白時咳短氣晝日則瘥暮則甚診在眉上其色白按肺合皮毛風入之則腠理疏泄故多汗惡風也肺色白皏者白色肺病則色見於外也肺變動為咳肺受風故咳惟咳故短氣短氣者喘促也氣惡閉而喜舒晝陽氣舒故瘥夜陰氣閉故甚也眉上闕庭也肺之部見白色則知肺病也皏烹上聲淺白色瘥音蠆病瘳也心風之狀多汗惡風焦絕善怒嚇赤色病甚則言不可快診在口其色赤按液入心為汗故風入心亦多汗惡風也火灼物則焦焦絕者心主火心病則火熾而焦急惟火熾焦急故又善怒而嚇人也舌為心苗心病則舌不便利故言不快也赤為心色心病故赤見於口也注以焦絕屬唇皮謂熱剝唇皮誤矣肝風之狀多汗惡風善悲色微蒼嗌乾善怒時憎女子診在目下其色青按肝雖主風然更感風則內外相通而氣大泄故亦多汗惡風也悲者肺志肝何以悲蓋肝病則木虛而受制於金故善悲蒼者木病色也肝脈循喉嚨之後入頏顙風動火熾故嗌乾肝志怒木氣急也木急則氣陽志亢故不欲近女子也注以善悲為心虛誤矣嗌音抑喉塞也脾風之狀多汗惡風身體怠墮四肢不欲動色薄微黃不嗜食診在鼻上其色黃按風為木化脾所畏也風木刑脾肉腠不固故脾亦多汗惡風也脾病則氣弱故怠惰脾主四肢故不欲動脾無力故色薄而微黃不嗜食脾病不知五味也鼻居面中屬土故驗脾病者其鼻必黃也注引心脈解怠惰誤矣腎風之狀多汗惡風面痝然浮腫脊痛不能正立其色炲隱曲不利診在肌上其色黑痝然腫起也炲黑色也隱曲隱蔽委曲之處也腎藏精外應交接今臟被風薄故隱蔽委曲之事不利所為也黑腎色也按汗者水也腎之液也腎被風則腎水外泄而為汗故腎亦多汗惡風也腎病則水泛故面浮腎入風則腰無力故不能正立色炲者腎病而黑色形於外也風入腎則宗筋痿故不利於交接也痝音忙炲音臺煙煤也胃風之狀頸多汗惡風食飲不下膈塞不通腹善滿失衣則䐜脹食寒則泄診形瘦而腹大按胃者土也風木乘之則胃液外泄胃脈診於人迎人迎在頸故風入胃而頸獨多汗惡風也胃主飲食其治上連膈下連腹故病則不下不通而滿也胃喜暖而惡寒故䐜脹而泄也凡若此者土被木刑肌肉消削中氣不運形瘦腹大是其診也首風之狀頭面多汗惡風當先風一日則病甚頭痛不可以出內至其風日則病少愈頭者諸陽之會風客之則皮腠疏故頭面多汗也按先風一日謂風初入首而證尚未見之時也風之感人人不即覺忽然頭痛及至汗出面浮方識是風而痛旋緩所以然者風內入則甚外達則衰自然之理也漏風之狀或多汗常不可單衣食則汗出甚則身汗喘息惡風衣常濡口乾善渴不能勞事按此脾肺虛症也肺虛則腠理疏泄故多汗肺虛畏寒故不可單衣喘息則風入故令口乾也脾虛則中氣餒弱故食則汗出不能勞事也脾虛則內不固肺虛則外不密故曰漏風也泄風之狀多汗汗出泄衣上口中乾不能勞事身體盡痛則寒帝曰善汗多則津液涸故口中乾形勞則汗出甚故不能勞事身體盡痛以其汗多汗多則亡陽故寒也按新校正云孫思邈云新房室竟取風為內風其狀惡風流汗沾衣疑此泄風乃內風也本論前文先云漏風內風首風次言入中為腸風在外為泄風今有泄風而無內風孫思邈載內風乃此泄風之狀故疑此泄字乃內字之誤也痹論痹者頑木不仁不知痛癢之病也其病之因多起於風寒濕有淺深之殊有難易之分始知不知痛癢之痹乃痹之一端而其義為未全也然味經中所言痹之在臟腑者如心痹脈不通肝痹引如懷腎痹善脹脾痹大塞腸痹飲出不得胞痹內痛澀於小便以至痹聚在肺在心等皆有壅塞不通之意是痹又以閉而得名也篇中更出陰氣者靜則神藏四句文義甚精但實與痹無涉必錯簡也黃帝問曰痹之安生岐伯對曰風寒濕三氣雜至合而為痹也其風氣勝者為行痹寒氣勝者為痛痹濕氣勝者為著痹也雖合而為痹發起亦殊矣風則陽受之故為痹行寒則陰受之故為痹痛濕則皮肉筋脈受之故為痹著而不去也按著直略切不動移也帝曰其有五者何也岐伯曰以冬遇此者為骨痹以春遇此者為筋痹以夏遇此者為脈痹以至陰遇此者為肌痹以秋遇此者為皮痹按此謂風寒濕也冬感此邪則痹在骨等亦大略之言也帝曰內舍五臟六腑何氣使然岐伯曰五臟皆有合病久而不去者內舍於其合也故骨痹不已復感於邪內舍於腎筋痹不已復感於邪內舍於肝脈痹不已復感於邪內舍於心肌痹不已復感於邪內舍於脾皮痹不已復感於邪內舍於肺所謂痹者各以其時重感於風寒濕之氣也按合如腎合骨肝合筋之類風寒濕之邪由外入內筋骨受痹若更感外邪則必內及於肝腎是謂內舍於其合下五段正是分疏內舍凡痹之客五臟者肺痹者煩滿喘而嘔以臟氣應息又其脈還循胃口故使煩滿喘而嘔心痹者脈不通煩則心下鼓暴上氣而喘嗌乾善噫厥氣上則恐心合脈受邪則脈不通利也邪氣內擾故煩也手心主心包之脈起於胸中出屬心包下膈手少陰心脈起於心中出屬心系下膈絡小腸其支別者從心系上挾咽喉其直者復從心系卻上肺故煩則心下鼓滿暴上氣而喘嗌乾也心主為噫以下鼓滿故噫之以出氣也若是逆氣上乘於心則恐畏也神懼凌弱故爾肝痹者夜臥則驚多飲數小便上為引如懷肝主驚駭氣相應故中夜臥則驚也肝之脈循股陰入髦中環陰器抵少腹挾胃屬肝絡膽上膈布脅肋循喉嚨之後上入項顙故多飲水數小便上引少腹如懷妊之狀腎痹者善脹尻以代踵脊以代頭腎者胃之關關不利則胃氣不轉故善脹也尻以代踵謂足攣急也脊以代頭謂身踡屈也按尻以代踵二句語意奇妙蓋狀善脹之形容也凡人之氣上至頭下至足運行不息則折旋任意俯仰自如今邪著於腎氣閉不行一身盡脹但可坐而不可行但能俯而不能仰如踵以尻而頭以脊也善脹之狀乃至於此豈知腎為生氣之源腎氣痹遂令如是乎注亦濫引經脈為解未免膚淺尻骶骨踵足跟也脾痹者四肢解墮發咳嘔汁上為大塞土王四季外主四肢故四肢解墮又以其脈起於足循腨胻上膝股也然脾脈入腹屬腎絡胃上膈挾咽故發咳嘔汁脾氣養肺胃復連咽故上為大塞也按墮作惰腸痹者數飲而出不得中氣喘爭時發飧泄按大腸小腸者脾肺之下流也人之飲食上入必下出今邪入二腸氣痹不行不能下達中氣壅閉喘急爭亂食飲內停不能變化時或下出則為飧泄皆二腸氣痹不能傳送所致也胞痹者少腹膀胱按之內痛若沃以湯澀於小便上為清涕按膀胱居少腹之內故云少腹膀胱內痛若沃以湯者火也火盛故不可按也膀胱為津液之器熱則癃故小便澀小便澀則火不得下行反上爍其腦而為清涕出於鼻竅矣元起本內痛作兩髀非也蓋胞痹之熱者也若陰寒凝結亦令胞痹少腹絞痛小便不通脈沉而緊予嘗治數十人矣用桂附而愈惟無沃湯清涕諸證耳淫氣喘息痹聚在肺淫氣憂思痹聚在心淫氣遺溺痹聚在腎淫氣乏竭痹聚在肝淫氣肌絕痹聚在脾淫氣謂氣之妄行者各隨臟之所主而入為痹也按新校正云詳上凡痹之客五臟者至此全元起本在陰陽別論中此王氏之所移也諸痹不已者亦益內也從外不去則益深至於身內其風氣勝者其人易已也按風雖勝尚是外襲易治不若深入臟腑之難也帝曰痹其時有死者或疼久者或易已者其故何也岐伯曰其入臟者死其留連筋骨間者疼久其留皮膚間者易已入臟者死以神去也筋骨疼久以其定也皮膚易已以浮淺也由斯深淺故有是不同帝曰其客於六腑者何也岐伯曰此亦其飲食居處為其病本也六腑亦各有俞風寒濕氣中其俞而食飲應之循俞而入各舍其腑也按腑陽而淺故其為痹皆從飲食居處得之然俞為六腑之門戶風寒濕氣固易於中而苟無飲食不節之患則所入者亦僅至毫腠而止惟起居不密飢飽失時六腑之氣先已不固而後風寒濕氣乃得從而入之也帝曰以針治之奈何岐伯曰五臟有俞六腑有合循脈之分各有所發各隨其過則病瘳也按過猶過失瘳愈也隨謂隨脈發之過失而施治則病自愈也過注作脈所經過誤矣瘳音抽帝曰榮衛之氣亦令人痹乎岐伯曰榮者水穀之精氣也和調於五臟灑陳於六腑乃能入於脈也故循脈上下貫五臟絡六腑也正理論曰谷入於胃脈道乃行水入於經其血乃成靈樞經曰榮氣之道內谷為寶榮行脈內故無所不至按和調者運行無間灑陳者遍滿不遺然惟和調故能灑陳也衛者水穀之悍氣也其氣慄疾滑利不能入於脈也故循皮膚之中分肉之間熏於盲膜散於胸腹逆其氣則病從其氣則愈不與風寒濕氣合故不為痹悍氣謂浮盛之氣也以其浮盛之氣故慄疾滑利皮膚之中分肉之間謂脈外也按水穀之精氣為榮榮行脈內貫通臟腑無處不到水穀之悍氣為衛衛行脈外屏藩臟腑捍禦諸邪邪欲中人必乘衛氣之虛而入入則由絡抵經由腑入臟是風寒濕之為痹也皆因衛虛不能悍之於外以致內入初非與風寒濕相合而然是故痹止於榮而不及衛也帝曰善痹或痛或不痛或不仁或寒或熱或燥或濕其故何也岐伯曰痛者寒氣多也有寒故痛也按痛獨指寒者寒則氣閉血凝故痛若熱則痹而不痛也其不痛不仁者病久入深榮衛之行澀經絡時疏故不痛按此不痛是頑木不知痛癢即是不仁故不痛與不仁兼言也病久之人氣血衰弱運行澀滯惟澀滯故經絡頑痹而不知痛也王本故不通甲乙作不痛是也從之皮膚不營故為不仁不仁者皮頑不知有無也按人之知有痛癢者以其血足而能運動也故以不仁為榮血不足其寒者陽氣少陰氣多與病相益故寒也病生於風寒濕故陰氣益之也其熱者陽氣多陰氣少病氣勝陽遭陰故為痹熱按遭甲乙作乘言陽盛乘陰故熱即陰虛火多之類也其多汗而濡者此其逢濕甚也陽氣少陰氣盛兩氣相感故汗出而濡也按陰與濕為同氣故云兩氣相感帝曰夫痹之為病不痛何也岐伯曰痹在於骨則重在於脈則血凝而不流在於筋則屈不伸在於肉則不仁在於皮則寒故具此五者則不痛也凡痹之類逢寒則急逢熱則縱帝曰善按痹之不痛有五者之殊而前則言寒多則痛寒痛又為痹中之一但痛者少而不痛者多也逢寒則急二句是總結痹病之大凡也王本逢寒則蟲甲乙作則急與縱相合是也從之痿論痿注謂痿弱無力以運動是也然所以無力之故既有五臟致此之因而其原總關於胃蓋胃藏水穀以養人五臟六腑皆受氣焉故胃虛則臟腑均失所養而沖督帶之脈絡皆不相維繫宗筋弛緩一身無力故病為痿此帝與伯所以更為辯難也黃帝問曰五臟使人痿何也岐伯對曰肺主身之皮毛心主身之血脈肝主身之筋膜脾主身之肌肉腎主身之骨髓所主不同痿生亦各歸其所主故肺熱葉焦則皮毛虛弱急薄著則生痿躄也躄謂攣躄足不得伸也肺熱則腎受熱氣故爾按肺合皮毛其質輕浮而主氣故虛則氣弱促急其形薄而著金虧不能生腎水腎亦虛憊而躄也躄必亦切心氣熱則下脈厥而上上則下脈虛虛則生脈痿樞折挈脛縱而不任地也按心本火臟火盛則熱熱性炎上氣亦上行周身之血脈皆逆而上矣然上盛則下必虛而痿弱之象當見於脈脈痿之證維何身不能運動足不能踐地如樞折而脛挈也然其所以折而且挈者心虛少血不能養筋縱緩無力之故也脛䯒骨肝氣熱則膽泄口苦筋膜乾筋膜乾則筋急而攣發為筋痿按肝為臟膽為腑陰陽本相應也肝屬木而生火火上炎則膽汁上溢而口苦肝又主筋故熱則筋膜乾惟干故又攣急而為筋痿也痿之為義似屬弛緩攣急亦痿者急則拘縮而不能伸與弛無異故亦能痿也按膽居肝短葉間注謂膽為肝葉誤矣脾氣熱則胃干而渴肌肉不仁發為肉痿脾與胃以膜相連脾氣熱則胃液滲泄故干而且渴也脾主肌肉今熱薄於內故肌肉不仁而發為肉痿腎氣熱則腰脊不舉骨枯而髓減發為骨痿腰為腎府又腎脈上股內貫脊屬腎故腎氣熱則腰脊不舉也腎主骨髓故熱則骨枯而髓減為骨痿帝曰何以得之岐伯曰肺者臟之長也為心之蓋也位高而布葉於胸中是故為臟之長心之蓋有所失亡所求不得則發肺鳴鳴則肺熱葉焦志苦不暢氣鬱故也肺藏氣氣鬱不利故喘息有聲而肺熱葉焦也悲哀太甚則胞絡絕胞絡絕則陽氣內動發則心下崩數溲血也按胞絡即心包絡也包絡所以衛心悲哀太甚則氣急迫而胞絡傷絡傷則心病蓋心屬火而主血心病火發血不能靜遂下流於溲溺也思想無窮所願不得意淫於外入房太甚宗筋弛縱發為筋痿及為白淫按無窮謂多欲外謂非己室也白淫男女皆有之男為遊精女為陰液邪思妄想意淫而已雖無實事而精氣已為之動搖故遂與入房太甚者並足以致筋痿也然筋痿肝之病也何以並得之色欲蓋腎敗精傷水虧不能養木故也有漸於濕以水為事若有所留居處相濕肌肉濡漬痹而不仁發為肉痿業惟近濕居處澤下皆水為事也平者久而猶怠感之者尤甚矣肉屬於脾脾氣惡濕濕著於內則衛氣不營故肉為痿也按漸音尖漬音滋滲染也有所遠行勞倦逢大熱而渴渴則陽氣內伐內伐則熱舍於腎腎者水臟也今水不勝火則骨枯而髓虛故足不任身發為骨痿按水以制火然火盛則爍水而水愈虛火愈熾是故勞倦熱渴陽火內熾水不能勝而腎虧矣腎主骨骨借髓以強身憑足以任腎虧則髓虛髓虛則骨枯而足無力以任身是名骨痿也帝曰何以別之岐伯曰肺熱者色白而毛敗心熱者色赤而絡脈溢肝熱者色蒼而爪枯脾熱者色黃而肉蠕動腎熱者色黑而齒槁各求臟色及所主養而命之則其應也按蠕音軟微動也帝曰如夫子言可矣論言治痿者獨取陽明何也岐伯曰陽明者五臟六腑之海主閏宗筋宗筋主束骨而利機關也宗筋謂陰髦中橫骨上下之豎筋也上絡胸腹下貫髖尻又經於背腹上頭項故云宗筋主束骨而利機關也然腰者身之大關節所以司屈伸故曰機關按閏當作潤言臟腑資水穀以化氣血而養人宗筋藉以滋潤焉宗筋為諸筋之宗網維一身乾槁則拘縮滋潤則便利也衝脈者經脈之海也主滲灌溪谷與陽明合於宗筋衝脈循腹挾臍旁各同身寸之五分而上陽明脈亦挾臍旁各同身寸之一寸五分而上宗筋脈於中故云與陽明合於宗筋也以為十二經海故主滲灌溪谷也肉之大會為谷小會為溪按滲灌者無微不入衝脈主血兼氣其位雖止於挾腹中行而氣則流行一身無處不到故取義於滲灌也陰陽總宗筋之會會於氣街而陽明為之長皆屬於帶脈而絡於督脈故陽明虛則宗筋縱帶脈不引故足痿不用也宗筋挾臍下合於橫骨陽明輔其外衝脈居其中故云會於氣街而陽明為之長也氣街則陰髦兩旁脈動處也帶脈者起於季脅回身一周而絡於督脈也督脈者起於關元上下循腹故云皆屬於帶脈而絡於督脈也沖任督三脈同起而異行故經文參差而引之引謂牽引按水穀充盈則陽明實而氣血盛氣血盛則宗筋勁調而有力虛則緩弱無力而足不能行矣所以然者足以筋為用也注濫引未確帝曰治之奈何岐伯曰各補其榮而通其俞調其虛實和其逆順筋脈骨肉各以其時受月則病已矣帝曰善按榮者血也逆調論言榮氣虛則不仁故治痿之法以補血為最也俞背穴五臟各有俞時受月者五臟各有應王之月如肝傷則筋病欲治筋病必於春月木王之時因時以受王月之氣則邪易去而正易復也筋者肝也脈者心也骨者腎也肉者脾也五臟獨缺肺者肺合皮毛皮毛附於肉或省文也注似是而未明快厥論厥凡三義一謂逆也下氣逆而上也諸凡言厥逆是也一謂極至也本篇之熱厥寒厥蓋言寒熱之極也一謂昏迷不省人事也本篇之言陰盛陽亂是也乃世之云厥者止以手足逆冷不知人事為言合之經旨偏矣至於本篇帝問六經之厥岐伯所對前言六經之厥次言六經之厥迷終言手六經之厥逆厥逆即厥非有二也然詳味所言諸證紛紜乃各經雜病之兼厥逆者伯特為之敷陳以盡厥之義非厥之外有厥逆且有諸厥名目之不相同也黃帝問曰厥之寒熱者何也岐伯對曰陽氣衰於下則為寒厥陰氣衰於下則為熱厥按陽虛則寒陰虛則熱厥亦猶然況其他乎帝曰熱厥之為熱也必起於足下者何也岐伯曰陽氣起於足五指之表陰脈者集於足下而聚於足心故陽氣勝則足下熱也大約言之足太陽脈出於足小趾之端外側足少陽脈出於足小趾次趾之端足陽明脈出於足中趾及大趾之端並循足陽而上肝脾腎脈集於足下聚於足心陰弱故足下熱也按陰不故陽則陽勝非真陽氣有餘也帝曰寒厥之為寒也必從五指而上於膝者何也岐伯曰陰氣起於五指之裡集於膝下而聚於膝上故陰氣勝則從五指至膝上寒其寒也不從外皆從內也亦大約而言之也足太陰脈起於足大趾之端內側足厥陰脈起於足大趾之端三毛中足少陰脈起於足小趾之下斜趣足心並循足陰而上循股陰入腹故云集於膝下而聚於膝之上也按陽虛則陰勝陰勝則寒矣然寒本於陽虛故云從內帝曰寒厥何失而然也岐伯曰前陰者宗筋之所聚太陰陽明之所合也宗筋挾臍下合於陰器故云前陰者宗筋之所聚也太陰脾脈陽明胃脈脾胃之脈皆輔近宗筋故云太陰陽明之所合按注蓋以脈位言也豈知人身必借水穀以為養前篇已言陽明主潤宗筋其云太陰陽明之所合宜矣春夏則陽氣多而陰氣少秋冬則陰氣盛而陽氣衰此乃天之常道此人者質壯以秋冬奪於所用下氣上爭不能復精氣溢下邪氣因從之而上也氣因於中陽氣衰不能滲營其經絡陽氣日損陰氣獨在故手足為之寒也奪於所用謂多欲而奪其精氣也按秋冬宜養其陰過用則陰虛而陽上浮故上爭而精氣泄正虧邪動真氣因之而衰矣四肢為諸陽之本陽既衰則陰獨盛故手足不溫而寒也帝曰熱厥何如而然也岐伯曰酒入於胃則絡脈滿而經脈虛脾主為胃行津液者也陰氣虛則陽氣入陽氣入則胃不和胃不和則精氣竭精氣竭則不榮其四肢也按脈之正為經旁為絡酒性暴悍能動浮氣而善耗真氣故令絡脈滿而經脈虛也然受之者胃而為之運行者脾也脾行則氣動乘虛入胃胃不安而水穀失所養無以變化氣血四肢亦失所資蔭矣此人必數醉若飽以入房氣聚於脾中不得散酒氣與穀氣相搏熱盛於中故熱遍於身內熱而溺赤也夫酒氣盛而慓悍腎氣日衰陽氣獨勝故手足為之熱也醉飽入房內亡精氣中虛熱入由是腎衰陽盛陰虛故熱生於手足也按醉飽入房氣何以聚於脾中耶脾主運化然必資氣於命門而後能運行而不滯今醉飽入房則腎大虛命門無氣以資脾故氣聚而不散也氣不散則熱內壅而陽獨勝陽獨勝則腎水枯而火用事外走陽分故又四肢盡熱也帝曰厥或令人腹滿或令人暴不知人或至半日遠至一日乃知人者何也岐伯曰陰氣盛於上則下虛下虛則腹脹滿腹滿則下氣重上而邪氣逆逆則陽氣亂陽氣亂則不知人也按陽清陰濁清上升濁下降氣自順而不逆矣厥而腹滿不知人者是陰濁上升陽氣潰亂故厥而不知人也王本腹脹滿下有陽氣盛於上五字甲乙經作腹滿二字是也從之又王注陰作足太陰氣誤矣帝曰善願聞六經脈之厥狀病能也岐伯曰巨陽之厥則腫首頭重足不能行發為眴僕足太陽脈起於目內眥上額交巔其支別者從巔至耳上角其直行者從巔入絡腦還出別下項循肩髆內挾脊抵腰中入循膂絡腎屬膀胱其支別者從腰中下貫臀入膕中其支別者從髆內左右別下貫胂過髀樞循髀外後廉下合膕中以下貫腨內出外踝之後循京骨至小趾之端外側由是厥逆外形斯證也陽明之厥則癲疾欲走呼腹滿不得臥面赤而熱妄見而妄言足陽明脈起於鼻交頞中下循鼻外入上齒中還出挾口環唇下交承漿卻循頤後下廉出大迎循頰車上耳前過客主人循髮際至額顱其支別者從大迎前下人迎循喉嚨入缺盆下膈屬胃絡脾其直行者從缺盆下乳內廉下挾臍入氣街中其支別者起胃下口循腹裡下至氣街中而合以下髀抵伏兔下入膝臏中下循胻外廉下足胕入中指內間其支別者下膝三寸而別以下入中指外間其支別者胕上入大趾間出其端故厥如是也少陽之厥則暴聾頰腫而熱脅痛胻不可以運足少陽之脈起於目銳眥上抵頭角下耳後循頸行手少陽之前至肩上交出手少陽之後入缺盆其支別者從耳後入耳中出走耳前至目銳眥後其支別者目銳眥下大迎合手少陽於䪼下加頰車下頸合缺盆以下胸中貫膈絡肝屬膽循脅裡出氣街繞髦際橫入髀厭中其直行者從缺盆下腋循胸過季脅下合脾厭中以下循髀陽出膝外廉下入外輔骨之前直下抵絕骨之端下出外踝之前循足胕出小趾次指之端故厥如是太陰之厥則腹滿䐜脹後不利不欲食食則嘔不得臥足太陰脈起於大趾之端上膝股內前廉入腹屬脾絡胃上膈挾咽連舌本散舌下其支別者復從胃別上膈注心中故厥如是少陰之厥則口乾溺赤腹滿心痛足少陰脈上股內後廉貫脊屬腎絡膀胱其直行者從腎上貫肝膈入肺中循喉嚨挾舌本其支別者從肺出絡心注胸中故厥如是厥陰之厥則少腹腫痛腹脹涇溲不利好臥屈膝陰縮腫胻內熱足厥陰脈去內踝一寸上踝八寸交出太陰之後上膕內廉循股陰入髦中下環陰器抵少腹挾胃屬肝絡膽上貫膈故厥如是盛則瀉之虛則補之不盛不虛以經取之不盛不虛謂邪氣未盛真氣未虛如是則以穴俞經法留呼多少而取之按自此以上乃古本也此下自太陰厥逆至篇末全元起本在第九卷王氏移入於此太陰厥逆䯒急攣心痛引腹按足太陰脈自足大趾之端起兼循胻骨又注心入腹故病更如是也少陰厥逆虛滿嘔變下泄清按五臟之中腎獨有兩左為陰右則陰中之陽也左屬水右則水中伏火焉為氣之根為命之門為胃之關是故腎氣充盈少火蓄于丹田周身之氣自和洽而無寒滯之患今虛滿是氣不能運也嘔變是寒犯胃也下泄清是脾寒不攝也總為腎虛命門火弱不能溫養丹田之所致昧者不達舍腎治脾失其宜矣厥陰厥逆攣腰痛虛滿前閉譫言全元起云譫言者氣虛獨言也按厥陰肝也肝主筋肝病則筋拘攣筋攣則屈伸不利故腰痛肝病則氣鬱而不行故虛滿肝脈環陰器故前閉肝伏風邪故言譫也三陰俱逆不得前後使人手足寒三日死按凡病內寒前後必自利今反不利而手足厥冷是陰凝痼閉真氣乏竭矣焉得不死太陽厥逆僵仆嘔血善衄按膀胱之經既起目內眥又循脊絡腦而其所主惟氣與火氣內閉故僵仆火上炎故嘔衄太陽主表故厥如是也少陽厥逆機關不利機關不利者腰不可以行項不可以顧發腸癰不可治驚者死按膽為肝之腑肝主筋筋主束骨而利機關肝膽病故腰為之拘攣也然此尚是半表裡之病若腸內發癰則內外皆病其人必驚神明已亂焉得不死陽明厥逆喘咳身熱善驚衄嘔血按陽明多氣多血胃火盛則沖肺故喘咳走三陽故身熱火性動故善驚而諸血為之不寧此熱厥也手太陰厥逆虛滿而咳善嘔沫按肺主氣故病則虛滿而咳肺受寒故嘔沫也沫音末痰水之輕浮白色者手心主少陰厥逆心痛引喉身熱死不可治按心與心包屬火火上升則喉痛是火虛也虛火上升而身又發熱陰竭不能維陽矣故死手太陽厥逆耳聾泣出項不可以顧腰不可以俯仰按小腸屬火火上逆故耳聾小腸脈至目內眥故泣出項不可顧二句脈病俱不相應疑仍前文重出也手陽明少陽厥逆發喉痹嗌腫痙按痙音勁風病也大腸三焦脈俱由缺盆上頸項故病如是全元起本作痙王本誤作痓後人遂以痙為痓蓋仍此誤也咳論咳者咳嗽也本篇止以咳名而不言嗽然嗽之意已具篇中蓋省文也後人以咳而有痰謂之嗽嗽而無痰謂之咳是咳與嗽有別也又有所謂咳逆者因氣上逆而後咳且咳則氣無不逆也然咳之為病其證甚多世每盡以屬之肺豈知五臟六腑皆能致咳故篇中特詳言之要而論之致咳之始雖有五臟六腑之不同及其既咳也則無不喘呼氣逆是肺又為諸咳之總司肺主諸氣宜乎世盡以之屬肺也黃帝問曰肺之令人咳何也岐伯對曰五臟六腑皆令人咳非獨肺也帝曰願聞其狀岐伯曰皮毛者肺之合也皮毛先受邪氣邪氣以從其合也邪謂寒氣按從其合謂入於肺經也此言肺之受寒於外也其寒飲食入胃從肺脈上至於肺則肺寒肺寒則外內合邪因而客之則為肺咳肺之脈起於中焦下絡大腸還循胃口上膈屬肺故云從肺脈上至於肺也按此又言肺既受寒於外而又受寒於內內外合寒所以咳也五臟各以其時受病非其時各傳以與之時謂王月也按王不受邪五臟之常也五臟不虛則己虛則應王不王邪乘虛入是五臟之受病反在應王之時故云各以其時受病也然此五臟之受寒邪也非即始於五臟也蓋由寒入皮毛由皮毛入於肺肺受之而後乘各臟之虛以傳之也今試以肝經一臟言之肝者木也如木王於春春其時也肺即受寒咳止於肺何能傳肝唯肝素有病其經已虛雖當春令應王不王於是寒邪之由皮毛入肺者遂傳之於肝是肝之受傳於肺者正以其應王之時而失其王故又云非其時各傳以與之也各指肝心脾腎等傳謂肺受寒邪而傳臟腑也此言五臟之咳皆由肺傳以其應王不王故也以前三段分別如此注俱矇混不確肺先受邪乘春則肝先受之乘夏則心先受之乘至陰則脾先受之乘冬則腎先受之按此正分疏五臟各以其時受病也原本肺先受邪前有乘秋則三字新校正云按全元起本及太素無乘秋則三字王本誤多是也今從刪之蓋咳之為病必始於皮毛由皮毛入肺故云肺先受邪隨感隨受不獨秋也乘者窺伺之意邪之乘虛為病亦猶盜之伺隙害人乘春等義已見於前肝心脾腎亦言先受者臟病不愈將移於腑也脾王於長夏不言長夏而言至陰至陰者脾所居脾不主時故也帝曰何以異之岐伯曰肺咳之狀咳而喘息有音甚則唾血肺藏氣而應息故咳則喘息而喉中有聲按甚則唾血者氣逆不已則血動血隨氣而動也心咳之狀咳則心痛喉中介介如梗狀甚則咽腫喉痹手心主脈起於胸中出屬心包少陰之脈起於心中出屬心系其支別者從心系上挾咽喉故病如是肝咳之狀咳則兩脅下痛甚則不可以轉轉則兩胠下滿足厥陰脈上貫膈布脅肋循喉嚨之後故如是胠亦脅也脾咳之狀咳則右脅下痛陰陰引肩背甚則不可以動動則咳劇脾氣連肺故痛引肩背也按右者肺治之部肺主氣脾者氣之母脾病則及於肺故令右脅下痛肩背者肺所主也動則氣愈逆故咳劇注云脾主右誤矣腎咳之狀咳則腰背相引而痛甚則咳涎足少陰脈上股內後廉貫脊屬腎絡膀胱其直行者從腎上貫肝膈入肺中循喉嚨挾舌本又膀胱脈從肩髆內別下挾脊抵腰中入循膂絡腎故病如是按腎主五液化為五濕入脾為涎咳久則腎虛水泛脾不受濕反歸於腎故咳涎也帝曰六腑之咳奈何安所受病岐伯曰五臟之久咳乃移於六腑按臟腑本相配病久則傳變日遠日多愈久愈重移者蔓延之意言臟病移及於腑也脾咳不已則胃受之胃咳之狀咳而嘔嘔甚則長蟲出胃寒則嘔嘔甚則腸氣逆上故蛔出肝咳不已則膽受之膽咳之狀咳嘔膽汁按肝膽木也木喜融和得寒則氣鬱鬱極則嘔吐膽汁者苦水也肺咳不已則大腸受之大腸咳狀咳而遺失按大腸者肺之合肺主氣咳久則氣虛而不能攝故下脫而令二便遺失也甲乙經作遺矢是單指大便偏矣不若王本遺失為確心咳不已則小腸受之小腸咳狀咳而失氣氣與咳俱失按小腸為心之腑亦火也火盛氣熱則閉澀而便溺不通寒盛氣衰則滑泄而水火不禁今心受寒而傳之腑寒為水氣火得水而滅矣故失氣也失氣者氣消散也氣與咳俱失者氣既消散即欲咳嗽而不能出聲所以然者咳久氣散乏竭而不能接續故也腎咳不已則膀胱受之膀胱咳狀咳而遺溺按膀胱主藏津液咳久氣虛津不能藏故寒氣下流而遺溺也久咳不已則三焦受之三焦咳狀咳而腹滿不欲食飲此皆聚於胃關於肺使人多涕唾而面浮腫氣逆也按此總論久咳之為害也咳久則病不止於一臟一腑而無所不病矣故久咳不已則三焦受之三焦者覆幬上下囊括一身以氣為用者也所以咳在三焦則氣壅閉而不行故令腹滿而不思飲食肺屬上焦胃屬中焦聚者壅也關者閉也言氣壅閉於肺胃也然氣之所以壅閉於中上二焦者正以咳久氣衰而不能下注於下焦下不得泄故壅閉於肺胃而使涕唾面浮氣逆於上此又岐伯申解腹滿之意也注乃謂病止於上中二焦陋矣帝曰治之奈何岐伯曰治臟者治其俞治腑者治其合浮腫者治其經帝曰善按靈樞經曰脈之所注為俞所行為經所入為合也通評虛實論人之為病有實有虛虛則必補實乃可攻經曰邪氣盛則實精氣奪則虛虛為精奪實為邪盛三複其義而攻補之法知所適從矣此虛實之定論古今所不能外者故曰通評也黃帝問曰何謂虛實按言何因而虛何因而實岐伯對曰邪氣盛則實精氣奪則虛奪謂精氣減少如奪去也按人之所藉以生者惟此精氣耳精氣者稟受於父母父母之質強則所受亦強父母之質弱則其子多弱此精氣之分於先天者也既生之後所受雖弱而能樽節其飲食順適其寒暑以至情識開時不敢妄動競業一生則精氣克全外邪亦無自而入若所受雖強而不能保攝其天真縱恣無度精氣日耗經絡空疏外邪乘之而入於內蟠踞充斥似乎實也而不知為精氣內奪所致經曰邪之所湊其氣必虛由是言之實無真實虛乃真虛欲去其實必顧其虛世之治病者但知攻實絕不顧虛愈攻愈實攻之至死而猶不悟殊可嘆也帝曰虛實何如按言虛實之病狀何如岐伯曰氣虛者肺虛也氣逆者足寒也非其時則生當其時則死非時謂年直之前後也當時謂正直之年也餘臟皆如此按五臟各有虛實而伯姑舉肺臟且肺虛之證不止足寒此特言其大略而已帝曰何謂重實岐伯曰所謂重實者言大熱病氣熱脈滿是謂重實按大熱病者傷寒之三陽實熱雜病之痰火食積是也內有實邪真火故熱氣見於外而脈來盛滿是內外俱實故曰重實也治此之法岐伯雖不言然居可知矣帝曰經絡俱實何如何以治之按上段言脈病之重實此則單問脈之並實者也岐伯曰經絡皆實是寸脈急而尺緩也皆當治之故曰滑則從澀則逆也按邪之入人由絡入經今云皆實是其人之氣足以捍邪而邪不得入也何以辨之辨之於其脈寸主表尺主裡寸為陽尺為陰寸急尺緩是表裡既分陰陽不雜故知其經絡皆實也然急則必數緩則必弱雖無內虛致邪之患而急與緩亦非中正和平之道故又曰皆當治之也是經絡皆實之脈有小疾而無大病若通論大體又當辨之於滑澀滑則從澀則逆滑為陽氣有餘澀為陰血不足也夫虛實者皆從其物類始故五臟骨肉滑利可以長久也物之生則滑利死則枯澀故澀為逆滑為從從謂順也帝曰絡氣不足經氣有餘何如岐伯曰絡氣不足經氣有餘者脈口熱而尺寒也秋冬為逆春夏為從治主病者春夏陽氣高故脈口熱尺中寒為順也十二經十五絡各隨左右而有太過不及工當尋其至應以施針灸故云治主其病者也帝曰經虛絡滿何如岐伯曰經虛絡滿者尺熱滿脈口寒澀也此春夏死秋冬生也秋冬陽氣下故尺中熱脈口寒為順也帝曰治此者奈何岐伯曰絡滿經虛灸陰刺陽經滿絡虛刺陰灸陽以陰分主絡陽分主經故爾帝曰何謂重虛此反問前重實也岐伯曰脈虛氣虛尺虛是謂重虛按王本作脈氣上虛尺虛王注云言尺寸脈俱虛按此下文岐伯所解本言氣虛尺虛脈虛而無上虛之解則上字之誤不辨自明啟玄不知其誤即以尺寸俱虛為解蓋疑上為寸也甲乙經作脈虛氣虛尺虛是謂重虛正與下文相合今釐正之新校正辨王注之非誠是而以尺寸俱虛之語謂不兼氣虛則亦誤矣夫尺為陰尺虛為腎虛寸為陽寸虛非氣虛乎故以上為寸之誤啟玄所不能辭而以尺寸俱虛謂非重虛啟玄恐必不服也帝曰何以治之岐伯曰所謂氣虛者言無常也尺虛者行步恇然按無常二字甚渾成外而顏色之動變內而心神之恍惚氣力之倦勤皆是也啟玄作脈動無常楊上善作膻中氣不定偏矣尺虛者腎虛也腰以下腎主之腎虛則骨不任身而腰腳軟弱故步履恇怯無力也脈虛者不象陰也不象太陰之候也何以言之氣口者脈之要會手太陰之動也按陽者氣也陰者血也刺志論曰脈實血實脈虛血虛人脈之虛皆由陰血不足不能榮養故曰脈虛者不象陰謂失其陰血之本也注謂不象太陰之候誤矣夫手太陰氣口為候脈之所人之氣血有實有虛徵之於氣口是太陰所以象人之虛實而人之虛實不可以象太陰虛不可象實亦不可象啟玄以陰為太陰可怪也惟陰為陰血故下文云滑則生澀則死也如此者滑則生澀則死也按滑亦脈之病也而此獨云生何也蓋病非血虛而脈滑則為涎浮痰動之證若病在血分而脈象見滑是氣血尚爾流動未至乾枯故可以生豈如病屬血分而脈又枯澀之必死也帝曰寒氣暴上脈滿而實何如言氣熱脈滿已為重實滑則從澀則逆今氣寒脈滿亦可謂重實乎其於滑澀生死逆從何如岐伯曰實而滑則生實而逆則死逆謂澀也按新校正云詳王氏以逆為澀大非古文簡略辭多互文上言滑而下言逆舉滑則從可知言逆則澀可見非謂逆為澀也帝曰脈實滿手足寒頭熱何如岐伯曰春秋則生冬夏則死大略言之按帝問脈證伯皆不解其所以而但以死生之期為對殊不快意竊嘗論之脈實滿者洪大有力者也手足寒者熱盛於內也頭熱者邪在表也此三陽經實熱表證汗之清之其病必愈而伯云春秋生冬夏死何也蓋冬為寒極之時熱不易泄夏為熱極之日其火愈旺治之頗難故曰死至若春秋其氣溫涼其邪易散故曰生也然此不可執泥注云大略言之極是但冬行夏令夏行冬令等意殊未確耳脈浮而澀澀而身有熱者死按脈浮身熱病為在表若見洪滑之脈則屬輕淺之證矣乃外浮內澀陰血已虧欲解其身之熱慮損其陰欲補其陰又恐表邪未去治之最難故亦曰死也新校正云按此節舊在後帝曰形度骨度脈度筋度何以知其度也之下對問義不相類甲乙經移續於此是也王氏頗知錯簡而不知皇甫士安嘗移附於此也今從之帝曰其形盡滿何如岐伯曰其形盡滿者脈急大堅尺澀而不應也形盡滿謂四形臟盡滿也按形滿謂虛浮腫脹之類盡滿則遍於周身內外矣注謂四形臟尚偏腫脹之病有虛有實實者肢體浮湧脈象有力虛者外雖虛浮內則空弱或上部之脈似乎有力而下部之脈虛微辨之不精生死立判矣故伯言外形盡滿上部之脈急大而堅尺脈又澀而不應上部者為腎虛少血之人未可以形滿脈強不細辨其下部根本之脈而可以冒昧施治也按甲乙經太素澀作滿非也夫滿者盛也如形既盡滿上中二部之脈又急大堅若尺復盛滿是脈已上下相應為實熱之脹不當言不應矣如是者故從則生逆則死帝曰何謂從則生逆則死岐伯曰所謂從者手足溫也所謂逆者手足寒也按人身之脈以腎為根本蓋五臟受氣於命門命門之氣足而後周身之氣運動無壅遏之患既無壅遏有何脹滿如此一證外實內虛標強本弱尺脈澀而不應者腎血少而氣衰微四肢溫和尚有可治如不溫而寒則真氣已竭矣所以然者本虧故也今人治脹泥於外象而不顧其中臟輕用消導殊可嘆也帝曰乳子而病熱脈懸小者何如懸謂如懸物之動也按乳子謂婦人生子而哺乳者岐伯曰手足溫則生寒則死按懸小謂小而動搖無力也人凡病熱脈當浮大況兼乳子之婦尤宜洪滑今反見懸小是證陽脈陰為真原不足外假熱而內真寒治此之法忌用苦寒蓋外雖病熱非真熱也岐伯驗之於手足溫則生寒則死也帝曰乳子中風熱喘鳴肩息者脈何如按脈何如謂如何而生如何而死岐伯曰喘鳴肩息者脈實大也緩則生急則死緩謂如縱緩急謂如弦張之急非往來之緩急也正理傷寒論曰緩則中風故乳子中風脈緩則生急則死按喘鳴者喘急有聲也肩息者喘而肩動息粗也此肺受風寒氣浮而動脈見實大有力者外感之實證也然實大則實大矣而脈氣和緩為有胃氣無意外之虞如不緩而急是有升無降真氣內竭未有不死者也帝曰腸澼何如按腸澼痢疾也今世下利見紅白積者是也然下文帝有白沫膿血兩問則此似兼紅白而下更分分言也岐伯曰身熱則死寒則生熱為血敗故死寒為榮氣在故生也按注非也下利之病多由七情鬱結食飲內傷積而未化或腎虛氣衰不能腐熟以致成痢若更外感風寒又加身熱等證有如傷寒有如瘧狀治此證者單表外邪則痢積逼迫專攻痢積則痢下里虛外邪乘虛而入愈深治之最難故多死者用是精求其義別內外之因推致病之理風寒之襲皆由內虛若非先托外邪則邪與積混寒熱更作急重不休至真要大論曰從外之內而盛於內者先治其外而後調其內余師其意而變通之常用東垣補中益氣方去朮加黃芩芍藥蘇葉防風之類扶正氣而托外邪一汗再汗寒熱漸解急重亦稀自順治戊子以迄康熙壬子予治數十百人矣其間調養之法彷彿傷寒尤禁多食身涼痢止繼以培補腎虛者大進地黃痢久虛寒者佐以桂附危轉為安十痊六七世俗不知此理多以瘧痢兩證非比傷寒每不禁食稍愈即復豈知真瘧真痢亦當節食況瘧痢相兼即是傷寒類證不用補散單用苦寒消導等劑直使正氣大虛外邪內陷而死殊可嘆也予自初閱內經見此二語反復尋繹乃得其解始知伯言腸澼身熱者死其理有固然者惜無所解後人莫知所宗千載之下予乃為之補救於其後活人甚多往矣軒岐其許我哉帝曰腸澼下白沫何如按沫音末涎沫白沫者糞之如痰如洟者也岐伯曰脈沉則生浮則死陰病而見陽脈與證相反故死按白沫今世謂之白積多屬之寒劉河間則指為熱要而論之痢之寒熱誠不可以色之紅白拘然白者畢竟多寒今之如魚凍是也惟白屬陰寒故其脈宜沉而不宜浮也帝曰腸澼下膿血何如岐伯曰脈懸絕則死滑大則生按膿血紅痢也紅痢多熱熱近有餘可用寒涼消導故脈宜洪大而不宜懸絕絕謂微細懸者猶言無力異常也帝曰腸澼之屬身不熱脈不懸絕何如岐伯曰滑大者曰生懸澀者曰死以臟期之按屬類也謂如腸澼之類也身不熱是無外感脈不懸絕是元本亦不甚虧如是者雖有泄利之病不過飲食內傷脈當滑大而且當有力若見懸澀是陰血大虧身雖不熱脈雖不絕法亦當死臟期謂克勝之日也帝曰癲疾何如岐伯曰脈搏大滑久自已脈小堅急死不治脈小堅急為陽病而見陰脈故死不治按新校正云巢元方云脈沉小急實死不治小牢急者亦不可治帝曰癲疾之脈虛實何如岐伯曰虛則可治實則死以反證故按注非也癲疾為陽有餘搏大而滑者陽盛之脈也脈病相符故久當自愈若脈見小堅而急是陰凝固結其病已成故不可治然堅小似虛前言不可治而此又言可治搏大似實前言必生而此又言實者死何也東垣云脈貴有神神者人身之元氣也元氣有根雖病不死前言搏大雖似乎實而滑則其氣流動活潑神嘗虛矣小堅雖似乎虛而急則其氣短促逼迫神則實矣虛則神氣生實則神氣死癲疾如是諸病可類推矣此虛實二字與他處不同注言以反證故殊欠明確帝曰消癉虛實何如岐伯曰脈實大病久可治脈懸小堅病久不可治久病血氣衰脈不當實大故不可治按新校正云詳經言實大久病可治注以為不可治按甲乙太素全元起本並云可治又按巢元方云脈數大者生細小浮者死又云沉小者生實牢大者死謹按王注既與經文之意相左其誤已明即新校正引諸家之言亦無決斷竊謂癉者熱也消者渴也消本於熱故曰消癉也消癉之病實火者少虛火者多其原起於腎虧無水津液枯槁欲得外水以自救脈實大病雖久而可治者火近於實非盡水虧故猶可救脈小堅而且懸絕者明屬真水乾槁故病愈久愈不可治也王氏泛論固非並云可治者亦非元方所論脈法雖合經意然亦無所發明也帝曰春亟取經絡夏亟取經俞秋亟治六腑冬則閉塞閉塞者用藥而少針石也亟猶急也閉塞謂氣之門戶閉塞也所謂少針石者非癰疽之謂也冬月雖氣門閉塞然癰疽氣烈內作大膿不急瀉之則爛筋腐骨故雖冬月亦宜針石以開除之癰疽不得頃時回按回猶違也癰疽最為危急治之少違頃刻則誤矣故雖冬月急宜針石不在禁用之例也凡治消癉僕擊偏枯痿厥氣滿發逆肥貴人則高梁之疾也隔塞閉絕上下不通則暴憂之病也暴厥而聾偏塞閉不通內氣暴薄也不從內外中風之病故瘦留著也蹠跛寒風濕之病也消謂內消癉謂伏熱厥謂氣逆高膏也梁粱也蹠謂足也夫肥者令人熱中甘者令人中滿故熱氣內薄發為消渴偏枯氣滿逆也逆者謂違背常候與平人異也然憂愁者氣閉塞而不行故隔塞痞閉氣脈斷絕而上下不通也氣固於內則大小便道偏不得通泄也何者臟腑氣不化禁固而不宣散故爾也外風中人伏藏不去則陽氣內受為熱外燔肌肉消爍故留薄肉分消瘦而皮膚著於筋骨也濕勝於足則筋不利寒勝於足則攣急風濕寒勝則衛氣結聚衛氣結聚則肉痛故足跛而不可履也按注意是矣但解內氣暴薄節未確薄磅薄也人身之氣喜暢惡郁鬱極則求通衝突而起磅薄上下故云暴薄惟暴薄故上行而厥逆惟上逆故耳聾然逆則逆矣而氣不遽達故隔塞而不通也又不從內外中風之病注中字讀作去聲亦未確蓋謂風之入於人身也內不在臟腑外不在皮毛而留著於肌肉之中故令肌肉瘦削是名中風之病也若作中風解外中皮毛身發寒熱而已肉未必瘦內中臟腑則偏僕厥絕又不止於肌肉消瘦矣中平聲著直略切蹠音織跛補火切波上聲一足短也黃疸暴痛癲疾厥狂久逆之所生也五臟不平六腑閉塞之所生也頭痛耳鳴九竅不利腸胃之所生也足之三陽從頭走足然久厥逆而不下行則氣怫積於上焦故為黃疸暴痛癲狂氣逆矣食飲失宜吐利過節故六腑閉塞而令五臟之氣不和平也腸胃痞塞則氣不順序氣不順序則上下中外互相勝負故頭痛耳鳴九竅不利也按病有所自生治其所自生而病自已陰陽應象大論曰治病者必求於本正此謂也刺志論論虛實常反自是不易之理不特針家為然然即以針論通篇惟末後四語其前毫與針刺之義無涉不知何故以刺志名篇也黃帝問曰願聞虛實之要岐伯對曰氣實形實氣虛形虛此其常也反此者病陰陽應象大論曰形歸氣由是故虛實同焉反謂不相合應失常平之候也形氣相反故病生氣謂脈氣形謂身形也谷盛氣盛谷虛氣虛此其常也反此者病靈樞經曰榮氣之道內谷為寶谷入於胃氣傳與肺精專者上行經隧由是故穀氣虛實占必同焉候不相應則為病也脈實血實脈虛血虛此其常也反此者病脈者血之府故虛實同焉反不相應則為病也帝曰如何而反岐伯曰氣盛身寒氣虛身熱此謂反也按氣為陽陽盛則火勝而身宜熱今不熱而反寒陽虛則火衰而身應涼今不涼而反熱是病證乖舛為反常也按氣盛身寒四字王本所無甲乙經載之與下文相應是也今增入之谷入多而氣少此謂反也谷不入而氣多此謂反也脈盛血少此謂反也脈少血多此謂反也按氣多氣少惟谷是視脈盛脈衰惟血是分相反若此必有故矣氣盛身寒得之傷寒氣虛身熱得之傷暑傷謂觸冒也寒傷形故氣盛身寒熱傷氣故氣虛身熱按寒則收引而無汗氣閉於內故氣盛而身寒暑則多汗而氣泄火氣外達故氣虛而身熱身寒者治用辛甘身熱者藥尚甘涼此傷寒傷暑之大旨證雖似反而其病則可治辨之不審則害不勝言也谷入多而氣少者得之有所脫血濕居下也按血脫則氣泄濕居下則火炎上氣泄則谷不能化氣火炎上則善食而瘦故谷雖多而氣少也谷入少而氣多者邪在胃及與肺也按邪入肺胃則氣壅盛胃為邪踞故谷不入而氣多也脈小血多者飲中熱也飲謂留飲也按飲停則化而為熱脈小者正氣不足血多者非真有餘熱所激也脈大血少者脈有風氣水漿不入此之謂也按風氣輳泊令血枯乾木邪乘胃故脈見洪大而證見血少更且水漿不入也注言水漿不入於脈誤矣夫實者氣入也虛者氣出也入為陽出為陰陰生於內故出陽生於外故入氣實者熱也氣虛者寒也陽盛而陰內拒故熱陰盛而陽外微故寒按邪氣入則實正氣出則虛虛必寒實必熱自然之理也入實者左手開針孔也入虛者左手閉針孔也言用針之補瀉也右手持針左手捻穴故實者右手開針孔以瀉之虛者左手閉針孔以補之也按本篇以刺志為名然自此節以前並無一字論針其論針者惟此節而已本非針家妙旨姑存之以見名篇之意耳刺禁論刺以去病欲去病而不知禁則不惟不能去病而反以增病其害更有不可勝言者篇中精義用針者不可不知用藥者尤當體認也黃帝問曰願聞禁數岐伯對曰臟有要害不可不察按要害者性命之所關也肝生於左肝象木王於春春陽發生故生於左肺藏於右肺象金王於秋秋陰收殺故藏於右也按新校正云楊上善云肝為少陽陽長之始故曰生肺為少陰陰藏之初故曰藏心部於表腎治於裡按心為牡臟屬陽而主表凡諸動作皆其所部署焉腎為牝藏屬陰而主裡凡諸臟腑皆其所統治焉楊上善云心為五臟部主故得稱部腎間動氣內治五臟故曰治亦是脾為之使胃為之市按趨走不息謂之使脾主運化水穀以營養夫一身其使之為乎百物聚集謂之市胃謂水穀之海以變化夫五味其市之為乎膈肓之上中有父母按楊上善云心下膈上為肓心為陽父也肺為陰母也肺主氣心主血共榮衛於一身故為父母乃王注以氣海為父母雖上氣海在膻中然不若楊解為更確七節之旁中有小心按脊骨共二十一節自下除骶骨上數至第七節兩旁乃腎位也腎兩枚各距脊橫開一寸五分兩腎之中是曰命門為火之宅為氣之根亦猶心君主宰諸臟腑故曰小心也乃王氏指為真心神靈之宮室楊上善改小為志以志為心之神皆誤也從之有福逆之有咎按從謂各得其宜也刺中心一日死其動為噫心在氣為噫刺中肝五日死其動為語肝在氣為語按新校正云全元起本並甲乙經語作欠元起云腎傷則欠子母相感也王氏改欠為語刺中腎六日死其動為嚏腎在氣為嚏按新校正云按全元起本及甲乙經六日作三日刺中肺三日死其動為咳肺在氣為咳刺中脾十日死其動為吞脾在氣為吞按新校正云全元起本及甲乙經十日作十五日刺中五臟與診要經終論並四時刺逆從論相重此敘五臟相次之法以相生為次甲乙經以心肺肝脾腎為次是以所克為次全元起舊本則散亂而無次矣刺中膽一日半死其動為嘔膽氣勇故為嘔按新校正云診要經終論刺中膽下又云刺中膈者為傷中其病雖愈不過一歲而死刺跗上中大脈血出不止死跗為足跗大脈動而不止者則胃之大經也胃為水穀之海血出不止則胃氣將竭海竭氣亡故死刺面中溜脈不幸為盲面中溜脈者手太陽任脈之交會手太陽脈自顴而斜行至目內眥任脈自鼻鼽兩旁上行至瞳子下故刺面中溜脈為盲刺頭中腦戶入腦立死腦戶穴名在枕骨上通於腦中然腦為髓之海真氣之所聚針入腦則真氣泄故立死刺舌下中脈太過血出不止為喑舌下脈脾之脈也脾脈者挾咽連舌本散舌下血出不止則脾氣不能營運於舌故喑不能言按言語之需舌猶笙之用簧也清濁高下非舌不辨今若刺血過多則舌不便利而聲音蹇澀矣注作脾不能運太迂刺足下布絡中脈血不出為腫布絡謂當內踝前足下空處布散之絡正當然谷穴分也絡中脈則衝脈也衝脈者並少陰之經下入內踝之後入足下也然刺之而血不出則腎脈與衝脈氣並歸於然谷之中故為腫刺郄中大脈令人僕脫色尋此經郄中主治與中誥流注經委中穴正同應郄中者以經穴為名委中處所為名亦猶寸口氣口脈口皆同一處爾然郄中大脈者足太陽經脈也足太陽之脈起於目內眥合手太陽手太陽脈自目內眥斜絡於顴足太陽脈上頭下項又循於足故刺之過禁則令人仆倒而面色如脫去也按郄音隙刺氣街中脈血不出為腫鼠僕氣街之中膽胃脈也膽之脈循脅裡出氣街胃之脈挾臍入氣街中其支別者起胃下口循腹裡至氣街中而合今刺之而血不出則血脈氣並聚於中故內結為腫如伏鼠之形也氣街在腹下挾擠兩旁相去四寸鼠僕上一寸動脈應手也按新校正云按別本僕一作鼷氣府論注氣街在臍下橫骨兩端鼠鼷上一寸也刺脊間中髓為傴傴謂傴僂身踡屈也脊間謂脊骨節間也刺中髓則骨精氣泄故傴僂也按傴音謳刺乳上中乳房為腫根蝕乳之上下皆足陽明之脈也乳房之中乳液滲泄胸中氣血皆外湊之然刺中乳房則氣更交湊故為大腫中有膿根內蝕肌膚化為膿水而久不愈刺缺盆中內陷氣泄令人喘咳逆五臟者肺為之蓋缺盆為之道肺藏氣而主息又在氣為咳故刺缺盆中內陷則肺氣外泄故令人喘咳逆也刺手魚腹內陷為腫手魚腹內肺脈所流故刺之內陷則為腫也按新校正云甲乙經肺脈所流作肺脈所留刺陰股中大脈血出不止死陰股之中脾之脈也脾者中土孤臟以灌四旁今血出不止脾氣將絕故死刺客主人內陷中脈為內漏為聾客主人穴名今名上關在耳前上廉起骨開口有空手少陽足陽明脈交會於中陷脈言刺太深也刺太深則交脈破決故為耳內之漏脈內漏則氣不營故聾按新校正云詳客主人穴與氣穴論注同按甲乙經及氣府論注云手足少陽足陽明三脈之會疑注脫足少陽一脈也刺膝髕出液為跛膝為筋府筋會於中液出筋干故跛刺臂太陰脈出血多立死臂太陰者肺脈也肺者主行營衛陰陽治節由之血出多則營衛絕故立死刺足少陰脈重虛出血為舌難以言足少陰腎脈也貫舌絡肺系舌本故重虛出血則舌難言也刺膺中陷中肺為喘逆仰息肺氣上泄逆所致也刺肘中內陷氣歸之為不屈伸肘中謂肘屈折之中尺澤穴中也刺過陷脈惡氣歸之氣固關節故不屈伸也刺陰股下三寸內陷令人遺溺股下三寸腎之絡也衝脈與少陰之絡皆起於腎下出於氣街並循於陰股其上行者出胞中故刺陷脈則令人遺溺也刺掖下脅間內陷令人咳掖下肺脈也肺之脈從肺系橫出掖下真心臟脈直行者從心系卻上掖下刺陷脈則心肺俱動故咳也刺少腹中膀胱溺出令人少腹滿胞氣外泄穀氣歸之故少腹滿也少腹謂臍下也刺腨腸內陷為腫腨腸之中足太陽脈也太陽氣泄故為腫刺匡上陷骨中脈為漏為盲匡目匡也骨中謂目匡骨中也匡骨中脈目之系肝之脈也刺內陷則目系絕故為目漏目盲刺關節中液出不得屈伸諸筋者皆屬於節津液滲潤之液出則筋膜乾故不得屈伸也無刺大醉令人氣亂脈數過度故因刺而亂也按靈樞經氣亂作脈亂當以氣亂為正無刺大怒令人氣逆怒者氣逆故刺之益甚無刺大勞人經氣越也無刺新飽人氣盛滿也無刺大飢人氣不足也無刺大渴人血脈干也無刺大驚人神蕩越而氣不治也按新校正云詳無刺大醉至此七條與靈樞經相出入靈樞經曰新內無刺已刺無內新怒無刺已刺無怒新勞無刺已刺無勞已醉無刺已刺無醉已飽無刺已刺無飽已飢無刺已刺無飢已渴無刺已刺無渴大驚大恐必定其氣乃刺之也謹按此七條雖與靈樞經相出入然靈樞之旨既慎於未刺之先復誡於已刺之後蓋合醫者病者而言此篇之旨則專指用針者言也又按此七段王本原刻在刺手魚腹之下刺陰股中大脈之上上下分裂今移置於此皮部論囊括一身以總統夫臟腑者皮也故皮得謂之部言為所部主也皮之職內既包臟腑外則司開闔而毫竅附焉故又為諸邪出入之門戶然邪之入也雖由於皮而所以致邪之入者皮不任咎也篇中雖分三段始終只一意而已黃帝問曰余聞皮有分部脈有經紀筋有結絡骨有度量其所生病各異別其分部左右上下陰陽所在病之始終願聞其道岐伯對曰欲知皮部以經脈為紀者諸經皆然按皮膚為一身之軀殼諸凡經脈皆其所包括也分部如脊中屬督脈腹中行為任沖之類是也陽明之陽名曰害蜚上下同法視其部中有浮絡者皆陽明之絡也上謂手陽明下謂足陽明也按靈樞經曰脈之見者皆絡脈也蓋脈行肉裡深不可見其可見者殆浮絡之謂歟其色多青則痛多黑則痹黃赤則熱多白則寒五色皆見則寒熱也按凡胃與大腸二經部分所至之處其色有如是者則知其或痛或寒熱而可以處治此正絡之浮見於外者也言陽明而他經可以類推矣絡盛則入客於經按絡居皮內邪由皮而入絡若不解散則由絡而入於經矣陽主外陰主內陽謂陽絡陰謂陰絡此通言之也手足身分所見經絡皆然少陽之陽名曰樞持上下同法按上手少陽三焦下足少陽膽視其部中有浮絡者皆少陽之絡也絡盛則入客於經故在陽者主內在陰者主出以滲於內諸經皆然按陽誠主外矣而其氣常衛固夫一身使之無所漏以內歸於丹田陰誠主內矣而其血常榮養夫臟腑使之無所壅以外達於九竅外內互相資而後氣血自滲灌於十二經脈之中其所謂主內主出者即所謂主外主內者也此天地合氣之妙理注略而不言何也太陽之陽名曰關樞上下同法按上手太陽小腸下足太陽膀胱視其部中有浮絡者皆太陽之絡也絡盛則入客於經少陰之陰名曰樞儒按甲乙經作檽上下同法按上手少陰心下足少陰腎視其部中有浮絡者皆少陰之絡也絡盛則入客於經其入經也從陽部注於經其出者從陰內注於骨按前言內出者陰陽互根之妙此言入出者邪氣進退之次也陽部即絡與皮毛邪之入也由陽入陰則其出也自當由陰而返陽矣此骨字疑有誤心主之陰名曰害肩上下同法按上手厥陰心主下足厥陰肝視其部中有浮絡者皆心主之絡也絡盛則入客於經太陰之陰名曰關蟄上下同法視其部中有浮絡者皆太陰之絡也絡盛則入客於經部皆謂本經絡之所部分浮謂浮見也按十二經名目殊不可解注強為之解及王曰逵杜撰名義甚無意味略而存之是矣如陰陽內外出內等乃為要義不可忽也凡此十二經絡脈者皮之部也列陰陽位部主於皮故曰皮之部按以上乃分敘十二經絡之名次以下則總敘邪氣由外入內之次也是故百病之始生也必先於皮毛邪中之則腠理開開則入客於絡脈留而不去傳入於經留而不去傳入於腑廩於腸胃廩積也聚也邪之始入於皮也溯然起毫毛開腠理溯然惡寒也起謂毛起豎也腠理謂皮空及文理也其入於絡也則絡脈盛色變盛謂盛滿變謂易其常也其入客於經也則感虛乃陷下經虛邪入故曰感虛脈虛氣少故陷下也其留於筋骨之間寒多則筋攣骨痛熱多則筋弛骨消肉爍䐃破毛直而敗攣急也弛緩也消爍也針經曰寒則筋急熱則筋緩寒勝為痛熱勝為氣消䐃者肉之標故肉消則䐃破毛直而敗也帝曰夫子言皮之十二部其生病皆何如岐伯曰皮者脈之部也按部者統御之稱皮包一身而脈絡統焉故云脈之部邪客於皮則腠理開開則邪入客於絡脈絡脈滿則注於經脈經脈滿則入舍於腑臟也故皮者有分部不與而生大病也脈行皮中各有部分脈受邪氣隨則病生非由皮氣而能生也按分部不與注意是而未明快甲乙作不愈元起本言不與經脈和調故生大病俱非也蓋邪之病人固由皮入至於腑臟而苟非其中之元氣已虛則腠理何以開而邪得入是邪雖由皮之分部而入而要之與皮無與也帝問皮之十二部生何病是疑皮亦能生病伯言皮不過包括一身為邪氣出入之門戶邪之入也必極於至虛之處而後止外之入內所召也皮何與焉詳味問答語意自見矣與去聲經絡論新校正云按全元起本原在皮部論末王氏所分也黃帝問曰夫絡脈之見也其五色各異青黃赤白黑不同其故何也岐伯對曰經有常色而絡無常變也經行氣故色見常應於時絡主血故受邪則變而不一矣按絡為脈之浮見於外者故隨感之淺深而變不常也帝曰經之常色何如岐伯曰心赤肺白肝青脾黃腎黑皆亦應其經脈之色也帝曰絡之陰陽亦應其經乎岐伯曰陰絡之色應其經陽絡之色變無常隨四時而行也順四時氣化之行止按絡既為脈之浮見於外者理應所見之色俱變無常而何以絡有陰陽之分且陰絡之色只應經而不變此何說也竊謂就脈而言經在內絡在外就絡而言則見於身者為陰見於面者為陽故陰不變而陽變以陽尤浮動故也寒多則凝泣凝泣則青黑熱多則淖澤淖澤則黃赤此皆常色謂之無病五色俱見者謂之寒熱帝曰善淖濕也澤潤液也謂微濕潤也按寒多熱多當指四時之氣言故見青黑黃赤而無病若五色雜見則寒熱交作而成病此正所謂隨四時而行也玉版論要揆度奇恆道在於一一者神也有神則生失神則死凡色脈陰陽以此為揆度之要道也景岳詮解已確謹錄如下黃帝問曰余聞揆度奇恆所指不同用之奈何岐伯對曰揆度者度病之淺深也奇恆者言奇病也請言道之至數五色脈變揆度奇恆道在於一按張景岳曰揆度揣度也奇恆異常也所指不同有言疾病者有言色脈者有言臟腑者有言陰陽者異常之病非揣度淺深之詳不易知也至數之義所包者廣能知天地之至數即可知人之至數脈色奇恆其變雖多其道則一一者如下文所謂神而已矣神轉不回回則不轉乃失其機按張景岳曰神者陰陽之變化也易曰知變化之道者其知神之所為乎轉運行不息也回逆而邪也神機之用循環無窮故在天在人無不賴之以成化育之功者皆神轉不回也設其回而不轉則至數逆生機失矣故曰神去則機息又曰失神者亡也至數之要迫近以微按至數者神機也至精至微最切近於人者著之玉版命曰合玉機按玉機真臟論亦有此數語容色見上下左右各在其要按張景岳曰天之神機見於氣候人之神機見於脈色凡此上下左右及下文淺深逆從日數之類皆色脈至數之要不可不察也其色見淺者湯液主治十日已按張景岳曰色淺則病微故可以湯液主治而愈亦速也湯液者五穀之湯液蓋調養之道非後世湯藥之謂義見後其見深者必齊主治二十一日已按張景岳曰色深則病深故當以齊主治而愈稍遲齊劑同藥劑也湯液醪醴論曰必齊毒藥攻其中義見後其見大深者醪酒主治百日已按大深病尤甚矣故必以醪酒主治醪酒藥酒也如腹中論雞矢醴之類色夭面脫不治百日盡已按張景岳曰色夭面脫者神氣已去故不可治百日盡則時更氣易至數盡而已上節言病已此言命已也脈短氣絕死按張景岳曰脈短氣絕者中虛陽脫也故死病溫虛甚死按張景岳曰病溫邪有餘虛甚正不足正不勝邪故死謹按以上言容色之淺深以全面言也以下言上下左右以部分言也色見上下左右各在其要上為逆下為從按張景岳曰要即逆從之要也五色篇曰其色上行者病益甚其色下行如雲徹散者病方已故上為逆下為從也女子右為逆左為從男子左為逆右為從按張景岳曰女為陰右亦為陰色在右則陰病甚矣故女以右為逆男為陽左亦為陽色在左則陽病甚矣故男以左為逆此雖以色為言而病之逆從亦猶是也易重陽死重陰死按張景岳曰易變易也男以右為從而易於左則陽人陽病是重陽也女以左為從而易於右則陰人陰病是重陰也重陽重陰者陰陽偏勝也有偏勝則有偏絕故不免於死陰陽反作治在權衡相奪按舊本反他誤也陰陽應象大論曰陰陽反作是也今改從之生氣通天論曰陰平陽秘精神乃治若證陰脈陽證陽脈陰或宜陰反陽宜陽反陰則治病者當量其虛實真假而為之奪其有餘補其不足如權衡然則善矣奇恆事也揆度事也按張景岳曰此承上文而言陰陽反作即奇恆事也權衡相奪即揆度事也搏脈痹躄寒熱之交按張景岳曰上文言奇恆之色此下言奇恆之脈搏脈者搏擊於手也為邪盛正衰陰陽乖亂之脈故為痹為躄為或寒或熱之交也痹頑痹躄足不能行也躄音碧脈孤為消氣虛泄為奪血按張景岳曰脈孤者孤陰孤陽也孤陽者洪大之極陰氣必消孤陰者微弱之甚陽氣必消故脈孤為消氣也脈虛兼泄者必亡其陰陰亡則血虛故虛泄為奪血也孤為逆虛為從孤無所依故曰逆虛衰可復故曰從行奇恆之法以太陰始凡揆度奇恆之法先以氣口太陰之脈定四時之正氣然後度量奇恆之氣行所不勝曰逆逆則死按張景岳曰行所不勝克我者也如以木見金以土見木之類行所勝曰從從則活按張景岳曰行所勝我克者也如以木見土以土見水之類八風四時之勝終而復始按八風四正四維八方之風也諸風之至常隨四時而相勝勝有常數終始循環逆行一過不復可數如時氣反常風行乖逆猝然而過既無相勝之序更何終始之可數而奇恆之變所由起所謂回則不轉也景岳以色脈失調為喻忍未確論要畢矣按此篇尾結句語也諸家讀解皆連上文誤矣腹中論篇腹中論者言腹中之病也凡八則而今刪其一腹中之病誠不止此而此特其大凡耳黃帝問曰有病心腹滿旦食則不能暮食此為何病岐伯曰名為鼓脹心腹脹滿不能再食形如鼓脹故名鼓脹也按鼓脹一證最為惡候似不止於心腹脹滿不能再食而已也太素作谷脹良是蓋氣壅而不能化食者非真鼓脹注言形如是也帝曰治之奈何岐伯曰治之以雞矢醴一劑知二劑已古本草雞矢並不治鼓脹惟大利小便微寒今方製法當處湯漬服之按鼓脹固非雞矢所能治即谷脹恐亦非宜大抵方藥有古人能用之而後人必不可用者此類是也帝曰其時有復發者何也復謂再發言如舊也岐伯曰此飲食不節故時有病也按言腹滿而不能食者其因原起於飲食繼又不能樽節故令復發如舊也帝曰有病胸脅支滿者妨於食病至則先聞腥臊臭出清液先唾血四肢清目眩時時前後血病名為何何以得之清液清水也亦謂之清涕清涕者謂從窈漏中漫液而下水出清冷也眩謂目視眩轉也前後血謂前陰後陰出血也岐伯曰病名血枯此得之年少時有所大脫血若醉入房中氣竭肝傷故月事衰少不來也出血多者謂之脫血漏下鼻衄嘔吐出血皆同焉夫醉則血氣盛血氣盛則內熱因而入房髓液皆下故腎中氣竭也肝藏血以少大脫血故肝傷也然於丈夫則精液衰乏女子則月事衰少而不來帝曰治之奈何復以何術岐伯曰以四烏鰂骨一藘茹二物併合之丸以雀卵大如小豆以五丸為後飯飲以鮑魚汁利腸中飯後藥先謂之後飯按古本草經云烏鰂魚骨藘茹等並不治血枯然經法用之是攻其所生所起爾夫醉勞力以入房則腎中精氣耗竭月事衰少不至則中有惡血淹留精氣耗竭則陰萎不起而無精惡血淹留則血痹著中而不散故先茲四味用入方焉古本草經曰烏鰂魚骨味鹹冷平無毒主治女子血閉藘茹味辛寒平有小毒主散惡血雀卵味甘溫平無毒主治男子陰萎不起強之令熱多精有子鮑魚味辛臭溫平無毒主治瘀血血痹在四肢不散者尋文會意方義如此而處治之也按新校正云按甲乙經及太素藘作䕡詳王注性味乃䕡茹當改藘作䕡又按本草烏鰂魚骨冷作微溫雀卵甘作酸與王注異帝曰病有少腹盛上下左右皆有根此為何病可治不岐伯曰病名曰伏梁按伏梁本為心之積今本篇又有兩伏梁詳求其義彼此殊別乃知凡胸腹之間病有聚而成形者皆得謂之伏梁所謂名同而實異也帝曰伏梁何因而得之岐伯曰裹大膿血居腸胃之外不可治治之每切按之致死帝曰何以然岐伯曰此下則因陰必下膿血上則迫胃脘生膈挾胃脘內癰正當衝脈帶脈之部分也帶脈者起於季脅回身一周橫絡於臍下衝脈者與足少陰之絡起於腎下出於氣街循陰股其上行者出臍下三寸關元之分挾臍直上循腹各行會於咽喉故病當其分則少腹盛上下左右皆有根也以其上下堅盛如有潛梁故曰病名伏梁不可治也以裹大膿血居腸胃之外按之痛悶不堪故每切接之致死也以衝脈下行者絡陰上行者循腹故也上則迫近於胃脘下則因薄於陰器若因薄於陰則便下膿血若迫近於胃則病氣上出於膈復挾胃脘內長其痛也以本有大膿血在腸胃之外故也生當為出傳文誤也按切切痛也注切按連續誤矣又注生作出太素挾胃作使胃義並通此久病也難治居臍上為逆居臍下為從勿動亟奪若裹大膿血居臍上則漸傷心臟故為逆居臍下則去心稍遠猶得漸攻故為從從順也亟數也奪去也言不可移動但數數去之則可矣帝曰夫子數言熱中消中不可服高梁芳草石藥石藥發癲芳草發狂多飲數溲謂之熱中多食數溲謂之消中多喜曰癲多怒曰狂芳美味也夫熱中消中者皆富貴人也今禁高梁是不合其心禁芳草石藥是病不愈願聞其說熱中消中者脾氣之上溢甘肥之所致故禁食高梁芳美之草也富貴人者驕恣縱欲輕人而無能禁之禁之則逆其志順之則加其病帝思難詰故發問之高膏粱米也石藥英乳也芳草濃美也然此五者富貴人常服之難禁也岐伯曰夫芳草之氣美石藥之氣悍二者其氣急疾堅勁故非緩心和人不可以服此二者脾氣溢而生病氣美則重盛於脾氣悍則又滋其熱若人性和心緩氣候舒勻不與物爭釋然寬泰則神不躁迫無懼內傷也按富貴者觀此其亦可以知所守矣帝曰不可以服此二者何以然岐伯曰夫熱氣慓悍藥氣亦然二者相遇恐內傷脾脾者土也而惡木服此藥者至甲乙日更論熱氣慓盛則木氣內余故心非和緩則躁怒數起躁怒數起則熱氣因木以傷脾甲乙為木故至甲乙日更論脾病之增減也帝曰有病膺腫按甲乙經作癰腫非也頸痛胸滿腹脹此為何病何以得之膺胸旁也頸項前也胸膺間也岐伯曰名厥逆氣逆所生故名厥逆帝曰治之奈何岐伯曰灸之則喑石之則狂須其氣並乃可治也石謂以石針開破之帝曰何以然岐伯曰陽氣重上有餘於上灸之則陽氣入陰入則喑石之則陽氣虛虛則狂灸之則火氣助陽陽盛故入陰石之則陽氣出陽氣出則內不足故狂須其氣並而治之可使全也按並注謂併合是也至其所以併合可治之解惜未明快蓋言氣逆之證上衝胸膺散漫腹脅攻之急則氣不歸經而逆愈甚故須因勢利導使氣合而並於一然後中滿者補其母陽浮者滋其陰火盛氣壅者消散而清利則上衝者必降而順下散漫者自斂而歸於原也帝曰善何以知懷子之且生也岐伯曰身有病而無邪脈也病謂經閉也脈法曰尺中之脈來而繼絕者經閉也月水不利若尺中脈絕者經閉也今病經閉脈反如常者婦人妊娠之證故云身有病而無邪脈也按帝問懷子之且生是有二意而伯答有病無邪是止解懷子而且生義竟無所解必有脫簡且生謂將產也帝曰病熱而有所痛者何也岐伯曰病熱者陽脈也以三陽之動也人迎一盛少陽二盛太陽三盛陽明入陰也夫陽入於陰故病在頭與腹乃䐜脹而頭痛也帝曰善按熱者火之氣也火盛則熱病屬三陽三陽盛極氣及於陰皆火之為患也
