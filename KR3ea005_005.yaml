body:
  text: 卷之五六微旨大論天有六氣人有三陰三陽上下相應變化於是乎生疾病於是乎起其旨甚微故曰六微旨大論也黃帝問曰嗚呼遠哉天之道也如迎浮雲若視深淵視深淵尚可測迎浮雲莫知其極按喻六氣之本於天而未易測識也夫子數言謹奉天道余聞而藏之心私異之不知其所謂也願夫子溢志盡言其事令終不滅久而不絶天之道可得聞乎岐伯稽首再拜對曰明乎哉問天之道也此因天之序盛衰之時也帝曰願聞天道六六之節盛衰何也按六六之節者言天有六氣而人之三陰三陽與之相應故云六六也與六節臟象論所言六六之節乃指一歲六六三百六十日者不同岐伯曰上下有位左右有紀張景嶽曰此言六位之序以明客氣之盛衰也故少陽之右陽明治之陽明之右太陽治之太陽之右厥陰治之厥陰之右少陰治之少陰之右太陰治之太陰之右少陽治之此所謂氣之標蓋南面而待之也此即所謂六六之節也三陰三陽以六氣為本六氣以三陰三陽為標然此右字皆自南面而觀以待之所以少陽之右為陽明也故曰因天之序盛衰之時移光定位正立而待之此之謂也光日光也位位次也凡此六氣之次即因天之序也天既有序則氣之王者為盛氣之退者為衰然此盛衰之時由於日光之移日光移而後位次定聖人之察之者但南面正立而待之則其時更氣易皆於日光見之矣故生氣通天論曰天運當以日光明正此移光定位之義謹按以上言三陰三陽之序為氣之標所謂左右有紀也以下言人之陰陽必待天之六氣以為治為標原於本所謂上下有位也六六之節義具於此少陽之上火氣治之中見厥陰按少陽者手經之三焦人身之相火也然人身之有相火非即始之於人也蓋由天有火氣治之於上矣火氣治於上少陽三焦應於下三焦者相火之表也有表必有里厥陰心包中見焉中見者表裡之間之謂也陽明之上燥氣治之中見太陰按陽明者手大腸之經人腑之金也人身之金必稟天之燥氣以為治燥氣治於上陽明大腸應於下大腸者金之表也有表必有里手太陰肺金中見焉太陽之上寒氣治之中見少陰太陽者足膀胱之經人腑之水也人身之水必資天之寒氣以為治寒氣治於上太陽膀胱應於下膀胱者水之表也有表必有里足少陰腎水中見焉厥陰之上風氣治之中見少陽厥陰者足肝臟之經人臟之木也人身之木必資天之風氣以為治風氣治於上厥陰肝木應於下肝者風木之裡也有里必有表足少陽膽木中見焉少陰之上熱氣治之中見太陽少陰者手心臟之經人臟之火也人身之火必資天之熱氣以為治熱氣治於上少陰心火應於下心者火之裡也有里必有表手太陽小腸中見焉太陰之上濕氣治之中見陽明太陰者足脾臟之經人臟之土也人身之土必資天之濕氣以為治濕氣治於上太陰脾土應於下脾者土之裡也有里必有表足陽明胃土中見焉所謂本也本之下中之見也見之下氣之標也按三陰三陽上稟於六氣是六氣者所謂本也本立於上而陰陽與之相應者見於一表一里之中惟所見者為陰陽之表裡乃人之臟腑所謂六氣之標也謹按三陰三陽各有表裡相配之目如手少陽三焦配手厥陰心包手陽明大腸配手太陰肺足太陽膀胱配足少陰腎足厥陰肝配足少陽膽手少陰心配手太陽小腸足太陰脾配足陽明胃及其上應六氣之名或稱表不稱里或稱里不稱表如相火止云少陽三焦不言厥陰心包燥金止雲陽明大腸不言太陰肺寒水止云太陽膀胱不言少陰腎風木止云厥陰肝不言少陽膽君火止云少陰心不言太陽小腸濕土止云太陰脾不言陽明胃者何也人身之臟腑天地之陰陽也陰陽不可以偏廢則臟腑不可以偏稱其稱表不稱里者陽為陰之衛言表而里在其中是故相火之少陽上應熱氣而中見厥陰燥金之陽明上應燥氣而中見太陰寒水之膀胱上應寒氣而中見少陰也其稱里不稱表者陰為陽之基言里而表亦在其中是故風木之厥陰上應風氣而中見少陽君火之少陰上應火氣而中見太陽濕土之太陰上應濕氣而中見陽明也陰陽本互根臟腑相輸應而總受六氣之氣以為氣所謂標原於本也奈何景嶽將中字實看謂為互根之中氣如雲與厥陰為表裡故中見厥陰是以相火而兼風木之化等語據云與厥陰為表裡是已知厥陰為配三焦之手厥陰矣而又云兼風木之化是更以為足厥陰矣且相火從無兼風木之化之説以下五段謬誤皆然景嶽之意蓋惑於相火寄於肝膽之語故一誤而無所不誤也本標不同氣應異象本標不同者六氣為三陰三陽之本如風木王於春乃春或宜溫而反寒是本有不同也三陰三陽為六氣之標如春宜木王而人之肝膽反虛是標有不同也如木值之年氣宜木王而木反見虛肝盛之時盛宜凌弱而反自病是本標不同也凡若此者氣既乖反則時序變於上人病變於下宜熱反寒脈從證逆所應之象自爾乖異也帝曰其有至而至有至而不至有至而太過何也按此專問六氣之正變以驗氣之盛衰也岐伯曰至而至者和至而不至來氣不及也未至而至來氣有餘也按時至氣亦至和平之應也若時已至而氣尚未至為氣不及若時未至而氣先至為氣有餘氣者六氣也帝曰至而不至未至而至何如岐伯曰應則順否則逆逆則變生變生則病當期為應愆期為否天地之氣生化不息無止礙也不應有而有應有而不有是造化之氣失常失常則氣變變常則血氣紛擾而為病矣天地變而失常則萬物皆病帝曰善請言其應岐伯曰物生其應也氣脈其應也物之生榮有常時脈之至有常期有餘歲早不及歲晚皆依期而至也按物得氣之先脈隨氣而動故欲驗六氣之盛衰但觀物生之早晚更察脈至之衰王而天地之氣可知矣帝曰善願聞地理之應六節氣位何如按張景嶽曰此下言地理之應六節即主氣之靜而守位者也故曰六位亦曰六步乃六氣所主之位也岐伯曰顯明之右君火之位也按張景嶽曰顯明者日出之所卯正之中天地平分之處也顯明之右謂自鬥建卯中以至巳中步居東南為天之右間主二之氣乃春分後六十日有奇君火治令之位也若客氣以相火加於此是謂以下臨上臣位君則逆矣君火之右退行一步相火治之退行一步謂退於君火之右一步也此自鬥建巳中以至未中步居正南位直司天主三之氣乃小滿後六十日有奇相火之治令也復行一步土氣治之復行一步謂復於相火之右又行一步也此自未中以至酉中步居西南為天之左間主四之氣乃大暑後六十日有奇濕土治令之位也復行一步金氣治之此於土氣之右又行一步自酉中以至亥中步居西北為地之右間主五之氣乃秋分後六十日有奇燥金治令之位也復行一步水氣治之此於金氣之右又行一步自亥中以至醜中步居正北位當在泉主終之氣乃小雪後六十日有奇寒水之治令也復行一步木氣治之此於水氣之右又行一步自醜中以至卯中步居東北為地之左間主初之氣乃立春後六十日有奇風木治令之位也復行一步君火治之此自木氣之末復行於顯明之右君火之位是為主氣六步之一周謹按此言六氣所主之位止就一歲而言乃一定之氣氣之常也若六十年中司天在泉每年各有六步初氣始於地之左間以次其不同氣之變也相火之下水氣承之水位之下土氣承之土位之下風氣承之風位之下金氣承之金位之下火氣承之君火之下陰精承之按張景嶽曰此言六位之下各有所承承者前之退而後之進也承之為義有二一曰常一曰變常者如六氣各專一令一極則一生循環相承無有間斷故於六位盛極之下各有相制之氣隨之以生由生以化由微而著更相承襲時序乃成所謂陽盛之極則陰生承之陰盛之極則陽生承之亦猶陰陽家五行胎生之義此歲氣不易之令故謂之常常者四時之序也變者如六元正紀大論所謂少陽所至為火生終為蒸溽水承相火之象也水發而雹雪土氣承水之象也土發而飄驟風木承土之象也木發而毀折金氣承木之象也金髮而清明火氣承金之象也火發而曛昧陰精承火之象也此則因亢而制因勝而復承製不常故謂之變變者非時之邪也然曰常曰變雖若相殊總之防其太過而成乎造化之用理則一耳帝曰何也岐伯曰亢則害承乃制按景嶽曰亢者盛之極也制者因其極而抑之也蓋陰陽五行之道亢極則乖而強弱相殘矣故凡有偏盛則必有偏衰使強無所制則強者愈強弱者愈弱而乖亂日甚所以亢而過甚則害乎所勝而承其下者必從而制之此天地自然之妙真有不期然而然者天下無常伸之理亦無常屈之理易之乾象曰亢之為言也知進而不知退知存而不知亡知得而不知喪復之彖曰復其見天地之心乎即此亢承之義制生則化外列盛衰制生則化當作制則生化傳寫誤也夫盛極有制則無亢害無亢害則生化出乎自然當盛者盛當衰者衰循序當位是為外列盛衰外列者言發育之多也害則敗亂生化大病亢而無制則為害矣害則敗亂失常不生化正氣而為邪氣故為大病也王安道曰豫讀內經至亢則害承乃制喟然嘆曰至矣哉其造化之樞紐乎王太僕發之於前劉河間闡之於後聖人之蘊殆靡遺矣然學者尚不能釋然得不猶有未悉之旨歟請推而陳之夫自顯明之右至君火治之十五句言六節所治之位也自相火之下至陰精承之十二句言地理之應歲氣也亢則害二句言抑其過也制則生化四句言有制之常與無制之變也承猶隨也然不言隨而言承者以下言之則有上奉之象故曰承雖謂之承而有防之之義存焉亢者過極也害者害物也制者克勝之也然所承者其不亢則隨之而已故雖承而不見既亢則克勝以平之承斯見矣然而迎之不知其所來迹之不知其所止固若有不可必者然可必者常存乎杳冥恍惚之中而莫之或欺也河間曰己亢過極則反似勝己之化似也者其可以形質求哉故後篇云厥陰所至為風生終為肅少陰所至為熱生終為寒之類其為風生為熱生者亢也其為肅為寒者制也又水發而雹雪土發而飄驟之類其水發土發者亢也其雹雪飄驟者制也若然者蓋造化之常不能以無亢亦不能以無制焉耳又虞天民曰制者制其氣之太過也害者害承者之元氣也所謂元氣者總而言之謂之一元如天一生水水生木木生火火生土土生金金生水循環無端生生不息也分而言之謂之六元如水為木之化元木為火之化元火為土之化元土為金之化元金為水之化元亦運化而無窮也假如火不亢則所承之水隨之而已一有亢極則其水起以平之蓋恐害吾金元之氣子來救母之意也六氣皆然此五行勝復之理不期然而然者矣由此觀之則天地萬物固無往而非五行而亢害承製又安往而不然哉故求之於人則五臟更相平也五志更相勝也五氣更相移也五病更相變也故火極則寒生寒極則濕生濕極則風生風極則燥生燥極則熱生皆其化也第承製之在天地者出乎氣化之自然而在人為亦有之則在挽回運用之得失耳使能知其微得其道則把握在我何害之有設承製之盛衰不明似是之真假不辨則敗亂可立而待也惟知者乃能慎之二家之論亢害承製之義無餘蘊矣帝曰盛衰何如按此因前言外列盛衰故帝又辨悉其義也岐伯曰非其位則邪當其位則正邪則變甚正則微按甚者病之重微者病之輕非位當位義如下文帝曰何謂當位岐伯曰木運臨卯按以木運臨卯位丁卯歲也火運臨午按以火運臨午位戊午歲也土運臨四季按土運臨四季甲辰甲戌己丑己未歲也金運臨酉按金運臨酉乙酉歲也水運臨子按水運臨子丙子歲也所謂歲會氣之平也按此歲會與年支同氣故曰歲會其氣平也共八年帝曰非其位何如岐伯曰歲不與會也按歲運不與地支相會乃二十四歲之外指三十六年而言也帝曰土運之歲上見太陰按上謂司天土運上見太陰己丑己未歲也火運之歲上見少陽少陰按火運上見少陽戊寅戊申歲也上見少陰戊子戊午歲也金運之歲上見陽明按金運上見陽明乙卯乙酉歲也木運之歲上見厥陰按木運上見厥陰丁巳丁亥歲也水運之歲上見太陽奈何按水運上見太陽丙辰丙戌歲也奈何謂此十二年是歲運與司天同氣者其名與義為何如也岐伯曰天之與會也按天與運會也天符歲會何如岐伯曰太一天符之會也按既為天符又為歲會是名太一天符之會如上之己丑己未戊午乙酉四歲是也太一者至尊無二之稱也帝曰其貴賤何如岐伯曰天符為執法歲位為行令太一天符為貴人按張景嶽曰執法者位於上猶執政也行令者位乎下猶主司也貴人者統乎上下猶君主也帝曰邪之中也奈何岐伯曰中執法者其病速而危中執法者犯司天之氣也天者生之本故其病速而危中行令者其病徐而持中行令者犯地支之氣也害稍次之故其病徐而持持者邪正相持而吉凶相半也中貴人者其病暴而死中貴人者天地之氣皆犯矣故暴而死按此三者地以天為主故中天符者甚於歲會而太一天符者乃三氣合一其盛可知故不犯則已犯則無能解也帝曰位之易也何如岐伯曰君位臣則順臣位君則逆逆則其病近其害速順則其病遠其害微所謂二火也按君者君火也臣者相火也君火者心火也相火者三焦也三焦配合心包佐心君以行令故心為君火而三焦為相火然君火者陽火也居膈上而位高如降而下行火氣運動是為君處臣位其勢順而病亦輕相火者陰火也居丹田而位在下如脫根上升火氣浮越是為臣僣君位其勢逆而病必重此二火有一定之位如變易則病有輕重之殊也帝曰善願聞其步何如岐伯曰所謂步者六十度而有奇按張景嶽曰一日一度度即日也周歲共三百六十五日二十五刻以六步分之則每步得六十日又八十七刻半故曰有奇也故二十四步積盈百刻而成日也按景嶽曰二十四步合四歲之步也積者積二十四個八十七刻半共得二千一百刻是謂二十一日以四歲全數合之正得一千四百六十一日此共以二十四步之餘積盈百刻合成四歲之全日而三合會同之氣數於斯見矣詳如下文帝曰六氣應五行之變何如岐伯曰位有終始氣有初中上下不同求之亦異也按張景嶽曰此復求上文天道六六之節地理之應六節氣位及天元紀大論所謂上下相召五六相合之至數也位地位也氣天氣也位有上下左右之終始氣有前後升降之初中以天之氣而加於地之位則上下相錯互有差移故曰上下不同求之亦異也初中義詳見後章帝曰求之奈何岐伯曰天氣始於甲地氣始於子子甲相合命曰歲立謹候其時氣可與期天氣有十干而始於甲地氣有十二支而始於子子甲相合即甲子也干支合而六十年之歲氣立歲氣立則有時可候有氣可期矣帝曰願聞其歲六氣始終早晏何如岐伯曰明乎哉問也甲子之歲初之氣天數始於水下一刻終於八十七刻半甲子歲六十年之首也初之氣六氣之首地之左間也始於水下一刻漏水百刻之首寅初刻也終於八十七刻半謂每步之數各得六十日又八十七刻半也故甲子歲初之氣始於首日寅時初初刻終於六十日後子時初四刻至子之正初刻則屬春分節而交於二之氣矣凡後之申子辰年皆同二之氣始於八十七刻六分終於七十五刻此繼初氣而始於八十七刻六分直子之正初刻也又加二氣之六十日餘八十七刻半則此當終於七十五刻直戌之正四刻也後義仿此三之氣始於七十六刻終於六十二刻半始於七十六刻亥初初刻也終於六十二刻半酉初四刻也四之氣始於六十二刻六分終於五十刻始於六十二刻六分酉正初刻也終於五十刻未正四刻也五之氣始於五十一刻終於三十七刻半始於五十一刻申初初刻也終於三十七刻半午初四刻也六之氣始於三十七刻六分終於二十五刻始於三十七刻六分午正初刻也終於二十五刻辰正四刻也此二十五刻者即歲余法四分日之一也所謂初六天之數也初六者子年為首之六氣也此以天之氣數而加於地之步位故曰天之數也後仿此乙丑歲初之氣天數始於二十六刻終於一十二刻半始於二十六刻巳初初刻也終於一十二刻半卯初四刻也凡後之巳酉丑年皆同二之氣始於一十二刻六分終於水下百刻始於一十二刻六分卯正初刻也終於水下百刻醜正四刻也三之氣始於一刻終於八十七刻半始於一刻寅初初刻也終於八十七刻半子初四刻也四之氣始於八十七刻六分終於七十五刻始於八十七刻六分子正初刻也終於七十五刻戌正四刻也五之氣始於七十六刻終於六十二刻半始於七十六刻亥初初刻也終於六十二刻半酉初四刻也六之氣始於六十二刻六分終於五十刻始於酉正初刻終於未正四刻此五十刻者四分日之二也所謂六二天之數也醜次於子故曰六二丙寅歲初之氣天數始於五十一刻終於三十七刻半始於申初初刻終於午初四刻凡後寅午戌年皆同二之氣始於三十七刻六分終於二十五刻始於午正初刻終於辰正四刻三之氣始於二十六刻終於一十二刻半始於巳初初刻終於卯初四刻四之氣始於一十二刻六分終於水下百刻始於卯正初刻終於醜正四刻五之氣始於一刻終於八十七刻半始於寅初初刻終於子初四刻六之氣始於八十七刻六分終於七十五刻始於子正初刻終於戌正四刻此七十五刻者四分日之三也所謂六三天之數也寅次於醜故曰六三丁卯歲初之氣天數始於七十六刻終於六十二刻半始於亥初初刻終於酉初四刻凡後之亥卯未年皆同二之氣始於六十二刻六分終於五十刻始於酉正初刻終於未正四刻三之氣始於五十一刻終於三十七刻半始於申初初刻終於午初四刻四之氣始於三十七刻六分終於二十五刻始於午正初刻終於辰正四刻五之氣始於二十六刻終於一十二刻半始於巳初初刻終於卯初四刻六之氣始於一十二刻六分終於水下百刻始於卯正初刻終於醜正四刻此水下百刻者即上文所謂二十四步積盈百刻而成日也所謂六四天之數也卯次於寅故曰六四此一紀之全數也次戊辰歲初之氣復始於一刻常如是無已周而復始以上丁卯年六之氣終於水下百刻是子醜寅卯四年氣數至此已盡所謂一紀故戊辰年則氣復始於一刻而辰巳午未四年又為一紀申酉戌亥四年又為一紀此所以常如是無已周而復始也帝曰願問其歲候何如岐伯曰悉乎哉問也日行一周天氣始於一刻按張景嶽曰歲候者通歲之大候此承上文而復總其氣數之始也一周者一周於天謂甲子一年為歲之首也日行再周天氣始於二十六刻乙丑歲也日行三周天氣始於五十一刻丙寅歲也日行四周天氣始於七十六刻丁卯歲也日行五周天氣復始於一刻戊辰歲也所謂一紀也如前四年是也一紀盡而復始於一刻矣紀者如天元紀大論所謂終地紀者即此紀字之義是故寅午戌歲氣會同卯未亥歲氣會同辰申子歲氣會同巳酉醜歲氣會同終而復始陰陽法以是為三合者緣其氣會同也不爾則各在一方義無由合帝曰願聞其用也岐伯曰言天者求之本言地者求之位言人者求之氣交本謂天六氣寒暑燥濕風火也三陰三陽由是生化故云本所謂六元者也位謂金木火土水君火也天地之氣上下相交人之所處者也按張景嶽曰言天者求之本謂求六氣之盛衰而上可知也言地者求之位謂求六步之終始而下可知也人在天地之中故求之氣交而安危可知也帝曰何謂氣交岐伯曰上下之位氣交之中人之居也自天之下地之上則二氣交合之分也人居地上是以生化變易皆在氣交之中也故曰天樞之上天氣主之天樞之下地氣主之氣交之分人氣從之萬物由之此之謂也按張景嶽曰樞樞機也居陰陽升降之中是謂天樞故天樞之義當以中字為解中之上天氣主之中之下地氣主之氣交之分即中之位也而形氣之相感上下之相臨皆中宮應之而為之市故人氣從之萬物由之變化於茲乎見矣謹按王注以天樞為當齊兩旁穴謂正當身之半三分折之上分應天下分應地中分應氣交理誠是也然以人氣從之二句觀之則樞之為義似不單指穴言夫樞者戶牖之所恃以開閣者也人居天地之中樞為上下之界蓋一身之綱維三才之關鍵故推崇之曰天樞也張景嶽又言天樞更不單指人身兼取卦象為喻且引至真要大論云初氣終三氣天氣主之四氣盡終氣地氣主之此即上下卦之義然則三氣四氣則一歲之氣交也自四月中至八月中計四個月一百二十日之間而歲之旱潦豐儉物之生長成收皆系乎此故曰氣交之分人氣從之萬物由之也景嶽之論則更合氣運而為言頗與人氣從之二句甚親切也帝曰何謂初中岐伯曰初凡三十度而有奇中氣同法按張景嶽曰度即日也一步之數凡六十日八十七刻半而兩分之則前半部始於初是為初氣凡三十度而有奇奇謂四十三刻又四分刻之三也後半步始於中是為中氣其數如初故曰同法也帝曰初中何也岐伯曰所以分天地也帝曰願卒聞之岐伯曰初者地氣也中者天氣也按景嶽曰初中者所以分陰陽也凡一氣之度必有前後有前後則前陽而後陰陽主進自下而上故初者地氣也陰主退自上而下故中者天氣也又按初中者初言其始氣自始而漸盛也中言其盛氣自盛而漸衰也但本篇所謂初中者以一步之氣為言故曰初凡三十度而有奇中氣同法蓋陰陽之氣無往不在故初中之氣亦無往不然即以一歲言之則冬至氣始於北夏至氣中於南北者盛之始南者衰之始此歲氣之初中也以晝夜言之夜則陽生於坎晝則日中於離坎則升之始離則降之始此日度之初中也不惟是也即一月一節一時一刻靡不皆然所以日有朔而有望氣有節而有中時有子而有午刻有初而有正皆所以分初中也景嶽此解尤為精確帝曰其升降何如岐伯曰氣之升降天地之更用也按景嶽曰天無地之升則不能降地無天之降則不能升故天地更相為用帝曰願聞其用何如岐伯曰升已而降降者謂天降已而升升者謂地按此正辨更用之旨也天地之氣本相交互降者天也然必有升而後有所降故升已而降降以升為用也升者地也然必有降而後有所升故降已而升升以降為用也天氣下降氣流於地地氣上升氣騰於天故高下相召升降相因而變作矣按天降地升更相為用病變因之而作矣帝曰善寒濕相遘燥熱相臨風火相值其有間乎岐伯曰氣有勝復勝復之作有德有化有用有變變則邪氣居之按景嶽曰六氣皆有勝復而勝復之作正則為循環當位之勝復故有德有化有用邪則為亢害承製之勝復故有災有變帝曰何謂邪乎岐伯曰夫物之生從於化物之極由乎變變化之相薄成敗之所由也按景嶽曰物之生從於化由化而生也物之極由乎變由極而變也生由化而成其氣進敗由變而致其氣退故曰變化之相薄成敗之所由也薄侵迫也按天元紀大論物生謂之化物極謂之變是解變化之義此言從於化由乎變是推原所以生極之故也文雖同而義實異王注及諸傢俱作一例解亦未之思也故氣有往復用有遲速四者之有而化而變風之來也按往者時之退復者令之新遲者應至而不至速者不應至而至也四序推移固有一定之常數應至而至風之正也乃氣有非常則或未至而至或至而不至變變化化風邪於是乎來也惟有遲速而變化生焉下文方推原到盛衰景嶽即以遲速為盛衰誤矣帝曰遲速往復風所由生而化而變故因盛衰之變耳成敗倚伏遊乎中何也按帝言風邪之起固由於氣之往來遲速然其所以遲速之故衰則遲而盛則速耳其間或成或敗或先成而敗即倚焉或敗矣而成即伏焉咸不外乎往復遲速者何故岐伯曰成敗倚伏生乎動動而不已則變作矣按景嶽曰動靜者陰陽之用也所謂動者即形氣相感也即上下相召也即往復遲速也即升降出入也由是而成敗倚伏無非由動而生也但動而正則吉不正則凶動而不已則災變由之而作矣成敗之相倚伏也實變化之自然動乎其不得不動動靜之常也若動而不已是有動無靜氣反其常災變必因之而作天地且然人其可多動乎帝曰有期乎岐伯曰不生不化靜之期也按景嶽曰陽動陰靜相為對待一消一息各有其期上文言成敗倚伏生乎動即動之期也動極必變而至於不生不化即靜之期也然則天地以春夏為動以秋冬為靜人以生為動死為靜也帝曰不生化乎帝疑天地之道豈真有不生不化者乎岐伯曰出入廢則神機化滅升降息則氣立孤危按景嶽曰凡物之動者血氣之屬也其生氣根於身之中以神為生氣之主故曰神機然神之存亡由於飲食呼吸之出入出入廢則神機化滅而動者息矣物之植者草木金石之屬也其生氣根於形之外以氣為榮枯之主故曰氣立然氣之盛衰由於陰陽之升降升降息則氣立孤危而植者敗矣按五常政大論曰根於中者命曰神機神去則機息根於外者命曰氣立氣止則化絶是則神機氣立者萬物之所恃以生化而天地之道所必不可無者也無生化則無萬物無萬物且不成其為天地故下文云云也故非出入則無以生長壯老已非升降則無以生長化收藏按景嶽曰生長壯老已動物之始終也故必賴呼吸之出入生長化收藏植物之盛衰也故必賴陰陽之升降是以升降出入無器不有故無不出入無不升降包藏生氣者皆謂生化之器觸物然矣夫竅橫者皆有出入去來之氣竅豎者皆有陰陽升降之氣往復於中何以明之則壁窗戶牖兩面伺之皆承來氣衝擊於人是則出入氣也夫陽升則井寒陰升則水暖以物投井及葉墜空中翩翩不疾皆升氣所礙也虛管溉滿捻上懸之水固不泄為無升氣而不能降也空瓶小口頓溉不入為氣不出而不能入也由是觀之升無所不降降無所不升無出則不入無入則不出夫群品之中皆出入升降不失常守而云非化者未之有也有識無識有情無情去出入已升降而得存者亦未之有也故曰出入升降無器不有按啓玄妙喻得未曾有但無不出入二句王本在下節器者生化之宇之下詳味文義必錯簡也今移置於此故器者生化之宇器散則分之生化息矣按易曰形而下者謂之器形而上者謂之道器以載道所以藏神而葆氣者也生生化化皆從此出故曰生化之宇宇者天地四方之名也如或不能保守形器則必致於解散而升者自升降者自降出者自出入者自入各相分而生化息矣此寶命全形之論所由作也化有小大期有近遠按張景嶽曰物之小者如秋毫之微大者如天地之廣此化之小大也夭者如蜉蝣之朝暮壽者如彭聃之百千此期之近遠也化之小者其期近化之大者其期遠萬物之氣數固有不齊及其同歸於化與期則一也四者之有而貴常守反常則災害至矣四者謂出入升降也按人有此生則必有此四者有升有降有出有入是其常也謹而守之則生化無窮如有升無降有降無升有入無出有出無入則反其常道而災害未有不至者也故曰無形無患此之謂也夫喜於遂悅於色畏於難懼於禍外惡風寒暑濕內繁飢飽愛欲皆以形無所隱故常嬰患纍於人間也若便想慕滋蔓嗜欲無厭外附權門內丰情偽則動以牢網坐招燔焫欲思釋縛其可得乎是以身為患階爾老子曰吾所以有大患者為吾有身及吾無身吾有何患此之謂也帝曰善有不生不化乎岐伯曰悉乎哉問也與道合同惟真人也帝曰善言人有逃陰陽免生化而不生不化無始無終同太虛自然者乎真人之身隱見莫測出入天地內外順道至真以生其為小也入於無間其為大也過虛空界不與道如一其孰能爾乎按昔人云愛生者可殺也愛潔者可汙也愛榮者可辱也愛完者可破也本無生孰殺之本無潔孰汙之本無榮孰辱之本無完孰破之知乎此者可以出入造化遊戲生死矣真見道語至真要大論通篇約分二十八段第一段言司天在泉間氣之化第二段言地化本於天氣第三段言司歲藥物不同第四段言淫邪傷臟在所不勝第五段言少陰所在寸口不應分南北政第六段言在泉司天為病治法第七段言客淫反勝六氣相勝治法第八段言六氣之復為病並治法第九段言人身之應司天在泉第十段言勝復之理並治法十一段言主客勝復並治法十二段言五臟正味主客補瀉十三段言三陰三陽十四段言方制奇偶十五段言治標之方十六段言六氣為邪生病十七段言脈至病應十八段言六氣標本十九段言脈從病反治法逆從二十段言勝復早晏而並及於脈二十一段言陰陽分至二十二段言六經藥治先後二十三段言病機十九條二十四段言五味方制正治反治為醫家要旨二十五段言內外標本二十六段言誤治以致反寒反熱二十七段言藥品善惡末後重問內外治法全經之旨略盡篇中誠至真至要之論所當深思而熟玩者也黃帝問曰五氣交合盈虛更作余知之矣六氣分治司天地者其至何如五行主歲歲有多少故曰盈虛更作也岐伯對曰此道之所主工之所疑也帝曰願聞其道也岐伯曰厥陰司天其化以風少陰司天其化以熱太陰司天其化以濕少陽司天其化以火陽明司天其化以燥太陽司天其化以寒以所臨臟位命其病者也按此言司天之化化謂德化如前篇六元正紀所言正邪等化是也六氣司天各布其化人臟應之相得則和不相得則病而名於是乎分也帝曰地化奈何岐伯曰司天同候間氣皆然六氣之本自有常性故雖位易而化治皆同按張景嶽曰地化在泉之化也間氣義如下文六步之位雖有上下左右之分而氣化皆相類故與上文司天之化同其候帝曰間氣何謂岐伯曰司左右者是謂間氣也按六氣分主六步上謂司天下謂在泉餘四者謂之間氣在上左右者為司天左右間在下左右者為在泉左右間也帝曰何以異之按言司天在泉與左右間氣有何分別岐伯曰主歲者紀歲間氣者紀步也按張景嶽曰主歲者紀歲司天主歲半之前在泉主歲半之後也間氣者紀步歲有六步每步各主六十日八十七刻半也帝曰善歲主奈何按此合言上下左右氣化之有不同也岐伯曰厥陰司天為風化按景嶽曰木氣在天為風化而飄怒搖動雲物飛揚如巳亥歲厥陰司天是也在泉為酸化木氣在地則味為酸化如寅申歲厥陰在泉是也司氣為蒼化司氣言五運之氣也木運司氣故色化青蒼丁壬年是也間氣為動化厥陰所臨之位風化行則群物鼓動故曰動化如丑未年則為地之左間主初之氣子午年則為天之右間主二之氣辰戌年則為天之左間主四之氣卯酉年則為地之右間主五之氣也少陰司天為熱化按張景嶽曰君火在天為熱化而為陽光明耀溫養萬物如子午歲少陰司天是也在泉為苦化火氣在地則味為苦化如卯酉歲少陰在泉是也不司氣化君不司運也夫五運六氣之有異者運出天干故運惟五氣出地支故氣有六五者五行各一也六者火分君相也故在六氣則有君火相火所主之不同而五運則火居其一耳於六者而缺其一則惟君火獨不司五運之氣化正以君火者太陽之火也為陽氣之本為萬化之原無氣不司故不司氣化也按新校正及諸家之注此者皆曰君火以名相火以位正以明君火不主運也其説殊謬夫天元紀大論原曰君火以明非曰以名也奈何將明字改作名字牽強為解大失經旨蓋惟必欲引以注此故不得不改明為名耳居氣為灼化居所在也灼光明也不曰間氣而曰居氣者君之所居無往不尊故不敢言間也如寅申歲居在泉之左主初之氣丑未歲居司天之右主二之氣巳亥歲居司天之左主四之氣辰戌歲居在泉之右主五之氣也太陰司天為濕化按景嶽曰土氣在天為濕化而為埃郁曚昧雲雨潤濕如丑未歲太陰司天是也在泉為甘化土氣在地則味為甘化如辰戌歲太陰在泉是也司氣為黅化土運司氣則色化黅黃甲己年是也間氣為柔化太陰所臨之位濕化行則庶物柔耎也如卯酉年則為地之左間主初之氣寅申歲則為天之右間主二之氣子午歲則為天之左間主四之氣巳亥歲則為地之右間主五之氣也少陽司天為火化按景嶽曰相火在天為火化而為炎光赫烈燔灼焦然如寅申歲少陽司天是也在泉為苦化火氣在地則味為苦化如巳亥歲少陽在泉是也司氣為丹化火運司氣則色化丹赤戊癸年是也間氣為明化少陽所臨之位火化行則庶物明燦也如辰戌歲則為地之左間主初之氣卯酉歲則為天之右間主二之氣丑未歲則為天之左間主四之氣子午歲則為地之右間主五之氣也陽明司天為燥化按景嶽曰金氣在天為燥化而為清涼徑切霧露蕭飋如卯酉年陽明司天是也在泉為辛化金氣在地則味為辛化如子午歲陽明在泉是也司氣為素化金運司氣則色化素白乙庚年是也間氣為清化陽明所臨之位燥化行則清涼至也如巳亥歲則為地之左間主初之氣辰戌歲則為天之右間主二之氣寅申歲則為天之左間主四之氣丑未歲則為地之右間主五之氣也太陽司天為寒化按景嶽曰水氣在天為寒化而為嚴肅栗冽陰慘堅凝如辰戌歲太陽司天是也在泉為咸化水氣在地則味為咸化如丑未歲太陽在泉是也司氣為玄化水運司氣則色化玄黑丙辛年是也間氣為藏化太陽所臨之位寒化行則萬物閉藏也如子午歲則為地之左間主初之氣巳亥歲則為天之右間主二之氣卯酉歲則為天之左間主四之氣寅申歲則為地之右間主五之氣也故治病者必明六化分治五味五色所生五臟所宜乃可以言盈虛病生之緒也按景嶽曰凡治病者必求其本六化是也必察其形五色是也必分其主治五味是也必辨其宜否五臟是也明此數者而後知孰為氣之盛孰為氣之衰乃可以言盈虛病生之端緒而治之無失矣帝曰厥陰在泉而酸化先余知之矣風化之行也何如按景嶽曰此問厥陰在泉既為酸化而上文之言地化者曰司天同候則厥陰在泉亦曰風化然則酸之與風其辨為何如也岐伯曰風行於地所謂本也餘氣同法有風化而後有酸化是風為酸化之本其他餘氣皆同此義故有熱化火化而後有苦有濕化而後有甘有燥化而後有辛有寒化而後有咸凡六氣之行乎地者即化生五味之本也天元紀大論曰所謂本也是謂六元與此本字義同本乎天者天之氣也本乎地者地之氣也按氣六氣也天地合氣六節分而萬物化生矣天氣下降地氣上升會於氣交是謂合氣由是六節之氣分而萬物化生無窮矣故曰謹候氣宜無失病機此之謂也按氣本於天地而各有其宜病應於人身而自有其機帝曰其主病何如此問藥物之主病者岐伯曰司歲備物則無遺主矣天地之氣每歲各有所司因司氣以備藥物則主病者無遺矣如厥陰司歲則備酸物少陰少陽司歲則備苦物太陰司歲則備甘物陽明司歲則備辛物太陽司歲則備咸物所謂歲物也歲物備則五味之用全矣帝曰先歲物何也岐伯曰天地之專精也歲物者得天地精專之化氣全力厚故備所當先也此與六元正紀大論食歲谷以全其真者同義帝曰司氣者何如岐伯曰司氣者主歲同然有餘不足也按景嶽曰司氣即上文五運之司氣也主歲即上文司天在泉之主歲也運之與氣所主皆同但五太之運為有餘五少之運為不及而物性之稟有厚薄矣帝曰非司歲物何謂也岐伯曰散也按景嶽曰非司歲物謂非主歲之物也散者謂六氣之序不司天地則司四間故物生之應亦當隨氣散見於四方而各有所稟也故質同而異等也惟天地之氣變不常故物生之體質雖同而性用之厚薄則異氣味有薄厚性用有躁靜治保有多少力化有淺深此之謂也按此總結以上之意言歲物之不同本於司氣之有異用藥者所當致意者也帝曰歲主臟害何謂岐伯曰以所不勝命之則其要也按景嶽曰此言天有歲氣人有臟氣而歲主有害於五臟者在所不勝者也如木氣淫則脾不勝火氣淫則肺不勝土氣淫則腎不勝金氣淫則肝不勝水氣淫則心不勝是皆臟害之要也帝曰治之奈何岐伯曰上淫於下所勝平之外淫於內所勝治之淫太過為害也上淫於下謂天以六氣病人之六經外淫於內謂地以五味傷人之五宮也淫邪為害當各以所勝者平治之也帝曰善平氣何如按景嶽曰此問歲氣和平而亦有病者又當何以治之也岐伯曰謹察陰陽所在而調之以平為期正者正治反者反治陰陽者脈有陰陽證有陰陽氣味有陰陽經絡臟象有陰陽不知陰陽所在則以反為正以逆為從故宜謹察而調之以平為期無令過也若陽經陽證而得陽脈陰經陰證而得陰脈是為正病正者正治謂當以寒治熱以熱治寒治之正也若陽經陽證而得陰脈陰經陰證而得陽脈是為反病反者反治謂當以熱治熱以寒治寒治之反也帝曰夫子言察陰陽所在而調之論言人迎與寸口相應若引繩小大齊等命曰平陰之所在寸口何如按景嶽曰論言靈樞禁服篇也此引本論之察陰陽者以人迎寸口為言蓋人迎在頭寸口在手陰陽相應則大小齊等是為平也陰少陰也少陰所在脈當不應於寸口不可不察也岐伯曰視歲南北可知之矣甲己二歲為南政乙庚丙辛丁壬戊癸八年為北政南政居南而定其上下左右故於人之脈則南應於寸北應於尺北政居北而定其上下左右故北應於寸而南應於尺蓋五運以土為尊故惟甲己土運為南政其他歲皆北政也帝曰願卒聞之岐伯曰北政之歲少陰在泉則寸口不應不應者脈來沉細而伏不應於指也北政之歲其氣居北以定上下則尺主司天寸主在泉故少陰在泉居北之中則兩手寸口俱不應乙丁辛癸卯酉年是也厥陰在泉則右不應右右寸也北政厥陰在泉則少陰在右寸故不應丙戊庚壬寅申年是也太陰在泉則左不應左左寸也北政太陰在泉則少陰在左寸故不應丙戊庚壬辰戌年是也南政之歲少陰司天則寸口不應南政之歲其氣居南以定上下則寸主司天尺主在泉故少陰司天居南之中則兩手寸口不應甲子甲午年是也厥陰司天則右不應右右寸也南政厥陰司天則少陰在右寸故不應己巳己亥年是也太陰司天則左不應左左寸也南政太陰司天則少陰在左寸故不應己丑己未年是也諸不應者反其診則見矣按反非相反猶言更易也凡南政之應在寸者則北政應在尺北政之應在寸者則南政應在尺以南北相反而診之則或寸或尺之不應者皆可見矣帝曰尺候何如按景嶽曰上文所言皆兩寸之不應故此更問兩尺之候當何如也岐伯曰北政之歲三陰在下則寸不應三陰在上則尺不應北政之歲反於南政故在下主寸在上主尺上下即司天在泉也南政之歲三陰在天則寸不應三陰在泉則尺不應南政之歲反於北政故在天主寸在泉主尺也左右同按馬玄臺曰不惟尺寸為然凡南北之左右二間其相反亦與寸尺同是也景嶽仍以寸尺言誤矣張景嶽曰陰之所在其脈不應諸家之注皆謂六氣以少陰為君君象無為不主時氣故少陰所至其脈不應也此説殊非夫少陰既為六氣之一安有不主氣之理惟天元紀大論中君火以明相火以位之下王氏注曰君火在相火之右但立名於君位不立歲氣一言此在王氏固已誤矣而諸家竟引以釋此蓋亦不明乎其義而直為之傳會耳夫三陰三陽者天地之氣也如太陰陽明論曰陽者天氣也主外陰者地氣也主內故陽道實陰道虛此陰陽虛實自然之道也第以日月證之則日為陽其氣常盈月為陰其光常缺是以潮汐之盛衰亦隨月而消長人之經脈即天地之潮汐也故三陽所在其脈無不應者氣之盈也三陰所在其脈有不應者以陽氣有不及氣之虛也然三陰之列又惟少陰獨居乎中此又陰中之陰也所以少陰所在為不應蓋亦天地之虛耳豈君不主事之謂乎明者以為然否故曰知其要者一言而終不知其要流散無窮此之謂也要即陰陽之所在也知則不惑不知則疑所以流散無窮而莫測其要也凡此脈之見多是時氣為病雖其中有未必全合者然遇有不應之脈便當因此以推察其候也按此數句與六元正紀大論同但彼言六元之紀此言陰陽之要也謹按少陰所在其脈不應景嶽謂是天地之虛是也謂為多是時氣為病則誤矣夫時氣之病正必虛邪必盛邪盛則脈多急數洪實正虛則脈兼空大虛微若至於不應危矣經言陰之所在其脈不應者歲氣之虛脈之常耳未即至死岐伯蓋恐人見不應之脈而驚疑故詳列如上非為時病而言也治病凡遇稟弱高年久病時氣之人其脈有不應者當合南北政而推求之果相符合乃是歲氣應爾尚可救補未可竟以為敗絶而棄之也帝曰善天地之氣內淫而病何如按張景嶽曰淫邪勝也不務其德是謂之淫內淫者自外而入氣淫於內言在泉之變病也岐伯曰歲厥陰在泉風淫所勝則地氣不明平野昧草乃早秀寅申歲也風淫於地則木勝土風勝濕塵埃飛揚故地氣不明平野昏昧木氣有餘故草乃早秀民病灑灑振寒善呻數欠心痛支滿兩脅裡急飲食不下膈咽不通食則嘔腹脹善噫得後與氣則快然如衰身體皆重按經脈篇自灑灑振寒至數欠為陽明胃病自食則嘔至身體皆重為太陰脾病且厥陰肝脈貫膈布脅肋故又為心痛支滿等證皆木邪淫勝脾胃受傷之為病歲少陰在泉熱淫所勝則焰浮川澤陰處反明蟄蟲不藏卯酉歲也君火淫勝於下故如是民病腹中常鳴氣上衝胸喘不能久立寒熱皮膚痛目瞑齒痛䪼腫惡寒發熱如瘧少腹中痛腹大腹中常鳴者火氣奔動也氣上衝胸者火性炎上也喘不能久立寒熱皮膚痛者火邪乘肺也目瞑者熱甚陰虛畏陽光也齒痛䪼腫熱乘陽明經也惡寒發熱如瘧金水受傷陰陽爭勝也熱在下焦故少腹中痛熱在中焦故腹大䪼音拙歲太陰在泉草乃早榮濕淫所勝則埃昏岩谷黃反見黑至陰之交辰戌歲也土為草木之所資生故早榮岩谷者土厚之處故埃昏岩谷黃土色黑水色土勝濕淫故黃反見黑五常政大論曰太陰司天濕氣下臨腎氣上從黑氣水變即土臨水應之義至陰之交當三氣四氣之間土之王時也民病飲積心痛耳聾渾渾焞焞嗌腫喉痹陰病血見少腹痛腫不得小便病沖頭痛目似脫項似拔腰似折髀不可以回膕如結腨如別飲積心痛寒濕乘心也自耳聾至喉痹按經脈篇為三焦經病自陰病至不得小便以邪濕下流為陰虛腎病自沖頭痛至腨如別經脈篇為膀胱經病此以土邪淫勝剋水而腎合三焦膀胱俱為水臟故病及焉焞音吞嗌音益膕音國腨音篆歲少陽在泉火淫所勝則焰明郊野寒熱更至巳亥歲也相火淫勝於下故如是民病注泄赤白少腹痛溺赤甚則血便少陰同候熱傷血分則注赤熱傷氣分則注白熱在下焦則少腹痛溺赤血便其餘諸病皆與前少陰在泉同候歲陽明在泉燥淫所勝則霿霧清暝子午歲也金氣淫勝於下故霿暗如霧清冷晦暝也民病喜嘔嘔有苦善太息心脅痛不能反側甚則嗌乾面塵身無膏澤足外反熱按經脈篇以口苦善太息心脅痛不能轉側甚則面微有塵體無膏澤足外反熱為足少陽膽經病嗌乾面塵為厥陰肝經病此以金邪淫勝故肝膽受傷而為病如此歲太陽在泉寒淫所勝則凝肅慘栗丑未歲也水氣淫勝於下故如是民病少腹控睪引腰脊上衝心痛血見嗌痛頷腫寒淫於下自傷其類則膀胱與腎受之膀胱居腹故少腹痛腎主陰丸故控睪太陽之脈挾脊抵腰中故引腰脊腎脈絡心故上衝心痛心主血屬而寒逼之故血見按經脈篇以嗌痛頷腫為小腸經病亦水邪侮火而然睪音高頷音含帝曰善治之奈何岐伯曰諸氣在泉風淫於內治以辛涼佐以苦甘以甘緩之以辛散之按張景嶽曰風為木氣金能勝之故治宜辛涼然過於辛恐反傷其氣故又佐以苦甘苦勝辛甘益氣也木性急故以甘緩之風邪勝故以辛散之臟氣法時論曰肝苦急急食甘以緩之肝欲散急食辛以散之此之謂也熱淫於內治以鹹寒佐以甘苦以酸收之以苦發之熱為火氣水能勝之故宜治以鹹寒佐以甘苦甘勝咸所以防咸之過也苦能泄所以去熱之實也熱盛於經而不斂者以酸收之熱鬱於內而不解者以苦發之濕淫於內治以苦熱佐以酸淡以苦燥之以淡泄之濕為土氣燥能除之故治以苦熱酸從木化制土者也故佐以酸淡以苦燥之者苦從火化也以淡泄之者淡能利竅也臟氣法時論曰脾苦濕急食苦以燥之即此之謂火淫於內治以鹹冷佐以苦辛以酸收之以苦發之相火畏火也故宜治以鹹冷苦能泄火辛能散火故用以為佐以酸收之以苦發之義與上文熱淫治同燥淫於內治以苦溫佐以甘辛以苦下之燥為金氣火能勝之治以苦溫苦從火化也佐以甘辛木受金傷以甘緩之金之正味以辛瀉之也燥結不通則邪實於內故當以苦下之按下文燥淫所勝佐以酸辛與此甘辛稍異又如六元正紀大論子午年陽明在泉亦云下酸溫皆與此不同考之臟氣法時論曰肺苦氣上逆急食苦以泄之用酸補之辛瀉之正此之辨寒淫於內治以甘熱佐以苦辛以咸瀉之以辛潤之以苦堅之寒為水氣土能勝水熱能勝寒故治以甘熱甘從土化熱從火化也佐以苦辛等義如臟氣法時論曰腎苦燥急食辛以潤之腎欲堅急食苦以堅之用苦補之咸瀉之帝曰善天氣之變何如此論司天淫勝之病變岐伯曰厥陰司天風淫所勝則太虛埃昏雲物以擾寒生春氣流水不冰蟄蟲不出按張景嶽曰巳亥歲也風淫於上故太虛埃昏雲物擾亂風木主溫故寒生春氣而流水不冰然風勝則金令承之清肅氣行故蟄蟲不出也民病胃脘當心而痛上支兩脅膈咽不通飲食不下舌本強食則嘔冷泄腹脹溏泄瘕水閉病本於脾按皆脾之病木盛相凌故也衝陽絶死不治衝陽足陽明胃脈也在足跗上動脈應手土不勝木則脾胃氣竭而衝陽絶故死少陰司天熱淫所勝怫熱至火行其政大雨且至子午歲也熱淫於上故火行其政君火之下陰精承之故大雨至怫郁也民病胸中煩熱嗌乾右胠滿皮膚痛寒熱咳喘唾血血泄鼽衄嚏嘔溺色變甚則瘡瘍胕腫肩背臂臑及缺盆中痛心痛肺䐜腹大滿膨膨而喘咳病本於肺按皆肺之病火盛爍金故也右為肺部故右胠滿按經脈篇以溺色變肩背臂臑及缺盆中痛肺脹膨膨而喘咳為手太陰肺病鼽衄肩前臑痛為手陽明大腸病蓋肺與大腸為表裡金被火刑故俱病也膨音彭尺澤絶死不治尺澤手太陰肺脈也在肘內廉大文中動脈應手金不勝火則肺氣竭而尺澤絶故死不治太陰司天濕淫所勝則沉陰旦布雨變枯稿按丑未歲也濕淫於上故沉陰旦布而多雨旦晝也陰雨漸漬則物傷於濕見日而變為枯稿矣民病胕腫骨痛陰痹陰痹者按之不得腰脊頭項痛時眩大便難陰氣不用飢不欲食咳唾則有血心如懸病本於腎按皆腎之病土盛傷水故也按經脈篇以腰脊頭項痛為足太陽膀胱病以飢不欲食咳唾有血心如懸為足少陰腎病腎與膀胱為表裡水為土克故俱病也太溪絶死不治太溪足少陰腎脈也在足內踝後跟骨上動脈應手水不勝土則腎氣竭而太溪絶故死少陽司天火淫所勝則溫氣流行金政不平寅申歲也相火淫勝於上則金受其制故如是民病頭痛發熱惡寒而瘧熱上皮膚痛色變黃赤傳而為水身面胕腫腹滿仰息泄注赤白瘡瘍咳唾血煩心胸中熱甚則鼽衄病本於肺按相火刑金水不能制故肺病如是也天府絶死不治天府手太陰肺脈也在臂臑內廉腋下三寸動脈應手金不勝火則肺氣竭而天府絶故死陽明司天燥淫所勝則木乃晚榮草乃晚生筋骨內變大涼革候名木斂生菀於下草焦上首蟄蟲來見卯酉歲也燥金淫勝於上則木受其克故草木生榮俱晚其在於人則肝血受傷不能榮養筋骨故生內變且金氣大涼能革發生之候故草木之應如此然陽明金氣在上則少陰火氣在下故蟄蟲來見也按大涼革候以下四句舊在下文感而瘧之後的系錯簡張景嶽移置於此是也民病左胠脅痛寒清於中感而瘧咳腹中鳴注泄鶩溏心脅暴痛不可反側嗌乾面塵腰痛丈夫㿗疝婦人少腹痛目昧眥瘍瘡痤癰病本於肝左胠脅痛等證皆肝經病肝木主左也經脈篇以心脅痛不能轉側面微有塵為足少陽膽病腰痛不可俯仰丈夫㿉疝婦人少腹痛嗌乾面塵飧泄為足厥陰肝病蓋肝與膽為表裡木被金傷故諸病皆本於肝也鶩音木㿗音頽痤才何切太衝絶死不治太衝足厥陰肝脈也在足大趾本節後二寸動脈應手木不勝金則肝氣竭而太衝絶故死太陽司天寒淫所勝則寒氣反至水且冰運火炎烈雨暴乃雹辰戌歲也寒淫於上故寒反至水且冰若乘火運而火氣炎烈則水火相激故雨暴乃雹此下二節舊文似有顛倒今正之民病血變於中發為癰瘍厥心痛嘔血血泄鼽衄善悲時眩僕胸腹滿手熱肘攣掖腫心淡淡大動胸脅胃脘不安面赤目黃善噫嗌乾甚則色炲渴而欲飲病本於心寒水勝則邪乘心故為血變於中癰疽等證經脈篇以手心熱臂肘攣急腋腫胸脅支滿心淡淡大動面赤目黃為手厥陰心包絡病蓋火為寒傷故諸病皆本於心也炲音苔焦黑色也神門絶死不治神門手少陰心脈也在掌後鋭骨之端動脈應手火不勝水則心氣竭而神門絶故死所謂動氣知其臟也此總結六氣之病變也動氣者氣至脈動也察脈動之有無而臟氣之存亡可知矣帝曰善治之奈何按言何以治淫勝也岐伯曰司天之氣風淫所勝平以辛涼佐以甘苦以甘緩之以酸瀉之按張景嶽曰風淫於上平以辛涼佐以甘苦以甘緩之俱與上文在泉治同以酸瀉之者木之正味其瀉以酸也義見後熱淫所勝平以鹹寒佐以苦甘以酸收之此與上文在泉治同但缺以苦發之一句而下文火淫所勝復言之義與此節同也濕淫所勝平以苦熱佐以酸辛以苦燥之以淡泄之諸與上文在泉治同惟佐以酸辛與彼酸淡少異蓋辛勝酸所以防酸之過也故當用以為佐濕上甚而熱治以苦溫佐以甘辛以汗為故而止濕上甚而熱者濕鬱於上而成熱也治以苦溫欲其燥也佐以甘辛欲其散也以燥以散則濕熱之在上者以汗之故而止矣謹按六氣司天淫勝之治各就其本治之而已惟濕土淫勝獨多此一轉蓋濕雖土性而濕甚則氣不施化釀而為熱矣治此之法單燥其濕則熱更熾單清其熱則濕不流故必兼用苦溫甘辛之味以汗之庶幾熱清而濕燥此又淫勝之轉病而治法之所以不同也火淫所勝平以鹹冷佐以苦甘以酸收之以苦發之以酸復之熱淫同此與在泉熱淫治同蓋水能勝火故平以鹹冷苦能瀉火之實甘能緩火之急故佐以苦甘火盛而散越者以酸收之火鬱而伏留者以苦發之然以發去火未免傷氣故又當以酸收之而火與熱同治也燥淫所勝平以苦濕佐以酸辛以苦下之此與上文燥淫於內治同但彼云佐以甘辛此云酸辛為異詳注見前燥淫條下苦濕誤也當作苦溫寒淫所勝平以辛熱佐以苦甘以咸瀉之辛熱足以散寒苦甘可以勝水以咸瀉之水之正味其瀉以咸也此與在泉治同而文有顛倒詳見前寒淫於內條下帝曰邪氣反勝治之奈何按凡氣之害正者即謂之邪正氣當勝而或偶遇所不勝之客氣則反為其所勝如木司天地氣宜溫和乃時或清涼則氣以清涼而抑矣木遭金氣是之謂反勝非若真氣不足而後邪氣乘虛而入之比也景嶽解反勝謂天地氣有不足則間氣乘虛為邪夫既已司天在泉矣何云不足耶蓋惟司天在泉之氣更無有能勝之者而所不勝之時氣能勝之所以為反勝帝之此問的指客氣為邪無疑也或曰子言此客氣有據乎曰下文不云乎風司於地清反勝之等謂風宜溫而時反清也非客氣而何岐伯曰風司於地清反勝之治以酸溫佐以苦甘以辛平之按張景嶽曰治以酸溫酸求木之同氣溫以制清也佐以苦甘苦以溫金甘以緩肝之急也以辛平之木之正味其補以辛金之正味其瀉以辛也熱司於地寒反勝之治以甘熱佐以苦辛以鹹平之治以甘熱甘能勝水熱能制寒也佐以苦辛寒得苦而溫得辛而散也以鹹平之火之正味其補以咸水之正味其瀉以咸也濕司於地熱反勝之治以苦冷佐以鹹甘以苦平之治以苦冷抑火邪也佐以鹹甘鹹寒制熱甘溫補土也以苦平之即苦冷之義火司於地寒反勝之治以甘熱佐以苦辛以鹹平之與熱司於地同治燥司於地熱反勝之治以平寒佐以苦甘以酸平之以和為利治以平寒以金司於地氣本肅殺若用大寒必助其慘故但宜平寒以抑其熱而已佐以苦甘所以瀉火也以酸平之金之正味其補以酸也以和為利戒其過也即平寒之意寒司於地熱反勝之治以鹹冷佐以甘辛以苦平之治以鹹冷抑火邪也佐以甘辛甘瀉火而辛能散也以苦平之水之正味其補以苦也王氏曰此六氣方治與前淫勝法殊貫其云治者瀉客邪之勝氣也云佐者皆所利所宜也云平者補已弱之正氣也帝曰其司天邪勝何如言司天反勝也岐伯曰風化於天清反勝之治以酸溫佐以甘苦治與司地同熱化於天寒反勝之治以甘溫佐以苦酸辛治與司地同但少一鹹味多一酸味蓋火為水勝則心苦緩是故宜食酸以收之也濕化於天熱反勝之治以苦寒佐以苦酸苦寒所以祛熱苦酸所以斂熱按此與上文濕司於地皆當言風反勝之而俱言熱者蓋風火本同氣均能勝濕故也然佐以苦酸則木之正味其瀉以酸此雖治熱而實兼治風矣火化於天寒反勝之治以甘熱佐以苦辛治與司地同燥化於天熱反勝之治以辛寒佐以苦甘辛寒所以散熱苦甘所以瀉火寒化於天熱反勝之治以鹹冷佐以苦辛治與司地同帝曰六氣相勝奈何按張景嶽曰相勝者六氣之有強弱而乘虛相勝也岐伯曰厥陰之勝耳鳴頭眩憒憒欲吐胃膈如寒大風數舉倮蟲不滋胠脅氣並化而為熱小便黃赤胃脘當心而痛上支兩脅腸鳴飧泄少腹痛注下赤白甚則嘔吐膈咽不通按張景嶽曰厥陰之勝風邪盛也耳鳴頭眩肝脈會於頂而風主動也憒憒欲吐胃膈如寒以木邪傷胃胃虛而生於寒也倮蟲不滋土氣衰也胠脅氣並肝邪聚也化熱而小便黃赤邪侵小腸也其在上則胃脘當心而痛上支兩脅為嘔吐為膈咽不通在下則為飧泄少腹痛注下赤白皆肝經脈氣所及而木邪乘於腸胃也憒音貴心亂也胠音區少陰之勝心下熱善飢臍下反痛氣遊三焦炎暑至木乃津草乃萎嘔逆躁煩腹滿痛溏泄傳為赤沃少陰之勝君火盛也少陰之脈起心中出屬心系故心下熱而善飢少陰之脈絡小腸而熱乘之故臍下反痛心火盛則熱及心包絡包絡之脈歷絡三焦故氣遊三焦其在天則炎暑至在物則木乃津草乃萎火在上焦則咽逆躁煩在中焦則腹滿痛在下焦則溏泄傳為赤沃赤沃者利血尿血也太陰之勝火氣內郁瘡瘍於中流散於外病在胠脅甚則心痛熱格頭痛喉痹項強獨勝則濕氣內郁寒迫下焦痛留頂互引眉間胃滿雨數至濕化乃見少腹滿腰脽重強內不便善注泄足下溫頭重足脛胕腫飲發於中胕腫於上太陰之勝濕邪盛也寒濕外盛則心火內郁故瘡瘍先發於中而後流散於外心脈起心中出腋下故病在胠脅甚則心痛熱格於上則為頭痛喉痹項強若無熱而濕獨勝則濕氣內郁寒迫下焦故痛留巔頂互引眉間胃屬土不能制濕則為脹滿其在天則雨數至在物則濕化見濕下流則少腹滿腰脽重強內濕不便則清濁不分故善注泄濕鬱於下則熱生故足溫濕滯於上故頭重脾胃不能勝濕則足脛胕腫故飲發於中浮腫於上也少陽之勝熱客於胃煩心心痛目赤欲嘔嘔酸善飢耳痛溺赤善驚譫妄暴熱消爍草萎水涸介蟲乃屈少腹痛下沃赤白少陽之勝相火盛也熱客於胃而上行則為煩心心痛目赤欲嘔嘔酸善飢耳痛等病下行則為溺赤火盛則傷陰故善驚譫妄暴熱消爍熱極則害物故草萎水涸介蟲屬金故遇火而屈熱陷下焦故少腹為痛下沃赤白者熱在血分則赤氣分則白大便曰利小便曰濁也陽明之勝清發於中左胠脅痛溏泄內為嗌塞外發㿗疝大涼肅殺華英改容毛蟲乃殃胸中不便嗌塞而咳陽明之勝金邪盛也金氣寒肅故清發於中木受其制故左胠脅痛清氣在下則為溏泄在上則為嗌塞在少腹則為㿗疝在天則大涼肅殺在物則華英改容毛蟲木蟲也故受其殃胸中肺所居也燥勝則肺氣斂而失其節治故有不便而嗌塞為咳也太陽之勝凝栗且至非時水冰羽乃後化痔瘧發寒厥入胃則內生心痛陰中乃瘍隱曲不利互引陰股筋肉拘苛血脈凝泣絡滿色變或為血泄皮膚痞腫腹滿食減熱反上行頭項囟頂腦戶中痛目如脫寒入下焦傳為濡瀉太陽之勝水邪盛也故為凝栗水冰羽蟲屬火故後化太陽經夾脊貫臀故痔發寒勝則邪正分爭故為瘧寒氣入胃厥逆於中上侵君火故內生心痛太陽之脈絡腎貫膀胱故為陰瘍隱曲不利而互引陰股筋肉得寒則為急為痹故筋急肉苛血脈得寒則營衛凝澀經脈不行故絡滿色變血滯於經則妄行故或為血泄表寒不行故皮膚痞腫裡寒為滯故腹滿食減陰寒在下則戴陽於上故熱反上行頭項囟頂腦戶目內眥皆太陽經也寒氣居之故為痛如脫寒入下焦則命門陽衰故傳為大便濡泄囟音信帝曰治之奈何岐伯曰厥陰之勝治以甘清佐以苦辛以酸瀉之木勝土敗治以甘清甘益土清平木也佐以苦辛散風邪也以酸瀉之木之正味其瀉以酸也少陰之勝治以辛寒佐以苦鹹以甘瀉之熱勝則乘金治以辛寒散火也佐以苦鹹泄熱也以甘瀉之火之正味其瀉以甘也太陰之勝治以咸熱佐以辛甘以苦瀉之土勝則濕淫治以咸熱咸能潤下熱能燥濕也濕勝則土寒佐以辛甘辛能溫土甘能補土也以苦瀉之土之正味其瀉以苦也少陽之勝治以辛寒佐以甘鹹以甘瀉之此與上少陰治同但佐有少異蓋甘能瀉火也陽明之勝治以酸溫佐以辛甘以苦泄之燥金之勝病在肺肝治以酸溫潤燥暖肺也佐以辛甘瀉肺補肝也以苦泄之苦從火化能泄燥邪之實也太陽之勝治以甘熱佐以辛酸以咸瀉之水勝則火衰治以甘熱甘益土以制水熱扶陽以逐寒也佐以辛酸辛散寒邪之實酸收心氣之傷也以咸瀉之水之正味其瀉以咸也帝曰六氣之復何如復謂報復報其勝也凡先有勝後必有復按張景嶽曰注言凡先有勝後必有復新校正引玄珠正化對化之義云正司化令之實對司化令之虛對化勝而有復正化勝而不復反以注為未然或又曰甲丙戊庚壬陽年太過有勝無復乙丁己辛癸陰年不及有勝必有復皆未達之言也夫勝復之道隨氣盛衰而見非有正對之分考之本經諸篇原無此言其不及有復太過無復之説蓋以氣交變大論凡太過之運皆不言復惟不及之年則有之六元正紀大論所載六十年運氣之紀亦惟不及之年言復而太過之歲則無似乎陽年太過有勝無復也然五常正大論云發生之紀不務其德則收氣復赫曦之紀暴烈其政藏氣乃復敦阜之紀大風迅至邪傷脾也堅成之紀政暴變長氣斯救流衍之紀政過則化氣大舉是皆以太過之歲為言由此觀之則陽年未嘗無復也惟是陰年氣弱彼來勝我故子必起而報之故謂之復陽年氣強無勝我者但以我勝彼故承乃從而制之然曰承曰復總一理也但相繼而制者謂之承因勝而報者謂之復勝復相仍本無罅隙故經曰有勝則復無勝則否勝至則復無常數也又曰微者復微甚者復甚然則氣之微甚尚不可以假借又何有陰陽正對復與不復之理哉故本論無分太過不及之年皆有淫勝反勝相勝之氣可見陽年未必全盛而反勝者有之陰年未必全衰而淫勝者亦有之天地變化消長無窮但當隨厥氣幾而察以方月之義庶得其妙若因辭害意則失之遠矣岐伯曰悉乎哉問也厥陰之復少腹堅滿裡急暴痛偃木飛沙倮蟲不榮厥心痛汗發嘔吐飲食不入入而復出筋骨掉眩清厥甚則入脾食痹而吐厥陰風木之復內應肝氣少腹堅滿肝邪實也裡急暴痛肝主筋膜其氣急也偃木飛沙風之甚也倮蟲不榮木製土也厥心痛汗發肝邪乘胃上凌於心而陽氣泄也飲食不入入則復出脾受肝傷也掉為顫掉眩為眩運風淫所致也風之甚者必兼承製之化故手足清冷而厥也食痹者食入不化入則痹痛嘔汁必吐出乃已也衝陽絶死不治衝陽胃脈也胃絶則脾亦絶矣按前章天地淫勝止言司天六脈絶者不治而在泉未言此章於六氣之復者復言之正以明在泉之化蓋四氣盡終氣地氣主之復之常也少陰之復燠熱內作煩躁鼽嚏少腹絞痛火見燔焫嗌燥分注時止氣動於左上行於右咳皮膚痛暴喑心痛鬱冒不知人乃灑淅惡寒振栗譫妄寒已而熱渴而欲飲少氣骨萎隔腸不便外為浮腫噦噫赤氣後化流水不冰熱氣大行介蟲不福病痱疹瘡瘍癰疽痤痔甚則入肺咳而鼻淵少陰君火之復燠熱內作煩躁鼽嚏火盛於中而炎於上也少腹絞痛火在陰也火見燔焫嗌燥身表焦熱而火在喉也分注時止謂大腸或泄膀胱或癃火居二便也氣動於左陽升在東也上行於右火必乘金也咳而皮膚痛暴喑肺主音聲外合皮毛而受火之傷也心痛鬱冒不知人心邪自實而神明亂也灑淅惡寒振栗譫妄寒已而熱水火相爭熱極生寒也渴而欲飲亡津液也少氣骨萎壯火食氣熱極傷精也隔腸不便熱結不通也外為浮腫為噦噫熱勝則腫火逆衝上也赤氣後化陽明先勝少陰後復也流水不冰熱氣大行介蟲不福火盛制金也痱疹瘡瘍癰疽痤痔火克肺金而皮毛受傷也火甚必傷肺故咳而鼻淵所由作矣天府絶死不治天府肺經穴也太陰之復濕變乃舉體重中滿食飲不化陰氣上厥胸中不便飲發於中咳喘有聲大雨時行鱗見於陸頭頂痛重而掉瘛尤甚嘔而密默唾吐清液甚則入腎竅瀉無度太陰濕土之復體重中滿飲食不化自傷同氣也陰氣上厥胸中不便濕從寒化也飲發於中喘咳有聲濕侵脾肺也大雨時行鱗見於陸濕令行也頭頂痛重而掉瘛尤甚濕在三陽筋脈濡耎也嘔而密默唾吐清液寒濕內動也甚則土邪傳腎竅瀉無度以腎開竅於二便而門戶不要也太溪絶死不治太溪腎經穴也少陽之復大熱將至枯燥燔爇介蟲乃耗驚瘛咳衄心熱煩躁便數憎風厥氣上行面如浮埃目乃瞤瘛火氣內發上為口糜嘔逆血溢血泄發而為瘧惡寒鼓栗寒極反熱嗌絡焦稿渴引水漿色變黃赤少氣脈萎化而為水傳為胕腫甚則入肺咳而血泄少陽相火之復故大熱至而枯燥燔爇介蟲屬金所以耗也其病則驚瘛咳衄心熱煩躁火乘心肺也便數憎風表裡皆熱也厥氣上行面如浮埃目乃瞤瘛火氣內發上為口糜嘔逆血溢血泄皆火炎於上故形色變而逼血妄行也發而為瘧惡寒鼓栗寒極反熱以風火相薄而陰陽相併也嗌絡焦稿渴引水漿津液涸也色變黃赤熱在脾則黃在心則赤也少氣脈萎氣血傷也化而為水傳為胕腫以氣蒸熱化水道不通而浮腫如泥也火盛必傷金故甚則入肺咳而血泄爇儒決切尺澤絶死不治尺澤肺經穴也按前章少陰司天熱淫所勝言尺澤少陽司天火淫所勝言天府此章所言與前章相反然皆系肺經之穴以火剋金故能互見其害陽明之復清氣大舉森木蒼干毛蟲乃厲病生胠脅氣歸於左善太息甚則心痛痞滿腹脹而泄嘔吐咳噦煩心病在膈中頭痛甚則入肝驚咳筋攣陽明燥金之復故清氣大舉森木蒼干毛蟲乃厲金剋木也病生胠脅氣歸於左肝木傷也金氣盛則木鬱火衰而陽氣不達故善太息甚則心痛痞滿腹脹而泄嘔吐咳噦煩心清邪在中也頭痛者陰寒外束熱聚於經也金強侮肝故為驚駭筋攣之病太衝絶死不治太衝肝經穴也太陽之復厥氣上行水凝雨冰羽蟲乃死心胃生寒胸中不利心痛痞滿頭痛善悲時眩僕食減腰脽反痛屈伸不便地裂冰堅陽光不治少腹控睪引腰脊上衝心唾出清水及為噦噫甚則入心善忘善悲太陽寒水之復其氣上行則水凝雨冰羽蟲屬火水盛乃死也其病心胃生寒故胸中不利也心痛痞滿寒在膈間也頭痛善悲寒並於上而陽神虛也時眩僕食減清陽失位而胃中寒也腰脽反痛屈伸不便寒歸水臟而連及於太陽經也地裂冰堅陽光不治水令行也少腹控睪引腰脊上衝於心寒客三陰上侵君火也唾出清水及為噦噫寒水侮土胃脘無陽也寒甚者必乘心心藏神神不足則善忘善悲也脽音誰神門絶死不治神門心經穴也帝曰善治之奈何岐伯曰厥陰之復治以酸寒佐以甘辛以酸瀉之以甘緩之按張景嶽曰厥陰風木之復治以酸寒木之正味其瀉以酸木火相生宜清以寒也佐以甘辛木盛土衰以甘補土辛從金化以辛制木也瀉者瀉肝之實緩者緩肝之急也少陰之復治以鹹寒佐以苦辛以甘瀉之以酸收之以苦發之以咸耎之少陰君火之復治以鹹寒制以所不勝也佐以苦辛發散其熱也以甘瀉之甘瀉火也以酸收之斂浮熱也以苦發之散火之郁也以咸耎之解熱之結也太陰之復治以苦熱佐以酸辛以苦瀉之燥之泄之太陰濕土之復治以苦熱苦能瀉土熱能燥濕也佐以酸辛酸能制土辛能溫寒也以苦瀉之燥之泄之瀉以奪其壅燥以勝其濕泄以利其水也少陽之復治以鹹冷佐以苦辛以咸耎之以酸收之辛苦發之發不遠熱無犯溫涼少陰同法少陽相火之復與上文少陰之復治同發不遠熱無犯溫涼重明用法者勿犯寒涼也謹按治六氣之復惟二火獨言發且言發不遠熱無犯溫涼者何也蓋火之病人者熱也惟其熱也不得不治之以寒然一於用寒而不佐之以辛散則火為寒抑而熱內郁六元正紀論曰火鬱發之正謂發散其熱而火不郁也是故治少陰則曰佐以苦辛以苦發之治少陽則曰辛苦發之而又總結之曰發不遠熱無犯溫涼誠恐溫涼不足以散火不妨借熱遠熱耳此用藥之精義景嶽略而不言何哉治諸勝復寒者熱之熱者寒之溫者清之清者溫之散者收之抑者散之燥者潤之急者緩之堅者耎之脆者堅之衰者補之強者瀉之各安其氣必清必靜則病氣衰去歸其所宗此治之大體也此總結以前淫勝反勝相勝相復之治皆不外乎此法則正氣得安病氣衰去陰陽宗主各有所歸自無偏勝之患而治法盡於此矣脆音翠帝曰善氣之上下何謂也岐伯曰身半以上其氣三矣天之分也天氣主之身半以下其氣三矣地之分也地氣主之按張景嶽曰氣之上下司天在泉也而人身應之則身半以上陽氣三陰氣亦三是為手之六經應天之分故天氣主之身半以下亦陽氣三陰氣三是為足之六經應地之氣故地氣主之六節臟象論亦云其氣三三而成天三而成地三而成人亦是三陰三陽之義以名命氣以氣命處而言其病半所謂天樞也以名命氣謂正其名則氣有所屬如三陰三陽者名也名既立則六氣各有所主矣以氣命處謂六經之氣各有其位察其氣則中外前後上下左右病處可知矣半身半也上下之中也以人身言之則前及於臍後及於腰故臍旁二寸名天樞穴正取身半之義故上勝而下俱病者以地名之下勝而上俱病者以天名之上勝則下虛而下俱病者即名地氣也下勝則上虛而上俱病者即名天氣也六元正紀大論曰天氣不足地氣隨之地氣不足天氣從之亦此之謂所謂勝至報氣屈伏而未發也復至則不以天地異名皆如復氣為法也凡勝至為病者以報氣未發也故病在上則求乎天病在下則求乎地若復氣已至則不以天地異名但求復氣所居隨微甚以為治法也如前章治六氣之復及下文雲氣之復也和者平之暴者奪之皆治復之法帝曰勝復之動時有常乎氣有必乎岐伯曰時有常位而氣無必也按張景嶽曰時有常氣無必義如下文帝曰願聞其道也岐伯曰初氣終三氣天氣主之勝之常也四氣盡終氣地氣主之復之常也歲半之前天氣主之歲半之後地氣主之勝在前覆在後故自初氣以至三氣乃司天所主之時太過則勝其不勝不及則勝者來勝此勝之常也自四氣至終氣乃在泉所主之時太過則承者起而制之不及則子為母而復之此復之常也故曰時有常位有勝則復無勝則否有勝必有復無勝則無復五常政大論曰微者復微甚者復甚可見勝復之氣或有或無或微或甚其變不常故曰氣無必也帝曰善復已而勝何如岐伯曰勝至則復無常數也衰乃止耳復已而勝謂既復之後而又勝也勝至則復言再勝則再復本無常數也勝復之變本由乎氣若氣有餘而勝復微則氣有未盡故不免再勝再復若勝復甚則彼此氣盡而已故衰乃止耳復已而勝不復則害此傷生也若有勝無復則亢而為害故傷生也帝曰復而反病何也岐伯曰居非其位不相得也大復其勝則主勝之故反病也復而反病謂復反自病也復氣居非其位則客主之氣不相得氣不相得而大復其勝力極必虛虛則主氣乘之故反受病也所謂火燥熱也此即居非其位也火少陽也燥陽明也熱少陰也少陽少陰在泉以客之火氣而居主之水位火氣大復則水主勝之陽明司天以客之金氣而居主之火位金氣大復則火主勝之餘氣勝復則無主勝之反病故曰所謂火燥熱也按此以復氣反病為言然燥在三氣之前本非復之時也但言復則勝可知矣故勝氣不相得者亦當反病天地之氣皆然也帝曰治之奈何岐伯曰夫氣之勝也微者隨之甚者制之氣之復也和者平之暴者奪之皆隨勝氣安其屈伏無問其數以平為期此其道也按張景嶽曰此總言勝復微甚之治也微者隨之順其氣以安之也甚者制之制以所畏也和者平之調其微邪也暴者奪之瀉其強盛也但隨勝氣以治則屈伏之氣可安矣然不必計其數之多少但以得平為期乃治氣勝之道此言皆隨勝氣者非單以勝氣為言即復氣之至氣亦勝矣蓋兼言之也本節治法當與前治諸勝復相參閲帝曰善客主之勝復奈何按張景嶽曰客者天地之六氣主者四時之六步凡前云勝復者皆客氣之變故此復明主氣也岐伯曰客主之氣勝而無復也客氣動而變主氣靜而常氣強則勝時去則已故但以盛衰相勝而無復也帝曰其逆從何如岐伯曰主勝逆客勝從天之道也按張景嶽曰客行天令運動不息主守其位只奉天命者也主勝客則違天之命而天氣不行故為逆客勝主則以上臨下而政令乃布故為從帝曰其生病何如岐伯曰厥陰司天客勝則耳鳴掉眩甚則咳主勝則胸脅痛舌難以言初氣終三氣天氣主之也巳亥年厥陰司天以風木之客而加於厥陰少陰少陽之主若客勝則木氣上動而風邪盛故耳鳴掉眩甚則為咳若主勝則火挾木邪在相火則胸脅痛心包所居也在君火則舌難言心開竅於舌也少陰司天客勝則鼽嚏頸項強肩背瞀熱頭痛少氣發熱耳聾目瞑甚則胕腫血溢瘡瘍咳喘主勝則心熱煩躁甚則脅痛支滿子午年少陰司天以君火之客而加於木火三氣之主客勝則火在上焦故熱居頭項肌表主勝則火木為邪故心肝二經為病瞀悶也太陰司天客勝則首面胕腫呼吸氣喘主勝則胸腹滿食已而瞀丑未年太陰司天以濕土之客加於木火之主客勝則濕熱上升故首面浮腫而喘主勝則風熱侵脾故胸腹滿食已而瞀少陽司天客勝則丹疹外發及為丹熛瘡瘍嘔逆喉痹頭痛嗌腫耳聾血溢內為瘛瘲主勝則胸滿咳仰息甚而有血手熱寅申年少陽司天以畏火之客而加於木火之主客主互勝火在上焦故為熱病如此疹疹同熛音標瘛瘲音翅縱按下文云痙強拘瘛是瘛為拘攣瘲為弛瘲可知陽明司天清復內余則咳衄嗌塞心膈中熱咳不止而白血出者死卯酉年陽明司天以燥金之客而加於木火之主金居火位則客不勝主故不言客主之勝然陽明以清肅為政若清氣復盛而有餘於內則熱邪承之故為咳衄嗌塞等證皆肺金受傷也肺傷極則白血出蓋血竭於肺乃為白涎白液涎液雖白實血所化故曰白血出者死太陽司天客勝則胸中不利出清涕感寒則咳主勝則喉嗌中鳴辰戌年太陽司天以寒水之客而加於木火之主客勝則寒氣在上故胸中不利涕出而咳主勝則火為寒復故陽氣欲達而喉嗌鳴也厥陰在泉客勝則大關節不利內為痙強拘瘛外為不便主勝則筋骨徭並腰腹時痛按張景嶽曰四氣盡終氣地氣主之也寅申年厥陰在泉以風木之客而加於太陰陽明太陽之主客勝主勝皆以木居土金水之鄉肝木受制於下故為關節不利痙強拘瘛筋骨等病徭搖同並攣束不開也少陰在泉客勝則腰痛尻股膝脾腨胻足病瞀熱以酸胕腫不能久立溲便變主勝則厥氣上行心痛發熱膈中衆痹皆作發於胠脅魄汗不藏四逆而起卯酉年少陰在泉以君火之客而加於土金水之主客勝則腰尻下部為痛為熱為溲便變者火居陰分也為胕腫不能久立者火在太陰脾主肌肉四肢故也主勝則君火受制於群陰故為厥氣上行心痛發熱等病魄汗陰汗也四逆厥冷也脈要精微論曰陰氣有餘為多汗身寒即此謂也太陰在泉客勝則足痿下重便溲不時濕客下焦發而濡瀉及為腫隱曲之疾主勝則寒氣逆滿食飲不下甚則為疝辰戌年太陰在泉以濕土之客而加於金水之主客勝則為足痿下重等病濕挾陰邪在下也主勝而為寒氣逆滿食飲不下者寒水侮土傷脾也甚則為疝即隱曲之疾蓋前陰者太陰陽明之所合而寒濕居之故病也少陽在泉客勝則腰腹痛而反惡寒甚則下白溺白主勝則熱反上行而客於心心痛發熱格中而嘔少陰同候巳亥年少陽在泉以相火之客而加於土金水之主客勝則火居陰分故下焦熱腰腹痛而惡寒下白主勝則陰盛格陽故熱反上行心痛發熱格中而嘔少陽少陰皆屬火故同候陽明在泉客勝則清氣動下少腹堅滿而數便瀉主勝則腰重腹痛少腹生寒下為鶩溏則寒厥於腸上衝胸中甚則喘不能久立子午歲陽明在泉以燥金之客而加於土金水之主客勝則清寒之氣動於下焦故少腹堅滿而便瀉主勝則寒侵金臟故下在腸腹則為腰重腹痛鶩溏寒厥上於肺經則衝於胸中甚則氣喘不能久立也謹按溏薄糞也鶩以水為性其糞常溏故云鶩溏鶩音木鴨也太陽在泉寒復內余則腰尻痛屈伸不利股脛足膝中痛丑未年太陽在泉以寒水之客而加於金水土之主水居水位故不言客主之勝重陰氣盛故為寒復內余而為腰尻股脛足膝中痛帝曰善治之奈何岐伯曰高者抑之下者舉之有餘者折之不足者補之佐以所利和以所宜必安其主客適其寒溫同者逆之異者從之按張景嶽曰高者抑之欲其降也下者舉之欲其升也有餘者折之攻其實也不足者補之培其虛也佐以所利順其升降浮沉也和以所宜酌以氣味厚薄也安其主客審強弱以調之也適其寒溫用寒遠寒用溫遠溫也同者逆之主客同氣者可逆而治也異者從之主客異氣者或從於客或從於主也帝曰治寒以熱治熱以寒氣相得者逆之不相得者從之余已知之矣其於正味何如按張景嶽曰五行氣化補瀉之味各有專主故曰正味此不特客主之氣為然凡治諸勝復者皆同岐伯曰木位之主其瀉以酸其補以辛木之主氣初之氣也在春分前二十六日有奇乃厥陰風木所主之時故曰木位之主木性升酸則反其性而斂之故為瀉辛則助其發生之氣故為補臟氣法時論曰肝欲散急食辛以散之用辛補之酸瀉之謹按宣明五氣篇曰酸入肝陰陽應象大論曰酸生肝五臟生成篇曰肝欲酸等語是酸者肝木所資以為養者也辛為金味宜非所喜今反以酸為瀉而以辛為補者蓋就木之既病而言也木病則鬱故欲散而喜辛若無病之時臟氣和平各歸所喜則以酸為補而辛非其宜矣王氏不知其義無所發明張景嶽直引臟氣法時論為解豈知臟氣法時論亦正是既病治法也無病喜酸則必多食而致郁故又欲散而喜辛此肝之所以既喜酸又喜辛蓋以有病無病而分也辛補酸瀉等義見前臟氣法時論各條下景嶽此云反其性而斂之為瀉等語似俱未確故僣為釐正於下火位之主其瀉以甘其補以咸火之主氣有二春分後六十日有奇少陰君火主之二之氣也夏至前後各三十日有奇少陽相火主之三之氣也謹按火當王時則過盛而宜瀉瀉宜用苦而反以甘者火性酷烈急治之則適足以激其怒而熱愈甚甘性緩而善泄熱故瀉火必以甘咸者水之味火所畏也而反云補蓋火盛則亢而自焚得咸則柔耎而暴烈之氣去故以咸為補臟氣法時論曰心欲耎急食鹹以耎之用鹹補之甘瀉之土位之主其瀉以苦其補以甘土之主氣四之氣也在秋分前六十日有奇乃太陰濕土所主之時土性濕苦則反其性以燥之故為瀉土欲緩甘則順其性而緩之故為補臟氣法時論曰脾欲緩急食甘以緩之用苦瀉之甘補之謹按土之補瀉與衆獨異其辨見前臟氣法時論本條下金位之主其瀉以辛其補以酸金之主氣五之氣也在秋分後六十日有奇乃陽明燥金所主之時臟氣法時論曰肺欲收急食酸以收之用酸補之辛瀉之金本喜辛然食之過多則氣耗散而又欲收斂故以酸為補而以辛為瀉矣水位之主其瀉以咸其補以苦水之主氣終之氣也在冬至前後各三十日有奇乃太陽寒水所主之時臟氣法時論曰腎欲堅急食苦以堅之用苦補之咸瀉之腎本喜咸然食過多則骨萎弱而又欲堅固故以苦為補而以咸為瀉也厥陰之客以辛補之以酸瀉之以甘緩之按張景嶽曰客者客氣之為病也後仿此厥陰之客與上文木位之主同其治而更云以甘緩之者臟氣法時論曰肝苦急急食甘以緩之也少陰之客以咸補之以甘瀉之以咸收之少陰君火之客與上文火位之主同其治以咸收之誤也當作酸臟氣法時論曰心苦緩急食酸以收之者是也太陰之客以甘補之以苦瀉之以甘緩之太陰濕土之客與上文土位之主治同少陽之客以咸補之以甘瀉之以咸耎之少陽相火之客與上文火位之主治同但曰以咸耎之者按臟氣法時論曰心欲耎急食鹹以耎之雖心非少陽而君相皆火故治同也陽明之客以酸補之以辛瀉之以苦泄之陽明燥金之客與上文金位之主治同復言以苦泄之者金主肺臟氣法時論曰肺苦氣上逆急食苦以泄之是也太陽之客以苦補之以咸瀉之以苦堅之以辛潤之開發腠理致津液通氣也太陽寒水之客與上文水位之主治同復曰以辛潤之者水屬腎臟氣法時論曰腎苦燥急食辛以潤之也開發腠理等義俱與彼同帝曰善願聞陰陽之三也何謂岐伯曰氣有多少異用也太陰為正陰太陽為正陽次少者為少陰次少者為少陽又次為陽明又次為厥陰厥陰為盡義具靈樞系日月論中按天元紀大論云何謂氣有多少鬼臾區曰陰陽之氣各有多少故曰三陰三陽也帝曰氣有多少病有盛衰治有緩急方有大小願問其約奈何按約猶言大約岐伯曰氣有高下病有遠近證有中外治有輕重適其至所為故也按注言臟位有高下腑氣有遠近誤矣夫高下以升降言遠近以時日言中外者表裡之分輕重者藥味之別是治病之大約也大要曰君一臣二奇之制也君二臣四偶之制也君二臣三奇之制也君二臣六偶之制也按張景嶽曰君三之三誤也當作二今改正之大要古法也主病之謂君君當倍用佐君之謂臣臣以助之奇者陽數即古所謂單方偶者陰數即古所謂復方也故君一臣二其數三君二臣三其數五皆奇之制也君二臣四其數六君二臣六其數八皆偶之制也奇方屬陽而輕偶方屬陰而重故曰近者奇之遠者偶之汗者不以偶下者不以奇按張景嶽曰近者為上為陽故用奇方用其輕而緩也遠者為下為陰故用偶方用其重而急也汗者不以偶慮陰沉不能達表也下者不以奇恐陽升不能下降也謹按舊本汗者不以奇下者不以偶又殊不合王注所解是也今改從之補上治上制以緩補下治下制以急急則氣味厚緩則氣味薄適其至所此之謂也按張景嶽曰補上治上制以緩欲其流布上部也補下治下制以急欲其直達下焦也故欲急者須氣味之厚欲緩者須氣味之薄若制緩方而氣味厚則峻而去速用急方而氣味薄則柔而不前惟緩急厚薄得其宜則適其病至之所而治得其要矣是故平氣之道近而奇偶制小其服也遠而奇偶制大其服也大則數少小則數多多則九之少則二之按張景嶽曰平氣之道平其不平之謂也如在上為近在下為遠遠者近者各有陰陽表裡之分故遠方近方亦各有奇偶相兼之法如方奇而分兩偶方偶而分兩奇皆互用之妙也故近而奇偶制小其服小則數多而盡於九蓋數多則分兩輕分兩輕則性力薄而僅及近處也遠而奇偶制大其服大則數少而止於二蓋少則分兩重分兩重則性力專而直達深遠也是皆奇偶兼用之法若病近而大其制則藥勝於病是謂誅伐無過病遠而小其制則藥不及病亦猶風馬牛不相及耳上文云近者奇之遠者偶之言法之常也此云近而奇偶遠而奇偶言法之變也知常知變則可應用無方矣奇之不去則偶之是謂重方偶之不去則反佐以取之所謂寒熱溫涼反從其病也按張景嶽曰此示人以圓融通變也如始也用奇奇之而病不去此必有未合乃當變而為偶奇偶迭用是曰重方即後世所謂復方也若偶之而又不去則當求其微甚真假而反佐以取之反佐者謂藥同於病而順其性也如以熱治寒而寒拒熱則反佐以寒而入之以寒治熱而熱格寒則反佐以熱而入之又如寒藥熱用借熱以行寒熱藥寒用借寒以行熱是皆反佐變通之妙用蓋欲因其勢而利導之耳王氏注曰夫熱與寒背寒與熱違微小之熱為寒所折微小之冷為熱所消甚大寒熱則必能與違性者爭雄能與異氣者相格聲不同不相應氣不同不相合如是則且憚而不敢攻之攻之則病氣與藥氣抗衡而自為寒熱以關閉固守矣是以聖人反其佐以同其氣令聲氣應合復令寒熱參合使其始同終異燥潤而敗堅剛必折柔脆自消爾帝曰善病生於本余知之矣生於標者治之奈何按生於標者謂感六淫之邪而起也岐伯曰病反其本得標之病治反其本得標之方按謂病既屬標則治亦當從標制方也帝曰善六氣之勝何以候之岐伯曰乘其至也清氣大來燥之勝也風木受邪肝病生焉流於膽也熱氣大來火之勝也金燥受邪肺病生焉流於大腸寒氣大來水之勝也火熱受邪心病生焉流於三焦小腸濕氣大來土之勝也寒水受邪腎病生焉流於膀胱風氣大來木之勝也土濕受邪脾病生焉流於胃所謂感邪而生病也按至自外者謂之來被所不勝謂之受正氣內虛所不勝乘之而為病六淫為邪常如是也乃經但言臟而注則兼言腑蓋臟腑本相配病則俱病耳乘年之虛則邪甚也年木不足外有清邪年火不足外有寒邪年土不足外有風邪年金不足外有熱邪年水不足外有濕邪是年之虛也歲氣不足外邪湊甚失時之和亦邪甚也六氣臨統與位氣相剋感之而病亦隨所不勝而與內臟相應邪復甚也遇月之空亦邪甚也謂上弦前下弦後月輪中空也重感於邪則病危矣年已不足邪氣大至是一感也年已不足天氣克之此時感邪是重感也內氣召邪天氣不祐病不危乎有勝之氣其必來復也天地之氣不能相無故有勝之氣其必來復也按此總疏六氣為邪之有不同也六氣害正每乘勝以臨所勝乃五臟受制於所不勝之常也乘年之虛歲氣不足見制於客以一歲言也失時之和六氣臨御客侮其主以四時言也遇月之空時值衰弱勝者愈勝以一月言也重感於邪故邪未去新邪又乘以一病言也注言邪氣大至又言天氣克之誤矣蓋邪氣即天氣也何謂重感況有勝必復亢害承製六氣之常義見於前帝曰其脈至何如岐伯曰厥陰之至其脈弦耎虛而滑端直以長是謂弦少陰之至其脈鉤來盛去衰如偃帶鉤是謂鉤太陰之至其脈沉沉下也按之乃得下諸位脈也少陽之至大而浮浮高也大謂稍大諸位脈也陽明之至短而澀往來不利是謂澀也往來不遠是謂短也太陽之至大而長往來遠是謂長至而和則平去太甚則為平調不弱不強是謂和也至而甚則病弦似弓弦滑如連珠沉而附骨浮高於皮澀而止住短如麻黍大如帽簪長如引繩皆謂至而太甚也至而反者病應弦反澀應大反細應沉反浮應浮反沉應短澀反長滑應耎虛反實強應細反大是皆為氣反平常之候有病乃如此見也至而不至者病氣位已至而脈氣不應也未至而至者病氣序未移而脈先變易是先天而至故病陰陽易者危不應天常氣見交錯失其恆位更易見之陰位見陽脈陽位見陰脈是易位而見也二氣之亂故危帝曰六氣標本所從不同奈何岐伯曰氣有從本者有從標本者有不從標本者也帝曰願卒聞之岐伯曰少陽太陰從本少陰太陽從本從標陽明厥陰不從標本從乎中也少陽之本火太陰之本濕本末同故從本也少陰之本熱其標陰太陽之本寒其標陽本末異故從本從標陽明之中太陰厥陰之中少陽本末與中不同故不從標本從乎中也從本從標從中皆以其為化主之用也故從本者化生於本從標本者有標本之化從中者以中氣為化也化謂氣化之元主也有病以元主氣用寒熱藥治之按六微旨大論曰所謂本也本之下中之見也見之下氣之標也本標不同氣應異象此之謂也帝曰脈從而病反者其診何如岐伯曰脈至而從按之不鼓諸陽皆然言病熱而脈數按之不動乃寒盛格陽而致之非熱也帝曰諸陰之反其脈何如岐伯曰脈至而從按之鼓甚而盛也形證是寒按之而脈氣鼓擊於手下盛者此為熱盛拒陰而生病非寒也按反者謂陽病脈當浮數而反沉遲陰病脈當沉遲而反浮數如陽證似陰陰證似陽之類是也證陽脈陰久病得之為陽虛氣弱真元太虧法宜溫補暴病得之為氣虛邪陷為陰盛陽微多致危殆證陰脈陽初病得之為暴怒嘔衄為虛火上升猶可滋補久病得之為陰竭陽浮為精血乾稿勞瘵成矣凡若此者病為本反為標診者不可不辨也注言似是而尚未明確是故百病之起有生於本者有生於標者有生於中氣者有取本而得者有取標而得者有取中氣而得者有取標本而得者有逆取而得者有從取而得者逆正順也若順逆也按本寒標熱而即以熱藥治熱本熱標寒而即以寒藥治寒於標誠逆於本正順此從治之妙法也俗工不知此理但泥外迹若本寒標熱而直以寒治熱本熱標寒而直以熱治寒於標似順於本則逆矣可不慎乎故曰知標與本用之不殆明知逆順正行無間此之謂也大要曰粗工嘻嘻以為可知言熱未已寒病復始同氣異形迷診亂經此之謂也按此反復嗟嘆本標之不可不明也蓋本標不明則寒熱誤施矣帝曰勝復之變早晏何如岐伯曰夫所勝者勝至已病病已慍慍而復已萌也夫所復者勝盡而起得位而甚按天地之道消息盈虛循環不已有勝必復自然之理也勝至則病既病而復之機已萌是復即復於勝極之時勝盡復起復氣得令循致於甚復仍勝矣仍勝仍復如環無端勝有微甚復有少多勝和而和勝虛而虛天之常也按復常視勝也帝曰勝復之作動不當位或後時而至其故何也按謂四時有應勝應復之期而時有不應者何故岐伯曰夫氣之生與其化衰盛異也寒暑溫涼盛衰之用其在四維故陽之動始於溫盛於暑陰之動始於清盛於寒春夏秋冬各差其分言春夏秋冬四正之氣在於四維之分也按四序推移時至氣換一歲之中蓋自然之勝復也四維乃交換之際盛則先時衰則後至於交換之際見之故曰在四維也此言勝復之常以時序言前言勝復之變以病氣言然則勝復有二乎曰惟時序之勝復有衰盛之殊故病之勝復有微甚之分二而一者也差七賜切故大要曰彼春之暖為夏之暑彼秋之忿為冬之怒謹按四維斥候皆歸其終可見其始可知此之謂也按暖極則暑忿極則怒其始其終斷可識矣帝曰差有數乎岐伯曰又凡三十度也度者日也按新校正云六元正紀大論曰差有數乎曰後皆三十度而有奇也此云三十度也者此文為略帝曰其脈應皆何如岐伯曰差同正法待時而去也按待時而去義未詳脈要曰春不沉夏不弦冬不澀秋不數是謂四塞按塞閉固不通也人之經脈外應四時則有春弦夏數秋澀冬沉之殊然其氣常周流貫通於上下前後之際如春脈宜弦而其氣則上承於冬下流於夏故春脈弦而兼沉夏脈數中帶弦是上下之氣相通也若由冬交春脈止見弦是上下氣隔閉塞不通矣故春宜弦而沉夏宜數而弦秋宜澀而數冬宜沉而澀否則謂之四塞也王注但解塞字意而不沉不弦等義全未發明愚謂此節之義當與四氣調神論參看沉甚曰病弦甚曰病澀甚曰病數甚曰病按前節言四時之氣不相接續而為患此言四時之脈太過則氣極而為病也參見曰病復見曰病未去而去曰病去而不去曰病參見謂參和諸氣來見復見謂再見已衰已死之氣也去謂王已而去者也日行之度未出於差是謂天氣未出日度過差是謂天氣已去而脈尚在既非得應故曰病也按參見注解太混復見注謂再見已衰已死之氣夫死脈初見便已可危若果再見豈止為病而已蓋參者不一也謂一部之內見數脈也脈象不純焉得不病復見者謂前以某脈而病厥後小瘥前脈又見病根未拔故如是也去未去義誠如王注反者死夏見沉秋見數冬見緩春見澀是謂反也違犯天命其能久乎按新校正云詳上文秋不數是謂四塞此注云秋見數是謂反蓋以脈差只在仲月差之度盡而數不去若秋之季月而脈尚數則為反也此辨最為明確夫陰陽之氣清靜則生化治動則苛疾起此之謂也按六微旨大論曰成敗倚伏生乎動動而不已則變作矣帝曰幽明何如岐伯曰兩陰交盡故曰幽兩陽合明故曰明幽明之配寒暑之異也兩陰交盡於戌亥兩陽合明於辰巳靈樞系日月論云亥十月左足之厥陰戌九月右足之厥陰此兩陰交盡故曰厥陰辰三月左足之陽明巳四月右足之陽明此兩陽合於前故曰陽明然陰交則幽陽合則明幽明之象當如是也寒暑位西南東北幽明位西北東南幽明之配寒暑之位誠斯異也帝曰分至何如岐伯曰氣至之謂至氣分之謂分至則氣同分則氣異所謂天地之正紀也因幽明之問而形斯義也言冬夏二至是天地氣主歲至其所在也春秋二分是間氣初二四五四氣各分其政於主歲左右也帝曰夫子言春秋氣始於前冬夏氣始於後余已知之矣然六氣往復主歲不常也其補瀉奈何以分至明六氣分位則初氣四氣始於立春立秋前各一十五日為紀法三氣六氣始於立夏立冬後各一十五日為紀法由是四氣前後之紀則三氣六氣之中正當二至日也故曰春秋氣始於前冬夏氣始於後也然以三百六十五日易一氣一歲已往氣則改新新氣既來舊氣復去所宜之味天地不同補瀉之方應知先後故復以問也岐伯曰少陽之主先甘後咸陽明之主先辛後酸太陽之主先咸後苦厥陰之主先酸后辛少陰之主先甘後咸太陰之主先苦後甘佐以所利資以所生是謂得氣主謂主歲得謂得其性用也得其性用則舒捲由人不得性用則動生乖忤豈祛邪之可望乎帝曰善夫百病之生也皆生於風寒暑濕燥火以之化之變也風寒暑濕燥火天之六氣也靜而順者為化動而變者為變故曰之化之變也經言盛者瀉之虛者補之余錫以方士而方士用之尚未能十全余欲令要道必行桴鼓相應猶拔刺雪汙工巧神聖可得聞乎針曰工巧藥曰神聖按難經云望而知之謂之神聞而知之謂之聖問而知之謂之工切脈而知之謂之巧以外知之曰聖以內知之曰神岐伯曰審察病機無失氣宜此之謂也按人之致病各有其機機之所動氣類分焉審切其宜斯無失矣張景嶽曰按氣交變五常政至真要等論皆詳言五運六氣各有太過不及而天時民病變必因之故有淫勝反勝客勝主勝之異蓋氣太過則亢極而實氣不及則被侮而虛此陰陽盛衰自然之理也此節於本篇之末統論病機謂臟五氣六各有所主或實或虛無不從氣之變而病有不同也即如諸風掉眩皆屬於肝矣若木勝則四肢強直而為掉風動於上而為眩脾土受邪肝之實也木衰則血不養筋而為掉氣虛於上而為眩金邪乘木肝之虛也又如諸痛癢瘡皆屬於心矣若火盛則熾熱為癰心之實也陽衰則陰勝為疽心之虛也五臟六氣虛實皆然故本篇首言盛者瀉之虛者補之末言有者求之無者求之盛者責之虛者責之蓋既以氣宜言病機矣又特以盛虛有無四字貫一篇之首尾以盡其義此正先聖心傳精妙所在最為吃緊綱領奈何劉河間未之詳審略其顛末獨取其中一十九條演為原病式皆偏言盛氣實邪且於十九條中凡歸重於火者十之七八至於不及虛邪則全不相顧又曰其為治者但當瀉其過甚之氣以為病本不可反誤治其兼化也立言若此虛者何堪故樓氏指其治法之偏誠非過也夫病機為入道之門為跬步之法法既不善局人耳目初學得之多致終身不能超脫習染已久流弊日深所以近代醫家舉動皆河間遺風其於瀉假熱伐真虛復人於反掌間者比比然也或諱之曰河間當胡元之世其風聲氣習本有不同因時制宜故為是論即或有之乃世變風移今非昔比設欲率由其舊恐冰炭鉤繩不相符也心切憫之不容不辨謹按河間談理自是明徹但嫌原病式所言惟順文解釋都説向實熱一邊而無所發明所以滋後人之議立言之家貴中正有以也景嶽此辨原本虛實考驗真假病機氣宜兩得之矣但其大意又似側重虛寒上去使後人迹而泥之必致矯枉過直吾恐將來之烏附桂薑亦猶昔日之芩連梔柏其受誣也不誠冤哉陰陽應象論曰善診者察色按脈先別陰陽醫不細心體認誠能如經之所言則色脈混淆陰陽倒置宗河間者既虛虛遵景嶽者必實實甚矣醫家之不可有成見也帝曰願聞病機何如岐伯曰諸風掉眩皆屬於肝按張景嶽曰風類不一故曰諸風掉搖也眩運也風主動搖木之化也故屬於肝其虛其實皆能致此如發生之紀其動掉眩巔疾厥陰之復筋骨掉眩之類者肝之實也又如陽明司天掉振鼓栗筋痿不能久立者燥金之盛肝受邪也太陰之復頭頂痛重而掉瘛尤甚者木不制土濕氣反勝皆肝之虛也故衛氣篇曰下虛則厥上虛則眩亦此之謂凡實者宜涼宜瀉虛則宜溫宜補反而為之禍不旋踵矣余治仿此諸寒收引皆屬於腎收斂也引急也腎屬水其化寒凡陽氣不達則營衛凝聚形體拘攣皆收引之謂如太陽之勝為筋肉拘苛血脈凝泣歲水太過為陰厥為上下中寒水之實也歲水不及為足痿清厥涸流之紀其病癃閉水之虛也水之虛實皆本於腎諸氣膹郁皆屬於肺膹喘急也郁痞悶也肺屬金其化燥燥金盛則清邪在肺而肺病有餘如歲金太過甚則喘咳逆氣之類是也金氣衰則火邪勝之而肺病不足如從革之紀其發喘咳之類是也肺主氣故諸氣膹郁者其虛其實皆屬於肺謹按景嶽言化燥誤矣夫肺與大腸為表裡並屬金然肺主辛陰金耳陽明大腸屬庚陽金也其化乃得謂之燥六氣燥金居其一正指大腸非肺也曰然則肺金獨無化乎曰清肅是矣膹音憤諸濕腫滿皆屬於脾脾屬土其化濕土氣實則濕氣盛行如歲土太過則飲發中滿食減四肢不舉之類是也土氣虛則風木乘之寒水侮之如歲木太過脾土受邪民病腸鳴腹支滿卑監之紀其病留滿痞塞歲水太過甚則腹大脛腫之類是也脾主肌肉故諸濕腫滿等證其虛實皆屬於脾也諸痛癢瘡皆屬於心熱甚則瘡痛熱微則瘡癢心屬火其化熱故諸痛癢瘡皆屬心也然赫曦之紀其病瘡瘍心邪盛也太陽司天亦發為癰瘍寒水勝也火盛則心實水勝則心虛於此可見按此條古本在諸熱瞀瘛之下今挈置於此合上文也諸熱瞀瘛皆屬於火瞀昏悶也瘛抽掣也邪熱傷神則瞀亢陽傷血則瘛故皆屬於火然歲火不及則民病兩臂內痛鬱冒曚昧歲水太過則民病身熱煩心躁悸渴而妄冒此又火之所以有虛實也瞀音茂瘛音翅諸厥固泄皆屬於下厥逆也厥有陰陽二證陽衰於下則為寒厥陰衰於下則為熱厥固前後不通也陰虛則無氣無氣則清濁不化寒閉也火盛則水虧水虧則精液乾涸熱結也泄二陰不固也命門火衰則陽虛不禁寒泄也命門水衰則火迫注遺熱泄也下言腎氣蓋腎居五臟之下為水火陰陽之宅開竅於二陰故諸厥固泄皆屬於下諸痿喘嘔皆屬於上痿有筋肉脈骨痿之辨故曰諸痿凡肢體痿弱多在下部而曰屬於上者如痿論云五臟使人痿者因肺熱葉焦發為痿躄也肺居上焦故屬於上氣急曰喘病在肺也吐而有物有聲曰嘔病在胃口也逆而不降是皆上焦之病諸禁鼓栗如喪神守皆屬於火禁噤也寒厥咬牙曰噤鼓鼓頷也栗戰也凡病寒戰而精神不能主持如喪失神守者皆火之病也然火有虛實之辨若表裡熱甚而外生寒栗者如陰陽應象大論所謂熱極生寒重陽必陰也河間曰心火熱甚亢極而戰反兼水化制之故為寒栗者皆言火之實也若陰盛陽虛而生寒栗者如調經論曰陽虛畏外寒刺節真邪論曰陰勝則為寒寒則真氣去去則虛虛則寒搏於皮膚之間者皆言火之虛也有傷寒將解而為戰汗者如仲景曰其人本虛是以作戰成無己曰戰栗者陰陽之爭也傷寒欲解將汗之時正氣內實邪不能與之爭則便汗出而不發戰邪氣欲出其人本虛邪與正爭微者為振甚者為戰皆言傷寒之戰汗必因於虛也有痎瘧之為寒栗者如瘧論曰瘧之始發也陽氣並於陰當是之時陽虛而陰盛外無氣故先寒栗也夫瘧氣者並於陽則陽勝並與陰則陰勝陰勝則寒陽勝則熱又曰陽並於陰則陰實而陽虛陽明虛則寒栗鼓頷也由此觀之可見諸禁鼓栗雖皆屬火但火實者少火虛者多耳諸痙項強皆屬於濕痙風強病也項為足之太陽濕兼風化而侵寒水之經濕之極也然太陽所至為屈伸不利太陽之復為腰脽反痛屈伸不便者是又為寒水反勝之虛邪矣痙音敬諸逆衝上皆屬於火火性炎上故諸逆衝上者皆屬於火然諸臟諸經皆有逆氣則其陰陽虛實有不同矣其在心脾胃者如脈解篇曰太陰所謂上走心為噫者陰盛而上走於陽明陽明絡屬心故曰上走心為噫也有在肺者如臟氣法時論曰肺苦氣上逆也有在脾者如經脈篇曰足太陰厥氣上逆則霍亂也有在肝者如脈要精微論曰肝脈若搏令人喘逆也有在腎者如脈解篇曰少陰所謂嘔咳上氣喘者陰氣在下陽氣在上諸陽氣浮無所倚從也又繆刺篇曰邪客於足少陰之絡令人無故善怒氣上走賁上又示從容論曰咳喘煩冤者是腎氣之逆也又邪氣臟腑病形篇曰腎脈微緩為洞洞者食不化下咽還出也有在胃者如宣明五氣篇曰胃為氣逆為噦也又陰陽別論曰二陽之病發心脾其傳為息賁也有在膽胃者如四時氣篇曰善嘔嘔有苦長太息心中憺憺恐人將捕之邪在膽逆在胃也有在小腸者曰少腹控睪引腰脊上衝心也有在大腸者曰腹中常鳴氣上衝胸喘不能久立也又繆刺論曰邪客手陽明之絡令人氣滿胸中喘息也有在膀胱者如經脈別論曰太陽臟獨至厥喘虛氣逆是陰不足陽有餘也有在沖督者如骨空論曰衝脈為病逆氣裡急督脈生病從少腹上衝心而痛不得前後為沖疝也凡此者皆諸逆上衝之病雖經言皆屬於火但陽盛者火之實陽衰者火之虛治分補瀉當於此詳察之矣諸脹腹大皆屬於熱熱氣內盛者在肺則脹於上在脾胃則脹於中在肝腎則脹於下此以火邪所至乃為煩滿故曰諸脹腹大皆屬於熱如歲火太過民病脅支滿少陰司天肺䐜腹大滿膨膨而喘咳少陽司天身面胕腫腹滿仰息之類皆實熱也然歲水太過民病腹大脛腫歲火不及民病脅支滿胸腹大流衍之紀其病脹水鬱之發善厥逆痞堅腹脹太陽之勝腹滿食減陽明之復為腹脹而泄又如五常政大論曰適寒涼者脹異法方宜論曰臟寒生滿病經脈篇曰胃中寒則脹滿是皆言熱不足寒有餘也仲景言腹滿不減減不足言須當下之宜與大承氣湯言實脹也腹脹時減復如故此為寒當與溫藥言虛脹也東垣曰大抵寒脹多熱脹少豈虛語哉故治此者不可以諸脹腹大悉認為實熱而不察其盛衰之義也諸躁狂越皆屬於火躁煩躁不寧也狂狂亂也越失常度也熱盛於外則肢體躁擾熱盛於內則神志躁煩蓋火入於肺則煩火入於腎則躁煩為熱之輕躁為熱之甚耳如少陰之勝心下熱嘔逆躁煩少陽之復心熱煩躁便數憎風之類是皆火盛之躁也然有所謂陰躁者如歲木太過寒氣流行邪害心火民病心熱煩心躁悸陰厥譫妄之類陰之勝也是為陰盛發躁名曰陰躁成無己曰雖躁欲坐井中但欲水不得入口是也東垣曰陰躁之極欲坐井中陽已先亡醫猶不悟復指為熱重以寒藥投之其死也何疑焉蓋寒涼之劑入腹周身之火得水則升走矣且凡內熱而躁者有邪之熱也病多屬火外熱而躁者無根病多屬寒此所以熱躁宜寒陰躁宜熱也狂陽病也宣明五氣篇曰邪入於陽則狂難經曰重陽者狂如赫曦之紀血流狂妄之類陽狂也然復有虛狂者如本神篇曰肝悲哀動中則傷魂魂傷則狂妄不精肺喜樂無極則傷魄魄傷則狂狂者意不存人通天論曰陽重脫者陽狂腹中論曰石之則陽虛虛則狂是又狂之有虛實補瀉之不可誤用也諸暴強直皆屬於風暴猝也強直筋病強徑不和柔也肝主筋其化風風氣有餘如木鬱之發善暴僵仆之類肝邪實也風氣不足如委和之紀其動緛戾拘緩之類肝氣虛也此皆肝木本氣之化故曰屬風非外來虛風八風之謂凡諸病風而筋為強急者正以風位之下金氣乘之燥逐風生其燥益甚治宜補陰以制陽養營以潤燥故曰治風先治血血行風自滅此最善之法也設誤認為外感之邪而用疏風愈風等劑則益燥其燥非惟不能去風而適所以致風矣諸病有聲鼓之如鼓皆屬於熱鼓之如鼓脹而有聲也為陽氣所逆故屬於熱然師傅篇曰胃中寒則腹脹腸中寒則腸鳴飧泄口問篇曰中氣不足腸為之苦鳴此又皆寒脹之有聲者也諸病胕腫疼酸驚駭皆屬於火胕腫浮腫也胕腫疼酸者陽實於外火在經也驚駭不寧者熱乘陰分火在臟也故如少陰少陽司天皆為瘡瘍胕腫之類是火之實也然伏明之紀其發痛太陽司天為胕腫身後癰太陰所至為重胕腫太陽在泉寒復內余則腰尻股脛足膝中痛之類皆以寒濕之勝而為腫為痛是又火之不足也至於驚駭虛實亦然如少陰所至為驚駭君火盛也若委和之紀其發驚駭陽明之復亦為驚駭此又以木衰金勝肝膽受傷火無生氣陽虛所致當知也胕音附諸轉反戾水液渾濁皆屬於熱諸轉反戾轉筋拘攣也水液小便也河間曰熱氣燥爍於筋則攣瘛為痛火主燔灼燥動故也小便渾濁者天氣熱則水渾濁寒則清潔水體清而火體濁故也又如清水為湯則自然濁也此所謂皆屬於熱宜用寒者是也然其中亦各有虛實之不同者如傷暑霍亂而為轉筋之類宜用甘涼調和等劑清其亢烈之火者熱之屬也如感冒非時風寒或因暴雨之後濕毒中臟而為轉筋霍亂宜用辛溫等劑理中氣以逐陰邪者寒之屬也大抵熱勝者必多煩躁焦渴寒勝者必多厥逆畏寒故太陽之至為痙太陽之復為腰脽反痛屈伸不便水鬱之發為大關節不利是皆陽衰陰勝之病也水液之濁雖為屬火然思慮傷心勞倦傷脾色欲傷腎三陰虧損者多有是病治宜慎起居節勞欲陰虛者壯其水陽虛者益其氣金水既足便當自清若用苦寒病必益甚故玉機真臟論曰冬脈不及則令人少腹滿小便變口問篇曰中氣不足溲便為之變陰陽盛衰義有如此又豈可盡以前證為實熱謹按三陰虧損之人便多渾濁者何蓋由陰虛水虧不勝制火火愈盛則水愈虧故令色黃赤而渾濁如汪洋之水必澄清溝渠之水必渾濁也俗醫不識陰陽虛實之理但見渾濁便用苦寒以致真氣冰凝不能化水孤陽無制而死殊可嘆也諸病水液澄徹清冷皆屬於寒水液者上下所出皆是也水體清其氣寒故凡或吐或利水穀不化而澄徹清冷者皆得寒水之化如秋冬寒冷水必澄清也諸嘔吐酸暴注下迫皆屬於熱河間曰胃膈熱甚則為嘔火氣炎上之象也酸者肝木之味也由火盛制金不能平木則肝木自甚故為酸也暴注卒暴注泄也腸胃熱甚而傳化失常火性疾速故如是也下迫後重裡急窘迫急痛也火性急速而能燥物故也是皆就熱為言耳至於陰陽盛衰則變如冰炭胡可偏執為論如舉病論曰寒氣客於腸胃厥逆上出故痛而嘔也至真要等論曰太陽司天民病嘔血善噫太陽之復心胃生寒胸中不和唾出清水及為噦噫太陽之勝寒入下焦傳為濡泄之類是皆寒勝之為病也又如歲木太過民病飧泄腸鳴反脅痛而吐甚發生之紀其病吐利之類是皆木邪乘土脾虛病也又如歲土不及民病飧泄霍亂土鬱之發為嘔吐注下太陰所至為霍亂吐下之類是皆濕勝為邪脾家本病有濕多成熱者有寒濕同氣者濕熱宜清寒濕宜溫無失氣宜此之謂也至於吐酸一證在本節則明言屬熱又如少陽之勝為嘔酸亦相火證也此外別無因寒之説惟東垣曰嘔吐酸水者甚則酸水浸其心其次則吐出酸水令上下牙酸澀不能相對以大辛熱劑療之必減酸味者收氣也西方肺金旺也寒水乃金之子子能令母實故用大咸熱之劑瀉其子以辛熱為之佐以瀉肺之實若以河間病機之法作熱攻之者誤矣蓋雜病酸心濁氣不降欲為中滿寒藥豈能治之乎此東垣之説獨得前人所未發也又丹溪曰或問吞酸素問明以為熱東垣又以為寒何也曰素問言熱者言其本也東垣言寒者言其末也但東垣不言外得風寒而作收氣立説欲瀉肺金之實又謂寒藥不可治酸而用安胃湯加減二陳湯俱犯丁香且無治熱濕鬱積之法為未合經旨余嘗治吞酸用黃連茱萸各制炒隨時令迭為佐使蒼朮茯苓為輔湯浸蒸餅為小丸吞之仍教以糲食蔬果自養則病亦安此又二公之説有不一也若以愚見評之則吞酸雖有寒熱但屬寒者多屬熱者少故在東垣則全用溫藥在丹溪雖用黃連而亦不免茱萸蒼朮之類其義可知蓋凡飲留中焦郁久成積濕多生熱則木從火化因而作酸者酸之熱也當用丹溪之法若客寒犯胃頃刻成酸本非鬱熱之謂明是寒氣若用清涼豈其所宜又若飲食或有失節及無故而為吞酸噯腐等證此以木味為邪肝乘脾也脾之不化火之衰也得熱則行非寒而何欲不溫中其可得乎故余願為東垣之左袒而特表出之欲人之視此者不可謂概由乎實熱僅按病機一十九條所言多是火熱其屬寒者才一條耳詳味經旨非偏實熱而略虛寒也蓋以人之為病多由六淫即或內虛無感不發是風火寒濕者乃致病之機栝故曰病機也病機既肇變化無窮矣或實或虛或熱或寒或真熱而假寒或真寒而假熱此固非本條之所能盡載而雜見於諸篇惟恃善治者為能參觀而互用之也乃完素但順文解釋以致後人有諸病皆起於火之説惟景嶽以經解經使虛實寒熱之理並行而不背可謂旁通曲暢矣但於病機所言偏於實熱之故尚未拈出以故深咎夫劉氏而願左肀百百皿東垣也悲夫故大要曰謹守病機各司其屬有者求之無者求之盛者責之虛者責之必先五勝疏其血氣令其調達而致和平此之謂也深乎聖人之言理宜然也有無求之虛盛責之言悉由也夫如大寒而甚熱之不熱是無火也熱來復去晝見夜伏夜發晝止時節而動是無火也當助其心又如大熱而甚寒之不寒是無水也熱動復止倏忽往來時動時止是無水也當助其腎內格嘔逆食不得入是有火也病嘔而吐食久反出是無火也暴速注下食不及化是有火也溏泄而久止發無恆是無火也故心盛則生熱腎盛則生寒腎虛則寒動於中心虛則熱收於內又熱不得寒是無火也寒不得熱是無水也夫寒之不寒責其無水熱之不熱責其無火熱之不久責心之虛寒之不久責腎之少有者瀉之無者補之虛者補之盛者瀉之居其中間疏其壅塞令上下無礙血氣通調則寒熱自和陰陽調達矣是以方有治熱以寒寒之而水食不入攻寒以熱熱之而昏躁以生是則氣不疏通壅而為是也紀於水火餘氣可知故曰有者求之無者求之盛者責之虛者責之令氣條達道之妙也五勝謂五行更勝也先以五行寒暑溫涼濕酸鹹甘辛苦相勝為法也按張景嶽曰有者言其實無者言其虛求之者求有無之本也譬猶尋物一般必得其所取之則易如太陰雨化施於太陽太陽寒化施於少陰少陰火化施於陽明陽明燥化施於厥陰厥陰風化施於太陰凡淫勝在我者我之實也實者真邪也反勝在彼者我之虛也虛者假邪也此六氣之虛實即所謂有無也然天地運氣雖分五六而陰陽之用水火而已故陽勝則陰病陰勝則陽病瀉其盛氣責其實也培其衰氣責其無也設不明逆順虛實之道未免實實虛虛遺人害矣帝曰善五味陰陽之用何如岐伯曰辛甘發散為陽酸苦湧泄為陰鹹味湧泄為陰淡味滲泄為陽六者或收或散或緩或急或燥或潤或耎或堅以所利而行之調其氣使其平也湧吐也泄利也滲泄小便也言水液自回腸泌別汁滲入膀胱之中自胞氣化之而為溺以泄出也按辛甘酸苦鹹五味也五味之外又有淡淡居五味之先其氣輕清故主滲泄所以泄五味之滯者也合而言之有六者分而言之則各有所利隨其所利而行之病氣可調也然辛甘主發散淡味主滲泄均屬之陽易明也其酸苦鹹味之均屬陰亦易明也而並主湧泄者何故夫湧者吐也泄者利也病之欲吐欲利者多是有物鬱積於中酸性收斂而屬木故能斂所積之物而上湧苦性屬寒而逐火故能驅所積之物而下泄若夫咸則又能耎堅而潤燥故上以湧痰積於胸喉下以泄垢移於腸胃各有所利在乎行之者耳帝曰非調氣而得者治之奈何有毒無毒何先何後願聞其道夫病生之類有四焉一者始因氣動而內有所成二者不因氣動而外有所成三者始因氣動而病生於內四者不因氣動而病生於外夫因氣動而內成者謂積聚癥瘕瘤氣癭氣結核癲癇之類也外成者謂癰腫瘡瘍痂疥疽痔掉瘛浮腫目赤瘭疹胕腫痛癢之類也不因氣動而病生於內者謂留飲澼食飢飽勞損宿食霍亂悲恐喜怒想慕憂結之類也生於外者謂瘴氣賊魅蟲蛇蠱毒蜚尸鬼擊沖薄墜墮風寒暑濕砍射刺割捶撲之類也如是四類有獨治內而愈者有兼治內而愈者有獨治外而愈者有兼治外而愈者有先治內後治外而愈者有先治外後治內而愈者有須齊毒而攻擊者有須無毒而調引者凡此之類方法所施或重或輕或緩或急或收或散或潤或燥或耎或堅方士之用見解不同各擅己心好丹非素故復問之也按病生之類王注言之詳矣然是泛論治因之法非解經也夫所謂非調氣而得者謂上文收散緩急八者乃調氣之法言此外更有治法否岐伯曰有毒無毒所治為主適大小為制也言但能破積愈疾解急脫死則為良方非必要言以先毒為是後毒為非無毒為非有毒為是必量病輕重大小制之者也帝曰請言其制岐伯曰君一臣二制之小也君一臣三佐五制之中也君一臣三佐九制之大也寒者熱之熱者寒之微者逆之甚者從之夫病之微小者猶人火也遇草而焫得木而燔可以濕伏可以水滅故逆其性氣以折之攻之病之大甚者猶龍火也得濕而焰遇水而燔不知其性以水濕折之適足以光焰詣天物窮方止矣識其性者反常之理以火逐之則燔灼自消焰光撲滅然逆之謂以寒攻熱以熱攻寒從之謂攻以寒熱雖從其性用不必皆同是以下文曰逆者正治從者反治從少從多觀其事也此之謂乎按張景嶽曰病之微者如陽病則熱陰病則寒真形易見其病則微故可逆之逆即上文之正治也病之甚者如熱極反寒寒極反熱假證難辨其病則甚故當從之從即下文之反治也堅者削之客者除之勞者溫之結者散之留者攻之燥者濡之急者緩之散者收之損者益之逸者行之驚者平之上之下之摩之浴之薄之劫之開之發之適事為故按堅者積塊也客者外邪也除之謂表而驅之也溫之謂溫養之也舉痛論言勞則氣耗氣既耗矣若更用寒涼則凝滯而害益甚故必溫養為宜也逸奔逸也內亂欲出導之使行也平有二義一謂抑其有餘一謂安其潰亂也上下吐利也摩按摩所以運其澀滯也浴澡浴所以洗濯垢穢也薄者搜蘊蓄之邪劫者奪強盛之勢也適事為故謂病必有故有故則有事適其當行之事而知其故矣帝曰何謂逆從岐伯曰逆者正治從者反治從少從多觀其事也按張景嶽曰以寒治熱以熱治寒逆其病者謂之正治以寒治寒以熱治熱從其病者謂之反治從少謂一同而二異從多謂二同而一異必觀其事之輕重而為之增損然則宜於全反者自當盡同無疑矣又治有逆從者以病有微甚病有微甚者以證有真假也寒熱有真假虛實亦有真假真者正治治之無難假者反治乃為難耳如寒熱之真假者真寒則脈沉而細或弱而遲為厥逆為嘔吐為腹痛為飧泄下利為小便清頻即有發熱必欲得衣此浮熱在外而沉寒在內也真熱則脈數有力滑大而實為煩躁喘滿為音聲壯厲或大便祕結或小水赤澀或發熱掀衣或脹痛熱渴此皆真病真寒者宜溫其寒真熱者宜解其熱是當正治者也至若假寒者陽證似陰火極似水也外雖寒而內則熱脈數而有力或沉而鼓擊或身寒惡衣或便熱結祕或煩渴引飲或腸垢臭穢此則惡寒非寒明是熱證所謂熱極反兼寒化亦曰陽盛隔陰也假熱者陰證似陽水極似火也外雖熱而內則寒脈微而弱或數而虛或浮大而無根或弦芤而斷續身雖熾熱而神則靜語雖譫妄而聲則微或虛狂起倒而禁之即止或蚊迹假斑而淺紅細碎或喜冷水而實飲不多或舌苔面赤而衣被不撤或小水多利或大便溏滑此則惡熱非熱明是寒證所謂寒極反兼熱化亦曰陰盛隔陽也此皆假病假寒者清其內熱內清則浮陰退舍矣假熱者溫其真陽中溫則虛火歸原矣是當從治者也又如虛實之治實則瀉之虛則補之此不易之法也然至虛有盛候則有假實矣大實有羸狀則有假虛矣總之虛者正氣虛也為色慘形疲為神衰氣怯或自汗不收或二便失禁或夢遺精滑或嘔吐隔塞或病久攻多或氣短似喘或勞傷過度或暴困失志雖外證似實而脈弱無神者皆虛證之當補也實者邪氣實也或外閉於經絡或內結於臟腑或氣壅而不行或血留而滯凝必脈證俱盛者乃實證之當攻也是虛實之間最多疑似有不可不辨其真耳如通評虛實論曰邪氣盛則實精氣奪則虛此虛實之大法也設有人焉正已奪而邪方盛者將顧其正而補之乎抑先其邪而攻之乎見有不的則生死系之此其所以宜慎也夫正者本也邪者標也若正氣既虛邪氣雖盛亦不可攻蓋恐邪未去而正先脫呼吸變生則措手無及故治虛邪者當先顧正氣正氣存則不致於害且補中自有攻意蓋補陰即所以攻熱補陽即所以攻寒世未有正氣復而邪不退者亦未有正氣竭而命不傾者如必不得已亦當酌量緩急暫從權宜從少從多寓戰於守斯可矣此治虛之道也若正氣無損者邪氣雖微自不宜補蓋補之則正無與而邪反盛適足以藉寇兵而資盜糧故治實證者當直去其邪邪去則身安此治實之道也要之能勝攻者方是實證實者可攻何慮之有不能勝攻者便是虛證氣去不返可不寒心此邪正之辨不可不知也惟是假虛之證不多見而假實之證最多也假寒之證不難治而假熱之證易誤也然實者多熱虛者多寒如丹溪曰氣有餘便是火故實能受寒而余續之曰氣不足便是寒故虛能受熱世有不明真假本末而曰知醫者余則未敢許也景嶽先生此論明白暢快正治從治之法無遺議矣真是羽翼聖經而補啓玄之所未及其功偉哉帝曰反治何謂岐伯曰熱因寒用寒因熱用塞因塞用通因通用必伏其所主而先其所因其始則同其終則異可使破積可使潰堅可使氣和可使必已按張景嶽曰熱因寒用者如大寒內結當治以熱然寒甚格熱熱不得前則以熱藥冷服下咽之後冷體既消熱性便發情且不違而致大益此熱因寒用之法也寒因熱用者如大熱在中以寒攻治則不入以熱攻治則病增乃以寒藥熱服入腹之後熱氣既消寒性遂行情且協和而病以減此寒因熱用之法也如五常政大論云治熱以寒溫而行之治寒以熱涼而行之亦寒因熱用熱因寒用之義塞因塞用者如下氣虛乏中焦氣壅欲散滿則更虛於下欲補下則滿甚於中治不知本而先攻其滿藥入或減藥過依然氣必更虛病必漸甚乃不知少服則資壅多服則宣通峻補其下以疏啓其中則下虛自實中滿自除此塞因塞用之法也通因通用者如大熱內蓄或大寒內凝積聚留滯瀉利不止寒滯者以熱下之熱滯者以寒下之此通因通用之法也以上四治必伏其所主者制病之本也先其所因者求病之由也既得其本而以真治真以假治假其始也類治似同其終也病變則異矣是為反治之法故可使破積潰堅氣和而病必已也謹按此景嶽合王注及新校正等注潤飾而成者更為清順故録之塞入聲帝曰善調氣而得者何如岐伯曰逆之從之逆而從之從而逆之疏氣令調則其道也按景嶽曰氣調而得者言氣本調和而偶感於病則或因天時或因意料之外者也若其治法亦無過逆從而已或可逆者或可從者或先逆而後從者或先從而後逆者但疏其邪氣而使之調和則治道盡矣帝曰善病之中外何如岐伯曰從內之外者調其內從外之內者治其外各絶其源從內之外而盛於外者先調其內而後治其外從外之內而盛於內者先治其外而後調其內皆謂先除其根屬後削其枝條也中外不相及則治主病中外不相及自各一病也按陰陽應象大論曰治病必求於本本者病之所起者是也先本後末治病之次序不可不知也帝曰論言治寒以熱治熱以寒而方士不能廢繩墨而更其道也有病熱者寒之而熱有病寒者熱之而寒二者皆在新病復起奈何治按此問治之誤者蓋但知正治而不知從治者也嗟乎彼所謂拘繩守墨者乃其廢繩徹墨者也岐伯曰諸寒之而熱者取之陰熱之而寒者取之陽所謂求其屬也言益火之原以消陰翳壯水之主以制陽光故曰求其屬也夫粗工褊淺學未精深以熱攻寒以寒療熱治熱未已而冷疾已生攻寒日深而熱病更起熱起而中寒尚在寒生而外熱不除欲攻寒則懼熱不前欲療熱則思寒又止進退交戰危亟已臻豈知臟腑之源有寒熱溫涼之主哉取心者不必齊以熱取腎者不必齊以寒但益心之陽寒亦通行強腎之陰熱之猶可觀斯之故或治熱以熱治寒以寒萬舉萬全嗚呼人之死者豈非方士愚昧殺之耶按益火之原以消陰翳二語治法之精義也發前人所未發為後學之津梁偉哉啓玄爼豆萬世宜矣張景嶽曰諸寒之而熱者謂以苦寒治熱而熱反增非火之有餘乃真陰之不足也陰不足則陽有餘而為熱故當取之於陰謂不宜治火也只補陰以配陽則陰氣復而熱自退矣熱之而寒者謂以辛熱治寒而寒反甚非寒之有餘乃真陽之不足也陽不足則陰有餘而為寒故當取之於陽謂不宜攻寒也但補水中之火則陽氣復而寒自消也景嶽此注最為明確蓋陰翳本於無火故欲益火之原所謂原者右腎是也陽光起於無水故當壯水之主所謂主者左腎是也或以肝為原肺為主誤矣帝曰善服寒而反熱服熱而反寒其故何也按前問治之誤此問誤之所以也岐伯曰治其王氣是以反也按陰虛則陽王陽虛則陰王陽王則火盛陰王則寒盛是王氣者內虛之偏氣外形之假象也俗工不解其故但見寒盛於外者便用辛溫豈知辛溫耗氣氣耗而寒愈生但見火盛於外者單用苦寒豈知苦寒泄陰陰泄而火愈熾是反熱反寒之故正由專治王氣於外而然也張景嶽曰如夏令本熱而伏陰在內故每多中寒冬令本寒而伏陽在內故每多內熱設不知此而必欲用寒於夏治火之王用熱於冬治寒之王則有中寒隔陽者服寒反熱中熱隔陰者服熱反寒矣此皆治王之故也春秋同帝曰不治王而然者何也岐伯曰悉乎哉問也不治五味屬也夫五味入胃各歸所喜故酸先入肝苦先入心甘先入脾辛先入肺咸先入腎久而增氣物化之常也氣增而久夭之由也按不治王而然謂非治寒熱於外而亦反見寒熱者蓋藥食五味各有所屬其有所屬者以各有所喜也如肝喜酸則酸先入肝以至腎喜咸則咸先入腎入之不已久而偏矣偏用既久熱多變寒寒多變熱臟氣偏勝化為夭折以此言治皆由不知五味所屬之所致故亦欲去寒而反寒欲去熱而反熱也是誤投藥餌之害與誤認脈證之害厥咎均矣舊本各歸所喜攻今詳攻字之義殊不可解當是故字之訛也宜讀連下文為是帝曰善方制君臣何謂也岐伯曰主病之謂君佐君之謂臣應臣之謂使非上下三品之謂也按張景嶽曰主病者對證之要藥也故謂之君君藥味數少而分兩重賴之以為主也佐君者謂之臣味數稍多而分兩稍輕所以匡君之不逮也應臣者謂之使數可出入而分兩更輕所以備通行嚮導之使也此則君臣佐使之義非上下三品如下文善惡殊貫之謂帝曰三品何謂岐伯曰所以明善惡之殊貫也前言方制言處方之制故有君臣佐使此言三品言藥性善惡故有上中下之殊新校正言神農云上藥為君主養命以應天中藥為臣主養性以應人下藥為佐使主治病以應地竊疑此必非神農語也夫藥品雖有上中下之殊其善其惡總以治病而保人之性命何乃強分若是哉林億張景嶽俱未之思耳帝曰善病之中外何如按前問病之中外伯所答者惟標本之義此再問者蓋欲明治法之詳也岐伯曰調氣之方必別陰陽定其中外各守其鄉內者內治外者外治微者調之其次平之盛者奪之汗之下之寒熱溫涼衰之以屬隨其攸利按張景嶽曰方法也陰陽之道凡病治脈藥皆有關係故必當詳別之中外表裡也微者調之謂小寒之氣和之以溫小熱之氣和之以涼也其次平之謂大寒之氣平之以熱大熱之氣平之以寒也盛者奪之謂邪之甚者當直攻而取之如甚於外者汗之甚於內者下之凡宜寒宜熱宜溫宜涼當各求其屬以衰去之惟隨其所利而已謹道如法萬舉萬全氣血正平長有天命帝曰善守道以行舉無不中故能驅役草石召遣神靈調御陰陽蠲除衆疾氣血保平和之候天真無耗竭之由夫如是者蓋以舒捲在心去留從意故精神內守壽命靈長
