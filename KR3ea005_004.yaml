body:
  text: 卷之四天元紀大論天者道也元者大也天元紀者紀天之大道也天有六氣地有五行天符應天歲直承歲應合不合千變萬化盛衰分焉損益見焉人物由此而生亦由此而病大矣哉其此論乎黃帝問曰天有五行御五位以生寒暑燥濕風人有五臟化五氣以生喜怒思憂恐論言五運相襲而皆治之終期之日周而復始余已知之矣願聞其與三陰三陽之候奈何合之鬼臾區稽首再拜對曰昭乎哉問也夫五運陰陽者天地之道也萬物之綱紀變化之父母生殺之本始神明之府也可不通乎按帝所問與區所對文義皆與六節臟象及陰陽應象諸論相同大約俱言天地萬物之道無一不本於陰陽而註解彼此不同何也故物生謂之化物極謂之變陰陽不測謂之神神用無方謂之聖按化者物之始生自無而之有變者物之窮極自有而之無蓋萬物之始終也神則無運用之跡聖則絕擬議之形自以變化無方而眾莫得而測蓋天人之極則也夫變化之為用也在天為玄在人為道按天體無形故嘗玄妙而難窮人形有象故必遵道以為用在地為化按分形賦質品物咸章造化之功地所成也化生五味按酸苦甘辛鹹動植飛潛皆具之而總皆氣化之所生注單指金石草木偏矣道生智玄生神智通妙用唯道所生玄遠幽深神之為用神在天為風在地為木風者教之始天之使也天之號令也在天為熱在地為火在天為濕在地為土在天為燥在地為金在天為寒在地為水故在天為氣在地成形氣謂風熱濕燥寒形謂木火土金水形氣相感而化生萬物矣然天地者萬物之上下也左右者陰陽之道路也水火者陰陽之徵兆也金木者生成之終始也木主發生應春春為生化之始金主收斂應秋秋為成實之終終始不息其化常行氣有多少形有盛衰上下相召而損益彰矣氣有多少謂天之陰陽三等多少不同秩也形有盛衰謂五運之氣有太過不及也由是多少盛衰天地相召而陰陽損益昭然彰著可見也帝曰何謂氣有多少形有盛衰鬼臾區曰陰陽之氣各有多少故曰三陰三陽也按三者之分多少之殊也形有盛衰謂五行之治各有太過不及也故其始也有餘而往不足隨之不足而往有餘從之知迎知隨氣可與期按盛極必衰衰極必盛恆相隨也知隨之所以然無使太過無使不及迎而治之則氣常得其平自無有餘不足之患矣應天為天符承歲為歲直三合為治按張景岳曰符合也承下奉上也直會也應天為天符如丁巳丁亥木氣合也戊寅戊申戊子戊午火氣合也己丑己未土氣合也乙卯乙酉金氣合也丙辰丙戌水氣合也此十二年者中運與司天同氣故曰天符承歲為歲直如丁卯之歲木承木也戊午之歲火承火也乙酉之歲金承金也丙子之歲水承水也甲辰甲戌己丑己未之歲土承土也此以年支與歲同氣相承故曰歲直即歲會也然不分陽年陰年但取四正之年為四直承歲如子午卯酉是也惟土無定位寄王於四季之末各一十八日有奇則通論承歲如辰戌丑未是也共計八年三合為治言天氣運氣年辰也凡天符歲會之類皆不外此三者若上中下三氣相合乃為太一天符如乙酉歲金氣三合戊午歲火氣三合己丑己未歲土氣三合是也共四年帝曰上下相召奈何鬼臾區曰寒暑燥濕風火天之陰陽也三陰三陽上奉之按張景岳曰寒暑燥濕風火六氣化於天者也故為天之陰陽三陰三陽上奉之謂厥陰奉風氣少陰奉火氣太陰奉土氣此三陰也少陽奉暑氣陽明奉燥氣太陽奉寒氣此三陽也召感召也木火土金水火地之陰陽也生長化收藏下應之按張景岳曰木火土金水火五行成於地者也故為地之陰陽生長化收藏下應之謂木應生火應長土應化金應收水應藏也又按上文神在天為風等十句其在天者止言風熱濕燥寒在地者止言木火土金水而此二節乃言寒暑燥濕風火木火土金水火蓋以在天之熱分為暑火而為六在地之火分為君相而為六此因五行以化六氣而所以有三陰三陽之分也二火義如下文謹按五行雖屬之地而其原實本於天之六氣所化而成故風木應春而生二火應夏而長燥金應秋而收寒水應冬而藏濕土應四季而分化人受之則肝應春生心應夏長脾應長夏而司化肺應秋收腎應冬藏相火和五臟而長養萬物則無一非五行之所成而實無一非六氣之所化也然生長化收藏既為六氣之所化而云下應者何也六氣者無形者也五行之為生長化收藏也有象者也以無形之氣而運行於五行之中其為生也長也化也收與藏也有形可象故曰下應也景岳宜云因六氣以化五行方是天以陽生陰長地以陽殺陰藏按義已具前陰陽應象大論中天有陰陽地亦有陰陽故陽中有陰陰中有陽按張景岳曰天本陽也然陽中有陰地本陰也然陰中有陽此陰陽互藏之道如坎中有奇離中有偶水之內明火之內暗皆是也惟陽中有陰故天氣得以下降陰中有陽故地氣得以上升此即上下相召之本所以欲知天地之陰陽者應天之氣動而不息故五歲而右遷應地之氣靜而守位故六期而環會按張景岳曰應天之氣五行之應天干也動而不息以天加地而六甲周旋也五歲右遷天干之應也即下文甲己之歲土運統之之類是也蓋甲乙丙丁戊竟五運之一周己庚辛壬癸又五運之一周甲右遷而己來己右遷而甲來故五歲而右遷也應地之氣六氣之應地支也靜而守位以地承天而地支不動也六期而環會地支之周也即下文子午之歲上見少陰之類是也蓋子醜寅卯辰巳終六氣之一備午未申酉戌亥又六氣之一備終而復始故六期而環會謹按景岳此解明確極矣幾於一字不可更易注乃謂天氣不加君火五歲餘一故遷一位夫少陰君火既已司天居六氣之一何謂法不加臨啟玄之意蓋謂少陰不司氣化而以遷為遷去一位也抑知遷者離此就彼之謂謂天行左旋從右遷左故曰右遷與下環會相對詳味經旨始知景岳之言為確動靜相召上下相臨陰陽相錯而變由生也帝曰上下周紀其有數乎鬼臾區曰天以六為節地以五為制按張景岳曰天數五而五陰五陽故為十干地數六而六陰六陽故為十二支然天干之五必得地支之六以為節地支之六必得天干之五以為制而後六甲成歲氣備又如子午之上為君火以至巳亥之上為風木是六氣之在天而以地支之六為節也甲己為土運以至戊癸為火運是五行之在地而以天干之五為制也此以地支而應天之六氣以天干而合地之五行正其上下相召以合五六之數也周天氣者六期為一備終地期者五歲為一周按張景岳曰天之六氣各治一歲故六期為一備地之五行亦各治一歲故五歲為一周一曰當以周天氣者六為句終地紀者五為句亦通謂一歲六步步各六十日六六三百六十日是周天氣者六也故期為一備一歲五行各主一運運七十二日五七三百五十二五一十亦三百六十日是終地紀者五也故歲為一周此以一歲之五六為言以合下文一紀一周之數尤見親切君火以明相火以位按張景岳曰此明天之六氣惟火有二之義也君者上也相者下也陽在上者即君火也陽在下者即相火也上者應離陽在外也故君火以明下者應坎陽在內也故相火以位火一也而上下幽顯其象不同此其所以有辨也謹按天之六氣木土金水各居其一而火獨有二注謂但立名於君位不立歲氣以名奉天故曰君火以明守位稟命故曰相火以位是改明為名不惟不知君火以明之義且並不知所以火有君相之分也賴張景岳先生力辨其誤謂啟玄之意蓋因至真要大論言少陰不司氣化故引其意而云君火不立歲氣殊不知彼言不司氣化者言君火不主五運之化非言六氣也又謂君火居上為日之明以昭天道故於人也屬心而神明出焉相火居下為原泉之溫以生養萬物故於人也屬腎而元陽蓄焉所以六氣之序君火在前相火在後前者肇物之生後者成物之實而三百六十日中前後二火所主者止四五六七月共一百二十日以成一歲化育之功此君相二火之為用也辭義明切為合經旨但其解相火以位句似猶有可議者請更為晰之其言曰明者光也火之氣也位者形也火之質也以光氣解明誠是以形質解位則非也夫所謂明者火氣外達光輝發越之稱也其見於天為日月之普照其比之人君也為光被為嚮明其見於人之臟也為心之智慧為氣之陽和皆明之為用即火之為用也然心者身之君也心為火臟故以心火為君火也其主夏其位南其卦離易曰離也者明也萬物皆相見南方之卦也聖人南面而聽天下嚮明而治蓋取諸此也然則明也者心之體君之德火之用也五行缺此則凝寒而不化五臟無此則幽隱而少氣矣是故君火貴乎以明也此以明之義不過從景岳之言稍暢之若夫以位之解則更有說矣夫所謂位者貴之之辭也何以貴貴夫相也君非相不可以為治心非腎不能以有生五臟之氣固借心火以為配然心火者陽火也其氣烈其性剛足以驅寒而燥濕亦足以亂氣而耗元倘無相火之氣蘊蓄于丹田則肝木何以生脾胃何以養肺金不幾過於肅而寒水不且至於冰凝乎是則丹田者相火之位也居其位行其政下以因元氣之根基上以佐心火所不逮是所貴乎相火者豈非以位耶抑位者限之之辭也何謂限相火飛越則為病故必限之以位也官不守其位則政紛民不安其位則法亂是故位也者所以安身而立命者也丹田既為相火之位矣命門之氣溫溫不息是少火也臟腑資之以養焉其或水虧火勝陰不維陽飛越而上為燎原為戴陽於是生氣之少火變為食氣之壯火矣不知者以為相火之為害也而豈知止是出乎其位之所致是故相火貴乎以位也分而言之心火象離陽在外也然在外者必原於內故君火無相火則氣盡散而不能生養夫萬物腎火象坎陽在內也然在內者必達於外故相火無君火則氣下鬱而不能熏蒸夫臟腑合而言之同一火也而陰陽交濟之義備焉二者之不可缺一亦猶木土金水之不能以無火也此相火之義屬腎蓋自古而然矣今考六氣相火專屬少陽三焦三焦與腎似不相合然三焦有名無形主氣而實根原於命門命門居兩腎之中體陰而用陽與右腎同功用故亦根原於丹田高陽生蓋不知其所以然而欲診三焦於右尺則謬甚矣五六相合而七百二十氣為一紀凡三十歲按張景岳曰天以六期為備地以五歲為周周餘一氣終而復會如五個六三十歲也六十五亦三十歲也故五六相合而七百二十氣為一紀凡三十歲也然此以大數言之耳若詳求之則三十年之數正與一年之度相合蓋一歲之數凡三百六十日六分分之為六氣各得六十日也五分分之為五運各得七十二日也七十二分分之為七十二候各得五日也三十年之數凡三百六十月六分分之各得六十月五分分之各得七十二月七百二十分分之各得十五日是為一氣又曰一節此五六之大會而元會運世之數皆自此起故謂之一紀又謂之一世千四百四十氣凡六十歲而為一周不及太過斯皆見矣按張景岳曰以三十年而倍之則得此數是為六十年花甲一周也其間運五氣六上下相臨之數盡具於此故凡太過不及逆順勝復之數皆於此而可見矣帝曰善言始者必會於終善言近者必知其遠是則至數極而道不惑所謂明矣願夫子推而次之令有條理簡而不匱久而不絕易用難忘為之綱紀至數之要願盡聞之鬼臾區曰昭乎哉問明乎哉道如鼓之應桴響之應聲也按桴鼓椎也臣聞之甲己之歲土運統之乙庚之歲金運統之丙辛之歲水運統之丁壬之歲木運統之戊癸之歲火運統之按張景岳曰此即五行之應天干也是為五運帝曰其於三陰三陽合之奈何鬼臾區曰子午之歲上見少陰丑未之歲上見太陰寅申之歲上見少陽卯酉之歲上見陽明辰戌之歲上見太陽巳亥之歲上見厥陰此即三陰三陽之應地支也是為六氣上者言司天如子午之歲上見少陰司天是也十二年皆然少陰所謂標也厥陰所謂終也標首也終盡也六十年陰陽之序始於子午故少陰謂標終於巳亥故厥陰謂終新校正云詳午未寅酉戌亥之歲為正化正司化令之實子醜申卯辰巳之歲為對化對司化令之虛此其大法也厥陰之上風氣主之少陰之上熱氣主之太陰之上濕氣主之少陽之上相火主之陽明之上燥氣主之太陽之上寒氣主之所謂本也是謂六元三陰三陽者由六氣之化為之主而風化厥陰熱化少陰濕化太陰火化少陽燥化陽明寒化太陽氣化相生故六氣謂本三陰三陽謂標也然此六者皆天元一氣之所化一分為六故曰六元本篇曰天元紀者義本諸此帝曰光乎哉道明乎哉論請著之玉版藏之金匱暑曰天元紀五運行大論五運者五行各司一運行者謂主時行令是謂五運行也通篇約分九段每段各有精義蓋合運五氣六而為言者也黃帝坐明堂始正天綱臨觀八極考建五常明堂布政宮也八極八方目極之所也考謂考校建謂建立也五常謂五氣行天地之中者也端居正氣以候天和按張景岳曰五常五行氣運之常考建五常以測陰陽之變化也請天師而問之曰論言天地之動靜神明為之紀陰陽之升降寒暑彰其兆按新校正曰詳論謂陰陽應象大論及氣交變大論文彼云陰陽之往復寒暑彰其兆余聞五運之數於夫子夫子之所言正五氣之各主歲爾首甲定運按張景岳曰首甲定運謂六十年以甲子為首而定其運也余因論之鬼臾區曰按此是帝問岐伯而述鬼臾區之言如此非臾區答帝也土主甲巳金主乙庚水主丙辛木主丁壬火主戊癸子午之上少陰主之丑未之上太陰主之寅申之上少陽主之卯酉之上陽明主之辰戌之上太陽主之巳亥之上厥陰主之不合陰陽其故何也主者司天也不合陰陽如五行之甲乙東方木也而甲化土運乙化金運六氣之亥子北方水也而亥年之上風木主之子年之上君火主之又如君火司氣火本陽也而反屬少陰寒水司氣水本陰也而反屬太陽之類似皆不合於陰陽者也岐伯曰是明道也此天地之陰陽也按言臾區所言運五氣六乃是欲顯明天地之道也然其陰陽所以不合者正天地之所以為陰陽而變化所由起也夫數之可數者人中之陰陽也然所合數之可得者也夫陰陽者數之可十推之可百數之可千推之可萬天地陰陽者不以數推以象之謂也人中之陰陽言其淺近可數而人所易知者也然陰陽之道或本陽而標陰或內陽而外陰或此陽而彼陰或先陽而後陰故小之而十百大之而千萬無非陰陽之變化此天地之陰陽無窮誠有不可以限數推言者故當因象求之則無不有理存焉帝曰願聞其所始也岐伯曰昭乎哉問也臣覽太始天元冊文丹天之氣經於牛女戊分黅天之氣經於心尾己分蒼天之氣經於危室柳鬼素天之氣經於亢氐昴畢玄天之氣經於張翼婁胃此所以辨五運也始謂天運初分之始太始天元冊文太古占天文也丹赤色火氣也黅黃色土氣也蒼青色木氣也素白色金氣也玄黑色水氣也當天地初分之時赤氣經於牛女戊分牛女癸之次戊當干之次故火主戊癸也黃氣經於心尾己分心尾甲之次己當巽之次故土主甲己也青氣經於危室柳鬼危室壬之次柳鬼丁之次故木主丁壬也白氣經於亢氐昴畢亢氐乙之次昴畢庚之次故金主乙庚也黑氣經於張翼婁胃張翼丙之次婁胃辛之次故水主丙辛也此五運之所以化也黅音今所謂戊己分者奎壁角軫則天地之門戶也夫候之所始道之所生不可不通也按張景岳曰奎壁臨干戊分也角軫臨巽己分也戊在西北己在東南遁甲經曰六戌為天門六己為地戶故曰天地之門戶然而曰門曰戶必有所謂先賢俱未詳及嘗考周天七政躔度則春分二月中日躔壁初以次而南三月入奎婁四月入胃昴畢五月入觜參六月入井鬼七月入柳星張秋分八月中日躔翼末以交於軫循次而北九月入角亢十月入氐房心十一月入尾箕十二月入鬥牛正月入女虛危至二月復交於春分而入奎壁矣是日之長也時之暖也萬物之發生也皆從奎壁始日之短也時之寒也萬物之收藏也皆從角軫始故曰春分司啟秋分司閉夫既司啟閉非門戶而何然自奎壁而南日就陽道故曰天門角軫而北日就陰道故曰地戶又如春分日躔壁初故言奎壁秋分日躔翼末何以不言翼軫而言角軫蓋自角以後十四宿計一百七十三度四分度之一自奎以後十四宿計一百九十二度度有不齊此秋分之所以在翼末而經言角軫者正以翼度將完而角軫正當其令且奎壁角軫為對待之宿而奎壁在西北之交角軫在東南之交故經云奎壁角軫天地之門戶也是以伏羲六十四卦方圖以乾居西北坤居東南正合天門地戶之義凡候之所起即道之所生不可不通也帝曰善論言天地者萬物之上下左右者陰陽之道路未知其所謂也論謂天元紀及陰陽應象論也岐伯曰所謂上下者歲上下見陰陽之所在也左右者諸上見厥陰左少陰右太陽見少陰左太陰右厥陰見太陰左少陽右少陰見少陽左陽明右太陰見陽明左太陽右少陽見太陽左厥陰右陽明所謂面北而命其位言其見也按上者言司天也帝曰何謂下岐伯曰厥陰在上則少陽在下按下言在泉也左陽明右太陰少陰在上則陽明在下左太陽右少陽太陰在上則太陽在下左厥陰右陽明少陽在上則厥陰在下左少陰右太陽陽明在上則少陰在下左太陰右厥陰太陽在上則太陰在下左少陽右少陰所謂面南而命其位言其見也主歲者位在南故面北而言其左右在下者位在北故面南而言其左右也上天位也下地位也面南左東也右西也上下異而左右殊也按司天在泉俱有左右間也張景岳曰右二節陰陽六氣迭為遷轉如巳亥年厥陰司天明年子午則左間少陰來司天矣又如初氣厥陰用事則二氣少陰來相代矣六氣循環無已此所以上下左右陰陽逆順有異而見氣候之變遷也上下相遘寒暑相臨氣相得則和不相得則病按司天在上在泉在下人隨五運處於氣交之中六氣相感而後順逆存乎其間矣順時之氣則相生則為相得而無病逆時之氣則相剋則為不相得而生病矣寒暑者六氣之二也不言六氣而止言寒暑者蓋特舉其顯而易見者言也帝曰氣相得而病者何也岐伯曰以下臨上不當位也按張景岳曰氣同類者本為相得而亦不免於病者以下臨上也如六微旨大論曰君位臣則順臣位君則逆此指君相二火而言也帝曰動靜何如按謂天地之運行也岐伯曰上者右行下者左行左右周天余而復會也上者右行言天氣右旋自東而西以降於地下者左行言地氣左轉自西而東以升於天故司天在上必歷巳午未申而西降在泉在下必歷亥子醜寅而東昇也余而復會即前篇五六相合積氣余而復會其始之義帝曰余聞鬼臾區曰應地者靜今夫子乃言下者左行不知其所謂也願聞何以生之乎按言地既應靜而又云左行是地不專於靜而亦能動耶應地者靜見前天元紀篇岐伯曰天地動靜五行遷復雖鬼臾區其上候而已猶不能遍明按言臾區但粗舉天運之候而尚未盡言左右之詳也夫變化之用天垂象地成形七曜緯虛五行麗地地者所以載生成之形類也虛者所以列應天之精氣也形精之動猶根本之與枝葉也仰觀其象雖遠可知也觀五星之東轉則地體左行之理昭然可知也麗著也有形之物未有不依據於物而得全者也按七曜謂日月五星也緯虛謂懸象於天天體虛空故也麗附麗也五行有形而生於地也然有形者雖麗於地而其氣則本於天故有形之本常本於虛虛者精氣之所蘊有精氣然後有形類亦猶有根本然後有枝葉是以觀象於天而上下之運行無不可知也帝曰地之為下否乎按對天而言地自為下然能左轉而上升則又似乎非下也岐伯曰地為人之下太虛之中者也按張景岳曰人在地之上天又在人之上以人之所見言則上為天下為地以天地之全體言則天包地之外地居天之中故曰太虛之中者也由此觀之則地非天之下矣然則司天者主地之上在泉者主地之下五行之麗地者是為五運而運行於上下之中者也此特舉地為辨者蓋以明上中下之大象耳分而言之有上中下之殊合而言之天氣右旋而下降地氣左旋而上升混混淪淪日運行而不息幾無上天下地之可名故曰太虛之中者也帝曰馮乎按馮憑也言地誠在太虛之中而得無傾墜之患者其或有所憑藉而然歟岐伯曰大氣舉之也按大氣者太虛之元氣也莫高如天莫厚如地日夜運行而能勝其任而舉之者惟是元氣為布護是不惟人賴元氣以為養而天地亦且涵泳於元氣之中也燥以干之暑以蒸之風以動之濕以潤之寒以堅之火以溫之按張景岳曰此即大氣之所化是為六氣而運用於天地之間者也曰燥曰暑曰風曰濕曰寒曰火六者各一其性而功用亦異故風寒在下燥熱在上濕氣在中火遊行其間寒暑六入故令虛而化生也按風屬木而應肝寒屬水而應腎肝腎之位卑故所應俱在下燥為金化屬肺熱為火化屬心心肺之位高故所應皆在上濕土屬脾脾土為中州故位在中此六氣之五下合於五行而內應於五臟一定不移者也若夫相火則不然矣相火者龍雷之火也升降不常倏忽善變其靜也托根丹田其動也五臟六腑無處不到蓋嘗遊行其間矣是六者之用天地之正也然而人之感之則以為邪者皆由寒暑致之也如時當寒也人多喜暖或密室或重裘或多食辛熱而燥火熱之氣因之而入矣如時分暑也人必喜涼或露宿或裸體或多食寒涼而風寒濕之氣因之而入矣既入之後邪氣害正則令人虛千變萬化百病於是乎生焉是同一六氣也燥以干暑以蒸風以動濕以潤寒以堅火以溫氣之正也乃因寒致熱因暑致寒六氣反入而為病是非六氣之病人人自病耳知此而能慎守焉則六氣有正而無邪矣王注謂地體之中凡有六入又謂受燥故乾性生焉等語指作天地化生昧卻遊行六入妙旨及張景岳又云自北而東故曰風寒在下下者左行自南而西故曰燥熱在上上者右行夫自北而東豈可謂下自南而西豈可為上且以左右行解上下甚屬牽強又以二火居濕之上下為遊行夫君火果定於上相火果限於下而無有升降則何以謂之遊行且將此火混兼君相斯皆未達經旨者也故燥勝則地干暑勝則地熱風勝則地動濕勝則地泥寒勝則地裂火勝則地固矣按六氣病人誠人所自致然天道不常時或有變變而偏勝地受其災矣乾熱動泥裂固六者皆地之病也言地而人亦在其中景岳謂是地氣本於天誤矣帝曰天地之氣何以候之岐伯曰天地之氣勝復之作不形於診也脈法曰天地之變無以脈診此之謂也按有勝必有復者氣變之常也即如旱極必潦寒極必熱可以理推不可以脈察也帝曰間氣何如按言司天在泉各有間氣其脈如何為順如何為逆也景岳謂此舉常中之變誤矣岐伯曰隨氣所在期於左右按左右者兩手寸尺也氣在左則左宜應氣在右則右宜應期必也義如下文帝曰期之奈何岐伯曰從其氣則和違其氣則病按張景岳曰氣至脈亦至從其氣也故曰和氣至脈不至氣未至而脈至違其氣也故為病至真要大論曰至而和則平至而甚則病至而反則病至而不至者病未至而至者病陰陽易者危不當其位者病按景岳曰應左而右應右而左應上而下應下而上也迭移其位者病按景岳曰迭更也應見不見而移易於他位也失守其位者危按景岳曰克賊之脈見而本位失守也尺寸反者死陰陽交者死按景岳曰此二句之義一以尺寸言一以左右言皆以少陰為之主也如陰當在尺則陽當在寸陰當在寸則陽當在尺左右亦然若陰之所在脈宜不應而反應陽之所在脈宜應而反不應其在尺寸則謂之反其在左右則謂之交皆當死也尺寸反者惟子午卯酉四年有之陰陽交者惟寅申巳亥辰戌丑未八年有之若尺寸獨然或左右獨然是為氣不應非反非交也先立其年以知其氣左右應見然後乃可以言死生之逆順按景岳曰先立其年之南北政及司天在泉左右間應見之氣則知少陰君主之所在脈當不應而逆順乃可見矣帝曰寒暑燥濕風火在人合之奈何其於萬物何以生化岐伯曰東方生風東者日之初風者教之始天之使也所以發號施令故生自東方也風生木陽升風鼓草木敷榮故曰風生木也木生酸酸生肝酸味入胃生養於肝臟肝生筋酸味入肝自肝臟布化生成於筋膜也筋生心按肝主筋而生血心主血而生於肝是猶筋生也其在天為玄在人為道在地為化化生化也有生化而後有萬物萬物無非化氣以生成者也化生五味按五行各有味五味之化實始於木木主生生故也道生智按道者人理之總稱而智為先務也玄生神玄冥之中神明棲據隱而不見玄生神明也化生氣按天地之化惟氣居先神在天為風在地為木在體為筋在氣為柔按風木在春其氣柔和在臟為肝其性為暄其德為和按暄日也喜日惡陰木之性也敷布和氣木之德也其用為動無風則萬類皆靜按新校正云木之用為動火太過之政亦為動蓋木火之主暴速故俱為動是也其色為蒼其化為榮按物之榮茂無過春木故凡榮茂之化皆自木生也其蟲毛按蟲之毛者若草木之茂密也其政為散其令宣發按肝木惡抑鬱而喜發散其變摧拉按摧拉損折敗壞也風氣剛強木之變也氣交變大論曰其變振發其眚為隕按隕墜也大風暴起草凋木墜氣交變大論曰其災散落其味為酸其志為怒怒傷肝悲勝怒風傷肝亦猶風之折木也燥勝風風自木生燥為金化風余則制之以燥肝盛則治之以涼清涼所行金之氣也酸傷筋酸瀉肝氣瀉甚則傷其氣按宣明五氣篇曰酸走筋筋病無多食酸辛勝酸按辛者金味酸者木味辛勝酸金剋木也南方生熱熱生火火生苦苦生心按苦味入心而補火也心生血血生脾按誠為火生土義然血足則脾自充也其在天為熱在地為火在體為脈在氣為息息長也在臟為心其性為暑暑熱也其德為顯其用為躁火性躁動不專定也其色為赤其化為茂茂蕃盛也其蟲羽參差長短象火之形其政為明按新校正云氣交變大論云其政明曜又按火之政明水之氣明水火異而明同者火之明明於外水之明明於內明雖同而實異也其令鬱蒸按新校正云詳註謂郁為盛其義未安按王冰注五常政大論云郁為鬱燠不舒暢也當如此解其變炎爍其眚燔焫按炎爍者火性焰上萬物焦灼而銷爍也燔焫者火勢遍延而燎原也與火鬱於內之鬱蒸同是火之為病乃有是三者之不同也其味為苦其志為喜喜傷心恐勝喜熱傷氣寒勝熱苦傷氣按新校正云詳此論所傷之旨有三東方曰風傷肝酸傷筋中央曰濕傷肉甘傷脾西方曰辛傷皮毛是自傷者也南方曰熱傷氣苦傷氣北方曰寒傷血咸傷血是傷己所勝也西方曰熱傷皮毛是被勝傷己也凡此五方所傷之例有三若太素則俱云自傷焉咸勝苦中央生濕濕生土土生甘甘生脾甘物入胃先入於脾故諸己歲則甘少化諸甲歲甘多化脾生肉按脾主運化飲食之味而得其精華以生長一身之肌肉肉生肺按土生金也其在天為濕在地為土在體為肉在氣為充按居天之下而能充塞其間者惟土之氣耳在臟為脾其性靜兼按土性安靜萬物載焉無所不兼故曰靜兼其德為濡按濡潤澤也物借土之潤澤以為養故以濡為德也其用為化按化者自無而有號物有萬皆從土化地之用也其色為黃其化為盈按土既化生萬物矣與天合體而能盈滿無歉者惟土所化耳其蟲倮按無毛介曰倮蟲之倮者以肉為體象土之厚而柔也倮音華去聲其政為謐按土性安靜故以靜謐為政也其變動注動反靜也按注者大雨傾注水盛侮土也其眚淫潰淫久雨也潰土崩潰也其味為甘其志為思思傷脾怒勝思濕傷肉風勝濕按風為木氣固所以制土然風性最燥故又能熯土之濕也甘傷脾酸勝甘西方生燥陽氣已降陰氣復升氣爽風勁故生燥也燥生金金生辛辛生肺辛物入胃先入於肺故諸乙歲則辛少化諸庚歲則辛多化肺生皮毛按肺主呼吸內外之氣而布其精華以潤澤一身之皮毛皮毛生腎按亦金生水之意其在天為燥在地為金在體為皮毛在氣為成物乘金化則堅成在臟為肺其性為涼其德為清金以清涼為德化其用為固其色為白其化為斂按物至秋而收斂然惟能收斂故得堅固也其蟲介介甲也外被介甲金堅之象也其政為勁其令霧露其變肅殺其眚蒼落按秋惟勁堅故其氣肅殺而令草木蒼老而凋落其味為辛其志為憂憂傷肺喜勝憂熱傷皮毛按熱極則毛焦金畏火也寒勝熱辛傷皮毛過節也辛熱又甚焉苦勝辛北方生寒寒生水水生咸水澤枯涸滷咸乃蕃煎水味鹹近而可見咸生腎咸物入胃先歸於腎故諸丙歲咸物多化諸辛歲咸物少化腎生骨髓按腎主水水足則髓充故髓為腎生髓者水之精也髓生肝按水生木也其在天為寒在地為水在體為骨在氣為堅柔耎之物遇寒則堅寒之化也在臟為腎其性為凜按人寒則凜其德為寒其用為其色為黑其化為肅肅靜也其蟲鱗按鱗者水之蟲也其政為靜其令其變凝冽按寒甚則冰凝冰甚則坼裂其眚冰雹非時而有及暴過也其味為咸其志為恐恐傷腎思勝恐寒傷血燥勝寒咸傷血味過於咸則咽乾引飲傷血之義斷可知矣甘勝咸按素問論五行如陰陽應象大論是論五行相生相剋之正此篇帝意本問天之六氣人與萬物相合何如非問五行而伯亦以五行生剋為對蓋在天為六氣在地為五行言五行之生克而六氣之得失在其中人與萬物之得失亦在其中故所問雖殊而對則同也但此篇五行文義與應象論相同者茲不更注蓋省文也五氣更立各有所先非其位則邪當其位則正按更立謂五行遞主一歲也先謂如值寅卯年則以木為先木畏金而喜水木遇金運則非其所喜而受邪木遇水運則當其所喜而無病也帝曰病生之變何如岐伯曰氣相得則微不相得則甚木居火位火居土位土居金位金居水位水居木位木居君位如是者為相得又木居水位水居金位金居土位土居火位火居木位如是者雖為相得終是以子僣居父母之位下陵其上猶為小逆也木居金土位火居金水位土居水木位金居火木位水居火土位如是者為不相得故病甚也皆先立運氣及司天之氣則氣之所在相得與不相得可知矣帝曰主歲何如岐伯曰氣有餘則制己所勝而侮所不勝其不及則己所不勝侮而乘之己所勝輕而侮之木余則制土輕忽於金以金氣不爭故木恃其餘而欺侮也又木少金勝土反侮木以木不及故土妄凌之也按五行之理以勝相制者氣之平也若夫王而有餘或衰而不及則氣反其常但有強弱之勢而無上下之分矣制者以上臨下侮者以強凌弱也侮反受邪侮而受邪寡於畏也帝曰善按此解所以侮之之故也侮之為言無所忌憚而相凌鑠之稱也侮之來也必其有可侮之幾是非邪入人而人自受然受之於其所不當受者故曰反也王注捨己宮觀適他鄉邦等語殊不可解氣交變大論六微旨大論言言人者求之氣交帝曰何謂氣交岐伯曰上下之位氣交之中人之居也是氣交者蓋合天氣運氣而言也然二氣相合或盛而太過或衰而不及而變形焉故曰氣交變也黃帝問曰五運更治上應天期陰陽往復寒暑迎隨真邪相搏內外分離六經波盪五氣傾移太過不及專勝兼併願言其始而有常名可得聞乎期三百六十五日四分日之一也專勝謂五運主歲太過也兼併謂主歲之不及也常名謂布化於太虛人身參應病之形診也岐伯曰請遂言之也上經曰夫道者上知天文下知地理中知人事可以長久此之謂也按此一節與著至教論文重帝曰何謂也岐伯曰本氣位也位天者天文也位地者地理也通於人氣之變化者人事也故太過者先天不及者後天所謂治化而人應之也按三才之氣各有定位是其本也天文者星辰風雨寒暑也其氣本於天而位乎上地理者山川飛潛動植也其氣本於地而位乎下人事者氣血虛實表裡逆順也其氣本於人而位乎中三者本相應而其氣或不能不偏偏盛則先時而氣至偏衰則後時而氣至天之治化見於上於是而人之實者無病虛者病矣帝曰五運之化太過何如按張景岳曰過而有制則為平歲不在太過之例岐伯曰歲木太過風氣流行脾土受邪按六壬年也木勝則剋土故脾臟受邪民病飧泄食減體重煩冤腸鳴腹支滿按脾土既見傷於木則病有數者之不同矣飧泄者水穀不分也食減者脾不能運也脾主肌肉脾弱則不能運動故體重脾脈從胃別上膈注心中故煩冤冤者抑鬱不舒也口問篇曰中氣不足腸為之苦鳴臟氣法時論曰脾虛則腹滿腸鳴飧泄食不化上應歲星按木星也木氣盛則歲星明而專其令謹按以上言木太過而土受邪以下則言木勝極而金來復也甚則忽忽善怒眩冒巔疾按木勝肝強故善怒厥陰隨督脈上會於巔故眩冒巔疾蓋肝實而自病也王注言木遇金自病誤矣化氣不政生氣獨治雲物飛動草木不寧甚而搖落反脅痛而吐甚衝陽絕者死不治上應太白星按張景岳曰化氣土氣也生氣木氣也木盛則土衰故化氣不能布政於萬物而木之生氣獨治也風不務德則太虛之中雲物飛動草木不寧木勝不已金則承之故甚至搖落金之復也肝脈布於脅肋木強則肝逆故脅痛也吐甚者木邪傷胃也衝陽胃脈也木亢則胃絕故死不治木既勝極金於是乎承而制之矣故太白光芒以應其氣是歲木之為災先臨宿屬金氣之復後及東方人之應之則先傷於脾後傷於肝書曰滿招損六微旨大論曰承乃制此之類也新校正云詳此太過五化言星之例有三木土二運先言歲鎮後言勝己之星火金二運先言熒惑太白次言勝己之星後又言熒惑太白水運先言辰星次言鎮星後又言熒惑辰星兼見己勝之星也歲火太過炎暑流行金肺受邪按六戊歲也火勝則剋金故肺臟受邪民病瘧少氣咳喘血溢血泄注下嗌燥耳聾中熱肩背熱上應熒惑星按張景岳曰火邪傷陰寒熱交爭故為瘧壯火食氣故少氣火邪乘肺金故咳喘火逼血而妄行故上溢於口鼻下泄於二便火性急速故水瀉注下嗌燥耳聾中熱肩背熱皆火炎上焦也熒惑火星也火氣勝則熒惑星明而當其令甚則胸中痛脅支滿脅痛膺背肩胛間痛兩臂內痛按景岳曰此皆心經及手心主所行之處火盛為邪故有是病身熱骨痛而為浸淫按火盛故身熱火盛爍水則水虧故骨痛浸淫者汗也火盛熱熾逼水外泄而為汗玉機真臟論曰心脈太過令人身熱而膚痛為浸淫蓋心實火強熱太甚而自病也王注謂火無德令縱熱害金水為復仇故火自病蓋疑浸淫為水剋火新校正又以骨痛為誤皆非也收氣不行長氣獨明雨水霜寒上應辰星按景岳曰收氣金氣也長氣火氣也火盛則金衰故收氣不行而長氣獨明也火不務德水則承之故雨水霜寒見於下而辰星光芒應於上是歲火之為災先臨宿屬水氣之復並及南方人之應之則先傷於肺後傷於心上臨少陰少陽火燔焫水泉涸物焦槁按張景岳曰凡此戊年皆太過之火而又遇子午則上臨少陰君火也遇寅申則上臨少陽相火也皆為天符其熱尤甚故火當燔焫水泉當涸物當焦枯也燔音煩焫如瑞切病反譫妄狂越咳喘息鳴下甚血溢泄不已太淵絕者死不治上應熒惑星按譫妄狂越者火盛而神明亂也咳喘息鳴者火刑金也血溢泄者熱極而血動也太淵肺脈金為火克而敗絕故熒惑星明於上也歲土太過雨濕流行腎水受邪民病腹痛清厥意不樂體重煩冤上應鎮星按六甲年也土之化濕土勝則剋水故腎臟受邪腹者脾所治脾實土強則中氣壅故大小腹痛清厥者四肢逆冷也脾主四肢脾實則氣壅而不能運行故手足逆冷也意猶思也脾之志體者肌肉也脾之應脾盛氣窒則意抑鬱而不樂肌肉𤸷厚而重也煩冤者氣鬱滯而煩躁也脾為氣母脾病則氣滯也鎮星土宿也土王則其宿明於上也甚則肌肉萎足痿不收行善瘈腳下痛飲發中滿食減四肢不舉脾主肌肉外應四肢又其脈起於足中指之端循核骨內側斜出絡跗故病如是按萎痿同謂柔軟無力也不收謂伸而不能縮也瘈筋急也脾脈起於足大趾脾病故腳痛注言中指誤也脾實強則中氣盛滿飲為之溢而食為之減四肢重墜而不能舉皆脾太盛而自病也瘈音記變生得位按得位謂四季月土王之時也土分王於四季凡土邪為變必於其應王之時太過五化獨此言變生得位者見土之為變四季皆有不獨長夏為然也臟氣伏化氣獨治之泉湧河衍涸澤生魚風雨大至土崩潰鱗見於陸病腹滿溏泄腸鳴反下甚而太谿絕者死不治上應歲星臟水氣也化土氣也化太過故臟氣伏匿而化氣獨治按土盛之極濕令大行泉湧河衍涸澤生魚皆濕之為害然濕甚不已則風木承之故又風雨至土崩潰而鱗見於陸上應歲星歲木星也然腹滿溏泄腸鳴反下諸證皆脾之病而云太谿絕者不治太谿腎脈也土盛則勝水而土亢則木又承之也歲金太過燥氣流行肝木受邪民病兩脅下少腹痛目赤痛眥傷耳無所聞肅殺而甚則體重煩冤胸痛引背兩脅滿且痛引少腹上應太白星按六庚年也金之化燥金勝則剋木故肝臟受邪兩脅少腹目耳皆肝膽經脈所主肝膽木也木不勝刑故俱病若金盛氣王則肅殺甚矣金受氣於土金過盛則土氣泄而脾病體重煩冤者脾土病也金盛氣泄則肺亦病胸者肺之部胸與背相對肺病故胸痛而且引及於背也太白金星金氣勝則其宿光明於上也甚則喘咳逆氣肩背痛尻陰股膝髀腨胻足皆病上應熒惑星按金太盛則自病故喘咳氣逆以致肩背痛也然尻陰股膝等皆腎之病金病不能生水故病並及於腎金盛太過火氣承之故熒惑復明也收氣峻生氣下草木斂蒼干凋隕病反暴痛胠脅不可反側咳逆甚而血溢太衝絕者死不治上應太白星按收氣金氣也生氣木氣也峻嚴肅下卑抑惟金氣嚴肅故木氣卑抑而草木斂也蒼色老干枯槁凋將墮隕脫落此正草木之所以斂也惟木見刑于金故肝臟受傷胠兩腋胠與脅相連肝所主肝病故不可反側也金過盛而自病故咳逆甚而至於吐血也太衝肝脈金盛則木絕故不治而金星明此仍金勝剋木之義也歲水太過寒氣流行邪害心火民病身熱煩心躁悸陰厥上下中寒譫妄心痛寒氣早至上應辰星悸心跳動也譫亂語也妄妄見聞也天氣水盛辰星瑩明加其宿屬災乃至按六丙年也水勝則剋火故心臟受邪火得水則熱發於外故身熱火不勝水則內動而神不寧故煩心躁悸蓋煩輕而躁甚也火見制於水則火鬱而不能四達故上下陰厥陰厥者四肢逆冷也中寒者水盛則寒入於中宮也譫妄者火為寒閉而神明亂也惟寒閉熱故心痛水盛氣寒寒必先時而至水星光明於上也悸音忌甚則腹大脛腫喘咳寢汗出憎風大雨至埃霧朦郁上應鎮星按甚則水盛邪王腎當自病盛而不已土氣承之故其候如是而土星復明也上臨太陽雨冰雪霜不時降濕氣變物按張景岳曰此以水運而遇太陽司天乃丙辰丙戌歲也是為天符其寒尤甚故雨冰霜雪不時降濕氣變物也病反腹滿腸鳴溏泄食不化渴而妄冒神門絕者死不治上應熒惑辰星按水盛天符之歲陰寒氣滯脾不能運故為腹滿等證水既制火心火乃內燔則為渴而妄冒神門心脈也水亢則心絕故死不治上應熒惑辰星勝者明而衰者暗也帝曰善其不及何如岐伯曰悉乎哉問也歲木不及燥乃大行燥金氣也生氣失應草木晚榮後時之謂肅殺而甚則剛木闢著柔萎蒼干上應太白星按六丁年也丁為陰木政屬不及剛堅木柔耎草闢著槁而不落蒼干枯而無色是正所謂木不及也木不及則金氣勝而其星明於其上矣民病中清胠脅痛少腹痛腸鳴溏泄涼雨時至上應太白星其谷蒼按新校正云詳中清胠脅少腹痛為金乘木肝病之狀腸鳴溏泄乃脾病之證蓋以木少脾土無畏侮反受邪之故也張景岳曰谷之蒼者屬木麻之類也金勝而火不復則蒼谷不成上臨陽明生氣失政草木再榮化氣乃急上應太白鎮星其主蒼早按張景岳曰上臨陽明丁卯丁酉歲也金氣亢甚故生氣失政草木再榮者以木氣既衰得火土旺時土無所制化氣乃急故秋夏再榮也其上應於星則金土明曜其下主於物則蒼者早凋新校正云按不及五化獨紀木上臨陽明土上臨厥陰水上臨太陰不紀木上臨厥陰土上臨太陰金上臨陽明者經之旨各紀其甚者也故於太過運中只言火臨火水臨水此不及運中只言木臨金土臨木水臨土故不言厥陰臨木太陰臨土陽明臨金也復則炎暑流火濕性燥柔脆草木焦槁下體再生華實齊化病寒熱瘡瘍疿胗癰痤上應熒惑太白其谷白堅按張景岳曰復者子為其母報復也木衰金亢火則復之故為炎暑流火而濕性之物皆燥柔脆草木皆枝葉焦枯下體復生其生既遲則旋花旋實是謂齊化火氣反甚故其為病如此其應於星則熒惑光芒太白減曜而宿屬為災其應於谷則白堅屬金秀而不實也脆音翠疿音肺胗疹同痤才何切白露早降收殺氣行寒雨害物蟲食甘黃脾土受邪赤氣後化心氣晚治上勝肺金白氣乃屈其谷不成咳而鼽上應熒惑太白星按景岳曰陽明上臨金氣清肅故為白露早降收殺氣行寒雨害物然金勝者火必衰火衰者土必弱故蟲食味甘色黃之物以甘黃皆屬土而陰氣蝕之故蟲生焉觀曬能除蛀則蟲為陰物可知故其在人又當脾土受邪也若金勝不已而火復之則赤氣之物後時而化而人之心火晚盛上克肺金凡白色屬金之物其氣乃屈也金谷稻也鼽鼻塞也其上應於星則當熒惑明太白暗而災有所屬也鼽音求歲火不及寒乃大行長政不用物榮而下凝慘而甚則陽氣不化乃折榮美上應辰星諸癸歲也火少水勝故寒乃大行長政不用則物容卑下火氣既少水氣洪盛天象出見辰星益明按惟火衰水盛則陽氣凝慘故萬物不能榮盛於上而屈折也民病胸中痛脅支滿兩脅痛膺背肩胛間及兩臂內痛鬱冒矇昧心痛暴喑胸腹大脅與腰背相引而痛按新校正云詳此證與火太過甚則反病之狀同傍見臟氣法時論甚則屈不能伸髖髀如別上應熒惑辰星其谷丹按無火則氣寒而筋拘縮故令屈而不能伸也髖髀臀股之間如別者謂身如別人屈伸不能自主也水盛勝火故熒惑不明丹谷不成辰星明而為災也復則埃郁大雨且至黑氣乃辱病鶩溏腹滿食飲不下寒中腸鳴泄注腹痛暴攣痿痹足不任身上應鎮星辰星玄谷不成按張景岳曰火衰水亢土則承之土之化濕反侵水臟故為腹滿食不下腸鳴泄注痿痹足不任身等疾黑氣水氣也辱屈也鶩鳴也言如鴨糞清稀寒濕所致也土來復承故鎮星明潤辰星減光玄色之谷不成也鶩音木歲土不及風乃大行化氣不令草木茂榮飄揚而甚秀而不實上應歲星按六己歲也張景岳曰土不及而木乘之故風氣行而化氣失令木專其政故草木茂榮然發生在木而成實在土土氣不充故雖秀不實木氣上應則歲星當明也民病飧泄霍亂體重腹痛筋骨徭復肌肉瞤酸善怒藏氣舉事蟄蟲早附咸病寒中上應歲星鎮星其谷黅按張景岳曰徭復搖動反復也根結篇曰所謂骨徭者搖故也即此徭字瞤跳動也酸痠疼也凡此飧泄等病皆脾弱肝強所致土氣不及則寒水無畏故藏氣舉事蟄蟲早附應藏氣也咸病寒中火土衰也上應歲星鎮星者歲星明而鎮星暗也谷之黃者屬土不能成實矣瞤如雲切復則收政嚴峻名木蒼凋胸脅暴痛下引少腹善太息蟲食甘黃氣客於脾黅谷乃減民食少失味蒼谷乃損上應太白歲星按木盛凌土金必復之故收氣峻而名木凋也木為金制則肝病胸脅痛引少腹太息者肝膽病也然金能平木之強而不能救土之弱故木雖為金平而土之弱自若也是以蟲食甘黃食少失味者土弱而脾病也土為木克故黅谷減木為金平則蒼谷損於是太白明而歲星暗也上臨厥陰流水不冰蟄蟲來見藏氣不用白乃不復上應歲星民乃康己亥己巳歲厥陰上臨其歲少陽在泉火司於地故蟄蟲來見流水不冰也金不得復故歲星之象如常民康不病歲金不及炎火乃行生氣乃用長氣專勝庶物以茂燥爍以行上應熒惑星按六乙歲也張景岳曰金不及而火乘之故炎火乃行金不勝木故生氣用而庶物茂火氣獨王故長氣勝而燥爍行其應於星則熒惑光芒也爍式灼切民病肩背瞀重鼽嚏血便注下收氣乃後上應太白星其谷堅芒按張景岳曰瞀悶也鼽鼻塞流涕也金受火邪故為此諸病收氣乃後太白無光堅芒之谷不成皆金氣不足之應瞀音茂嚏音帝復則寒雨暴至乃零冰雹霜雪殺物陰厥且格陽反上行頭腦戶痛延及腦頂發熱上應辰星丹谷不成民病口瘡甚則心痛按張景岳曰金衰火亢水來復之故寒雨暴至繼以冰雹霜雪災傷萬物寒之變也厥逆也格拒也寒勝於下則陰厥格陽而反上行是謂無根之火故為頭頂口心等病其應於天者辰星當明應於地者丹色之谷不成也按此水復火衰當云上應熒惑辰星此不言熒惑者闕文也雹音薄歲水不及濕乃大行長氣反用其化乃速暑雨數至上應鎮星按六辛歲也水不及而土乘之故濕乃大行水衰則火無所畏故反用事而與土同化且速上應鎮星光明也民病腹滿身重濡泄寒瘍流水腰股痛發膕腨股膝不便煩冤足痿清厥腳下痛甚則胕腫藏氣不政腎氣不衡上應辰星其谷秬按張景岳曰水弱土強傷及腎陰故為此諸病寒瘍流水陰蝕陰疽之類是也煩冤煩悶抑鬱也清厥寒厥也胕腫浮腫也藏氣水氣也衡平也不政不衡水氣衰也上應辰星不明下應秬黍不成秬黑黍也上臨太陰則大寒數舉蟄蟲早藏地積堅冰陽光不治民病寒疾於下甚則腹滿浮腫上應鎮星其主黅谷按張景岳曰辛丑辛未歲也太陰濕土司天則太陽寒水在泉故大寒舉而陽光不治也甚則腹滿浮腫濕土勝而腎氣傷也其上應者當鎮星增曜其下應者當黅谷有成復則大風暴發草偃木零生長不鮮面色時變筋骨並闢肉瞤瘛目視䀮䀮物疏璺肌肉胗發氣並膈中痛於心腹黃氣乃損其谷不登上應歲星按張景岳曰水衰土亢木來復之故大風暴發草僕木落而生長失時皆不鮮明也面色時變肝氣動也並拘攣也闢偏欹也瞤瘛動掣也䀮䀮目不明也璺物因風而破裂也肝氣在外則肌肉風疹肝氣在中則痛於心腹皆木勝之所致故黃氣損而屬土之谷不登其上應於天則惟歲星當明也愚按五運之有太過不及此勝復之所以生也太過者其氣勝勝而無制則傷害甚矣不及者其氣衰衰而無復則敗亂極矣此勝復循環之道出乎天地之自然而亦不得不然者也故其在天則有五星運氣之應在地則有萬物盛衰之應在人則有臟腑疾病之應如木強勝土則歲星明而鎮星暗土母受侮子必復之故金行伐木以救困土則太白增光歲星反晦也凡氣見於上則災應於下宿屬受傷逆犯尤甚五運互為勝復其氣皆然至其為病如木勝肝強必傷脾土肝勝不已燥必復之而肝亦病矣燥勝不已火必復之而肺亦病矣此五臟互為盛衰其氣亦皆然也夫天運之有太過不及者即人身之有虛實也惟其有虛而後強者勝之有勝而後承者復之無衰則無勝矣無勝則無復矣無勝無復其氣和平焉得有病恃強肆暴元氣泄盡焉得無虛故曰有勝則復無勝則否勝微則復微勝甚則復甚可見勝復之微甚由變化之盛衰本無其常也今有昧者每鑿執經文以害經意如馬宗素之流假仲景之名而為傷寒鈐法等書用運氣之更遷擬主病之方治拘滯不通誠然謬矣又有一等偏執己見不信運氣者每謂運氣之學何益於醫豈知歲氣之流行即安危之關係或疫氣遍行而一方皆病風溫或清寒傷臟則一時皆犯瀉痢或痘疹盛行而多凶多吉期各不同或疔毒遍生而是陰是陽每從其類或氣急咳嗽一鄉並興或筋骨疼痛人皆道苦或時下多有中風或前此盛行痰火諸如此者以眾人而患同病謂非運氣之使然歟昔元太和二年東垣制普濟消毒飲以救時疫所活甚眾即此類也夫人殊稟賦令易寒暄利害不侔氣交使然故凡以太陽之人而遇流衍之氣以太陰之人而遇赫曦之紀強者有制弱者遇扶氣得其平何病之有或以強陽遇火則炎烈生矣陰寒遇水則冰霜及矣善察運氣者必當順天以察運因變以求氣其有不合於道者未之有也瞤如雲切䀮音荒璺音問帝曰善願聞其時也岐伯曰悉哉問也此下言不及之歲其政化勝復各有時也本篇凡太過之年不言勝復故不及之木不及春有鳴條律暢之化則秋有霧露清涼之政春有慘淒殘賊之勝則夏有炎暑燔爍之復其眚東其臟肝其病內舍胠脅外在關節按張景岳曰和則為化為政運之常也不和則為勝為復氣之變也如歲木不及金當克之使金不來勝而木氣無傷則春有鳴條律暢之化至秋之時則金亦無復而有霧露清涼之政此氣之和也若春見金氣而有慘淒殘賊之勝則木生火火來剋金而夏有炎暑燔爍之復矣此氣之變也然此之勝復皆因於木故災眚當見於東方在人之臟當應於肝肝之部分內在胠脅外在關節故其為病如此下義俱同燔音煩爍式灼切眚音省火不及夏有炳明光顯之化則冬有嚴肅霜寒之政夏有慘淒凝冽之勝則不時有埃昏大雨之復其眚南其髒心其病內舍膺脅外在經絡按張景岳曰火不及者水當乘之若水不侮火而夏有此化則水亦無復而冬有此政若水不務德而夏有此勝則火生土土來剋水而不時有此復矣其眚南其髒心皆火之應土不及四維有埃云潤澤之化則春有鳴條鼓折之政四維發振拉飄騰之變則秋有肅殺霖霪之復其眚四維其臟脾其病內舍心腹外在肌肉四肢按四維辰戌丑未方月也張景岳曰歲土不及木當勝之若木不侮土而四季有此化則木亦無復而春有此政若木勝土而四季有此變則土生金金來剋木而秋有此復矣其眚四維其臟脾皆土之應拉音臘霪音淫金不及夏有光顯鬱蒸之令則冬有嚴凝整肅之應夏有炎爍燔燎之變則秋有冰雹霜雪之後其眚西其臟肺其病內舍膺脅肩背外在皮毛按張景岳曰歲金不及火當勝之若火得其正而夏有此令則水亦無復而冬有此應若火氣侮金而夏有此變則金之子水水來剋火而秋有此復矣其眚西其臟肺皆金之應按此下二節不先言金水之本化而先言火土之制化與上三節不同者不過文體之變而義則同也水不及四維有湍潤埃云之化則不時有和風生髮之應四維發埃昏驟注之變則不時有飄蕩振拉之復其眚北其臟腎其病內舍腰脊骨髓外在溪谷踹膝按張景岳曰歲水不及土當勝之若土不為虐而四季有此正化則木亦無復而不時有此正應若土肆其勝而有四維之變則水之子木木來剋土而不時有此復矣其眚北其臟腎皆水之應湍通官切踹腨同夫五運之政猶權衡也高者抑之下者舉之化者應之變者復之此生長化成收藏之理氣之常也失常則天地四塞矣按權衡者所以平物之不平也天地之道以平為正故凡亢而高者常抑之使降卑而下者常舉之使升化得其正氣常相應鼓之桴也邪而為變子為母復承乃制也所以春生夏長四季化成秋收冬藏實天地不易之理而五行自然之氣也苟氣反其常則高下不平而天地閉塞矣帝曰夫子之言五氣之變四時之應可謂悉矣夫氣之動亂觸遇而作發無常會卒然災合何以期之按動亂謂因動而亂也卒然發作亦有可期必之道乎岐伯曰夫氣之動變固不常在而德化政令災變不同其候也按言變雖無常而候則可考也帝曰何謂也按言其候何如岐伯曰東方生風風生木其德敷和其化生榮其政舒啟其令風其變振發其災散落按敷和者謂敷布其融和之氣春之德也生榮者榮華之色化生於春也舒張也啟開也春以開張為政也是德化政令春之正也至其為變則振動發揚其為災則消散零落惟振發故散落也五運行大論曰其德為和其化為榮其政為散其令宣發其變摧拉其眚為隕文有詳簡之分而義則一也南方生熱熱生火其德彰顯其化蕃茂其政明曜其令熱其變銷爍其災燔焫按彰者自內而著於外顯則昭著之極象火之外達也蕃茂者夏時萬物蕃盛而暢茂也明曜者火之光輝也銷爍者火焦灼也燔焫者火燎原也五運行大論曰其德為顯其化為茂其政為明其令鬱蒸其變炎爍其眚燔焫焫如瑞切中央生濕濕生土其德溽蒸其化豐備其政安靜其令濕其變驟注其災霖潰按張景岳曰溽蒸濕熱也豐備充盈也驟注急雨也霖久雨也潰崩決也五運行大論曰其德為濡其化為盈其政為謐其令雲雨其變動注其眚霖潰溽音辱潰音會西方生燥燥生金其德清潔其化緊斂其政勁切其令燥其變肅殺其災蒼隕按清潔者暑去涼生氣清爽而潔淨也緊斂收縮也肅殺秋氣嚴肅而行殺令也蒼隕草木蒼老而隕落也五運行大論曰其德為清其化為斂其政為勁其令霧露其變肅殺其眚蒼落隕音允北方生寒寒生水其德淒滄其化清謐其政凝肅其令寒其變凓冽其災冰雪霜雹按張景岳曰淒滄寒氣也謐靜也凝肅堅斂也凓冽寒甚也冰雪霜雹陰氣所凝或太陽用事或以水復火則非時而見五運行大論曰其德為寒其化為肅其政為靜其變凝冽其眚冰雹滄音倉謐音密是以察其動也有德有化有政有令有變有災而物由之而人應之也按張景岳曰德化政令和氣也為災為變乖氣也施化出乎天地而人物應之得其和則為生為成遇其乖則為災為害帝曰夫子之言歲候不及其太過而上應五星今夫德化政令災眚變易非常而有也卒然而動其亦為之變乎按張景岳曰此承上文而詳求五星之應謂凡德化政令災眚變易其有卒然而動者星亦上應否也岐伯曰承天而行之故無妄動無不應也卒然而動者氣之交變也其不應焉故曰應常不應卒此之謂也按承天而行謂歲運承乎天運太過不及各有其常五星自相應於上以氣無妄動故也若夫卒然而動非關天運因交而變則五星未必相應其不應也氣非一定星無所屬故也帝曰其應奈何岐伯曰各從其氣化也按張景岳曰各從其氣化者歲星之化其應風熒惑之化其應火鎮星之化其應濕太白之化其應燥辰星之化其應寒也應近則小應遠則大按五星之應六氣為災為德各有遠近之分其近而微也星象常小其遠而甚也星象常大德者福之過者伐之按順天氣者有德者也天錫之福逆天氣者有過者也天伐之災是以象之見也高而遠則小下而近則大故大則喜怒邇小則禍福遠按星象之有大小也由於所見之有不同也下而近則大大非無因也喜怒之應將近矣高而遠則小小非偶然也禍福之應尚遠也張景岳曰上文云應近則小應遠則大此云大則喜怒邇小則禍福遠似乎相反但上文之近遠近言其微遠言其甚故應微而近則象小應甚而遠則象大此言邇遠者邇言其急遠言其緩故象大則喜怒之應近而急象小則禍福之應遠而緩蓋上文以體象言此以遠近辨二者詞若不同而理則一也帝曰其德化政令之動靜損益皆何如岐伯曰夫德化政令災變不能相加也勝復盛衰不能相多也往來小大不能相過也用之升降不能相無也各從其動而復之耳按天地之道分於陰陽陰陽之理不外動靜是故其靜也眾理涵焉事物安焉何損何益然不能以終靜也則紛然而動矣德也災也勝也復也往也來也升也降也益兮復損損兮復益皆動之所致也六微旨大論曰成敗倚伏生乎動動而不已則變作矣易曰吉凶悔吝者生乎動者也此之謂歟帝曰其病生何如岐伯曰德化者氣之祥政令者氣之章變易者復之紀災眚者傷之始按祥瑞徵也章昭著也紀者變易之期始者災傷所由氣相勝者和不相勝者病重感於邪則甚也帝曰善按相勝者正勝邪也不相勝者邪勝正也重感於邪如有餘逢王不足被傷則盛者愈盛虛者愈虛其病必甚也五常政大論按新校正云詳此篇統論五運有平氣不及太過之事次言地理有四方高下陰陽之異又言歲有不病而臟氣不應為天氣制之而氣有所從之說次言六氣五類相制勝而歲有胎孕不育之理而後明在泉六化五味有厚薄之異而以治法終之此篇之大概如此而專名五常政大論者舉其所先者言也黃帝問曰太虛寥廓五運迥薄衰盛不同損益相從願聞平氣何如而名何如而紀也岐伯對曰昭乎哉問也木曰敷和敷布和氣物以生榮火曰升明按火性上升而光明土曰備化按土生萬物無所不備金曰審平按物之至不平者金能平之故曰審平金王於秋四時之氣亦以秋為平也水曰靜順按靜者水之體順者水之性帝曰其不及奈何岐伯曰木曰委和按萎弱而柔和也火曰伏明按火氣弱則光明內伏土曰卑監按土薄則卑不能長養萬物但可監司守位而已金曰從革按皮堅曰革外實中空金虛之義也水曰涸流水少故流注乾涸帝曰太過何謂岐伯曰木曰發生按木盛則能發生火曰赫曦盛明也土曰敦阜敦厚也阜高也土余故厚而高金曰堅成按金王於秋金性堅固萬物收成水曰流衍按水盛則流而衍溢也帝曰三氣之紀願聞其候岐伯曰悉乎哉問也按此論與陰陽應象金匱真言五運行等論相通而義特詳備敷和之紀木德周行陽舒陰布五化宣平自當其位不與物爭故五氣之化各布政令於四方無相干犯按新校正云王注太過不及各紀年辰此平木運不紀年辰者平氣之歲不可定紀也或者欲補註云謂丁巳丁亥壬寅壬申者是未達也其氣端端直也其性隨順於物也其用曲直曲直材幹皆應用也其化生榮其類草木木體堅高草形卑下然各有堅脆剛柔蔓結條屈者其政發散其候溫和其令風其臟肝肝其畏清清金令也木性暄故畏清其主目陽升明見目與同也其谷麻色蒼也按金匱真言論云其穀麥與此不同其果李味酸也其實核按凡果雖各有所屬而其核總屬於木蓋實生於木而核又為木之所自生其應春其蟲毛按蟲之有毛者象木之有枝葉也其畜犬如草木之生無所避也按金匱真言論云其畜雞其色蒼木化宣行則物浮蒼翠按蒼即青也木之色故東方曰蒼天其養筋其病裡急支滿按養猶主也肝主筋金匱真言論云是以知病之在筋也肝性喜暢而惡郁肝病則氣鬱閉而不通故令臟腑逼迫而脅肋脹滿亦肝病之一端也其味酸其音角其物中堅象土中之有木也其數八成數也升明之紀正陽而治德施周普五化均衡均等也衡平也按正陽者謂火得其平而無亢烈之患也其氣高火炎上其性速火性躁疾其用燔灼燔燒也灼焦也皆火之為用其化蕃茂按物之生化必借陽和之氣故萬物盛茂於夏月其類火其政明曜德合高明火之政也其候炎暑其令熱其髒心心其畏寒寒勝熱也其主舌按暢所欲言惟舌是賴其穀麥色赤也按金匱真言論云其谷黍其果杏按其色赤耳注謂味苦誤矣其實絡按絡脈絡謂心主脈絡也其應夏其蟲羽羽火象也其畜馬健決躁速火類同按金匱真言論云其畜羊其色赤色同火明其養血其病瞤瘛火之性動也按金匱真言論云是以知病之在脈也其味苦按味從火化則為焦苦其音徵和而美其物脈中多支脈火之化也其數七備化之紀氣協天休德和四政五化齊修土之德靜分助四方贊成金木水火之政土之氣厚應天休和之氣以生長收藏終而復始故五化齊備其氣平其性順按土位居中備四時之氣故和而平土德最柔為萬物之母故和而順其用高下按為陵為谷地之妙用也其化豐滿其類土其政安靜按隨地皆土何豐滿也隤然不動何安靜也其候溽蒸按溽濕也蒸熱也其令濕按惟溽蒸故濕也其臟脾脾其畏風按風生於木木剋土故土惡木而畏風其主口土體包容口主受納其谷稷其果棗按稷色黃而棗味甘也其實肉按肉者身之土土者地之肉也其應長夏按長夏六月也火王之時土生於火長養於夏月故曰長夏其蟲倮按倮蟲無毛羽鱗甲以肉為體象土之肥而厚也其畜牛成彼稼穡土之用也按亦厚重而色黃也其色黃其養肉按與土同也其病痞土性擁礙按土主脾胃脾胃者元氣之母病則氣滯不行而痞塞也其味甘按土氣和平故味甘美其音宮大而重按宮中聲也其物膚按膚猶肉也其數五審平之紀收而不爭殺而無犯五化宣明按是乃所以為審平也其氣潔按秋氣清爽而潔淨也其性剛按金以堅勁為性其用散落金用則萬物散落其化堅斂其類金收斂堅強金之化也其政勁肅其候清切其令燥按秋時之氣如是也其臟肺肺其畏熱其主鼻肺藏氣鼻通息也其谷稻其果桃按稻色白而桃味辛也其實殼按殼包於外象金堅也其應秋其蟲介其畜雞按介即蟲之殼雞性喜鬥象金殺也金匱真言論云其畜馬與此不同其色白其養皮毛按皮毛得金堅勁之氣外捍風寒故與肺合也其病咳有聲之病金之應也其味辛其音商和利而揚其物外堅按亦殼之義其數九靜順之紀藏而勿害治而善下五化咸整按善下者水之性也然水病則或有逆而上浮者故以善下為靜順之正也謹按平氣五紀每紀必言五化者謂凡人身五臟之氣常相資益缺一不可今一臟之氣既得其平自可以相資於各臟以化生夫氣血故各言五化也其氣明按水以明徹為正氣其性下其用沃衍其化凝堅按水至冬則凝為堅冰水之化也其類水其政流演井泉不竭河流不息則流演之義也其候凝肅其令寒按寒威嚴肅冬之時令其臟腎腎其畏濕按濕土氣也土剋水故其主二陰流注應同按金匱真言論云北方黑色入通於腎開竅於二陰其谷豆其果慄按豆與慄皆益腎者其實濡中有津液也其應冬其蟲鱗按鱗者水之蟲其畜彘按彘喜臥而不惡濕象冬藏屬水也其色黑其養骨髓按髓者水之精其病厥厥氣逆也凌上也倒行不順也按注言是矣然腎位居下病則何以逆而凌上也夫腎者五臟之本也本不固則陰虛不能維陽為喘為脹昧者不達專治脾肺陋亦甚矣其味鹹其音羽深而和也其物濡水化豐洽庶物濡潤其數六故生而勿殺長而勿罰化而勿制收而勿害藏而勿抑是謂平氣按言氣得其平則四時五紀有益無損而萬物均得其養也注言生氣主歲收氣不能縱其殺等語是作生克解誤矣委和之紀是謂勝生丁卯丁丑丁亥丁酉丁未丁巳之歲生氣不政化氣乃揚木少故生氣不政土寬故化氣乃揚長氣自平政令乃早火無忤犯故長氣自平木氣既少故收令乃早涼雨時降風雲並興木弱不能勝土故其氣相併於上也草木晚榮蒼干凋落物秀而實膚肉內充按應晚榮者反凋落應秀實者但內充是正所謂生氣不政也其氣斂其用聚按春以發散為正斂聚者木弱不能散發故也其動緛戾拘緩按春木發動鬱勃怒生緛戾拘緩者木氣衰少動而濡滯也其發驚駭大屈卒伸驚駭象也其臟肝其果棗李棗土李木實也按新校正云詳李木實也按火土金水不及之果李當作桃王注亦非其實核殼其谷稷稻其味酸辛其色白蒼其畜犬雞其蟲毛介其主霧露淒滄其聲角商其病搖動注恐從金化也木不自政故化從金少角與判商同少角木不及故半與商金化同判半也按新校正云詳火土金水之文判作少則此當云少角與少商同不云少商者蓋少角之運共有六年而丁巳丁亥上角與正角同丁卯丁酉上商與正商同丁丑丁未上宮與正宮同是六年者各有所同與火土金水之少運不同故不云同少商只大約言半從商化也上角與正角同上見厥陰與敷和歲化同謂丁巳丁亥歲上之所見者也上商與正商同上見陽陰則與平金歲化同丁卯丁酉歲上見陽明其病支廢癰腫瘡瘍金刑木也其甘蟲按缺文也邪傷肝也雖化悉與金同然其所傷則歸於肝木也上宮與正宮同土蓋其木與未出等也木未出土與無木同土自用事故與正土運歲化同也上見太陰是謂上宮丁丑丁未歲也蕭飋肅殺則炎赫沸騰蕭飋肅殺金無德也炎赫沸騰火之復也眚於三火為木復故眚在東三東方也此言金之物勝也按六元正紀大論云災三宮也所謂復也復報復也其主飛蠹蛆雉飛羽蟲也蠹內生蟲也蛆蠅之生者此則物之自化耳雉鳥耗也乃為雷霆雷為大聲生於太虛之中霆為迅雷卒如火之爆者即霹靂也伏明之紀是謂勝長藏氣勝長也謂癸酉癸未癸巳癸卯癸丑癸亥之歲也長氣不宣藏氣反布火之長氣不能施化故水之藏氣反布於時收氣自政化令乃衡金土之義與歲氣素無干犯故金自行其政土自平其氣也寒清數舉暑令乃薄火氣不用故承化物生生而不長火令不振故承化生之物皆不長也成實而稚遇化已老物實成熟苗尚稚短及遇化氣未長極而氣已老矣陽氣屈伏蟄蟲早藏陽不用而陰勝也若上臨癸卯癸酉歲蟄蟲反不藏按新校正云詳癸巳癸亥之歲蟄亦不藏其氣鬱其用暴按火弱則不能外達而鬱矣鬱極而動其勢必甚其動彰伏變易按火無力則隱見不常忽彰忽伏變易無定也其發痛其髒心按痛生於心心屬火凡痛多屬於火也其果慄桃慄水果桃金果也其實絡濡絡支脈也濡有汁也其谷豆稻豆水稻金谷也其味苦鹹其色玄丹其畜馬彘其蟲羽鱗其主冰雪霜寒其聲徵羽其病昏惑悲忘從水化也火弱水強故伏明之紀半從水之政化少徵與少羽同火少故半同水化按新校正云詳少徵運六年內癸卯癸酉同正商癸巳癸亥同歲會外癸未癸丑二年少徵與少羽同故不云判羽也上商與正商同歲上見陽明則與平金歲化同也癸卯癸酉歲上見陽明按新校正云詳此不言上宮上角者蓋宮角於火無大克罰故經不備云邪傷心也凝慘凓冽則暴雨霖霪凝慘凓冽水無德也暴雨霖霪土之復也眚於九九南方也按六元正紀大論云災九宮其主驟注雷霆震驚沈䩅淫雨䩅音陰卑監之紀是謂減化謂化氣減少己巳己卯己丑己亥己酉己未之歲也化氣不令生政獨彰土少而木專其用長氣整雨乃愆收氣平不相干犯則平整化氣減故雨愆期風寒並興草木榮美風木也寒水也土少故寒氣得行生氣獨彰故草木敷榮而端美秀而不實成而秕也榮秀而美氣生於木化氣不滿故物實中空是以秕惡其氣散從木之風故施散也其用靜定按土體雖靜而用不可一於靜靜而定則土之用隘矣其動瘍湧分潰癰腫按瘍湧者瘡癢之膿汁湧溢分潰者分裂而潰爛也癰腫者熱毒壅於內而腫硬也其發濡滯按濡潤者土之性病則濡而滯矣其臟脾其果李慄李木果慄水果也其實濡核濡中有汁者核中堅者按新校正云詳前後濡實主水此濡字當作肉王注亦非其谷豆麻豆水麻木其味酸甘按甘屬脾土酸屬肝木其色蒼黃按黃土色蒼木色其畜牛犬土從木畜其蟲倮毛倮從毛其主飄怒振發木之氣用也其聲宮角宮從角其病留滿痞塞按土被木克故自病從木化也按木強勝土則曰克土弱受制於木則曰從也少宮與少角同按新校正云詳少宮之運六年內除己丑己未與正宮同己巳己亥與正角同外有己卯己酉二年少宮與少角同故不云判角也上宮與正宮同上見太陰則與平土運生化同也己丑己未其歲見也上角與正角同上見厥陰則悉是敷和之紀也己亥己巳其歲見也其病飧泄邪傷脾也按邪謂木也振拉飄揚則蒼干散落按木肆其強則金起而平之為土復仇也其眚四維按四維土六位也其主敗折虎狼諸四足之獸害於粢盛及生命也清氣乃用生政乃辱金氣行則木氣屈從革之紀是謂折收火折金收之氣也謂乙丑乙亥乙酉乙未乙巳乙卯之歲也收氣乃後生氣乃揚後不及時也長化合德火政乃宣庶類以蕃按金弱則木無所畏且得火土之助而榮茂也其氣揚其用躁切按金不及則見制於火順其性而動其動鏗禁瞀厥鏗咳聲也禁謂二陰禁止也瞀悶也厥謂氣上逆也其發咳喘其臟肺咳嗽也喘氣急促也皆肺之病其果李杏其實殼絡其谷麻麥其味苦辛其色白丹其畜雞羊其蟲介羽其主明曜炎爍其聲商徵其病嚏咳鼽衄從火化也火氣來勝故屈己以從之少商與少徵同金少故半同火化也按新校正云詳少商運六年內除乙卯乙酉同正商乙巳乙亥同正角外乙未乙丑二年為少商同少徵故不云判徵也上商與正商同上見陽明則與平金運生化同乙巳乙亥其歲上見也按新校正云詳金土無相勝克故經不言上宮與正宮同也邪傷肺也按邪謂火炎光赫烈則冰雪霜雹按火盛爍金水為金復雹冰粒也眚於七七西方也其主鱗伏彘鼠歲氣早至乃生大寒水之化也按伏字疑有誤涸流之紀是謂反陽陰氣不及反為陽氣代之謂辛未辛巳辛卯辛酉辛亥辛丑之歲也藏令不舉化氣乃昌少水而土盛長氣宣布蟄蟲不藏土潤水泉減草木條茂榮秀滿盛長化之氣豐而厚也其氣滯其用滲泄按滯者流而不通壅淤之類是也滲泄者通而不流水從罅出者也皆水弱無力之所致其動堅止謂便瀉也水少不濡則干而堅止其發燥槁其臟腎陰少而陽盛故爾其果棗杏其實濡肉其谷黍稷按新校正云本論上文麥為火之谷今言黍者疑麥字誤也雖金匱真言論作黍然本論作麥當從本篇之文也按黍者今之小米熟於夏末秋初麥熟於夏至前皆當火令故經兩存之校正不自知其誤也其味甘鹹其色黅玄其畜彘牛其蟲鱗倮其主埃郁昏翳其聲羽宮其病痿厥堅下從土化也按己弱不能自主則從勝己者矣少羽與少宮同水土各半化也按新校正云詳少羽之運六年內除辛丑辛未與正宮同外辛卯辛酉辛巳辛亥四歲為同少宮故不言判宮也上宮與正宮同上見太陰則與平土運生化同辛丑辛未歲上見之按新校正云詳此不言上角上商者蓋水於金木無相剋罰故也其病癃閉癃小便不通閉大便乾澀不利也邪傷腎也按邪土也埃昏驟雨則振拉摧拔按土肆其虐則木為之復也眚於一一北方也諸謂方者國郡州縣境之方也其主毛顯狐狢變化不藏按毛謂毛蟲毛蟲之屬頗多其善變化者惟狐狢最顯今北方之氣既弱故其所屬之獸即善變化者亦不能善藏其用也故乘危而行不速而至暴虐無德災反及之微者復微甚者復甚氣之常也通言五行氣少而有勝復之大凡也乘彼孤危恃乎強盛不召而往專肆威刑怨禍自招又誰咎也假令木弱金氣來乘暴虐倉卒是無德也木被金害火必仇之金受火燔則災及也夫如是者刑甚則復甚刑微則復微氣動之常固其宜也五行之理咸迭然乎發生之紀是謂啟𢽬物乘木氣以發生而啟陳其容質也是謂壬申壬午壬辰壬寅壬戌壬子之六歲化也𢽬古陳字土疏泄蒼氣達陽和布化陰氣乃隨生氣淳化萬物以榮其化生其氣美其政散其令條舒按木有餘則氣盛條達生生化化自爾榮美也其動掉眩巔疾掉動搖也眩旋轉也巔上首也疾病氣也按木盛則風生故令頂巔之上掉搖眩暈或為痛腫等疾注將巔疾分靳非其德鳴靡啟坼按靡字難解六元正紀論云其化鳴紊啟坼是也其變振拉摧拔按風動故也其谷麻稻其畜雞犬其果李桃其色青黃白其味酸甘辛按木盛而齊金化盛則足以兼所勝也其象春其經足厥陰少陽其臟肝脾按宜云肝膽而云肝脾者木盛則制土故兼言脾也其蟲毛介按亦齊金也其物中堅外堅中堅有核之物齊等於皮殼之類也其病怒木余故按心有所不平則怒故怒則氣激而上為肝之病太角與上商同太過之木氣與金化齊等上徵則其氣逆其病吐利上見少陰少陽則其氣逆行壬子壬午歲上見少陰壬寅壬申上見少陽木余遇火故氣不順按新校正云詳五運行大論云氣相得而病者以下臨上不當位也不云上羽者水臨木為相得故也不務其德則收氣復秋氣勁切甚則肅殺清氣大至草木凋零邪乃傷肝恃己太過凌犯於土土氣屯極金為復仇金行殺令故邪傷肝木也赫曦之紀是謂蕃茂物遇太陽則蕃而茂是謂戊辰戊寅戊子戊戌戊申戊午之歲也按新校正云或者云注中太陽當作太徵詳木土金水之太過注俱不言角宮商羽等運而水太過注云陰氣大行此火太過是物遇太陽也安得謂之太徵乎陰氣內化陽氣外榮炎暑施化物得以昌按氣盛則生化有力其化長其氣高其政動其令鳴顯火之用而有聲火之燔而有焰象無所隱則其信也其動炎灼妄擾按妄擾者火動不常也其德暄暑鬱蒸其變炎烈沸騰按夏火以熱為正暄暑鬱蒸庶類資之以蕃育炎烈沸騰萬物因之以焦枯其德其變總於是分焉其穀麥豆其畜羊彘按新校正云羊當從本論上文作馬按馬必午飲羊必午食皆火畜也經兩言之宜矣其果杏慄其色赤白玄其味苦辛鹹按皆火盛而齊水化也其象夏其經手少陰太陽手厥陰少陽按四經皆應火也其髒心肺按火王則刑金其蟲羽鱗其物脈濡脈火物濡水物水火齊也其病笑瘧瘡瘍血流狂妄目赤火盛故上羽與正徵同其收齊上見太陽則天氣且制故太過之火反與平火運生化同也戊辰戊戌歲上見之若平火運同則五常之氣無相凌犯故金收之氣生化同等其病痓上徵而收氣後也上見少陰少陽則其生化自政金氣不能與之齊化戊子戊午歲上見少陰戊寅戊申歲上見少陽火盛故收氣後化暴烈其政藏氣乃復時見凝慘甚則雨水霜雹切寒邪傷心也不務其德輕侮致之也敦阜之紀是謂廣化土余故化氣廣被於物也是謂甲子甲戌甲申甲午甲辰甲寅之歲也厚德清靜順長以盈土性順用無與物爭故德厚而不躁順火之長育使萬物化氣盈滿也至陰內實物化充成至陰土精氣也夫萬物所以化成者皆以至陰之靈氣生化於中也煙埃朦郁見於厚土大雨時行濕氣乃用燥政乃闢按土愈厚則濕愈盛濕氣既行則燥氣退避闢音避其化圓按地德本方而土養萬物無所不載是體方而用圓也其氣豐其政靜其令周備按豐厚安靜無物不有其動濡積並稸按土厚則濕氣凝滯而積蓄其德柔潤重淖按土濕而泥謂之淖重淖者濡潤之極也其變震驚飄驟崩潰按土盛之極木來相刑故令崩潰而有此變也其谷稷麻其畜牛犬其果棗李其色黅玄蒼其味甘鹹酸按土齊木化也其象長夏其經足太陰陽明按脾與胃也其臟脾腎按土勝水也其蟲倮毛其物肌核按亦土兼木化也其病腹滿四肢不舉按土盛極而自病也新校正云詳此不云上羽上徵者徵羽不能虧盈於土故無他候也大風迅至邪傷脾也按木惡土之過盛而相刑也堅成之紀是謂收引引斂也陽氣收陰氣用故萬物收斂謂庚午庚辰庚寅庚子庚戌庚申之歲也天氣潔地氣明陽氣隨陰治化按秋高氣潔陽退從陰燥行其政物以司成收氣繁布化洽不終其化成其氣削其政肅其令銳切其動暴折瘍疰其德霧露肅飋其變肅殺凋零按燥政大行天氣肅殺萬物已實者收成未實者凋零而土化不得終其用其谷稻黍其畜雞馬其果桃杏其色白青丹其味辛酸苦按金盛而齊火化也其象秋其經手太陰陽明按太陰肺陽明大腸其臟肺肝按金勝木也其蟲介羽其物殼絡按金余而兼火化也其病喘喝胸憑仰息按肺有餘而自病也上徵與正商同其生齊其病咳上見少陰少陽則天氣見抑故其生化與平金歲同庚子庚午歲上見少陰庚寅庚申歲上見少陽上火制金故生氣與之齊化火乘金肺故病咳政暴變則名木不榮柔脆焦首長氣斯救大火流炎爍且至蔓將槁邪傷肺也變謂太甚也政太甚則生氣抑故木不榮草首焦死政暴不已則火氣發怒故火流炎爍至柔條蔓脆之類皆乾死也火乘金氣故肺傷也按救謂火為木子木被金傷子救其母也流衍之紀是謂封藏陰氣大行則天地封藏之化也謂丙寅丙子丙戌丙申丙午丙辰之歲寒司物化天地嚴凝藏政以布長令不揚藏氣用則長化止故令不發揚其化凜其氣堅其政謐按嚴寒之時諸物不腐氣堅故也謐靜也冬時萬物收藏而安靜其令流注水之象也其動漂泄沃湧沃沫也湧溢也按水靜則止動則有六者之不同矣其德凝慘寒雰其變冰雪霜雹按物非寒不固故以凝慘寒雰為德也氣以和為平故又以冰雪霜雹為變也雰音紛其谷豆稷其畜彘牛其果慄棗其色黑丹黅其味鹹苦甘按水盛而齊土化其象冬其經足少陰太陽按少陰腎太陽膀胱其臟腎心按水勝火也其蟲鱗倮其物濡滿按水余而兼土化其病脹水余也上羽而長氣不化也上見太陽則火不能布化以長養也丙辰丙戌之歲上見天符水運也按新校正云不言上徵者運所勝也政過則化氣大舉而埃昏氣交大雨時降邪傷腎也暴寒數舉是謂政過火被水凌土來仇復故天地昏翳土水氣交大雨斯降而邪傷腎也故曰不恆其德則所勝來復政恆其理則所勝同化此之謂也不恆謂恃己有餘凌犯不勝恆謂守常之化不肆威刑如是則克己之氣歲同治化也按此以上三氣之總結也政恆其理指平氣不恆其德兼太過不及言也帝曰天不足西北左寒而右涼地不滿東南右熱而左溫其故何也面巽言也岐伯曰陰陽之氣高下之理太少之異也高下謂地形太少謂陰陽之氣盛衰之異今中原地形西北方高東南方下西方涼北方寒東方溫南方熱氣化猶然矣東南方陽也陽者其精降於下故右熱而左溫西北方陰也陰者其精奉於上故左寒而右涼陽精下降故地以溫而知之於下矣陽氣生於東而盛於南故東方溫而南方熱陰精奉上故地以寒而知之於上矣陰氣生於西而盛於北故西方涼而北方寒君面巽而言臣面干而對也是以地有高下氣有溫涼高者氣寒下者氣熱按六元正紀大論云至高之地冬氣常在至下之地春氣常在故適寒涼者脹之溫熱者瘡下之則脹已汗之則瘡已此腠理開閉之常太少之異耳嘗試觀之高山多雪平川多雨高山多寒平川多熱則高下寒熱可徵見矣中原地形西高北高東下南下今百川滿湊東之滄海則東南西北高下可知一為地形高下故寒熱不同二則陰陽向背有少有多故表溫涼之異爾離向丙向巽向乙向震向處則春氣早至秋氣晚至早晚校十五日丁向坤向庚向兌向辛向干向坎向艮向處則秋氣早至春氣晚至早晚校二十日是所謂帶山之地也審觀向背氣候可知寒涼之地腠理開少而閉多閉多則陽氣不散故適寒涼腹必脹也濕熱之地腠理開多而閉少開多則陽發散故往溫熱皮必瘡也下之則中氣不余故脹已汗之則陽氣外泄故瘡已按適與之皆謂往也本節王注論高下寒熱之辨委曲數千言茲不盡載僅節略其精要者帝曰其於壽夭何如按言人之壽夭亦隨地氣而分乎岐伯曰陰精所奉其人壽陽精所降其人夭陰精所奉高之地也陽精所降下之地也陰方之地陽不妄泄寒氣外持邪不數中而正氣堅守故壽延陽方之地陽氣耗散發泄無度風熱數中真氣傾竭故夭折即事驗之今中原之境西北方眾人壽東南方眾人夭其中猶各有微甚耳此壽夭之大異也帝曰善其病也治之奈何岐伯曰西北之氣散而寒之東南之氣收而溫之所謂同病異治也西方北方人皮膚腠理密人皆食熱故宜散宜寒東方南方人皮膚腠理開人皆食冷故宜收宜溫散謂溫浴使中外條達收謂溫中不解表也今土俗皆反之依而療之則反甚矣故曰氣寒氣涼治以寒涼行水漬之氣溫氣熱治以溫熱強其內守必同其氣可使平也假者反之寒方以寒熱方以熱溫方以溫涼方以涼是正法也是同氣也行水漬之是湯漫漬也平謂平調也若西方北方有冷病假溫方熱方以除之東方南方有熱疾須涼方寒方以療者則反上正法以取之帝曰善其歲有不病而臟氣不應不用者何也岐伯曰天氣制之氣有所從也景岳曰歲有不病不應不用者謂歲運當病而有不病及臟氣當應而有不應不用者也天氣制之氣有所從者謂司天制之則從乎天氣故有不應乎歲者矣制禁制也帝曰願卒聞之岐伯曰少陽司天火氣下臨肺氣上從白起金用草木眚按火者金所不勝者也故火盛臨金金不敢抗而惟其令是從然火者木之子也木者金所勝也惟火盛於上金上從火陽順火之威而實陰行己之令金起用事木又受災故云白起金用草木眚是金受制於其子者還取償於其母與子為母復同一義也後並同注與諸傢俱不拈出惜哉火見燔焫革金且耗大暑以行咳嚏鼽衄鼻窒白瘍寒熱胕腫寅申之歲候也臨謂御於下從謂從事於上按王本曰瘍王注作故曰生瘍新校正謂脫一瘡字別本曰字作口皆誤也夫瘍既為頭瘡今頭瘡多白當是白字之訛耳今釐之風行於地塵沙飛揚心痛胃脘痛厥逆膈不通其主暴速厥陰在泉故風行於地風淫所勝故是病生焉少陽厥陰其化急速故病氣起發急速此地氣不順而生是也陽明司天燥氣下臨肝氣上從蒼起木用而立土乃眚淒滄數至木伐草萎脅痛目赤掉振鼓慄筋痿不能久立卯酉之歲候也按木為植類萎則僕強則挺直而立也暴熱至土乃暑陽氣鬱發小便變寒熱如瘧甚則心痛火行於稿流水不冰蟄蟲乃見少陰在泉熱監於地而為是也太陽司天寒氣下臨心氣上從而火且明按火弱則暗盛則明新校正云當作火用非丹起金乃眚寒清時舉勝則水冰火氣高明心熱煩嗌乾善渴鼽嚏喜悲數欠熱氣妄行寒乃復霜不時降善忘甚則心痛辰戌之歲候也土乃潤水豐衍寒客至沉陰化濕氣變物水飲內稸中滿不食皮𤸷肉苛筋脈不利甚則胕腫身後癰太陰在泉濕監於地而為是也按濕土在泉土盛勝水故能化陰變物然盛極則自病故又內稸中滿而𤸷苛且能抗所不勝而侮水故病筋胕腫也身後癰謂背疽新校正作身後難非𤸷音頑不知痛癢也厥陰司天風氣下臨脾氣上從而土且隆黃起水乃眚土用革體重肌肉萎食減口爽風行太虛雲物搖動目轉耳鳴巳亥之歲候也按隆豐厚也革易也謂土盛復衰而自病革易其作用也爽失也謂口不知味也惟土自病則風木益肆其強而橫行於太虛之中矣火縱其暴地乃暑大熱消爍赤沃下蟄蟲數見流水不冰其發機速少陽在泉火監於地而為是也少陽厥陰之氣變化卒急其為疾病速若發機故曰其發機速按赤沃下謂血水下流也二便血及赤帶之屬少陰司天熱氣下臨肺氣上從白起金用草木眚喘嘔寒熱嚏鼽衄鼻窒大暑流行甚則瘡瘍燔灼金爍石流子午之歲候也熱氣司天故是病生按喘嘔嚏窒等證世多以為屬寒乃君火司天亦有是病者火逆於肺則喘逆於胃則嘔火閉於肺則鼻窒外泄則嚏也地乃燥清淒滄數至脅痛善太息肅殺行草木變按少陰司天則陽明在泉而燥金用事故有是病也太陰司天濕氣下臨腎氣上從黑起水變按新校正云詳前後文此少火乃眚三字埃冒雲雨胸中不利陰痿氣大衰而不起不用當其時反腰脽痛動轉不便厥逆丑未之歲候也埃土霧也冒不分遠也雲雨土化也脽謂臀肉也按濕土司天腎水受制而生病水變正謂腎水變病也不起即痿用作用惟不起故不能作用是名陰痿所以腰脽痛而不能轉動也新校正云當作水用謬矣厥逆二字上舊有也字似屬誤多刪之脽音誰地乃藏陰大寒且至蟄蟲早附心下痞痛地裂冰堅少腹痛時害於食乘金則止水增味乃咸行水減也止水井泉也行水河渠流注者也止水雖長乃變常甘美而為鹹味也按新校正云詳太陰司天之化不言甚則病某而云當其時又云乘金則云云者與前條互相發明也太陽寒水在泉故病皆苦於寒也金者水之母井水味鹹尤益於腎故乘金則水得益而止水增長若流動之水則不甚益腎而反見減少也按六十年中每年各有司天在泉人之為病也何者屬司天何者屬在泉岐伯特悉言之欲人因言以辨證因證以施治要而論之總不出乎以勝相制之常猶可按節而推者若夫氣交之變卒然而動則不可一例求之是在神而明之存乎其人也晚近以來目不經見素問者無論矣間有一二號名讀書者專崇歲運對本抄謄是何司天用何方藥嗟乎以一方治百病軒岐雖聖欲使盡效恐亦斷斷不能也帝曰歲有胎孕不育治之不全何氣使然岐伯曰六氣五類有相勝制也同者盛之異者衰之此天地之道生化之常也故厥陰司天毛蟲靜羽蟲育介蟲不成謂乙巳丁巳己巳辛巳癸巳乙亥丁亥己亥辛亥癸亥之歲也靜無聲也亦謂靜退不先用事也羽為火蟲氣同地也火制金化故介蟲不成謂白色有甲之蟲少孕育也在泉毛蟲育倮蟲耗羽蟲不育地氣制土黃倮耗損歲乘木運又其甚也羽蟲不育少陽自抑之是則五寅五申歲也凡稱不育不成皆謂少非悉無也少陰司天羽蟲靜介蟲育毛蟲不成謂甲子丙子戊子庚子壬子甲午丙午戊午庚午壬午之歲也靜謂胡越燕百舌鳥之類也是歲黑色毛蟲孕育少成在泉羽蟲育介蟲耗不育五卯五酉歲也按新校正云詳介蟲耗以少陰在泉火剋金也介蟲不育以陽明在天自抑之也太陰司天倮蟲靜鱗蟲育羽蟲不成謂乙丑丁丑己丑辛丑癸丑乙未丁未己未辛未癸未之歲也倮蟲謂人及蝦蟆之類也羽蟲謂青綠色者則鸚鵡𦙴鳥翡翠之類歲乘金運其復甚焉按蟲類分屬五行五行迭勝故耗育分焉人為萬物之靈體合陰陽五德均備本非蟲類之比然自天地觀之則亦蟲焉而已在泉倮蟲育鱗蟲不成五辰五戌歲也少陽司天羽蟲靜毛蟲育倮蟲不成謂甲寅丙寅戊寅庚寅壬寅甲申丙申戊申庚申壬申之歲也在泉羽蟲育介蟲耗毛蟲不育五巳五亥歲也陽明司天介蟲靜羽蟲育介蟲不成謂乙卯丁卯己卯辛卯癸卯乙酉丁酉己酉辛酉癸酉歲也在泉介蟲育毛蟲耗羽蟲不成五子五午歲也羽蟲不成以上見少陰也太陽司天鱗蟲靜倮蟲育謂甲辰丙辰戊辰庚辰壬辰甲戌丙戌戊戌庚戌壬戌之歲也按新校正云詳此當云鱗蟲不成在泉鱗蟲耗倮蟲不育五醜五未歲也按新校正云詳此當為鱗蟲育羽蟲耗倮蟲不育諸乘所不成之運則甚也乘木之運倮蟲不成乘火之運介蟲不成乘土之運鱗蟲不成乘金之運毛蟲不成乘水之運羽蟲不成當是歲者與上文同悉少能孕育也斯並運與氣同者運乘其勝復遇天符及歲會者十孕不全一二也故氣主有所制歲立有所生地氣制己勝天氣制勝己張景岳曰地氣制己勝謂以己之勝制彼之不勝如以我之木制彼之土也天氣制勝己謂司天之氣能制夫勝己者也如丁丑丁未木運不及而上見太陰則土齊木化故上宮與正宮同癸卯癸酉火運不及而上見陽明則金齊火化故上商與正商同者是也蓋以司天在上理無可勝故反能制勝己者勝己猶可制則己勝者不言可知矣天制色地制形天氣隨己不勝者制之謂制其色也地氣隨己所勝者制之謂制其形也故又曰天制色地制形焉是以天地之間五類生化互有所勝互有所化互有所生互有所制矣五類衰盛各隨其氣之所宜也故有胎孕不育治之不全此氣之常也天地之間有生之物凡此五類也五謂毛羽倮鱗介也故曰毛蟲三百六十麟為之長羽蟲三百六十鳳為之長倮蟲三百六十人為之長鱗蟲三百六十龍為之長介蟲三百六十龜為之長凡諸有形跂行飛走喘息胎息大小高下青黃赤白黑身被毛羽鱗介者通而言之皆為之蟲矣不具是四者則為倮蟲凡此五物皆有胎生卵生濕生化生也因人致問言及五類也所謂中根也生氣之根本發自身形之中中根也非是五類則生氣根系悉因外物以成立矣按此節之義與上文迥乎不同上文論胎孕耗育之數此則言凡根於外者皆根於內王注即承上解誤矣根於外者亦五故生化之別有五氣五味五色五類五宜也五氣謂臊焦香腥腐也五味謂酸苦甘辛鹹也五色謂青黃赤白黑也帝曰何謂也岐伯曰根於中者命曰神機神去則機息根於外者命曰氣立氣止則化絕諸有形之類根於中者生源系天其所動靜皆神氣為機發之主故其所為也物莫之知是以神捨去則機發動用之道息矣根於外者生源系地故其所生長化成收藏皆為造化之氣所成立故其所出也亦物莫之知是以氣止息則生化結成之道絕滅矣其木火土金水燥濕液堅柔雖常性不易及乎外物去生氣離根化絕止則其常體性顏色皆必小變移其舊也按注是矣而未明快蓋神藏於無形氣依於有象中外常互相根也缺一不可以生矣六微旨大論曰出入廢則神機化滅升降息則氣立孤危故非出入則無以生長壯老已非升降則無以生長化收藏其義一也故各有所制各有所勝各有所生各有所成故曰不知年之所加氣之同異不足以言生化此之謂也按六節臟象論云不知年之所加氣之盛衰虛實之所起不可以為工矣帝曰氣始而生化氣散而有形氣布而蕃育氣終而象變其致一也按始以發端言散以分授言布者遍滿終者化去也氣至則生氣盡則死天地之間一氣而已然而五味所資生化有薄厚成熟有少多終始不同其故何也岐伯曰地氣制之也非天不生地不長也按人物之生固以天氣為始終而生物之體實借地氣以長養故生化成熟者天也天氣所至宜無不同而其間有薄厚多少之殊者則非天之生物有異蓋由地之長養不同耳下文正說地不長帝曰願聞其道岐伯曰寒熱燥濕不同其化也舉四氣不同則溫清異化可知之矣故少陽在泉寒毒不生其味辛其治苦酸其谷蒼丹巳亥歲氣化也夫毒者皆五行慓盛暴烈之氣所為也今火在地中其氣正熱寒毒之物氣與地殊生死不同故生少也火制金氣故味辛者不化也少陽之氣上奉厥陰故其歲化苦與酸也六氣主歲唯此歲通和木火相承故無間氣也苦丹地氣所化酸蒼天氣所生矣余所生化悉有上下勝克故皆有間氣也陽明在泉濕毒不生其味酸其氣濕按新校正云詳在泉唯陽明與太陰之歲云其氣濕其氣熱蓋以濕燥未見寒溫之氣故再云其氣也其治辛苦甘其谷丹素子午歲氣化也燥在地中其氣涼清故濕溫毒藥少生化也金木相制故味酸者少化也陽明之氣上奉少陰故其歲化辛與苦也辛素地氣也苦丹天氣也甘間氣也所以間金火之勝克故兼治甘太陽在泉熱毒不生其味苦其治淡咸其谷黅秬丑未歲氣化也寒在地中與熱殊化故其歲物熱毒不生水勝火故味苦者不化太陽之氣上奉太陰故其歲化生淡咸也太陰土氣上生於天氣遠而高故甘之化薄而為淡也所以淡亦屬甘甘之類也淡黅天化也咸秬地化也黅黃也按秬音巨黑黍厥陰在泉清毒不生其味甘其治酸苦其谷蒼赤寅申歲氣化也溫在地中與清殊性故其歲物清毒不生木勝其土故味甘少化也厥陰之氣上合少陽所合之氣既無乖忤故其治化酸與苦也酸蒼地化也苦赤天化也氣無勝克故不間氣以甘化也其氣專其味正厥陰少陽在泉之歲皆氣化專一其味純正然餘歲悉上下有勝克之氣故皆有間氣間味矣少陰在泉寒毒不生其味辛其治辛苦甘其谷白丹卯酉歲氣化也熱在地中與寒殊化故其歲藥寒毒甚微火氣爍金故味辛少化也少陰陽明主天主地故其所治苦與辛也苦丹為地氣所育辛白為天氣所生甘間氣也所以間止克伐也太陰在泉燥毒不生其味鹹其氣熱其治甘鹹其谷黅秬辰戌歲氣化也地中有濕與燥不同故干毒之物不生化也土製於木故味鹹少化也太陰之氣上承太陽故其歲化甘與咸也甘黅地化也咸秬天化也寒濕不為大忤故間氣同而氣熱者應之化淳則咸守氣專則辛化而俱治淳和也化淳謂少陽在泉之歲也火來居水而反能化育是水咸自守不與火爭化也氣專謂厥陰在泉之歲也木居於水而復下化金不受害故辛復生化與咸俱王也唯此兩歲上下之氣無克伐之嫌故辛得與咸同應王而生化也餘歲皆上下有勝克之變故其中間甘味兼化以緩其制抑余苦鹹酸三味不同其生化也故天地之間藥物辛甘者多也故曰補上下者從之治上下者逆之以所在寒熱盛衰而調之上謂司天下謂在泉也司天地氣太過則逆其味以治之司天地氣不及則順其味以和之從順也上取下取內取外取以求其過能毒者以厚藥不勝毒者以薄藥此之謂也上取謂以藥制有過之氣也制而不順則吐之下取謂以迅疾之藥除下病攻之不去則下之內取謂食及以藥內之審其寒熱而調之外取謂藥熨病所令氣調適也當寒反熱以冷調之當熱反寒以溫和之上盛不已吐而脫之下盛不已下而奪之謂求得氣過之道也藥厚薄謂氣味厚薄者也按新校正云甲乙經云胃厚色黑大骨肉肥者皆勝毒其瘦而薄胃者皆不勝毒又異法方宜論云西方之民陵居而多風水土剛強不衣而褐薦華食而脂肥故邪不能傷其形體其病生於內其治宜毒藥以上二段雖有故曰二字似根上文然是說治病用藥之法與上文之義絕不相同故別書其一而去其一能音耐氣反者病在上取之下病在下取之上病在中旁取之按此分解求病之法也氣反謂本寒似熱本熱似寒本實似虛本虛似實之類也即如陽浮於上者氣湧火騰病在於上矣而不知其為陰虛不能維陽之所致則補陰配陽與夫斂火歸原之法可用也又如泄利下注者流滑不已病在於下矣而不知其為氣虛下脫之所致則升陽益胃與夫補中益氣之劑宜施也且夫脾胃者五臟之中也或滿悶或嘈雜或嘔吐或瀉利皆中之病也中者土也土見制於木則病滿悶者木鬱而氣閉也嘈雜者木強而火熾也嘔吐瀉利者木盛之極凌脾與胃也皆脾胃之病即皆木之為患也木者肝與膽也肝膽之治在兩脅故欲治中病當取兩旁也王注似是而非今釐正之治熱以寒溫而行之治寒以熱涼而行之治溫以清冷而行之治清以溫熱而行之按此詳言用藥之理也凡病之情最忌相激必各因其氣之相近者以引之斯無悍格不相入之患即如治熱以寒治之正也然以寒藥治熱病而即寒以飲之則激矣是故與熱相近者溫也溫以引寒寒藥必行熱病自退斯為漸而不激也余同上四句是說病氣藥性下四句是說飲時各有寒熱溫涼之宜也王注殊不可解故消之制之吐之下之補之瀉之久新同法量氣盛虛而行其法病之新久無異道也帝曰病在中而不實不堅且聚且散奈何岐伯曰悉乎哉問也無積者求其臟虛者補之藥以祛之食以隨之行水漬之和其中外可使畢已按帝問蓋謂胸腹之間似有形而實無一定者治當若何伯言凡病成積多是堅實不散今既若此是蓋無積者也積為臟病臟虛氣壅似有實無法宜補之然一於用補而苟非兼用通利之品以佐之則或聚或散者必且紆徐而難效故既補之又必祛之祛謂利氣行血之類也隨者言食物之類亦當如藥之補利兼施不可偏於肥厚故曰隨之謂隨藥也行水解已見前帝曰有毒無毒服有約乎按約謂數目岐伯曰病有久新方有大小有毒無毒固宜常制矣按謂洵有常制也大毒治病十去其六下品藥毒毒之大也常毒治病十去其七中品藥毒次於下也小毒治病十去其八上品藥毒毒之小也無毒治病十去其九上品中品下品無毒藥悉謂之平按非常之病非非常之藥不能治是故毒藥者乃不得已而用之也藥愈毒則所治之病愈少所以然者常病多而異證少也用之各適其宜乃有六七八九之殊若用乖其道則不特毒者毒而無毒者亦毒矣穀肉果菜食養盡之無使過之傷其正也按此言食雖無毒而用過其節則亦能傷正氣也臟氣法時論曰毒藥攻邪五穀為養五果為助五畜為益五菜為充蓋謂人之於食但使能養氣血足矣萬勿過節以害正氣也必先歲氣無伐天和按歲有南北之殊氣有六步之分每當一歲必求其氣之所主而謹奉之欲治病者當以歲氣為先也若背時亂氣妄為施治是謂伐天之和必致盛盛虛虛致邪失正醫者所當深戒者也無盛盛無虛虛而遺人夭殃無致邪無失正絕人長命按盛者邪氣盛虛者正氣虛邪盛矣而遽施補益則盛者愈盛正虛矣而猶然攻擊則虛者愈虛致邪失正人之夭喪伊誰咎哉注謂不察虛實但思攻擊而盛者轉盛虛者轉虛萬端之病從茲而甚亦一解也帝曰其久病者有氣從不康病去而瘠奈何按帝問久病之人病已去而氣已平乃瘠弱無力如何治之岐伯曰昭乎哉聖人之問也化不可代時不可違化謂造化也代大匠斫猶傷其手況造化之氣人能以力代之乎夫生長收藏各應四時之化雖智巧者亦無能先時而致之明非人力所及由是觀之則物之生長收藏必待其時也物之成敗理亂亦待其時也物既有之人亦宜然或言力必可致而能代造化違四時者妄也按人之生也氣本乎天形養於地順天之時因地之利何病能侵惟不能順天地之氣於是乎病而且病至於久矣幸而病去氣從然其形體自必瘠弱精神自必衰耗躁妄之人每求速愈縱恣口腹氣力稍充或近房色旋至復發而死者比比然也豈知造化有消長之期四時有衰旺之序苟非安心靜守焉能一旦復元養之和之靜以待時真病後之良箴哉夫經絡以通血氣以從復其不足與眾齊同養之和之靜以待時謹守其氣無使傾移其形乃彰生氣以長命曰聖王故大要曰無代化無違時必養必和待其來復此之謂也帝曰善大要上古經法也引古之要旨以明時化之不可違不可以力代也六元正紀大論元者大也六元者謂風火燥濕寒熱六者為天地之大道五運六氣之義本篇論之獨詳故曰正紀也黃帝問曰六化六變勝復淫治甘苦辛鹹酸淡先後余知之矣夫五運之化或從天氣或逆天氣或從天氣而逆地氣或從地氣而逆天氣或相得或不相得余未能明其事欲通天之紀從地之理和其運調其化使上下合德無相奪倫天地升降不失其宜五運宣行勿乖其政調之正味從逆奈何氣同謂之從氣異謂之逆勝製為不相得相生為相得司天地之氣更淫勝復各有主治法則欲令平調氣性不違忤天地之氣以致和平也岐伯稽首再拜對曰昭乎哉問也此天地之綱紀變化之淵源非聖帝孰能窮其至理歟臣雖不敏請陳其道令終不滅久而不易帝曰願夫子推而次之從其類序分其部主別其宗司昭其氣數明其正化可得聞乎岐伯曰先立其年以明其氣按如甲子年則為君火而其運氣屬火之類是也金木水火土運行之數寒暑燥濕風火臨御之化則天道可見民氣可調陰陽卷舒近而無惑數之可數者請遂言之按岐伯詳次六十年運氣古本前後分列兩篇前篇始太陽辰戌終厥陰巳亥雖以六氣為名然每氣十年仍是六十年之數後篇始於甲子甲午終於癸巳癸亥雖以定紀為名然篇中所言仍是運化氣味合而觀之前詳後略大同小異分而閱之則殊亂人心目矣賴景岳張公並而為一省覽甚便故如其所次以錄間有未盡處竊附按語於後焉帝曰五運氣行主歲之紀其有常數乎岐伯曰臣請次之按此即後篇帝問序首也帝曰太陽之政奈何岐伯曰辰戌之紀也按辰戌為寒水居六氣之末而帝問反以寒水為先者蓋天之生物水居其先所謂天一生水是也又太陽主表邪之中人必由表入所以六經之邪以巨陽為始是也壬辰壬戌歲上太陽水按張景岳曰辰戌年太陽寒水司天司之為言主也主行天令其位在上後仿此中太角木運壬年歲運也壬化陽木故屬太角運之為言動也主氣交之化其位在中後仿此下太陰土本年濕土在泉也在泉者主地之化氣行地中其位在下後仿此其運風其化鳴紊啟拆風為木化鳴風木聲也紊繁盛也啟拆萌芽發而地脈開也此單言壬年風運之正化後仿此其變振拉摧拔振撼動也拉支離也摧敗折也拔髮根也壬為陽木風運太過則金令承之故有此變拉音臘其病眩掉目瞑目運曰眩頭搖曰掉目不開曰瞑木運太過故有此病掉提料切寒化六六者水之成數太過者其數成此言太陽司天也後仿此新校正云壬辰寒化六壬戌寒化一蓋言對化從標成數正化從本生數也義似未然有愚按在後厥陰之政風化八八者木之成數此言中運也壬木屬太過故其數八後仿此雨化五五者土之生數此言在泉也土常以生故其數五後仿此正化度也此結上文三句言本年上中下三氣正化之度正化正氣所化也度即日也日即度也指氣令用事之時候也後仿此其化上苦溫中酸和下甘溫藥食宜也其化言氣化病治之宜也本年寒水在上故宜苦溫太角在中故宜酸和濕土在下故宜甘溫此所謂藥食之宜也後仿此玄珠云上甘溫下酸平太角初正少徵太宮少商太羽終此本年主客五運之序皆以次相生者也每年四季主運在春屬木必始於角而終於羽故於角下注初字羽下注終字此所以紀主運也客運則隨年干之化如壬年陽木起太角丁年陰木起少角戊年陽火起太徵癸年陰火起少徵各年不同循序主令所以紀客運也然惟丁壬木運之年主客皆起於角故於角音之下復注正字謂氣得四時之正也後仿此按司天在泉中運及變化治味等景岳注之詳矣乃角徵宮商羽者五音也言歲運而及五音者何也蓋天以四時布氣而宣化地生五行賦物而全形然有形則有氣有氣則有音是音者所以發四時五行之氣者也氣之所至音即著焉故即音可以驗氣此五運迭遷而以五音為紀也然必太少相間者又何也天地之氣老則衰幼則稚太少者老幼之殊稱蓋衰稚則氣偏而不能生物故惟相間則相生太不至於衰而少不至於稚為能變化而無窮也戊辰戊戌歲上太陽水中太徵火運戊為陽火故曰太徵下太陰土同正徵本年火運太過得司天寒水制之則火得其平故云同正徵所謂赫曦之紀上羽與正徵同者此也後仿此其運熱其化暄暑鬱燠此戊年火運之正化也五常政大論燠作熱其變炎烈沸騰沸騰者水氣之熏蒸也戊為火運太過則寒水承之故有此變其病熱鬱火運太過故有是病寒化六義同前熱化七七者火之成數戊火太過故其數成也後仿此濕化五義同前所謂正化日也日即度也後仿此其化上苦溫中甘和下甘溫所謂藥食宜也上下之治俱同前惟中運太徵與前異故宜治以甘和也後仿此太徵少宮太商少羽終少角初初終者紀主運也戊為陽火故起於太徵紀客運也後仿此甲辰甲戌歲俱歲會又同天符按新校正云天元紀大論云承歲為歲直又六微旨大論云木運臨卯火運臨午土運臨四季金運臨酉水運臨子所謂歲會氣之平也王冰云歲直亦曰歲會此甲為太宮辰戌為四季故曰歲會又曰同天符者本論下文云太過而加同天符是此歲一為歲會又為同天符也上太陽水中太宮土運甲為陽土故屬太宮下太陰土其運陰埃其化柔潤重澤埃塵也柔潤重澤皆中運濕土之正化五常政大論澤作淖其變震驚飄驟土運太過則風木承之故有是變其病濕下重土濕之病也寒化六濕化五中運與在泉同氣故只言濕化五而止所謂正化日也其化上苦熱中苦溫下苦溫藥食宜也中苦溫治濕土也太宮少商太羽終太角初少徵本年土運太過故起於太宮然生太宮者少徵生少徵者太角故土運以太角為初後仿此庚辰庚戌歲上太陽水中太商金運庚為陽金故屬太商下太陰土其運涼其化霧露蕭飋此金之正化其變肅殺凋零金氣肅殺萬物凋零火氣承金即陽殺之象其病燥背瞀胸滿金太過故病燥按金太盛則肺自病故背悶瞀而胸脹滿也寒化一一者水之生數然太過者其數成似亦當云六也清化九雨化五正化度也其化上苦熱中辛溫下甘熱藥食宜也中辛溫辛從金化太商宜溫也太商少羽終少角初太徵少宮丙辰丙戌歲俱天符上太陽水中太羽水運丙為陽水故屬太羽下太陰土其運寒其化凝慘凜冽水運之正化五常政大論作其德凝慘寒雰其變冰雪霜雹水太過者土氣承之故有此變冰雹者土之象也其病大寒留於溪谷溪谷者筋骨肢節之會水運太過寒甚氣凝故為是病寒化六司天中運同雨化五正化度也其化上苦熱中鹹溫下甘熱藥食宜也中鹹溫咸從水化太羽宜溫也太羽終太角初少徵太宮少商凡此太陽司天之政氣化運行先天此下總結辰戌年太陽司天六氣之化也凡子寅辰午申戌六陽年皆為太過醜亥酉未巳卯六陰年皆為不及太過之氣常先天時而至故其生長化收藏氣化運行皆早不及之氣常後天時而至故其氣化運行皆遲如氣交變大論曰太過者先天不及者後天本篇後文曰運太過則其至先運不及則其至後皆此義也後仿此天氣肅地氣靜寒臨太虛陽氣不令水土合德上應辰星鎮星太陽寒水司天則太陰濕土在泉故天氣肅地氣靜水土合德而二星當先後明也其谷玄黅玄應司天黅應在泉本年正氣所化其政肅其令徐寒政大舉澤無陽焰則火發待時政肅者寒之氣令徐者陰之性也寒盛則火鬱鬱極必發待時王而至也少陽中治時雨乃涯少陽中治三之主氣也以相火王時而寒水之客勝其主故時雨乃涯涯水際也按涯為水際而雨至於涯是言滿也止極雨散還於太陰云朝北極濕化乃布歲半之後地氣主之自三氣止極雨散之後交於四氣則在泉用事而太陰居之故又云朝北極濕化布焉澤流萬物寒敷於上雷動於下澤流萬物土之德也雷動於下火鬱發也寒濕之氣持於氣交上寒下濕相持於氣交之中也民病寒濕發肌肉萎足萎不收濡瀉血溢血溢者火鬱之病余皆寒濕使然初之氣地氣遷氣乃大溫草乃早榮本年初之氣少陽用事上年在泉之氣至此遷易故曰地氣遷後仿此然上年終氣君火也今之初氣相火也二火之交故氣乃大溫草乃早榮民乃厲溫病乃作身熱頭痛嘔吐肌腠瘡瘍客氣相火主氣風木風火相搏故為此諸病肌腠瘡瘍斑疹之屬也二之氣大涼反至民乃慘草乃遇寒火氣遂抑燥金用事故大涼至而火氣抑民病氣鬱中滿寒乃始清寒滯於中陽氣不行也三之氣天政布寒氣行雨乃降三之氣即司天也寒水用事故寒氣行雨乃降民病寒反熱中癰疽注下心熱瞀悶不治者死民病寒反為熱中等證即人傷於寒而為病熱之理亦五常政大論所謂太陽司天寒氣下臨心氣上從之義蓋寒水侮陽則火無不應若不治之則陽氣絕而死矣按六氣司天皆無不治者死之說而惟此太陽寒水言之可見人以陽氣為生之本不可不顧也四之氣風濕交爭風化為雨乃長乃化乃成厥陰客氣用事而加於太陰主氣故風濕交爭而風化為雨木得土化故乃長乃化乃成也民病大熱少氣肌肉萎足萎注下赤白厥陰木氣值大暑之時木能生火故民病大熱以客勝主脾土受傷故為少氣肉萎等證萎痿同五之氣陽復化草乃長乃化乃成民乃舒五之氣少陰君火用事歲半之後地氣主之以太陰在泉而得君火之化故萬物能長能化能成民亦舒而無病終之氣地氣正濕令行陰凝太虛埃昏郊野民乃慘淒寒風以至反者孕乃死太陰濕土在泉地氣正也故濕令行陰凝太虛埃昏郊野民情喜陽惡陰故慘淒以濕令而寒風至風能勝濕故曰反反者孕乃死所以然者人為倮蟲從土化也風木非時相加故土化者當不育也按原本此下有故歲宜苦以燥之溫之九字新校正云詳此當在避虛邪以安其正之下今改從之必折其鬱氣先資其化源折其鬱氣瀉有餘也資其化源補不足也如上文寒水司天則火氣鬱濕土在泉則水氣鬱故必折去致郁之氣則鬱者舒矣又如補遺本病篇曰辰戌之歲木氣升之主逢天柱勝而不前少陽降地主窒地玄勝之不入故刺法論云木欲升而天柱窒抑之當刺足厥陰之井火欲降而地玄窒抑之當刺足少陰之所出足太陽之所入等義皆所以折其鬱氣也化源者化生之源如本年火失其養則當資木金失其養則當資土皆自其母氣資養之則被制者可以無傷亦化源之謂新校正云詳水將勝也先於九月迎取其化源先瀉腎之源也蓋以水王十月故先於九月迎而取之瀉水所以補火亦一義也但資取之辨似於太過當曰取不及當曰資然本篇六氣司天如太陽陽明厥陰俱言資其化源少陽太陰少陰俱言先取化源其或言資或言取者皆互文耳但總不外乎化源者即必求其本之義抑其運氣扶其不勝無使過暴而生其疾運言五運氣言六氣如太角歲脾不勝太徵歲肺不勝太宮歲腎不勝太商歲肝不勝太羽歲心不勝此五運也六氣者如上文十年寒水司天則心火不勝太陰在泉則腎水不勝諸太過者抑之不勝者扶之則氣無暴過而疾不生矣後仿此食歲谷以全其真避虛邪以安其正歲谷即上文玄黅谷也其得歲氣最厚故能全真虛邪者從其沖後來為虛風傷人者也故歲宜苦以燥之溫之以上十年皆寒水司天濕土在泉濕宜燥之寒宜溫之味必苦者苦從火化治寒以熱也適氣同異多少制之同寒濕者燥熱化異寒濕者燥濕化適酌所宜也氣司天在泉之氣也同異運與氣會有異同也多少制之因其同異之多少而為制以治之也如太宮太商大羽歲運同寒濕者則當用燥熱所化之物蓋燥以治濕熱以治寒也若太徵太角歲運異寒濕者則或從氣之寒濕而用燥熱之化或從運之風熱而用寒濕之化當各因其同異多少以制之也故同者多之異者少之氣運同者其氣甚非多不足以制之異者其氣微當少用以調之耳用寒遠寒用涼遠涼用溫遠溫用熱遠熱食宜同法遠避也言用寒藥者當遠歲氣之寒用涼藥者當遠歲氣之涼溫熱者亦然凡飲食居處之宜皆所同法而歲氣當察也有假者反常反是者病所謂時也按假者謂有病本寒而外似熱病本熱而外似寒者即當反正治之常法而用從治之法以治之若不能從治而反用正治則病成矣此用藥貴乎從時而不可執泥也景岳以假為假借以反常為病反乎常義未確詳辨在篇末帝曰善陽明之政奈何岐伯曰卯酉之紀也丁卯歲會丁酉歲上陽明金中少角木運丁為陰木故屬少角下少陰火同正商丁年歲木不及而司天燥金勝之則金兼木化反得其政所謂委和之紀上商與正商同也其運風清熱風為中運少角之氣清為勝風之氣熱為復清之氣余少運勝復皆同後仿此清化熱化勝復同所謂邪氣化日也丁年少角木運不及故有燥金來勝之清化有清化則有火子來復之熱化然皆非本年正化故曰邪化日也同者謂二年相同也凡陰年不及故有勝復邪化而陽年則不言勝氣後仿此災三宮災傷也三宮東方震宮木正之方也木運不及故本方受災陽年太過則不言災宮凡言災宮皆以五正宮生數為例故言三不言八後仿此燥化九司天風化三中運不及其數生也熱化七在泉所謂正化日也其化上苦小溫中辛和下鹹寒所謂藥食宜也上苦小溫苦屬火以治金也中辛和辛屬金以和少角也下鹹寒以水治火也玄珠云上苦熱少角初正太徵少宮太商少羽終癸卯癸酉歲俱同歲會按新校正云本論下文云不及而加同歲會此運少徵為不及下加少陰故云同歲會上陽明金中少徵火運下少陰火同正商癸年火運不及上見燥金則金得其政所謂伏明之紀上商與正商同也其運熱寒雨熱少徵運也寒勝氣也雨復氣也寒化雨化勝復同所謂邪氣化日也災九宮九南方離宮也火運不及而勝復所由故災及之燥化九熱化二運與在泉同所謂正化日也其化上苦小溫中鹹溫下鹹寒所謂藥食宜也中少徵火故治用鹹而必溫也上下同前少徵太宮少商太羽終太角初己卯己酉歲詳二年金與土運雖相得然子臨父位為逆上陽明金中少宮土運下少陰火其運雨風涼雨少宮之氣風勝氣也涼復氣也風化清化勝復同邪氣化度也義同前凡上下文曰涼曰清曰燥者皆金氣之化也後仿此災五宮五中宮也土運不及故災及之清化九雨化五熱化七正化度也其化上苦小溫中甘和下鹹寒藥食宜也中甘和治土運不足也少宮太商少羽終少角初太徵乙卯天符乙酉歲歲會太乙天符上陽明金中少商金運下少陰火同正商乙年金運不足得陽明司天之助所謂從革之紀上商與正商同也其運涼熱寒涼為少商之氣熱為勝氣寒為復氣熱化寒化勝復同邪氣化度也災七宮七西方兌宮也金運不及故災及之燥化四清化四熱化二正化度也其化上苦小溫中苦和下鹹寒藥食宜也中苦和苦從火化所以制金金運不足故治宜苦和上下同前少商太羽終太角初少徵太宮辛卯辛酉歲上陽明金中少羽水運下少陰火辛卯少宮同辛為水運不及土得乘之故與少宮同也五運不及之歲凡三十年內除丁巳丁亥己巳己亥乙巳乙亥同正角丁卯丁酉癸卯癸酉乙卯乙酉同正商丁丑丁未己丑己未辛丑辛未同正宮外尚餘不及者十二年內癸巳癸亥癸丑癸未四年火不及也當云少徵與少羽同但巳亥二年少陽在泉同歲會也火氣有助故不言同少羽丑未二年濕土在上土能制水故亦不言同少羽己卯己酉二年土不及也當云少宮與少角同但卯酉燥金在上金能制木故不言同少角乙丑乙未二年金不及也當云少商與少徵同但丑未之年寒水在泉水能制火故不言同少徵辛巳辛亥辛卯辛酉四年水不及也當云少羽與少宮同但巳亥二年風木司天木能制土故不言同少宮凡此十二年中除去以上十年只有辛卯辛酉二年為少羽同少宮也故於此獨言之然但言少宮而不言正宮者蓋非有司天當令則氣不甚王也本節止言辛卯不言辛酉或傳寫誤耳其運寒雨風寒運氣雨勝氣風復氣雨化風化勝復同邪氣化度也災一宮一北方水宮也水運不及故災及之清化九寒化一熱化七正化度也其化上苦小溫中苦和下鹹寒藥食宜也中苦和以火溫中也上下同前少羽終少角初太徵少宮太商凡此陽明司天之政氣化運行後天此總結陽明司天六氣之化也凡此卯酉十年歲氣不足故氣化運行後天詳義見前太陽之政天氣急地氣明燥金司天故急君火在泉故明陽專其令炎暑大行物燥以堅淳風乃治風燥橫運流於氣交凡陽明司天之年金氣不足火必乘之故陽專其令炎暑大行木亦無畏故淳風乃治金木之氣並行則風燥橫於歲運流於氣交之際也按橫縱肆也金運司天理宜獨橫乃氣屬不及不能制木木乃敢與金相抗而交橫於氣運之中故曰風燥橫運也多陽少陰云趨雨府濕化乃敷燥極而澤多陽少陰火氣勝也云趨雨府濕化乃敷燥氣盛極化為雨澤皆火土合氣於氣交也雨府土厚濕聚之處其谷丹白白應司天丹應在泉正氣所化即歲谷也間谷命太者間谷間氣所化之谷也命天賦也太氣之有餘也除正化歲谷之外則左右四間之化皆為間谷但太者得間氣之厚故其所化獨盛是為間谷少者得氣之薄則無所成矣太少間谷之義其說有二凡司天屬太者在泉必為少司天屬少者在泉必為太如卯酉年陽明司天少在上也少陰在泉太在下也命其太者則當以在泉之間氣命其谷也左為太陰其色黃右為厥陰其色蒼是蒼黃二色者為本年之間谷此以上下言也後凡巳亥丑未年皆察在泉左右之氣以求間谷其義仿此然本篇凡不及之歲則言間谷而太過之歲則無似又以勝制之氣為間谷也如卯酉年金氣不及則火勝木強其谷丹蒼也巳亥年木氣不及則金勝土強其谷白黃也丑未年土氣不及則木勝水強其谷蒼黑也亦皆命太之義故凡君火相火寒水司天之年正化有餘則別無命太之間谷矣此以歲氣言也總之歲候不齊凡在氣之有餘者便是太則所受必盛而五穀之成所以有厚薄之分也惟不以本身正化所出故皆可謂之間谷但當因氣求之則善矣後仿此其耗白甲品羽耗傷也白與甲金所化也品羽火蟲品類也本年卯酉金氣不及而火勝之則白甲當耗火勝而水復則羽蟲亦耗或此義也然又惟厥陰司天亦曰其耗文角品羽余者皆無未詳其義金火合德上應太白熒惑上金下火故云合德而二星當明其政切其令暴金火之氣蟄蟲乃見流水不冰君火在泉故也民病咳嗌塞寒熱發暴振慄癃閟皆金火燥熱之病清先而勁毛蟲乃死司天金氣在先木受其克故毛蟲死熱後而暴介蟲乃殃在泉火氣居後金受其制故介蟲殃其發暴勝復之作擾而大亂清熱之氣持於氣交天氣地氣金火相持故勝復互作陰陽擾亂也氣交者三四氣之際是也初之氣地氣遷陰始凝氣始肅水乃冰寒雨化初氣太陰用事時寒氣濕故陰凝燥金司天故氣肅水冰者氣肅而成寒雨者濕土所化其病中熱脹面目浮腫善眠鼽衄嚏欠嘔小便黃赤甚則淋主氣風客氣濕風為陽濕為陰風濕為患脾腎受傷故為此諸病二之氣陽乃布民乃舒物乃生榮相火用事於春分之後故其氣應如此厲大至民善暴死主君火客相火二火交熾臣位於君故疫厲大至民善暴死三之氣天政布涼乃行燥熱交合燥極而澤天政布司天燥金用事也故涼乃行然主氣相火當令故燥熱交合至三氣之末以交四氣則主太陰客太陽故燥極而澤矣民病寒熱以陽盛之時行金涼之氣故民病寒熱四之氣寒雨降太陽用事於濕土王時故寒雨降病暴僕振慄譫妄少氣嗌乾引飲及為心痛癰腫瘡瘍瘧寒之疾骨痿血便四氣之後在泉君火所主而太陽寒水臨之水火相犯故為暴僕振慄及心痛等病皆心腎二經也五之氣春令反行草乃生榮厥陰風木用事而得在泉君火之溫故春令反行草乃生榮民氣和終之氣陽氣布候反溫蟄蟲來見流水不冰少陰君火用事故其氣候如此民乃康平其病溫皆火之化故食歲谷以安其氣食間谷以去其邪歲谷正氣所化故可以安氣間谷間氣所生故可以去邪去邪者有補偏救弊之義謂實者可用以瀉虛者可用以補義見前歲宜以咸以苦以辛汗之清之散之咸從水化治在泉之君火也苦從火化治司天之燥金也以辛者辛從金化本年火盛金衰同司天之氣以求其平也然燥金司天則歲半之前氣過於斂故宜汗之散之君火在泉則歲半之後氣過於熱故又宜清之也安其運氣無使受邪折其鬱氣資其化源安者順其運氣而安之也本年燥金司天則木鬱君火在泉則金鬱詳義見前又如補遺本病篇曰卯酉之年太陽昇天主窒天芮勝之不前太陰降地主窒地蒼勝之不入故刺法論於水欲升而天芮窒抑之當刺足少陰之合土欲降而地蒼窒抑之當刺足厥陰之出足少陽之所入王氏注曰化源謂六月迎而取之也新校正云按金王七月故迎於六月瀉金氣是皆折其鬱氣資取化源之義以寒熱輕重少多其制本年上清下熱其氣不同故寒多者當多其熱以溫之熱多者當多其寒以清之同熱者多天化同清者多地化同者言上文十年運與天地各有所同也凡運與在泉少陰同熱者則當多用司天陽明清肅之化以治之故曰同熱者多天化如前少角少徵年木火同歸熱化者是也運與司天陽明同清者則當多用在泉少陰溫熱之化以治之故曰同清者多地化如前少宮少商少羽年土金水同歸寒化者是也用涼遠涼用熱遠熱用寒遠寒用溫遠溫食宜同法有假者反之此其道也反之者亂天地之經擾陰陽之紀也按上反之謂反正治之常法以治假病反之合乎道者也下反之謂應反治而反正治反之為擾亂者也與太陽之政同義帝曰善少陽之政奈何岐伯曰寅申之紀也壬寅壬申歲俱同天符以太角之年而相火司天子居母上則其氣逆上少陽相火中太角木運下厥陰木其運風鼓其化鳴紊啟折此壬年太角之正化五常政大論化作德紊作靡其變振拉摧拔其病掉眩支脅驚駭風木相火合病也火化二風化八運與在泉同所謂正化日也其化上鹹寒治司天之火中酸和木運太過故宜酸和下辛涼治在泉也木火合氣故宜辛涼所謂藥食宜也太角初正少徵太宮少商太羽終戊寅戊申歲俱天符新校正云詳戊申年與戊寅年小異申為金佐於肺肺受火刑其氣稍實民病得半上少陽相火中太徵火運下厥陰木其運暑其化暄囂鬱燠暄囂火盛之象此戊年太徵之正化五常政大論化作德囂作暑其變炎烈沸騰其病上熱鬱血溢血泄心痛火之為病內應於心火化二司天與運同按司天雖與運同然太過之數成當云熱化七也風化三在泉正化度也其化上鹹寒中甘和下辛涼藥食宜也中甘和者太徵之火瀉以甘也上下同前太徵少宮太商少羽終少角初甲寅甲申歲上少陽相火中太宮土運下厥陰木其運陰雨其化柔潤重澤甲年太宮之正化其變震驚飄驟其病體重胕腫痞飲火化二雨化五風化八正化度也其化上鹹寒中咸和下辛涼藥食宜也中咸和以耎堅利濕治土勝也上下同前太宮少商太羽終太角初少徵庚寅庚申歲上少陽相火中太商金運下厥陰木同正商本年金運太過遇司天相火制之則金得其平所謂堅成之紀上徵與正商同也其運涼其化霧露清切此庚年太商之正化五常政大論云其德霧露蕭飋其變肅殺凋零其病肩背胸中金邪在肺也按此但言病所而不言病症蓋闕文也火化七清化九風化三正化度也其化上鹹寒中辛溫下辛涼藥食宜也中運同正商故宜辛溫上下同前太商少羽終少角初太徵少宮丙寅丙申歲新校正云詳丙申之歲申金生水水化之令轉盛司天相火為病當減半上少陽相火中太羽水運下厥陰木其運寒肅其化凝慘凜冽此丙年太羽之正化五常政大論云其德凝慘寒雰其變冰雪霜雹此上二條與丙辰丙戌年文同但彼以寒水司天此以相火司天必有微甚於其間者其病寒浮腫火化二寒化六風化三所謂正化日也其化上鹹寒中鹹溫下辛溫所謂藥食宜也中鹹溫咸同水化溫以治寒也下辛溫以在泉之木兼寒運之氣也玄珠云下辛涼太羽終太角初少徵太宮少商凡此少陽司天之政氣化運行先天先天義見前天氣正地氣擾少陽火氣司天陽得其位故天氣正厥陰木氣在泉風動於下故地氣擾風乃暴舉木偃沙飛炎火乃流此風木在泉相火司天之化陰行陽化雨乃時應太陰濕土主二之氣與少陽並行於歲半之前故陰行陽化雨乃時應木火同德上應熒惑歲星六氣司天惟少陽厥陰言同德其他皆言合德蓋此以上下相生本乎一氣故言同彼以上下相制各行其政故云合也其谷丹蒼丹應司天蒼應在泉其政嚴其令擾故風熱參布雲物沸騰太陰橫流寒乃時至涼雨並起此皆木火之化火盛則寒水來復故寒至雨起民病寒中外發瘡瘍內為泄漏火盛於外故民病寒中外熱故為瘡瘍內寒故為泄漏往復之作民病寒熱瘧泄聾瞑嘔吐上怫腫色變熱盛寒復則水火交爭故為諸病怫音佛心郁不舒也初之氣地氣遷風勝乃搖寒乃去候乃大溫草木早榮寒來不殺初氣君火用事而兼相火司天故氣候大溫也地氣遷義見前溫病乃起其病氣怫於上血溢目赤咳逆頭痛血崩脅滿膚腠中瘡君相二火合氣故其為病如此二之氣火反郁白埃四起云趨雨府風不勝濕雨乃零民乃康太陰濕土用事故主氣君火反郁而埃起濕勝雨零也然主客相生故民乃康其病熱鬱於上咳逆嘔吐瘡發於中胸嗌不利頭痛身熱昏憒膿瘡皆濕熱所化之病三之氣天政布炎暑至少陽臨上雨乃涯天政布司天布化也客主之氣皆屬少陽相火專令故炎暑至雨乃涯涯言其際凡雨之起止皆得云也民病熱中聾瞑血嗌膿瘡咳嘔鼽衄渴嚏欠喉痹赤善暴死客主之火交熾故為熱病如此四之氣涼乃至炎暑間化白露降民氣和平燥金之客加於濕土之主故涼氣至而炎暑間化間者時作時止之謂土金相生故民氣和平其病滿身重燥勝者肺自病故胸中滿濕勝者脾自病故身體重五之氣陽乃去寒乃來雨乃降氣門乃閉寒水之客加於燥金之主水寒金斂故候如此氣門腠理空竅也所以發泄營衛之氣故曰氣門王氏注曰玄府也剛木蚤凋民避寒邪君子周密金肅水寒當畏避也終之氣地氣正風乃至萬物反生霿霧以行厥陰在泉風木用事主氣以寒水生之故地得其正而風至物生霿霧行也霿音茂天氣下降地氣不應曰霿其病關閉不禁心痛陽氣不藏而咳時當閉藏而風木動之風為陽故為病若此抑其運氣贊所不勝抑其太過助其不及也必折其鬱氣先取化源本年相火司天則金鬱風木在泉則土鬱鬱氣化源詳義見前又如本病篇曰寅申之年陽明昇天主窒天英勝之不前少陰降地主窒地玄勝之不入故刺法論於金欲升而天英窒抑之當刺手太陰之經火欲降而地玄窒抑之當刺足少陰之所出足太陽之所入王氏注曰化源年之前十二月迎而取之新校正云詳王注資取化源俱注云取其意有四等太陽司天取九月陽明司天取六月是二月者先取在天之氣也少陽司天取年前十二月太陰司天取九月是二月者乃先時取在地之氣也少陰司天取年前十二月厥陰司天取四月義不可解按玄珠之說則不然太陽陽明之月與王注合少陽少陰俱取三月太陰取五月厥陰取年前十二月玄珠之義可解王注之月疑有誤也暴過不生苛疾不起能行上法其氣自和故無暴過苛疾之患新校正云詳此不言食歲谷間谷者蓋此歲天地氣正上下通和故不言也故歲宜咸宜辛宜酸滲之泄之漬之發之以上十年相火司天風木在泉咸從水化能勝火也辛從金化能勝木也酸從木化順水火之性也滲之泄之所以去二便之實漬之發之所以去腠理之邪也觀氣寒溫以調其過同風熱者多寒化異風熱者少寒化雖歲氣宜用之治如上文然必當觀寒溫之盛衰以調其有過者也故此十年之中其大運有與在泉同風化司天同熱化者則當多用寒化之品以治之如太角太徵歲是也其有異於司天在泉風熱之化者則當少用寒化之品以治之如太宮太商太羽歲是也用熱遠熱用溫遠溫用寒遠寒用涼遠涼食宜同法此其道也有假者反之反是者病之階也詳義同前帝曰善太陰之政奈何岐伯曰丑未之紀也丁丑丁未歲上太陰土中少角木運下太陽水同正宮本年木運不及則土得其政所謂委和之紀上宮與正宮同也其運風清熱風為中運少角之氣清為勝風之氣熱為復清之氣清化熱化勝復同邪氣化度也詳義見前災三宮三東方震宮也木運不及故災及之雨化五風化三寒化一正化度也其化上苦溫苦溫從火化治司天之濕也中辛溫辛從金化治中運之風木也少角不及故宜從溫下甘熱甘熱從土火之化治在泉之寒水也玄珠云上酸平下甘溫藥食宜也少角初正太徵少宮太商少羽終癸丑癸未歲上太陰土中少徵火運下太陽水其運熱寒雨熱為中運少徵之氣寒為勝熱之氣雨為復寒之氣寒化雨化勝復同邪氣化度也災九宮九南方離宮也火運不及故災及之雨化五火化二寒化一正化度也其化上苦溫中鹹溫下甘熱藥食宜也中鹹溫咸從水化所以治火少徵不及故宜從溫上下同前玄珠云上酸和下甘溫少徵太宮少商太羽終太角初己丑己未歲俱太乙天符上太陰土中少宮土運下太陽水同正宮本年土運不及得司天濕土之助所謂卑臨之紀上宮與正宮同也其運雨風清雨為土運之氣風為勝雨之氣清為復風之氣風化清化勝復同邪氣化度也災五宮五中宮也土不及故災及之雨化五司天中運同寒化一正化度也其化上苦熱中甘和下甘熱藥食宜也本年土水陰盛故上宜苦熱稍異於前中運土氣不足故宜甘和也玄珠云上甘平少宮太商少羽終少角初太徵乙丑乙未歲上太陰土中少商金運下太陽水其運涼熱寒涼為中運少商之氣熱為勝涼之氣寒為復熱之氣熱化寒化勝復同所謂邪氣化日也災七宮七西方兌宮也金運不及故災及之濕化五清化四寒化六所謂正化日也其化上苦熱中酸和下甘熱所謂藥食宜也中酸和者金位之主其補以酸治少商之不足也上下同前玄珠云上酸平下甘溫少商太羽終太角初少徵太宮辛丑辛未歲俱同歲會上太陰土中少羽水運下太陽水同正宮辛年水運不及而濕土司天勝之所謂涸流之紀上宮與正宮同也其運寒雨風寒為中運少羽之氣雨為勝寒之氣風為復雨之氣雨化風化勝復同所謂邪氣化日也災一宮一北方坎宮也水運不及故災及之雨化五寒化一中運在泉同所謂正化日也其化上苦熱中苦和下苦熱所謂藥食宜也中苦和下苦熱苦從火化治寒以熱也治上同玄珠云上酸和下甘溫少羽終少角初太徵少宮太商凡此太陰司天之政氣化運行後天後天義見前陰專其政陽氣退闢大風時起太陰司天以濕太陽在泉以寒故陰專其政陽氣退闢土不及則風勝之故大風時起闢避同天氣下降地氣上騰原野昏霿白埃四起云奔南極寒雨數至物成於差夏濕氣下降寒氣上騰故原野昏霿白埃四起司天主南而太陰居之故云奔南極雨濕多見於南方差參差也夏盡入秋謂之差夏蓋主氣當濕土之時客氣值少陽之令土氣稍溫故物成也差抄詩切民病寒濕腹滿身䐜憤胕腫痞逆寒厥拘急皆寒濕所化之病䐜憤脹滿也䐜昌真切濕寒合德黃黑埃昏流行氣交上應鎮星辰星皆水土之化其政肅其令寂寒之政肅濕之令寂其谷黅玄黅應司天玄應在泉故陰凝於上寒積於下寒水勝火則為冰雹陽光不治殺氣乃行上濕下寒故政如此殺氣陰氣也故有餘宜高不及宜下有餘宜晚不及宜早土之利氣之化也民氣亦從之有餘不及言穀氣也凡歲谷間谷色味堅脆各有氣衰氣盛之別本年寒政太過故穀氣有餘者宜高宜晚以其能勝寒也不及者宜下宜早以其不能勝寒也民之強弱其氣亦然間谷命其太也詳義見前陽明之政初之氣地氣遷寒乃去春氣正風乃來生布按此處必有闕文萬物以榮民氣條舒風濕相薄雨乃後客主之氣皆厥陰風木用事故寒去物榮以太陰濕土司天故風濕相薄風勝濕故雨乃後時而至地氣遷義見前民病血溢筋絡拘強關節不利身重筋痿風病在筋濕病在肉故為此諸證血溢者風傷於肝也二之氣大火正物承化民乃和客主之氣皆少陰君火用事故大火氣正物承其化民亦和也其病溫厲大行遠近咸若濕蒸相薄雨乃時降火盛氣熱故民病溫厲以太陰司天故濕蒸相薄時雨應期故曰時降三之氣天政布濕氣降地氣騰雨乃時降寒乃隨之太陰司天濕土用事故濕氣降地氣騰而為雨三氣之後則太陽在泉故寒乃隨之感於寒濕則民病身重胕腫胸腹滿寒凝濕滯故其為病如此四之氣畏火臨溽蒸化地氣騰天氣痞隔寒風曉暮蒸熱相搏草木凝煙濕化不流則白露陰布以成秋令少陽相火用事其氣尤烈故曰畏火以後凡言畏火者皆相火也客以相火主以濕土火土合氣溽蒸上騰故天氣痞隔然太陽在泉故寒風隨發於朝暮以濕遇火故濕化不流惟白露陰布以成秋令也民病腠理熱血暴溢瘧心腹滿熱臚脹甚則胕腫濕熱並行故為是病臚皮也一曰腹前曰臚胕腫肉浮腫也臚閭盧二音胕音附五之氣慘令已行寒露下霜乃早降草木黃落客主之氣皆陽明燥金用事故其政令如此寒氣及體君子周密民病皮腠皮腠屬金氣求同類也終之氣寒大舉濕大化霜乃積陰乃凝水堅冰陽光不治在泉客主之氣皆太陽寒水用事故其政令如此感於寒則病人關節禁固腰脽痛關節在骨腰脽屬腎與膀胱皆寒求同類為病寒濕持於氣交而為疾也必折其鬱氣而取化源以上十年上濕下寒故寒濕持於氣交然太陰司天則水鬱太陽在泉則火鬱鬱氣化源義詳見前又如補遺本病篇曰丑未之歲少陽昇天主窒天蓬勝之不前厥陰降地主窒地晶勝而不前故刺法論於火欲升而天蓬窒抑之君火相火同刺包絡之榮木欲降而地晶窒抑之當刺手太陰之所出手陽明之所入王氏曰化源九月迎而取之以補益也是皆折鬱氣取化源之義益其歲氣無使邪勝太陰司天丑未不及之歲也故當益其歲氣食歲谷以全其真食間谷以保其精歲谷即上文黅玄谷也間谷義見前陽明之政故歲宜以苦燥之溫之甚者發之泄之不發不泄則濕氣外溢肉潰皮拆而水血交流以苦燥之溫之苦從火化燥以治濕溫以治寒也發之泄之蓋發散可以逐寒滲泄可以去濕也必贊其陽火令御甚寒歲氣陰寒故當扶陽從氣異同少多其判也同寒者以熱化同濕者以燥化以上十年運之與氣有與在泉同寒者當多用熱化之品以治之如少商少羽歲是也有與司天同濕者當多用燥化之品以治之如少宮歲是也其少角少徵歲當稍從和平以處之也異者少之同者多之雖以熱以燥各有分治然或少或多當因運氣異同隨其宜而酌之用涼遠涼用寒遠寒用溫遠溫用熱遠熱食宜同法假者反之此其道也反是者病也帝曰善少陰之政奈何岐伯曰子午之紀也壬子壬午歲上少陰火中太角木運下陽明金其運風鼓其化鳴紊啟拆此壬年太角之正化五常政大論云其德鳴靡啟拆其變振拉摧拔其病支滿肝木強也熱化二風化八清化四正化度也其化上鹹寒治司天之君火中酸涼酸從木化太角宜涼也下酸溫酸本從木以治陽明何也蓋燥金在泉金病在肺臟氣法時論曰肺欲收急食酸以收之用酸補之至真要大論曰金位之主其補以酸又曰陽明之客以酸補之此以陽明居少陰之下其氣不足故宜治之如此下文同藥食宜也太角初少徵太宮少商太羽終戊子天符戊午歲太乙天符上少陰火中太徵火運下陽明金其運炎暑其化暄曜鬱燠此戊年太徵之正化五常政大論曰其德暄暑鬱蒸太徵運遇太陽司天曰熱少陽司天曰暑少陰司天曰炎暑皆兼司天之氣而言運也其變炎烈沸騰其病上熱血溢陽火盛也熱化七司天中運同清化九正化度也其化上鹹寒中甘寒下酸溫藥食宜也按以寒治火是也而必兼甘者何故蓋太徵為火之太過純用苦寒則過激而火不行故必用甘以佐之使其和緩而無相激之患也上下同前太徵少宮太商少羽終少角初甲子甲午歲上少陰火中太宮土運下陽明金其運陰雨其化柔潤時雨此甲年太宮之正化五常政大論曰其德柔潤重淖其變震驚飄驟其病中滿身重土濕之滯也熱化二新校正云詳對化從標成數正化從本生數甲子之年熱化七燥化九甲午之年熱化二燥化四其義未然有愚按在後雨化五燥化四所謂正化日也其化上鹹寒中苦熱下酸熱所謂藥食宜也中苦熱治太宮濕勝也下酸熱與前後四運稍異然彼言溫此言熱亦不甚相遠玄珠云下苦熱太宮少商太羽終太角初少徵庚子庚午歲俱同天符上少陰火中太商金運下陽明金同正商本年金運太過而君火司天制之則金得其平所謂堅成之紀上徵與正商同也其運涼勁其化霧露蕭飋此庚年太商之正化運與在泉同其氣故曰涼勁其變肅殺凋零其病下清下清二便清泄及下體清冷也金氣之病熱化七清化九燥化九按清與燥皆金化中運與司天在泉同氣止言其一而已而此獨並言之也所謂正化日也其化上鹹寒中辛溫下酸溫所謂藥食宜也中辛溫辛以從金溫以治寒也上下同前玄珠云下苦熱太商少羽終少角初太徵少宮丙子歲會丙午歲上少陰火中太羽水運下陽明金其運寒其化凝慘凜冽此丙年太羽之正化五常政大論云其德凝慘寒雰其變冰雪雹其病寒下寒下中寒下利腹足清冷也熱化二寒化六清化四正化度也其化上鹹寒中咸熱下酸溫藥食宜也中太羽故治宜咸熱上下同前玄珠云下苦熱太羽終太角初少徵太宮少商凡此少陰司天之政氣化運行先天先天義見前地氣肅天氣明寒交暑熱加燥陽明燥金在泉故地氣肅少陰君火司天故天氣明金寒而燥火暑而熱以下臨上曰交以上臨下曰加云馳雨府濕化乃行時雨乃降此即陽明司天燥極而澤之義金火合德上應熒惑太白上火下金氣合德其星當明也其政明其令切火明金切其谷丹白丹應司天白應在泉水火寒熱持於氣交而為病始也熱病生於上清病生於下寒熱凌犯而爭於中上火下金故水火寒熱持於氣交之中而為病如此民病咳喘血溢血泄鼽嚏目赤眥瘍寒厥入胃心痛腰痛腹大嗌乾腫上火為熱金為寒故熱病見於上寒病見於下初之氣地氣遷燥將去初氣太陽用事上年巳亥少陽終之氣至此已盡當云熱將去燥字誤也地氣遷義見前寒乃始蟄復藏水乃冰霜復降風乃至陽氣鬱寒水之氣客於春前故其為候如此民反周密關節禁錮腰脽痛炎暑將起中外瘡瘍此皆寒氣之病然少陰君火司天又值二之主氣故炎暑將起中外瘡瘍脽音誰尻臀也二之氣陽氣布風乃行春氣以正萬物應榮寒氣時至民乃和風木之客加於君火之主故陽布風行春氣正萬物榮也司天君火未盛故寒氣時至木火應時故民氣和其病淋目瞑目赤氣鬱於上而熱君火為病三之氣天政布大火行庶類蕃鮮寒氣時至客氣君火司天加於相火之主故大火行庶類蕃鮮火極水復熱極寒生故寒氣時至民病氣厥心痛寒熱更作咳喘目赤二火交熾故也四之氣溽暑至大雨時行寒熱互至客主之氣皆濕土用事故為溽暑大雨等候民病寒熱嗌乾黃癉鼽衄飲發濕熱之病五之氣畏火臨暑反至陽乃化萬物乃生乃長乃榮民乃康畏火相火也時當秋收而陽氣化故物榮民康按秋收之時以斂為政復見暑熱似非所宜而云生長榮康者蓋萬物之氣斂之太速不無盈歉若更得和氣以養則物充實而咸足矣其病溫終之氣燥令行餘火內格腫於上咳喘甚則血溢寒氣數舉則霧霿翳燥金之客加於寒水之主金氣收故五氣之餘火內格而為病如此格拒也寒氣舉霧霿翳皆金水之化病生皮腠內舍於脅下連少腹而作寒中地將易也病生於皮腠金之合也內舍於脅下連少腹金乘木也金性寒故寒中在泉氣終故地將易也必抑其運氣資其歲勝以上子午十年運氣太過必抑有餘欲復其平歲有所勝必資不足無令傷害也折其鬱發先取化源無使暴過而生其病也本年少陰司天則金鬱陽明在泉則木鬱又如本病篇曰子午之歲太陰昇天主窒天衝勝之不前太陽降地主窒地阜勝之不入故刺法論於土欲升而天衝窒抑之當刺足太陰之俞水欲降而地阜窒抑之當刺足太陰之所出足陽明之所入王氏曰先於年前十二月迎而取之是皆抑鬱氣取化源之義食歲谷以全真氣食間谷以避虛邪義俱見前歲宜咸而耎之而調其上咸從水化故能調在上之君火甚則以苦發之以酸收之而安其下苦發之可以散火酸收之可以補金平其上之君火則下之燥金得安矣甚則以苦泄之熱燥甚者非苦寒泄之不可愚按五味之屬如陰陽應象大論曰火生苦金匱真言論曰其味苦其類火是分五行之味苦從火化也故在本篇如太陽太陰陽明等政云以苦燥之溫之及以苦發之者皆用苦之陽也又陰陽應象大論及至真要大論皆云酸苦湧泄為陰是言氣味之效苦從陰用也故本節云以苦泄之至真要大論云濕司於地熱反勝之治以苦冷濕化於天熱反勝之治以苦寒者皆用苦之陰也再如宣明五氣篇及五味論俱云苦走骨夫北方生寒在體為骨是骨本屬陰而苦則走之豈非陰乎可見苦味一也而有從陰從陽苦熱苦寒之不同何可不辨今有謂苦屬火而諱其寒者有但知苦寒而忘其熱者皆不明氣味變通之理耳舉此一端則五味之性可類見矣又如臟氣法時論云粳米牛肉棗葵皆甘麥羊肉杏薤皆苦之類是於飲食常味之中又各有辨味變之理如此不得其精不足以言氣味也適氣同異而多少之同天氣者以寒清化同地氣者以溫熱化言以上十年運之與氣有與司天同熱者當以寒清所化之品治之如太角太徵歲是也有與在泉同寒者當以溫熱所化之品治之如太羽太宮太商歲是也宜各因其同異而製為之多少耳用熱遠熱用涼遠涼用溫遠溫用寒遠寒食宜同法有假則反此其道也反是者病作矣義詳前帝曰善厥陰之政奈何岐伯曰巳亥之紀也丁巳丁亥歲俱天符上厥陰木中少角木運下少陽相火同正角本年木運不及得司天厥陰之助所謂委和之紀上角與正角同也其運風清熱風為中運少角之氣清為勝風之氣熱為復清之氣清化熱化勝復同邪氣化度也義詳前災三宮三東方震宮也木氣不及故災及之風化三司天與運同火化七正化度也其化上辛涼辛涼從金化治風木在上也中辛和木運不及而得司天之助故宜辛宜和下鹹寒咸從水化治相火在下也藥食宜也少角初正太徵少宮太商少羽終癸巳癸亥歲俱同歲會上厥陰木中少徵火運下少陽相火其運熱寒雨熱為運氣寒為勝氣雨為復氣寒化雨化勝復同邪氣化度也災九宮九為離宮火運不及故災及之風化八火化二運與在泉同正化度也其化上辛涼中咸和下鹹寒藥食宜也中運少徵得天地之生助故宜咸和上下同前少徵太宮少商太羽終太角初己巳己亥歲上厥陰木中少宮土運下少陽相火同正角本年土運不及風木司天勝之則木兼土化所謂卑監之紀上角與正角同也其運雨風清雨為運氣風為勝氣清為復氣風化清化勝復同所謂邪氣化日也災五宮五中宮也土運不及故災及之風化三濕化五火化七所謂正化日也其化上辛涼中甘和下鹹寒所謂藥食宜也中運少宮不及故宜甘和上下同前少宮太商少羽終少角初太徵乙巳乙亥歲上厥陰木中少商金運下少陽相火同正角本年金運不及而厥陰司天木無所制則木得其政所謂從革之紀上角與正角同也其運涼熱寒涼為運氣熱為勝氣寒為復氣熱化寒化勝復同邪氣化日也災七宮七兌宮也金運不及故災及之風化八清化四火化二正化度也其化上辛涼中酸和下鹹寒藥食宜也中運少商不及故宜治以酸和上下同前以酸治金義詳前少陰之政壬子壬午歲少商太羽終太角初少徵太宮辛巳辛亥歲上厥陰木中少羽水運下少陽相火其運寒雨風寒為運氣雨為勝氣風為復氣雨化風化勝復同邪氣化度也災一宮一坎宮也水運不及故災及之風化三寒化一火化七正化度也其化上辛涼中苦和下鹹寒藥食宜也中苦和苦從火化以溫少羽之寒也上下同前少羽終少角初太徵少宮太商愚按上文六十年氣化之數有言生數者有言成數者新校正注云詳對化從標成數正化從本生數謂如甲子年司天熱化七在泉燥化九俱從對化也甲午年司天熱化二在泉燥化四俱從正化也六十年司天在泉正對皆同此意似乎近理今諸家多宗之而實有未必然者何也如少陰司天子午年也固可以子午分正對矣然少陰司天則陽明在泉陽明用事則氣屬卯酉又安得以子午之氣言在泉之正對耶且凡司天有餘則在泉必不足司天不足則在泉必有餘氣本不同若以司天從對化之成數而言在泉亦成數司天從正化之生數而言在泉亦生數是上有餘下亦有餘上不足下亦不足蓋由不知上下不同之義耳故以司天言正對則可以在泉言正對則不合矣且內經諸篇並無正對之說惟本篇後文曰太過者其數成不及者其數生此但欲因生成之數以明氣化之微甚耳故其言生者不言成言成者不言生皆各有深意存焉似不可以強分也然欲明各年生成之義者惟當於上中下三氣合而觀之以察其盛衰之象庶得本經之意但正化對化之義亦不可不知耳按正化對化之說在內經諸篇雖未明言然觀之經文凡同一氣者必相對並載如君火甲子甲午濕土乙丑乙未之類無正對之名而實有正對之跡斯正化對化之說所由起也至於正化從本生數對化從標成數之義又與經言太過者其數成不及者其數生之旨殊別蓋新校正之所特起亦是一解未可盡以為非也但歲半以前天氣主之歲半以後地氣主之司天在泉既有分主則一歲之中或生數或成數不當專依司天為言故景岳謂以司天言正對則可以在泉言正對則不合其意良是自餘論之醫之為教治病而已欲治病而不求其所以病之故則病不可得而治既治病而必求其不必知之理則治又近於迂司天在泉者不可不知者也正對生成者可以知而不必執泥者也眾喙雖紛維經為正吾願後之言醫者但詳求其不可不知者而略其不必執泥者則善矣凡此厥陰司天之政氣化運行後天義詳前諸同正歲氣化運行同天諸同正歲者其氣正其生長化收藏皆與天氣相合故曰運行同天此雖以上文丁巳丁亥己巳己亥乙巳乙亥六歲為言然六十年之氣亦莫不皆然天氣擾地氣正風木司天故天氣擾相火在泉土得溫養故地氣正風生高遠炎熱從之云趨雨府濕化乃行木在上故風生高遠火在下故炎熱從之土氣得溫故云雨作濕化行風火同德上應歲星熒惑木火同氣故二星明其政撓其令速風政撓火令速其谷蒼丹蒼應司天丹應在泉間谷言太者義詳前其耗文角品羽與前陽明之政曰其耗白甲品羽義俱未詳風燥火熱勝復更作蟄蟲來見流水不冰風甚則燥勝燥勝則熱復故勝復更作如是熱病行於下風病行於上風燥勝復形於中上下之氣持於氣交也初之氣寒始肅殺氣方至燥金用事也民病寒於右之下按金氣主右金盛氣凝而自病故寒於右之下景岳謂金王傷肝何獨在右下二之氣寒不去華雪水冰殺氣施化霜乃降名草上焦寒雨數至陽復化太陽用事故其氣候如此然以寒水之客加於君火之主其氣必應故陽復化民病熱於中客寒外加火應故熱於中三之氣天政布風乃時舉厥陰用事也民病泣出耳鳴掉眩風木之氣見證也四之氣溽暑濕熱相薄爭於左之上以君火之客加於太陰之主四氣為天之左間故濕熱爭於左之上民病黃癉而為胕腫此濕熱之為病也胕腫肉浮腫也與足跗之跗不同癉音丹五之氣燥濕更勝沉陰乃布寒氣及體風雨乃行客以濕土主以燥金燥濕更勝其候若此終之氣畏火司令陽乃大化蟄蟲出見流水不冰地氣大發草乃生人乃舒少陽在泉故候若此其病溫厲時寒氣熱病故溫厲必折其鬱氣資其化源本年厥陰司天則土鬱少陽在泉則金鬱又如本病篇曰巳亥之歲君火昇天主窒天蓬勝之不前陽明降地主窒地彤勝而不入故刺法論於火欲升而天蓬窒抑之當刺包絡之榮金欲降而地彤窒抑之當刺心包絡之所出手少陽之所入王氏曰化源四月也迎而取之是皆折鬱氣取化源之義贊其運氣無使邪勝補其不足以抑有餘也歲宜以辛調上以咸調下畏火之氣無妄犯之辛從金化以調上之風木咸從水化以調下之相火然相火虛實尤多難辨故曰畏火之氣無妄犯之以明其當慎也用溫遠溫用熱遠熱用涼遠涼用寒遠寒食宜同法有假反常此之道也反是者病義詳前凡此定期之紀勝復正化皆有常數不可不察故知其要者一言而終不知其要流散無窮此之謂也知其要四句凡三見此後篇總結也今並於此帝曰善夫子言可謂悉矣然何以明其應乎岐伯曰昭乎哉問也夫六氣者行有次止有位故常以正月朔日平旦視之睹其位而知其所在矣次序也位方也凡主客六氣各有次序亦各有方位故欲明其應當於正月朔日平旦視之以察其陰陽明晦寒溫風氣之位而歲候可知蓋此為時日之首故可以佔一歲之兆運有餘其至先運不及其至後此天之道氣之常也有餘者至先節候不及者至後節候此天氣之常也運非有餘非不足是謂正歲其至當其時也正歲者和平之歲時至氣亦至也帝曰勝復之氣其常在也災眚時至候也奈何言勝復之氣本有常也而災眚之至何以知之岐伯曰非正化者是謂災也按非正化即前金土木三氣勝復邪氣化日是也一勝一復是即為災帝曰天地之數終始奈何司天在泉各有所主之數岐伯曰悉乎哉問也是明道也數之始起於上而終於下上即司天下即在泉歲半之前天氣主之歲半之後地氣主之歲半之前始於大寒終於小暑也歲半之後始於大暑終於小寒也至真要大論曰初氣終三氣天氣主之四氣盡終氣地氣主之按天氣謂司天地氣謂在泉上下交互氣交主之歲紀畢矣交互者天氣地氣互合為用也氣交主之即三氣四氣之際乃天地氣交之時按岐伯所對原就上下中分主之數而言其實天地之氣無日不交互則一歲之中無日非氣交也然則欲治病者當於司天在泉分主中無忘氣交乃可耳帝曰余司其事則而行之不合其數何也不合其數謂以上中下運氣之數推其歲候有不相合也岐伯曰氣用有多少化洽有盛衰衰盛多少同其化也洽合也言一歲之上下左右主客運氣必有所合若以多合多則盛者愈盛以少合少則衰者愈衰故盛衰之化各有所從則各同其化也洽爻甲切帝曰願聞同化何如岐伯曰風溫春化同熱曛昏火夏化同勝與復同凡四時氣化有見風溫者皆木氣也故與春化同有見熱曛昏火者皆火氣也故與夏化同勝與復同者言初氣終三氣勝之常也四氣盡終氣復之常也凡此同化之氣所遇皆然而無分乎四時也下文燥清煙露等化皆然燥清煙露秋化同皆金氣之同化也雲雨昏瞑埃長夏化同皆土氣之同化也寒氣霜雪冰冬化同皆水氣之同化也此天地五運六氣之化更用盛衰之常也運氣更用則化有盛衰盛衰有常變故難合於數也帝曰五運行同天化者命曰天符余知之矣願聞同地化者何謂也五運同天化如上文以中運而同司天之化故曰天符此問同地化者言中運之同在泉也岐伯曰太過而同天化者三不及而同天化者亦三太過而同地化者三不及而同地化者亦三此凡二十四歲也同司天之化者其太過不及各有三同在泉之化者其太過不及亦各有三也太過謂陽年甲丙戊庚壬也不及謂陰年乙丁己辛癸也二十四歲義如下文帝曰願聞其所謂也岐伯曰甲辰甲戌太宮下加太陰壬寅壬申太角下加厥陰庚子庚午太商下加陽明如是者三下加者以上加下也謂以中運而加於在泉也太宮加太陰皆土也太角加厥陰皆木也太商加陽明皆金也此上文所謂太過而同地化者三也共六年是謂同天符癸巳癸亥少徵下加少陽辛丑辛未少羽下加太陽癸卯癸酉少徵下加少陰如是者三少徵加少陽皆火也少羽加太陽皆水也少徵加少陰皆火也此上文所謂不及而同地化者亦三也共六年是為同歲會戊子戊午太徵上臨少陰戊寅戊申太徵上臨少陽丙辰丙戌太羽上臨太陽如是者三上臨者以下臨上也謂以中運而臨於司天也太徵臨少陰少陽皆火也太羽臨太陽皆水也此上文所謂太過而同天化者三也丁巳丁亥少角上臨厥陰乙卯乙酉少商上臨陽明己丑己未少宮上臨太陰如是者三少角上臨厥陰皆木也少商上臨陽明皆金也少宮上臨太陰皆土也此上文所謂不及而同天化者亦三也此上二節太過六年不及六年共十二年皆重言天符也而其中戊午乙酉己丑己未又為太乙天符但戊午有餘而乙酉己丑己未為不及也除此二十四歲則不加不臨也謂六十年中除此二十四歲之外則無同氣之加臨矣帝曰加者何謂岐伯曰太過而加同天符不及而加同歲會也此復明上文下加之義也太過六年下加在泉者謂之同天符不及六年下加在泉者謂之同歲會帝曰臨者何謂岐伯曰太過不及皆曰天符而變行有多少病形有微甚生死有早晏耳此復明上文上臨之義也無論太過不及上臨司天者皆謂之天符共十二年其變行有多少因其氣之盛衰也故病形死生亦各有所不同耳此及六微旨大論四歲會曰天符曰太乙天符曰同天符曰同歲會其目有五皆上下符會無所克侮均為氣之相得故於天時民病多見平和然其氣純而一亦恐亢則為害故曰變行有多少病形有微甚生死有早晏耳觀經文二十四年之間惟於歲會八年曰所謂歲會氣之平也則其他之不平可知故曰制則生化然則無制者乃為害矣所以有至而不至未至而至之變皆其氣之偏耳不可因其為和便以為常而不之察也帝曰夫子言用寒遠寒用熱遠熱余未知其然也願聞何謂遠岐伯曰熱無犯熱寒無犯寒遠避忌之謂即無犯也凡用熱者無犯司氣之熱用寒者無犯司氣之寒是謂熱無犯熱寒無犯寒從者和逆者病不可不敬畏而遠之所謂時與六位也時謂四時即主氣也位謂六步即客氣也主客之氣皆當敬畏不犯為從犯則為逆矣帝曰溫涼何如謂溫涼稍次於寒熱亦可犯否岐伯曰司氣以熱用熱無犯司氣以寒用寒無犯司氣以涼用涼無犯司氣以溫用溫無犯按司氣者司天地之氣也言寒熱二者固不可犯即溫涼二者亦當避忌蓋歲氣所繫至重苟少犯之皆能為害也間氣同其主無犯異其主則小犯之間氣左右四間之客氣也主主氣也同者同熱同寒其氣甚故不可犯異者主寒客熱主熱客寒其氣分其邪不一故可因其勢而小犯之上節言司氣此節言間氣如至真要大論曰主歲者紀歲間氣者紀步也是謂四畏必謹察之四畏即寒熱溫涼也帝曰善其犯者何如言有必不得已而犯之者將何如也岐伯曰天氣反時則可依時天氣即客氣時即主氣客不合主是謂反時反時者則當依時以主氣之循環有常客氣之顯微無定故姑從乎主也及勝其主則可犯勝其主者客氣太過也如夏而寒甚客水勝也冬而熱甚客火勝也春涼秋溫其氣皆然故可以熱犯熱以寒犯寒以涼犯涼以溫犯溫而從其變乃所謂從治也以平為期而不可過過則傷正氣而增病矣故曰無失天信無逆氣宜無翼其勝無贊其復是謂至治客主氣運至必應時天之信也不知時氣失天信矣寒熱溫涼用之各當氣之宜也不識逆從逆氣宜矣翼其勝贊其復皆助邪也知而弗犯是謂至治之妙帝曰善五運之氣亦復歲乎復報復也此問五運之氣亦如六氣之勝復而歲見否岐伯曰鬱極乃發待時而作也五運被勝太甚其鬱必極鬱極必發其發各有時也詳如下文帝曰請問其所謂也岐伯曰五常之氣太過不及其發異也帝曰願卒聞之岐伯曰太過者暴不及者徐暴者為病甚徐者為病持持者進退纏綿相持延久也太過者其氣暴不及者其氣徐此理之當然也然下文云太者之至徐而常少者暴而亡若與此節相反而不知太者之暴肆強也少者之亡受傷也肆強者猶可制受傷者不可支故此二節互言正以發明微甚之義耳帝曰太過不及其數何如岐伯曰太過者其數成不及者其數生土常以生也太過者其數成成者氣之盛也不及者其數生生者氣之微也土氣長生於四季故常以生數而不待於成也此數有生成其即氣有初中之義歟凡六十年運氣政令之數如雲寒化一寒化六等義即此之謂按土常以生者謂土位中宮數止於五如篇中凡言濕化雨化而皆云五者是也詳求其義土無成數而止言五之生數者土為萬物之母生生不息隨時遞王以生為常如不及之運氣有可加非若太過之運盛而氣極不能生物之比也帝曰其發也何如岐伯曰土鬱之發岩谷震驚木勝制土土之郁也鬱極則怒怒動則發岩谷者土深之處震驚者土氣之發也雷殷氣交殷盛也氣交者升降之中亦三氣四氣之間蓋火濕合氣發而為雷故盛於火濕之令埃昏黃黑塵霾蔽日也化為白氣濕蒸之氣嵐之屬也飄驟高深飄風驟注沖決高深也擊石飛空洪水乃從岩崩石走洪水從而出也川流漫衍田牧土駒川流漫衍湮沒郊原也田牧土駒以洪水之後惟余土石嵬然若群駒之散牧于田野間也化氣乃敷善為時雨土濕之化鬱而伸也始生始長始化始成土氣被郁物化皆遲然土鬱之發必在三氣四氣之間故猶能生長化成不失其時也故民病心腹脹腸鳴而為數後甚則心痛脅䐜嘔吐霍亂飲發注下胕腫身重此皆濕土為病濕在上中二焦故心腹脹濕在下焦故數後下利心為濕乘故心痛肝為濕侮故脅肋䐜脹也有聲為嘔有物為吐霍亂者吐利並行而心目瞭亂也飲痰飲也注下大便暴泄也濕氣傷肉則胕腫身腫重皆土發濕邪之證云奔雨府霞擁朝陽山澤埃昏其乃發也以其四氣雨府太陰濕聚之處也霞擁朝陽見於旦也埃昏土氣之濁也土主四之氣在大暑六月中後凡六十日有奇故土鬱之發以其四氣云橫天山浮游生滅怫之先兆浮游蜉蝣也朝生暮死其出以陰此言大者為云橫天山小者為蜉蝣生滅二者之見則土鬱將發先兆彰矣怫郁也音佛金鬱之發天潔地明氣清氣切火勝制金金之郁也金氣清明急切故其發如此大涼乃舉草樹浮煙按涼為金氣煙為火氣金王於秋時方大涼火退令而其氣浮散於草樹之間也景岳以浮煙為金之斂氣誤矣燥氣以行霿霧數起金氣至則燥氣行陰氣凝則霿霧起霿厚霧也音茂殺氣來至草木蒼干金乃有聲按秋氣肅殺故云殺氣非陰氣也草木至此凋零氣燥勁而音清切是謂秋聲即金聲也故民病咳逆心脅滿引少腹善暴痛不可反側嗌乾面陳色惡咳逆嗌乾肺病而燥也心脅滿引少腹善暴痛不可反側金氣勝而傷肝也陳晦也金氣肅殺故面陳而惡也山澤焦枯土凝霜滷怫乃發也其氣五燥氣行故山澤焦枯土面凝白滷結為霜也金王五之氣主秋分八月中後凡六十日有奇故其發也在氣之五滷音魯夜雪白露林莽聲淒怫之兆也按秋末有霜先見白露雪猶泄也林莽聲淒金風動也是謂秋之先兆水鬱之發陽氣乃闢土勝制水水之郁也水鬱而發寒化大行故陽氣乃闢闢避同陰氣暴舉大寒乃至川澤嚴凝寒雰結為霜雪寒雰寒氣之如霧者甚則黃黑昏翳流行氣交乃為霜殺水乃見祥黃土色黑水色水為土鬱而發故二色並見於氣交祥災異也凡吉凶之兆皆曰祥故民病寒客心痛腰脽痛大關節不利屈伸不便善厥逆痞堅腹滿此皆寒水之氣為病火畏水故心痛寒入腎故腰脽痛寒則血氣滯筋脈急故關節不利屈伸不便陰氣勝陽氣不行故厥逆痞堅腹滿陽光不治空積沉陰白埃昏瞑而乃發也其氣二火前後二火前後君火二之氣相火三之氣自春分二月中而盡於小暑六月節凡一百二十日皆二火之所主水本王於冬其氣鬱故發於火令之時陰承陽也王氏曰陰精與水皆上承火在君相二火之前後太虛深玄氣猶麻散微見而隱色黑微黃怫之先兆也深玄黑色也麻散如麻散亂可見微見而隱也大都占氣之法當於平旦候之其色黑而微黃黃為土色黑為水色微黃兼黑水鬱將發之先兆也木鬱之發太虛埃昏雲物以擾大風乃至屋發折木木有變金勝制木木之郁也木鬱之發風氣大行故有埃昏雲擾髮屋折木等候皆木之為變也故民病胃脘當心而痛上支兩脅膈咽不通食飲不下甚則耳鳴眩轉目不識人善暴僵仆此皆風木肝邪之為病厥陰之脈挾胃貫膈故胃脘當心而痛膈咽不通食飲不下也上支兩脅肝氣自逆也肝經循喉嚨入頏顙連目系上會於巔故為耳鳴眩轉目不識人等證風木堅強最傷胃氣故令人善僵暴僕太虛蒼埃天山一色或為濁色黃黑郁若橫云不起雨而乃發也其氣無常蒼埃濁色黃黑郁若皆風塵也風勝濕故云雖橫而不起雨風氣之至動變不定故其發也亦無常期長川草偃柔葉呈陰松吟高山虎嘯岩岫怫之先兆也草偃草尚之風必偃也呈陰凡柔葉皆垂因風翻動而見葉底也松吟聲在樹間也虎嘯則風生風從虎也凡見此者皆木鬱將發之先兆火鬱之發太虛腫翳大明不彰水勝制火火之郁也腫字誤當作曛蓋火鬱而發熱化大行故太虛曛翳昏昧大明反不彰也炎火行大暑至山澤燔燎材木流津廣廈騰煙土浮霜滷止水乃減蔓草焦黃風行惑言濕化乃後燔燎騰煙炎熱甚也材木流津汁溶流也霜滷水泉乾涸而滷為霜也止水蓄積之水也風行惑言熱極風生風熱交熾而人言惑亂也濕化乃後雨不至也廈音夏故民病少氣瘡癢癰腫脅腹胸背面首四肢䐜憤臚脹瘍疿嘔逆瘛瘲骨痛節乃有動注下溫瘧腹中暴痛血溢流注精液乃少目赤心熱甚則瞀悶懊憹善暴死此皆火盛之為病也壯火食氣故少氣火能腐物故瘡癰陽邪有餘故為䐜塞憤悶臚腔脹滿瘍疿瘡毒等患火氣上衝故嘔逆火傷筋則瘛瘲抽掣火傷骨則骨痛難支火伏於節則節動火在腸胃則注下火在少陽則溫瘧火實於腹則暴痛火入血分則血溢流注火爍陰分則精液乃少火入肝則目赤火入心則心熱火炎上焦則瞀悶火鬱膻中則懊憹火性急速敗絕真陰則暴死臚閭盧二音懊音鏖憹乃包切刻終大溫汗濡玄府其乃發也其氣四刻終者百刻之終也日之刻數始於寅初終於醜末此陰極之時也故一日之氣惟此最涼刻終大溫而汗濡玄府他熱可知矣玄府汗空也火本王於夏其氣鬱故發於未申之四氣四氣者陽極之餘也動復則靜陽極反陰濕令乃化乃成上文言濕化乃後至此則火王生土故動復則靜陽極反陰土氣得行濕令復至故萬物得以化成也華髮水凝山川冰雪焰陽午澤怫之先兆也群花之發君火二氣之候也午澤南面之澤也於華髮之時而凝冰雪見火氣之郁也於面南之澤而焰陽氣見則火鬱將發之先兆也有怫之應而後報也皆觀其極而乃發也此以下總結上文郁發之義也凡應有先兆報必隨之蓋物極則變故鬱極乃發木發無時水隨火也土金火之郁發各有其時惟風木善行數變上文云其氣無常即木發無時也水能勝火上文云其氣二火前後即水隨火也謹候其時病可與期失時反歲五氣不行生化收藏政無恆也知時氣則病氣可與期失時氣則五氣之行尚不能知又安知生化收藏之常政哉帝曰水發而雹雪土發而飄驟木發而毀折金髮而清明火發而曛昧何氣使然岐伯曰氣有多少發有微甚微者當其氣甚者兼其下徵其下氣而見可知也此發明承製之義也氣有多少太過不及也發有微甚郁微則發微郁甚則發甚也微者當其氣本氣之見也甚者兼其下承氣兼見也如水位之下土氣承之土位之下木氣承之木位之下金氣承之金位之下火氣承之火位之下水氣承之是也故水發之微者為寒甚者為雹雪是兼乎土雹雪如土故也土發之微者為濕甚者為飄驟是兼乎木風主飄驟故也木發之微者為風甚者為毀折是兼乎金金主殺伐故也金髮之微者為燥甚者為清明是兼乎火火主光明故也火發之微者為熱甚者為曛昧是兼乎水水主昏昧故也徵證也取證於下承之氣而鬱發之微甚可知矣帝曰善五氣之發不當位者何也不當位謂有不應其時也岐伯曰命其差氣有盛衰則至有先後故曰命其差差者不當其位也如至真要大論曰勝復之作動不當位或後時而至但彼論勝復之至不當位此論五氣之發不當位雖所論似異而義則一也帝曰差有數乎言日數也岐伯曰後皆三十度而有奇也後者自始及終也度日也三十度而有奇一月之數也奇謂四十三刻七分半也蓋氣有先至後至之差不過三十度耳即如氣盈朔虛節序置閏之法早至者先十五日有奇遲至者後十五日有奇或前或後總不出一月有奇之數正此義也按此段問答詳味語氣是單論先後之差未曾說到所以先後處景岳謂氣有盛衰則至有先後誤矣下文方是論所以先後帝曰善氣有非時而化者何也岐伯曰太過者當其時不及者歸其己勝也按己勝謂已被勝也己氣不及則力弱而權歸於勝己者故非其時而有其氣如注云春涼夏寒秋熱冬雨之類是也帝曰願聞其行何謂也按謂氣化運行之次序也岐伯曰春氣西行夏氣北行秋氣東行冬氣南行按春主東而其氣常由東而西秋主西而其氣常由西而東夏主南而其氣常由南而北冬主北而其氣常由北而南也故春氣始於下秋氣始於上夏氣始於中冬氣始於標按春主發散而其氣則本於秋冬之收藏故云始於下秋主收斂而其氣則本於春夏之長養故云始於上夏主長茂而其氣則本於中土之敦培故云始於中冬主歸藏而其氣則本於歲半以前之所生所長所收而成故云始於標蓋言氣各有所自起也春氣始於左秋氣始於右冬氣始於後夏氣始於前此四時正化之常按左東也右西也後北也前南也言四氣之正位也故至高之地冬氣常在至下之地春氣常在按注云高山之巔盛夏冰雪汙下川澤嚴冬草生常在之義足明矣又五常政大論云地有高下氣有溫涼高者氣寒下者氣熱皆言氣各有所互藏也必謹察之帝曰善黃帝曰五運六氣之應見六化之正六變之紀何如岐伯對曰夫六氣正紀有化有變有勝有復有用有病不同其候帝欲何問乎帝曰願盡聞之岐伯曰請遂言之夫氣之所至也厥陰所至為和平初之氣木之化少陰所至為暄二之氣君火也太陰所至為埃溽四之氣土之化少陽所至為炎暑三之氣相火也陽明所至為清勁五之氣金之化太陽所至為寒雰終之氣水之化時化之常也三陰三陽之次厥陰一陰也少陰二陰也太陰三陰也少陽一陽也陽明二陽也太陽三陽也皆因次為序下文十二化皆然此客氣之常也按時化者隨時變化乃客氣也非四時之正化注作主氣誤矣厥陰所至為風府為璺啟微裂未破曰璺開拆曰啟皆風化之所致按府猶藏也會聚也璺音問少陰所至為大火府為舒榮按少陰君火也故云大火府物得陽氣氣漸舒而色漸榮太陰所至為雨府為員盈太陰化濕故為雨府物得土氣而後充盈故為員盈員周也少陽所至為熱府為行出按少陽相火相火為用其熱更甚故曰熱府陽盛之極氣盡外達故又曰行出也陽明所至為司殺府為庚蒼庚更也蒼木化也物得發生之化者遇金氣而更易也按金主肅殺故為司殺府太陽所至為寒府為歸藏按寒盛之時萬物收斂而歸藏司化之常也按司主也六氣之化各有專主乃有六府之名也厥陰所至為生為風搖木氣升故主生風性動故為搖少陰所至為榮為形見按陽氣漸盛萬物榮美而庶類之形畢見也太陰所至為化為雲雨土能化生萬物雲雨其氣也少陽所至為長為蕃鮮按陽氣盛長萬物蕃茂而鮮妍陽明所至為收為霧露按秋時收斂故氣凝結而為霧露也太陽所至為藏為周密按藏者斂之深周密者藏之固也氣化之常也按有氣則有化六者之常也厥陰所至為風生終為肅按六微旨大論曰風位之下金氣承之故厥陰風生而終為肅清是也少陰所至為熱生中為寒六微旨大論曰少陰之上熱氣治之中見太陽故少陰熱生而終為寒也又云君火之下陰精承之亦為寒之義太陰所至為濕生終為注雨土位之下風氣承之故太陰濕生而終為注雨即飄驟之謂少陽所至為火生終為蒸溽相火之下水氣承之故少陽火生而終為蒸溽也陽明所至為燥生終為涼此燥涼二字當互更之蓋金位之下火氣承之故陽明涼生而終為燥也太陽所至為寒生中為溫太陽之上寒氣治之中見少陰故太陽寒生而中為溫也按上文六化厥陰太陰少陽陽明俱言終惟少陰太陽言中者何也蓋六氣之道陰陽而已陰陽徵兆水火而已少陰者君火也太陽者寒水也陽勝則陰復故少陰所至為熱生中為寒此離象之外陽內陰也陰勝則陽復故太陽所至為寒生中為溫此坎象之外陰內陽也故惟此二氣言中者乃陰陽互藏之妙其他言終者則皆下承之義耳德化之常也按正化之下承者繼之雖六氣相制之自然而實則天地相生之德也厥陰所至為毛化按毛屬木化少陰所至為羽化有羽翼飛行之類也按羽屬火化太陰所至為倮化無毛羽鱗甲之類也按倮屬土化少陽所至為羽化薄明羽翼蜂蟬之類非翎羽之羽也陽明所至為介化按甲屬金化太陽所至為鱗化按鱗屬水化德化之常也按動物之生稟之以化六氣之德也厥陰所至為生化按萬物之生木所化也少陰所至為榮化按萬物榮美火所化也太陰所至為濡化按濡潤萬物濕土所化少陽所至為茂化按萬物暢茂相火之化陽明所至為堅化按物斂而堅金燥所化太陽所至為藏化按萬物收藏寒水之化布政之常也氣布則物從其化故謂之政厥陰所至為飄怒大涼飄怒木亢之變大涼金之承製也少陰所至為大暄寒大暄火亢之變寒陰精之承製也太陰所至為雷霆驟注烈風雷霆驟注土亢之變烈風木之承製也少陽所至為瓢風燔燎霜凝飄風燔燎熱亢之變霜凝水之承製之陽明所至為散落溫散落金亢之變溫火之承製也太陽所至為寒雪冰雹白埃寒雪冰雹水亢之變白埃土之承製也氣變之常也變者變乎常也六氣亢極則承者制之因勝而復皆非和平正氣故謂之變厥陰所至為撓動為迎隨撓動風之性迎隨木之性少陰所至為高明焰為曛按焰者火之光高明焰者火熾盛而其光四達也太陰所至為沉陰為白埃為晦暝按埃塵也白埃者土飛揚而色白也晦暝者塵埃蔽日而昏昧皆土氣之所化也少陽所至為光顯為彤雲為曛光顯虹電火光之屬也彤雲赤云也按曛者火熱之氣少陰少陽俱火故並言曛也彤音同陽明所至為煙埃為霜為勁切為淒鳴按煙埃者秋寒氣肅如煙之裊空如埃之蔽日也太陽所至為剛固為堅芒為立按此皆冬寒水冱之象也令行之常也氣行而物無敢違故謂之令厥陰所至為裡急按木主肝病則氣抑鬱而裡急少陰所主為瘍胗身熱按瘍瘡屬胗疿類是皆君火外達於肌膚而然也太陰所至為積飲痞隔濕土用事則脾多濕滯故為積飲痞隔少陽所至為嚏嘔為瘡瘍按相火上炎故為嚏嘔熱留肌肉故為瘡瘍陽明所至為浮虛陽明用事而浮虛皮毛為金之合也太陽所至為屈伸不利按寒水用事則病在腎腎主骨故令屈伸不利病之常也厥陰所至為支痛按支脅也厥陰主肝而部在兩脅故病則脅支痛少陰所至為驚惑惡寒戰慄譫妄少陰主心故為驚惑熱極反兼寒化故惡寒戰慄陽亢傷陰心神迷亂故譫妄太陰所至為稸滿太陰主脾病在中焦故稸滿稸音蓄少陽所至為驚躁瞀昧暴病按少陽相火屬三焦而以火為用故病則驚躁火外陽而內陰故瞀昧相火急疾故為暴病景岳以為主膽蓋誤以手少陽為足少陽也夫足少陽膽本屬木安得謂之相火陽明所至為鼽尻陰股膝髀腨胻足病按陽明燥金主大腸而合於肺肺開竅於鼻肺感寒則鼻鼽鼽鼻塞也尻陰股足等腎之病也大腸之經而見腎病義未通景岳又以陽明為主胃誤矣蓋胃者土也足陽明也六氣之陽明乃手陽明大腸經大腸屬庚主金故謂之燥金也太陽所至為腰痛太陽膀胱之脈挾脊抵腰中故為腰痛病之常也厥陰所至為緛戾按風木為病則筋緛縮而乖戾戾不柔也緛音軟少陰所至為悲妄衄衊火病於心而並於肺故為悲妄火逼血而妄行故鼻血為衄汙血為衊衊音滅太陰所至為中滿霍亂吐下按此土濕傷脾而及胃也少陽所至為喉痹耳鳴嘔湧相火上炎也陽明所至為脅痛皴揭燥金用事則肝木受傷故脅痛皮膚甲錯而起為皴揭皆燥病也皴取鈞切太陽所至為寢汗痙寒水用事故為寢汗脈要精微論曰陰氣有餘為多汗身寒者是也肢體強直筋急反戾曰痙陰寒凝滯而陽氣不行也痙音敬病之常也厥陰所至為脅痛嘔泄木為自病故脅痛肝乘脾胃故嘔泄少陰所至為語笑按少陰主心與火火盛則心不能靜故多言而善笑也太陰所至為重胕腫按土過於濕則身重肢體浮腫名曰胕腫也少陽所至為暴注瞤瘛暴死相火乘金大腸受之則為暴注而下乘脾則肌肉瞤動乘肝則肢體筋脈抽瘛相火急暴故為暴死陽明所至為鼽嚏金氣寒肅而斂故為鼽為嚏太陽所至為流泄禁止按流泄兼津液便溺言陰寒氣閉則津液收斂汗不達空二便難通故曰流泄禁止也病之常也凡此十二變者報德以德報化以化報政以政報令以令氣高則高氣下則下氣後則後氣前則前氣中則中氣外則外位之常也氣報德報化謂天地氣也高下前後中外謂生病所也手之陰陽其氣高足之陰陽其氣下足太陽氣在身後足陽明氣在身前足太陰少陰厥陰氣在身中足少陽氣在身側各隨所在言之氣變生病象也按此總結上文勝復為病之次言各因其氣之所至而為報也王注論手足陰陽部位自是不易但本篇所言專指六氣六氣之內少陽相火乃是手少陽三焦非足少陽膽陽明燥金乃是手陽明大腸非足陽明胃蓋胃屬土非屬金膽屬木非屬火也吾鄉張景岳馬玄𦎌及諸名公並仍王氏之誤豈知相火燥金居六氣之二名義既乖施治必謬可不辨乎然則三焦大腸之位應在何所曰大腸主傳道變化亦當如足三陰之氣行於身中三焦包括一身總統臟腑理應屬身之外王注泛論臟腑之位則可若為本篇此節之注則非也故風勝則動按風善行而數變以動為性故風勝則動也又按以下六句已見於陰陽應象大論而此篇亦載之者以此篇正專論六氣謂六氣偏勝則病應於外也熱勝則腫瘡瘍癰腫火之病也燥勝則乾精血津液枯竭於內皮膚肌肉皴揭於外皆燥之病也寒勝則浮腹滿身浮陽不足而寒為病也濕勝則濡泄甚則水閉胕腫濡泄水利也水閉胕腫水道不利而肌肉腫脹按之如泥不起者是也隨氣所在以言其變耳氣有高下前後中外之異人之為病其氣亦然故氣勝於高則病在頭頂氣勝於下則病在足膝氣勝於前則病在面腹手臂氣勝於後則病在肩背腰臀氣勝於中則病在臟腑筋骨氣勝於外則病在經絡皮毛而凡風勝則動熱勝則腫燥勝則乾寒勝則浮濕勝則濡泄胕腫之類無不隨氣所在而為病變也帝曰願聞其用也此言施化之用也岐伯曰夫六氣之用各歸不勝而為化各歸不勝謂必從可克者而施其化也故太陰雨化施於太陽太陽寒化施於少陰少陰熱化施於陽明陽明燥化施於厥陰厥陰風化施於太陰各命其所在以徵之也所在即方月也主氣之方月有常如九宮八方各有所屬六氣四時各有其序也客氣之方月無定如子午歲少陰司天則太陽在東北厥陰在東南少陰在正南太陰在西南少陽在西北陽明在正北此子午客氣之方也太陽主初氣厥陰主二氣少陰主三氣太陰主四氣少陽主五氣陽明主六氣此子午客氣之月也若其施化則太陽寒化當施於正南之少陰及西北之少陽初氣之徵也厥陰風化當施於西南之太陰二氣之徵也少陰熱化當施於正北之陽明三氣之徵也太陰雨化當施於東北之太陽四氣之徵也少陽火化當施於正北之陽明五氣之徵也陽明燥化當施於東南之厥陰終氣之徵也此子午年少陰司天方月施化之義也然歲步各有盛衰氣太過則乘彼不勝而施其邪化氣不及則為彼所勝而受其制化氣和平則各布其政令而無災變之化是以盈虛消長又各有微妙存焉舉此一年他可類求矣帝曰自得其位何如岐伯曰自得其位常化也自得其位言六氣所臨但施化於本位之方月而無彼此之相犯也如前子午歲太陽在東北主初之氣於本位施其寒化厥陰在東南主二之氣於本位施其風化之類皆自得其位之常化也帝曰願聞所在也岐伯曰命其位而方月可知也命命其名也位即上下左右之位也方方隅也月月令也命其位則名次立名次立則所直之方所主之月各有其應而常變可知矣上文云報德以德報化以化報政令以政令者言勝復之氣因變之邪正而報有不同也雲氣高則高氣下則下氣後則後氣前則前氣中外則中外者言勝復之方隨氣所在而或此或彼變無定位也故以天下之廣言之則東南方陽也陽者其精降於下故右熱而左溫西北方陰也陰者其精奉於上故左寒而右涼以一州之地言之則崇高者陰氣治之故高者氣寒汙下者陽氣治之故下者氣熱此方隅大小之氣有不同也以運氣所主言之則厥陰所至為風少陰所至為火太陰所至為雨少陽所至為熱陽明所至為燥太陽所至為寒此六氣之更勝有衰王之不一也以九宮所屬言之則有曰災一宮災三宮災四宮災五宮災九宮而四正四隅有異也故本篇言位言方言月夫以三者相參則四時八方之候其變不同者多矣故有應於此而不應於彼者有寒熱溫涼主客相反者有南方清燥而溫北方雨濕而潦者有中原冰雪而寒左右溫涼更互者此以地理有高下形勢有大小氣位方月有從逆小者小異大者大異而運氣之變所以有無窮之妙也先儒有以天下旱潦不同而非運氣主歲之說者蓋未達此章之理耳帝曰六位之氣盈虛何如岐伯曰太少異也太者之至徐而常少者暴而亡六陽年謂之太六陰年謂之少太者氣盈故徐而常少者氣虛故暴而亡如前章六十年運氣之紀凡六太之年止言正化而六少之年則有邪化正以不及之年乃有勝氣有勝則有復勝復之氣皆非本年之正化必乘虛而後至故其為病反甚也人之死生全以正氣為主正氣強邪雖盛者必無害正氣弱邪雖微者亦可憂故欲察病之安危者但察正氣則吉凶可判矣觀此云太者徐而常少者暴而亡此正盈虛之理也故凡氣運盈者人氣亦盈其為病則有餘有餘之病反徐而微以其正氣盛也氣運虛者人氣亦虛其為病則不足不足之病必暴而甚以其氣本虧也設不明邪正盈虛之道而攻補倒施多致氣脫暴亡是不知太者之易與而少者之可畏也帝曰天地之氣盈虛何如岐伯曰天氣不足地氣隨之地氣不足天氣從之運居其中而常先也天氣即司天地氣即在泉運即歲運歲運居上下之中氣交之分故天氣欲降則運必先之而降地氣欲升則運必先之而升惡所不勝歸所同和隨運歸從而生其病也此亦言中運也如以木運而遇燥金司其天地是為不勝則惡之遇水火司其天地是為同和則歸之不勝者受其制同和者助其勝皆能為病故曰隨運歸從而生其病也按惡去聲故上勝則天氣降而下下勝則地氣遷而上上勝者司天之氣有餘也上有餘則氣降而下下勝者在泉之氣有餘也下有餘則氣遷而上此即上文天氣不足地氣隨之地氣不足天氣隨之之謂也勝多少而差其分勝多少言氣之微甚也勝微則遷降少勝多則遷降多勝有多少則氣交之變有多寡之差分矣按差音次等差也微者小差甚者大差甚則位易氣交易則大變生而疾作矣按小大之差本於氣之微甚所差既甚則上下之位變易反常而氣交亦為之大變謂中運見制於司天在泉必有非常之病也大要曰甚紀五分微紀七分其差可見此之謂也甚紀五分勝氣居其半也微紀七分勝止十之三也此天地盈虛之數有大差小差之分故病變亦有微甚帝曰善論言熱無犯熱寒無犯寒余欲不遠寒不遠熱奈何岐伯曰悉乎哉問也發表不遠熱攻裡不遠寒中於表者多寒邪故發表之治不能遠熱夏月亦然鬱於里者多熱邪故攻裡之治不能遠寒冬月亦然又此二句大意全在發攻二字發者逐之於外也攻者逐之於內也寒邪在表非溫熱之氣不能散故發表者不遠熱熱鬱在內非沉寒之物不能除故攻裡不遠寒此必然之理也然亦有用小柴白虎益元冷水之類而取汗愈病者何也此因表裡俱熱故當涼解非發之之謂也又有理中四逆回陽之類而除痛去積者何也此因陰寒留滯故當溫中非攻之之謂也所謂發者開其外之固也攻者伐其內之實也今之昧者但見外感發熱等病不能察人傷於寒而傳為熱者有本寒標熱之義輒用芩連等藥以清其標亦焉知邪寒在表藥寒在裡以寒得寒氣求聲應致使內外合邪遂不可解此發表用寒之害也其於春秋冬三季及土金水三氣治令陰勝陽微之時為尤甚故凡寒邪在表未散外雖熾熱而內無熱證者正以火不在裡最忌寒涼此而誤人是不知當發者不可遠熱也又如內傷喘痛脹滿等證多有三陰虧損者今人但見此類不辨虛寒使用硝黃之屬且云先去其邪然後固本似乎近理亦焉知有假實真虛之病而更伐之則病未去而元氣已不能支矣此而誤人是不知當攻者方不遠寒也二者之害見之多矣不得不表出之以為當事者之戒按景岳此論蓋為誤用寒涼者發然以余所見誤治之失實不止此請更論之夫伯所謂發表不遠熱者蓋指感冒暴寒而言也寒驟入表非熱不解至真要大論所謂辛甘發散為陽是也若夫傷寒表證及溫暑類證則又宜兼用辛涼熱論篇曰人之傷於寒也則為病熱是以三陽表證與夫溫暑等證並不用熱歷代名賢師其意而變通之如羌活湯參蘇飲之類亦惟以辛涼為用若以發表不遠熱之語而概施焉其害豈可勝言余故謂發表不遠熱者蓋指感冒暴寒而言也此則景岳之論所未及而實經旨兩不相蒙之要義學者不可以不辨者也至於辛涼解表之法既建於前賢後人因之遂有純用苦寒以致火為寒抑變證雜出竟不識其病之所以者良由俗醫荒陋不知孰為外感重而內傷輕孰為內傷多而外感少概用寒涼兼之消導使正氣耗而不能托邪邪火鬱而不能外達變證蜂起深可嘆也余遇此等常用東垣法以補中益氣加減治之以扶正托邪以升陽散火其有消導過劑誤下傷陰以致陰竭陽浮者直用參熟桂附以救其敗誤治之失殊難更僕寧止景岳所言內外合邪而已也況本寒標熱之語亦有可議蓋正傷寒與類證前雖感寒後實變熱如以熱藥發表恐與純用苦寒之害無異景岳能知發表不可用寒而不知發表不可一於用熱千慮一失智者亦不免也帝曰不發不攻而犯寒犯熱何如岐伯曰寒熱內賊其病益甚按表未有寒而用熱里未有熱而用寒是仍以熱犯熱以寒犯寒矣賊害正氣病焉得不甚帝曰願聞無病者何如岐伯曰無者生之有者甚之按病本無寒無熱而誤用寒熱則寒熱之病生若病既有寒有熱而藥復誤用寒熱則病之寒熱益甚矣帝曰生者何如岐伯曰不遠熱則熱至不遠寒則寒至寒至則堅痞腹滿痛急下利之病生矣熱至則身熱吐下霍亂癰疽瘡瘍瞀郁注下瞤瘛腫脹嘔鼽衄頭痛骨節變肉痛血溢血泄淋閟之病生矣按至者後來之辭也謂初未有寒熱因誤犯寒熱而後寒熱之病乃來也寒至則陽衰熱至則火熾故病各如是也犯寒犯熱之病誠不止此茲特舉其大端耳帝曰治之奈何岐伯曰時必順之犯者治以勝也春宜涼夏宜寒秋宜溫冬宜熱此時之所宜也不可不順然犯熱治以寒犯寒治以熱犯春宜用涼犯秋宜用溫是以勝也犯熱治以鹹寒犯寒治以甘熱犯涼治以苦溫犯溫治以辛涼亦勝之道也帝曰假者何如岐伯曰有假其氣則無禁也所謂主氣不足客氣勝也按此又論寒熱之可犯者假不真也病本熱而反似寒是謂假寒病本寒而反似熱是謂假熱寒熱既假則不妨以熱犯熱以寒犯寒乃從治之法而不在禁用之例五常政大論曰假者反之至真要大論曰反者反治即用熱遠熱用寒遠寒之義也故不必治其勝而但治其不足即陽病治陰陰病治陽之意蓋真不可犯而假可犯也景岳以假為假借誤矣此一段原本在下文所謂瀉之之後文義參錯今挈置於此省覽較便帝曰善郁之甚者治之奈何此詳明五郁之治也天地有五運之郁人身有五臟之應鬱則結聚不行乃致當升不升當降不降當化不化而鬱病作矣故或鬱於氣或鬱於血或鬱於表或鬱於里或因鬱而致病或因病而生郁鬱而太過者宜裁之抑之鬱而不及者宜培之助之大抵諸病多有兼郁此所以治有不同也岐伯曰木鬱達之達暢達也凡木鬱之病風之屬也其臟應肝膽其經在脅肋其主在筋爪其傷在脾胃在血分然木喜調暢故在表者當疏其經在裡者當疏其臟但使氣得通行皆謂之達諸家以吐為達者安足以盡之火鬱發之發發越也凡火鬱之病為陽為熱之屬也其臟應心主小腸三焦其主在脈絡其傷在陰分凡火所居有結聚斂伏者不宜蔽遏故當因其勢而解之散之升之揚之如開其窗揭其被皆謂之發非獨止於發汗也土鬱奪之奪直取也凡土鬱之病濕滯之屬也其臟應脾胃其主在肌肉四肢其傷在胸腹土畏壅滯凡滯在上者奪其上吐之可也滯在中者奪其中伐之可也滯在下者奪其下瀉之可也凡此皆謂之奪非獨止於下也金鬱泄之泄疏利也凡金鬱之病為斂為塞為燥為閉之屬也其臟應肺與大腸其主在皮毛聲息其傷在氣分故或解其表或破其氣或通其便凡在上在下在表在裡皆可謂之泄也水鬱折之折調製也凡水鬱之病為寒為水之屬也水之本在腎水之標在肺其傷在陽分其反克在脾胃水性善流宜防泛溢凡折之之法如養氣可以化水治在肺也實土可以制水治在脾也壯火可以勝水治在命門也自強可以帥水治在腎也分利可以泄水治在膀胱也凡此皆謂之折豈獨抑之而已哉然調其氣然如是也用是五法以去其鬱郁去則氣自調矣過者折之以其畏也所謂瀉之此承上文而言郁之甚者其邪聚氣實則為太過之病過者畏瀉故以瀉為畏如至真要大論曰木位之主其瀉以酸火位之主其瀉以苦土位之主其瀉以甘金位之主其瀉以辛水位之主其瀉以咸之類是即治以所畏也按景岳所論五郁之治曉暢無遺發前人所未盡者其功韙哉
