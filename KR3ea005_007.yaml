body:
  text: 卷之七離合真邪論真氣邪氣有離有合他篇亦言之矣而此特以名篇者蓋謂針之為用去邪存真而已欲去病邪必究其所以合與其所以離乃可耳篇中辭義重雜似亦綴集成文者黃帝問曰余聞九針九篇夫子乃因而九之九九八十一篇余盡通其意矣經言氣之盛衰左右傾移以上調下以左調右有餘不足補瀉於滎輸余知之矣此皆榮衛之傾移虛實之所生非邪氣從外入於經也余願聞邪氣之在經也其病人何如取之奈何岐伯對曰夫聖人之起度數必應於天地故天有宿度地有經水人有經脈宿謂二十八宿度謂天之三百六十五度也經水謂海水瀆水渭水湖水沔水汝水江水淮水漯水河水漳水濟水也以其內合經脈故名之經水經脈謂手足三陰三陽之脈所以言者以內外參合人氣應通故言之也按新校正云甲乙經云足陽明外合於海水內屬於胃足太陽外合於瀆水內屬於膀胱足少陽外合於渭水內屬於膽足太陰外合於湖水內屬於脾足厥陰外合於沔水內屬於肝足少陰外合於汝水內屬於腎手陽明外合於江水內屬於大腸手太陽外合於淮水內屬於小腸手少陽外合於漯水內屬於三焦手太陰外合於河水內屬於肺手心主外合於漳水內屬於心包手少陰外合於濟水內屬於心天地溫和則經水安靜天寒地凍則經水凝泣天暑地熱則經水沸溢卒風暴起則經水波湧而隴起人經脈亦應之按凝澀謂寒而滯也沸溢則浮而動矣波波浪水之激也隴丘隴地之墳也水激地墳皆風卒暴之所至隴同壟夫邪之入於脈也寒則血凝泣暑則氣淖澤虛邪因而入客亦如經水之得風也經之動脈其至也亦時隴起其行於脈中循循然其至寸口中手也時大時小大則邪至小則平其行無常處在陰與陽不可為度按水得風而動脈隨邪而異脈中周身脈絡之中也循循隱而未見也寸口寸關尺脈中手脈應於手而分大小之殊以別邪之有無也邪行無一定之所故脈象隨陰陽而移從而察之三部九候卒然逢之早遏其路脈之三部醫必以九候察之者蓋以邪之循經亦猶人之行路路有遠近之分經有淺深之別人卒感邪初或淺近若不遏絶勢必深遠而難治矣此邪入之路不可以不遏而遏之尤貴乎早者上工治未病之義也吸則內針無令氣忤靜以久留無令邪布吸則轉針以得氣為故候呼引針呼盡乃去大氣皆出故命曰瀉引謂引出去謂離穴候呼而引至其門呼盡而乃離穴戶則經氣審以平定邪氣無所勾留故大邪之氣隨針而出也呼謂氣出吸謂氣入轉謂轉動也大氣謂大邪之氣錯亂陰陽者也按此論用針補瀉之道也凡人之病有餘不足二者而已有餘者邪氣實不足者正氣虛虛者宜補然苟非瀉其有餘之邪則正氣雖虛補之必為邪格而不效此經所以先吸後呼以瀉其邪然後呼盡候吸以補其正也帝曰不足者補之奈何岐伯曰必先捫而循之切而散之推而按之彈而怒之抓而下之通而取之外引其門以閉其神捫循謂手摸切謂指按也捫而循之欲氣舒緩切而散之使經脈宣散推而按之排蹙其皮也彈而怒之使氣脈䐜滿也抓而下之置針准也通而取之以常法也外引其門以閉其神則推而按之者也謂蹙按穴外之皮令當應針之處蓋其所刺之門不開則神氣內守故云以閉其神也按抓側交切以爪甲刮針也呼盡內針靜以久留以氣至為故如待所貴不知日暮其氣以至適而自護呼盡內針亦同吸也言必以氣至而為去針之故不以息之多數而便去針也針經曰刺之而氣不至無問其數刺之氣至去之勿復針此之謂也暮晚也適調適也護慎守也言氣已平調則當慎守勿令改變使疾更生也候吸引針氣不得出各在其處推闔其門令神氣存大氣留止故命曰補正言也外門已閉神氣復存候吸引針大氣不泄補之為義斷可知焉然此大氣謂大經之氣流行榮衛者帝曰候氣奈何按謂既針而其氣之至與未至何以候之岐伯曰夫邪去絡入於經也舍於血脈之中其寒溫未相得如湧波之起也時來時去故不常在按言邪氣初入由淺轉深其寒溫去來尚無定所故曰方其來也必按而止之止而取之無逢其沖而瀉之真氣者經氣也經氣太虛故曰其來不可逢此之謂也按沖注作應水刻數之平氣恐未確詳味此節文義難通蓋真氣者之上經氣太虛之下必有脫誤故也候邪不審大氣已過瀉之則真氣脫脫則不復邪氣復至而病益蓄故曰其往不可追此之謂也按不審謂認病不詳細也大氣大邪之氣不復謂真氣脫而難復也正氣虛則邪氣盛邪氣退則正氣復若不瀉之於邪盛之時而反瀉之於既退之後則真氣脫而邪氣復至病更纏綿不解矣此戒攻邪貴乎早而刻削之劑不可過用也帝曰補瀉奈何岐伯曰此攻邪也疾出以去盛血而復其真氣按邪不去則真不復故必用針以去其血前論補瀉以氣至為主此言補瀉以去血為急也此邪新客溶溶未有定處也推之則前引之則止逆而刺之溫血也刺出其血其病立已按溶溶水動貌逆猶迎也新邪入客如水之流動其血尚溫而未至於冰凝故當迎而刺出其血病必自除矣帝曰善然真邪以合波隴不起候之奈何岐伯曰審捫循三部九候之盛虛而調之察其左右上下相失及相減者審其病臟以期之按真邪以合謂邪入於經而與真氣相合也波隴不起謂初合之時尚未變動何以候而治之也伯言治此之法須詳審以撫其身之肥瘠循切以辨其脈之盛衰而知病在何臟愈於何日也誅伐無過命曰大惑反亂大經真不可復用實為虛以邪為真用針無義反為氣賊奪人正氣以從為逆榮衛散亂真氣已失邪獨內著絶人長命豫人夭殃不知三部九候故不能久長按此重言不知三部九候者之為害也八正神明論凡欲刺病必明天時如日月星辰八正之氣瞭然胸次乃可調血氣而治百病斯真神而明之者也黃帝問曰用針之服必有法則焉今何法何則服事也法象也則准也岐伯對曰法天則地合以天光謂合日月星辰之行度按天地者陰陽二氣之本也天以輕清而上浮地以重濁而下奠人在氣交之中合天地之氣以為氣氣稟有清濁之分感受有陰陽之異用針者當知清陽出乎天濁陰本乎地天有溫寒日有明陰又當合以天光是法是則病乃可得而治也合以天光如下文是矣帝曰願卒聞之岐伯曰凡刺之法必候日月星辰四時八正之氣氣定乃刺之候日月謂候日之寒溫月之空滿也星辰謂先知二十八宿之分應水漏刻者也略而言之常以日加之於宿上則知人氣在太陽否日行一舍人氣在三陽與陰分矣細而言之從房至畢十四宿水下五十刻半日之度也從昴至心十四宿水下五十刻終日之度也是故從房至畢者為陽從昴至心者為陰陽主晝陰主夜也凡日行一舍故水下三刻與七分刻之四也靈樞經曰水下一刻人氣在太陽水下二刻人氣在少陽水下三刻人氣在陽明水下四刻人氣在陰分水下不止氣行亦爾又曰日行一舍人氣行於身一周與十分身之八日行二舍人氣行於身三周與十分身之六日行三舍人氣行於身五周與十分身之四日行四舍人氣行於身七周與十分身之二日行五舍人氣行於身九周然日行二十八舍人氣亦行於身五十周與十分身之四由是故必候日月星辰也四時八正之氣者謂四時正氣八節之風來朝於太一者也謹候其氣之所在而刺之氣定乃刺之者謂八節之風氣靜定乃可以刺經脈調虛實也故歷忌云八節前後各五日不可刺灸凶是謂氣未定故不可灸刺也是故天溫日明則人血淖液而衛氣浮故血易瀉氣易行天寒日陰則人血凝泣而衛氣沉泣謂如水中居虛也按泣澀同月始生則血氣始精衛氣始行月郭滿則血氣實肌肉堅月郭空則肌肉減經絡虛衛氣去形獨居是以因天時而調血氣也按衛氣者水穀之悍氣也晝夜嘗一周於人身邪之中人必依之為出入故欲去病邪必於衛氣浮行之日以祛邪而調血氣此伯言因時刺病之道所以必依衛氣為準也郭讀作廓是以天寒無刺天溫無疑月生無瀉月滿無補月郭空無治是謂得時而調之按義如下文因天之序盛虛之時移光定位正立而待之候日遷移定氣所在南面正立待氣至而調之也按光日光也日隨時而移氣隨日而至春夏日行南陸秋冬日轉北陸春夏之日長秋冬之日短位氣之所在也正立如前篇所言靜意視義是也言用針者當隨日之長短而定其氣之所在肅容靜氣以持針而刺之則盛虛之氣隨乎時而後病得其治血氣自無不調也故曰月生而瀉是謂臟虛月滿而補血氣揚溢絡有留血命曰重實月郭空而治是謂亂經陰陽相錯真邪不別沉以留止外虛內亂淫邪乃起按前言得時而調此則失時妄治也帝曰星辰八正何候岐伯曰星辰者所以制日月之行也制謂制度定星辰則可知日月行之制度矣略而言之周天二十八宿宿三十六分人氣行一周天凡一千八分周身十六丈二尺以應二十八宿合漏水百刻都行八百一十丈以分晝夜也故人十息氣行六尺日行二分二百七十息氣行十六丈二尺一周於身水下二刻日行二十分五百四十息氣行再周於身水下四刻日行四十分二千七百息氣行十周於身水下二十刻日行五宿二十分一萬三千五百息氣行五十周於身水下百刻日行二十八宿也細而言之則常以一十周加之一分又十分分之六乃奇分盡矣是故星辰所以制日月之行度也按新校正云詳周天二十八宿至日行二十八宿也本靈樞文今具甲乙經中八正者所以候八風之虛邪以時至者也八正謂八節之正氣也八風者東方嬰兒風南方大弱風西方剛風北方大剛風東北方凶風東南方弱風西南方謀風西北方折風也虛邪謂乘人之虛而為病者也以時至謂天應太一移居以八節之前後風朝中宮而至者也四時者所以分春秋冬夏之氣所在以時調之也八正之虛邪而避之勿犯也四時之氣所在者謂春氣在經脈夏氣在孫絡秋氣在皮膚冬氣在骨髓也然觸冒虛邪動傷真氣避而勿犯乃不病焉靈樞經曰聖人避邪如避矢石蓋以其能傷真氣也以身之虛而逢天之虛兩虛相感其氣至骨入則傷五臟按元氣虧損身之虛也賊邪虛風天之虛也然惟身虛則天虛乃得而乘之故邪氣內入至骨而傷人之五臟也工候救之弗能傷也故曰天忌不可不知也按醫能候病之所在而拯救之自不犯天之忌而人之性命可保也帝曰善其法星辰者余聞之矣願聞法往古者岐伯曰法往古者先知針經也驗於來今者先知日之寒溫月之虛盛以候氣之浮沉而調之於身觀其立有驗也氣候不差故立有驗觀其冥冥者言形氣榮衛之不形於外工常先見之故曰觀於冥冥焉帝曰余聞補瀉未得其意岐伯曰瀉必用方方者以氣方盛也以月方滿也以日方溫也以身方定也以息方吸而內針乃復候其方吸而轉針乃復候其方呼而徐引針故曰瀉必用方其氣而行焉按詳必用方之下疑有闕文補必用員員者行也行者移也按動而不遽謂之移潛移默運針法員融是之謂補刺必中其榮復以吸排針也針入至血謂之中榮故員與方非針也按針形可象而方員之妙用無窮是針也而非針其神乎哉血氣者人之神不可不謹養按失神則血氣不靈無血氣則神無所依故以血氣為人之神養之不可不謹也帝曰妙乎哉論也合人形於陰陽四時虛實之應冥冥之期其非夫子孰能通之然夫子數言形與神何謂形何謂神願卒聞之岐伯曰請言形形乎形目冥冥問其所病按甲乙經作捫其所痛於義亦通索之於經慧然在前故曰形按形依於有象目冥冥問其所病既問以察其人之所苦索之於經慧然在前又切以診其脈之所患而其病之本標直了然於目前由是即有形以進乎無形是之謂形乎形也矣帝曰何謂神岐伯曰請言神神乎神耳不聞目明心開而志先慧然獨悟口弗能言俱視獨見適若昏瞼然獨明若風吹雲故曰神按神契於無形其聞也非由耳其見也非由目湛湛乎云隨風捲日照天空如醫緩之驚二其神豎越人之洞垣一方豈非神乎者哉診要經終論通篇分三段首段言逐月人氣之所在二段言刺法宜忌末段言十二經將死之證為人生之終事皆諸篇所不載診病者不可不知故曰診要經終也黃帝問曰診要何如岐伯對曰正月二月天氣始方地氣始發人氣在肝按方猶言初動天氣初動於上地氣應之而發生也蓋春居四時之先正月二月為一歲之首天地之氣至此方萌生髮之機而為化化生生之始也人得天地之氣內通於肝肝者木也王於春而亦為五臟生氣之始也三月四月天氣正方地氣定發人氣在脾按由春入夏天地之氣方發者至此大盛三月辰土四月巳火火土養脾脾為元氣之母人氣得之以資臟腑而生血氣也五月六月天氣盛地氣高人氣在頭天陽赫盛地焰高升故言天氣盛地氣高火性炎上故言人氣在頭也七月八月陰氣始殺人氣在肺按由夏轉秋氣漸肅殺申酉之月氣王於金金氣合肺故人氣在肺九月十月陰氣始冰地氣始閉人氣在心按冰猶凝也秋盡冬初收斂歸藏天地之氣由陽返陰人身之火盡攝合而還於心故云人氣在心也十一月十二月冰復地氣合人氣在腎陽氣深復故氣在腎也夫氣之變也發生於木長茂於土盛高而上肅殺於金避寒於火伏藏於水斯皆隨順陰陽之升沉也五臟生成論曰五臟之象可以類推此之謂氣類也春夏秋冬各有所刺法其所在按義見水熱穴論及四時刺逆從論中春刺夏分脈亂氣微入淫骨髓病不能愈令人不嗜食又且少氣心主脈故脈亂氣微水受氣於夏腎主骨故入淫於骨髓心火微則胃土不足故不嗜食而少氣也按新校正云四時刺逆從論云春刺絡脈血氣外溢令人少氣春刺秋分筋攣逆氣環為咳嗽病不愈令人時驚又且哭木受氣於秋肝主筋故刺秋分則筋攣也若氣環周則為咳嗽肝主驚故時驚肺主氣故氣逆又且哭也按四時刺逆從論云春刺肌肉血氣環逆令人上氣也春刺冬分邪氣著藏令人脹病不愈又且欲言語冬主陽氣伏藏故邪氣著藏腎實則脹故刺冬分則脹也火受氣於冬心主言故欲言語也按四時刺逆從論云春刺筋骨血氣內著令人腹脹夏刺春分病不愈令人解墮肝養筋肝氣不足故筋力解墮按四時刺逆從論云夏刺經脈血氣乃竭令人解墮夏刺秋分病不愈令人心中欲無言惕惕如人將捕之按誤刺秋分則傷在肺矣肺主氣肺傷則氣餒弱而不能言氣餒弱則怖畏而如人將捕之注作肝解誤矣夏刺冬分病不愈令人少氣時欲怒按四時刺逆從論亦言夏刺筋骨血氣上逆令人善怒怒主肝腎傷何以亦怒耶蓋腎者水也肝者木也木養於水水虛無氣肝失所養故怒也秋刺春分病不已令人惕然欲有所為起而忘之肝虛故也刺不當也按四時逆從論云秋刺經脈血氣上逆令人善忘秋刺夏分病不已令人益嗜臥又且善夢心少氣則脾氣孤故令嗜臥心主夢神為之故令善夢按四時刺逆從論云秋刺絡脈氣不外行令人臥不欲動秋刺冬分病不已令人灑灑時寒按腎之表足太陽也太陽主惡寒故傷腎則時寒又按四時刺逆從論曰秋刺筋骨血氣內散令人寒栗冬刺春分病不已令人欲臥不能眠眠而有見肝氣少故令欲臥不能眠肝主目故眠而如見有物之形狀也按四時刺逆從論云冬刺經脈血氣皆脫令人目不明冬刺夏分病不愈氣上發為諸痹泄脈氣故也按四時刺逆從論云冬刺絡脈血氣外泄留為大痹冬刺秋分病不已令人善渴肺氣不足故發渴按四時刺逆從論云冬刺肌肉陽氣竭絶令人善渴渴非肺病肺傷則少氣而不能化水故渴也凡刺胸腹者必避五臟心肺在膈上肝腎在膈下脾象土而居中故刺胸腹必避之五臟者所以藏精神魂魄意志損之則五神去神去則死至故不可不慎也中心者環死氣行如環之一周則死也正謂周十二辰也按新校正云刺禁論云一日死其動為噫與四時刺逆從論同此經闕刺中肝死日刺禁論雲中肝五日死其動為語與四時刺逆從論同中脾者五日死土數五也按刺禁論雲中脾十日死其動為吞與四時刺逆從論同中腎者七日死水成數六水數畢當至七日而死按刺禁論雲中腎六日死其動為嚏四時刺逆從論云中腎六日死其動為嚏缺也中肺者五日死金生數四金數畢當至五日而死一云三日死亦字誤也按刺禁論與四時刺逆從論並言三日死皆誤也當以此為正中膈者皆為傷中其病雖愈不過一歲必死按膈當一身之中五臟之氣必歸焉五臟同主一年故膈傷則五臟俱病至一歲必死也刺針必肅肅謂靜肅所以候氣之存亡刺腫搖針以出大膿血故經刺勿搖經氣不欲泄故此刺之道也帝曰願聞十二經脈之終奈何終謂盡也岐伯曰太陽之脈其終也戴眼反折瘈瘲其色白絶汗乃出出則死矣戴眼謂睛不轉而仰視也然足太陽脈起於目內眥上額交巔上從巔入絡腦還出別下項循肩膊內挾脊抵腰中其支別者下循足至小趾外側手太陽脈起於手小指之端循臂上肩入缺盆其支別者上頰至目內眥抵足太陽按新校正云甲乙經作斜絡於顴又其支別者從缺盆循頸上頰至目外眥故戴眼反折瘈瘲色白絶汗乃出也絶汗謂汗暴出如珠而不流旋覆干也太陽極則汗出故出則死少陽終者耳聾百節皆縱目睘絶系一日半死其死也色先青白乃死矣足少陽脈起於目鋭眥上抵頭角下耳後其支別者從耳後入耳中出走耳前手少陽脈其支別者從耳後亦入耳中出走耳前故終則耳聾目睘絶系也少陽主骨故氣終則百節縱緩色青白者金木相薄也故見則死矣睘謂直視如驚貌按注言少陽主骨又睘舊音瓊注言直視如驚竊謂皆誤也夫足少陽膽手少陽三焦並不主骨其言百節皆縱者大筋弛也目睘絶系者小筋斷也筋屬肝肝與膽合腑病而及於臟也睘者環字之誤蓋目之眶也目系維於眶系偏絶則斜眺若環眶皆絶則目定而不能運動故不數日即死也陽明終者口目動作善驚妄言色黃其上下經盛不仁則終矣足陽明脈起於鼻交頞中下循鼻外入上齒縫中還出挾口環唇下交承漿卻循頤後下廉出大迎循頰車上耳前過客主人循髮際至額顱其支別者從大迎前下人迎循喉嚨入缺盆下膈手陽明脈起於手循臂至肩上出於柱骨之會上下入缺盆絡肺其支別者從缺盆上頸貫頰下入齒中還出頰口交人中左之右右之左上挾鼻孔抵足陽明故終則口目動作也按陽明胃與大腸也動作者牽動不止胃脈環口是也目則義無所取蓋口動而與目相牽引故云口目動作也陽明病聞木音則惕然而驚罵詈不避親疏病極則色外見故將死則善驚妄言色黃也上人迎也在結喉旁下跗陽也盛者動而躁也古者人將死嘗診此以決之不仁者不知痛癢也言諸證既見而肌肉復不知痛癢其死必矣少陰終者面黑齒長而垢腹脹閉上下不通而終矣手少陰氣絶則血不流足少陰氣絶則骨不耎骨硬則齦上宣故齒長而積垢汙血壞則皮色死故面色如漆而不赤也足少陰脈從腎下貫肝膈入肺中手少陰脈起於心中出屬心系下膈絡小腹故其終則腹脹閉上下不通也按王注云骨不耎骨硬難經及甲乙經云骨不濡則肉弗能著注言手少陰脈絡小腹甲乙作絡小腸並通太陰終者腹脹閉不得息善噫善嘔足太陰脈行從股內前廉入腹屬脾絡胃上膈手太陰脈起於中焦下絡大腸還循胃口上膈屬肺故終則如是也靈樞經曰足太陰之脈動則病食則嘔腹脹善噫也嘔則逆逆則面赤嘔則氣逆故面赤不逆則上下不通不通則面黑皮毛焦而終矣嘔則上通故但面赤不嘔則下已閉上覆不通心氣外燔故皮毛焦而終矣何者足太陰脈支別者復從胃別上膈注心中由是則皮毛焦乃心氣外燔而生也厥陰終者中熱嗌乾善溺心煩甚則舌卷卵上縮而終矣足厥陰絡循脛上睪結於莖其正經入毛中下過陰器上抵小腹挾胃上循喉嚨之後入頏顙手厥陰脈起於胸中出屬心包故終則中熱嗌乾善溺心煩矣靈樞經曰肝者筋之合也筋者聚於陰器而絡於舌本故甚則舌卷卵上縮也又以厥陰之脈環陰器故爾此十二經之所敗也按十二經之所以終盡者以其精神敗壞故也四時刺逆從論前半言病之逆從後半言四時刺法之誤針家能知誤刺之失則刺或可以無誤矣厥陰有餘病陰痹痹謂痛也陰謂寒也有餘謂厥陰氣盛滿故陰發於外而為寒痹不足病熱痹陰不足則陽有餘故為熱痹按痹論所言痹之為義一為不知痛癢一為閉塞不通王注以痹為痛昧厥旨矣今六經有餘不足所病之痹義正相兼不得更為之解也滑則病狐疝風澀則病少腹積氣厥陰脈循股陰入髦中環陰器抵少腹又其絡支別者循莖上睪結於莖故為是病也按新校正云楊上善云狐夜不得尿日出方得人之所病與狐同故曰狐疝一曰孤疝謂三焦孤府為疝故曰孤疝少陰有餘病皮痹隱軫不足病肺痹腎水逆連於肺母故也足少陰脈從腎上貫肝膈入肺中故病如是也滑則病肺風疝澀則病積溲血以其正經入肺貫腎絡膀胱故為是病太陰有餘病肉痹寒中不足病脾痹脾主肉故如是滑則病脾風疝澀則病積心腹時滿太陰之脈入腹屬脾絡胃其支別者復從胃別上膈注心中故為是病陽明有餘病脈痹身時熱不足病心痹胃有餘則上歸於心不足則心下痹故為是滑則病心風疝澀則病積時善驚心主之脈起於胸中出屬心包下膈歷絡三焦故為是太陽有餘病骨痹身重不足病腎痹太陽與少陰為表裡故有餘不足皆病歸於腎也滑則病腎風疝澀則病積善時巔疾太陽之脈交於巔上入絡腦下循膂絡腎故如是少陽有餘病筋痹脅滿不足病肝痹少陽與厥陰為表裡故病歸於肝滑則病肝風疝澀則病積時筋急目痛肝主筋故時筋急厥陰之脈上出額與督脈會於巔其支別者從目系下頰裡故目痛按此六經乃熱論所載足三陰三陽也凡人十二經脈皆能為病而此所言與熱論所載止於此六經者蓋以此六經為木土水其氣畏寒而邪易入外感之重無過傷寒傷寒所傳正此六經此篇蓋亦從其重者而言也然熱論專主外感此篇兼論雜病故又合有餘不足而並論之但其有餘不足皆云為痹且均以滑澀分解者又何也痹者頑與閉也邪入經絡血氣凝滯或頑木而肉不仁或閉塞而氣不通也邪氣盛則病有餘其脈浮動而象滑正氣虛則病不足其脈沉滯而象澀滑與澀即有餘不足之形似非必如脈經所言滑為痰盛澀為無血之謂也惟滑近有餘故所主皆風疝經絡之證惟澀為不足故所主皆氣積臟腑之病善解經義者貴乎會其大意而推之也是故春氣在經脈夏氣在孫絡長夏氣在肌肉秋氣在皮膚冬氣在骨髓中帝曰余願聞其故岐伯曰春者天氣始開地氣始泄凍解冰釋水行經通故人氣在脈夏者經滿氣溢孫絡受血皮膚充實長夏者經絡皆盛內溢肌中秋者天氣始收腠理閉塞皮膚引急按引謂收引急謂徑急冬者蓋藏血氣在中內著骨髓通於五臟按人得天地之氣以為氣故常與四時生長收藏相應也是故邪氣者常隨四時之氣血而入客也至其變化不可為度然必從其經氣闢除其邪除其邪則亂氣不生按邪氣者不正之氣四時有不正之氣常乘人氣血之虛而入客虛有微甚之分則邪有輕重之異變變化化無常度焉從猶順也謂治此者當必順其經脈虛實之微甚以施補瀉之方而後邪可除而正可復正氣復尚何亂之有帝曰逆四時而生亂氣奈何岐伯曰春刺絡脈血氣外溢令人少氣血氣溢於外則中不足故少氣按新校正云自春刺絡脈至令人目不明與診要經終論文異義同彼注甚詳彼分四時此分五時然此有長夏刺肌肉之分而逐時各闕刺秋分之事疑此肌肉之分即彼秋皮膚之分也春刺肌肉血氣環逆令人上氣環者循環謂血氣相亂而逆故周身之氣上而不下也新校正云經闕春刺秋分春刺筋骨血氣內著令人腹脹內著不散故脹夏刺經脈血氣乃竭令人解㑊血氣竭少故解㑊夏刺肌肉血氣內卻令人善恐卻閉也血氣內閉則陽氣不通故善恐按新校正云經闕夏刺秋分夏刺筋骨血氣上逆令人善怒血氣上逆則怒氣相應故善怒秋刺經脈血氣上逆令人善忘血氣上逆滿於肺中故善忘秋刺絡脈氣不衛外令人臥不欲動按王本氣不外行全元起本作氣不衛外是也今改從之謂秋斂之時刺傷經脈則氣散而不能衛外故但欲臥而不能動也新校正云經闕秋刺長夏分秋刺筋骨血氣內散令人寒栗血氣內散則中氣虛故寒栗冬刺經脈血氣皆脫令人目不明以血氣無所營故也冬刺絡脈內氣外泄留為大痹按氣外泄則不能內運而成壅痹矣冬刺肌肉陽氣竭絶令人善忘按注謂陽氣不壯至春而竭故善忘義恐未確闕疑可也新校正云經闕冬刺秋分凡此四時刺者大逆之病不可不從也反之則生亂氣相淫病焉淫不次也不次而行如浸淫相染而生病也按從治之法原為大逆之證而設故應從治而反正治則適以亂其氣而病不愈矣所謂從者繆刺也大逆之病全元起本作六經之病非也帝曰善刺五臟中心一日死其動為噫按與刺禁論同中肝五日死其動為語診要經終論闕而不論刺禁論同按甲乙經語作缺中肺三日死其動為咳診要經終論曰中肺五日死刺禁論曰中肺三日死其動為咳中腎六日死按甲乙經作三日其動為嚏缺診要經終論曰中腎七日死刺禁論同按刺禁與甲乙經俱無缺字中脾十日死按甲乙經作十五日其動為吞診要經終論曰中脾五日死刺禁論曰中脾十日死其動為吞然此三論皆岐伯之言而死日變動不同傳之誤也刺傷人五臟必死其動則依其臟之所變候知其死也變謂氣動變也中心以下至此併為從逆重文也繆刺論病無常處或左或右既非一證之可名則治自不得執一定之法略病之形而直探病之本指東擊西兵之奇者其繆刺之謂乎黃帝問曰余聞繆刺未得其意何謂繆刺岐伯對曰夫邪之客於形也必先舍於皮毛留而不去入舍於孫脈留而不去入舍於絡脈留而不去入舍於經脈內連五臟散於腸胃陰陽俱感五臟乃傷此邪之從皮毛而入極於五臟之次也如此則治其經焉今邪客皮毛入舍於孫絡留而不去閉塞不通不得入於經流溢於大絡而生奇病也病在血絡是謂奇邪按新校正云全元起云大絡十五絡也夫邪客大絡者左注右右注左上下左右與經相干而布於四末其氣無常處不入於經俞命曰繆刺四末謂四肢也帝曰願聞繆刺以左取右以右取左奈何其與巨刺何以別之岐伯曰邪客於經左盛則右病右盛則左病亦有移易者左痛未已而右脈先病如此者必巨刺之必中其經非絡脈也先病者謂彼病未止而此先病以承之按必中其經謂必中其病之所在也故絡病者其痛與經脈繆處故命曰繆刺絡謂正經之旁支非正別也亦兼公孫飛揚等之別絡也按新校正云王氏云非正別也本論邪客足太陰絡令人腰痛注引從髀合陽明上絡嗌貫舌中乃太陰之正也亦是兼脈之正安得謂之非正別也帝曰願聞繆刺奈何取之何如岐伯曰邪客於足少陰之絡令人卒心痛暴脹胸脅支滿以其絡支別者並正經從腎上貫肝膈走於心包故邪客之則病如是無積者刺然骨之前出血如食頃而已然骨之前然谷穴也在足內踝前起大骨下陷者中足少陰滎也刺三分留三呼灸三壯刺此多見血令人立飢欲食不已左取右右取左言痛在左取之右痛在右取之左余如此例按注痛字不若病字渾成病新發者取五日已素有此病而新發先刺之五日乃盡已邪客於手少陽之絡令人喉痹舌卷口乾心煩臂外廉痛手不及頭以其脈循手表出臂外上肩入缺盆布膻中散絡心包其支者從膻中上出缺盆上項又心主其舌故病如是刺手中指次指爪甲上去端如韭葉各一痏謂關衝穴少陽之井也刺一分留三呼灸三壯左右皆刺之故言各一痏痏瘡也按新校正云甲乙經關衝出手小指次指之端今言中指者誤也痏音委瘡也謂灸刺之而成瘡痏壯者立已老者有頃已左取右右取左新病數日已邪客於足厥陰之絡令人卒疝暴痛以其絡去內踝上五寸別走少陽其支別者循脛上睪結於莖故令人卒疝暴痛睪陰丸也按睪音皋刺足大趾爪甲上與肉交者各一痏謂大敦穴足大趾之端去爪甲角如韭葉厥陰之井也刺三分留十呼灸三壯男子立已女子有頃已左取右右取左邪客於足太陽之絡令人頭項肩痛以其經之正者從腦出別下項支別者從髆內左右別下又其絡自足上行循背上頭故頭項肩痛也按新校正云甲乙經云其支者從巔入絡腦還出別下項王氏云經之正者正當作支刺足小趾爪甲上與肉交者各一痏立已謂至陰穴太陽之井也刺一分留五呼灸三壯按甲乙經云在足小趾外側去爪甲角如韭葉不已刺外踝下三痏左取右右取左如食頃已謂金門穴足太陽郤也在外踝下刺三分灸三壯邪客於手陽明之絡令人氣滿胸中喘息而支胠胸中熱以其經自肩端入缺盆絡肺其支別者從缺盆上頸故病如是刺手大指次指爪甲上去端如韭葉各一痏左取右右取左如食頃已謂商陽穴手陽明之井也刺一分留一呼灸一壯按甲乙經云商陽在手大指次指內側去爪甲角如韭葉邪客於臂掌之間不可得屈刺其踝後按新校正云全元起云是人手之本節踝也先以指按之痛乃刺之以月死生為數月生一日一痏二日二痏十五日十五痏十六日十四痏隨日數也月半以前謂之生月半以後謂之死盈虧而異也邪客於足陽蹺之脈令人目痛從內眥始以其脈起於足上行至頭而屬目內眥故病令人目痛從內眥始也何以明之八十一難曰陽蹺脈者起於跟中循外踝上行入風池針經曰陰蹺入鼽屬目內眥合於太陽陽蹺而上行尋此則至於目內眥也刺外踝之下半寸所各二痏謂申脈穴陽蹺之所生也在外踝下陷中容爪甲刺三分留六呼灸三壯左刺右右刺左如行十里頃而已人有所墮墜惡血留內腹中滿脹不得前後先飲利藥此上傷厥陰之脈下傷少陰之絡刺足內踝之下然骨之前血脈出血此少陰之絡也按新校正云詳血脈出血脈字疑是絡字刺足跗上動脈謂衝陽穴胃之原也刺三分留十呼灸三壯主腹大不嗜食以腹脹滿故取之不已刺三毛上各一痏見血立已左刺右右刺左謂大敦穴厥陰之井也善悲驚不樂刺如上方亦如上法刺之邪客於手陽明之絡令人耳聾時不聞音以其經支者從缺盆上頸貫頰又其支別者入耳會於宗脈故病如是刺手大指次指爪甲上去端如韭葉各一痏立聞亦同前商陽穴不已刺中指爪甲上與肉交者立聞謂中衝穴手心主之井也在中指之端去爪甲如韭葉陷者中刺一分留三呼灸三壯古經脫簡無絡可尋恐是刺小指爪甲上與肉交者也何以言之下文雲手少陰絡會於耳中也若小指之端是謂少衝手少陰之井也刺一分留一呼灸一壯按新校正云王氏云恐是小指爪甲上少衝穴按甲乙經手心主之正上循喉嚨出耳後合少陽完骨之下如是則安得不刺中衝而疑為少衝也其不時聞者不可刺也不時聞者絡氣已絶故不可刺耳中生風者亦刺之如此數左刺右右刺左按生風謂耳中自響如聞風聲也其刺法亦如上凡痹往來行無常處者在分肉間痛而刺之以月死生為數用針者隨氣盛衰以為痏數針過其日數則脫氣不及日數則氣不瀉左刺右右刺左病已止不已復刺之如法言所以約月死生為數者何以隨氣之盛衰也月生一日一痏二日二痏漸多之十五日十五痏十六日十四痏漸少之如是刺之則無過數無不及也邪客於足陽明之經令人鼽衄上齒寒以其脈起於鼻交額中下循鼻外入上齒中還出挾口環唇下交承漿卻循頤後下廉出大迎循頰車上耳前故病令人鼽衄上齒寒也復以其脈左右交於面部故舉經脈之病以明繆處之類故下文云按新校正云全元起本與甲乙經陽明之經作陽明之絡刺足中趾次趾爪甲上與肉交者各一痏左刺右右刺左中當為大傳寫誤也據靈樞經孔穴圖經中趾次趾爪甲上無穴當言大趾次趾爪甲上乃厲兌穴陽明之井刺一分留一呼灸一壯邪客於足少陽之絡令人脅痛不得息咳而汗出以其脈支別者從目鋭眥下大迎合手少陽於䪼下加頰車下頸合缺盆以下胸中貫膈絡肝膽故令人脅痛咳而汗出刺足小趾次趾爪甲上與肉交者各一痏謂竅陰穴少陽之井也刺一分留一呼灸三壯按竅陰在足小趾次趾之端去爪甲角如韭葉不得息立已汗出立止咳者溫衣飲食一日已左刺右右刺左病立已不已復刺如法邪客於足少陰之絡令人嗌痛不可內食無故善怒氣上走賁上以其經支別者從肺出絡心注胸中又其正經從腎上貫肝膈入肺中循喉嚨挾舌本故病令人嗌乾痛不可內食無故善怒氣上走賁上也賁謂氣奔也按新校正云詳王氏以賁上為氣奔者非楊玄操云賁膈也是氣上走膈上也經既雲氣上走安得又以賁為氣奔耶刺足下中央之脈各三痏凡六刺立已左刺右右刺左謂湧泉穴少陰之井也在足心陷者中刺三分留三呼灸三壯嗌中腫不能內唾時不能出唾者刺然骨之前出血立已左刺右右刺左亦足少陰之絡也以其絡並大經循喉嚨故爾刺之此二十九字本錯簡在邪客手足少陰太陰足陽明之絡前今遷於此按新校正云詳王注以其絡並大經循喉嚨差互甲乙經足少陰之絡並經上走心包少陰之經循喉嚨今王氏之注經與絡交互當以甲乙經為正也邪客於足太陰之絡令人腰痛引少腹控䏚不可以仰息足太陰之絡從髀合陽明上貫尻骨中與厥陰少陽結於下髎而循尻骨內入腹上絡嗌貫舌中故腰痛則引少腹控於䏚中也䏚謂季脅之空軟處也受邪氣則絡拘急故不可以仰伸而喘息也刺腰痛篇中無息字按新校正云詳王氏注云足太陰之絡甲乙經乃太陰之正非絡也王氏謂之絡者未詳其旨刺腰尻之解兩胂之上是腰俞以月死生為痏數髮針立已左刺右右刺左腰尻骨間曰解當中有腰俞刺二寸留七呼中誥孔穴圖經云左取右右取左穴當中不應爾也次腰下挾尻有骨空各四皆主腰痛下髎主與經同是足太陰厥陰少陽所結刺二寸留十呼灸三壯㖠謂兩踝胂也腰俞髁胂皆當取之也按新校正云此邪客足太陰之絡並刺法一項已見刺腰痛篇中彼注甚詳此特多是腰俞三字耳別按全元起本原無此三字王氏頗知腰俞無左右取之理而注之而不知全元起本舊無也邪客於足太陽之絡令人拘攣背急引脅而痛以其經從踝內左右別下貫胂合膕中故病令人拘攣背急引脅而痛按新校正云全元起本及甲乙經引脅而痛下更云內引心而痛刺之從項始數脊椎挾脊疾按之應手如痛刺之旁三痏立已從項始數脊椎者謂從大椎數之至第二椎兩旁各一寸五分內循脊兩旁按之有痛應手即邪客之處也隨痛應手深淺即而刺之邪客在脊骨兩旁故言刺之旁也邪客於足少陽之絡令人留於樞中痛髀不可舉以其經出氣街繞髦際橫入髀厭中故痛令人留於髀樞後痛解不可舉也樞謂髀樞也刺樞中以毫針寒則久留針以月死生為數立已髀樞之後則環跳穴也以在髀樞後故言刺髀樞後也環跳者足少陽脈氣所發刺一寸留二十呼灸三壯毫針者第七針也按新校正云甲乙經云環跳穴在髀樞中氣穴論云在兩髀厭分中此經云刺樞中而王氏以謂在髀樞之後者誤也耳聾刺手陽明不已刺其通脈出耳前者手陽明前謂手大指次指去端如韭葉者也是謂商陽據中誥孔穴圖經手陽明脈中商陽合谷陽溪偏歷四穴並主耳聾今經所指謂前商陽不謂此合谷等穴也耳前通脈手陽明脈正當聽會之分刺四分灸三壯齒齲刺手陽明不已刺其脈入齒中立已據甲乙流注圖經手陽明脈中商陽二間三間合谷陽溪偏歷溫溜七穴並主齒痛手陽明貫頰入下齒中足陽明脈循鼻外入上齒中也按齲音渠齒腐也邪客於五臟之間其病也脈引而痛時來時止視其病繆刺之於手足爪甲上各刺其井左取右右取左視其脈出其血間日一刺一刺不已五刺已有血脈者則刺之如此數繆傳引上齒齒唇寒痛視其手背脈血者去之若病繆傳而引上齒齒唇寒痛者刺手背陽明絡也足陽明中指爪甲上一痏手大指次指爪甲上各一痏立已左取右右取左謂第二指厲兌穴也於大指次指謂商陽穴手陽明井也針經曰齒痛不惡清飲取足陽明惡清飲取手陽明按新校正云詳前文邪客足陽明刺中指次指爪甲上是誤剩次指二字當如此只言中指爪甲上乃是也邪客於手足少陰太陰足陽明之絡此五絡皆會於耳中上絡左角手少陰真心脈足少陰腎脈手太陰肺脈足太陰脾脈足陽明胃脈此五絡皆會於耳中而出絡左額角也五絡俱竭令人身脈皆動而形無知也其狀若尸或曰尸厥言其卒冒悶而如死尸身脈猶如常人而動也然陰氣盛於上則下氣熏上而邪氣逆邪氣逆則陽氣亂陽氣亂則五絡閟結而不通故其狀若尸也以其從厥而生故或曰尸厥刺其足大趾內側爪甲上去端如韭葉謂隱白穴足太陰之井也刺一分留三呼灸三壯後刺足心謂湧泉穴足少陰之井也刺同取湧泉法後刺足中趾爪甲上各一痏謂第二指足陽明之井也刺同取厲兌法後刺手大指內側去端如韭葉謂少商穴手太陰之井也刺一分留三呼灸三壯後刺手心主謂中衝穴手心主之井也刺一分留三呼灸一壯按新校正云甲乙經不刺手心主詳此五絡之數亦不及手心主而此刺之是有六絡王冰相隨注之不為明辨之語殊可異也少陰鋭骨之端各一痏立已謂神門穴在掌後鋭骨之端陷者中手少陰之俞也刺三分留三呼灸三壯不已以竹管吹其兩耳言使氣入耳中內助五絡令氣復通也當內管入耳以手密擫之勿令氣泄而極吹之氣蹙然後絡脈通也按新校正云陶隱居云吹其左耳極三度復吹其右耳極三度乃救厥良法鬄其左角之發方一寸燔治飲以美酒一杯不能飲者灌之立已左角之發是五絡血之餘故鬄之燔治飲之以美酒也酒者所以行藥勢又炎上而內走於心心主脈故以美酒服之按鬄與剃同以刀削髮也凡刺之數先視其經脈切而從之審其虛實而調之不調者經刺之有痛而經不病者繆刺之因視其皮部有血絡者盡取之此繆刺之數也
