body:
  text: 卷之六氣穴論氣穴者謂周身三百六十五穴為氣脈通流之處可以按穴而針灸故云氣穴也黃帝問曰余聞氣穴三百六十五以應一歲未知其所願卒聞之岐伯再拜而起曰臣請言之背與心相控而痛所治天突與十椎及上紀天突在頸結喉下四寸中決宛宛中陰維任脈之會低針取之刺可入一寸留七呼灸三壯今甲乙經經脈流注孔穴圖經當脊十椎下並無穴目恐是七椎也此則督脈氣所主之上紀者胃脘也謂中腕也中腕者胃募也在上腕下一寸居心蔽骨與齊之中手太陽少陽足陽明三脈所生任脈氣所發也刺可入一寸二分若灸者可灸七壯按甲乙經作任脈之會下紀者關元也關元者小腸募也在臍下三寸足三陰任脈之會刺可入二寸留七呼灸七壯背胸邪系陰陽左右如此其病前後痛澀胸脅痛而不得息不得臥上氣短氣偏痛脈滿起斜出尻脈絡胸脅支心貫膈上肩加天突斜下肩交十椎下按新校正云詳自背與心相控至此疑是骨空論文簡脫誤於此是也然此篇三百六十五穴之數又缺故仍錄於此而兩存之臟俞五十穴臟謂五臟心肝脾肺腎非兼四形臟也俞謂井滎俞經合非背俞也然井滎俞經合者肝之井也大敦也滎行間也俞太衝也經中封也合曲泉也大敦在足大趾端去爪甲角如韭葉及三毛之中足厥陰脈之所出也刺三分留十呼灸三壯行間在足大趾之間脈動應手陷者中足厥陰脈之所流也新校正云按甲乙經流作留余所流並作留刺六分留十呼灸三壯太衝在足大趾本節後二寸陷者中足厥陰脈之所注也刺三分留十呼灸三壯中封在足內踝前一寸半按甲乙經云一寸陷者中仰足而取之伸足乃得之足厥陰脈之所行也刺四分留七呼灸三壯曲泉在膝內輔骨下大筋上小筋下陷者中屈膝而得之足厥陰脈之所入也刺六分留十呼灸三壯心包之井者中衝也滎勞宮也俞大陵也經間使也合曲澤也中衝在手中指之端去爪甲角如韭葉陷者中手心主脈之所出也刺一分留三呼灸一壯勞宮在掌中央動脈手心主脈之所流也刺三分留六呼灸二壯大陵在掌後骨兩筋間陷者中手心主脈之所注也刺六分留七呼灸三壯間使在掌後三寸兩筋間陷者中手心主脈之所行也刺六分留七呼灸七壯曲澤在肘內廉下陷者中屈肘而得之手心主脈之所入也刺三分留七呼灸三壯脾之井者隱白也滎大都也俞太白也經商丘也合陰陵泉也隱白在足大趾端內側去爪甲角如韭葉足太陰脈之所出也刺一分留三呼灸三壯大都在足大趾本節後陷者中足太陰脈之所流也刺三分留七呼灸三壯太白在足內側核骨下陷者中足太陰脈之所注也刺三分留七呼灸三壯商丘在內踝下微前陷者中足太陰脈之所行也刺四分留七呼灸三壯陰陵泉在膝下內側輔骨下陷者中伸足乃得之足太陰脈之所入也刺五分留七呼灸三壯肺之井者少商也滎魚際也俞太淵也經經渠也合尺澤也少商在手大指之端內側去爪甲角如韭葉手太陰脈之所出也刺一分留一呼灸三壯魚際在手大指本節後內側散脈手太陰脈之所流也刺二分留三呼灸三壯太淵在掌後陷者中手太陰脈之所注也刺二分留二呼灸三壯經渠在寸口陷者中手太陰之所行也刺三分留三呼不可灸傷人神明尺澤在肘中約上動脈手太陰脈之所入也刺三分留三呼灸三壯腎之井者湧泉也滎然谷也俞太谿也經復溜也按甲乙經溜作留合陰谷也湧泉在足心陷者中屈足卷指宛宛中足少陰脈之所出也刺三分留三呼灸三壯然谷在足內踝前起大骨下陷者中足少陰脈之所流也刺三分留三呼灸三壯刺此多見血令人立飢欲食太谿在足內踝後跟骨上動脈陷者中足少陰脈之所注也刺三分留七呼灸三壯復溜在足內踝上二寸陷者中新校正云按刺腰痛論注云在內踝後上五寸動脈足少陰脈之所行也刺三分留三呼灸五壯陰谷在膝下內輔骨之後大筋之下小筋之上按之應手屈膝而得之足少陰脈之所入也刺四分灸三壯如是五臟之俞臟各五穴則二十五俞以左右脈具言之則五十穴腑俞七十二穴腑謂六腑非兼九形腑也俞亦謂井滎俞原經合非背俞也肝之腑膽膽之井者竅陰也滎俠谿也俞臨泣也原丘虛也經陽輔也合陽陵泉也竅陰在足小趾次趾之端去爪甲角如韭葉足少陽脈之所出也刺一分留一呼灸三壯俠谿在足小趾次趾岐骨間本節前陷者中足少陽脈之所流也刺三分留三呼灸三壯臨泣在足小趾次趾本節後間陷者中去俠谿一寸半足少陽脈之所注也刺三分留五呼灸三壯丘虛在足外踝下如前陷者中去臨泣三寸足少陽脈所過也刺五分留七呼灸三壯陽輔在足外踝上甲乙經云外踝上四寸輔骨前絕骨之端如前三分所去丘虛七寸足少陽脈之所行也刺五分留七呼灸三壯陽陵泉在膝下一寸䯒外廉陷者中足少陽脈之所入也刺六分留十呼灸三壯脾之腑胃胃之井者厲兌也滎內庭也俞陷谷也原衝陽也經解谿也合三里也厲兌在足大趾次趾之端去爪甲角如韭葉足陽明脈之所出也刺一分留一呼灸一壯內庭在足大趾次趾外間陷者中足陽明脈之所流也刺三分留十呼灸三壯陷谷在足大趾次趾外間本節後陷者中去內庭二寸足陽明脈之所注也刺五分留七呼灸三壯衝陽在足跗上五寸骨間動脈上去陷谷三寸足陽明脈之所過也刺三分留十呼灸三壯解谿在衝陽後二寸半甲乙經作一寸半腕上陷者中足陽明脈之所行也刺五分留五呼灸三壯三里在膝下三寸䯒骨外廉兩筋肉分間足陽明脈之所入也刺一寸留七呼灸三壯肺之腑大腸大腸之井者商陽也滎二間也俞三間也原合谷也經陽谿也合曲池也商陽在手大指次指內側去爪甲角如韭葉手陽明脈之所出也刺一分留一呼灸三壯二間在手大指次指本節前內側陷者中手陽明脈之所流也刺三分留六呼灸三壯三間在手大指次指本節後內側陷者中手陽明脈之所注也刺三分留三呼灸三壯合谷在手大指次指歧骨之間手陽明脈之所過也刺三分留六呼灸三壯陽谿在腕中上側兩筋間陷者中手陽明脈之所行也刺三分留七呼灸三壯曲池在肘外輔屈肘兩骨之中手陽明脈之所入也以手拱胸取之刺五分留七呼灸三壯心之腑小腸小腸之井者少澤也滎前谷也俞後谿也原腕骨也經陽谷也合小海也少澤在手小指之端去爪甲下一分陷者中手太陽脈之所出也刺一分留二呼灸三壯前谷在手小指外側本節前陷者中手太陽脈之所流也刺一分留三呼灸三壯後谿在手小指外側本節後陷者中手太陽脈之所注也刺二分留二呼灸一壯腕骨在手外側腕前起骨下陷者中手太陽脈之所過也刺二分留三呼灸三壯陽谷在手外側腕中銳骨之下陷者中手太陽脈之所行也刺二分留三呼灸三壯小海在肘內大骨外去肘端五分陷者中屈肘乃得之手太陽脈之所入也刺二分留七呼灸五壯心包之腑三焦三焦之井者關衝也滎液門也俞中渚也原陽池也經支溝也合天井也關衝在手小指次指之端去爪甲角如韭葉手少陽脈之所出也刺一分留三呼灸三壯液門在手小指次指間陷者中手少陽脈之所流也刺二分留二呼灸三壯中渚在手小指次指本節後間陷者中手少陽脈之所注也刺二分留三呼灸三壯陽池在手表腕上陷者中手少陽脈之所過也刺二分留六呼灸三壯支溝在腕後三寸兩骨之間陷者中手少陽脈之所行也刺二分留七呼灸三壯天井在肘外大骨之後一寸兩筋間陷者中屈肘得之手少陽脈之所入也刺一寸留七呼灸三壯腎之腑膀胱膀胱之井者至陰也滎通谷也俞束骨也原京骨也經崑崙也合委中也至陰在足小趾外側去爪甲角如韭葉足太陽脈之所出也刺一分留五呼灸三壯通谷在足小趾外側本節前陷者中足太陽脈之所流也刺二分留五呼灸三壯束骨在足小趾外側本節後赤白肉際陷者中足太陽脈之所注也刺三分留三呼灸三壯京骨在足外側大骨下赤白肉際陷者中按而得之足太陽脈之所過也刺三分留七呼灸三壯崑崙在足外踝後跟骨上陷者中細脈動應手足太陽脈之所行也刺五分留十呼灸三壯委中在膕中央約文中動脈按此穴與甲乙經及刺瘧篇注痹論注同又骨空論云在膝解之後屈腳之中背面取之又熱穴論注刺熱篇注云在足膝後屈處其文雖異義則同也足太陽脈之所入也刺五分留七呼灸三壯如是六腑之俞腑各六穴則三十六俞以左右脈具而言之則七十二穴熱俞五十九穴水俞五十七穴並載水熱論中按新校正云熱俞又見刺熱篇注頭上五行行五五五二十五穴亦熱俞之五十九穴也中𦛗兩旁各五凡十穴謂五臟之背俞也肺俞在第三椎下兩旁心俞在第五椎下兩旁肝俞在第九椎下兩旁脾俞在第十一椎下兩旁腎俞在第十四椎下兩旁此五臟各挾脊相去一寸半並足太陽脈之會刺三分肝俞留六呼余並七呼灸三壯挾脊數之則十穴也大椎上兩旁各一凡二穴按新校正云大椎上旁無穴大椎下旁穴名大杼後有故王氏云未詳上當作下傳寫誤也目瞳子浮白二穴瞳子髎在目外去眥五分手太陽手足少陽三脈之會刺三分灸三壯浮白在耳後入髮際一寸足太陽少陽二脈之會刺三分灸三壯左右言之各二為四也兩髀厭分中二穴謂環跳穴也在髀樞後足太陽少陽二脈之會刺一寸留二十呼灸三壯按甲乙經云在髀樞中注後當作中灸三壯甲乙經作五壯犢鼻二穴在膝髕下䯒上俠解大筋中足陽明脈氣所發刺六分灸三壯耳中多所聞二穴聽宮穴也在耳中珠子大如赤小豆手足少陽足太陽三脈之會刺三分留六呼灸三壯眉本二穴攢竹穴也在眉頭陷者中足太陽脈氣所發刺三分留六呼灸三壯完骨二穴在耳後入髮際四分足太陽少陽之會刺三分留七呼灸三壯按甲乙作刺二分灸七壯項中央一穴風府穴也在項上入髮際一寸大筋內宛宛中督脈陽維二經之會疾言其肉立起言體其肉立下刺四分留三呼灸之不幸令人喑枕骨二穴竅陰穴也在完骨上枕骨下搖動應手足太陽少陽之會刺三分灸三壯上關二穴針經所謂刺之則㰦不能欠者也在耳前上廉起骨端開口有空手少陽足陽明之會刺三分留七呼灸三壯刺深令人耳無所聞大迎二穴在曲頷前一寸三分骨陷者中動脈足陽明脈氣所發刺三分留七呼灸三壯下關二穴針經所謂刺之則欠不能㰦者也在上關下耳前動脈下廉合口有空張口而閉足陽明少陽二脈之會刺三分留七呼灸三壯耳中有干擿之不得灸也天柱二穴在挾項後髮際大筋外廉陷者中足太陽脈氣所發刺二分留六呼灸三壯巨虛上下廉四穴上廉足陽明與大腸合也在膝犢鼻下䯒外廉六寸足陽明脈氣所發刺八分灸三壯下廉足陽明與小腸合也在上廉下三寸足陽明脈氣所發刺三分灸三壯曲牙二穴頰車穴也在耳下曲頰端陷者中開口有空足陽明脈氣所發刺三分灸三壯天突一穴見前天府二穴在腋下三寸臂臑內廉動脈手太陰脈氣所發禁不可灸刺四分留三呼天牖二穴在頸筋間缺盆上天容後天柱前完骨下髮際上手少陽脈氣所發刺一寸留七呼灸三壯扶突二穴在頸當曲頰下一寸人迎後手陽明脈氣所發仰而取之刺四分灸三壯天窗二穴在曲頰下扶突後動脈應手陷者中手太陽脈氣所發刺六分灸三壯肩解二穴謂肩井也在肩上陷解中缺盆上大骨前手足少陽陽維之會刺五分灸三壯關元一穴釋見前委陽二穴三焦下輔俞也在膕中外廉兩筋間此足太陽之別絡刺七分留五呼灸三壯屈身而取之肩貞二穴在肩曲甲下兩骨解間肩髃後陷者中手太陽脈氣所發刺八分灸三壯喑門一穴在項髮際宛宛中入系舌本督脈陽維二經之會仰頭取之刺四分不可灸灸之令人喑按氣府注云去風府一寸齊一穴齊中也禁不可刺刺之使人惡瘍潰矢出者死不治若灸者可灸三壯胸俞十二穴謂俞府彧中神藏靈墟神封步廊左右則十二穴也俞府在巨骨下挾任脈兩旁橫去任脈各二寸陷者中下五穴遞相去一寸六分陷者中並足少陰脈氣所發仰而取之刺四分灸五壯背俞二穴大杼穴也在脊第一椎下兩旁相去各一寸半陷者中督脈別絡手足太陽三脈氣之會刺三分留七呼灸七壯膺俞十二穴謂雲門中府周滎胸卿天溪食竇左右則十二穴也雲門在巨骨下挾任脈旁橫去任脈各六寸陷者中動脈應手雲門中府相去一寸餘五穴遞相去一寸六分陷者中並手太陰脈氣所發雲門食竇舉臂取之余並仰而取之雲門刺七分太深令人逆息中府刺三分留五呼余刺四分灸五壯按新校正云詳王氏以此十二穴並手太陰按甲乙經雲門乃手太陰中府乃手足太陰之會周滎以下乃足太陰非十二穴並手太陰也分肉二穴在足外踝上絕骨之端三分筋肉分間陽維脈氣所發刺三分留七呼灸三壯按新校正云甲乙經無分肉穴詳處所疑是輔陽在足外踝上輔骨前絕骨端如前三分所又刺腰痛注作絕骨之端如後二分刺五分留十呼與此注小異踝上橫二穴內踝上者交信穴也交信去內踝上二寸少陰前太陰後筋骨間足陰蹺之郄刺四分留五呼灸三壯外踝上附陽穴也附陽去外踝上三寸太陽前少陰後筋骨間陽蹺之郄刺六分留七呼灸三壯按甲乙經作付陽陰陽蹺四穴陰蹺穴在足內踝下是謂照海陰蹺所生刺四分留六呼灸三壯陽蹺穴是謂申脈陽蹺所生在外踝下陷者中按刺腰痛篇與繆刺論二注並云在足外踝下五分是也容爪甲刺三分留七呼灸三壯水俞在諸分分謂肉之分理間治水取之熱俞在氣穴瀉熱則取之寒熱俞在兩骸厭中二穴骸厭謂膝外挾膝之骨厭中也大禁二十五在天府下五寸謂五里穴也所以謂之大禁者謂其禁不可刺也針經曰迎之五里中道而上五里而已五注而臟之氣盡矣故五五二十五而竭其俞矣蓋謂此也又曰五里者尺澤之後五里與此文同凡三百六十五穴針之所由行也按新校正云詳自臟俞五十至此並重復共得三百六十穴通前天突十椎上紀下紀共三百六十五穴除重複實有三百一十三穴帝曰余已知氣穴之處遊針之居願聞孫絡溪谷亦有所應乎孫絡小絡也謂絡之支別者岐伯曰孫絡三百六十五穴會亦以應一歲以溢奇邪以通榮衛榮衛稽留衛散榮溢氣竭血著外為發熱內為少氣疾瀉無怠以通榮衛見而瀉之無問所會榮積衛留內外相薄者見其血絡當即瀉之亦無問其脈之俞會帝曰善願聞溪谷之會也岐伯曰肉之大會為谷肉之小會為溪肉分之間溪谷之會以行榮衛以會大氣按甲乙經作以舍大氣邪溢氣壅脈熱肉敗榮衛不行必將為膿內銷骨髓外破大膕熱過故致是留於節湊必將為敗若留於骨節之間津液所湊之處則骨節之間髓液皆潰為膿故必敗爛筋骨而不得屈伸矣積寒留舍榮衛不居卷肉縮筋按新校正云全元起本作寒肉縮筋肋肘不得伸內為骨痹外為不仁命曰不足大寒留於溪谷也邪氣盛甚真氣不榮髓液內消故為是也不足謂陽氣不足也寒邪外薄久積淹留陽不外勝內消筋髓故曰不足大寒留於溪谷之中也溪谷三百六十五穴會亦應一歲其小痹淫溢循脈往來微針所及與法相同若小寒之氣流行淫溢隨脈往來為痹病用針調者與常法相同爾孫絡之脈別經者其血盛而當瀉者亦三百六十五脈並注於絡傳注十二絡脈非獨十四絡脈也十四絡者謂十二經絡兼任脈督脈之絡也脾之大絡起自於脾故不並言之也帝乃闢左右而起再拜曰今日發蒙解惑藏之金匱不敢復出乃藏之金蘭之室署曰氣穴所在按王本此一段在與法相同之下孫絡之脈之上必錯簡也今釐正之水熱穴論通篇凡四段首段言腎屬水而其病亦為水二段言四時取四臟之穴不同三段言瀉熱之穴四段言傷寒變熱篇名水熱穴者蓋合第一第三兩段而言無深義也其第二段不過因論穴而並及之四段則又因論熱而傳會焉此論洵牽合成篇者也黃帝問曰少陰何以主腎腎何以主水岐伯對曰腎者至陰也至陰者盛水也肺者太陰也少陰者冬脈也故其本在腎其末在肺皆積水也陰者謂寒也冬月至寒腎氣合應故云腎者至陰也水王於冬故云至陰者盛水也腎少陰脈從腎上貫肝膈入肺中故云其本在腎其末在肺也腎氣上逆則水氣客於肺中故云皆積水也按盛水者水盛於冬也水原於腎故云本由腎而溢於肺故云末也帝曰腎何以能聚水而生病岐伯曰腎者胃之關也關門不利故聚水而從其類也關者所以司出入也腎主下焦膀胱為腑主其分注關竅二陰故腎氣化則二陰通二陰閟則胃填滿故云腎者胃之關也關閉則水積水積則氣停氣停則水生水生則氣溢氣水同類故云關門不利聚水而從其類也靈樞經曰下焦溢為水此之謂也按經言胃以腎為關謂腎主下焦司決瀆之職其氣下行而上可無壅滯之患注意是也然腎主化氣而命門之火實生脾胃土腎足則氣通腎虛則氣閟胃以腎為通塞者實以腎為胃之本原不可不知也上下溢於皮膚故為胕腫胕腫者聚水而生病也按上下謂周身注仍作腎肺說誤矣胕音附帝曰諸水皆生於腎乎岐伯曰腎者牝藏也牝陰也地氣上者屬於腎而生水液也故曰至陰勇而勞甚則腎汗出腎汗出逢於風內不得入於臟腑外不得越於皮膚客於玄府行於皮里傳為胕腫本之於腎名曰風水所謂玄府者汗空也勇而勞甚謂力房也勞勇汗出則玄府開汗出逢風則玄府復閉閉則余汗未出內伏皮膚傳化為水從風而水故名風水按勇有力也勞甚謂恃其有力而入房或遠行動作也單指力房偏矣帝曰水俞五十七處者是何主也岐伯曰腎俞五十七穴積陰之所聚也水所從出入也按腎主水故以腎俞為水俞腎居於內俞應於外腎病有所積聚於是水從俞而出入矣尻上五行行五者此腎俞背部之俞凡有五行當其中者督脈氣所發次兩旁四行皆足太陽脈氣也故水病下為胕腫大腹上為喘呼不得臥者標本俱病故肺為喘呼腎為水腫肺為逆不得臥水下居於腎則腹至足而胕腫上入於肺則喘息賁急而大呼也標本者肺為標腎為本也按惟肺主喘呼臥則氣愈逆故也伏兔上各二行行五者此腎之街也街謂道也腹部正俞凡五行挾齊兩旁則腎臟足少陰脈及衝脈氣所發次兩旁則胃府足陽明脈氣所發此四行穴則伏兔之上也三陰之所交結於腳也踝上各一行行六者此腎脈之下行也名曰太衝凡五十七穴者皆臟之陰絡水之所客也經所謂五十七者然尻上五行行五則背脊當中行督脈氣所發者脊中懸樞命門腰俞長強當其處也次挾督脈兩旁足太陽脈所發者有大腸俞小腸俞膀胱俞中𦛗內俞白環俞當其處也又次外挾兩旁足太陽脈氣所發者有胃倉肓門志室胞肓秩邊當其處也伏兔上各二行行五者腹部正俞挾中行任脈兩旁衝脈足少陰之會者有中注四滿氣穴大赫橫骨當其處也次挾衝脈足少陰兩旁足陽明脈氣所發者有外陵大巨水道歸來氣街當其處也踝上各一行行六者足內踝之上有足少陰陰蹺脈並循腨上行足少陰脈有太衝復溜陰谷三穴陰蹺脈有照海交信築賓三穴陰蹺既足少陰脈之別亦可通而主之兼此數之猶少一穴按新校正云詳王氏云少一穴按氣府論注十二椎節下有陽關一穴若通數陽關則不少矣本篇穴道針數灸壯已詳氣穴論注中茲故不錄但撮其穴名錄之而已帝曰春取絡脈分肉何也岐伯曰春者木始治肝氣始生肝氣急其風疾經脈常深其氣少不能深入故取絡脈分肉間按絡脈分肉居毫腠之內在經脈之外以肝木急疾而主風所行止及浮淺故針灸者亦不宜深也帝曰夏取盛經分腠何也岐伯曰夏者火始治心氣始長脈瘦氣弱陽氣流溢熱熏分腠內至於經故取盛經分腠絕膚而病去者邪居淺也所謂盛經者陽脈也按夏熱氣浮邪居陽分用針不必太深絕膚謂但絕其皮膚而病邪已去也王本留溢若留則不能溢矣新校正云一本作流溢是也從之帝曰秋取經俞何也岐伯曰秋者金始治肺將收殺金將勝火陽氣在合陰氣初勝濕氣及體按肺令主收其氣肅殺暑退涼生火氣衰而金王金王則寡所畏而勝火矣秋涼為寒之漸故云陰氣初勝秋繁霧露故云濕氣及體也陰氣未盛未能深入故取俞以瀉陰邪取合以虛陽邪陽氣始衰故取於合按肺以太淵為俞以尺澤為合新校正云皇甫士安云是謂始秋之治變帝曰冬取井滎何也岐伯曰冬者水始治腎方閉陽氣衰少陰氣堅盛巨陽伏沉陽脈乃去按方閉謂初冬也陽衰陰盛冬至之後一陽始生去沉伏不見也故取井以下陰逆取滎以實陽氣按冬陰寒逆抑之使下冬陽氣微實之為貴甲乙千金實作通非也元起作遺尤非故曰冬取井滎春不鼽衄此之謂也按井者脈之所出滎者脈之所流俞者脈之所注經者脈之所行合者脈之所入也今言冬取井滎以下陰逆實陽氣是井滎又能抑陰而助陽也秋取經俞以瀉陰虛陽夏取盛經以去淺邪是經俞又以瀉邪為用也帝曰夫子言治熱病五十九俞餘論其意未能領別其處願聞其處因聞其意岐伯曰頭上五行行五者以越諸陽之熱逆也頭上五行當中行謂上星囟會前頂百會後頂次兩旁謂五處承光通天絡卻玉枕又次兩旁謂臨泣目窗正營承靈腦空也按頭為諸陽之首諸陽有熱則必逆上於頭火性炎上各從其類故也越者發也謂發越其陽經之火也大杼膺俞缺盆背俞此八者以瀉胸中之熱也大杼在項第一椎下兩旁相去各一寸半陷者中督脈別絡手足太陽三脈氣之會膺俞者膺中之俞也正名中府在胸中行兩旁相去六寸雲門下一寸乳上三肋間動脈應手陷者中仰而取之手足太陰脈之會缺盆在肩上橫骨陷者中手陽明脈氣所發背俞即風門熱府俞也在第二椎下兩旁各一寸半督脈足太陽之會按新校正云王氏注刺熱論云背俞未詳何處注此指名風門熱府注氣穴論以大杼為背俞三經不同者蓋亦疑之也氣街三里巨虛上下廉此八者以瀉胃中之熱也氣街在腹臍下橫骨兩端鼠鼷上一寸動脈應手足陽明脈氣所發三里在膝下三寸䯒外廉兩筋肉分間足陽明脈之所入也巨虛上廉足陽明與大腸合在三里下三寸足陽明脈氣所發巨虛下廉足陽明與小腸合在上廉下三寸足陽明脈氣所發按新校正云氣街諸注不同具前水熱穴注中雲門髃骨委中髓空此八者以瀉四肢之熱也雲門在巨骨下胸中行兩旁相去六寸動脈應手足太陰脈氣所發舉臂取之驗今中誥孔穴圖經無髃骨穴有肩髃穴穴在肩端兩骨間手陽明蹺脈之會委中在足膝後屈處膕中央約文中動脈足太陽脈之所入也按今中誥孔穴圖經云腰俞穴一名髓空在脊中第二十一椎節下主汗不出足清不仁督脈氣所發也按胃主四肢又四肢為諸陽之本而稟氣於胃凡熱之在胃與四肢者則前兩項一十六穴可通用也髃音隅五臟俞旁五此十者以瀉五臟之熱也俞旁五者謂魄戶神堂魂門意舍志室五穴挾脊兩旁相去三寸足太陽脈氣所發也凡此五十九穴者皆熱之左右也按左右猶言道路帝曰人傷於寒而傳為熱何也岐伯曰夫寒盛則生熱也人傷於寒轉而為熱汗之而愈則外凝內郁之理可知斯乃新病數日者也按熱論篇曰人之感於寒也則為病熱氣府論足太陽膀胱為腎之腑足少陽膽為肝之腑足陽明胃為脾之腑手太陽小腸為心之腑手少陽三焦為心包之腑手陽明大腸為肺之腑篇中所言蓋六腑之氣穴也故云氣府後更附督任衝脈居奇經之三手足少陰厥陰及陰陽蹺以合三百六十五穴之數焉足太陽脈氣所發者七十八穴兼氣浮薄相通者言之當言九十三穴非七十八穴也正經脈會發者七十八穴浮薄相通者一十五穴則其數也兩眉頭各一謂攢竹穴也所在刺灸分壯與氣穴同法入發至項三寸半旁五相去三寸按新校正云注云大杼風門各二穴所在刺灸分壯與氣穴同法今氣穴篇中無風門穴而注言與同法此注之非可見詳此入髮際至項三寸半旁五相去三寸蓋是說下文浮氣之在皮中五行行五之穴且以頂誤作項剩半字耳所以言入髮際至頂者自入發囟會穴至頂百會凡三寸自百會後至後頂又三寸故云入髮際至頂三寸旁五者為兼中行旁數有五行也相去三寸者蓋謂自百會頂中數左右前後各三寸有五行行五共二十五穴也況大杼在第一椎下兩旁風門又在第二椎下上去髮際非止三寸半也其誤甚明其浮氣在皮中者凡五行行五五五二十五浮氣謂氣浮而通之可以去熱者也五行謂頭上自發際中二寸後至頂之後者也二十五者其中行則囟會前頂百會後頂強間五督脈氣也次挾旁兩行則五處承光通天絡卻玉枕各五本經氣也又次旁兩行則臨泣目窗正營承靈腦空各五足少陽氣也兩旁四行各五則二十穴中行五則二十五也其刺灸分壯與水熱穴同法按經言浮氣在皮中者凡五行蓋謂人之一身惟頭上之皮薄而附骨其氣脈之流行於其中者最為浮淺非若身體之深厚故言浮氣在皮中也然頭為諸陽之首六淫之邪必先中之風熱暑濕燥寒皆能為病注止言可以去熱偏矣項中大筋兩旁各一謂天柱二穴也所在刺灸分壯與氣穴同法風府兩旁各一謂風池二穴也刺灸分壯與氣穴同法按新校正云甲乙經云風池足少陽陽維之會非太陽之所發也經言風府兩旁乃天柱穴之分位此亦復明上項中大筋兩旁穴也此注剩出風池二穴於九十三數外更剩前大杼風門及此風池六穴也挾背以下至尻尾二十一節十五間各一十五間各一者今中誥孔穴圖經所存者十三穴左右共二十六穴謂附分魄戶神堂譩譆膈關魂門陽綱意舍胃倉肓門志室胞肓秩邊十三也附分在第二椎下附項內廉兩旁各相去挾脊三寸手足太陽之會刺八分灸五壯魄戶在第三椎下兩旁上直附分足太陽脈氣所發下十一穴並同正坐取之刺五分灸如附分法神堂在第五椎下兩旁上直魄戶刺三分灸同附分法譩譆在第六椎下兩旁上直神堂按骨空論注云以手厭之令病人呼譩譆之聲則指下動矣刺六分留七呼灸如附分法膈關在第七椎下兩旁上直譩譆正坐開肩取之刺五分灸三壯魂門在第九椎下兩旁上直膈關正坐取之刺灸分壯如膈關法陽綱在第十椎下兩旁上直魂門正坐取之刺灸分壯如魂門法意舍在第十一椎下兩旁上直陽綱正坐取之刺灸分壯如陽綱法胃倉在第十二椎下兩旁上直意舍刺灸分壯如意舍法肓門在第十三椎下兩旁上直胃倉刺同胃倉可灸三十壯志室在第十四椎下兩旁上直肓門正坐取之刺灸分壯如魄戶法胞肓在第十九椎下兩旁上直志室伏而取之刺灸分壯如魄戶法秩邊在第二十一椎下兩旁上直胞肓伏而取之刺灸分壯如魄戶法五臟之俞各五六腑之俞各六肺俞在第三椎下兩旁挾脊相去各一寸半刺三分留七呼灸三壯心俞在第五椎下兩旁相去及刺如肺俞法留七呼肝俞在第九椎下兩旁相去及刺如心俞法留六呼脾俞在第十一椎下兩旁相去及刺如肝俞法留七呼腎俞在第十四椎下兩旁相去及刺如脾俞法留七呼膽俞在第十椎下兩旁相去如肺俞法正坐取之刺五分留七呼胃俞在第十二椎下兩旁相去及刺如脾俞法留七呼三焦俞在第十三椎下兩旁相去及刺如膽俞法大腸俞在第十六椎下兩旁相去及刺如肺俞法留六呼小腸俞在第十八椎下兩旁相去及刺如心俞法留六呼膀胱俞在第十九椎下兩旁相去及刺如腎俞法留六呼五臟六腑之俞若灸者並可灸三壯按新校正云詳或者疑經中各五各六以各字為誤者非也所以言各者謂左右各五各六非謂每臟腑而有各五各六之數也委中以下至足小趾旁各六俞謂委中崑崙京骨束骨通谷至陰六穴也左右言之則十二俞也其所在刺灸如氣穴法經言氣脈所發者七十八穴今此所有兼亡者九十三穴由此則大數差錯傳寫有誤也按新校正云詳王氏云兼亡者九十三穴今兼大杼風門風池為九十九穴以此王氏總數計之明知此三穴後之妄增也足少陽脈氣所發者六十二穴兩角上各二謂天衝曲鬢左右各二也天衝在耳上如前三分足太陽少陽二脈之會刺三分灸五壯曲鬢在耳上入髮際曲隅陷者中鼓頷有空足太陽少陽二脈之會刺灸分壯如天衝法直目上髮際內各五謂臨泣目窗正營承靈腦空左右是也臨泣在直目上入髮際五分是太陽少陽陽維三脈之會留七呼目窗在臨泣後一寸正營在目窗後一寸承靈在正營後一寸半腦空在承靈後一寸半挾枕骨後枕骨上並足少陽陽維二脈之會刺四分余並刺三分灸五壯按新校正云腦空在枕骨後枕骨上甲乙經作玉枕骨下耳前角上各一謂頷厭二穴也在曲角上顳顬之上廉手足少陽足陽明三脈之會刺七分留七呼灸三壯刺深令人耳無所聞耳前角下各一謂懸釐二穴也在曲角上顳顬之下廉手足少陽陽明四脈之交會刺三分留七呼灸三壯按新校正云後手少陽中雲角上此云角下必有一誤銳發下各一謂和髎二穴也在耳前銳發下橫動脈手足少陽二脈之會刺三分灸三壯按甲乙經云手足少陽手太陽三脈之會客主人各一客主人穴名也在耳前上廉起骨端開口有空手足少陽足陽明三脈之會刺三分留七呼灸三壯按甲乙經及氣穴禁刺二注並雲手少陽足陽明之會與此異耳後陷中各一謂翳風二穴也在耳後陷者中按之引耳中手足少陽二脈之會刺三分灸三壯下關各一下關穴名也所在刺灸氣穴同法耳下牙車之後各一謂頰車二穴也刺灸分壯氣穴同法缺盆各一缺盆穴名也在肩上橫骨陷者中足陽明脈氣所發刺二分留七呼灸三壯太深令人逆息按骨空注作手陽明掖下三寸脅下至胠八間各一掖下三寸同身寸也掖下謂淵掖輒筋天池脅下至胠則日月章門帶脈五樞維道居髎九穴也左右共一十八穴也淵掖在掖下三寸足少陽脈氣所發舉臂得之刺三分禁不可灸輒筋在掖下三寸復前行一寸搓脅按甲乙經搓作著下同足少陽脈氣所發刺六分灸三壯天池在乳後二寸按甲乙經作一寸掖下三寸搓脅直腋撅肋間手心主足少陽二脈之會刺三分灸三壯日月膽募也在第三肋端橫直心蔽骨旁各二寸五分上直兩乳按甲乙經云日月在期門下五分足太陰少陽二脈之會刺七分灸五壯章門脾募也在季肋端足厥陰少陽二脈之會側臥屈上足伸下足舉臂取之刺八分留六呼灸三壯帶脈在季肋下一寸八分足少陽帶脈二經之會刺六分灸五壯五樞在帶脈下三寸足少陽帶脈二經之會刺一寸灸五壯維道在章門下五寸三分足少陽帶脈二經之會刺灸分壯如章門法居髎在章門下八寸三分胳骨上陷者中陽蹺足少陽二脈之會刺灸分壯如維道法所以謂之八間者自掖下三寸至季肋凡八肋骨髀樞中旁各一謂環跳二穴也刺灸分壯氣穴同法按新校正云氣穴論云兩髀厭分中王注為環跳穴又甲乙經云環跳在髀樞中今云髀樞中旁各一者蓋謂此穴在髀樞中也旁各一者謂左右各一穴也非謂環跳在髀樞中旁也膝以下至足小趾次趾各六俞謂陽陵泉陽輔丘虛臨泣俠谿竅陰六穴也左右言之則十二俞也其所在刺灸分壯氣穴同法足陽明脈氣所發者六十八穴額顱髮際旁各三謂懸顱陽白頭維左右共六穴也正面髮際橫行數之懸顱在曲角上顳顬之中足陽明脈氣所發刺三分留三呼灸三壯陽白在眉上一寸直瞳子足陽明陰維二脈之會刺三分灸三壯頭維在頭角髮際挾本神兩旁各一寸五分足少陽陽明二脈之交會刺五分禁不可灸按新校正云甲乙經陽白足少陽陽維之會今注云足陽明陰維之會詳此在足陽明脈氣所發中則足陽明近是然陽明經不到此又不與陰維會疑王注非甲乙經為得矣面鼽骨空各一謂四白穴也在目下一寸足陽明脈氣所發刺四分不可灸按甲乙經刺三分灸七壯大迎之骨空各一大迎穴名也在曲頷前一寸三分骨陷者中動脈足陽明脈氣所發刺三分留七呼灸三壯人迎各一人迎穴名也在頸挾結喉旁大脈動應手足陽明脈氣所發刺四分過深殺人禁不可灸缺盆外骨空各一謂天髎二穴也在肩缺盆中伏骨之陬陷者中手足少陽陽維三脈之會刺八分灸三壯膺中骨間各一謂膺窗等六穴也膺窗在胸兩旁挾中行各相去四寸巨骨下四寸八分陷者中足陽明脈氣所發仰而取之刺四分灸五壯此穴之上又有氣戶庫房屋翳下又有乳中乳根氣戶在巨骨下下直膺窗去膺窗上四寸八分庫房在氣戶下一寸六分屋翳在氣戶下三寸二分下即膺窗也膺窗之下即乳中也乳中穴下一寸六分陷者中則乳根穴也並足陽明脈氣所發仰而取之乳中禁不可灸刺灸刺之不幸生蝕瘡瘡中有清汁膿血者可治瘡中有瘜肉若蝕瘡者死餘五穴並刺四分灸三壯挾鳩尾之外當乳下三寸挾胃脘各五謂不容承滿梁門關門太一五穴也左右共十穴也挾腹中行兩旁相去四寸不容在第四肋端下至太一各上下相去一寸並足陽明脈氣所發刺八分灸五壯按甲乙經不容刺五分此注疑誤挾齊廣三寸各三廣謂去齊橫廣也廣三寸者各如太一之遠近也各三者謂滑肉門天樞外陵也滑肉門在太一下一寸天樞在滑肉門下一寸正當於齊外陵在天樞下一寸並足陽明脈氣所發天樞刺五分留七呼滑肉門外陵各刺八分灸五壯按甲乙經雲天樞在齊旁各二寸上曰滑肉門下曰外陵是三穴者去臍各二寸也今此經與注云廣三寸是與甲乙不同疑此經本有誤也下臍二寸挾之各三下臍二寸則外陵下之一寸大巨穴也各三者謂大巨水道歸來也大巨在外陵下一寸足陽明脈氣所發刺八分灸五壯水道在大巨下三寸足陽明脈氣所發刺二寸半灸五壯歸來在水道下二寸刺八分灸五壯氣街動脈各一氣街穴名也在歸來下鼠鼷上一寸脈動應手足陽明脈氣所發刺三分留七呼灸三壯按新校正云詳此注與甲乙經同刺熱注及熱穴注云氣街在腹齊下橫骨兩端鼠鼷上刺禁注云在腹下挾齊兩旁相去四寸鼠僕上骨空注云在毛際兩旁鼠鼷上諸注不同以此注為正伏兔上各一謂髀關二穴也在膝上伏兔後交分中刺六分灸三壯三里以下至足中趾各八俞分之所在穴空謂三里上廉下廉解谿衝陽陷谷內庭厲兌八穴也左右言之則十六俞也上廉足陽明與大腸合下廉足陽明與小腸合也其所在刺灸分壯與氣穴同法所謂分之所在穴空者足陽明脈自三里穴分而下行其直者循䯒過跗入中指出其端則厲兌也其支者與直俱行至足跗上入中指次指間故云分之所在穴空也之往也言分而各行往指間穴空處也手太陽脈氣所發者三十六穴目內眥各一謂睛明二穴也在目內眥手足太陽足陽明陽蹺陽蹺五脈之會刺一分留六呼灸三壯諸穴有云數脈會發而不於所會經脈下言之者出從其正者也目外各一謂瞳子髎二穴也在目外去眥五分手太陽手足少陽三脈之會刺三分灸三壯鼽骨下各一謂顴髎二穴也鼽頄也頄面顴也在面頄骨下陷者中手太陽少陽二脈之會刺三分按不言灸者想所禁也耳郭上各一謂角孫二穴也在耳上郭表之中間上髮際之下開口有空手太陽手足少陽三脈之會刺三分灸三分按甲乙經手太陽作手陽明耳中各一謂聽宮二穴也所在刺灸分壯與氣穴同法巨骨穴各一巨骨穴名也在眉端上行兩叉骨間陷者中手陽明蹺脈二經之會刺一寸半灸三壯曲掖上骨穴各一謂臑俞二穴也在肩臑後大骨下胛上廉陷者中手太陽陽維蹺脈三經之會舉臂取之刺八分灸三壯按甲乙經作手足太陽柱骨上陷者各一謂肩井二穴也在肩上陷解中缺盆上大骨前手足少陽陽維三脈之會刺五分灸三壯上天窗四寸各一謂天窗竅陰四穴也所在刺灸分壯與氣穴同法肩解各一謂秉風二穴也在肩上小髃骨後舉臂有空手太陽陽明手足少陽四脈之會舉臂取之刺五分灸三壯肩解下三寸各一謂天宗二穴也在秉風后大骨下陷者中手太陽脈氣所發刺五分留六呼灸三壯肘以下至手小指本各六俞六俞所起於指端經言至小指本則以端為本言上之本也下文陽明少陽同也六俞謂小海陽谷腕骨後谿前谷少澤六穴也左右言之則十二俞也其所在刺灸分壯與氣穴同法按新校正云後此手太陽陽明少陽三經各言至手某指本王注以端為本者非也詳手三陽之井穴盡出手某指之端爪甲下際此言本者是遂指爪甲之本也安得以端為本哉手陽明脈氣所發者二十二穴鼻空外廉項上各二謂迎香扶突各二穴也迎香在鼻下孔旁手足陽明二脈之會刺三分扶突在曲頰下一寸人迎後手陽明脈氣所發仰而取之刺四分灸三壯大迎骨空各一大迎穴名也在曲頷前一寸三分骨陷者中動脈足陽明脈氣所發刺三分留七呼灸三壯按新校正云詳大迎已見前足陽明經中今又見於此王氏不注所以當如顴髎穴兩出之義柱骨之會各一謂天鼎二穴也在頸缺盆上蓋扶突氣舍後半寸手陽明脈氣所發刺四分灸三壯按甲乙經作一寸半顒骨之會各一謂肩髃二穴也所在刺灸分壯與氣穴同法按新校正云髃骨氣穴注中無刺熱注水熱穴注骨空論注中有之肘以下至手大指次指本各六俞謂三里陽谿合谷三間二間商陽六穴也左右言之則十二俞也所在刺灸分壯與氣穴同法按新校正云氣穴論注有曲池而無三里曲池手陽明之合也此誤出三里而遺曲池也手少陽脈氣所發者三十二穴鼽骨下各一謂顴髎二穴也所在刺灸分壯與手少陽脈同法此穴中手少陽太陽脈氣俱會於中等無優劣故重說於此下有者同眉後各一謂絲竹空二穴也在眉後陷者中手少陽脈氣所發刺三分留六呼不可灸灸之不幸使人目小及盲角上各一謂懸釐二穴也與足少陽脈中同按新校正云足少陽脈中言角下此云角上疑此誤下完骨後各一謂天牗二穴也所在刺灸分壯與氣穴同法項中足太陽之前各一謂風池二穴也在耳後陷者中按之引於耳中手足少陽二脈之會刺四分灸三壯按新校正云甲乙經在顳顬後髮際足少陽陽維之會刺可入三分挾扶突各一謂天窗二穴也在曲頰下扶突後動脈應手陷者中手太陽脈氣所發刺六分灸三壯肩貞各一肩貞穴名也在肩曲胛下兩骨解間肩顒後陷者中手太陽脈氣所發刺八分灸三壯肩貞下三寸分間各一謂肩髎臑會消濼各二穴也其穴各在肉分間也肩髎在肩端臑上斜舉臂取之手少陽脈氣所發刺七分灸三壯臑會在臂前廉去肩端三寸手陽明少陽二絡氣之會刺五分灸五壯消濼在肩下臂外開掖斜肘分下行間手少陽脈之會刺五分灸三壯按濼音鑠臑音踘平聲手臂也肘以下至手小指次指本各六俞謂天井支溝陽池中渚液門關衝六穴也左右言之則十二俞也所在刺灸分壯與氣穴同法督脈氣所發者二十八穴今少一穴按新校正云會陽二穴為二十九穴乃剩一穴非少也少當作剩項中央二謂風府喑門二穴也悉在項中餘一穴今亡風府在項上入髮際一寸大筋內宛宛中督脈陽維之會刺四分留三呼不可灸灸之令人喑喑門在項髮際宛宛中去風府一寸督脈陽維二經之會仰頭取之刺四分禁灸灸之令人喑按新校正云王氏云風府喑門悉在項中餘一穴今亡者非謂此二十八穴中亡其一穴也王氏蓋見氣穴論大椎上兩旁各一穴亦在項之穴也今亡故云餘一穴今亡也髮際後中八謂神庭上星囟會前頂百會後頂強間腦戶八穴也其正髮際之中也神庭在髮際直鼻督脈足陽明太陽三經之會禁刺刺之令人巔疾目失睛若灸者可灸三壯上星在顱上直鼻中央入髮際一寸陷者中容豆囟會在上星後一寸陷者中前頂在囟會後寸五分骨間陷者中百會在前頂後一寸五分頂中央旋毛中陷容指督脈足太陽之交會後頂在百會後一寸五分強間在後頂後一寸五分腦戶在強間後一寸五分督脈足太陽之會不可灸此八者並督脈氣所發也上星百會強間腦戶各刺三分上星留六呼腦戶留三呼余並可刺四分灸五壯按甲乙經云腦戶不可灸骨空論注亦云不可妄灸面中三謂素髎水溝齦交三穴也素髎在鼻柱上端督脈氣所發刺三分水溝在鼻柱下人中直唇取之督脈手陽明之會刺二分留六呼灸三壯齦交在唇內齒上齦縫督脈任脈二經之會可逆刺之入三分灸三壯此三者正居面左右之中也大椎以下至尻尾及旁十五穴脊椎之間有大椎陶道身柱神道靈臺至陽筋縮中樞脊中懸樞命門陽關腰俞長強會陽十五俞也大椎在第一椎上陷者中三陽督脈之會陶道在項大椎節下間督脈足太陽之會俯而取之身柱在第三椎節下間俯而取之神道在第五椎節下間俯而取之靈臺在第六椎節下間俯而取之至陽在第七椎節下間俯而取之筋縮在第九椎節下間俯而取之中樞在第十椎節下間俯而取之脊中在第十一椎節下間俯而取之禁不可灸令人僂懸樞在第十三椎節下間伏而取之命門在第十四椎節下間伏而取之陽關在第十六椎節下間坐而取之腰俞在第二十一椎節下間長強在脊骶端督脈別絡少陰二脈所結會陽穴在陰尾骨兩旁凡此十五者並督脈氣所發腰俞長強各刺二分按甲乙經云刺二寸疑太深矣不若注二分為妥留七呼懸樞刺三分會陽刺八分余並刺五分陶道神道各留五呼陶道身柱神道筋縮並灸五壯大椎灸九壯余並三壯按甲乙經無靈臺中樞陽關三穴至骶下凡二十一節脊椎法也通項骨三節即二十四節任脈之氣所發者二十八穴今少一穴喉中央二謂廉泉天突二穴也廉泉在頷下結喉上舌本下陰維任脈之會刺三分留三呼灸三壯天突在頸結喉下四寸中央宛宛中陰維任脈之會低針取之刺一寸留七呼灸三壯膺中骨陷中各一謂旋璣華蓋紫宮玉堂膻中中庭六穴也旋璣在天突下一寸華蓋在旋璣下一寸紫宮玉堂膻中中庭各相去一寸六分陷者中並任脈氣所發仰而取之刺三分灸五壯鳩尾下三寸胃脘五寸胃脘以下至橫骨六寸半一按新校正云詳一字疑誤腹脈法也鳩尾心前穴名也正當心蔽骨之端言其骨垂下如鳩鳥尾形故以為名也鳩尾下有鳩尾巨闕上脘中脘建里下脘水分臍中陰交脖胦丹田關元中極曲骨十四俞也鳩尾在臆前蔽骨下五分任脈之別不可灸刺人無蔽骨者從岐骨際下行一寸按新校正云甲乙經云一寸半為鳩尾處也下次巨闕上脘中脘建里下脘水分遞相去一寸上脘則足陽明手太陽之會中脘則手太陽少陽足陽明三脈所生也臍中禁不可刺陰交在臍下一寸任沖少陰之會脖胦在齊下一寸五分按即氣海也舊刻亦止一寸與陰交同誤矣今釐正之丹田三焦募也在臍下二寸關元小腸募也在臍下三寸足三陰任脈之會也中極在關元下一寸足三陰之會也曲骨在橫骨上中極下一寸任脈足厥陰之會凡此十四者並任脈氣所發建里丹田刺六分留七呼上脘陰交刺八分下脘水分刺一寸中脘脖胦刺一寸二分曲骨刺一寸半留七呼余並刺一寸二分若灸者關元中脘灸七壯齊中中極曲骨各三壯余並五壯自鳩尾下至陰間並任脈主之腹脈法也下陰別一謂會陰一穴也自曲骨下至陰陰之下兩陰之間則此穴也是任脈別絡挾督脈者衝脈之會故曰下陰別一也刺二寸留七呼灸三壯目下各一謂承泣二穴也在目下七分上直瞳子陽蹺任脈足陽明三經之會刺三分禁灸下唇一謂承漿穴也在頤前下唇之下任脈足陽明之會開口取之刺二分留五呼灸三壯齦交一齦交穴名也所在刺灸分壯與督脈同法按齦音銀齒根衝脈氣所發者二十二穴挾鳩尾外各半寸至臍寸一謂幽門通谷陰都石關商曲腎俞六穴左右則十二俞也幽門挾巨闕兩旁相去半寸陷者中下五穴各相去一寸並衝脈足少陰二經之會各可刺入一寸灸五壯按甲乙經云幽門通谷刺入五分挾臍下旁各五分至橫骨寸一腹脈法也謂中注髓府胞門陰關下極五穴左右則十穴也中注在肓俞下五分上直幽門下四穴各相去一寸並衝脈足少陰二經之會各可刺一寸灸五壯足少陰舌下厥陰毛中急脈各一足少陰舌下二穴在人迎前陷中動脈前是日月本左右二也足少陰脈氣所發刺四分急脈在陰髦中陰上兩旁相去二寸半按之隱指堅然甚按則痛引上下也其左者中寒則上引少腹下引陰丸善為痛為少腹急中寒此兩脈皆厥陰之大絡通行其中故曰厥陰急脈即睪之系也可灸而不可刺病疝少腹痛即可灸按新校正云詳舌下毛中之穴甲乙經無手少陰各一謂手少陰郄穴也在腕後半寸手少陰郄也刺三分灸三壯左右二也陰陽蹺各一陰蹺一謂交信穴也交信在足內踝上二寸少陰前太陰後筋骨間陰蹺之郄刺四分留五呼灸三壯陽蹺一謂附陽也附陽在足外踝上三寸太陽前少陽後筋骨間謹取之陽蹺之郄刺六分留七呼灸三壯左右四也手足諸魚際脈氣所發者凡三百六十五穴也經之所存者多凡一十九穴此所謂氣府也然散穴俞諸經脈部分皆有之故經或不言而甲乙經經脈流注多少不同者以此骨空論佚
